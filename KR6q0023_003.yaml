body:
  text: 西天祖師諸祖事跡參傳法正宗等傳録一祖摩訶迦葉尊者摩竭陀國人姓婆羅門父號飲澤母號香至過去世為金師值毗婆尸佛般涅槃四衆起塔有貧女得金珠懇金師為補塔中佛像金面缺處相與發願世世為無姻夫妻由是因緣九十一劫身皆金色及此世與紫金光尼復為夫婦梵語迦葉波此云飲光蓋以身光名然夫婦皆清淨自居無世間想旋復出家修杜多行會空中有神告曰佛已出世請往師之尊者即趨禮釋尊於竹林精舍佛言善來比丘而鬚髮自除佛於衆中稱歎第一後因拈花因緣付法尊者因外道問如何是我我者曰覓我者是汝我外道曰這個是我我師我何在者曰汝問我覓尊者一日踏泥次有一沙彌見乃問尊者何得自為者曰我若不為誰為我為洞山價云莫要茶喫麼佛涅槃時尊者在畢鉢羅窟以淨天眼見世尊在熙連河側入般涅槃即至雙樹悲戀號泣佛於金棺出示雙足尊者告諸比丘佛已茶毗金剛舍利非吾等事宜當結集法眼無令斷絶乃說偈告曰如來弟子且莫涅槃得神通者宜赴結集於是得神通者悉赴耆闍崛山畢鉢羅窟時阿難為漏未盡不得入會後證阿羅漢果乃得入尊者告衆言此阿難比丘有大智慧所聞佛法如水傳器無有遺餘可請彼集修多羅藏大衆默然尊者告阿難曰汝今宜宣法眼阿難聞語信受觀察衆心而宣偈言比丘諸眷屬離佛不莊嚴猶如虗空中衆星之無月說偈已禮衆僧足升法座而宣是言如是我聞一時佛在某處說某經教乃至人天等作禮奉行時尊者問諸比丘阿難所言不錯繆乎皆曰不異世尊所說結集既畢尊者自念衰老宜入定於雞足山以待彌勒乃召阿難言我今不久世間今將正法付囑於汝汝善守護聽吾偈法法本來法無法無非法何於一法中有法有不法偈已阿難作禮奉命尊者念如來舍利皆在諸天凌虗遍至塔廟禮已而還復以夙約往辭阿闍世王遂杳然入雞足山席草而坐自念今我被糞掃服持僧伽黎必經五十七俱胝六十百千歲至於彌勒出世終不致壞乃語山曰若阿闍世王及阿難來汝當為開去已復合阿闍世王知尊者已入雞足山乃請阿難同至山山果為開見尊者入定儼然王禮訖欲以香薪茶毗阿難曰未可燔也大迦葉方以禪定持身俟慈氏下生乃般涅槃王聞敬歎與阿難禮辭山合如故當此周孝王五年丙辰也按唐無畏三藏嘗入山為尊者剃髮豈無畏至山亦為開耶無畏必果位人也二祖阿難尊者王舍城人姓剎利帝父斛飯王實如來從弟也多聞博達智慧無礙世尊以為總持第一梵云阿難此云慶喜以如來成道日生故名也一日白佛言今日入城見一奇特事佛曰見何奇特事者曰入城見一攢樂人作舞出城總見無常佛曰我昨日入城亦見一奇特事者曰未審見何奇特事佛曰我入城時見一攢樂人作舞出城時亦見樂人作舞者一日問迦葉曰師兄世尊傳金縷袈裟外別傳個甚麼迦葉召阿難阿難應諾迦葉曰倒却門前剎竿著汾陽昭云不問那知翠巖芝云千年無影樹今時沒底靴者一日入竹林聞比丘誦偈曰若人生百歲不見水潦鶴不如生一日而得覩見之尊者因為正之曰不然佛云若人生百歲不解生滅法不如生一日而得解了之生滅法覺範作諸佛機解了之解作决於是比丘以聞其師其師曰阿難老昏矣吾語是也異日尊者復經竹林見比丘誦偈如前者詰之聞述其師言因念愚癡難化入三昧求尊聖為之證於是地為之動光明遽發俄有一聖宿大士示現而為之說偈曰彼者念諷偈實非諸佛意今遇歡喜尊而可依了之彼師弟子竦敬尋得二果幻寄曰阿難果老昏這僧不著便受伊毒藥若向水潦鶴上打發便可踏毗盧頂𩕳上行何有二果却受聖宿小聖處分一生埋沒尊者將入涅槃於恆河中流跏趺而坐阿闍世王毗舍離王皆在河側說偈勸請莫般涅槃者答偈曰二王善嚴住勿為苦悲戀涅槃當我靜而無諸有故復念我若向一國則諸國或爭應以平等度諸有情遂於恆河中流將入寂滅是時山河大地六種震動雪山有五百仙人覩茲瑞應飛空而至禮尊者足而白言我當於長老而證佛法願垂大慈度脫我等尊者默然受請即變殑伽河悉為金地為其仙衆說諸大法復念先所度脫弟子應當來集須臾五百羅漢從空而下為諸仙人出家受具其仙衆中有二羅漢一名商那和修二名末田底迦尊者知是法器而告之曰如來以正法眼付迦葉迦葉入定而付於我我今將滅復付於汝汝受吾教當聽偈言本來付有法付了言無法各各須自悟悟了無無法說偈已復以正法眼囑纍商那和修而謂末田底迦曰昔佛記云佛滅度後後五百歲中汝當於罽賓國敷宣大法言已踊身虗空現十八變入風輪奮迅三昧而分身四分一分惠忉利天一分惠娑竭羅龍宮一分惠阿闍世王一分惠毗舍離王各造寶塔而供養之當此周厲王十二年癸巳也三祖商那和修尊者亦名舍那婆斯姓毗舍多父林勝母憍奢耶摩突羅國人也在胎六年而生梵云商諾迦此云自然服乃西域九枝秀草名出則聖人降生尊者生而此草出昔如來行化至摩突羅國見一青林枝葉茂盛語阿難曰此林地名優留茶吾滅後一百年有比丘名商那和修於此轉妙法輪後百歲果誕和修出家證道受慶喜尊者法眼至此林遂降二火龍龍受三歸遂施其地以建梵宮尊者化緣既久思付法者尋於吒利國得優波毱多以為給侍因問毱多曰汝年幾耶答曰我年十七者曰汝身十七性十七耶答曰師髮已白為髮白耶心白耶者曰我但髮白非心白毱多曰我身十七非性十七尊者知是法器後三載遂為落髮受具而以法眼付囑之付法偈曰非法亦非心無心亦無法說是心法時是法非心法尊者付法已即隱於罽賓國南象白山中後於三昧中見毱多徒衆多懈慢乃往彼正之毱多見師至頂禮次尊者以右手上指即有香乳自空而注問毱多曰汝識之乎毱多不測遂入三昧觀察亦不能測乃請曰是果何三昧耶尊者曰是謂龍奮迅三昧如是五百三昧汝皆未之知復曰如來三昧辟支不識辟支三昧阿羅漢不識吾師阿難三昧而我不識今我三昧汝豈識乎是三昧者心不生滅住大慈力𮞏相恭敬其至此者乃可識之於是毱多弟子皆伏而悔謝尊者復為說偈曰通達非彼此至聖無長短汝除輕慢意疾得阿羅漢五百比丘聞偈已依教奉行皆獲無漏尊者乃現十八變火光三昧用焚其身毱多收舍利建塔於梵迦羅山蓋此周宣王二十三年乙未歲也四祖優波毱多尊者吒利國人也亦名優波崛多又名塢波毱多姓首陀父善意十七出家二十證果行化至摩突羅國得度者甚衆由是魔宮震動波旬愁怖遂竭其魔力以害正法尊者即入三昧觀其所由波旬復伺便持瓔珞縻尊者頸尊者出定取人狗蛇三尸化為華鬘䎡言諭波旬曰吾此華鬘酬汝瓔珞波旬大喜引頸受之即復三尸蟲蛆臭壞盡其神通莫能去之乃升六欲天告諸天主又詣梵王求其解免彼各告言十力弟子所作神變我輩凡陋何能去之波旬曰然則奈何梵王曰汝可歸心尊者即能除斷復示偈曰若因地倒還因地起離地求起終無其理波旬聞已即下天宮至尊者所禮足哀懺尊者曰汝自今而往於佛法更不相嬈乎波旬曰誓向佛道尊者曰汝可自唱皈依三寶波旬合掌三唱而三尸悉除踊躍作禮而去因訪一老比丘尼入門乃觸撒鉢盂尼曰佛在日六羣比丘甚是粗行數來我舍尚不如是尊者紹祖位人得與麼粗行者休去汾陽昭代云已知錯誤尊者在世化導證果最多每度一人以一籌置於石室其室縱十八肘廣十二肘充滿其間最後有一長者子名曰香衆來禮尊者求出家尊者問曰汝身出家心出家答曰我來出家非為身心尊者曰不為身心復誰出家答曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心無形相其體亦然尊者曰汝當大悟心自通達宜依佛法僧紹隆聖種即為剃度授具足戒仍告之曰汝父夢金日而生汝可名提多迦如來以大法眼藏次第傳授以至於我今復付汝聽吾偈言心自本來心本心非有法有法有本心非心非本法付法已乃踊身虗空呈十八變却復本座跏趺而逝提多迦以室內籌用焚師軀收舍利建塔供養即平王三十一年庚子歲也時號無相好佛前此傳法者皆具禪法律三藏自後律教別行橫分五部傳法者唯傳禪門及經論五祖提多迦尊者摩伽陀國人也初名香衆生時父夢金日自屋而出照耀天地前有大山諸寶嚴飾山頂泉湧滂沱四流後遇毱多尊者為解之曰寶山者吾身也泉湧者法無盡也日從屋出者汝今入道之相也照耀天地者汝智慧超越也因為更今名梵云提多迦此云通真量尊者聞已踊躍述偈云巍巍七寶山常出智慧泉回為真法味能度諸有緣毱多尊者亦說偈曰我法傳於汝當現大智慧金日從屋出照耀於天地尊者聞偈設禮奉持後至中印度彼國有八千大仙彌遮迦為首聞尊者至率衆瞻禮謂尊者曰昔與師同生梵天我遇阿私陀仙授我仙法師逢十力弟子修習禪那自此報分殊途已經六劫者曰支離纍劫誠哉不虗今可捨邪歸正以入佛乘彌遮迦曰昔阿私陀仙人授我記云汝却後六劫當遇同學獲無漏果今也相遇非夙緣耶願師慈悲令我解脫者即度出家命諸聖授戒其餘仙衆始生我慢尊者示大神通於是俱發菩提心一時出家者乃告彌遮迦曰昔如來以大法眼藏密付迦葉展轉相授而至於我我今付汝當護念之乃說偈曰通達本法心無法無非法悟了同未悟無心亦無法說偈已踊身虗空作十八變火光三昧自焚其軀彌遮迦與八千比丘同收舍利於班茶山中起塔供養即莊王七年己丑歲也六祖彌遮迦尊者中印度人既傳法已遊化至北天竺國見雉堞之上有金色祥雲歎曰斯道人氣也必有大士為吾嗣乃入城於闤闠間有一人手持酒器逆而問曰師何方來欲往何所祖曰從自心來欲往無處曰識我手中物否祖曰此是觸器而負淨者曰師識我否祖曰我即不識識即非我復謂之曰汝試自稱名氏吾當後示本因彼說偈答曰我從無量劫至於生此國本姓頗羅墮名字婆須蜜祖曰我師提多迦說世尊昔遊北印度語阿難言此國中吾滅度後三百年有一聖人姓頗羅墮名婆須蜜而於禪祖當獲第七世尊記汝汝應出家彼乃置器禮師側立而言曰我思往劫嘗作檀那獻一如來寶座彼佛記我曰汝於賢劫釋迦法中宣傳至教今符師說願加度脫祖即與披剃復圓戒相乃告之曰正法眼藏今付於汝勿令斷絶乃說偈曰無心無可得說得不名法若了心非心始解心心法祖說偈已入師子奮迅三昧踊身虗空高七多羅樹却復本座化火自焚婆須蜜收靈骨貯七寶函建浮圖置於上級即襄王十七年甲申歲也七祖婆須蜜尊者北天竺國人常服淨衣執酒器遊行里閈或吟或嘯人謂之狂及遇彌遮迦尊者宣如來往志自省前緣投器出家受法行化至迦摩羅國廣興佛事於法座前忽有智者自稱我名佛陀難提今與師論義祖曰仁者論即不義義即不論若擬論義終非義論難提知師義勝心即欽服曰我願求道霑甘靈味祖遂與剃度而授具戒復告之曰如來正法眼藏我今付汝汝當護持乃說偈曰心同虗空界示等虗空法證得虗空時無是無非法即入慈心三昧時梵王帝釋及諸天衆俱來作禮而說偈言賢劫衆聖祖而當第七位尊者哀念我請為宣佛地尊者從三昧起示衆曰我所得法而非有故若識佛地離有無故語已還入三昧示涅槃相難提即於本座起七寶塔以葬全身即定王十九年辛未歲也正宗付法偈後有超身呈十八變乃入慈心三昧以趣寂定語八祖佛陀難提尊者迦摩羅國人姓瞿曇氏正宗作瞿曇波氏頂有肉髻辨捷無礙受婆須蜜尊者法行化至迦提國毗舍羅家見舍上有白光上騰謂其徒曰此家有聖人口無言說真大乘器不行四衢知觸穢耳長者出致禮問何所須祖曰我求侍者長者曰我有一子名伏䭾蜜多年已五十口未曾言足未曾履祖曰如汝所說真吾弟子伏䭾聞之遽起禮拜而說偈曰父母非我親誰是最親者諸佛非我道誰是最道者祖以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏䭾聞偈已便行七步祖曰此子昔曾值佛悲願廣大慮父母愛情難捨故不言不履耳長者遂捨令出家祖尋授具戒付法說偈曰虗空無內外心法亦如此若了虗空故是達真如理伏䭾承祖付囑即超身虗空散衆寶花說偈讚曰我師禪祖中當得為第八法化衆無量悉獲阿羅漢爾時祖忽起本座現大神變却復本座儼然寂滅衆即其所建塔閟其全身時景王十二年丙寅歲也九祖伏馱蜜多尊者提伽國人姓毗舍羅行化至中印度有長者香蓋携一子而來瞻禮曰此子處胎六十歲正宗作十六嘗有一仙謂此兒骨相非常今遇尊者可捨令出家祖即與落髮羯磨之際祥光燭座感舍利三七粒現前自此精進忘疲未幾祖遂付法說偈曰真理本無名因名顯真理受得真實法非真亦非僞偈已即入滅盡三昧而般涅槃闍維收舍利建塔於那爛陀寺即敬王三十五年甲寅也圭峯云德力甚深智慧廣大國王信邪躬持赤幡請諸論主論義論主皆屈王自論亦屈遂改邪心十祖脅尊者中印度人姓氏未詳處胎六十年將誕之夕母夢白象載一寶座座置一明珠入門乃生生而神光燭室體有奇香及長雖穀食絶無穢滓本名難生後侍九祖執侍左右未嘗睡眠謂其脅不至席遂號脅尊者初至華氏國憩一樹下右手指地而告衆曰此地變金色當有聖人入會言訖即變金色時有長者子富那夜奢合掌前立祖問曰汝從何來曰我心非往祖曰汝何處住曰我心非止祖曰汝不定耶曰諸佛亦然祖曰汝非諸佛曰諸佛亦非大愚芝云祖師一問童子一答總缺會在如今諸人作麼生會妙喜曰直饒如今會得更參三生六十劫祖因說偈曰此地變金色預知有聖至當坐菩提樹覺華而成已夜奢復說偈曰師坐金色地常說真實義回光而照我今入三摩諦祖即度出家復具戒品而付法說偈曰真體自然真因真說有理領得真真法無行亦無止祖付法已即現神變而入涅槃化火自焚舍利自空而下不可勝數四衆盛以衣裓隨處建塔供養時貞王二十二年己亥也十一祖富那夜奢尊者華氏國人姓瞿曇氏父寶身有子七人祖最少幼則與諸兄異尚嘗曰若遇大士坐於道場我則詣彼親近隨喜及遇脅尊者遂授法祖教被無量得果者且五百矣後至波羅奈國有一長者來趣其會祖謂衆曰汝等識此來者耶佛記聖者馬鳴紹吾法者也於是馬鳴致禮問曰我欲識佛何者即是祖曰汝欲識佛不識者是彼曰佛既不識焉知是乎祖曰既不識佛焉知不是曰此是鋸義祖曰彼是木義祖問鋸義者何曰與師平出馬鳴却問木義者何祖曰汝被我解馬鳴豁然省悟遂求剃度祖謂衆曰此大士者昔為毗舍利國王以其國有一類裸人如馬裸露王遂運神通分身為蠶以衣之後生中印土馬人感戀悲鳴故號馬鳴如來懸記滅度後六百年馬鳴當於波羅奈國摧伏異道度人無量今正是智遂付法偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二付法已即現神變湛然圓寂衆興寶塔以閟全身當此土周安王戊戌歲也圭峯云馬鳴慢心誓斷舌以難祖祖立二諦義鳴即歸投宗鏡録云西天韻陀山中有一羅漢名富樓那馬鳴往見端坐林中志氣渺然若不可測鳴語之曰沙門說之敢有所明要必屈汝我若不勝刎頸以謝羅漢默然容無負色亦無勝顏扣之數四曾無應情鳴退自思惟我負矣彼勝矣彼安無言故無可屈吾以言之雖知言者可屈自吾未免於言真可愧矣遂投出家二說與傳燈不同并識之十二祖馬鳴大士者波羅奈國人也亦名功勝以有作無作諸功德最為殊勝故名焉既受法於夜奢尊者後於華氏國轉妙法輪忽有老人座前仆地祖謂衆曰此非庸流當有異相言訖不見俄從地涌出一金色人復化為女子右手指祖而說偈曰稽首長老尊當受如來記今於此地上宣通第一義說偈已瞥然不見祖曰將有魔來與吾較力有頃風雨暴至天地晦冥祖曰魔之來信矣吾當除之即指空中現一大金龍奮發威神震動山嶽祖儼然於座魔事隨滅經七日有一小蟲大若蟭螟潛形座下祖以手取之示衆曰斯乃魔之所變盜聽吾法耳放之令去魔不能動祖告之曰汝但歸依三寶即得神通遂復本形作禮懺悔祖問曰汝名誰耶眷屬多少曰我名迦毗摩羅有三千眷屬祖曰盡汝神力變化若何曰我化巨海極為小事祖曰汝化性海得否曰何為性海我未嘗知祖即為說性海曰山河大地皆依建立三昧六通由茲發現迦毗摩羅聞言遂發信心與徒衆三千俱求剃度祖乃召五百羅漢與授具戒復告之曰如來大法眼藏今當付汝汝聽偈言隱顯即本法明暗元不二今付悟了法非取亦非離付囑已即入龍奮迅三昧挺身空中如日輪相然後示滅四衆藏真體於龍龕即顯王三十七年甲午歲也一外道索祖論義集國王大臣及四衆俱會論場祖曰汝義以何為宗曰凡有言說我皆能破祖乃指國王云當今國土康寧大王長壽請汝破之外道屈服按宗鏡外道即馬鳴與論乃脅尊者馬鳴因此從脅尊者出家與傳燈及正宗抵牾而宗鏡復載韻陀山中語則自矛盾矣嵩公考據甚詳宗鏡所記訛也圭峯云作妙伎樂降諸伎人於樂音中演說諸法苦空無我貴賤出家時遇外國兵圍索九億金錢王以馬鳴與之方退造甘蔗論十萬偈又造起信等論善能開誘起信論疏又謂大士鳴琴則馬鳴故稱馬鳴十三祖迦毗摩羅尊者華氏國人也初為外道有徒三千通諸異論後於馬鳴尊者得法領徒至西印度彼有太子名雲自在仰尊者名請於宮中供養祖曰如來有教沙門不得親近國王大臣有勢之家太子曰今我國城之北有大山焉山有一石窟可禪寂於此否祖曰諾即入彼山行數里逢一大蟒祖直前不顧盤繞祖身祖因與授三歸依蟒聽訖而去祖將至石窟復有一老人素服而出合掌問訊祖曰汝何所止答曰我昔嘗為比丘多樂寂靜有初學比丘數來請益而我煩於應答起嗔恨想命終墮為蟒身住是窟中今已千載適遇尊者獲聞戒法故來謝爾祖問曰此山更有何人居止曰此去十里有大樹蔭覆五百大龍其樹王名龍樹常為龍衆說法我亦聽受耳祖遂與徒衆詣彼龍樹出迎曰深山孤寂龍蟒所居大德至尊何枉神足祖曰吾非至尊來訪賢者龍樹默念曰此師得決定性明道眼否是大聖繼真乘否祖曰汝雖心語我已意知但辦出家何慮吾之不聖龍樹聞已悔謝祖即與度脫及五百龍衆俱受具戒復告之曰今以如來大法眼藏付囑於汝諦聽偈言非隱非顯法說是真實際悟此隱顯法非愚亦非智付法已即現神變化火焚身龍樹收五色舍利建塔赧王四十一年壬辰也圭峯云造無我論一百偈此論至處無不摧魔十四祖龍樹尊者亦名龍勝少則能誦四韋陀長而善知衆藝才辨神明出家入石窟棲止龍樹為龍衆所歸遇摩羅尊者付法後至南印度彼國之人多信福業祖為說法𮞏相謂曰人有福業世間第一徒言佛性誰能覩之祖曰汝欲見佛性先須除我慢彼人曰佛性大小祖曰非大非小非廣非狹無福無報不死不生彼聞理勝悉回初心祖復於座上現自在身如滿月輪一切衆惟聞法音不覩祖相彼衆中有長者子名迦那提婆謂衆曰識此相否衆曰目所未覩安能辨識提婆曰此是尊者現佛性體相以示我等何以知之蓋以無相三昧形如滿月佛性之義廓然虗明言訖輪相即隱復居本座而說偈言身現圓月相以表諸佛體說法無其形用辨非聲色彼衆聞偈頓悟無生咸願出家以求解脫祖即為剃髮命諸聖授具南印度有五千外道興大幻術王與國人靡然從之不知向佛尊者感慨易其威儀白衣持幡每俟王出則趨其前或隱或顯如是者七載王一日忽異之問曰汝何者而前吾行追之不得縱之不去者曰吾是智人知一切法王曰汝知諸天今何所為祖曰天今與修羅方戰王曰何以明之者曰頃則徵矣俄有戈戟手足自空紛然而下王遂大敬信命諸外道皆歸禮尊者者悉化之令歸三寶復造大智度論中論十二門論垂之於世後付法於迦那提婆付法偈云為明隱顯法方說解脫理於法心不證無嗔亦無喜付法已入月輪三昧廣現神變復座凝然入寂及七日天雨舍利尊者復於座指空語衆曰昔拘那含佛弟子摩訶迦尊者有三願一為佛時凡有聖士化度則天澍雨及其身皆為舍利二大地所生皆堪為藥療衆生病三凡有智者皆得所知微妙以通宿命今雨舍利摩訶迦神力也言已復寂迦那提婆與衆建塔閟其全身秦始皇三十五年己丑也圭峯云豪貴家生通四韋陀天地圖讖因與三友作妖術敗出家誦盡閻浮經論自謂為一切智人大龍愍之接入龍宮悟已還出化國王婆羅門外道無數造論數十部十五祖迦那提婆尊者南天竺國人也姓毗舍羅初求福業兼樂辨論後謁龍樹大士將及門龍樹知是智人先遣侍者以滿鉢水置於座前尊者覩之即以一針投之而進欣然契會琅琊覺頌云龍猛盂中水提婆毳上針人人爭得失個個話浮沉不覩雲中雁焉知沙塞深農夫移片磉磉下獲黃金龍樹即為說法不起於座現月輪相語具龍樹章祖既得法後至迦毗羅國彼有長者曰梵摩淨德一日園樹生耳如菌昧甚美唯長者與第二子羅睺羅多取而食之取已隨長盡而復生自餘親屬皆不能見祖知有宿因遂至其家長者乃問其故祖曰汝家昔曾供養一比丘然此比丘道眼未明以虗霑信施故報為木菌惟汝與子精勤供養得以享之又問長者年多少曰七十有九祖乃說偈曰入道不通理復身還信施汝年八十一此樹不生耳長者聞偈已彌加歎伏曰弟子衰老不能事師願捨次子隨師出家祖曰昔如來記此子當第二五百年為大教主今之相遇蓋符宿因即與剃髮至巴連弗城聞諸外道欲障佛法計之既久祖乃執長幡入彼衆中彼問祖曰汝何不前祖曰汝何不後彼曰汝似賤人祖曰汝似良人彼曰汝解何法祖曰汝百不解彼曰我欲得佛祖曰我灼然得佛彼曰汝不合得祖曰元道我得汝實不得彼曰汝既不得云何言得祖曰汝有我故所以不得我無我我故自當得彼辭既屈乃問祖曰汝名何等祖曰我名迦那提婆彼既夙聞祖名乃悔過致謝時衆中猶互興問難祖折以無礙之辨由是歸伏正法眼藏云西天禁斷鐘鼓謂之沙汰經於七日祖運神通登樓撞鐘諸外道衆一時共集至鐘樓其門封鎖乃問撞鐘者誰祖曰天曰曰天者誰祖曰我曰我者誰祖曰你曰你者誰祖曰狗曰狗者誰祖曰你曰你是誰祖曰我曰我是誰祖曰天如是往返七度外道一衆知自負墮奏聞國王再鳴鐘鼓大興佛法告上足羅睺羅多而付法眼偈曰本對傳法人為說解脫理於法實無證無終亦無始付法已入奮迅定身放八光而歸寂滅學衆興塔供養漢文十九年庚辰也十六祖羅睺羅多尊者迦毗羅國人也行化至室羅筏城有河名曰金水其味殊美中流復現五佛影祖告衆曰此河之源凡五百里有聖者僧伽難提居於彼處佛志一千年後當紹聖位語已領諸學衆遡流而上至彼見僧伽難提安坐入定祖與衆伺之經三七日方從定起祖問曰汝心定耶身定耶提曰身心俱定祖曰身心俱定何有出入提曰雖有出入不失定相如金在井金體常寂祖曰若金在井若金出井金無動靜何物出入提曰言金動靜何物出入言金出入金非動靜祖曰若金在井出者何金若金出井在者何物提曰金若出井在者非金金若在井出者非物祖曰此法不然提曰彼義非著祖曰此義當墮提曰彼義不成祖曰彼義不成我義成矣提曰我義雖成法非我故祖曰我義已成我無我故提曰我無我故復成何義祖曰我無我故故成汝義提曰仁者師誰得是無我祖曰我師迦那提婆證是無我難提以偈贊曰稽首提婆師而出於仁者仁者無我故我欲師仁者祖以偈答曰我已無我故汝須見我我汝若師我故知我非我我難提心意豁然即求度脫祖曰汝心自在非我所繫語已即以右手擎金鉢舉至梵宮取彼香飯將齊大衆而大衆忽生厭惡之心祖曰非我之咎汝等自業即命難提分座同食衆復訝之祖曰汝不得食皆由此故當知與吾分座者即過去娑羅樹王如來也愍物降跡汝輩亦莊嚴劫中已至三果而未證無漏者也衆曰我師神力斯可信矣彼云過去佛者即竊疑焉難提知衆生慢乃曰世尊在日世界平正無有丘陵江河溝洫水悉甘美草木滋茂國土豐盈無八苦行十善自雙樹示滅八百餘年世界丘墟草木枯瘁人無至信正念輕微不信真如惟愛神力言訖以右手漸展入地至金剛輪際取甘露水以琉璃器持至會所大衆見之即時欽慕悔過作禮於是祖命僧伽難提而付法眼偈曰於法實無證不取亦不離法非有無相內外云何起難提聞命敬奉勤至復說偈贊曰善哉大聖者心明逾日月一光照世界暗魔無不放祖付法已安坐歸寂四衆建塔漢武二十八年戊辰也十七祖僧伽難提尊者室羅筏城寶莊嚴王之子也生而能言常讚佛事七歲即厭世樂以偈告其父母曰稽首大慈父和南骨血母我今欲出家幸願哀愍故父母固止之遂終日不食乃許其在家出家號僧伽難提復命沙門禪利多為之師積十九載未嘗退倦每自念言身居王宮胡為出家一夕天光下屬見一路坦平不覺徐行約十里許至大巖前有石窟焉乃燕寂於中父既失子即擯禪利多出國訪尋其子不知所在經十年祖得法受記已行化至摩提國忽有凉風襲衆身心悅適非常而不知其然祖曰此道德之風也當有聖者出世嗣續祖燈乎言訖以神力攝諸大衆遊歷山谷食頃至一峰下謂衆曰此峰頂有紫雲如蓋聖人居此矣即與大衆徘徊久之見山舍一童子持圓鑑直造祖前祖問汝幾歲耶曰百歲祖曰汝年尚幼何言百歲童曰我不會理正百歲耳祖曰汝善機耶童曰佛言若人生百歲不會諸佛機不如生一日而得決了之祖曰汝手中者當何所表童曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似彼父母聞子語即捨令出家祖携至本處受具戒訖名伽耶舍多他時聞風吹殿鈴聲祖問曰鈴鳴耶風鳴耶舍多曰非風鈴鳴我心鳴耳祖曰心復誰乎舍多曰俱寂靜故祖曰善哉善哉繼吾道者非子而誰即付法眼偈曰心地本無生因地從緣起緣種不相妨華果亦復爾祖付法已右手攀樹而化大衆議曰尊者樹下歸寂其垂蔭後裔乎將奉全身於高原建塔衆力不能舉即樹下起塔前漢昭帝十三年丁未也圭峯云尊者攀樹化後諸羅漢欲移之不得以諸象力挽亦不動遂就樹下焚之身盡樹更蓊十八祖伽耶舍多尊者摩提國人也姓頭藍父天蓋母方聖嘗夢大神持鑑因而有娠凡七日而誕肌體瑩如琉璃未嘗洗沐自然香潔幼好閒靜語非常童持鑑出遊遇難提尊者得度後領徒至大月氏國見一婆羅門舍有異氣祖將入彼舍舍主鳩摩羅多問曰是何徒衆祖曰是佛弟子彼聞佛號心神竦然即時閉戶祖良久扣其門羅多云此舍無人祖曰答無者誰汾陽昭代云洎合忘却羅多聞語知是異人遽開關延接祖曰昔世尊記曰吾滅後一千年有大士出現於月氏國紹隆玄化今汝值吾應斯嘉運於是鳩摩羅多發宿命智投誠出家授具訖付法偈曰有種有心地因緣能發萌於緣不相礙當生生不生祖付法已踊身虗空現十八變化火三昧自焚其身衆以舍利建塔漢成帝二十年戊申也十九祖鳩摩羅多尊者大月氏國婆羅門之子也昔為自在天人見菩薩瓔珞忽起愛心墮生忉利聞憍尸迦說般若波羅蜜多以法故升梵天以根利故善說法要諸天尊為導師以繼祖時至降月氏後至中天竺國有大士名闍夜多問曰我家父母素信三寶而常縈疾瘵凡所營作皆不如意而我鄰家久為旃陀羅行而身常勇健所作和合彼何幸而我何辜祖曰何足疑乎且善惡之報有三時焉凡人但見仁夭暴壽逆吉義凶便謂亡因果虗罪福殊不知影響相隨毫釐靡忒縱經百千萬劫亦不磨滅時闍夜多聞是語已頓釋所疑祖曰汝雖已信三業而未明業從惑生惑依識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻闍夜多承言領旨即發宿慧懇求出家正宗記祖曰汝何許人可白父母而後出家夜多曰我國北印度也去此三千里然吾有小術往返亦易遂行其術與祖須臾達彼夜多既聞其父母祖遂與授具既受具祖告曰吾今寂滅時至汝當紹行化跡付法眼偈曰性上本無生為對求人說於法既無得何懷決不決又云此是妙音如來見性清淨之句汝宜傳布後學言訖即於座上以指爪𠢐面如紅蓮開出大光明照耀四衆而入寂滅闍夜多建塔以奉全身當新室十四年壬午也二十祖闍夜多尊者北天竺國人也智慧淵冲化導無量後至羅閲城敷揚頓教彼有學衆惟尚辨論為之首者名婆修盤頭此云遍行常一食不臥六時禮佛清淨無欲為衆所歸祖將欲度之先問彼衆曰此遍行頭陀能修梵行可得佛道乎衆曰我師精進何故不可祖曰汝師與道遠矣設苦行歷於塵劫皆虗妄之本也衆曰尊者蘊何德行而譏我師祖曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道時遍行聞已發無漏智歡喜讚嘆祖又語彼衆曰會吾語否吾所以然者為其求道心切夫絃急即斷故吾不贊令其住安樂地入諸佛智復告遍行曰吾適對衆挫抑仁者得無惱於衷乎遍行曰我憶念七劫前生常安樂國師於智者月淨記我非久當證斯陀含果時有大光明菩薩出世我以老故䇿杖禮謁師叱我曰重子輕父一何鄙哉時我自謂無過請師示之師曰汝禮大光明菩薩以杖倚壁畫佛面以此過慢遂失二果我責躬悔過以來聞諸惡言如風如響況今獲聞無上甘露而反生熱惱耶惟願大慈以妙道垂誨祖曰汝久植衆德當繼吾宗聽吾偈曰言下合無生同於法界性若能如是解通達事理竟祖付法已於其座上以首倒植象娑羅樹枝奄然而化衆欲闍維百千人舉之不能乃至諸羅漢以神力舉之亦不能動衆乃炷香祝之遂頽然委地闍維收舍利建塔當後漢明帝十七年甲戌也初月氏國王聞師德風躬詣問法修敬已請開演祖曰大王來時好道今去亦如來時王嘆服圓悟勤頌云至簡至易最尊最貴往還千聖頂𩕳頭世出世間不思議彈指圓成八萬門一超直入如來地二十一祖婆修盤頭尊者羅閲城人也姓毗舍佉父光蓋母嚴一家富而無子禱於佛塔母夢吞明暗二珠因孕經七日有一羅漢名賢衆至其家光蓋設禮賢衆端坐受之嚴一出拜賢衆避席云回禮法身大士光蓋疑之賢衆曰汝婦懷聖子生當為世燈慧日故吾避之然當一乳而生二子一名婆修盤頭則吾所尊者也二名芻尼此云野鵲子昔如來雪山修道芻尼巢於頂上佛既成道芻尼受報為那提國王佛記云汝至第二五百年生羅閲城毗舍佉家與聖同胞今無爽矣後一月果誕二子尊者婆修盤頭年十五禮光度羅漢出家感毗婆訶菩薩與之授戒行化至那提國彼王名常自在有二子長名摩訶羅次名摩拿羅王問祖曰羅閲城土風與此何異祖曰彼曾三佛出世今王國有二師化導王曰二師者誰祖曰佛記第二五百年有二神力大士出家繼聖一即王之次子摩拿羅吾雖德薄亦當其一初那提國有惡象為害拿羅生而象息至是三十年矣人尚不知其所以息王方同祖語忽使者報有象巨萬逼城王憂之祖曰拿羅出患解矣王試命拿羅出拿羅遂出城南向象撫腹大喝城為震動羣象顛仆頃皆馳散至是人始知三十年之安以拿羅也王大敬信命拿羅依祖出家祖即與授具付法偈曰泡幻同無礙如何不了悟達法在其中非今亦非古付法已踊身高半由旬屹然而住四衆告曰願尊者無為神通我輩欲收舍利遂復座入寂闍維舍利建塔漢殤帝十二年丁巳也圭峯云通達一切修多羅義分別宣說廣化衆生疑是天親未敢為定二十二祖摩拿羅尊者姓剎帝利父常自在王受盤頭尊者命祖遂出家傳法至西印土彼國王名得度瞿曇種族事佛精進一日於行道處忽現一塔高尺四寸欲舉以供養竭衆力莫能舉王大會四衆問所由衆莫能知祖曰此阿育王塔感王精進故現耳王曰敢問法要祖曰佛法能具七事去三物乃可學王問三物七事為何祖曰所去三物貪嗔癡所具七事大慈歡喜無我勇猛饒益降魔無證人所以明了不明了以此耳王聞已曰至聖難逢世樂非久即傳位太子出家七日而證四果祖深加慰誨曰汝居此國善自度人今異域有大法器吾當往化得度曰師應跡十方動念當至寧勞往耶祖曰然於是焚香遙語月支國鶴勒那比丘曰汝教導鶴衆道果將證宜自知之時鶴勒那為彼國王寶印說修多羅偈忽覩異香成穗王曰是何祥也曰西印土摩拿羅尊者將至此信香也王與鶴勒那俱西嚮作禮祖亦以手東向三點於地答之即辭得度與其具通衆凌虗趣月支國鶴勒那與寶印迎祖至王宮供養異日鶴勒那問祖曰我止林間已經九白印土以一年為一白有弟子龍子者幼而聰慧我於三世推窮莫知其本祖曰此子於第五劫中生妙喜國婆羅門家曾以栴檀施於佛宇作槌撞鐘受報聰敏為衆欽仰又問我有何緣而感鶴衆祖曰於第四劫中嘗為比丘當赴會龍宮汝諸弟子咸欲隨從汝觀五百衆中無有一人堪任妙供時諸弟子曰師嘗說法於食等者於法亦等今既不然何聖之有汝即令赴會坐是濫食報為羽族師弟夙緣故今相隨鶴勒那曰以何方便令彼解脫祖曰吾有無上法寶汝當聽受化未來際乃說偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂鶴衆聞偈飛鳴而去祖即踊身空中呈十八變返座指地發一神泉復說偈曰心地清淨泉能潤於一切從地而涌出遍濟十方世宗鏡作遍滿十方際偈已泊然寂滅鶴勒那與寶印王建塔以奉全身漢桓帝十九年乙巳也二十三祖鶴勒那尊者月支國人姓婆羅門父千勝母金光以求子禱於七佛金幢夢須彌頂有神童持金環云我來及誕而天雨花國王以其有神徵乳於宮中宮嬪育之即分身各為其子有千許王曰我無儲嗣將育爾為太子今者千身孰為正子哉言已一子放光忽皆不見而見於其父母家王莫能如何七歲覩民間淫祠惡其宰殺入廟叱之廟貌遂隳鄉黨稱之為聖子至年二十二出家栖一林間九白誦大般若感鶴衆相隨三十得法行化至中印土為其王無畏海說法感日月天子禮拜其前王目見之乃問祖日月國土總有多少祖曰千釋迦所化世界各有百億迷盧日月我若廣說即不能盡王聞欣然時祖演無上道度有緣衆有上足龍子早夭其兄師子博通強記事婆羅門將葬龍子而衆力舉其柩不能動祖謂師子曰昔汝弟欲冥福汝而塑一佛像汝方信婆羅門投於地今汝弟雖謝世猶欲感悟汝故示斯異汝亟供像柩斯舉矣師子奉命而柩舉未幾婆羅門師死師子乃歸依尊者問曰我欲求道當何用心祖曰汝欲求道無所用心曰既無用心誰作佛事祖曰汝若有用即非功德汝若無作即是佛事經云我所作功德而無我所故師子聞是語已即入佛慧時祖忽指東北問曰是何氣象師子曰我見氣如白虹貫乎天地復有黑氣五道橫亘其中祖曰其兆云何曰莫可知矣祖曰吾滅後五十年北天竺國當有難起嬰在汝身吾將滅已今以法眼付囑於汝善自護持乃說偈曰認得心性時可說不思議了了無可得得時不說知師子比丘聞偈欣愜然未曉將罹何難祖乃密示之言訖現十八變而歸寂闍維畢分舍利各欲興塔祖復現形空中而說偈曰一法一切法一切一法攝吾身非有無何分一切塔大衆聞偈遂不復分就䭾都場而建塔後漢獻帝二十年己丑也二十四祖師子比丘尊者中印度人姓婆羅門得法遊方至罽賓國有沙門波利迦或云波黎迦本習小乘禪觀其學徒有五曰禪定曰知見曰執相曰捨相曰不語祖謂持不語者曰佛教勤衍般若孰為不語而反佛說耶謂捨相者曰佛教威儀具足梵行清白豈捨相耶謂執相者曰佛土清淨自在無著何執相耶謂知見者曰諸佛知見無所得故此法微妙覺聞不及無為無相何知見耶四衆皆服從惟禪定師達磨達者聞四衆義屈憤悱而來祖曰仁者習定何當來此既至於此胡云習定彼曰我雖來此心亦不亂定隨人習豈在處所祖曰仁者既來其習亦至既無處所豈在人習彼曰定習人故非人習定我當來此其定常習祖曰人非習定定習人故當自來時其定誰習彼曰如淨明珠內外無翳定若通達必當如此祖曰定若通達一似明珠今見仁者非珠之徒彼曰其珠明徹內外悉定我心不亂猶若此淨祖曰其珠無內外仁者何能定穢物非動搖此定不是淨達磨達聞已遂作禮曰我於學道蓋虗勞耳尊者幸有以教我殷勤哀請祖曰諸佛禪定無有所得諸佛覺道無有所證無得無證是真解脫酬因答果世之業報於此法中悉不如是達磨達蒙祖開悟心地朗然祖既攝五衆名聞遐邇方求法嗣遇一長者引其子問祖曰此子名斯多當生便拳左手年二十矣終未能舒願尊者示其宿因祖覩之即以手接曰可還我珠童子遽開手奉珠衆皆驚異祖曰吾前報為僧有童子名婆舍吾嘗赴西海齊受䞋珠付之今還吾珠理固然矣長者遂令出家祖會衆聖與授具以前緣故名婆舍斯多祖即謂之曰吾師密有懸記罹難非久如來正法眼藏今當付汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即於今祖說偈已以僧伽黎密付斯多俾之他國隨機演化斯多受教直抵南天祖謂難不可以苟免獨留罽賓時本國有外道二人一名摩目多二名都落遮學諸幻法欲共謀亂詭為釋子潛入王宮其王彌羅崛遂滅毀釋教秉劍至尊者所問曰師得蘊空否祖曰已得蘊空王曰離生死否祖曰已離生死王曰既離生死可施我頭祖曰身非我有何吝於頭王即揮刃斷尊者首白乳涌高數尺王之右臂旋亦墮地七日而終太子光首歎曰吾父何故自取其禍延衆懺悔時象白山有仙人深明因果言師子與羅崛往世皆為白衣以嫉法勝故陰戕於崛乃今償焉衆遂以祖報體建塔當魏廢帝齊王二十年己卯也玄沙備云大小師子尊者頭也不解作得主玄覺徵云且道斬著斬不著汾陽昭別云知師不吝雪竇顯云作家君王天然有在翠巖芝云當時尊者引頸王便舉刃當恁麼時有人出來諫得住麼至今無人斷此公案如今衲僧作麼生斷天童華拈諸師語云玄沙云大小尊者頭也不解作得主隨氀㲣玄覺徵云且道斬著斬不著將蝦釣鱉汾陽別云知師不吝將錯就錯雪竇云作家君王天然有在提水放火翠巖芝云當時王舉劍師子引頸當恁麼時有人諫得住麼至今無人斷此公案如今衲僧作麼生斷莫要說夢芭蕉云賣寶撞著瞎波斯誣人之罪琅琊云罽賓好一口劍爭奈劍上無眼尊者好個師子要且不解返躑賊過後張弓復云這一隊漢被山僧剿絶了也還見師子尊者麼驀拈拄杖卓一下云修身慎行恐辱先也黃龍新云黃龍要問雪竇既是作家君王因甚臂落徑山杲云孟八郎漢又恁麼去孤峯深頌云本是山中人愛說山中話五月賣松風人間恐無價永明頌云尊者理非謬玄沙語甚奇首隨鋒刃落彼此沒毫釐幻寄曰大小永明作座主見解唐突般若二十五祖婆舍斯多罽賓國人姓婆羅門父寂行母常安樂初母夢得神劍因而有孕既誕拳左手遇師子尊者付法語在師子章後至中印度國王迦勝設禮供養有外道無我尊先亦為王禮重乃於王前論義冀勝祖自重謂祖曰我解默論不假言說祖曰孰知勝負彼曰不爭勝負但取其義祖曰汝以何為義彼曰無心為義祖曰汝既無心豈得義乎彼曰我說無心當名非義祖曰汝說無心當名非義我說非心當義非名彼曰當義非名誰能辨義祖曰汝名非義此名何名彼曰為辨非義是名無名祖曰名既非名義亦非義辨者是名當辨何物如是往返五十九番外道杜口信伏妙喜曰婆舍斯多何用忉怛當時若見它道請師默論不假言說便云義墮也即今莫有與妙喜默論者麼或有衲僧出來道義墮也我也知你在鬼窟裏作活計於時祖忽面北合掌長吁曰我師師子尊者今日遇難斯可傷焉即辭王南邁至南天潛隱山谷王天德迎請供養王有二子長曰德勝凶暴而色力充盛次曰不如蜜多和柔而常嬰疾苦王以問尊者為陳因果王敬信受有呪術師忌祖置毒食中祖知而食之彼反受毒遂投祖出家後六十載德勝即位惑外道說因詰祖曰師子尊者已遇罽賓國王難何緣付法祖出師子尊者所付僧伽黎示勝勝命焚之衣出五色光薪盡如故勝乃追悔致禮初勝欲抑尊者不如蜜多往諫因囚之至是立出蜜多蜜多遂求出家祖問曰汝欲出家當為何事蜜多曰我若出家不為其事祖曰不為何事蜜多曰不為俗事祖曰當為何事蜜多曰當為佛事祖曰王子智慧天至必諸聖降迹即度出家侍祖六年後於王宮受具羯磨之際大地震動乃付法偈曰聖人說知見當境無是非我今悟真性無道亦無理不如蜜多受偈已問衣可傳乎祖曰此衣為難故假以證明汝身無難化被十方何假傳衣不如蜜多作禮祖現神變化三昧火自焚平地舍利可高一尺德勝王建浮圖閟之東晉明帝太寧三年乙酉歲也傳法記云祖踊身虗空現十八變放大光明照耀天地即於空中化火自焚雨舍利不墮地衆以衣裓接之又云祖又名婆羅多那又名婆羅多羅此二名華云別業泉衆初中天竺王苑有泉熱不可探王迦勝以問祖祖曰泉熱有三一下有熱石二鬼業三神業此神業也因命爇香臨泉為其懺悔須臾有神見謝得度脫七日而泉清冷如常泉故中竺北竺復以二名稱之二十六祖不如蜜多尊者姓剎帝利南印度王子得法後至東印度其王堅固奉外道師長爪梵志祖至王問曰師來何為曰將度衆生曰以何法度曰各以其類度之梵志即化一大山於祖頂上勢且下壓祖指之山遽移在彼衆頂上復以手按地地動五百外道皆不能立梵志怖懼懺禮祖復按地地靜指山山滅王異日大治齊集諸外道懇祖預會祖初不欲行而知所會地將陷乃往王曰師肻來耶祖曰吾非應供來救死耳此地已為龍窟須臾當下陷王恐與其衆如高原反顧其地已淵然成湫矣王益敬信祖為演法且曰王國有聖人當繼我法先是東印有婆羅門子年二十幼失父母不知名氏或自言瓔珞人遂名曰瓔珞童子丐行閭里有問汝行何急即曰汝行何緩問何姓即曰與汝同姓人莫測之一日王與祖同車而出瓔珞稽首於前祖曰汝憶往事否珞曰我念往劫中與師同居師演摩訶般若我演甚深修多羅今日之事蓋契昔因祖顧王曰此大勢至菩薩也繼後出二人一人化南印度一人緣在震旦九年却返此方即以昔因故名為般若多羅付法偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智付法已即辭王曰化緣已終將歸寂滅願王於最上乘無忘外護即還本座現形如日少頃復呈十八變出三昧火自焚雨金色舍利王以金塔閟之東晉孝武太元十三年戊子也二十七祖般若多羅尊者東印度人得法後至南印度彼王名香至尊重供養度越倫等又施無價寶珠時王有三子曰月淨多羅曰功德多羅曰菩提多羅其季開士也祖欲試其所得乃以所施珠問三王子曰此珠圓明有能及否月淨功德皆曰此珠七寶中尊固無踰也菩提曰此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上此珠光明不能自照要假智光光辨於此既辨此已即知是珠既知是珠即明其寶若明其寶寶不自寶若辨其珠珠不自珠珠不自珠者要假智珠而辨世珠寶不自寶者要假智寶以明法寶然則師有其道其寶即現衆生有道心寶亦然祖歎其辨慧乃復問曰於諸物中何物無相曰於諸物中不起無相又問於諸物中何物最高曰於諸物中人我最高又問於諸物中何物最大曰於諸物中法性最大祖知是法器以時尚未至且默而混之妙喜曰說得道理好歸依佛法僧及香至王厭世衆皆號絶菩提多羅獨於柩前入定經七日而出遂依祖求出家既受具祖告曰如來以正法眼付大迦葉如是展轉乃至於我我今囑汝聽吾偈曰心地生諸種因事復生理果滿菩提圓花開世界起祖付法已即於座上起立舒左右手各放光明二十七道五色晃曜又踊身虗空高七多羅樹化火自焚空中舍利如雨大衆建塔收供當宋孝武大明元年丁酉也祖因東印度國王請齊次王乃問諸人盡轉經師獨為何不轉祖曰貧道出息不隨衆緣入息不居蘊界常轉如是經百千萬億卷非但一卷兩卷音釋卷一之三騫苦賢切音牽擷胡結切音纈捋取也珣須倫切音荀舁雲俱切音于對舉也琛丑森切音郴咍呼來切海平聲笑聲蘸莊陷切斬去聲岌峇忌立切音及口合切音溘高貌岣嶁音苟樓山巔也𠢐鄰溪切叿呼洪切音烘市人聲鏊魚到切音傲餅鏊螫施職切音釋蟲行毒顗養里切音以忩與匆同閴苦臭切傾入聲寂靜也傴僂上於語切下音樓不伸也囁嚅音捻如多言也又口動貌窣蘇骨切孫入聲襦人余切音如短衣墅承與切音竪田廬也呼改切音海肉醬腲脮音猥腿肥貌挽武綰切音晚引車也寖同浸音晉進也漸也昳杜結切音絰日昃晡奔謨切音逋申時䎡乳兗切音軟罷弱也倕直追切音埀重也又人名靸悉合切糝入聲輕舉貌甓皮亦切平入聲瓴甋也咨與咨同暖與暖同軟乳演切然上聲柔也璪子藁切音早玉飾如水藻文閿符分切音焚地名抶尺栗切音叱笞擊也𢫫盧谷切音祿椊也手持也譴苦戰切牽去聲責問也怒也燔符艱切音煩爇也炙也罽音記毱渠玉切音局闤闠音還會市垣門也閈候幹切音翰里門曰閈又垣也抵牾音抵誤觸忤也赧乃版切難上聲面慚而赤也磉蘇朗切桑上聲柱下石遡音素逆流而上曰遡娠之慎切音震婦懷孕也瘵側賣切音債勞瘵佉丘於切音區與袪同穗徐醉切音瑞禾頴也稱古稱字𣯫𣯜疏鳩切音兜當侯切音搜
