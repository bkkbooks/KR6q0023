body:
  text: 六祖下第三世鹽官海昌院齊安國師有講僧來參師問座主蘊何事業對曰講華嚴經師曰有幾種法界曰廣說則重重無盡略說有四種師竪起拂子曰這個是第幾種法界主沉吟師曰思而知慮而解是鬼家活計日下孤燈果然失照保福聞云若禮拜即喫和尚棒禾山代云某甲不煩和尚莫怪法眼代拊掌三下妙喜曰兩段不同收歸上科僧問大梅如何是西來意大梅曰西來無意師聞乃曰一個棺材兩個死漢玄沙云鹽官是作家雪竇云三個也有復頌云活中死眼無作有用方寸不移十方獨弄巧拙不到處鹽官有出身親言出親口雞犬閙比隣黃龍新云雪竇道三個也有是死漢是活漢具眼者請試甄別昭覺勤云一串穿却師一日喚侍者曰將犀牛扇子來者曰破也師曰扇子既破還我犀牛兒來者無對投子代云不辭將出恐頭角不全資福代作圓相心中書牛字石霜代云若還和尚即無也保福云和尚年尊別請人好雲居舜云三伏當時正須扇子為侍者不了事雖然如是鹽官太絮何不大家割捨侍者當時若見鹽官道扇子既破還我犀牛兒來便向道已颺在搕𢶍堆上了也廬山歸宗寺智常禪師上堂從上古德不是無知解他高尚之士不同常流今時不能自成自立虗度時光諸子莫錯用心無人替汝亦無汝用心處莫就他覓從前祇是依他解發言皆滯光不透脫祇為目前有物問如何是玄旨師曰無人能會曰向者如何師曰有向即乖曰不向者如何師曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入師曰觀音妙智力能救世間苦曰如何是觀音妙智力師敲鼎盖三下曰子還聞否曰聞師曰我何不聞僧無語師以棒趁下大愚一日辭師師問甚處去愚曰諸方學五味禪去師曰諸方有五味禪我這裏只有一味禪愚便問如何是一味禪師便打愚忽然大悟云嗄我會也師云道道愚擬開口師又打趁出愚後到黃檗舉前話檗上堂曰馬大師出八十四人善知識問著個個屙漉漉地祇有歸宗較些子資福先云歸宗幸是好一味禪無端傷鹽傷醋却成五味了也如今忽有人來辭去諸方學五味禪只向他道善為道路若是個漢必然別有生涯師入園取菜次乃畵圓相圍却一株語眾曰輒不得動著這個眾不敢動少頃師復來見菜猶在便以棒趁眾僧曰這一隊漢無一個有智慧底刺史李渤問教中所言須彌納芥子渤即不疑芥子納須彌莫是妄談否師曰人傳使君讀萬卷書籍還是否曰然師曰摩頂至踵如椰子大萬卷書向何處著李俛首而已李異日又問一大藏教明得個甚麼邊事師舉拳示之曰還會麼曰不會師曰這個措大拳頭也不識曰請師指示師曰遇人則塗中授與不遇即世諦流布師有頌云歸宗事理絕日輪正當午自在如師子不與物依怙獨步四山頂優游三大路欠呿飛禽墜嚬呻眾邪怖機竪箭易及影沒手難覆施張若弓伎裁剪如尺度巧鏤萬般名歸宗還似土語默音聲絕旨妙情難措棄個眼還聾取個耳還瞽一鏃破三關分明箭後路可憐大丈夫先天為心祖明州大梅山法常禪師初參大寂問如何是佛寂曰即心是佛師即大悟遂之四明梅子真舊隱縛茆燕處寂聞師住山乃令僧問和尚見馬大師得個甚麼便住此山師曰大師向我道即心是佛我便向這裏住僧曰大師近日佛法又別師曰作麼生曰又道非心非佛師曰這老漢惑亂人未有了日任他非心非佛我祇管即心即佛其僧回舉似寂寂曰梅子熟也龐居士欲驗師特相訪纔見便問久嚮大梅未審梅子熟也未師曰熟也你向甚麼處下口士曰百雜碎師伸手曰還我核子來士無語大愚芝云此二人前不至村後不至店僧問如何是佛法大意師曰蒲花柳絮竹針麻線夾山與定山同行言話次定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死互相不肯同上山見師夾山便舉問未審二人見處那個較親師曰一親一疎夾山復問那個親師曰且去明日來夾山明日再上問師曰親者不問問者不親夾山住後自云當時失一隻眼英邵武舉此問法昌遇云此個公案作麼生遇便打英云一場儱倥遇云你試下轉語英云一狀領過遇云矮子看戲大梅山旁有石庫相傳神仙置藥之所一夕師夢神人告之曰君非凡夫石庫中有聖書受之者為地下主不然亦為帝王師於夢中答曰昔僧稠不顧仙經其卷自亡吾以涅槃為樂厥壽何啻與天偕老耶神曰此地靈府俗人居此立致變怪師曰吾寓跡梅尉之鄉耳非久據也幻寄曰道流還識大梅意麼作麼生是涅槃樂急須著眼看仙人莫看仙人手中扇忽一日謂其徒曰來莫可抑往莫可追從容間聞鼯鼠聲乃曰即此物非他物汝等諸人善自護持吾今逝矣言訖示滅永明壽禪師讚云師初得道即心是佛最後示徒物非他物窮萬法源徹千聖骨真化不移何妨出沒雪竇顯云這漢生前鹵莽死後顢頇即此物非他物是何物還有分付處也無有般漢不解截斷大梅脚跟只管道貪程太速池州魯祖山寶雲禪師尋常見僧來便面壁南泉聞乃云我尋常向僧道佛未出世時會取尚不得一個半個他漝麼驢年去玄覺云為復唱和語不肯語保福問長慶祇如魯祖節文在甚麼處被南泉恁麼道長慶云退己讓於人萬中無一個羅山云陳老師當時若見背上與五火抄何故為伊解放不解收玄沙云我當時若見也與五火抄雲居錫云羅山玄沙總恁麼道為復一般別有道理若擇得出許上座佛法有去處玄覺云且道玄沙五火抄打伊著不著徑山杲云魯祖不得南泉幾乎破壁師因僧問如何是不言言師曰汝口在甚麼處曰無口師曰將甚麼喫飯僧無對洞山代云他不飢喫甚麼飯泐潭常興和尚南泉至見師面壁泉乃拊師背師問汝是阿誰曰普願師曰如何曰也尋常師曰汝何多事妙喜曰也須驗過泐潭法會禪師問馬祖如何是祖師西來意祖曰低聲近前來向汝道師便近前祖打一摑曰六耳不同謀且去來日來師至來日獨入法堂曰請和尚道祖曰且去待老漢上堂出來問與汝證明師忽有省遂曰謝大眾證明乃繞法堂一帀便去洛京佛光如滿禪師唐順宗問佛從何方來滅向何方去既言常住世佛今在何處師答曰佛從無為來滅向無為去法身等虗空常住無心處有念歸無念有住歸無住來為眾生來去為眾生去清淨真如海湛然體常住智者善思惟更勿生疑慮帝又問佛向王宮生滅向雙林滅住世四十九又言無法說山河與大海天地及日月時至皆歸盡誰言不生滅疑情猶若斯智者善分別師答曰佛體本無為迷情妄分別法身等虗空未曾有生滅有緣佛出世無緣佛入滅處處化眾生猶如水中月非常亦非斷非生亦非滅生亦未曾生滅亦未曾滅了見無心處自然無法說帝聞大悅益重禪宗五洩山靈默禪師初謁馬祖次謁石頭便問一言相契即住不契即去石頭據坐師便行頭隨後召曰闍黎師回首頭曰從生至死祇是這個回頭轉腦作麼師言下大悟乃拗折拄杖而棲止焉洞山云當時若不是五洩先師大難承當然雖如此猶涉在途長慶云險玄覺云那個是涉在途處有僧云為伊三寸途中薦得所以在途玄覺云為復薦得自己為復薦得三寸若是自己為甚麼成三寸若是三寸為甚麼悟去且道洞山意作麼生莫亂說子細好元和十三年三月二十三日沐浴焚香端坐告眾曰法身圓寂示有去來千聖同源萬靈歸一吾今漚散胡假興哀無自勞神須存正念若遵此命真報吾恩倘固違言非吾之子時有僧問和尚向甚麼處去師曰無處去曰某甲何不見師曰非眼所覩洞山云作家言畢奄然而化幽州寶積禪師因於市肆行見一客人買猪肉語屠家曰精底割一斤來屠家放下刀叉手曰長史那個不是精底師於此有省又一日出門見人舁喪歌郎振鈴云紅輪決定沉西去未審魂靈往那方幕下孝子哭曰哀哀師身心踊躍歸舉似馬祖祖印可之住盤山寶積僧問如何是道師便咄僧曰學人未曉師曰去上堂心若無事萬法不生意絕玄機纖塵何立道本無體因體而立名道本無名因名而得號若言即心即佛今時未入玄微若言非心非佛猶是指蹤極則向上一路千聖不傳學者勞形如猿捉影慈明曰向上一路千聖不然楊岐曰口上著白雲端頌盤山向上路何言罕見行人耳有穿口上著來無咬處方知千聖不能傳徑山杲頌不傳不然海口難宣崑崙頂上駕起鐵船上堂夫心月孤懸光吞萬象光非照境境亦非存光境俱亡復是何物妙喜云千年常住一朝僧禪德譬如擲劒揮空莫論及之不及斯乃空輪無跡劒刃無虧若能如是心心無知妙喜云咄咄咄我王庫內無如是刀正法眼藏作二則已下語不錄全心即佛全佛即人人佛無異始為道矣上堂禪德可中學道似地擎山不知山之孤峻如石含玉不知玉之無瑕若如此者是名出家故導師云法本不相礙三際亦復然無為無事人猶是金鎖難所以靈源獨耀道絕無生大智非明真空無跡真如凡聖皆是夢言佛及涅槃竝為增語禪德直須自看無人替代上堂三界無法何處求心四大本空佛依何住璣不動寂爾無言覿面相呈更無餘事珍重掩室開頌山舍無塵分外清石榴花發透簾明槐陰滿地日卓午夢覺流鶯時一聲愚谷囦頌依依楊柳欲藏鴉社後東風捲落花理䇿邀朋何處好山南山北看桑麻雪竇顯頌三界無法何處求心二句三界無法何處求心白雲為盖流水作琴一曲兩曲無人會雨過夜塘秋水深師將順世告眾曰有人邈得吾真否眾將所寫真呈皆不契師意普化出曰某甲邈得師曰何不呈似老僧化乃打筋斗而出師曰這漢向後掣風狂去在師乃奄化麻谷寶徹禪師侍馬祖行次問如何是大涅槃祖曰急師曰急個甚麼祖曰看水師同南泉歸宗謁徑山路逢一婆乃問徑山路向甚處去婆曰驀直去師曰前頭水深過得否婆曰不濕脚師又問上岸稻得與麼好下岸稻得與麼怯婆曰總被螃蟹喫却也師曰禾好香婆曰沒氣息師又問婆在甚處住婆曰祇在這裏三人至店婆煎茶一瓶携盞三隻至謂曰和尚有神通者即喫茶三人相顧間婆曰看老朽自逞神通去也於是拈盞傾茶便行東寺如會禪師常患門徒誦大寂即心即佛之談不已謂佛於何住而曰即心心如畫師而云即佛遂示眾曰心不是佛智不是道劍去遠矣爾方刻舟虗堂愚頌云昨日因過竹院西隣家稚子隔溪啼山寒水肅半黃落無數歸鴉卜樹棲仰山參師問汝是甚處人仰曰廣南人師曰我聞廣南有鎮海明珠是否仰曰是師曰此珠如何仰曰黑月即隱白月即現師曰還將得來也無仰曰將得來師曰何不呈似老僧仰叉手近前曰昨到溈山亦被索此珠直得無言可對無理可伸師曰真師子兒善能哮吼仰禮拜了却入客位具威儀再上人事師纔見乃曰已相見了也仰曰恁麼相見莫不當否師歸方丈閉却門仰歸舉似溈山溈曰寂子是甚麼心行仰曰若不恁麼爭識得他西堂智藏禪師與百丈南泉同入大寂之室李尚書甞問僧馬大師有甚麼言教僧曰大師或說即心即佛或說非心非佛李曰總過這邊李却問師馬大師有甚麼言教師呼李翱李應諾師曰鼓角動也普請次師曰因果歷然爭奈何爭奈何有僧出以手托地師曰作甚麼曰相救相救師曰大眾這個師僧猶較些子僧拂袖便走師曰師子身中蟲自食師子肉昭覺勤云西堂洞明綱要始終正令全提這僧異類中行爭奈龍頭蛇尾敢問大眾因果歷然一句作麼生道是則龍女頓成佛否則善星生陷墜僧問有問有答賓主歷然無問無答時如何師曰怕爛却那後有僧舉問長慶慶云相逢盡道休官好林下何曾見一人有一俗士問有天堂地獄否師曰有曰有佛法僧寶否師曰有更有多問盡答言有曰和尚恁麼道莫錯否師曰汝曾見尊宿來耶曰某甲曾參徑山和尚來師曰徑山向汝作麼生道曰他道一切總無師曰汝有妻否曰有師曰徑山和尚有妻否曰無師曰徑山和尚道無即得俗士禮謝而去越州大珠慧海禪師建州朱氏子初參馬祖祖問從何處來曰越州大雲寺來祖曰來此擬須何事曰來求佛法祖曰我這裏一物也無求甚麼佛法自家寶藏不顧拋家散走作麼曰阿那個是慧海寶藏祖曰即今問我者是汝寶藏一切具是更無欠少使用自在何假外求師於言下自識本心不由知覺踊躍禮謝師事六載後以受業師老遂歸奉養晦跡藏用人莫能識潛著頓悟入道要門論一卷法姪玄晏竊呈馬祖祖覽訖告眾曰越州有大珠圓明光透自在無遮障處也眾因尋訪依附師謂曰我不會禪竝無一法可示於人僧問擬伸一問師還對否師曰深潭月影任意撮摩問如何是佛師曰清談對面非佛而誰眾皆茫然法眼云是即沒交涉僧良久又問師說何法度人師曰貧道未曾有一法度人曰禪師家渾如此師却問大德說何法度人曰講金剛經師曰講幾座來曰二十餘座師曰此經是阿誰說僧抗聲曰禪師相弄豈不知是佛說耶師曰若言如來有所說法則為謗佛是人不解我所說義若言此經不是佛說則是謗經請大德說看僧無對師少頃又問經云若以色見我以聲音求我是人行邪道不能見如來大德且道阿那個是如來曰某甲到此却迷去師曰從來未悟說甚却迷曰請禪師為說師曰大德講經二十餘座却不識如來僧禮拜曰願垂開示師曰如來者是諸法如義何得忘却曰是諸法如義師曰大德是亦未是曰經文分明那得未是師曰大德如否曰如師曰木石如否曰如師曰大德如同木石如否曰無二師曰大德與木石何別僧無對良久却問如何得大涅槃師曰不造生死業曰如何是生死業師曰求大涅槃是生死業捨垢取淨是生死業有得有證是生死業不脫對治門是生死業曰云何即得解脫師曰本自無縛不用求解直用直行是無等等曰禪師如和尚者實謂希有禮謝而去上堂諸人幸自好個無事人苦死造作要擔枷落獄作麼每日至夜奔波道我參禪學道解會佛法如此轉無交涉也只是逐聲色走有何歇時貧道聞江西和尚道汝自家寶藏一切具足使用自在不假外求我從此一時休去自己財寶隨身受用可謂快活無一法可取無一法可捨不見一法生滅相不見一物去來相徧十方界無一微塵許不是自家財寶但自子細觀察自心一體三寶常自現前無可疑慮莫尋思莫求覓心性本來清淨故華嚴經云一切法不生一切法不滅若能如是解諸佛常現前又淨名經云觀身實相觀佛亦然若不隨聲色動念不逐相貌生解自然無事去莫久立珍重此日大眾普集久而不散師曰諸人何故在此不去貧道已對面相呈還肯休麼有何事可疑莫錯用心枉費氣力若有疑情一任諸人恣意早問時有僧問云何是佛云何是法云何是僧云何是一體三寶曰心是佛不用將佛求佛心是法不用將法求法佛法無二和合為僧即是一體三寶經云心佛與眾生是三無差別身口意清淨名為佛出世三業不清淨名為佛滅度喻如嗔時無喜喜時無嗔唯是一心實無二體本智法爾無漏現前如蛇化為龍不改其鱗眾生回心作佛不改其面性本清淨不待修成有證有修即同增上慢者真空無滯應用無窮無始無終利根頓悟用無等等即是阿耨菩提心無形相即是微妙色身無相即是實相法身性相體空即是虗空無邊身萬行莊嚴即是功德法身此法身者乃是萬化之本隨處立名智用無盡名無盡藏能生萬法名本法藏具一切智名智慧藏萬法歸如名如來藏經云如來者即諸法如義又云世間一切生滅法無有一法不歸如也維摩座主問經云彼外道六師等是汝之師因其出家彼師所墮汝亦隨墮其施汝者不名福田供養汝者墮三惡道謗於佛毀於法不入眾數終不得滅度汝若如是乃可取食今請禪師明為解說師曰迷徇六根者號之為六師心外求佛名為外道有物可施不名福田生心受供墮三惡道汝若能謗於佛者是不著佛求毀於法者是不著法求不入眾數者是不著僧求終不得滅度者智用現前若有如是解者便得法喜禪悅之食又問般若經云度九類眾生皆入無餘涅槃又云實無眾生得滅度者此兩段經文如何會通前後人說皆云實度眾生而不取眾生相常疑未決請師為說曰九類眾生一身具足隨造隨成是故無明為卵生煩惱包裹為胎生愛水浸潤為濕生歘起煩惱為化生悟即是佛迷號眾生菩薩只以念念心為眾生若了念念心體俱空名度眾生也智者於自本際上度於未形未形俱空即知實無眾生得滅度者道光座主問曰禪師用何心修道師曰老僧無心可用無道可修曰既無心可用無道可修云何每日聚眾勸人學禪修道師曰老僧尚無卓錐之地甚麼處聚眾來老僧尚無舌何曾勸人來曰禪師對面妄語師曰老僧尚無舌勸人焉解妄語曰某甲却不會禪師語論也師曰老僧自亦不會講止觀座主問禪師辨得魔否師曰起心是天魔不起心是陰魔或起不起是煩惱魔我正法中無如是事曰一心三觀義又如何師曰過去心已過去未來心未至現在心無住於其中間更用何心起觀曰禪師不解止觀師曰座主解否曰解師曰如智者大師說止破止說觀破觀住止沒生死住觀心神亂且為當將心止心為復起心觀觀若有心觀是常見法若無心觀是斷見法亦有亦無成二見法請座主子細說看曰若如是問俱說不得也師曰何曾止觀維摩座主問經云諸菩薩各入不二法門維摩默然是究竟否師曰未是究竟聖意若盡第三卷更說何事座主良久曰請禪師為說未究竟之意師曰如經第一卷是引眾呵十大弟子住心第二諸菩薩各說入不二法門以言顯於無言文殊以無言顯於無言維摩不以言不以無言故默然收前言語故第三卷從默然起說又顯神通作用座主會麼曰奇怪如是師曰亦未如是曰何故未是師曰且破人執情作如此說若據經意只說色心空寂令見本性教捨偽行入真行莫向言語紙墨上討意度但會淨名兩字便得淨者本體也名者跡用也從本體起跡用從跡用歸本體體用不二本跡非殊所以古人道本跡雖殊不思議一也一亦非一若識淨名兩字假號更說甚麼究竟與不究竟無前無後非本非末非淨非名只示眾生本性不思議解脫若不見性人終身不見此理講華嚴座主問禪師信無情是佛否師曰不信若無情是佛者活人應不如死人死驢死狗亦應勝於活人經云佛身者即法身也從定戒慧生從三明六通生從一切善法生若說無情是佛者大德如今便死應作佛去入井救人問佛法在於三際否師曰現在無相不在其外應用無窮不在於內中間無住處三際不可得曰此言大混師曰汝正說混之一字時在內外否曰弟子究檢內外無蹤跡師曰若無蹤跡明知上來語不混曰如何得作佛師曰是心是佛是心作佛曰眾生入地獄佛性入否師曰如今正作惡時更有善否曰無師曰眾生入地獄佛性亦如是張湯兒時詰鼠案三藏法師問真如有變易否師曰有變易藏曰禪師錯也師却問三藏有真如否曰有師曰若無變易決定是凡僧也豈不聞善知識者能回三毒為三聚淨戒回六識為六神通回煩惱作菩提回無明為大智真如若無變易三藏真是自然外道也藏曰若爾者真如即有變易也師曰若執真如有變易亦是外道曰禪師適來說真如有變易如今又道不變易如何即是的當師曰若了了見性者如摩尼珠現色說變亦得說不變亦得若不見性人聞說真如變易便作變易解會說不變易便作不變易解會藏曰固知南宗實不可測問三教同異師曰大量者用之即同小機者執之即異總從一性上起用機見差別成三迷悟由人不在教之同異也杉山智堅禪師初與歸宗南泉行脚時路逢一虎各從虎邊過了泉問歸宗適來見虎似個甚麼宗曰似個猫兒宗却問師師曰似個狗子又問南泉泉曰我見是個大蟲大溈智云三個老漢聚頭寐語若要徹一時參取這大蟲始得師喫飯次南泉收生飯乃曰生聻師曰無生泉曰無生猶是末泉行數步師召曰長老泉回頭曰作麼師曰莫道是末普請擇蕨次南泉拈起一莖曰這個大好供養師曰非但這個百味珍羞他亦不顧泉曰雖然如是個個須甞過始得翠巖芝云只如杉山與麼道還有免得麼若免得去未具眼在若免不得又違前話水潦和尚問馬祖如何是西來的的意祖乃當胸踏倒師大悟起來拊掌呵呵大笑云也大奇也大奇百千三昧無量妙義只向一毛頭上一時識得根源去乃作禮而退師後告眾云自從一喫馬祖踏直至如今笑不休蔣山泉云忽然瞥地更是好笑澧州茗溪道行禪師甞曰吾有大病非世所醫後僧問曹山古人曰吾有大病非世所醫是甚麼病山曰攢簇不得底病曰一切眾生還有此病也無山曰人人盡有曰和尚還有此病也無山曰正覓起處不得曰一切眾生為甚麼不病山曰一切眾生若病即非眾生曰未審諸佛還有此病也無山曰有曰既有為甚麼不病山曰為伊惺惺撫州石鞏慧藏禪師本以弋獵為務惡見沙門因逐鹿從馬祖菴前過祖乃逆之師遂問還見鹿過否祖曰汝是何人曰獵者祖曰汝解射否曰解射祖曰汝一箭射幾個曰一箭射一個祖曰汝不解射曰和尚解射否祖曰解射曰一箭射幾個祖曰一箭射一羣曰彼此生命何用射他一羣祖曰汝既知如是何不自射曰若教某甲自射直是無下手處祖曰這漢曠劫無明煩惱今日頓息師擲下弓投祖出家雪竇顯云馬師一箭一羣信彩射得有甚用處不如石鞏一箭一個却是好手雪竇今日效古人之作擬放一箭高聲唱曰看箭又云中也翠巖芝云馬祖一箭一羣猶未善在山僧一箭射蠢動含靈無不中者雖然如是只道得一半更有一半留與諸上座道一日在厨作務次祖問作甚麼曰牧牛祖曰作麼生牧曰一回入草去驀鼻拽將回祖曰子真牧牛師便休師住後常以弓箭接機載三平章問西堂汝還解捉得虗空麼堂曰捉得師曰作麼生捉堂以手撮虗空師曰汝不解捉堂却問師兄作麼生捉師把西堂鼻孔拽堂作忍痛聲曰太煞拽人鼻孔直欲脫去師曰直須恁麼捉虗空始得袁州南源道明禪師洞山參方上法堂師曰已相見了也山便下去明日却上問曰昨日已蒙和尚慈悲不知甚麼處是與某甲已相見處師云心心無間斷流入於性海山曰幾合放過中邑洪恩禪師仰山問如何得見佛性義師曰我與汝說個譬喻如一室有六牕內有一獼猴外有獼猴從東邊喚猩猩猩猩即應如是六牕俱喚俱應仰山禮謝起曰適蒙和尚譬喻無不了知更有一事祇如內獼猴睡著外獼猴欲與相見又且如何師下繩牀執仰山手作舞曰猩猩與汝相見了譬如蟭螟蟲在蚊子眼睫上作窠向十字街頭呌云土曠人稀相逢者少雲居錫云中邑當時若不得仰山這一句何處有中邑也信相宗顯禪師舉至與汝相見了也曰諸人要見二老麼我也與你說個譬喻中邑大似個金師仰山將一塊金來使金師酬價金師亦盡價相酬臨成交易賣金底更與貼秤金師雖然暗喜未免心中偷疑何故若非細作定是賊贓潭州三角山總印禪師示眾曰凡說法須用應時應節時有僧出問曰四黃四赤時如何師曰三月杖頭挑曰為甚麼滿肚皮貯氣師曰爭奈一條繩何曰如何得出氣去師曰直待皮穿僧問如何是三寶師曰禾麥豆曰學人不會師曰大眾欣然奉持又示眾云若論此事眨上眉毛早已蹉過了也時麻谷出問眨上眉毛即不問如何是此事師云蹉過也谷乃掀禪牀師便打雪竇顯云兩個有頭無尾漢眉毛未曾眨上說甚麼此事蹉過尋有僧問眉毛為甚不眨上竇便打長慶代云悄然妙喜拈曰蹉過麻谷也不知汾州無業禪師謁馬祖祖覩狀貌奇偉語音如鐘乃曰巍巍堂堂其中無佛師禮跪而問曰三乘文學粗窮其旨常聞禪門即心是佛實未能了祖曰祇未了底心即是更無別物師曰如何是祖師西來密傳心印祖曰大德正閙在且去別時來師纔出祖召曰大德師回首祖曰是甚麼師便領悟乃禮拜祖曰這鈍漢禮拜作麼雲居錫云甚麼處是汾州正閙高僧傳云馬祖謂師曰只未了底心即是更無別物不了時即是迷若了即是悟迷即眾生悟即是佛道不離眾生豈更有別佛亦猶手作拳拳全手也師言下豁然開悟涕淚悲泣向大寂曰本謂佛道長遠勤苦曠劫方始得成今日始知法身實相本自具足一切萬法從心所生但有名字無有實者大寂曰如是如是一切法性不生不滅一切諸法本自空寂經云諸法從本來常自寂滅相又云畢竟空寂舍又云諸法空為座此即諸佛如來住此無所住處若如是知即住空寂舍坐法空座舉足下足不離道場言下便了更無漸次所謂不動足而登涅槃山者也贊公述此不知其所自來中不載正閙語尤不可曉姑附錄廣聞見師既住後學者致問多答之曰莫妄想擊節錄舉僧問汾州無業國師如何是佛國師云莫妄想雪竇拈云塞却鼻孔僧又問如何是佛國師云即心是佛雪竇拈云拄却舌頭圜悟云正當恁麼時舌頭又拄却鼻孔又塞却還有轉身吐氣處也無便打師曰諸佛不曾出世亦無一法與人但隨病施方遂有十二分教如將蜜果換苦葫蘆淘汝諸人業根又云他古德道人得意之後茅茨石室向折脚鐺中煑飯喫過三二十年名利不干懷財寶不為念大忘人世隱跡巖叢君王命而不來諸侯請而不赴豈同我輩貪名愛利汩沒世塗如短販人又云學般若菩薩不得自謾如氷稜上行似劒刃上走臨終之時一毫凡情聖量不盡纖塵思念未忘隨念受生輕重五陰向驢胎馬腹裏託質泥犁鑊湯裏煑煠一徧了從前記持憶想見解智慧都盧一時失却依前再為螻蟻從頭又作蚊䖟雖是善因而遭惡果且圖甚麼兄弟只為貪欲成性二十五有向脚跟下繫著無成辦之期祖師觀此土眾生有大乘根性惟傳心印指示迷情得之者即不揀凡之與聖愚之與智且多虗不如少實大丈夫兒如今直下便休歇去頓息萬緣越生死流迥出常格靈光獨照物累不拘巍巍堂堂三界獨步何必身長丈六紫磨金輝項佩圓光廣長舌相若以色見我是行邪道設有眷屬莊嚴不求自得山河大地不礙眼光得大總持一聞千悟都不希求一餐之直汝等諸人倘不如是祖師來至此土非常有損有益有益者百千人中撈漉一個半個堪為法器有損者如前已明從他依三乘教法修行不妨却得四果三賢有進修之分所以先德云了即業障本來空未了還須償宿債唐憲宗屢召師皆辭疾不赴暨穆宗即位思一瞻禮乃命兩街僧錄靈阜等齎詔迎請至彼作禮曰皇上此度恩旨不同常時願和尚且順天心不可言疾也師微笑曰貧道何德累煩聖主且請前行吾從別道去矣乃澡身剃髮至中夜告弟子惠愔等曰汝等見聞覺知之性與太虗同壽不生不滅一切境界本自空寂無一法可得迷者不了即為境惑一為境惑流轉不窮汝等當知心性本自有之非因造作猶如金剛不可破壞一切諸法如影如響無有實者經云惟此一事實餘二則非真常了一切空無一物當情是諸佛用心處汝等勤而行之言訖跏趺而逝茶毗日祥雲五色異香四徹所獲舍利璨若珠玉信州鵞湖大義禪師唐憲宗詔入麟德殿論義有法師問如何是四諦師曰聖上一帝三帝何在法師無語又問欲界無禪禪居色界此土憑何而立禪師曰法師祇知欲界無禪不知禪界無欲曰如何是禪師以手點空法師又無對帝曰法師講無窮經論祇這一點尚不奈何師却問諸碩德曰行住坐臥畢竟以何為道有對知者是道師曰不可以智知不可以識識安得知者是乎有對無分別者是師曰善能分別諸法相於第一義而不動安得無分別是乎有對四禪八定是師曰佛身無為不墮諸數安在四禪八定耶眾皆杜口妙喜曰相罵饒你接嘴相唾饒你潑水師却舉順宗問尸利禪師大地眾生如何得見性成佛利曰佛性猶如水中月可見不可取因謂帝曰佛性非見必見水中月如何攫取帝乃問何者是佛性師對曰不離陛下所問帝默契有僧乞置塔李翱尚書問曰教中不許將尸塔下過又作麼生僧無對却特詣師舉前語請答師曰他得大闡提京兆興善惟寬禪師僧問狗子還有佛性否師曰有曰和尚還有否師曰我無曰一切眾生皆有佛性和尚因何獨無師曰我非一切眾生曰既非眾生莫是佛否師曰不是佛曰究竟是何物師曰亦不是物曰可見可思否師曰思之不及議之不得故曰不可思議問道在何處師曰祇在目前曰我何不見師曰汝有我故所以不見曰我有我故即不見和尚還見否師曰有汝有我展轉不見曰無我無汝還見否師曰無汝無我阿誰求見常州芙蓉太毓禪師因行食到龐居士前士擬接師乃縮手曰生心受施淨名早訶去此一機居士還甘否士曰當時善現豈不作家師曰非關他事士曰食到口邊被他奪却師乃下食士曰不消一句昭覺勤云善現作家芙蓉奇特盡被龐居士一時領過了也只如居士道不消一句且道是那一句端坐受供養施主蒙安樂利山和尚僧問眾色歸空空歸何所師曰舌頭不出口曰為甚麼不出口師曰內外一如故松山和尚同龐居士喫茶士舉槖子曰人人盡有分為甚麼道不得師曰祇為人人盡有所以道不得士曰阿兄為甚麼却道得師曰不可無言也士曰灼然灼然師便喫茶士曰阿兄喫茶為甚麼不揖客師曰誰士曰龐公師曰何須更揖後丹霞聞乃曰若不是松山幾被個老翁惑亂一上士聞之乃令人傳語霞曰何不會取未舉槖子時矢上加尖旁觀嘔噦唐州紫玉山道通禪師于頔相公問如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔客作漢問恁麼事作麼于公失色師乃指曰這個便是漂墮羅剎鬼國公又問如何是佛師喚相公公應諾師曰更莫別求藥山聞曰噫可惜于家漢生埋向紫玉山中公聞乃謁見藥山山問曰聞相公在紫玉山中大作佛事是否公曰不敢乃曰承聞有語相救今日特來山曰有疑但問公曰如何是佛山召于頔公應諾山曰是甚麼公于此有省昭慶共羅山舉次慶云藥山一等是道甚是奇特雲泥有隔羅山云大師也不得草草當時賴遇于相公可中草窠裏若撥著個焦尾大蟲何處有藥山也慶云作麼生羅山云還知于相是煅了金麼五臺山隱峰禪師鄧氏子屢參馬祖石頭法席後於馬祖言下相契師問石頭如何得合道去頭曰我亦不合道師曰畢竟如何頭曰汝被這個得多少時耶石頭剗草次師在左側叉手而立頭飛剗子向師前剗一株草師曰和尚祇剗得這個不剗得那個頭提起剗子師接得便作剗草勢頭曰汝祇剗得那個不解剗得這個師無對洞山云還有堆阜麼師推車次馬祖展脚在路上坐師曰請師收足祖曰已展不縮師曰已進不退乃推車碾損祖脚祖歸法堂執斧子曰適來碾損老僧脚底出來師便出於祖前引頸祖乃置斧到南泉值眾參次泉指淨瓶曰銅瓶是境瓶中有水不得動著境與老僧將水來師拈起淨瓶向泉面前瀉泉便休到溈山便入堂於上板頭解放衣鉢溈聞師叔到先具威儀下堂內相看師見來便作臥勢溈便歸方丈師乃發去少間溈山問侍者師叔在否曰已去溈曰去時有甚麼語曰無語溈曰莫道無語其聲如雷師在襄州破威儀堂只著襯衣於砧椎邊拈椎云道得即不打於時大眾默然師便打一下法眼益云鄧隱峯奇怪甚奇怪要且不打著又云其時一眾出自偶然翠巖芝云此語有勘破處且道勘破阿誰去雪竇云果然果然師冬居衡嶽夏止清凉唐元和中薦登五臺路出淮西屬吳元濟阻兵違拒王命官軍與賊軍交鋒未決勝負師曰吾當去解其患乃擲錫空中飛身而過兩軍將士仰觀事符預夢鬪心頓息師既顯神異慮成惑眾遂入五臺於金剛窟前將示滅先問眾曰諸方遷化坐去臥去吾甞見之還有立化也無曰有師曰還有倒立者否曰未甞見有師乃倒立而化亭亭然其衣順體時眾議舁就茶毗屹然不動遠近瞻覩驚歎無已師有妹為尼時亦在彼乃拊而咄曰老兄疇昔不循法律死更熒惑於人於是以手推之僨然而踣遂就闍維收舍利建塔龜洋無了禪師甞有虎逐鹿入菴師以杖格虎鹿得脫去將示化述偈曰八十年來辨西東如今不要白頭翁非長非短非大小還與諸人色相同無來無去兼無住了却本來自性空偈畢儼然告寂瘞於正堂垂二十載為山泉淹沒門人發塔見全身水中而浮閩王聞之遣使舁入府庭供養忽臭氣遠聞王焚香祝之曰可還龜洋舊址建塔言訖異香普薰傾城瞻禮遂塔於龜洋隱峯無了皆於化後假四大說法南嶽西園曇藏禪師一日自燒浴次僧問何不使沙彌師撫掌三下僧舉似曹山山云一等是拍手撫掌就中西園奇怪俱胝一指頭禪盖為承當處不諦當僧却問曹山西園撫掌豈不是奴兒婢子邊事山云是云向上更有事也無山云有云如何是向上事山叱云這奴兒婢子東厨有一大蠎長數丈張口呀氣毒𦦨熾然侍者請避之師曰死可逃乎彼以毒來我以慈受毒無實性激發則強慈苟無緣冤親一揆言訖其蠎按首徐行倐然不見磁州馬頭峰神藏禪師上堂知而無知不是無知而說無知便下座南泉云恁麼依師道始道得一半黃檗云不是南泉駁他要圓前話中菴空頌云從頭數到一二三倒數却成三二一直饒會盡大衍筭掐指巡文數不出幻寄曰大小諸祖師俱說不了話若問如何是了話咄潭州華林善覺禪師常持錫杖夜出林麓間七步一振錫一稱觀音名號夾山問遠聞和尚念觀音是否師曰然山曰騎却頭時如何師曰出頭即從汝騎不出頭騎甚麼山無對僧參方展坐具師曰緩緩曰和尚見甚麼師曰可惜許磕破鐘樓其僧從此悟入觀察使裴休訪之問曰還有侍者否師曰有一兩個祇是不可見客裴曰在甚麼處師乃喚大空小空時二虎自菴後而出裴覩之驚悸師語虎曰有客且去二虎哮吼而去裴問曰師作何行業感得如斯師乃良久曰會麼曰不會師曰山僧常念觀世音空音湛頌云僧來展具已輸籌常念觀音獨不休雕虎風生君未會可憐空磕破鐘樓烏臼和尚玄紹二上座參師乃問二禪客發足甚麼處玄曰江西師便打玄曰久知和尚有此機要師曰汝既不會後面個師僧祇對看紹擬近前師便打曰信知同坑無異土參堂去雪竇顯云宗師眼目須是恁麼如金翅鳥擘海直取龍吞有般漢眼目未辨東西拄杖不知顛倒只管說照用同時人境俱奪圜悟云雪竇明辨古今分別邪正若不知有爭恁麼道雖然只見烏臼放行要明烏臼把住處麼直得釋迦彌勒猶為走使據令而行盡大地人竝須喫棒問僧近離甚處曰定州師曰定州法道何似這裏曰不別師曰若不別更轉彼中去便打僧曰棒頭有眼不得草草打人師曰今日打著一個也又打三下僧便出去師曰屈棒元來有人喫在曰爭奈杓柄在和尚手裏師曰汝若要山僧回與汝僧近前奪棒打師三下師曰屈棒屈棒曰有人喫在師曰草草打著個漢僧禮拜師曰却與麼去也僧大笑而出師曰消得恁麼消得恁麼佛性泰頌相見不虗圖分明付與渠汝醉我扶起我倒汝還扶交互為賓主相將入帝都高歌大笑九衢裏天上人間我與爾雪竇頌呼即易遣還難互換機鋒子細看劫石固來猶可壞滄溟深處立須乾烏臼老烏臼老幾何般與他杓柄太無端幻寄曰多少人在雪竇頌上敲磚打瓦不知雪竇命脉在烏臼棒頭上石臼和尚初參馬祖祖問甚麼處來師曰烏臼來祖曰烏臼近日有何言句師曰幾人於此茫然祖曰茫然且置悄然一句作麼生師乃近前三步祖曰我有七棒寄打烏臼你還甘否師曰和尚先喫某甲後甘鎮州金牛和尚每自做飯供養眾僧至齋時舁飯桶到堂前作舞呵呵大笑曰菩薩子喫飯來長慶稜云大似因齋慶讚大光誨因僧問云長慶道因齋慶讚意旨如何光乃作舞僧禮拜光云見甚道理便禮拜僧却作舞光云這野狐精雪竇顯云雖然如是金牛不是好心圜悟勤云且道大光云這野狐精與藏頭白海頭黑是同是別這漆桶又道好師僧且道是同是別雪竇顯頌前箭猶輕後箭深誰云黃葉是黃金曹溪波浪如相似無限平人被陸沉亮座主蜀人也頗講經論因參馬祖祖問見說座主大講得經論是否師曰不敢祖曰將甚麼講師曰將心講祖曰心如工伎兒意如和伎者爭解講得師抗聲曰心既講不得虗空莫講得麼祖曰却是虗空講得師不肯便出將下堦祖召曰座主師回首祖曰是甚麼師豁然大悟便禮拜祖曰這鈍根阿師禮拜作麼師曰某甲所講經論將謂無人及得今日被大師一問平生功業一時氷釋禮謝而退乃隱於洪州西山更無消息僧問真淨如何是道真淨曰寶公云若欲將心求佛道問取虗空始出塵汝今求佛道虗空向汝道甚麼其僧於是大悟於言下妙喜曰如今講人纔聞宗師說却是虗空講得便向虗空裏東撈西摸百靈和尚一日與龐居士路次相逢問曰南嶽得力句還曾舉向人也無士曰曾舉來師曰舉向甚麼人士以手自指曰龐公師曰直是妙德空生也讚歎不及士却問阿師得力句是誰得知師戴笠子便行士曰善為道路師更不回首徑山杲云這個話端若不是龐公幾乎錯舉似人雖然如是百靈輸他龐老一著何故當時若不得個破笠頭遮却髑髏有甚面目見他龐公則川和尚摘茶次龐蘊曰法界不容身師還見我否師曰不是老師洎答公話士曰有問有答盖是尋常師乃摘茶不聽士曰莫怪適來容易借問師亦不顧士喝曰這無禮儀老漢待我一一舉向明眼人師乃拋却茶籃便歸方丈雪竇曰則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士一日在方丈內坐士來見乃曰只知端居丈室不覺僧到參時師垂下一足士便出行三兩步却回師乃收足士曰可謂自由自在師曰我是主士曰阿師只知有主不知有客師喚侍者點茶士作舞而出達磨一宗掃地盡矣忻州打地和尚自江西領旨常晦其名凡學者致問唯以棒打地示之時謂之打地和尚一曰被僧藏却棒然後致問師但張其口僧問門人曰祇如和尚每日有人問便打地意旨如何門人即於竈內取柴一片擲置釜中妙喜曰養子不及父家門一世衰潭州秀溪和尚谷山問聲色純真如何是道師曰亂道作麼山却從東過西立師曰若不恁麼即禍事也山又從西過東立師乃下禪牀方行兩步被谷山捉住曰聲色純真事作麼生師便打一掌山曰三十年後要個人下茶也無在師曰要谷山這漢做甚麼山呵呵大笑江西樹和尚臥次道吾近前牽被覆之師曰作麼吾曰盖覆師曰臥底是坐底是吾曰不在這兩處師曰爭奈盖覆何吾曰莫亂道浮盃和尚凌行婆來禮拜師與坐喫茶婆乃問盡力道不得底句分付阿誰師曰浮盃無剩語婆曰未到浮盃不妨疑著師曰別有長處不妨拈出婆斂手哭曰蒼天中更添冤苦師無語婆曰語不知偏正理不識倒邪為人即禍生後有僧舉似南泉泉曰苦哉浮盃被這老婆摧折一上婆後聞笑曰王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關在婆乃哭曰可悲可痛一罔措婆曰會麼一合掌而立婆曰伎死禪和如麻似粟一舉似趙州州曰我若見這臭老婆問教口瘂一曰未審和尚怎生問他州便打一曰為甚麼却打某甲州曰似這伎死漢不打更待幾時連打數棒婆聞却曰趙州合喫婆手裏棒後僧舉似趙州州哭曰可悲可痛婆聞此語合掌歎曰趙州眼光爍破四天下州令僧問如何是趙州眼婆乃竪起拳頭僧回舉似趙州州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機潭州龍山和尚洞山與密師伯行脚見溪流菜葉洞曰深山無人因何有菜隨流莫有道人居否乃相與撥草溪行五七里間忽見師羸形異貌放下行李問訊師曰此山無路闍黎從何處來洞曰無路且置和尚從何而入師曰我不從雲水來洞曰和尚住此山多少時耶師曰春秋不涉洞曰和尚先住此山先住師曰不知洞曰為甚麼不知師曰我不從人天來洞曰和尚得何道理便住此山師曰我見兩個泥牛鬪入海直至於今絕消息洞山始具威儀禮拜便問如何是主中賓師曰青山覆白雲曰如何是賓中主師曰長年不出戶曰賓主相去幾何師曰長江水上波曰賓主相見有何言說師曰清風拂白月洞山辭退師乃述偈曰三間茅屋從來住一道神光萬境閑莫把是非來辨我浮生穿鑿不相關又曰一池荷葉衣無數滿地松花食有餘剛被世人知住處又移茅屋入深居因燒菴不知所如故人亦稱隱山和尚濛溪和尚問僧甚處來僧云定州來師曰定州近日有甚奇特事僧曰某甲旦過但聞鹽貴米賤苦無奇特事師曰我這裏也只如此粗粥淡飯與僧別無奇特事你又來這裏覓個甚麼僧曰某甲不會乞師慈悲師曰賴你不會若會我即輸汝一半道理首座晚間上問曰和尚適來勘僧為甚麼道輸汝一半道理師云賴得汝舉老僧洎合忘却首座曰請和尚為某甲說師曰你即忘前失後我又失後忘前座方去師喚轉曰却不得舉著近日師僧但說鹽貴米賤竝不將佛法為事頻頻舉著喪却你性命不難襄州居士龐蘊者衡州衡陽縣人也字道玄世本儒業少悟塵勞志求真諦唐貞元初謁石頭乃問不與萬法為侶者是甚麼人頭以手掩其口豁然有省後與丹霞為友一日石頭問曰見老僧以來日用事作麼生士曰若問日用事即無開口處乃呈偈曰日用事無別惟吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絕點埃神通并妙用運水及搬柴頭然之曰子以緇耶素耶士曰願從所慕遂不剃染後參馬祖問曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道士於言下頓領玄旨大慧語錄云士初謁馬祖問如水無筋骨能勝萬斛舟時如何祖曰我這裏無水亦無舟說甚麼筋骨士於言下頓息諸緣遂向南嶽見石頭云云與此少異至藥山山命十禪客相送至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放你在全曰居士作麼生士又掌曰眼見如盲口說如瘂士見丹霞霞作走勢士曰猶是拋身勢作麼生是嚬呻勢霞便坐士以拄杖劃地作七字霞於下劃個一字士曰因七見一見一忘七霞便起去士曰更坐少時猶有第二句在霞曰向這裏著語得麼士遂哭出去或作士以拄杖畫地作七字於下畫個一字曰因七見一見一忘七霞便起去偈心如境亦如無實亦無虗有亦不管無亦不拘不是聖賢了事凡夫易復易即此五蘊有真智十方世界一乘同無相法身豈有二若捨煩惱入菩提不知何方有佛地又護生須是殺殺盡始安居會得個中意鐵船水上浮圜悟舉此偈云且道殺個甚麼殺眾生物命凡夫見解殺六賊煩惱座主見解殺佛殺祖大闡提人見解衲僧分上畢竟殺個甚麼試定當看僧問未審殺個甚麼師曰大有人疑著曰學人到這裏直得步步絕行蹤時如何悟曰未有金剛王寶劍在圜悟又云只如護生須用殺且道殺個甚麼便有禪和子道不是殺物命只是殺無明賊殺煩惱賊殺六根六塵賊殺爭人爭我賊雖然一期也似要且未夢見衲僧脚跟頭既是護生須是明殺意如何是殺意嶮若向個裏辨得出便可放一線道浩浩之中管取坐斷天下人舌頭然後始殺得盡然雖如是釋迦老子也殺不盡迦葉也殺不盡西天二十八祖也殺不盡唐土六祖也殺不盡要明不盡底須是放却從前已後見解明暗玄妙理性殊勝奇特潔淨剗除不留毫末也不到極盡處只如正盡處合作麼生還委悉麼深山大澤無人到聚頭正好共商量中峰本云莫是殺人與護生一念平等麼恁麼商量瞎人眼目士悟後以舟盡載珍槖數萬沉之湘流舉室修行有女名靈照常鬻竹漉篱以供朝夕有偈曰有男不婚有女不嫁大家團欒頭共說無生話徑山杲示羅快然云昔龐居士有言有男不婚有女不嫁大家團欒頭共說無生話後來元豐間有個士人謂之無為居士姓楊名傑字次公甞參前輩於宗門中有真實得力處曾和龐公此偈云男大須婚女大須嫁討甚閑工夫更說無生話者兩個俗漢子將他十方常住一片田地不向官中印契各自分疆列界道我知有而時時向無佛處稱尊當時亦有個不平底謂之海印信禪師時住蘇州定慧因見無為此偈亦有一偈曰我無男婚我無女嫁困來便打眠誰管無生話這三個老漢說此三偈快然居士開眼也著合眼也著不開不合也著妙喜只得冷地看看即不無畢竟快然居士向開眼處著到耶合眼處著到耶不開不合處著到耶若向開眼處著到則落在龐公圈䙡裏若合眼處著到則落在楊無為圈䙡裏在不開不合處著到則落在海印禪師圈䙡裏快然見恁麼說定道總不恁麼若總不恁麼又落在妙喜圈䙡裏要出三老圈䙡則易要出妙喜圈䙡則難快然畢竟如何出得待歸延平嫁了女却緩緩地來為你說破龐婆入鹿門寺作齋維那請疏意回向婆拈梳子插向髻後曰回向了也便出去士一日菴中獨坐驀地云難難十石油麻樹上攤龐婆接聲云易易百草頭上祖師意靈照云也不難也不易饑來喫飯困來睡妙喜曰此三人同行不同步同得不同失若以心意識博量卜度非獨不見三人落著處十二時中亦自昧却本地風光不見本來面目未免被難易不難易牽挽不得自在欲得自在將此三人道底作一句看妙喜已是拖泥帶水下注脚了也士坐次問靈照曰古人道明明百草頭明明祖師意作麼生照曰老老大大作這個語話士曰你作麼生照曰明明百草頭明明祖師意士乃笑徑山杲云龐居士先行不到靈照女末後太過直饒齊行齊到若到雲門一坑埋却且道過在甚麼處明明百草頭明明祖師意士賣竹漉篱下橋喫撲靈照見亦去爺邊倒士曰你作甚麼照曰見爺倒地某甲相扶士曰賴是無人見士將入滅謂靈照曰視日早晚及午以報照遽報日已中矣而有蝕也士出戶觀次靈照即登父座合掌坐亡士笑曰我女鋒捷矣於是更延七日州牧于公頔問疾次士謂之曰但願空諸所有慎勿實諸所無好去世間皆如影響言訖枕于公膝而化遺命焚棄江湖士語錄載無名子序焚棄江湖下復云旋遣使人報諸妻子妻聞之曰這愚癡女與無知老漢不報而去是何忍也因往告子見斸畬曰龐公與靈照去也子釋鉏應之曰嗄良久亦立而亡去母曰愚子癡一何甚也亦以焚化眾皆奇之未幾其妻乃徧詣鄉閭告別歸隱自後沉跡敻然莫有知其所歸者其事更奇卓并志之此澧州藥山惟儼禪師絳州韓氏子年十七出家納戒衡嶽博通經論嚴持戒律一日歎曰大丈夫當離法自淨誰能屑屑事細行於布巾耶首造石頭之室便問三乘十二分教某甲粗知甞聞南方直指人心見性成佛實未明了伏望和尚慈悲指示頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生師罔措頭曰子因緣不在此且往馬大師處去師稟命恭禮馬祖仍伸前問祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生師於言下契悟便禮拜頭曰你見甚麼道理便禮拜師曰某甲在石祖處如蚊子上鐵牛祖曰汝既如是善自護持法雲秀云石頭有個無孔鐵椎大似分付不著藥山雖過江西悟去爭奈平地上喫交有甚麼扶策處具眼者試辨看五祖演云老僧在眾日聞兄弟每商量道即心即佛也不得不即心即佛也不得若恁麼說話敢稱禪客殊不知古人文武兼備韜略雙全山僧見處也要諸人共知只見波濤湧不見海龍宮徑山杲云好個話端阿誰會舉舉得十分未敢相許侍奉三年一日祖問子近日見處作麼生師曰皮膚脫落盡惟有一真實祖曰子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去師曰某甲又是何人敢言住山祖曰不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此師乃辭祖返石頭一日在石上坐次石頭問曰汝在這裏作麼曰一物不為頭曰恁麼即閒坐也曰若閒坐即為也頭曰汝道不為不為個甚麼曰千聖亦不識頭以偈讚曰從來共住不知名任運相將祇麼行自古上賢猶不識造次凡流豈可明妙喜曰物是實價錢是足陌石頭垂語曰言語動用沒交涉師曰非言語動用亦沒交涉頭曰我這裏針劄不入師曰我這裏如石上栽花頭然之住藥山後海眾四集遵布衲浴佛師曰這個從汝浴還浴得那個麼遵曰把將那個來師乃休長慶云邪法難扶玄覺云且道長慶恁麼道在賓在主眾中喚作浴佛語亦曰兼帶語且道盡善不盡善黃龍南禪師住同安日示眾云今朝四月八我佛降生之日天下精藍皆悉浴佛記得舉浴佛公案云云大眾古人隨時一言半句亦無巧妙今人用盡心力安排終不到他境界眾中商量或有道這個是銅像那個是法身銅像有形可以洗滌法身無相如何洗得藥山只知其一不知其二被遵公靠倒直得口似匾擔不勝懡㦬又云古德垂問只要驗人問汝那個便道把將那個來正是隨聲逐色齩他言句上他圈䙡藥山見伊不會所以便休又道藥山恁麼來早是無事生事好肉上剜瘡遵公不見來病却向灸瘡瘢上更著艾爝有云古人得了逢場作戲無可不可何高何低彼此知有自是後人強生分別如前所解蓋不遇人一失其源迷而不復所以只憑識心思量計較以當宗乘殊不知有作思惟從有心起用此思惟辨於佛境如取螢火燒須彌山縱經塵劫終不能著是故行脚高人切須自看從上來事合作麼生畢竟將何敵他生死勿以少許粗浮識見自作障礙佛法不是這個道理同安今日不避口業與汝諸人說破此二尊宿一出一入未見輸贏三十年後不得錯舉幻寄曰同安且須自檢一出一入未見輸贏何異他逢場作戲何高何低三十年後求錯舉者便是幻寄坐次道吾雲巖侍立師指按山上枯榮二樹問道吾曰枯者是榮者是吾曰榮者是師曰灼然一切處光明燦爛去又問雲巖枯者是榮者是巖曰枯者是師曰灼然一切處放教枯澹去高沙彌忽至師曰枯者是榮者是彌曰枯者從他枯榮者從他榮師顧道吾雲巖曰不是不是草堂清頌云雲巖寂寂無窠臼燦爛宗風是道吾深信高禪知此意閒行閒坐任榮枯院主報打鐘也請和尚上堂師曰汝與我擎鉢盂去曰和尚無手來多少時師曰汝祇是枉披袈裟曰某甲祇恁麼和尚如何師曰我無這個眷屬謂雲巖曰與我喚沙彌來巖曰喚他來作甚麼師曰我有個折脚鐺子要他提上挈下巖曰恁麼則與和尚出一隻手去也師便休園頭栽菜次師曰栽即不障汝栽莫教根生曰既不教根生大眾喫甚麼師曰汝還有口麼頭無對問平田淺草麈鹿成羣如何射得麈中主師曰看箭僧放身便倒師曰侍者拖出這死漢僧便走師曰弄泥團漢有甚麼限雪竇顯拈云這僧三步雖活五步須死復頌云麈中主君看取下一箭走三步五步若活成羣趁虎正眼從來付獵人復高聲云看箭看經次僧問和尚尋常不許人看經為甚麼却自看師曰我祇圖遮眼曰某甲學和尚還得也無師曰你若看牛皮也須穿長慶云眼有何過玄覺云且道長慶會藥山意不會藥山意汾陽昭頌徹底更何疑穿會者稀叮嚀由付囑句句是玄機師看經次柏巖云和尚休猱人得也師捲却經云日頭早晚巖云正當午也師云猶有這文彩在巖云某甲無亦無師云汝太煞聰明巖云某甲只恁麼和尚尊意如何師云我跛跛挈挈百醜千拙且恁麼過師與道吾說茗溪上世為節察來吾曰和尚上世曾為甚麼師曰我痿痿羸羸且恁麼過時曰憑何如此師曰我不曾展他書卷師晚參云我有一句子待特牛生兒即向汝道時有僧便出云特牛生兒也祇是和尚不道師喚侍者將燈來其僧便抽身入眾洞山价云這僧會只是不肯禮拜投子青云且道甚處是這僧會底道理若道得可為這僧雪屈若道不得却被藥山瞞昭覺勤云夾山即不然有一句子威音已前道與諸人了或有問明頭合暗頭合只向伊道龍遇水時添意氣虎逢山色長威獰師問龐居士一乘中還著得這個事麼士曰某甲祇管日求升合不知還著得麼師曰道居士不見石頭得麼士曰拈一放一未為好手師曰老僧住持事繁士珍重便出師曰拈一放一的是好手士曰好個一乘問宗今日失却也師曰是是師因僧問學人有疑請師決師曰待上堂時來與闍黎決疑至晚上堂眾集師曰今日請決疑上座在甚麼處其僧出眾而立師下禪牀把住曰大眾這僧有疑便與一推却歸方丈問飯頭汝在此多少時也曰三年師曰我總不識汝飯頭罔測發憤而去問僧年多少也僧云七十二也師云是年七十二那僧云是師便打師坐次僧問兀兀地思量甚麼師曰思量個不思量底曰不思量底如何思量師曰非思量問己事未明乞和尚指示師良久曰吾今為汝道一句亦不難祇宜汝於言下便見去猶較些子若更入思量却成吾罪過不如且各合口免相累及師令供養主抄化甘贄行者問甚處來曰藥山來甘曰作麼曰教化甘曰將得藥來麼曰行者有甚麼病甘便捨銀兩錠意山中有人必不受此主歸納疏師問曰子歸何速主舉前話師曰速送還他子著賊了也主遂送還甘曰由來有人益金以施師久不陞座一日院主白云大眾久思和尚示誨曰打鐘著時大眾纔集定便下座歸方丈妙喜曰葛藤不少院主隨後問云和尚許為大眾說話為甚麼一言不措師曰經有經師律有律師爭怪得老僧妙喜曰笑殺人薦福懷云藥山還見院主麼院主還見藥山麼三十年後遇著作家不得錯舉問學人擬歸鄉時如何師曰汝父母徧身紅爛臥在荊棘林中汝歸何所曰恁麼則不歸去也師曰汝却須歸去汝若歸鄉示汝個休糧方子曰便請師曰二時上堂不得齩破一粒米師與雲巖遊山腰間刀響巖問甚麼物作聲師抽刀驀口作斫勢朗州刺史李翱問師何姓師曰正是時李不委却問院主某甲適來問和尚姓和尚曰正是時未審姓甚麼主曰恁麼則姓韓也師聞乃曰得恁麼不識好惡若是夏時對他便是姓熱李初嚮師玄化屢請不赴乃躬謁師師執經卷不顧侍者曰太守在此李性褊急乃曰見面不如聞名拂袖便出師曰太守何得貴耳賤目李回拱謝問曰如何是道師以手指上下曰會麼曰不會師曰雲在青天水在瓶李欣然作禮述偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘話雲在青天水在瓶李又問如何是戒定慧師曰貧道這裏無此閒家具李罔測玄旨師曰太守欲保任此事須向高高山頂立深深海裏行閨閤中物捨不得便為滲漏張無盡頌云雲在青天水在瓶眼光隨指落深坑溪花不耐風霜苦說甚深深海底行師一夜登山經行忽雲開見月大嘯一聲應澧陽東九十里許居民盡謂東家明晨迭相推問直至藥山徒眾曰昨夜和尚山頂大嘯李贈詩曰選得幽居愜野情終年無送亦無迎有時直上孤峰頂月下披雲嘯一聲上堂祖師祇教保護若貪嗔起來切須防禦莫教掁直庚反觸是你欲知枯木石頭却須擔荷實無枝葉可得雖然如此更宜自看不得絕却言語我今為汝說這個語顯無語底他那個本來無耳目等貌時有僧問云何有六趣師曰我此要輪雖在其中元來不染問不了身中煩惱時如何師曰煩惱作何相狀我且要你考看更有一般底只向紙背上記持言語多被經論惑我不曾看經論䇿子汝只為迷事走失自家不定所以便有生死心未學得一言半句一經一論便說甚麼菩提涅槃世攝不攝若如是解即是生死若不被此得失繫續便無生死汝見律師說甚麼尼薩耆突吉羅最是生死本雖然恁麼窮生死且不可得上至諸佛下至螻蟻盡有此長短好惡大小不同若也不從外來何處有閒漢掘地獄待你你欲識地獄道只今鑊湯煎煑者是欲識餓鬼道即今多虗少實不令人信者是欲識畜生道見今不識仁義不辨親疎者是豈須披毛戴角斬割倒懸欲識人天即今清淨威儀持瓶挈鉢者是保任免隨諸趣第一不得棄這個這個不是易得須向高高山頂立深深海底行此處行不易方有少相應如今出頭來盡是多事人覔個癡鈍人不可得莫只記䇿子中言語以為自己見知見他不解者便生輕慢此輩盡是闡提外道此心直不中切須審悉恁麼道猶是三界邊事莫在衲衣下空過到這裏更微細在莫將謂等閒須知珍重太和八年十一月六日臨示寂呌曰法堂倒法堂倒眾皆持柱撐之師舉手曰子不會我意乃告寂弟子奉全身塔於院東隅鄧州丹霞天然禪師本習儒業將入長安應舉方宿於逆旅忽夢白光滿室占者曰解空之祥也偶禪者問曰仁者何往曰選官去禪者曰遷官何如選佛曰選佛當往何所禪者曰今江西馬大師出世是選佛之場仁者可往遂直造江西纔見祖師以手拓幞頭額祖顧視良久曰南嶽石頭是汝師也遽抵石頭還以前意投之頭曰著槽廠去師禮謝入行者房隨次執㸑役凡三年忽一日石頭告眾曰來日剗佛殿前草至來日大眾諸童行各備鍬钁剗草獨師以盆盛水沐頭於石頭前胡跪頭見而笑之便與剃髮又為說戒師乃掩耳而出再往江西謁馬祖未參禮便入僧堂內騎聖僧頸而坐時大眾驚愕遽報馬祖祖躬入堂視之曰我子天然師即下地禮拜曰謝師賜法號因名天然祖問從甚處來師曰石頭祖曰石頭路滑還躂倒汝麼師曰若躂倒即不來也乃杖錫觀方過慧林寺遇天大寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利主曰木佛何有舍利師曰既無舍利更取兩尊燒主自後眉鬚墮落保寧勇云院主眉鬚墮落即且置且道丹霞眉毛還在也無若也見得與古佛同參若也不見切忌撥無因果真淨上堂云丹霞燒木佛院主眉鬚落驀拈拄杖云不是木佛便擲下云誰敢燒你擬即眉鬚墮落不擬又且如何高聲云行者拈取拄杖天童華云諸方商量道院主忽起疑心以致斯禍不知院主買鐵得金一場富貴僧問雲峯悅丹霞燒木佛意旨如何峯曰橫三竪四曰院主為甚麼眉鬚墮落峯曰七通八達僧舉問天寧卓寧曰猫兒會上樹僧曰早知如是悔不如是寧曰惜取眉毛僧問雲峯志璿丹霞燒木佛院主為甚麼眉鬚墮落雲曰一人傳虗萬人傳實曰恁麼則不落也雲曰兩重公案曰學人未曉特伸請益雲曰筠袁虔吉頭上插筆文殊道頌云彭祖八百乞延壽秦皇登位便求仙昨夜天津橋上過石崇猶自送窮船謁南陽忠國師初見國師語具國師章中明日再往禮拜見國師便展坐具國師曰不用不用師退後國師曰如是如是師却進前國師曰不是不是師繞國師一帀便出國師曰去聖時遙人多懈怠三十年後覓此漢也難得訪龐居士見女子靈照洗菜次師曰居士在否女子放下菜籃叉手而立師又問居士在否女子提籃便行師遂回須臾居士歸女子乃舉前話士曰丹霞在麼女曰去也士曰赤土塗牛嬭蔣山懃云丹霞從苗辨地靈照因語識人放下菜籃當處發生提起菜籃隨處滅盡居士云赤土塗牛嬭屋裏販揚州且道畢竟如何各自散去免增話會又一日訪龐居士至門首相見師乃問居士在否士曰饑不擇食師曰龐老在否士曰蒼天蒼天便入宅去師曰蒼天蒼天便回師問龐居士昨日相見何似今日士曰如法舉昨日事來作個宗眼師曰祇如宗眼還著得龐公麼士曰我在你眼裏師曰某甲眼窄何處安身士曰是眼何窄是身何安師休去士曰更道取一句便得此話圓師亦不對士曰就中這一句無人道得師與龐居士行次見一泓水士以手指曰便與麼也還辨不出師曰灼然是辨不出士乃戽水潑師二掬師曰莫與麼莫與麼士曰須與麼須與麼師却戽水潑士三掬師曰正與麼時堪作甚麼士曰無外物師曰得便宜者少士曰誰是落便宜者士來訪師於師前立少時便出去師不顧士却來坐師却來士前立少時便歸方丈士曰汝出我入未有事在師曰這老翁出出入入有甚了期士曰略無些子慈悲師曰引得個漢到這田地士曰把甚麼引師拈起士幞頭曰恰似個師僧士拈幞頭安師頭上曰恰似個俗人師應諾三聲士曰猶有些子氣息在師拋下幞頭曰恰似個烏紗巾士亦應諾三聲師曰昔時氣息爭解忘得士彈指三下曰動天動地師因去馬祖處路逢一老人與一童子師問公住何處老人曰上是天下是地師曰忽遇天崩地陷又作麼生老人曰蒼天蒼天童子噓一聲師曰非父不生其子老人便與童子入山去問僧甚麼處宿曰山下宿師曰甚麼處喫飯曰上下喫飯師曰將飯與闍黎喫底人還具眼也無僧無對長慶問保福將飯與人喫感恩有分為甚麼不具眼福云施者受者二俱瞎漢慶云盡其機來還成瞎否福云道某甲瞎得麼玄覺徵云且道長慶明丹霞意為復自用家財天童華云丹霞既已龍頭蛇尾長慶保福只得將錯就錯雖然二三老宿且不知老應作者僧落處具擇法眼者試請辨看雪竇顯頌盡機不成瞎按牛頭喫草四七二三諸祖師寶器持來成過咎過咎深無處尋天上人間同陸沉汾陽昭代僧云若不上山爭識丹霞保寧勇代僧云今日被和尚勘破上堂阿你渾家切須保護一靈之物不是你造作名邈得更說甚薦與不薦吾往日見石頭亦祇教切須自保護此事不是你談話得阿你渾家各有一坐具地更疑甚麼禪可是你解底物豈有佛可成佛之一字永不喜聞阿你自看善巧方便慈悲喜捨不從外得不著方寸善巧是文殊方便是普賢你更擬趁逐甚麼物不用經求落空去今時學者紛紛擾擾皆是參禪問道我此間無道可修無法可證一飲一各自有分不用疑慮在在處處有恁麼底若識得釋迦即老老當從傳燈錄作者凡夫是阿你須自看取莫一盲引眾盲相將入火坑夜裏暗雙陸賽采若為生無事珍重長慶四年六月告門人曰備湯沐浴吾欲行矣乃戴笠䇿杖受屨垂一足未及地而化去潭州大川禪師江陵僧參師問幾時發足江陵僧提起坐具師曰謝子遠來下去僧遶禪牀一帀便出師曰若不恁麼爭知眼目端的僧拊掌曰苦殺人洎合錯判諸方師曰甚得禪宗道理僧舉似丹霞霞曰於大川法道即得我這裏不然曰未審此間作麼生霞曰猶較大川三步在僧拜霞曰錯判諸方者多洞山云不是丹霞難分玉石幻寄云這僧中大川老拳却還丹霞毒手洞山道不是丹霞難分玉石如今分也是玉是石潮州靈山大顛寶通禪師初參石頭頭問那個是汝心師曰見言語者是頭便喝出經旬日師却問前者既不是除此外何者是心頭曰除却揚眉瞬目將心來師曰無心可將來頭曰元來有心何言無心無心盡同謗師於言下大悟妙喜曰且道大顛悟得個甚麼異日侍立次頭問汝是參禪僧是州縣白蹋僧師曰是參禪僧頭曰何者是禪師曰揚眉瞬目頭曰除却揚眉瞬目外將你本來面目呈看師曰請和尚除却揚眉瞬目外鑒頭曰我除竟師曰將呈了也頭曰汝既將呈我心如何師曰不異和尚頭曰不關汝事師曰本無物頭曰汝亦無物師曰既無物即真物頭曰真物不可得汝心見量意旨如此也大須護持住後上堂夫學道人須識自家本心將心相示方可見道多見時輩祇認揚眉瞬目一語一默驀頭印可以為心要此實未了吾今為你諸人分明說出各須聽受但除却一切妄運想念見量即汝真心此心與塵境及守認靜默時全無交涉即心是佛不待修治何以故應機隨照泠泠自用窮其用處了不可得喚作妙用乃是本心大須護持不可容易僧問其中人相見時如何師曰早不其中也曰其中者如何師曰不作個問韓文公一日相訪問師春秋多少師提起數珠曰會麼公曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何座扣齒三下及見師理前問師亦扣齒三下公曰元來佛法無兩般師曰是何道理公曰適來問首座亦如是師乃召首座問是汝如此對否座曰是師便打趁出院汾陽昭頌云解展機鋒是大顛明知不是小因緣一般扣齒叢林異出院韓公始得閒文公又一日白師曰弟子軍州事繁佛法省要處乞師一語師良久公罔措時三平為侍者乃敲禪牀三下師曰作麼平曰先以定動後以智拔公乃曰和尚門風高峻弟子於侍者邊得個入處僧問苦海波深以何為船筏師曰以木為船筏曰恁麼即得度也師曰盲者依前盲瘂者依前瘂一日將痒和子廊下行逢一僧問訊次師以痒和子驀口打曰會麼曰不會師曰大顛老野狐不曾孤負人潭州長髭曠禪師曹溪禮祖塔回參石頭頭問甚麼處來曰嶺南來頭曰大庾嶺頭一鋪功德成就也未師曰成就久矣祇欠點眼在頭曰莫要點眼麼師曰便請頭乃垂下一足師禮拜頭曰汝見個甚麼道理便禮拜師曰據某甲所見如紅爐上一點雪玄覺徵云且道長髭具眼祇對不具眼祇對若具眼為甚麼請它點眼若不具眼又道成就久矣且作麼生商量法燈代云和尚可謂眼昏師見僧問訊次師曰步步是汝證明處汝還知麼曰某甲不知師曰汝若知我堪作甚麼僧禮拜師曰我不堪汝却好龐居士到師陞座眾集定士出曰各請自檢好却於禪牀右立時有僧問不觸主人翁請師答話師曰識龐公麼曰不識士便搊住曰苦哉苦哉僧無對士便拓開師少間却問適來這僧還喫棒否士曰待伊甘始得師曰居士祇見錐頭利不見鑿頭方士曰恁麼說話某甲即得外人聞之要且不好師曰不好個甚麼士曰阿師祇見錐頭尖不見鑿頭利僧參遶禪牀一帀卓然而立師曰若是石頭法席一點也用不著僧又遶禪牀一帀師曰却是恁麼時不易道個來處僧便出去師乃喚僧不顧師曰這漢猶少教詔在僧却回曰有一人不從人得不受教詔不落階級師還許麼師曰逢之不逢逢必有事僧乃退身三步師却遶禪牀一帀僧曰不惟宗眼分明亦乃師承有據師乃打三棒問僧甚處來曰九華山控石菴師曰菴主是甚麼人曰馬祖下尊宿師曰名甚麼曰不委他法號師曰他不委你不委曰尊宿眼在甚處師曰若是菴主親來今日也須喫棒曰賴遇和尚放過某甲師曰百年後討個師僧也難得李行婆來師乃問憶得在絳州時事麼婆曰非師不委師曰多虗少實在婆曰有甚諱處師曰念你是女人放你拄杖婆曰某甲終不見尊宿過師曰老僧過在甚麼處婆曰和尚無過婆豈有過師曰無過底人作麼生婆乃竪拳曰與麼總成顛倒師曰實無諱處師見僧乃擒住曰師子兒野干屬僧以手作撥眉勢師曰雖然如此猶欠哮吼在僧擒住師曰偏愛行此一機師與一摑僧拍手三下師曰若見同風汝甘與麼否曰終不由別人師作撥眉勢僧曰猶欠哮吼在師曰料想不由別人僧問不負從上諸聖如何是長髭第一句師曰有口不能言曰為甚麼口不能言師乃頌云石師子木女兒第一句諸佛機言不得也大奇直下是莫狐疑良久云是第一句第二句曰不一不二師曰見利忘錐猶自多在僧禮拜師拈起盞子云直下不負從上諸聖曰直指人心見性成佛又作麼生師放下盞子便歸方丈僧隨後入師翹一足云大地不容針汝從何處來曰直是維摩也緘口不得師曰偶爾之間又逢猛虎僧便作虎聲師以拄杖作亞鎗勢僧却把住云大地不容針何處得這個來師曰不但維摩文殊也緘口不得曰著箭虎不可當師與一掌推出方丈潭州招提寺慧朗禪師初參馬祖祖問汝來何求曰求佛知見祖曰佛無知見知見乃魔耳汝自何來曰南嶽來祖曰汝從南嶽來未識曹溪心要汝速歸彼不宜他往師歸石頭便問如何是佛頭曰汝無佛性師曰蠢動含靈又作麼生頭曰蠢動含靈却有佛性曰慧朗為甚麼却無頭曰為汝不肯承當師於言下信入住後凡學者至皆曰去去汝無佛性其接機大約如此時謂大朗長沙興國寺振朗禪師初參石頭便問如何是祖師西來意頭曰問取露柱曰振朗不會頭曰我更不會師俄省悟住後有僧來參師召上座僧應諾師曰孤負去也曰師何不鑒師乃拭目而視之僧無語時謂小朗汾州石樓禪師僧問未識本來性乞師方便指師曰石樓無耳朵曰某甲自知非師曰老僧還有過曰和尚過在甚麼處師曰過在汝非處僧禮拜師便打問僧近離甚處曰漢國師曰漢國主人還重佛法麼曰苦哉賴遇問著某甲若問別人即禍生師曰作麼生曰人尚不見有何佛法可重師曰汝受戒得多少夏曰三十夏師曰大好不見有人便打鳳翔府法門寺佛陀禪師尋常持一串數珠念三種名號曰一釋迦二元和三佛陀自餘是甚麼椀躂丘乃過一珠終而復始事跡異常人莫能測澧州大同濟禪師米胡領眾來纔欲相見師便拽轉禪牀面壁而坐米於背後立少時却回客位師曰是即是若不驗破已後遭人貶剝令侍者請米米却拽轉禪牀便坐師乃遶禪牀一帀便歸方丈米却拽倒禪牀領眾便出訪龐居士士曰憶在母胎時有一則語舉似阿師切不得作道理主持師曰猶是隔生也士曰向道不得作道理師曰驚人之句爭得不怕士曰如師見解可謂驚人師曰不作道理却成作道理士曰不但隔一生兩生師曰粥飯底僧一任檢責士鳴指三下一曰見龐居士來便掩却門曰多知老翁莫與相見士曰獨坐獨語過在阿誰師便開門纔出被士把住曰師多知我多知師曰多知且置閉門開門卷之與舒相較幾許士曰祇此一問氣急殺人師默然士曰弄巧成拙問十二時中如何合道師曰汝還識十二時麼曰如何是十二時師曰子丑寅卯僧禮拜師示頌曰十二時中那事別子丑寅卯吾今說若會惟心萬法空釋迦彌勒從茲決一日問龐居士是個語言古今少人避得只如龐公還避得麼曰諾師再舉前話士曰甚麼處去來師曰非但如今古人亦有此語士作舞而出去師曰風顛老風顛老自過教誰檢士來訪提起笊篱喚曰大同師大同師師不顧士曰石頭一宗瓦解氷消師曰若不得龐公輩灼然如此士拋下笊篱曰寧教不直一文錢師曰錢雖不直欠他又爭得士作舞而退師乃提起笊篱曰龐公龐公士曰你要我笊篱我要你木杓師作舞而退士撫掌笑曰歸去來歸去來南嶽青原宗派未定法嗣荊州天皇道悟禪師婺州東陽張氏子神儀挺異幼而生知年十四懇求出家父母不許遂減食飲父母不得已許之及出家精修梵行風雨昏夜宴坐丘塚離諸怖畏謁徑山國一受心法服勤五載復謁馬祖重印前解依止二夏後謁石頭而致問曰離却定慧以何法示人頭曰我這裏無奴婢離個甚麼曰如何明得頭曰汝還撮得虗空麼曰恁麼則不從今日去也頭曰未審汝早晚從那邊來曰道悟不是那邊人頭曰我早知汝來處也曰師何以贜誣於人頭曰汝身現在曰雖然如是畢竟如何示於後人頭曰汝道誰是後人師從此頓悟罄殫前二哲匠言下有所得心妙喜曰且道悟得個甚麼後居天皇客無貴賤皆坐而揖江陵尹右僕射裴公稽首問法師接之無加禮裴愈歸向元和丁亥四月示疾命弟子先期告終至晦日大眾問疾師驀召典座座近前師曰會麼曰不會師拈枕子拋於地上即便告寂壽六十臘三十五嗣石頭住城東弟子三人慧真文賚幽閑協律郎符載撰傳燈所錄悉同符而誤以龍潭列師法嗣天王道悟禪師渚宮崔氏漢子玉之胤十五出家二十三受戒三十謁石頭頻沐指示而不契次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門去郭不遠結草為廬節使來訪師不為加禮使怒擒師擲江中及歸見徧衙火發且聞空中天王神嗔責聲遂哀悔設拜烟焰頓息宛然如初乃躬往江邊迎師見師在水都不濕衣益自敬重於府西造天王寺供師龍潭信問從上相承底事如何師曰不是明汝來處不得潭曰這個眼目幾人具得師曰淺草易為長蘆僧問如何是玄妙之說師曰莫道我解佛法好曰爭奈學人疑滯何師曰何不問老僧曰即今問了也師曰去不是汝存泊處師常云快活快活及臨終時呌苦苦又云閻羅王來取我也院主問曰和尚當時被節使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅當元和三年林間錄作十三年戊戌戊子十月十三日也年八十二坐六十三夏嗣馬祖住城西弟子一人龍潭崇信荊南節度使丘玄素撰又唐聞人歸登南嶽圭峯笒裴相國宗趣狀權德輿馬祖塔銘皆以天王為馬祖嗣佛國白達觀頴呂夏卿張無盡皆著辯證傳燈之誤獨其時同其他同其參謁石頭馬祖同故猶不能不闕疑且藥山參石頭頭謂因緣當在馬祖處山旋於馬祖處大悟而竟嗣頭皆釋迦之胤何彼此足分析耶音釋卷七之九𧬊先齊切音西悲聲拲居竦切音拱罪人兩手共一木曰拲瞪除庚切音棖直視貌呱攻乎切音姑小兒啼聲苦允切音稛鹿屬善聚散者轝雲俱切音于兩手對舉之車又轎謂肩轝駛師止切音使馬疾行也刖音月斷足也嚏丁計切音帝鼻塞噴嚏彀居候切音姤弓矢持滿也㿇直入切音昔小痛也菌音郡地蕈之小者玿時招切音韶美玉搕𢶍克合切堪入聲昨答切音雜鼯音吾囦古淵字悸音忌心動貌掁直庚切音橙觸也撞也賚洛代切音徠賜也𪂶胡讒切音咸鳥也
