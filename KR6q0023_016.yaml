body:
  text: 六祖下第五世瑞州洞山良價悟本禪師會稽俞氏子幼歲從師念般若心經至無眼耳鼻舌身意處忽以手捫面問師曰某甲有眼耳鼻舌等何故經言無其師駭然異之曰吾非汝師即指往五泄山禮默禪師披剃年二十一詣嵩山具戒遊方首謁南泉值馬祖諱辰修齊泉問衆曰來日設馬祖齊未審馬祖還來否衆皆無對師出對曰待有伴即來泉曰此子雖後生甚堪雕琢師曰和尚莫壓良為賤次參溈山問曰頃聞南陽忠國師有無情說法話某甲未究其微溈曰闍黎莫記得麼師曰記得溈曰汝試舉一遍看師遂舉僧問如何是古佛心國師曰墻壁瓦礫是僧曰墻壁瓦礫豈不是無情國師曰是僧曰還解說法否國師曰常說熾然說無間歇僧曰某甲為甚麼不聞國師曰汝自不聞不可妨他聞者也僧曰未審甚麼人得聞國師曰諸聖得聞僧曰和尚還聞否國師曰我不聞僧曰和尚既不聞爭知無情解說法國師曰賴我不聞我若聞即齊於諸聖汝即不聞我說法也僧曰恁麼則衆生無分去也國師曰我為衆生說不為諸聖說僧曰衆生聞後如何國師曰即非衆生僧曰無情說法據何典教國師曰灼然言不該典非君子之所談汝豈不見華嚴經云剎說衆生說三世一切說師舉了溈曰我這裏亦有祇是罕遇其人師曰某甲未明乞師指示溈竪起拂子曰會麼師曰不會請和尚說溈曰父母所生口終不為子說師曰還有與師同時慕道者否溈曰此去澧陵攸縣石室相連有雲巖道人若能撥草瞻風必為子之所重師曰未審此人如何溈曰他曾問老僧學人欲奉師去時如何老僧對他道直須絶滲漏始得他道還得不違師旨也無老僧道第一不得道老僧在這裏師遂辭溈山徑造雲巖舉前因緣了便問無情說法甚麼人得聞巖曰無情得聞師曰和尚聞否巖曰我若聞汝即不聞吾說法也師曰某甲為甚麼不聞巖竪起拂子曰還聞麼師曰不聞巖曰我說法汝尚不聞豈況無情說法乎師曰無情說法該何典教巖曰豈不見彌陀經云水鳥樹林悉皆念佛念法師於此有省乃述偈曰也大奇也大奇無情說法不思議若將耳聽終難會眼處聞聲方得知師問雲巖某甲有餘習未盡巖曰汝曾作甚麼來師曰聖諦亦不為巖曰還歡喜也未師曰歡喜則不無如糞掃堆頭拾得一顆明珠師問雲巖擬欲相見時如何曰問取通事舍人師曰見問次曰向汝道甚麼師辭雲巖巖曰甚麼處去師曰雖離和尚未卜所止巖曰莫湖南去師曰無曰莫歸鄉去師曰無曰早晚却回師曰待和尚有住處即來曰自此一別難得相見師曰難得不相見臨行又問百年後忽有人問還邈得師真否如何祗對巖曰向伊道祇這是師良久巖曰價闍黎承當個事大須審細師猶涉疑後因過水睹影大悟前旨有偈曰切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如妙喜未見圜悟時讀此偈致疑曰有個渠又有個我成甚麼禪遂請益湛堂堂云你更舉看妙喜遂舉堂云你舉話也未會便推出師初行腳時路逢一婆擔水師索水飲婆曰水不妨飲婆有一問須先問過且道水具幾塵師曰不具諸塵婆云去休污我水擔在泐潭見初首座有語曰也大奇也大奇佛界道界不思議師遂問曰佛界道界即不問祇如說佛界道界底是甚麼人初良久無對師曰何不速道初曰爭即不得師曰道也未曾道說甚麼爭即不得初無對師曰佛之與道俱是名言何不引教初曰教道甚麼師曰得意忘言初曰猶將教意向心頭作病在師曰說佛界道界底病大小初又無對次日忽遷化時稱師為問殺首座價他日因供養雲巖真次僧問先師道祇這是莫便是否師曰是曰意旨如何師曰當時幾錯會先師意曰未審先師還知有也無師曰若不知有爭解恁麼道若知有爭肻恁麼道雲巖諱日營齊僧問和尚於雲巖處得何指示師曰雖在彼中不蒙指示曰既不蒙指示又用設齊作甚麼師曰爭敢違背他曰和尚初見南泉為甚麼却與雲巖設齊師曰我不重先師道德佛法祇重他不為我說破曰和尚為先師設齊還肻先師也無師曰半肻半不肻曰為甚麼不全肻師曰若全肯即孤負先師也師自唐大中末於新豐山接誘學徒厥後盛化豫章高安之洞山權開五位善接三根大闡一音廣弘萬品橫抽寶劒翦諸見之稠林妙叶弘通截萬端之穿鑿又得曹山深明的旨妙唱嘉猷道合君臣偏正回互由是洞上玄風播於天下諸方宗匠咸共推尊之曰曹洞宗師作五位君臣頌曰正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷舊日嫌偏中正失曉老婆逢古鏡分明覿面別無真休更迷頭猶認影正中來無中有路隔塵埃但能不觸當今諱也勝前朝斷舌才兼中至兩刃交鋒不須避好手猶如火裏蓮宛然自有冲天志兼中到不落有無誰敢和人人盡欲出常流折合還歸炭裏坐上堂向時作麼生奉時作麼生功時作麼生共功時作麼生功功時作麼生僧問如何是向師曰喫飯時作麼生曰如何是奉師曰背時作麼生曰如何是功師曰放下钁頭時作麼生曰如何是共功師曰不得色曰如何是功功師曰不共乃示頌曰向聖主由來法帝堯御人以禮曲龍腰有時閙市頭邊過到處文明賀聖朝奉淨洗濃粧為阿誰子規聲裏勸人歸百花落盡啼無盡更向亂峰深處啼功枯木花開劫外春倒騎玉象趁麒麟而今高隱千峰外月皎風清好日辰共功衆生諸佛不相侵山自高兮水自深萬別千差明底事鷓鴣啼處百花新功功頭角才生已不堪擬心求佛好羞慙迢迢空劫無人識肯向南詢五十三僧問曹山寂五位君臣旨訣山曰正位即空界本來無物偏位即色界有萬象形正中偏者背理孰事偏中正者捨事入理兼帶者冥應衆緣不墮諸有非染非淨非正非偏故曰虗玄大道無著真宗從上先德推此一位最妙最玄當詳審辨明君為正位臣為偏位臣向君是偏中正君視臣是正中偏君臣道合是兼帶語僧問如何是君山曰妙德尊寰宇高明朗太虗曰如何是臣山曰靈機弘聖道真智利羣生曰如何是臣向君山曰不墮諸異趣疑情望聖容曰如何是君視臣山曰妙容雖不動光燭本無偏曰如何是君臣道合山曰混然無內外和融上下平山又曰以君臣偏正言者不欲犯中故臣稱君不敢斥言是也此吾法宗要乃作偈曰學者先須識自宗莫將真際雜頑空妙明體盡知傷觸力在逢緣不借中出語直教燒不著潛行須與古人同無身有事超岐路無事無身落始終復作五相偈曰白衣雖拜相此事不為奇積代簪纓者休言落魄時偈曰子時當正位明正在君臣正或作暗未離兜率界烏雞雪上行偈曰焰裏寒氷結楊花九月飛泥牛吼水面木馬逐風嘶偈曰王宮初降日玉兔不能離未得無功旨人天何太遲偈曰渾然藏理事朕兆卒難明威音王未曉彌勒豈惺惺又僧問五位對賓時如何山曰汝即今問那個位曰某甲從偏位中來請師向正位中接山曰不接曰為甚麼不接山曰恐落偏位中去山却問僧祇如不接是對賓是不對賓曰早是對賓了也山曰如是如是陵亘大夫問南泉姓甚麼泉曰姓王曰王還有眷屬也無泉曰四臣不昧曰王居何位泉曰玉殿苔生後僧舉問曹山玉殿苔生意旨何如山曰不居正位曰八方來朝時如何山曰他不受禮曰何用來朝山曰違則斬曰違是臣分上未審君意如何山曰樞密不得旨曰恁麼則燮理之功全歸臣相也山曰你還知君意麼曰外方不敢論量山曰如是如是投子青五位頌序云夫長天一色星月何分大地無偏榮枯自異是以法無異法何迷悟而可及心不自心假言象而提唱其言也偏圓正到兼帶叶通其法也不落是非豈關萬象幽旨既融於水月孤蹤派渾於金河不墜虗凝回塗復妙丹霞淳五位頌序云夫黑白未分難為彼此玄黃之後方見自它於是借黑權正假白示偏正不坐正夜半虗明偏不坐偏天曉陰晦全體即用枯木花開全用即真芳叢不艷摧殘兼帶及盡玄微玉鳳金鸞分疏不下是故威音那畔休話如何曲為今時由人施設芙蓉楷上堂喚作一句已是埋沒宗風曲為今時通塗消耗所以借功明位用在體處借位明功體在用處若也體用雙明如門扇兩開不得向兩扇上著意不見新豐老子道峰巒秀異鶴不停機靈木迢然鳳無依倚直得功成不處電火難追擬議之間長途萬里長蘆歇上堂轉功就位是向去底人玉蘊荊山貴轉位就功是却來底人紅爐片雪春功位俱轉通身不滯撒手亡依石女夜登機密室無人掃正恁麼時絶氣息一句作麼生相委良久曰歸根風墮葉照盡月潭空僧問雪竇宗如何是轉功就位宗云撒手無依全體現扁舟漁父宿蘆花云如何是轉位就功云夜半嶺頭風月靜一聲高樹嶺猿啼云如何是功位齊彰云出門不踏來時路滿目飛塵絶點埃云如何是功位齊隱云泥牛飲盡澄潭月石馬加鞭不轉頭湧泉景欣禪師云我四十九年在這裏尚自有時走作汝等諸人莫開大口見解人多行解人萬中無一個見解言語總要知通若識不盡敢道輪回去在為何如此蓋為識漏未盡汝但盡却今時始得成立亦喚作立中功轉功就他去亦喚作就中功親它去我所以道親人不得度渠不度親人恁麼譬喻尚不會薦取渾崙底但管取性亂動舌頭不見洞山道相續也大難汝須知有此事若不知有啼哭有日在天童覺四借頌一借功明位頌蘋末風休夜未央水天虗碧共秋光月船不犯東西岸須信篙人用意良二借位明功頌六戶虗通路不迷太陽影裏不當機縱橫妙展無私化恰恰行從鳥道歸三借借不借借頌識盡甘辛百草頭鼻無繩索得優游不知有去成知有始信南泉喚作牛四全超不借借頌霜重風嚴景寂寥玉關金鎖手慵敲寒松盡夜無虗籟老鶴移栖空月巢古德分三種功勳頌一正位一色頌無影林中鳥不栖空階密密向邊遲寒巖荒草何曾緑正坐當堂失路迷二大功一色頌白牛雪裏覓無蹤功盡超然體浩融月影蘆花天未曉靈苗任運剪春風三今時一色頌髑髏識盡勿多般狗口才開落二三日用光中須急薦青山只在白雲間圜悟禪師提唱五位示衆舉僧問洞山寒暑到來時如何回避山云何不向無寒暑處去僧云如何是無寒暑處曰寒時寒殺闍黎熱時熱殺闍黎黃龍新拈云洞山袖頭打領腋下剜襟爭奈這僧不甘如今有個出來問黃龍且道如何支遣良久云安禪不必須山水滅却心頭火自凉諸人且道洞山圈䙡落在甚麼處若明辨得始知洞山下五位回互正偏接人不妨奇特到這向上境界方能如此不消安排自然恰好所以道正中遍五位頌現前浮山遠録公以此公案為五位之格若會得一則餘者自然易會巖頭道如水上葫蘆子相似捺著便轉殊不消絲毫氣力曾有僧問洞山文殊普賢來參時如何山云趕向水牯牛羣裏去僧云和尚入地獄如箭山云全得他力洞山道何不向無寒暑處去此是偏中正僧云如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎此是正中偏雖正却偏雖偏却圓若是臨濟下無許多事這般公案直下便會有者道大好無寒暑有什麼巴鼻古人道若向劒刃上走則快若向情識上見則遲不見僧問翠微如何是祖師西來意微云待無人來向你道遂入園中行僧云此間無人請和尚道微指竹云這竿竹得與麼長那竿竹得與麼短其僧忽然大悟又曹山慧霞問僧恁麼熱向什麼處回避僧云鑊湯罏炭裏回避山云鑊湯罏炭裏如何回避僧云衆苦不能到看它家裏人自然會他家裏說話雪竇用它家裏事頌云垂手還同萬仞崖正偏何必在安排琉璃古殿照明月忍俊韓盧空上階悟師舉了云只如諸人還識洞山為人處麼良久復云討甚兔子九峯通玄謂門弟子曰佛意祖意如手展握先師安立五位發明雲巖宗旨譬如神醫治病其藥只是尋常用者語忌十成不欲斷絶機忌觸犯不欲染污但學者機思不妙惟尋九轉靈丹云能起死是大不然法華經有化城一品佛祖密說熟讀分明大通智勝佛壽五百四十萬億那由他劫其坐道場破魔軍已垂得阿耨多羅三藐三菩提而諸佛法不現在前如是一小劫乃至十小劫結跏趺坐身心不動而諸佛法猶不在前言垂成者言一小劫言十小劫者是染污是斷絶又曰爾時忉利諸天先為彼佛於菩提樹下敷師子座高一由旬佛於此座當得阿耨多羅三藐三菩提適坐此座時諸梵天王雨衆天花面百由旬香風時來吹去萎花更雨新者如是不絶滿十小劫供養於佛常擊天鼓其餘諸天作天伎樂常雨此花四王諸天為供養佛常擊天鼓其餘諸天作天伎樂滿十小劫至於滅度亦復如是諸比丘大通智勝佛過十小劫諸佛之法乃現在前成阿耨多羅三藐三菩提言過十小劫者偏正回互之旨也祖師曰藉教悟宗者夫豈不然哉道吾真曰古人道主賓元不異問答理俱全同安又曰賓主睦時全是妄君臣合處正中邪一等是出世尊宿接物利生言教有異為復見處偏枯為復利生不普明眼底人通個消息汾陽五位頌五位參尋切要知纖毫才動即差違金剛透匣誰能解惟有那吒第一機舉目便令三界靜振鈴還使九天歸正中妙挾通回互擬議鋒鋩失却威大死翁景深禪師謁寶峰照求入室照曰直須斷起滅念向空劫已前掃除玄路不涉正偏盡却今時全身放下放盡還放方有自由分師聞頓領厥旨峰擊鼓告衆曰深得闡提大死之道後學宜依之吉祥元實禪師依天衣法聰禪師早夜精勤脅不至席一日偶失笑喧衆衣擯之中夜宿田里覩星月璨然有省曉歸趨方丈衣見乃問洞山五位君臣如何話會師曰我這裏一位也無衣令參堂謂侍者曰這漢却有個見處奈不識宗旨何入室次衣預令行者五人分敘而立師至俱召實上座師於是密契奧旨述偈曰一位才彰五位分君臣叶處紫雲屯夜明簾捲無私照金殿重重顯至尊衣稱善五位王子僧問石霜諸禪師如何是誕生王子諸云貴裔非常種天生位至尊如何是朝生王子諸云白衣為宰輔直指禁庭中如何是末生王子諸云循途方覺貴漸進不知尊如何是化生王子諸云政威無比況神用莫能儔如何是內生王子諸云重幃休勝負金殿臥清風又燈録載諸頌洞山五位王子誕生頌天然貴胤本非功德合乾坤育勢隆始末一朝無雜種分宮六宅不他宗上和下睦陰陽順共氣連枝器量同欲識誕生王子父鶴冲霄漢出銀籠朝生頌苦學論情世莫羣出來凡事已超倫詩成五字三冬雪筆落分毫四海雲萬卷積功彰聖代一心忠孝輔明君鹽梅不是生知得金榜何勞顯至勳末生頌久棲巖壑用工夫草榻柴扉守志孤十載見聞心自委一身冬夏衣縑無澄凝含笑三秋思清苦高名上哲圖業就高科酬志極比來臣相不當塗化生頌傍分帝位為傳持萬里山河布政威紅影日輪凝下界碧油風冷暑炎時高低豈廢尊卑奉五袴蘇塗遠近知妙印手持煙塞靜當陽那肯露纖機內生頌九重密處復何宣挂弊由來顯妙傳祇奉一人天地貴從他諸道自分權紫羅帳合君臣隔黃閣簾垂禁制全為汝方隅宮屬戀遂將黃葉止啼錢九峯䖍禪師僧問承古有言向外紹則臣位向內紹則王種是否峯曰是曰如何是外紹峯曰若不知事極頭祇得了事喚作外紹是為臣種曰如何是內紹峯曰知向裏許承當擔荷是為內紹曰如何是王種峯曰須見無承當底人無擔荷底人始得同一色同一色了所以借為誕生是為王種曰恁麼則內紹亦須得轉峯曰灼然有承當擔荷爭得不轉汝道內紹便是人王種你且道如今還有紹底道理麼所以古人道紹是功紹了非是功轉功位了始喚作人王種曰未審外紹還轉也無峰曰外紹全未知有且教渠知有曰如何是知有峰曰天明不覺曉問如何是外紹峰曰不借別人家裏事曰如何是內紹峰曰推爺向裏頭曰二語之中那語最親峰曰臣在門裏王不出門曰恁麼則不出門者不落二邊峰曰渠也不獨坐世界裏紹王種名外紹王種姓所以道紹是功名臣是偏中正紹了轉功名君是正中偏問誕生還更知聞也無峰曰更知聞阿誰曰恁麼則莫便是否峰曰若是為甚麼古人道誕生王有父曰既有父為甚麼不知聞峰曰同時不識祖問古人道直得不恁麼來者猶是兒孫意旨如何峰曰古人不謾語曰如何是來底兒孫峰曰猶守珍御在曰如何是父峰曰無家可坐無世可興寂音曰雪竇通禪師長沙岑大蟲之子也每謂諸同伴曰但時中常在識盡功成瞥然而起即是傷他而況言句乎故石霜諸禪師宗風多論內紹外紹臣種王種借句挾帶直饒未嘗忘照猶為外紹謂之臣種亦謂之借謂之誕生然不若絲毫不隔如王子生下即能紹種謂之內紹謂之王種謂之句非借也借之為言一色邊事耳不得已應機利生則成挾帶汾陽無德禪師偈曰士庶公侯一道看貧富賢愚名漸次將知修行亦須具眼豫參至此每自嗟笑嗟堂中首座昧先師之意而脫去笑羅山大師不契而識巖頭及觀棗柏大師之論曰當以止觀力功熟乃證知急亦不得成而緩亦不得但知當不休必定不虗棄如乳中有酪要須待其緣彼緣緣之中本無有作者故其酪成已亦無有來處亦非是本有如來知慧海方便亦如是是以知古老宿行處皆聖賢之言也又曰此如唐郭中令李西平皆稱王然非有種也以勳勞而至焉高祖之秦王明皇之肅宗則以生帝王之家皆有種非以勳勞而至者也謂之內紹者無功之功也先聖貴之謂之外紹者借功業而然故又名曰借句曹山章禪師偈有曰妙明體盡知傷觸力在逢緣不借中雲居膺禪師曰頭頭上了物物上通只喚作了事人終不喚作尊貴將知尊貴一路自別寂音復述洞山尊貴旨訣云雲居膺禪師曰僧家發言吐氣須有來由莫將作等間這裏是什麼處所爭受容易凡問個事也須識些子好惡若不識尊卑良賤不知觸犯信口亂道也無利益並馳行腳到處覓相似語所以尋常向兄弟道莫怪不相似恐同學太多去第一莫將來將來不相似言語也須看首尾八十老人入場屋不是小兒嬉不是因循底事一言參差即千里萬里難收攝蓋為學處容易又曰汝等諸人直饒學得佛邊事早是錯用心了也不見古人講得天花落石點頭尚不干自己事自餘是甚麼間如今擬將有限身心向無限中用有甚麼交涉如將方木逗於圓孔多少誵訛若無恁麼事饒汝說得簇花簇錦亦無用處未離識情在一切事須向這裏及盡始得無過方得出身若一毫髮去不盡即被塵纍豈況更多差之毫𨤲過犯山嶽不見古人道學處不玄盡是流俗閨閣中物捨不得俱為滲漏直須向這裏及取及去及來併盡一切事始得無過如人頭頭上了物物上通只喚作了事人終不喚作尊貴將知尊貴一路自別便是世間極重極貴物不得將來向尊貴邊須知不可思議不當好心所以古人道猶如雙鏡光光相對光明相照更無虧盈豈不是一般猶喚作影像邊事如日出照於世間明朗是一半那一半喚作什麼如今人未識得光影門頭戶底粗淺底事將作屋裏事又爭得又曰升天底事須對衆揚却十成底事對衆去却擲地作金聲不得回頭顧著自餘有什麼用處不見二祖當時詩書博覽三藏聖教如觀掌中因甚麼更求達磨安心將知此門中事不是等間豫味雲居之語知尊貴之旨須自悟噫垂衣裳而天下治者堯舜也僧問曹山子歸就父為甚麼父全不顧山曰理合如是曰父子之恩何在山曰始成父子之恩曰如何是父子之恩山曰刀斧斫不開又僧問如何是師子山曰衆獸不能近曰如何是師子兒山曰能吞父母者曰既是衆獸近不得為甚麼却被兒吞山曰豈不見道子若哮吼祖父俱盡曰盡後如何山曰全身歸父曰未審祖盡時父歸何所山曰所亦盡曰前來為甚麼道全身歸父山曰譬如王子能成一國之事又曰闍黎此事不得孤滯直須枯木上更撒些子華投子感溫禪師僧問父不投為甚麼却投子投曰豈是別人屋裏事曰父與子還屬功也無投曰不屬曰不屬功底如何投曰父子各自脫曰為甚麼如此投曰汝與我會華嚴隆禪師少時事石門徹禪師一日問門曰但得隨處安間自然合他古轍雖有此語疑心未歇時如何門曰知有乃可隨處安間如人在州縣住或聞或見千奇百怪他總將作尋常不知有而安間如人在村落住有少聲色則驚怪傳說先洞山示衆曰欲知此事如人家養三兒以一著州中一著村中一著縣中其一用家中錢物其一用外處錢物有一不得家中錢物亦不得外處錢物且道那一個合在州中那一個合在縣中那一個合在村中有僧便問三個莫明輕重否曰是僧曰如何是此人出身處洞曰知有却不知有是此人出身處僧曰未審此人從今日去也無曰亦從今日去僧曰恁麼則屬功也洞曰是僧曰喚作甚麼功洞曰喚作功就之功僧曰此人還知有州中人否洞曰知有始解奉重矣僧曰恁麼則村中人全明過也洞曰是僧曰如何是此人過處洞曰不知有喚作間人是此人過處不見先師道今時學道之人須知有轉身處始得隆曰古人知有便如州裏人耶亦須因奉重而至耶門曰洞山曰向時作麼生奉時作麼生功時作麼生共功時作麼生功功時作麼生僧問如何是向曰喫飯時作麼生曰如何是奉曰背時作麼生曰如何是功曰放下钁頭時作麼生曰如何是共功曰不得色曰如何是功功曰不共此名功勳五位也譬如初生鳩兒毛羽可憐生久久自能高飛遠蕩僧問雲居宏覺禪師如何是沙門所重覺曰心識不到處洪覺範曰洞上宗旨語忌十成不欲犯犯則謂之觸諱如五位曰但能不觸當今諱也勝前朝斷舌才宏覺蓋洞山之高弟也而所答之語如此豈非觸諱乎曰東坡最能為譬嘗曰以吾之所知推至其所不知嬰兒生而導之言稍長而教之書口必至於忘聲而後能言手必至於忘筆而後能書此吾之所知也口不能忘聲則語言難於屬文手不能忘筆則字畫難於刻雕及其相忘之至則形容心術酬酢萬物之變忽然而不自知也夫不犯諱忌十成者法也宏覺不忘法何以能識宗金剛般若曰一切聖賢皆以無為法而有差別宏覺以之林間録又曰夫教語皆是三句相連初中後善初直須教渠發善心中破善後始名善菩薩即非菩薩是名菩薩法非法非非法總與麼也若即說一句答令人入地獄若三句一時說渠自入地獄不干教主事故知古大宗師說法皆依佛祖法式不知者以為苟然語如無著所釋金剛般若是此意也洞山安立五位道眼明者視其題目十五字排布則見悟本老人如曰正中偏偏中正正中來偏中至兼中到是也人天眼目從寂音之說悉改兼中至為偏中至幻寄曰人多指洞山君臣五位為語忌觸諱機貴回互臨濟用棒用喝為全提正令直示家風殊不知用棒用喝即回互不觸諱之密令也語忌觸諱機貴回互即全提直指之妙運也至第以黑不言黑而言半夜炭裏白不言白而言古鏡老婆為回互尤屬皮相夫一切萬法有無俱屬名言都無實義若確有定稱盡為邪見故洞山假黑白而示回互忌觸諱忌十成死語也所以云借黑權正假白示偏正不坐正夜半虗明偏不坐偏天曉陰晦自昔聖賢說法皆然洞山特為一拈出耳世間豈有不回互不忌觸諱以十成死語示人之聖賢耶覺範謂宏覺心識不到處是觸諱而又讚其忘法識宗吾恐宏覺未肯點頭心識不到處是觸諱則洞山非佛與直饒將來亦無處著語皆是觸諱耶未可謂洞山既沒莫為之正也至於欲易兼中至為偏中至豫初亦心是之既而反復洞山五位語知其不然何也蓋向者君向臣也正中偏也奉者臣奉君也偏中正也正中來君位也曹山所云本來無物者也學人證此功也故云功猶之法界觀理法界也正偏兼叶故云共功猶之事理無礙也功功猶之事事無礙也今以共功為偏中至無待智者知其不然又古德謂事不獨立若獨觀之是情智之境非觀智之境又謂色中無空文理俱絶則遍中至之不立固如覺範言大宗師說法皆依佛祖法式者也妙喜親見洞下諸尊宿嘗受室中密傳而引五位語亦仍兼中至之文未嘗易為偏中至此亦可證也又斷舌事覺範援賀若弼而遺世親世親以習小乘謗大乘欲斷舌與觸諱最切何乃舍親而就疏乎又人天眼目以五王子配五位以末生當正位既繆矣又以內生為同誕生亦非也誕生猶有待者也內生生即能紹種者也覺範言之甚詳已載於前不復繁引又有謂洞宗頗落言詮不如臨濟直截是亦不然賓主何異君臣四喝何異五位耶衆盲摸象良可悲夫問欲見和尚本來師如何得見師曰年牙相似即無阻矣僧擬進語師曰不躡前蹤別請一問僧無對師與泰首座冬節喫果子次乃問有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在甚麼處泰曰過在動用中師喚侍者掇退果桌溈山哲云諸人還知洞山落處麼若也不知往往作是非得失會去山僧道這果子非但首座不得喫假使盡大地人來也不敢正眼著琅琊覺云若不是洞山老人焉能辨得雖然如是洞山猶缺一著在雲蓋本云洞山雖有打破虗空鉗錘而無補綴的針線待伊道過在動用中但道請首座喫果子泰首座若是個衲僧喫了也須吐出問蛇吞蝦蟇救則是不救則是師曰救則雙目不睹不救則形影不彰幻寄曰昔洪州廉使問馬祖喫酒肉即是不喫即是祖曰喫是中丞祿不喫是中丞福徑山國一禪師人問傳舍有二使郵吏為刲一羊二使聞之一人救一人不救罪福異之乎國一曰救者慈悲不救者解脫此三尊宿一人雷轟電掃却墮見滲漏一人珠輝玉潤却墮情滲漏一人山高水深却墮語滲漏若人能一一辨出有目如盲若辨不出有口若啞更或道一模脫出無有參差捶胸大哭須有日在問雪峰從甚處來曰天台來師曰見智者否曰義存喫鐵棒有分雪峰上問訊師曰入門來須有語不得道早個入了也峰曰某甲無口師曰無口且從還我眼來峰無語雪峰搬柴次乃於師面前拋下一束師曰重多少峰曰盡大地人提不起師曰爭得到這裏峰無語問時時勤拂拭為甚麼不得他衣鉢未審甚麼人合得師曰不入門者曰祗如不入門者還得也無師曰雖然如此不得不與他却又曰直道本來無一物猶未合得他衣鉢汝道甚麼人合得這裏合下得一轉語且道下得甚麼語時有一僧下九十六轉語竝不契末後一轉始愜師意師曰闍黎何不早恁麼道別有一僧密聽祇不聞末後一轉遂請益其僧僧不肯說如是三年相從終不為舉一日因疾其僧曰某三年請舉前話不蒙慈悲善取不得惡取去遂持刀白曰若不為某舉即殺上座去也其僧悚然曰闍黎且待我為你舉乃曰直饒將來亦無處著其僧禮謝雪竇顯云他既不受是眼將來必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付非但大庾嶺頭一個提不起設使合國人來且款款將去天童拈云長蘆即不然直須將來若不將來爭知不受直須不受若不不受爭免將來將來底必應是眼不受底真個是瞎還會麼照盡體無依通身合大道問師尋常教學人行鳥道未審如何是鳥道師曰不逢一人曰如何行師曰直須足下無私去曰祗如行鳥道莫便是本來面目否師曰闍黎因甚顛倒曰甚麼處是學人顛倒師曰若不顛倒因甚麼却認奴作郎曰如何是本來面目師曰不行鳥道後夾山會問僧甚麼處來曰洞山來山曰洞山有何言句示徒曰尋常教學人三路學山曰何者三路曰玄路鳥道展手山曰實有此語否曰實有山曰軌持千里鈔林下道人悲浮山遠曰不因黃葉落焉知是一秋問僧名甚麼曰某甲師曰阿那個是闍黎主人公曰見祇對次師曰苦哉苦哉今時人例皆如此祗認得驢前馬後底將為自己佛法平沉此之是也賓中主尚未分如何辨得主中主僧便問如何是主中主師曰闍黎自道取曰某甲道得即是賓中主如何是主中主師曰恁麼道即易相續也大難遂示頌曰嗟見今時學道流千千萬萬認門頭恰似入京朝聖主祇到潼關即便休有僧不安要見師師遂往僧曰和尚何不救取人家男女師曰你是甚麼人家男女曰某甲是大闡提人家男女師良久僧曰四山相逼時如何師曰老僧日前也向人家屋簷下過來曰回互不回互師曰不回互曰教某甲向甚處去師曰粟畬裏去僧噓一聲曰珍重便坐脫師以拄杖敲頭三下曰汝祇解與麼去不解與麼來因夜參不點燈有僧出問話退後師令侍者點燈乃召適來問話僧出來其僧近前師曰將取三兩粉來與這個上座其僧拂袖而退自此省發遂罄捨衣資設齊得三年後辭師師曰善為時雪峰侍立問曰祇如這僧辭去幾時却來師曰他祇知一去不解再來其僧歸堂就衣鉢下坐化峰上報師師曰雖然如此猶較老僧三生在問僧甚處來曰遊山來師曰還到頂麼曰到師曰頂上有人麼曰無人師曰恁麼則不到頂也曰若不到頂爭知無人師曰何不且住曰某甲不辭住西天有人不肯師曰我從來疑著這漢僧問茱萸如何是沙門行萸曰行則不無有覺即乖別有僧舉似師師曰他何不道未審是甚麼行僧遂進此語萸曰佛行佛行僧回舉似師師曰幽州猶似可最苦是新羅僧却問如何是沙門行師曰頭長三尺頸長二寸師令侍者持此語問三聖然和尚聖於侍者手上掐一掐侍者回舉似師師肯之洗鉢次見兩烏爭蝦蟆有僧便問這個因甚麼到恁麼地師曰祇為闍黎問三身之中阿那身不墮衆數師曰吾嘗於此切僧問曹山先師道吾嘗於此切意作麼生山云要頭便斫去又問雪峯峯以拄杖劈口打云我亦曾到洞山來承天宗云一轉語海晏河清一轉語風高月冷一轉語騎賊馬趂賊忽有個衲僧出來道總不與麼也許伊具隻眼好喜曰恁麼葛藤也未夢見三個老漢在復云何不向膏肓穴上下一針問僧作甚麼來曰孝順和尚來師曰世間甚麼物最孝順僧無對陳尚書問師五十二位菩薩中為甚麼不見妙覺師曰尚書親見妙覺僧問如何是青山白雲父師曰不森森者是曰如何是白雲青山兒師曰不辨東西者是曰如何是白雲終日倚師曰去離不得曰如何是青山總不知師曰不顧視者是師與雲居過水師問水多少居曰不濕師曰粗人居却問水深多少師曰不乾五祖演云二人恁麼說話還有優劣也無山僧今日因行掉臂為你諸人說破過水一句不濕庫藏珍珠推積過水一句不乾無錐說甚貧寒乾濕二途俱不涉任他緑水與青山上堂有一人在千人萬人中不背一人不向一人你道此人具何面目雲居出曰某甲參堂去官人問有人修行否師曰待公作男子即修行上堂還有不報四恩三有者麼衆無對又曰若不體此意何超始終之患直須心心不觸物步步無處所常無間斷始得相應直須努力莫間過日師有時曰體得佛向上事方有些子語話分僧問如何是語話師曰語話時闍黎不聞曰和尚還聞否師曰不語話時即聞僧問如何是佛向上人師曰非佛雲門云名不得狀不得所以言非徑山杲云二尊宿恁麼提持佛向上事且緩緩這裏即不然如何是佛向上事拽拄杖劈脊便打免教伊在佛向上躲根師因曹山辭遂囑曰吾在雲巖先師處親印寶鏡三昧事窮的要今付於汝詞曰如是之法佛祖密付汝今得之宜善保護銀碗盛雪明月藏鷺類之弗齊混則知處意不在言來機亦赴動成窠臼差落顧佇背觸俱非如大火聚但形文彩即屬染污夜半正明天曉不露為物作則用拔諸苦雖非有為不是無語如臨寶鏡形影相覩汝不是渠渠正是汝如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物語未正故重離六爻偏正回互疊而為三變盡成五如荎直尼切草味如金剛杵正中妙挾敲唱雙舉通宗通塗挾帶挾路錯然則吉不可犯忤天真而妙不屬迷悟因緣時節寂然昭著細入無間大絶方所毫忽之差不應律呂今有頓漸緣立宗趣宗趣分矣即是規矩宗通趣極真常流注外寂中搖係駒伏鼠先聖悲之為法檀度隨其顛倒以緇為素顛倒想滅肯心自許要合古轍請觀前古佛道垂成十劫觀樹如虎之缺如馬之馵以有下劣寶几珍御以有驚異貍奴白牯羿以巧力射中百步箭鋒相直巧力何預木人方歌石女起舞非情識到寧容思慮臣奉於君子順於父不順非孝不奉非輔潛行密用如愚若魯但能相續名主中主智證傳洞山悟本禪師所立正中妙挾挾路通宗通塗挾帶傳曰百丈曰依文解義三世佛冤離經一字即同魔說故教外宗旨其所開示必曰藉教如言妙挾則曰正中如言挾路則曰通宗如言挾帶則曰通塗蓋本一挾帶而加妙字耳然挾帶之語必有根本大乘所緣緣義曰言是帶己相者帶與己相各有二義言帶有二義者一者挾帶即能緣心親挾境體而緣二者變帶即能緣心變起相分而緣也曹山見杜順法身頌曰我意不欲與麼道乃自作之曰渠本不是我我本不是渠渠無我即死我無渠即餘渠如我是佛我如渠即驢不食空王俸何假雁傳書我說橫身唱君看背上毛乍如謠白雪猶恐是巴歌豫觀曹山之語皆妙挾也語不挾帶則如能緣之心不挾境體則是渠無我我無渠血脉斷緣世流布想耳非宗旨也幻寄曰觀所緣緣論能緣心親挾境體而緣此似帶質也能緣心變起相分而緣此有質獨影也是皆情量純在偏位臣位此借之明妙挾耳宗塗渠我即偏正也挾帶即兼也師又曰末法時代人多乾慧若要辨驗真僞有三種滲漏一曰見滲漏機不離位墮在毒海二曰情滲漏滯在向背見處偏枯三曰語滲漏究妙失宗機昧終始濁智流轉於此三種子宜知之覺範云大般若經曰應觀欲界色界無色界空善現是菩薩作此觀時不令心亂若心不亂則不見法若不見法則不作證又曰若金翅鳥飛騰虗空自在翱翔久不墮落雖依於空戲而不據空亦不為空之所拘礙昔洞山大師立五位偏正以標準大法約三種滲漏以辨衲子非意斷苟為皆本佛之遺意今叢林聞滲漏之語往往鼻笑雖洞山復出安能為哉又綱要偈三首一敲唱俱行偈曰金針雙鎖備叶路隱全該寶印當風妙重重錦縫開二金鎖玄路偈曰交互明中暗功齊轉覺難力窮忘進退金鎖網鞔鞔三不墮凡聖亦名理事不涉偈曰事理俱不涉回照絶幽微背風無巧拙電火爍難追又偈曰道無心合人人無心合道欲識個中意一老一不老後僧問曹山如何是一老山云不扶持云如何是一不老山云枯木僧又舉似逍遙忠忠云三從六義師不安令沙彌傳語雲居乃囑曰他或問和尚安樂否但道雲巖路相次絶也汝下此語須遠立恐他打汝沙彌領旨去傳語聲未絶早被雲居打一棒將圓寂謂衆曰吾有間名在世誰人為吾除得衆皆無對時沙彌出曰請和尚法號師曰吾間名已謝僧問和尚違和還有不病者也無師曰有曰不病者還看和尚否師曰老僧看他有分曰未審和尚如何看他師曰老僧看時不見有病師乃問僧離此殼漏子向甚麼處與吾相見僧無對師示頌曰學者恆沙無一悟過在尋他舌頭路欲得忘形泯蹤跡努力殷勤空裏步乃命剃髮澡身披衣聲鐘辭衆儼然坐化時大衆號慟移不止師忽開目謂衆曰出家人心不附物是真修行勞生惜死哀悲何益復令主事辦愚癡齊衆猶戀慕不已延七日食具方備師亦隨衆齊畢乃曰僧家無事大率臨行之際勿須喧動遂歸丈室端坐長往當咸通十年三月壽六十三臘四十二諡悟本禪師
