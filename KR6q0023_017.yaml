body:
  text: 六祖下第六世睦州刺史陳操尚書問僧有個事與上座商量得麼曰合取狗口公自摑口曰某甲罪過曰知過必改公曰恁麼則乞上座口喫飯得麼齋次拈起胡餅問僧江西湖南還有這個麼曰尚書適來喫個甚麼公曰敲鐘謝響又與僚屬登樓次見數僧行來有一官人曰來者總是行脚僧公曰不是曰焉知不是公曰待來勘過須臾僧至樓前公驀喚上座僧皆舉首公謂諸官曰不信道看資福福見來便畫一圓相公曰弟子恁麼來皁已是不著便何況師更畫一圓相福便掩却方丈門雪竇云陳操只具一隻眼復頌云團團珠遶玉珊珊馬載驢䭾上鐵船分付海山無事客釣鰲時下一圈圞復云天下衲僧跳不出袁州仰山南塔光涌禪師豫章豐城章氏子母乳之夕神光照庭廐馬皆驚因以光涌名之少甚俊敏依仰山剃度北游謁臨濟復歸侍山山曰汝來作甚麼師曰禮覲和尚山曰還見和尚麼師曰見山曰和尚何似驢師曰某甲見和尚亦不似佛山曰若不似佛似個甚麼師曰若有所似與驢何別山大驚曰凡聖兩忘情盡體露吾以此驗人二十年無決了者子保任之山每指謂人曰此子肉身佛也杭州無著文喜禪師嘉禾語溪人姓朱氏七歲出家常習律聽教後謁大慈山性空禪師空曰子何不徧參乎師直往五臺山華嚴寺至金剛窟禮謁遇一老翁牽牛而行邀師入寺翁呼均提有童子應聲出迎翁縱牛引師陞堂堂宇皆耀金色翁踞牀指繡墩命坐翁曰近自何來師曰南方翁曰南方佛法如何住持師曰末法比丘少奉戒律翁曰多少眾師曰或三百或五百師却問此間佛法如何住持翁曰龍蛇混雜凡聖同居師曰多少眾翁曰前三三後三三翁呼童子致茶并進酥酪師食之覺心意開爽翁拈起玻璃盞問曰南方還有這個否師曰無翁曰尋常將甚麼喫茶師無對師覩日色稍晚遂問翁擬投一宿得否翁曰汝有執心在不得宿師曰某甲無執心翁曰汝曾受戒否師曰受戒久矣翁曰汝若無執心何用受戒師辭退翁令童子相送師問童子前三三後三三是多少童召大德師應諾童曰是多少師復問曰此為何處童曰此金剛窟般若寺也師悽然悟彼翁者即文殊也不可再見即稽首童子願乞一言為別童說偈曰面上無嗔供養具口裏無嗔吐妙香心裏無嗔是珍寶無垢無染是真常言訖均提與寺俱隱但見五色雲中文殊乘金毛師子往來忽有白雲自東方來覆之不見師因駐錫五臺後參仰山頓了心契令充典座文殊甞現於粥鑊上師以攪粥篦便打曰文殊自文殊文喜自文喜殊乃說偈曰苦瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌一日有異僧來求齋食師減己分饋之仰山預知問曰適來果位人至汝給食否師曰輟己回施仰曰汝大利益將順寂於子夜告眾曰三界心盡即是涅槃言訖跏趺而終白光照室竹樹同色塔於靈隱山之西塢天福二年田頵許思之亂宼發師塔覩肉身不壞爪髮俱長錢武肅王異之遣裨將邵志重加封瘞福州雙峰古禪師本業講經因參先雙峰峰問大德甚麼處住曰城裏峰曰尋常還思老僧否曰常思和尚無由禮覲峰曰祇這思底便是大德師從此領旨即罷講席侍奉數年後到石霜但隨眾而已更不參請眾謂古侍者甞受雙峰印記往往聞於石霜霜欲詰其所悟而未得其便師因辭去霜將拂子送出門首召曰古侍者師回首霜曰擬著即差是著即乖不擬不是亦莫作個會除非知有莫能知之好去好去師應喏喏即前邁尋屬雙峰示寂師乃繼續住持僧問和尚當時辭石霜石霜恁麼道意作麼生師曰祇教我不著是非玄覺云且道他會石霜意不會魏府興化存獎禪師初在臨濟為侍者洛浦來參濟問甚處來浦曰鑾城來濟曰有事相借問得麼浦曰新戒不會濟曰打破大唐國覓個不會底人也無參堂去師隨後請問曰適來新到是成褫他不成褫他濟曰我誰管你成褫不成褫師曰和尚祇解將死雀就地彈不解將一轉語盖覆却濟曰你又作麼生師曰請和尚作新到濟遂曰新戒不會師曰却是老僧罪過濟曰你語藏鋒師擬議濟便打至晚濟又曰我今日問新到是將死雀就地彈就窠子裏打及至你出得語又喝起了向青雲裏打師曰草賊大敗濟便打後在三聖會裏為首座常曰我向南方行脚一遭拄杖頭不曾撥著一個會佛法底人三聖聞得問曰你具個甚麼眼便恁麼道師便喝聖曰須是你始得後大覺聞舉遂曰作麼生得風吹到大覺門裏來師後到大覺為院主一日覺喚院主我聞你道向南方行脚一遭拄杖頭不曾撥著一個會佛法底你憑個甚麼道理與麼道師便喝覺便打師又喝覺又打師來日從法堂過覺召院主我直下疑你昨日這兩喝師又喝覺又打師再喝覺亦打師曰某甲於三聖師兄處學得個賓主句總被師兄折倒了也願與某甲個安樂法門覺曰這瞎漢來這裏納敗缺脫下衲衣痛打一頓師於言下薦得臨濟先師於黃檗處喫棒底道理師後開堂日拈香曰此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師師有時喚僧僧應諾師曰點即不到又喚一僧僧應諾師曰到則不點僧問四面八方來時如何師曰打中間底僧便禮拜師曰昨日赴個村齋中途遇一陣卒風暴雨却向古廟裏躲避得過晦堂心頌一不是二不成落花芳草伴啼鸎閑庭雨歇夜初靜片月還從海上生徑山杲頌古廟裏頭回避得紙錢堆裏暗嗟吁閑神野鬼都驚怕只為渠儂識梵書師謂克賓惟那曰汝不久為唱導之師賓曰不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賓維那法戰不勝罰錢五貫設僧飯一堂次日師自白椎曰克賓維那法戰不勝不得喫飯即便出院雪竇云克賓要承嗣興化罰錢出院且致却須索這一頓棒始得且問諸人棒既喫了作麼生索雪竇要斷不平之事今夜與克賓維那雪屈以拄杖一時打散雲居舜云大冶精金應無變色其奈興化令行太嚴不是克賓維那也大難承當若是如今汎汎之徒飜轉面皮多少時也徑山杲云雲居拗曲作直妙喜道要作臨濟烜赫兒孫直須飜轉面皮始得洞山廣道者梓州人叢林號廣無心初遊方問雲盖智和尚興化打維那意旨如何智下禪牀展兩手吐舌示之廣打一坐具智云此是風力所轉又持此語問石霜琳和尚琳云你意作麼生廣亦打一坐具琳云好一坐具祇是你不知落處又問真淨淨云你意作麼生廣亦打一坐具淨云他打你亦打廣於此大悟淨因作頌云丈夫當斷不自斷興化為人徹底漢已後從他眼自開棒了罰錢趁出院示眾曰若是作家戰將便請單刀直入更莫如何若何有旻德禪師出禮拜起便喝師亦喝德又喝師亦喝德禮拜歸眾師曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用首山拈云看他興化與麼用為甚麼放得他過諸上座且道甚麼處是一喝不作一喝用前一喝後一喝且道那個是賓那個是主雖然如是亦須子細便下座又曰二俱有過二俱無過覺範曰予觀首山可謂臨濟興化的骨孫幻寄曰首山如優孟學孫叔敖耳洪公更矢上加尖師見同參來纔上法堂師便喝僧亦喝師又喝僧亦喝師近前拈棒僧又喝師曰你看這瞎漢猶作主在僧擬議師直打下法堂侍者請問適來那僧有甚觸忤和尚師曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到這裏却去不得似這般瞎漢不打更待何時僧禮拜圜悟勤云甚處是興化將手向伊面前劃兩遭處若這裏洞明可以荷負臨濟正法眼藏如或泥水未分未免瞎驢隨大隊雲居住三峰菴時師問權借一問以為影草時如何居無對師云想和尚答這話不得不如禮拜了退二十年後居云如今思量當時不消道個何必後遣化主到師處師問和尚住三峰菴時老僧問伊話對不得如今道得也未主舉前話師云雲居二十年祇道得個何必興化即不然爭如道個不必妙喜曰何必不必綿綿密密覿面當機有人續得末後句許你親見二尊宿後唐莊宗車駕幸河北回至魏府行宮詔師問曰朕收中原獲得一寶未曾有人酬價師曰請陛下寶看帝以兩手舒幞頭脚師曰君王之寶誰敢酬價宗大悅賜紫衣師號師皆不受乃賜馬師乘馬忽驚墜傷足師喚院主與我做個木子主做了將來師接得遶院行問僧曰汝等還識老僧麼曰爭得不識和尚師曰𨁸脚法師說得行不得又至法堂令維那聲鐘集眾師曰還識老僧麼眾無對師擲下拐子端然而逝魏府大覺和尚參臨濟語接興化語具二師章臨終時謂眾曰我有一隻箭要付與人時有一僧出曰請和尚箭師曰汝喚甚麼作箭僧喝師打數下便歸方丈却喚其僧入來問曰汝適來會麼曰不會師又打數下擲却拄杖曰已後遇明眼人分明舉似便乃告寂鎮州寶壽沼禪師在方丈坐因僧問訊次師曰百千諸聖盡不出此方丈內曰祇如古人道大千沙界海中漚未審此方丈向甚麼處著師曰千聖現在曰阿誰證明師便擲下拂子僧從西過東立師便打僧曰若不久參焉知端的師曰三十年後此話大行趙州來師在禪牀背面而坐州展坐具禮拜師起入方丈州收坐具而出師問僧甚處來曰西山來師曰見獼猴麼曰見師曰作甚麼伎倆曰見某甲一個伎倆也作不得師便打鎮州三聖院慧然禪師至仰山山問汝名甚麼師曰慧寂山曰慧寂是我名師曰我名慧然山大笑妙喜曰兩個藏身露影漢殊不顧旁觀者雪竇頌云雙收雙放若為宗騎虎由來要絕功笑罷不知何處去只應千古動悲風圜悟勤云這個笑與巖頭笑不同巖頭笑有毒藥這個笑千古萬古清風凜凜地為甚麼雪竇末後却道只應千古動悲風也是死而不弔一時與你註解了也爭奈天下人啗不入不知落處縱是山僧也不知落處諸人還知麼仰山因有官人相訪山問官居何位曰推官山竪起拂子曰還推得這個麼官人無對山令眾下語皆不契時師不安在涅槃堂內將息山令侍者去請下語師曰但道和尚今日有事山又令侍者問未審有甚麼事師曰再犯不容到德山纔展坐具山曰莫展炊巾這裏無殘羹餿飯師曰縱有也無著處山便打師接住棒推向禪牀上山大笑師哭蒼天便下參堂堂中首座號踢天泰問行脚高士須得本道公驗作麼生是本道公驗師曰道甚麼座再問師打一坐具曰這漆桶前後觸忤多少賢良座擬人事師便過第二座人事上堂我逢人即出出則不為人便下座興化云我逢人則不出出則便為人定州善崔禪師州將王令公於衙署張座請師說法師陞座拈拄杖曰出來也打不出來也打僧出曰崔禪聻師擲下拄杖曰久立令公伏惟珍重幽州談空和尚鎮州牧有姑為尼行脚回欲開堂為人牧令師勘過師問曰見說汝欲開堂為人是否尼曰是師曰尼是五障之身汝作麼生為人尼曰龍女八歲南方無垢世界成等正覺又作麼生師曰龍女有十八變你試一變看尼曰設使變得也祇是個野狐精師便打牧聞舉乃曰和尚棒折那翠巖芝云且道尼具眼麼只擔得個斷貫索作麼生會寶壽和尚問除却中下二根人來時師兄作麼生師曰汝適來舉早錯也壽曰師兄也不得無過師曰汝却與我作師兄壽側掌曰這老賊虎溪菴主僧問菴主在這裏多少年也師曰祇見冬凋夏長年代總不記得曰大好不記得師曰汝道我在這裏得多少年也曰冬凋夏長聻師曰鬧市裏虎覆盆菴主有僧從山下哭上師閉却門僧於門上畫一圓相門外立地師從菴後出却從山下哭上僧喝曰猶作這個去就在師便換手搥胸曰可惜先師一場埋沒僧曰苦苦師曰菴主被謾桐峰菴主僧問和尚這裏忽遇大蟲作麼生師便作大蟲吼僧作怖勢師大笑僧曰這老賊師曰爭奈老僧何雪竇云是則是兩個老賊只解掩耳偷鈴復頌云見之不取思之千里好個斑斑爪牙未備君不見大雄山下忽相逢落落聲光皆振地大丈夫見也無收虎尾兮捋虎鬚幻寄曰雪竇著這兩賊毒手也有老人入山參師曰住在甚處老人不語師曰善能對機老人地上拈一枝草示師師便喝老人禮拜師便歸菴老人曰與麼疑殺一切人在杉洋菴主有僧到參師問阿誰曰杉洋菴主師曰是我僧便喝師作噓聲僧曰猶要棒喫在師便打問僧甚麼處來曰江西來師竪起痒和子曰江西還有這個麼僧拓膝閉目師曰東家廝兒却向西家使喚僧曰有口不煩賓主說師曰適來患聾而今患瘂僧曰買鐵得金一場富貴師曰客作無功未免逃避僧便行師曰自累猶可莫累老僧僧却回向師禮拜師曰若不漝麼已後喪我兒孫定上座初參臨濟問如何是佛法大意濟下禪牀擒住師擬議濟與一掌師佇思傍僧曰定上座何不禮拜師方作禮忽然大悟後南遊路逢巖頭雪峰欽山三人巖頭問上座甚處來師曰臨濟來巖曰和尚萬福師曰和尚已順世也巖曰某甲三人特去禮拜薄福不遇不知和尚在日有何言句請上座舉一兩則師遂舉臨濟上堂曰赤肉團上有一無位真人常在汝等諸人面門出入未證據者看看時有僧問如何是無位真人濟下禪牀搊住曰道道僧擬議濟拓開曰無位真人是甚麼乾矢橛巖頭不覺吐舌雪峰曰臨濟大似白拈賊欽山曰何不道赤肉團上非無位真人師便擒住曰無位真人與非無位真人相去多少速道速道欽山被擒直得面黃面青語之不得巖頭雪峰曰這新戒不識好惡觸忤上座且望慈悲師曰若不是這兩個老漢𡎺殺這尿牀鬼子師在鎮府齋回到橋上坐次逢三人座主一人問如何是禪河深處須窮到底師擒住擬拋向橋下二座主近前諫曰莫怪觸忤上座且望慈悲師曰若不是這兩個座主直教他窮到底奯上座離臨濟參德山山纔見下禪牀作抽坐具勢師曰這個且置或遇心境一如的人來向伊道個甚麼免被諸方檢責山曰猶較昔日三步在別作個主人公來師便喝山默然師曰塞却這老漢咽喉也拂袖便出溈山聞舉云奯上座雖得便宜爭奈掩耳偷鈴蔣山懃云奯公一喝賓主歷然德山無語言徧天下溈山老子雪上加霜子細點檢將來總不可放過乃擲下拄杖參百丈丈曰闍黎有事相借問得麼師曰幸自非言何須譗𧫡丈曰收得安南又憂塞北師擘開胷曰與麼不與麼丈曰要且難搆要且難搆師曰知即得知即得仰山寂云若有人知此二人落處不妨奇特若辨不得大似日中迷路瑞州九峰道虔禪師為石霜侍者洎霜歸寂眾請首座繼住持師白眾曰須明得先師意始可座曰先師有甚麼意師曰先師道休去歇去冷湫湫地去一念萬年去寒灰枯木去古廟香罏去一條白練去其餘則不問如何是一條白練去座曰這個祇是明一色邊事師曰元來未會先師意在座曰你不肯我那但裝香來香烟斷處若去不得即不會先師意遂焚香香烟未斷座已脫去師拊座背曰坐脫立亡即不無先師意未夢見在南堂靜云要識虔侍者麼只是急殺人底漢子要識首座麼也只是孟春猶寒仲春漸煖季春漸暄忽有人喚和尚和尚啞賴他喚一聲若不喚一聲念到臘月三十日也未了在僧問無間中人行甚麼行師曰畜生行曰畜生復行甚麼行師曰無間行曰此猶是長生路上人師曰汝須知有不共命者曰不共甚麼命師曰長生氣不常師乃曰諸兄弟還識得命麼欲知命流泉是命湛寂是身千波競涌是文殊境界一亘晴空是普賢牀榻其次借一句子是指月於中事是話月從上宗門中事如節度使信旗相似且如諸方先德未建許多名目指陳已前諸兄弟約甚麼體格商量到這裏不假三寸試話會看不假耳試釆聽看不假眼試辨白看所以道聲前拋不出句後不藏形盡乾坤大地都來是汝常人個體向甚麼處安眼耳鼻舌莫但向意根下圖度作解盡未來際亦未有休歇分所以洞山道擬將心意學玄宗大似西行却向東珍重問諸聖間出祇是個傳語底人豈不是和尚語師曰是曰祇如世尊生下一手指天一手指地云天上天下唯我獨尊為甚麼喚作傳語底人師曰為他指天指地所以喚作傳語底人僧禮拜而退問盡乾坤都來是個眼如何是乾坤眼師曰乾坤在裏許曰乾坤眼何在師曰正是乾坤眼曰還照燭也無師曰不借三光勢曰既不借三光勢憑何喚作乾坤眼師曰若不如是髑髏前見鬼人無數吳順義初告眾安坐而化洞宗諸語具洞山章台州涌泉景欣禪師彊德二禪客於路次見師騎牛不識師忽曰蹄角甚分明爭奈騎者不鑒師驟牛而去彊德憩於樹下煎茶師回却下牛問曰二禪客近離甚麼處曰那邊師曰那邊事作麼生彊提起茶盞師曰此猶是這邊事那邊事作麼生彊無對師曰莫道騎者不鑒論轉功語具洞山章邵武軍龍湖普聞禪師唐僖宗太子眉目風骨清朗如畫生而不茹葷僖宗百計移之終不得及僖宗幸蜀遂斷髮逸遊人無知者造石霜一夕入室懇曰祖師別傳事肯以相付乎霜曰莫謗祖師師曰天下宗旨盛傳豈妄為之耶霜曰是實事那師曰師意如何霜曰待案山點頭即向汝道前聞俯而惟曰大奇汗下遂拜辭至邵武城外見山蔚然深秀因撥草趨烟起處有一苦行居焉苦行見師至乃曰上人當興此長揖而去師居十餘年一日有一老人拜謁師問住在何處至此欲何求老人曰住於此山然非人龍也行雨不職上天有罰當死願垂救護師曰汝得罪上帝我何能致力無已可易形來俄失老人所在視座傍有一小蛇延緣入袖至暮雷電震山風雨交作師危坐不動達旦晴霽垂袖蛇墮地而去有頃老人拜而泣曰自非大士慈悲為血腥穢此山矣念何以報斯德即穴巖下為泉曰深山乏泉致此以供養人聞之翕然相與唱導聿成崇剎號為龍湖云其旁有神最靈異民致牷饗不絕師仗䇿至廟與之約曰能食素持不殺戒乃可為隣不然道不同不相為謀何山不可居乎是夕之父老夢神告之曰聞禪師為我受戒我不復血食祭我當如比丘飯足矣自是神顯異迹護持此山師將化令擊鐘集眾跏趺而坐說偈曰我逃世難來出家宗師指示個歇處住山聚眾三十年對人不欲輕分付今日分明舉似君我斂目時齊聽取於是斂目安坐寂然良久撼之已化矣塔於本山潭州雲盖山志元圓淨禪師遊方時問雲居曰志元不奈何時如何居曰祇為闍黎功力不到師不禮拜直造石霜亦如前問霜曰非但闍黎老僧亦不奈何師曰和尚為甚麼不奈何霜曰老僧若奈何拈過汝不奈何師便禮拜僧問石霜萬戶俱閉即不問萬戶俱開時如何霜曰堂中事作麼生僧無對經半年始下一轉語曰無人接得渠霜曰道即忒煞道却祇道得八成曰和尚又且如何霜曰無人識得渠師知乃禮拜乞為舉霜不肯師乃抱霜上方丈曰和尚若不道打和尚去在霜曰得在師頻禮拜霜曰無人識得渠師於言下頓省問如何是師子師曰善哮吼僧拊掌曰好手好手師曰青天白日却被鬼迷僧作掀禪牀勢師便打曰驢事未去馬事到來師曰灼然作家僧拂袖出師曰將甌盛水擬比大洋僧參師便作起勢僧便出師曰闍黎且來人事僧回作抽坐具勢師却歸方丈僧曰蒼天蒼天師曰龍頭蛇尾僧近前叉手立師曰敗將投王不存性命道吾問久嚮和尚會禪是否師曰蒼天蒼天吾近前掩師口曰低聲低聲師與一掌吾曰蒼天蒼天師把住曰得與麼無禮吾却與一掌師曰老僧罪過吾拂袖便行師呵呵大笑曰早知如是不見如是師將示寂三日前令侍者喚第一座來師臥出氣一聲座喚侍者曰和尚渴要湯水喫師乃面壁而臥臨終令集眾乃展兩手出舌示之時第三座曰諸人和尚舌根硬也師曰苦哉苦哉誠如第三座所言舌根硬去也言訖而寂鳳翔府石柱禪師遊方時到洞山時䖍和尚垂語曰有四種人一人說過佛祖一步行不得一人行過佛祖一句說不得一人說得行得一人說不得行不得阿那個是其人師出眾曰一人說過佛祖行不得者祇是無舌不許行一人行過佛祖一句說不得者祇是無足不許說一人說得行得者祇是函盖相稱一人說不得行不得者如斷命求活此是石女兒披枷帶鎖山曰闍黎分上作麼生師曰該通分上卓卓寧彰山曰祇如海上明公秀又作麼生師曰幻人相逢拊掌呵呵張拙秀才因禪月大師指參石霜霜問秀才何姓曰姓張名拙霜曰覓巧尚不可得拙自何來張忽有省乃呈偈曰光明寂照徧河沙凡聖含靈共我家一念不生全體現六根纔動被雲遮破除煩惱重增病趣向真如亦是邪隨順世緣無罣礙涅槃生死等空花妙喜曰驢揀濕處尿雲門問僧光明寂照徧河沙豈不是張拙秀才語僧云是門云話墮也澧州洛浦山元安禪師丱歲出家通經論具戒為臨濟侍者濟甞稱之曰此臨濟門下一隻箭誰敢當鋒師自謂已足濟一日問從上來一人行棒一人行喝阿那個親師曰總不親濟曰親處作麼生師便喝濟便打濟一日又拈胡餅示師曰萬種千般不離這個其理不二師曰如何是不二之理濟再拈起餅示之師曰與麼則萬種千般也濟曰屙矢見解師曰羅公照鏡又一日侍立次有座主參濟濟問有一人於三乘十二分教明得有一人不於三乘十二分教明得且道此二人是同是別主曰明得即同明不得即別師曰這裏是甚麼所在說同說別濟顧師曰汝又作麼生師便喝濟送座主回問師汝豈不是適來喝老僧者師曰是濟便打師後辭濟濟問甚麼處去師曰南方去濟以拄杖畫一畫曰過得這個便去師乃喝濟便打師作禮而去濟明日陞堂曰臨濟門下有個赤梢鯉魚搖頭擺尾向南方去不知向誰家虀甕裏淹殺師遊歷罷直往夾山卓菴經年不訪夾山山乃修書令僧馳往師接得便坐却再展手索僧無對師便打曰歸去舉似和尚僧回舉似山曰這僧若開書三日內必來若不開書斯人救不得也夾山却令人伺師出菴便與燒却越三日師果出菴來人報曰菴中火起師亦不顧直到夾山不禮拜乃當面叉手而立山曰雞棲鳳巢非其同類出去師曰自遠趨風請師一接山曰目前無闍黎此間無老僧師便喝山曰住住且莫草草怱怱雲月是同溪山各異截斷天下人舌頭即不無闍黎爭教無舌人解語師佇思山便打因茲服膺興化代云但知作佛莫愁眾生一日問山佛魔不到處如何體會山曰燭明千里像闇室老僧迷又問朝陽已昇夜月不現時如何山曰龍銜海珠遊魚不顧師於言下大悟山將示滅垂語曰石頭一枝看看即滅矣師曰不然山曰何也師曰他家自有青山在山曰苟如是即吾宗不墜矣抵涔陽遇故人因話武陵舊事問曰倐忽數年何處逃難師曰祇在闤闠中曰何不向無人處去師曰無人處有何難曰闤闠中如何逃避師曰雖在闤闠中要且人不識故人罔測上堂末後一句始到牢關鏁斷要津不通凡聖尋常向諸人道任從天下樂欣欣我獨不肯欲知上流之士不將佛祖言教貼在額頭上如龜負圖自取喪身之兆鳳縈金網趨霄漢以何期直須旨外明宗莫向言中取則是以石人機似汝也解唱巴歌汝若似石人雪曲也應和指南一路智者知疏又云學道先須識得自己宗旨方可臨機不失其宜祇如鋒鋩未兆已前都無是個非個瞥爾暫起見聞便有張三李四胡來漢去四姓雜居不親而親是非互起致使玄關固閉識鎻難開疑網羅籠智刀劣剪若不當陽曉示迷子何以知歸欲得大用現前但可頓忘諸見諸見若盡昬霧不生智照洞然更無他物以今學人觸目有滯盖為因他數量作解被他數量該括方寸不能移易所以聽不出聲見不超色假饒併當門頭潔淨自己未能通明還同不了若也單明自己法眼未明此人祇具一隻眼所以是非欣厭貫系不得脫坼自由謂之深可愍傷各自努力龐居士禮拜起曰孟夏毒熱孟冬薄寒師曰莫錯士曰龐公年老師曰何不寒時道寒熱時道熱士曰患聾作麼師曰放你三十棒士曰啞却我口塞却你眼蛤溪道者相訪師問自從犁溪相別今得幾年溪曰和尚猶記得昔年事師曰見說道者總忘却年月也溪曰和尚住持事繁且容仔細看師曰打即打會禪漢溪曰某甲消得師曰道者住山事繁問僧近離甚處曰荊南師曰有一人與麼去還逢麼曰不逢師曰為甚不逢曰若逢即頭粉碎師曰闍黎三寸甚密雲門於江西見其僧乃問還有比語否曰是門曰洛浦倒退三千里問一毫吞盡巨海於中更復何言師曰家有白澤之圖必無如是妖怪保福別云家無白澤之圖亦無如是妖怪問學人擬歸鄉時如何師曰家破人亡子歸何處曰恁麼則不歸去也師曰庭前殘雪日輪消室內紅塵遣誰掃光化元年八月誡主事曰出家之法長物不留播種之時切宜減省締搆之務悉從廢停流光迅速大道玄深苟或因循曷由體悟雖激勵懇切眾以為常略不相儆至冬示微疾亦不倦參請十二月一日告眾曰吾非明即後也今有一事問汝等若道這個是即頭上安頭若道不是即斬頭求活第一座對曰青山不舉足日下不挑燈師曰是甚麼時節作這個語話時有彥從上座對曰離此二塗請和尚不問師曰未在更道曰彥從道不盡師曰我不管汝盡不盡曰彥從無侍者祇對和尚師便休至夜令侍者喚從問曰闍黎今日祇對甚有道理汝合體得先師意先師道目前無法意在目前不是目前法非耳目之所到且道那句是賓那句是主若擇得出分付鉢袋子曰彥從不會師曰汝合會曰彥從實不會師喝出乃曰苦苦玄覺云且道從上座實不會是怕見鉢袋子粘著伊二日午時別僧舉前話問師師曰慈舟不棹清波上劒峽徒勞放木鵞便告寂撫州黃山月輪禪師謁夾山山問名甚麼師曰月輪山作一圓相曰何似這個師曰和尚恁麼語話諸方大有人不肯在山曰闍黎作麼生師曰還見月輪麼山曰闍黎恁麼道此間大有人不肯諸方師乃服膺參訊一日夾山抗聲問曰子是甚麼處人師曰閩中人山曰還識老僧麼師曰和尚還識學人麼山曰不然子且還老僧草鞋錢然後老僧還子廬陵米價師曰恁麼則不識和尚也未委廬陵米作麼價山曰真師子兒善能哮吼乃入室受印洛京韶山普寰禪師僧參師問莫是多口白頭因麼因曰不敢師曰有多少口曰通身是師曰尋常向甚麼處屙曰向韶山口裏屙師曰有韶山口即得無韶山口向甚麼處屙因無語師便打雲門代云這話墮阿師放你三十棒又云韶山今日瓦解氷消遵布衲訪師在山下相見遵問韶山路向甚麼處去師以手指曰嗚那青青黯黯處去遵近前把住曰久嚮韶山莫便是否師曰是即是闍黎有甚麼事遵曰擬伸一問師還答否師曰看君不是金牙作爭解彎弓射尉遲遵曰鳳凰直入烟霄去誰怕林間野雀兒師曰當軒畫鼓從君擊試展家風似老僧遵曰一句迥超千聖外松蘿不與月輪齊師曰饒君直出威音外猶較韶山半月程遵曰過在甚處師曰倜儻之辭時人知有遵曰恁麼則真玉泥中異不撥萬機塵師曰魯班門下徒施巧妙遵曰學人即恁麼未審師意如何師曰玉女夜拋梭織錦於西舍遵曰莫便是和尚家風也無師曰耕夫製玉漏不是行家作遵曰此猶是文言如何是和尚家風師曰橫身當宇宙誰是出頭人遵無語師遂同歸山纔人事了師召近前曰闍黎有衝天之氣老僧有入地之謀闍黎橫吞巨海老僧背負須彌闍黎按劍上來老僧掗鎗相待向上一路速道速道遵曰明鏡當臺請師一鑒師曰不鑒遵曰為甚不鑒師曰水淺無魚徒勞不釣遵無對師便打妙喜曰笑殺睦州陳尊宿鄆州四禪禪師僧問古人有請不背今請和尚入井還背也無師曰深深無別源飲者消諸患鳳翔府天盖山幽禪師因有一院名無垢淨光造浴室有人問既是無垢淨光為甚麼却造浴室僧無語後請師代師曰三秋明月夜不是騁團圓丹霞淳頌雖然答盡深深意爭奈投機句未親欲同本來無垢的更須入水見長人鄂州巖頭全奯禪師泉州柯氏子少禮青原誼公落髮往長安寶壽寺稟戒習經律諸部優游禪苑與雪峰欽山為友謁臨濟濟先化去乃謁仰山纔入門提起坐具曰和尚仰山取拂子擬舉師曰不妨好手後參德山執坐具上法堂瞻視山曰作麼師便喝山曰老僧過在甚麼處師曰兩重公案乃下參堂山曰這個阿師稍似個行脚人至來日上問訊山曰闍黎是昨日新到否曰是山曰甚麼處學得這虗頭來師曰全奯終不自謾山曰他後不得孤負老僧一日參德山方跨門便問是凡是聖山便喝師禮拜有人舉似洞山山曰若不是奯公大難承當師曰洞山老人不識好惡錯下名言我當時一手擡一手搦徑山杲云猛虎不識穽穽中身死蛟龍不怖劍劍下身亡巖頭雖於虎穽之中自有透脫一路向劍刃上有飜身之機若子細點檢將來猶欠悟在即今莫有為巖頭作主底麼出來與大慧相見良久喝一喝拍一拍云洎合停囚長智雪峰在德山作飯頭一日飯遲德山擎鉢下法堂峰曬飯巾次見德山乃曰鐘未鳴鼓未響拓鉢向甚麼處去德山便歸方丈峰舉似師師曰大小德山未會末後句在山聞令侍者喚師去問汝不肯老僧那師密啟其意山乃休明日陞堂果與尋常不同師至僧堂前拊掌大笑曰且喜堂頭老漢會末後句他後天下人不奈伊何雖然也祗得三年活山果三年後示寂徑山杲頌云一撾塗毒聞皆喪身在其中總不知八十翁翁入場屋真誠不是小兒嬉師與羅山卜塔基羅山中路忽曰和尚師回顧曰作麼山舉手指曰這裏好片地師咄曰瓜州賣瓜漢又行數里歇次山禮拜問曰和尚豈不是三十年前在洞山而不肯洞山師曰是又曰和尚豈不是嗣德山又不肯德山師曰是山曰不肯德山即不問祇如洞山有何虧缺師良久曰洞山好佛祇是無光山禮拜無軫上座問羅山巖頭道洞山好佛祇是無光未審洞山有何虧欠便道無光山召軫軫應諾山曰灼然好個佛祇是無光曰大師為甚撥無軫話山曰甚麼處是陳老師撥你話處快道快道軫無語山打三十棒趁出軫舉似招慶慶一夏罵詈至夏末自來問山乃分明舉似慶便作禮懺悔曰洎錯怪大師妙喜曰巖頭父子雖善暗去明來子細檢點將來未免髑髏敲磕問僧甚處來曰西京來師曰黃巢過後還収得劍麼曰收得師引頸近前曰㘞曰師頭落也師呵呵大笑僧後到雪峰峰問甚處來曰巖頭來峰曰巖頭有何言句僧舉前話峰便打三十棒趁出德山一日謂師曰我這裏有兩僧入山住菴多時汝去看他怎生師遂將一斧去見兩人在菴內坐師乃拈起斧曰道得也一下斧道不得也一下斧二人殊不願師擲下斧曰作家作家歸舉似德山山曰汝道他如何師曰洞山門下不道全無若是德山門下未夢見在問三界競起時如何師曰坐却著曰未審師意如何師曰移取廬山來即向汝道徑山杲云巖頭古佛向萬仞崖頭垂手鑊湯罏炭裏蹲身盖為慈悲之故有落草之談今日若有人問雲門三界競起時如何只向他道快便難逢未審師意如何移取雲門山來即向汝道僧問塵中如何辨主師曰銅䤬鑼裏滿盛油招慶問羅山云巖頭道銅䤬鑼裏滿盛油意旨如何山召大師慶應諾山云獼猴入道場山却問明招有人問你作麼生招云箭穿紅日影徑山杲頌云獼猴入道場箭穿紅日影兩個老古錐擔雪共填井喝一喝師因沙汰甘贄家過夏補衣次贄行過師以針作劄勢贄遂整衣欲謝妻問云作甚麼贄云說不得妻云也要大家知贄舉前話妻云此去三十年後須知一回飲水一回咽女子聞云誰知盡大地人性命被奯上座劄將去也師值沙汰於鄂州湖邊作渡子兩岸各挂一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且這婆手中兒甚處得來師便打婆曰婆生七子六個不遇知音祇這一個也不消得便拋向水中上堂吾甞究涅槃經七八年覩三兩段義似衲僧說話又曰休休時有一僧出禮拜請師舉師曰吾教意如字三點第一向東方下一點點開諸菩薩眼第二向西方下一點點諸菩薩命根第三向上方下一點點諸菩薩頂此是第一段義又曰吾教意如摩醯首羅擘開面門竪亞一隻眼此是第二段義又曰吾教意猶如塗毒鼓擊一聲遠近聞者皆喪此是第三段義時小嚴上座問如何是塗毒鼓師以兩手按膝亞身曰韓信臨朝底嚴無語妙喜舉了喝云縮頭去示眾但明取綱宗本無實法不見道無實無虗若向事上即疾若向意根下尋卒摸索不著又曰此是向上人活計只露目前些子如同電拂如擊石火截斷兩頭靈然自在若道向上有法有事真椀鳴聲塗糊汝繫汝古人喚作繫驢橛若將實法與人土亦消不得示眾云夫大統綱宗中事須識句若不識句難作個話會甚麼是句百不思時喚作正句亦云居頂亦云得住亦云歷歷亦云惺惺亦云的的亦云佛未生時亦云得地亦云與麼時將與麼時等破一切是非纔與麼便不與麼便轉轆轆地若也看不過纔被人刺著眼盵瞪地恰似殺不死底羊相似不見古人道沉昏不好須轉得始得觸著便轉纔與麼便不與麼是句亦剗非句亦剗自然轉轆轆自然目前露倮倮地飽地不解却不解齩不見道却物為上逐物為下瞥起微情早落地上若是齩猪狗眼赫赤若有人問如何是禪向伊道合取屎孔著却有些子氣息便知淺深硬糾糾地汝識取這個狸奴面孔與麼時不要故挅伊不要稱量伊於中有一般漢撞著物不解轉刺著屙漉漉地遮般底椎殺萬個亦無罪過若是本色底撥著便上齩人火急却似刺蝟子相似未觸著時自弄毛羽可憐生纔有人撥著便嗔斗㖃地有甚麼近處若也未得與麼蕩蕩地喚作依句修行有則便須等破與麼時一物不存信知從來學得一切言句隘在胷中有甚麼用處不見道辟觀辟句外不放入內不放出截斷兩頭自然光烯烯地不與一物作對便是無諍三昧兄弟若欲得易會但向根本明取欲出不出便須轉一日齩斷後不用尋伊去住底遠近但放却自然露倮倮地不用思搭著昬昬地纔有所重便成窠臼古人喚作貼體衣病最難治是我向前行脚時參著一兩處尊宿只教日夜管帶坐得骨臀生胝口裏水漉漉地初向然燈佛肚裏黑漆漆地道我坐禪守取與麼時猶有欲在不見道無依無欲便是能仁古人道置毒藥安乳中乃至醍醐亦能殺人這個不是汝習學得底這個不是汝去住底不是汝色裏底莫錯認門頭戶口賺汝臘月三十日赤閧閧地無益當莫造作揑怪但知著衣喫飯屙矢送尿隨分遣時莫亂統詐稱道者有一片衣不敢將出曬恐人見怕失道者名圖人讚嘆作恁麼不中心行兄弟亦不要信他繩牀上老榾檛屙漉漉地將為好誑諕人別造地獄著汝在信知古風大好不見道有即是無無即是有與麼送出來時便知深淺這個是古格於中有一般漢信彩吐出來有甚麼記但知喚作禪道但知喚作一句子軟嫩嫰地真是無孔鐵椎聚得一萬個有甚麼用處若是有筋骨底不用多諸處行脚也須帶眼始得莫被人謾不見道依法生解猶落魔界夫唱教須一一從自己胷襟中吐得出來與人為榜樣今時還有與麼漢麼第一切須識取左右句這個是出頭處識取去底識取住底這個是兩頭句亦是左右句亦喚作是非句纔生便齩自然無事兄弟見與麼說還會麼莫終日閧閧地亦無了期欲得易會但知於聲色前不被萬境惑亂自然露倮倮地自然無事送向聲色前蕩蕩地恰似一團火燄相似觸著便燒更有甚麼事不見道非是塵不侵自是我無心時熱珍重人天眼目云四藏鋒者巖頭所立也就事者全事也就理者全理也理事俱藏則曰入就俱不涉理事則曰出就達觀頴頌就事藏鋒事獨全不於理上取言詮錦鱗若不吞香餌棹尾揚鬐戲碧川就理藏鋒理最微豈從事上立毫𨤲新羅子飛天外肯搦林間野雀兒入就藏鋒理事該碧潭風起動雲雷禹門三月桃花浪戴角擎頭免曝鰓出就藏鋒理事忘長天赫日更無妨雷公電母分明說霹靂聲中石火光師甞謂眾曰老漢去時大吼一聲了去唐光啟之後中原盜起眾皆避地師端居宴如也一日賊大至責以無供饋遂倳刃焉師神色自若大呌一聲而終聲聞數十里即光啟三年丁未四月八日也門人後焚之獲舍利四十九粒眾為塔藏之福州雪峰義存禪師泉州南安曾氏子家世奉佛師生惡茹葷於襁褓中聞鐘梵之聲或見幡花像設必為之動容十二出家十七落髮後往幽州寶剎寺受戒久歷禪會在洞山作飯頭淘米次山問淘沙去米淘米去沙師曰沙米一時去山曰大眾喫個甚麼師遂覆却米盆山曰據子因緣合在德山洞山一日問師作甚麼來師曰斫槽來山曰幾斧斫成師曰一斧斫成山曰猶是這邊事那邊事作麼生師曰直得無下手處山曰猶是這邊事那邊事作麼生師休去師辭洞山山曰子甚處去師曰歸嶺中去山曰當時從甚麼路出師曰從飛猿嶺出山曰今回向甚麼路去師曰從飛猿嶺去山曰有一人不從飛猿嶺去子還識麼師曰不識山曰為甚麼不識師曰他無面目山曰子既不識爭知無面目師無對遂謁德山問從上宗乘學人還有分也無山打一棒曰道甚麼師曰不會至明日請益山曰我宗無語句實無一法與人師有省後與巖頭至澧州鰲山鎮阻雪頭每日祇是打睡師一向坐禪一日喚曰師兄師兄且起來頭曰作甚麼師曰今生不著便共文邃個漢行脚到處被他帶累今日到此又祇管打睡頭喝曰噇眠去每日牀上坐恰似七村裏土地他時後日魔魅人家男女去在師自點胷曰我這裏未穩在不敢自謾頭曰我將謂你他日向孤峰頂上盤結草菴播揚大教猶作這個語話師曰我實未穩在頭曰你若實如此據你見處一一通來是處與你證明不是處與你剗却師曰我初到鹽官見上堂舉色空義得個入處頭曰此去三十年切忌舉著又見洞山過水偈曰切忌從他覓迢迢與我疎渠今正是我我今不是渠頭曰若與麼自救也未徹在師又曰後問德山從上宗乘中事學人還有分也無德山打一棒曰道甚麼我當時如桶底脫相似頭喝曰你不聞道從門入者不是家珍師曰他後如何即是頭曰他後若欲播揚大教一一從自己胷襟流出將來與我盖天盖地去師於言下大悟便作禮起連聲呌曰師兄今日始是鰲山成道師與欽山巖頭自湘中入江南至新吳山之下欽山濯足㵎側見菜葉而喜曰此山必有道人可沿流尋之師恚曰汝智眼太濁他日如何辨人彼不惜福如此住山何為哉住後僧問和尚見德山得個甚麼便休去師曰我空手去空手歸有兩僧來師以手拓菴門放身出曰是甚麼僧亦曰是甚麼師低頭歸菴僧辭去師問甚麼處去曰湖南師曰我有個同行住巖頭附汝一書去書曰某書上師兄某一自鰲山成道後迄至於今飽不饑同參某書上僧到巖頭問甚麼處來曰雪峰來有書達和尚頭接了乃問僧別有何言句僧遂舉前話頭曰他道甚麼曰他無語低頭歸菴頭曰噫我當初悔不向伊道末後句若向伊道天下人不奈雪老何僧至夏末請益前話頭曰何不早問曰未敢容易頭曰雪峰雖與我同條生不與我同條死要識末後句祇這是後有僧問招慶慶云彼此皆知何故我若東勝神洲道一句西瞿耶尼洲也知天上道一句人間也知心心相知眼眼相照雪竇頌末後句為君說明暗雙雙底時節同條生也共相知不同條死還殊絕還殊絕黃頭碧眼須甄別南北東西歸去來夜深同看千巖雪僧問徑山杲雪峯三上投子九到洞山為甚麼向鰲山成道山云屋裏販揚州僧云後來住菴有僧敲門雪峯放身出云是甚麼僧亦云是甚麼還有優劣也無山云優則總優劣則總劣僧云為甚麼雪峯低頭歸菴山云疑殺天下人僧云僧舉似巖頭頭云我當時若向伊道末後句天下人不奈雪老何作麼生是末後句山云若不同牀睡焉知被底穿僧云巖頭道雪峯與我同條生不與我同條死要識末後句只這是意旨如何山云殺人須是殺人刀活人須是活人劒乃云古德道青蘿夤緣直上寒松之頂白雲澹佇出沒太虗之中萬法本閑惟人自閙又教中道凡夫見諸法但隨於相轉不了法無相以是不見佛遂舉起拂子云這個是相那個是無相現今目前森羅萬象眼見耳聞悉皆是法又何曾閙來既不曾鬧教甚麼物隨相轉又舉拂子云這個是無相又作麼生了既無可了却向甚麼處見佛且道古德底是教中底是是又是個甚麼若向這裏分剖得出釋迦不先彌勒不後雖然如是未免被山僧拂子穿却鼻孔又舉起拂子云隨相轉也被拂子穿却鼻孔不隨相轉也被拂子穿却鼻孔見佛也被拂子穿却鼻孔不見佛也被拂子穿却鼻孔乃顧視大眾云且作麼生免得此過畢竟水須朝海去到頭雲定覔山歸擊禪牀下座僧問西山和尚如何是祖師西來意山舉拂子示之其僧不肯後參師師問甚處來云浙中來師曰今夏在甚處曰蘇州西山師曰和尚安否曰來時萬福師曰何不在彼從容曰佛法不明師曰有甚麼事僧舉前話師曰汝作麼生不肯他曰是境師曰汝見蘇州人家男女否曰見師曰汝見路上林木否曰見師曰凡覩人家男女大地林沼總是境汝肯他否曰肯師曰祇如拈拂子汝作麼生不肯僧乃禮拜曰學人取次發言乞和尚慈悲師曰盡乾坤是個眼汝向甚麼處蹲坐僧無對師問僧見說大德曾為天使來是否僧曰不敢師曰又爭解恁麼來僧曰仰慕道德豈憚關山師曰汝猶醉在出去僧便出師乃召大德僧回首師曰是甚麼僧亦曰是甚麼師曰這漆桶僧無語師顧謂鏡清曰好個師僧向漆桶裏折倒清云和尚豈不是據欵結案師曰也是我尋甞用底忽若喚回向伊道是甚麼被他道這漆桶又作麼生清曰成何道理師曰我與麼及伊汝又道據欵結案伊與麼及我汝又道成何道理一等是恁麼時節其間有得有不得清云不見道醍醐上味為世所珍遇斯等人飜成毒藥雪竇云看他父子相投言氣相合知者謂粉骨碎身此恩難報不知者謂扶高抑下臨危悚人毒藥醍醐千古龜鑑還會麼這漆桶有一僧山下卓菴多年不剃頭畜一長柄杓溪邊舀水時有僧問如何是祖師西來意主曰溪深杓柄長師聞得乃曰也甚奇怪一日將剃刀同侍者去訪纔相見便舉前話問是菴主語否主曰是師曰若道得即不剃你頭主便洗頭胡跪師前師即與剃却三聖問透網金鱗以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁雪竇顯云可惜放過好與三十棒這棒一棒也饒不得直是罕遇作家五祖演云眾中或謂雪峯三聖宗派不同故言不相契或謂三聖作家雪峯不能達其意如斯話會有何交涉若問五祖透網金鱗以何為食只向伊道好個問頭且道與雪峯是同是別圜悟勤云雪竇道便打是有過是無過你若辨得出拄杖子屬你普請次路逢一獼猴師曰人人有一面古鏡這個獼猴亦有一面古鏡三聖曰曠劫無名何以彰為古鏡師曰瑕生也聖曰這老漢著甚麼死急話頭也不識師曰老僧住持事繁雪竇顯云好與三十棒這棒放過也好免見將錯就錯問僧甚處來曰溈山來師曰溈山有何言句曰某甲曾問如何是祖師西來意溈山據座師曰汝肯他否曰某甲不肯他師曰溈山古佛汝速去懺悔玄沙云山頭和尚蹉過溈山僧問意旨如何沙云大小溈山被這僧一問直得百雜碎問古磵寒泉時如何師曰瞪目不見底曰飲者如何師曰不從口入僧舉似趙州州曰不從口入不可從鼻孔裏入僧却問古磵寒泉時如何州曰苦曰飲者如何州曰死師聞得乃曰趙州古佛遙望作禮自此不答話雪竇拈云眾中總道雪峰不出這僧問頭所以趙州不肯如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平高難為作者徑山杲云雪峰不答話疑殺多少人趙州道苦面赤不如語直若是妙喜即不然古磵寒泉時如何到江扶客棹出嶽濟民田飲者如何清凉肺腑此話有兩負門若人檢點得出許你具參學眼問僧甚麼處去曰識得即知去處師曰你是了事人亂走作麼曰和尚莫塗污人好師曰我即不塗污你古人吹布毛作麼生與我說來看曰殘羹餿飯已有人喫了師休去雲門別前語築著便作屎臭氣又代後語將謂是鑽天子元來只是死水裏蝦蟇雪竇出雪峯語云一死更不再活僧問聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何師打三下後問巖頭頭打三掌雪竇云應病與藥且打三下據令而行合打多少天童云雪竇一期趁快後人往往作行令會殊不知雪峯巖頭是個無固必漢問僧甚處來曰近離浙中師曰船來陸來曰二塗俱不涉師曰爭得到這裏曰有甚麼隔礙師便打趁出僧過十年後再來師又問甚處來曰湖南師曰湖南與這裏相去多少曰不隔師竪起拂子曰還隔這個麼曰若隔即不到也師又打趁出此僧住後凡見人便罵師一日有同行聞特去訪問兄到雪峰有何言句便如是罵他遂舉前話被同行詬叱與他說破這僧當時悲泣常向中夜焚香遙禮問僧甚處去曰禮拜徑山和尚去師曰徑山若問此間佛法如何汝作麼生祇對曰待問即道師便打後舉問鏡清這僧過在甚麼處清曰問得徑山徹困師曰徑山在浙中因甚麼問得徹困清曰不見道遠問近對師曰如是如是問僧近離甚處曰覆船師曰生死海未渡為甚麼覆却船僧無對乃回舉似覆船船曰何不道渠無生死僧再至進此語師曰此不是汝語曰是覆船恁麼道師曰我有二十棒寄與覆船二十棒老僧自喫不干闍黎事玄沙謂師曰某甲如今大用去和尚作麼生師將三個木毬一時拋出沙作斫牌勢師曰你親在靈山方得如此沙曰也是自家事妙喜曰祇許老胡知不許老胡會一日陞座眾集定師輥出木毬玄沙遂捉來安舊處師一日在僧堂內燒火閉却前後門乃叫曰救火救火玄沙將一片柴從牕櫺中拋入師便開門上堂南山有一條鼈鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢有僧舉似玄沙沙曰須是稜兄始得雖然如是我即不然曰和尚作麼生沙曰用南山作麼雪竇頌象骨巖高人不到到者須是弄蛇手稜師備師不奈何喪身失命有多少韶陽知重撥草南北東西無處討忽然突出拄杖頭拋對雪峰大張口大張口兮同閃電剔起眉毛還不見如今藏在乳峰前來者一一看方便高聲喝云看脚下真淨示眾舉此云雪峰云南山有條鼈鼻蛇汝等諸人出入好看雪峰無大人相然則蛇無頭不行長慶恰似個新婦兒怕阿家相似便道堂中今日大有人喪身失命雲門拽拄杖攛向雪峰面前作怕勢為蛇畫足玄沙云用南山作甚麼道我見處親切不免只在窠窟裏更無有一人有些子天然氣槩報寧門下莫有天然氣槩底麼不敢望你別懸慧日獨振玄風且向古人鶻臭布衫上知些子氣息也難得上堂舉拂子曰這個為中下僧問上上人來如何師舉拂子僧曰這個為中下師便打雲門云我不似雪峰打破這葛藤乃拈拄杖云這個為中下機人僧問忽遇上上機人來如何門便打師上堂云盡大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看長慶問雲門曰雪峰與麼道還有出頭不得處麼門曰有曰作麼生門曰不可總作野狐精見解又曰狼藉不少圜悟勤云眾中道心是萬法之主盡大地一時在我手裏且喜沒交涉雪竇顯頌牛頭沒馬頭回曹溪鏡裏絕塵埃打鼓看來君不見百花春至為誰開師云飯籮邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死漢水裏沒頭浸渴死漢雲門云通身是飯通身是水妙喜舉了喝云多嘴阿師可煞忍俊不禁通身是飯通身是水那裏得這消息來上堂諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也保福展舉問鵞湖智孚僧堂前相見即且置祇如望州亭烏石嶺甚麼處相見鵞湖驟步歸方丈保福低頭入僧堂師將示寂自製塔銘并敘曰夫從緣有者始終而成壞非從緣得者歷劫而常堅堅之則在壞之則捐雖然離散未至何妨預置者哉所以疊石結室剪木成函搬土積塊為龕諸事已備頭南脚北橫山而臥惟願至時同道者莫違我意知心者不易我志深囑再囑幸勉勵焉縱然他日邪造顯揚豈如當今正眼密弘善思之審思之銘曰兄弟橫十字雪竇註云國無二君又云知麼同心著一儀風行草偃又云直與土主曰松山四顧匪絕又云看卵塔號難提獨露相倚又云險更有胡家曲一西一東又云大難汝等切須知自南自北又云會也我唱泥牛吼聞莫舉頭又云呵呵汝和木馬嘶見應合眼又云撫掌但看五六月豈可徒然又云吁氷片滿長街事非草草又云苦薪盡火滅後去去誰同又云好住密室爛如泥須到如此又云努力梁開平戊辰三月示疾閩帥命醫師曰吾非疾也竟不服藥遺偈付法五月二日朝遊藍田暮歸澡身中夜入滅壽八十七臘五十九泉州瓦棺和尚在德山為侍者一日同入山斫木山將一碗水與師師接得便喫却山曰會麼師曰不會山又將一碗水與師師又接喫却山曰會麼師曰不會山曰何不成褫取不會底師曰不會又成褫個甚麼山曰子大似個鐵橛住後雪峰訪師茶話次峰問當時在德山斫木因緣作麼生師曰先師當時肯我峰曰和尚離師太早時面前偶有一碗水峰曰將水來師便度與峰接得便潑却雲門云莫壓良為賤襄州高亭簡禪師參德山隔江纔見便云不審山乃搖扇招之師忽開悟乃橫趨而去更不回顧音釋卷十四之十七挼奴何切音那兩手相切摩切捋盧活切鸞入聲掇取也齶逆各切音噩齒內上下肉也瀏力求切音流覯居候切音垢遇見也𡱰都谷切音篤尾下竅也濼音泊陂澤也𣽅古活切音括水流聲臛火酷切音熇摟盧侯切樓𮩴陟慮切音註馬懸足也鞔謨官切音瞞荎直尼切音持即五味子也缺音闕虧也羿倪制切音詣古射師頵規倫切音均瘞於計切音意埋藏也奯呼括切音豁譗竹洽切音劄𧫡職日切音質言無倫也涔鉏林切音岑鄆禹慍切音運倳資四切音恣置也陟栗切音質叱呵也漝音習影也又水貌齁呼侯切吼平聲鼻息也盵去冀切音氣瞪音棖直視貌
