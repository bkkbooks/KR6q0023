body:
  text: 六祖下第五世鎮州臨濟義玄禪師曹州南華邢氏子幼負出塵之志及落髮進具便慕禪宗初在黃檗會中行業純一時睦州為第一座乃問上座在此多少時師曰三年州曰曾參問否師曰不曾參問不知問個甚麼州曰何不問堂頭和尚如何是佛法的的大意師便去問聲未絕檗便打師下來州曰問話作麼生師曰某甲問聲未絕和尚便打某甲不會州曰但更去問師又問檗又打如是三度問三度被打師白州曰早承激勸問法累蒙和尚賜棒自恨障緣不領深旨今且辭去州曰汝若去須辭和尚了去師禮拜退州先到黃檗處曰問話上座雖是後生却甚奇特若來辭方便接伊已後為一株大樹覆蔭天下人去在師來日辭黃檗檗曰不須他去祇往高安灘頭參大愚必為汝說師到大愚愚曰甚處來師曰黃檗來愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來這裏問有過無過師於言下大悟乃曰元來黃檗佛法無多子愚搊住曰這尿牀鬼子適來道有過無過如今却道黃檗佛法無多子你見個甚麼道理速道速道師於大愚肋下築三拳愚拓開曰汝師黃檗非干我事師辭大愚却回黃檗檗見便問這漢來來去去有甚了期師曰祇為老婆心切便人事了侍立檗問甚處去來師曰昨蒙和尚慈旨令參大愚去來檗曰大愚有何言句師舉前話檗曰大愚老漢饒舌待來痛與一頓師曰說甚待來即今便打隨後便掌檗曰這風顛漢來這裏捋虎鬚師便喝檗喚侍者曰引這風顛漢參堂去溈山舉問仰山臨濟當時得大愚力得黃檗力仰云非但騎虎頭亦解把虎尾黃檗一日普請次師隨後行檗回頭見師空手乃問钁在何處師云有一人將去了也檗曰近前來共汝商量個事師便近前檗竪起钁曰祇這個天下人拈掇不起師就手掣得竪起曰為甚麼却在某甲手裏檗曰今日自有人普請便回寺師鉏地次見黃檗來拄钁而立檗曰這漢困那師曰钁也未舉困個甚麼檗便打師接住棒一送送倒檗呼維那扶起我來維那扶起曰和尚爭容得這風顛漢無禮檗纔起便打維那師钁地曰諸方火塟我這裏活埋師一日在僧堂前坐見黃檗來便閉却目黃檗乃作怖勢便歸方丈師隨至方丈禮謝首座在黃檗處侍立黃檗云此僧雖是後生却知有此事首座云老和尚脚跟不點地却證據個後生黃檗自於口上打一摑首座云知即得師在僧堂裏睡檗入堂見以拄杖打板頭一下師舉首見是檗却又睡檗又打板頭一下却往上間見首座坐禪乃曰下間後生却坐禪汝在這裏妄想作麼座曰這老漢作甚麼檗又打板頭一下便出去溈山舉問仰山祇如黃檗意作麼生仰云兩彩一賽師栽松次檗曰深山裏栽許多松作甚麼師曰一與山門作境致二與後人作標榜道了將钁頭𡎺地三下檗曰雖然如是子已喫吾三十棒了也師又𡎺地三下噓一噓檗曰吾宗到汝大興於世黃檗因入厨下問飯頭作甚麼頭曰揀眾僧飯米檗曰一頓喫多少頭曰二石五檗曰莫太多麼頭曰猶恐少在檗便打頭舉似師師曰吾與汝勘這老漢纔到侍立檗舉前話師曰飯頭不會請和尚代轉一語檗曰汝但舉師曰莫太多麼檗曰來日更喫一頓師曰說甚麼來日即今便喫隨後打一掌檗曰這風顛漢又來這裏捋虎鬚師喝一喝便出去溈山舉問仰山此二尊宿意作麼生仰山云和尚作麼生溈山云養子方知父慈仰山云不然溈山云子又作麼生仰山云大似勾賊破家徑山有五百眾少人參請黃檗令師到徑山乃謂師曰汝到彼作麼生師曰某甲到彼自有方便師到徑山裝腰上法堂見徑山徑山方舉頭師便喝徑山擬開口師拂袖便行尋有僧問徑山這僧適來有甚麼言句便喝和尚徑山云這僧從黃檗會裏來你要知麼自問取他徑山五百眾大半分散師中夏上黃檗山見檗看經師曰我將謂是個人元來是唵或作揞黑豆老和尚住數日乃辭檗曰汝破夏來何不終夏去師曰某甲暫來禮拜和尚檗便打趁令去師行數里疑此事却回終夏後又辭檗檗曰甚處去師曰不是河南便歸河北檗便打師約住與一掌檗大笑乃喚侍者將百丈先師禪板几案來師曰侍者將火來檗曰不然子但將去已後坐斷天下人舌頭去在到龍光值上堂師出問不展鋒鋩如何得勝光據座師曰大善知識豈無方便光瞪目曰嗄師以手指曰這老漢今日敗缺也到三峰平和尚處平問甚處來師曰黃檗來平曰黃檗有何言句師曰金牛昨夜遭塗炭直至如今不見蹤平曰金風吹玉管那個是知音師曰直透萬重關不住青霄內平曰子這一問太高生師曰龍生金鳳子衝破碧琉璃平曰且坐喫茶又問近離甚處師曰龍光平曰龍光近日何如師便出去往鳳林路逢一婆子婆問甚處去師曰鳳林去婆曰恰值鳳林不在師曰甚處去婆便行師召婆婆回首師便行一作師曰誰道不在到鳳林林曰有事相借問得麼師曰何得剜肉作瘡林曰海月澄無影遊魚獨自迷師曰海月既無影遊魚何得迷一本作海月元無影遊魚本不迷此從會元林曰觀風知浪起翫水野帆飄師曰孤蟾獨耀江山靜長嘯一聲天地秋林曰任張三寸揮天地一句臨機試道看師曰路逢劒客須呈劒不是詩人莫獻詩林便休師乃有頌曰大道絕同任向西東石火莫及電光罔通溈山問仰山石火莫及電光罔通從上諸聖以何為人仰云和尚意作麼生溈云但有言說都無實義仰云不然溈云子又作麼生仰云官不容針私通車馬到大慈慈在方丈內坐師問端居丈室時如何慈云寒松一色千年別野老拈花萬國春師云今古永超圓智體三山鎖斷萬重關慈便喝師亦喝慈云作麼師拂袖便出到襄州華嚴華嚴倚拄杖作睡勢師云老和尚瞌睡作麼嚴云作家禪客宛爾不同師云侍者點茶來與老和尚喫嚴乃喚維那第三位安排這上座到翠峰峰問甚處來師云黃檗來峰云黃檗有何言句指示於人師云黃檗無言句峰云為甚麼無師云設有亦無舉處峰云但舉看師云一箭過西天到象田師問不凡不聖請師速道田云老僧祇與麼師便喝云許多禿子在這裏覓甚麼椀到明化化問來來去去作甚麼師云祇圖踏破草鞋化云畢竟作麼生師云老漢話頭也不識到初祖塔頭塔主云長老先禮佛先禮祖師云佛祖俱不禮塔主云佛祖與長老是什麼冤家師便拂袖而出到金牛牛見師來橫按拄杖當門踞坐師以手敲拄杖三下却歸堂中第一位坐牛下來見乃問夫賓主相看各具威儀上座從何而來太無禮生師云老和尚道甚麼牛擬開口師便打一坐具牛作倒勢師又打一坐具牛曰今日不著便遂歸方丈溈山問仰山此二尊宿還有勝負也無仰云勝即總勝負即總負師為黃檗馳書到溈山時仰山作知客接得書便問者個是黃檗底那個是專使底師便掌仰山約住云老兄知是般事便休同去見溈山溈山便問黃檗師兄多少眾師云七百眾溈山云什麼人為導首師云適來已達書了也師却問溈山和尚此間多少眾溈山云一千五百眾師云太多生溈山云黃檗師兄亦不少師辭溈山仰山送出云汝向後北去有個住處師云豈有與麼事仰山云但去已後有一人佐輔老兄在此人祇是有頭無尾有始無終懸記普化師後到鎮州普化已在彼師出世普化佐贊于師師住未久普化全身脫去師後住鎮州臨濟學侶雲集一日謂普化克符二上座曰我欲於此建立黃檗宗旨汝且成褫我二人珍重下去三日後普化却上來問和尚三日前說甚麼師便打三日後克符上來問和尚三日前打普化作麼師亦打至晚小參曰有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪克符問如何是奪人不奪境師曰煦日發生鋪地錦嬰兒垂髮白如絲符曰如何是奪境不奪人師曰王令已行天下徧將軍塞外絕烟塵符曰如何是人境俱奪師曰并汾絕信獨處一方符曰如何是人境俱不奪師曰王登寶殿野老謳歌符於言下領旨諸方自此為四料揀師又甞示眾曰如諸方學人來山僧此間作三種根器斷如中下根器來我便奪其境而不除其法或中上根器來我便境法俱奪如上上根器來我便境法人俱奪如有出格見解人來山僧此間便全體作用不歷根器大德到這裏學人著力處不通風石火電光即過了也學人若眼定動即沒交涉擬心即差動念即乖有人解者不離目前大慧宗杲禪師因悅禪人請普說僧問臨濟示眾云有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪如何是奪人不奪境師云三千里外絕諸訛進云如何是奪境不奪人師云拔出眼中楔進云臨濟道煦日發生鋪地錦嬰孩垂髮白如絲未審與和尚答底是同是別師云咬人屎橛不是好狗進云王令已行天下徧將軍塞外絕烟塵時如何師云適來猶自可而今更郎當復云此事決定不在言語上所以從上諸聖次第出世各各以善巧方便忉忉怛怛唯恐人泥在語言上若在言語上一大藏教五千四十八卷說權說實說有說無說頓說漸是豈無言說因甚麼達磨西來却言單傳心印不立文字語言直指人心見性成佛因何不說傳玄傳妙傳言傳語只要當人各各直下明自本心見自本性事不獲已說個心說個性已大段狼藉了也若要得生死根株盡切不得記我說底縱饒念得一大藏教如瓶瀉水喚作運糞入不名運糞出却被這些子障却自己正知見不得現前自己神通不能發現只管弄目前光影理會禪理會道理會心理會性理會奇特理會玄妙大似掉棒打月枉費心神如來說為可憐憫者古人凡有一言半句設一個金剛圈栗𣗥蓬教伊吞教伊透若是個英靈獨脫出情塵超理性者金剛圈栗𣗥蓬是甚麼弄猢孫家具祭鬼神茶飯葢你不能一念緣起無生只管一向在心意識邊作活計纔見宗師動口便向宗師口裏討玄討妙却被宗師倒翻筋斗自家本命元辰依舊不知落處脚跟下黑漫漫依前只是個漆桶只如適來上座問奪人不奪境一段話只知冊子上念將來如法答他又理會不得問一段未了又問一段恰如村人打傳口令相似我今不惜口業為你諸人葛藤註解一徧臨濟一日示眾云有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪會麼良久左右顧視便下座這個便是金剛王寶劍我昨日說底將蜈蚣毒蛇蠍子并諸雜毒貯在一甕裏你試將手就中拈一個不毒底出來看若拈得出不妨於此事有少分相應若拈不出自是你根性遲鈍夙無靈骨也怪妙喜不得臨濟當時道這幾句閑言長語面目現在自是你不會看得出你若領得此意自從胡亂後三十年不少鹽醬鐘樓上念讚牀脚下種菜之類不著問人一一自知下落古人垂個方便豈是閑開口須知爛泥裏有刺當時有個克符道者理會得臨濟意便出來問如何是奪人不奪境臨濟當時不知那裏得許多閑言長語闘凑得恰好便道煦日發生鋪地錦嬰孩垂髮白如絲諸人還會麼煦日發生鋪地錦是境嬰孩垂髮白如絲是人此兩句一句存境一句奪人克符又作頌曰奪人不奪境緣自帶誵訛師云有甚麼誵訛擬欲求玄旨思量反責麼師云誣人之罪驪珠光璨爛仙桂影婆娑師云何不早恁麼道覿面無差互還應滯網羅師云依稀似曲纔堪聽又被風吹別調中此頌大槩在驪珠光璨爛仙桂影婆娑之上蓋此兩句是境學者問不奪境擬欲求玄旨思量反責麼大意只是不可思量擬議思量擬議者人也蹉却覿面相呈一著子即被語言網羅矣克符此頌專明煦日發生鋪地錦所以有驪珠光璨爛仙桂影婆娑之句乃是存境而奪人故曰覿面無差互還應滯網羅奪人之義醍醐毒藥一道而行具眼者方能辨別又問如何是奪境不奪人答云王令已行天下徧將軍塞外絕烟塵師云王令已行天下徧是奪了境將軍塞外絕烟塵是存人而不奪頌曰奪境不奪人尋言何處真師云也須閑處作提防問禪禪是妄究理理非親師云好事不如無日照寒光澹山搖翠色新師云貧兒思舊債直饒玄會得也是眼中塵師云自起自倒你要會日照寒光澹山搖翠色新麼此兩句是境直饒玄會得也是眼中塵便奪了也其餘人境兩俱奪人境俱不奪盡是依語就學家問處答又問如何是人境兩俱奪答云并汾信絕獨處一方便有人境兩俱奪面目頌曰人境兩俱奪從來正令行師云已落第二不論佛與祖那說聖凡情師云買石得雲饒擬犯吹毛劍還如值木盲師云識法者懼進前求妙會特地斬精靈師云前箭猶輕後箭深正令既行不留佛祖到這裏進之退之性命都在師家手裏如吹毛劍不可犯其鋒又問如何是人境俱不奪答云王登寶殿野老謳歌頌曰人境俱不奪思量意不偏師云會麼是法住法位主賓言不異師云世間相常住問答理俱全師云添一毫不得減一毫不得蹋破澄潭月師云猶有這個在穿開碧落天師云勞而無功不能明妙用師云動著即錯淪溺在無緣師云却依舊處著這個是適來上座請益底公案謂之四料揀你若要分明理會得臨濟意但向他當時垂示處看如何看山僧有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪若恁麼便是你若作山僧有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪便不是了也所以五祖師翁有言如何是祖師西來意庭前柏樹子恁麼會便不是了也如何是祖師西來意庭前柏樹子恁麼會方始是你諸人還會麼這般說話莫道是你諸人理會不得妙喜也自理會不得我此門中無理會得理會不得蚊子上鐵牛無你下嘴處須信古人垂慈則有法無法不垂慈道眼未開大法未明豈免向他人口裏覓禪覓道覓玄覓妙覓得了惟恐人知及至說時又恐說盡了末後無可說這個是無限量底法你以有限量心擬窮他落處且莫錯只如世尊在靈山會上百萬眾前拈華普示獨迦葉破顏微笑何曾怕人知又何曾密室裏傳授來我這裏禪許你眾人聞不許你眾人會如上所解註者四料揀你諸人齊聞齊會了臨濟之意果如是乎若只如是臨濟宗旨豈到今日你諸人聞妙喜說得落將謂止如此我實向你道此是第一等惡口若記著一個元字脚便是生死根本也你諸人諸方學得底玄中又玄妙中又妙是甚麼屎禪一向𡎺在皮袋裏將謂實有恁麼事莫錯諸上座你真個要參妙喜禪盡將諸方學得底埽向他方世界百不知百不會虗却心來共你理會僧問如何是真佛真法真道乞師開示師曰佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無實有如真正作道人念念心不間斷自達磨大師從西土來祇是覓個不受人惑底人後遇二祖一言便了始知從前虗用工夫山僧今日見處與祖佛不別若第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧便問如何是第一句師曰三要印開朱點窄未容擬議主賓分曰如何是第二句師曰妙解豈容無著問漚和爭負截流機曰如何是第三句師曰但看棚頭弄傀儡抽牽全藉裏頭人乃曰大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會南院顒問風穴沼曰臨濟有三句當日有問如何是第一句臨濟曰三要印開朱點窄未容擬議主賓分風穴隨聲便喝又問如何是第二句臨濟曰妙解豈容無著問漚和爭負截流機風穴曰未問已前錯又問曰如何是第三句臨濟曰但看棚頭弄傀儡抽牽全藉裏頭人風穴曰明破即不堪南院深許之後神鼎諲舉云若人問神鼎如何是第一句云蒼天蒼天如何是第二句云有什麼驢漢如何是第三句云近前來向你道纔近前便打若恁麼會得也不孤負祖師西來若是從頭一一問過幾時得休佛法不是磨稜合縫底道理似這一脉說話須是久在他門風來始得直是嫌佛不作嫌法不說方可如是子細珍重首山上堂舉三句語時有僧問如何是第一句山曰大用不揚眉棒下須見血曰慈悲何在山曰送出三門外問如何是第二句山曰不打恁麼驢漢曰將何接人山曰如斯爭奈何問如何是第三句山曰解問無人答曰即今祗對者是誰山曰莫使外人知曰和尚是第幾句薦得山曰月落三更穿市過洪覺範智證傳引涅槃經圓伊三點語及塗毒鼓語而為傳曰巖頭奯禪師甞曰涅槃經此三段義似宗門夫言似則非宗門旨要明矣然宗門旨要雖即文字語言不可見離文字語言亦安能見哉臨濟曰大凡舉唱須一句中具三玄一玄中具三要有玄有要此塗毒鼓聲也臨濟歿二百年尚有聞而死者夫分賓主如竝存照用如別立君臣如縱慈明曰一句分賓主照用一時行要會個中意日午打三更同安曰賓主穆時全是妄君臣合處正中邪還鄉曲調如何唱明月堂前枯樹花如前語句皆非一代時教之所管攝摩醯首羅面上亞竪一目非常目也幻寄曰洪師如竝如別如縱語若錯認則罪深於薦福古也覺範著臨濟宗旨曰汾陽昭禪師示眾曰先聖云一句語須具三玄一玄中須具三要阿那個是三玄三要底句快會取好各自思量還得穩當也未古德已前行脚聞一個因緣未明中間直下飲食無味睡臥不安火急決擇豈將為小事所以大覺老人為一大事因緣出現於世想計他從上來行脚不為游山翫水看州府奢華片衣口食皆為聖心未通所以驅馳行脚決擇深奧傳唱敷揚博問先知親近高德葢為續佛心燈紹隆佛種祖代興崇聖種接引後機自利利他不忘先迹如今還有商量者麼有即出來大家商量僧問如何是接初機底句答曰汝是行脚僧又問如何是辨衲僧底句答曰西方日出卯又問如何是正令行底句答曰千里持來呈舊面又問如何是立乾坤底句答曰北俱盧洲長粳米食者無嗔亦無喜師曰只將此四轉語驗天下衲僧纔見汝出來驗得了也僧問如何是學人著力處答曰嘉州打大像問如何是學人轉身處答曰陝府灌鐵牛問如何是學人親切處答曰西河弄師子師曰若人會此三句已辨三玄更有三要語在切須薦取不是等閑與大眾頌出曰三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新還會麼恁麼會得不是性燥底衲僧作麼生會好又舉三玄語曰汝還會三玄底時節麼直須明取古人意旨然後自心明去更得通變自在受用無窮喚作自受用身佛不從他教便識得自家活計所以南泉曰王老師十八上解作活計僧便問古人十八上解作活計未審作個甚麼活計答曰兩隻水牯牛雙角無欄棬復云若要於此明得去直須得三玄旨趣始得受用無礙自家慶快以暢平生大丈夫漢莫教自辜觸事不通彼此無利濟與汝一切頌出曰第一玄法界廣無邊森羅及萬象總在鏡中圓第二玄釋尊問阿難多聞隨事答隨器量方圓第三玄直出古皇前四句百非外閭氏問豐干師乃曰這個是三玄底頌作麼生是三玄底旨趣直教決擇分明莫只與麼望空裏妄解道我曾親近和尚來與我說了脫空漫語誑嚇它人喫鐵棒有日莫言不道又因採菊謂眾曰金花布地玉蘂承天杲日當空乾坤朗耀雲騰致雨露結為霜不傷物義道將一句來還有道得底麼若道不得眼中有屑直須出却始得所以風穴云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安怗於此明去闍黎無分全是老僧於此不明老僧即是闍黎闍黎與老僧亦能悟却天下人亦能瞎却天下人要知老僧與闍黎麼拊其膝曰這裏是闍黎這裏是老僧且問諸上座老僧與闍黎是同是別若道是同去上座自上座老僧自老僧若道是別去又道老僧即是闍黎若能於此明得去一句中有三玄三要賓主歷然平生事辦參尋事畢所以永嘉曰粉骨碎身未足酬一句了然超百億又曰臨濟兩堂首座一日相見齊下喝僧問臨濟還有賓主也無答曰賓主歷然師作偈曰兩堂首座總作家其中道理有紛拏賓主歷然明似鏡宗師為點眼中花無盡居士謂予曰汾陽臨濟五世之嫡孫天下學者宗仰觀其提綱渠渠惟論三玄三要今其法派皆以此字應衍謂三玄三要一期建立之語無益於道但於諸法不生異見一切平常便是祖意其說是否予曰居士聞其說曉然了解寧復疑汾陽提綱乎曰吾固疑而未決也予曰此其三玄三要之所以設也所言一句中具三玄一玄中具三要有玄有要者一切眾生熱惱海中清凉寂滅法幢也此幢之建譬如塗毒之鼓撾之則聞者皆死惟遠聞者後死若不橫死者雖聞不死臨濟無恙時興化三聖寶壽定上座輩聞而死者今百餘年猶有悟其旨者即後死者也而諸法派謂無益於道者即不橫死者也祖宗門風壁立萬仞而子孫畏之喜行平易坦塗此所謂法道陵夷也譬如衣冠稱孔門弟子而毀易繫辭三尺童子笑之臨濟但曰一句中具三玄一玄中具三要有玄有要而已初未甞自為句中玄意中玄體中玄也古塔主者悞認玄沙三句為三玄故但分三玄而遺落三要叢林安之不以為非為可嘆息玄沙曰真常流注為平等法但是以言遣言以理遣理謂之明前不明後葢分證法身之量未有出格之句死在句下若知出格之量則不被心魔所使入到手中便轉換落落地言通大道不坐平常之見此第一句也古謂之句中玄回機轉位生殺自在縱奪隨宜出生入死廣利一切迥脫色慾愛見之境此第二句也古謂之意中玄明陰洞陽廓周沙界一真體性大用現前應化無方全用全不用全生全不生方便喚作慈定之門此第三句也古謂之體中玄浮山遠公亦曰意中玄非意識之意古不足道遠亦迷倒予不可以不辯無盡頷之薦福古示眾云眾生久流轉者為不明自己欲出苦源但明取自己自己者有空劫時自己有今時日用自己空劫自己是根蔕今時日用自己是枝葉又曰一夏將沒空劫已前事還得相應也未若未得相應爭奈永劫輪迴何有什麼心情學佛法廣求知解被知解風吹入生死海若是知解諸人過去生中總曾學來多知多解說得辯慧過人機鋒迅疾只是心不息與空劫已前事不相應因茲惡道輪迴動經塵劫不復人身如今生出頭來得個人身在袈裟之下依前廣求知解不能息心未免六趣輪迴何不歇心去如癡如迷去不語五七年去已後佛也不奈汝何古德云一句語之中須得具三玄故知此三玄法門是佛知見諸佛以此法門度脫法界眾生皆令成佛今人却言三玄是臨濟門風誤矣汾州偈曰三玄三要事難分古注曰此句總頌三玄也下三句別列三玄也得意忘言道易親古注曰此玄或作意中玄也一句明明該萬象古注曰此體中玄也重陽九日菊花新古注曰此句中玄也僧問三玄三要之名願為各各標出古曰三玄者一體中玄二句中玄三玄中玄此三玄門是佛祖正見學道人但隨入得一玄已具正見入得諸佛閫域僧問依何聖教參詳悟得體中玄古曰如肇法師云會萬物為自己者其唯聖人乎又曰三界唯心萬法唯識又曰諸法所生唯心所現一切世間因果世界微塵因心成體六祖云汝等諸人自心是佛更莫狐疑外無一法而能建立皆是自心心生萬種法又云於一毫端現寶王剎坐微塵裏轉大法輪如此等方是正見纔缺纖毫即成邪見便有剩法不了唯心僧又問如何等語句及時節因緣是體中玄古曰佛以手指地曰此處宜建梵剎天帝釋將一莖草插其處曰建梵剎竟佛乃微笑水潦被馬祖一踏踏倒起曰萬象森羅百千妙義只向一毫上便識得根源僧問趙州如何是學人自己州對曰山河大地此等所謂合頭語直明體中玄正是潑惡水自無出身之路所以雲門誡曰大凡下語如當門劍一句之下須有出身之路若不如是死在句下又南院云諸方只具啐同時眼不具啐同時用僧進曰有何言句明出身之路古曰如杏山問石室曾到五臺否對曰曾到曰見文殊否對曰見又問文殊向汝道什麼對曰道和尚父母拋在荒草裏僧問甘泉維摩以手擲三千大千世界於他方意旨如何答曰填溝塞壑僧曰一句道盡時如何答曰百雜碎雲門問僧甚處來曰南嶽來又問讓和尚為甚入洞庭湖裏僧無對雲門代云謝和尚降尊就卑此等語雖赴來機亦自有出身之路要且未得脫灑潔淨更須知有句中玄僧曰既悟體中玄凡有言句事理俱備何須句中玄古曰體中玄臨機須看時節分賓主又認法身法性能卷舒萬象縱奪聖凡被此見解所纏不得脫灑所以須明句中玄若明得謂之透脫一路向上關棙又謂之本分事祇對更不答話僧曰何等語句是句中玄古曰如比丘問佛說甚法佛云說定法又問明日說甚法佛云不定法曰今日為甚定明日為甚不定佛曰今日定明日不定僧問思和尚如何是佛法大意答曰廬陵米作麼價又僧問趙州承聞和尚親見南泉來是否答曰鎮州出大蘿菔頭又問雲門如何是超佛越祖之談答曰餬餅如何是向上關棙曰東山西嶺青又問洞山如何是佛答曰麻三斤若於此等言句中悟入一句一切總通所以體中玄見解一時淨盡從此已後總無佛法知見便能與人去釘楔脫籠頭更不依倚一物然但脫得知見見解猶在於生死不得自在何以故為未悟道故於它分上所有言句謂之不答話今世以此為極則天下大行祖風歇滅為有言句在若要不涉言句須明玄中玄僧曰何等語句時節因緣是玄中玄古曰如外道問佛不問有言不問無言世尊良久外道曰世尊大慈大悲開我迷雲令我得入又僧問馬大師離四句絕百非請師直指西來意答曰我今日無心情但問取智藏僧問藏藏曰我今日頭痛問取海兄又問海海曰我到這裏却不會又臨濟問黃檗如何是佛法的的大意三問三被打此等因緣方便門中以為玄極惟悟者方知若望上祖初宗即未可也僧曰三玄須得一時圓備若見未圓備有何過古曰但得體中玄未了句中玄此人常有佛法知見所出言句一一要合三乘對答句中須依時節具理事分賓主方謂之圓不然謂之偏枯此人以不忘知見故道眼未明如眼中有金屑須更悟句中玄乃可也若但悟句中玄即透得法身然反為此知見奴使竝無實行有憎愛人我以心外有境未明玄中玄也雲門臨濟下兒孫多如此凡學道人縱悟得一種玄門又須明取玄中玄方能不坐在脫灑路上始得平穩脚蹋寔地僧曰既云於佛祖言句棒喝中學何故有盡善不盡善者古曰一切言句棒喝以悟為則但學者下劣不悟道但得知見知見是學成非悟也所以認言句作無事作點語作縱語作奪語作照作用作同時不同時語此皆邪師過謬非眾生咎學者本意只欲悟道見性為其師不達道祇將知見教渠故曰我眼本正因師故邪僧曰師論三玄法門名既有三法門亦有三而語句各各不同如何又言一句之中須具三玄三要古曰空空法界本自無為隨緣應現無所不為所以虗空世界萬象森羅四時陰陽否泰八節草木榮枯人天七趣聖賢諸佛五教三乘外道典籍世出世間皆從此出故云無不從此法界流究竟還歸此法界經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出楞嚴曰於一毫端現寶王剎坐微塵裏轉大法輪維摩曰或為日月天梵王世界主或時作地水或時作火風李長者云於法界海之智水示作魚龍處涅槃之大宅現陰陽而化物真覺云一月普現一切水一切水月一月攝三祖云一即一切一切即一故曰萬物本無攬真成立真性無量理不可分故知無邊法界之理全體徧在一法一塵之中華嚴曰法性徧在一切處一切眾生及國土三世悉在無有餘亦無形相而可得到此境者一法一塵一色一聲皆具周徧含容四義理性無邊事相無邊參而不雜混而不一何疑一語之中不具三玄三要耶僧又進曰古人何故須要一語之中具三玄三要其意安在哉古曰葢緣三世諸佛所有言句教法出自體中玄三世祖師所有言句并教法出自句中玄十方三世佛之與祖所有心法出自玄中玄故祖道門中沒量大人容易領解且如親見雲門尊宿具大聲價如德山密洞山初智門寬巴陵鑒只悟得言教要且未悟道見性何以知之如僧問巴陵提婆宗答曰銀椀裏盛雪問吹毛劍答曰珊瑚枝枝撐著月問祖意教意是同是別答曰雞寒上樹鴨寒下水云我此三轉語足報雲門恩了也更不為作忌齋大眾雲門道此事若在言句一大藏教豈無言句豈可以三轉語便報師恩乎覺範僧寶傳贊曰古說法有三失其一判三玄三要為玄沙所立三句其二罪巴陵三語不識活句其三分兩種自己不知聖人立言之難何謂三玄三要為玄沙所立三句耶曰所言一句中具三玄一玄中具三要有玄有要者臨濟所立之宗也在百丈黃檗但名大機大用在巖頭雪峯但名陷虎却物譬如火聚觸之為燒背之非火古謂非是臨濟門風則必有據而言有據何不明書以絕學者之疑不然則是臆說肆為臆說則非天下之達道也見立三玄則分以為體中為句中為玄中至言三要則獨不分辨乎方譏呵學者溺於知見不能悟道及釋一句之中具三要則反引金剛首楞嚴維摩等義證成曰理性無邊事相無邊參而不雜混而不一何疑一語之中不具三玄三要夫敘理敘事豈非知見乎且教乘既具此義則安用復立宗門古以氣葢人則毀教乘為知見自宗不通則又引知見以為證此一失也何謂罪巴陵三語不識活句耶曰巴陵真得雲門之旨夫語中有語名為死句語中無語名為活句使問提婆宗答曰外道是問吹毛劍答曰利劍是問祖教同異答曰不同則鑒作死語墮言句中今觀所答三語謂之語則無理謂之非語則皆赴來機活句也古非毀之過矣二失也何謂分二種自己不知聖人立言之難耶曰世尊偈曰陁那微細識習氣如瀑流真非真恐迷我常不開演以第八識言其為真也耶則慮迷無自性言其非真也耶則慮迷為斷滅故曰我常不開演立言之難也為阿難指示即妄即真之旨但曰二種錯亂修習一者用攀緣心為自性者二者識精圓明能生諸緣緣所遺者然猶不欲間隔其辭慮於一法中生二解故古剏建兩種自己疑誤後學三失也林間錄云臨濟大師曰大凡舉唱宗乘須一句中具三玄一玄中具三要有玄有要今諸方衲子多溟涬其語獨汾陽無德禪師能妙達其旨作偈通之曰三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新非特臨濟宗喜論三要石頭所作參同契備具此旨竊甞深觀之但易玄要之語為明暗耳文止四十餘句而以明暗論者半之篇首便標曰靈源明皎潔枝派暗流注又開通發揚之曰暗合上中言明明清濁句在暗則必分上中在明則須明清濁此體中玄也至指其宗而示其意則曰本末須歸宗尊卑用其語故下廣敘明暗之句奕奕聯連不已此句中玄也及其辭盡也則又曰謹白參玄人光陰莫虗度道人日用能不遺時失候則是真報佛恩此意中玄也法眼為之注釋天下學者宗承之然予獨恨其不分三法但一味作體中玄解失石頭之意李後主讀當明中有暗注辭曰玄黃不真黑白何咎遂開悟此悟句中玄為體中玄耳如安楞嚴破句讀首楞嚴亦有明處予懼學者雷同其旨宗門妙意旨趣今叢林絕口不言老師宿德日以凋喪未學小生日以譁諠無復明辨因記先德詮量大法宗趣於此以俟有志者又云此方教體以音聞應機故明導者假以語言發其智用然以言遣言以理辨理則妙精圓明未甞間斷謂之流注真如此汾陽所謂一句明明該萬象者也得之者神而明之不然死於語下故其應機而用皆脫略窠臼使不滯影迹謂之有語中無語此汾陽所謂重陽九日菊花新者也三玄之設本猶遣病故達法者貴知其意知意則索爾虗閑隨緣在運謂之不遺時此汾陽所謂得意忘言道易親者也古塔主喜論明此道然論三玄則可以言傳至論三要則未容無說豈不曰一玄中具三要有玄有要自非親證此道莫能辨也海印曇珍曰古德於三玄語類能言之而於三要則皆杜口按淨名經香積佛品註中羅什曰如來說法其要有三一軟善語二剛強語三雜說善行樂果軟善語也惡行苦果剛強語也讚善毀惡雜說也三要葢本於此也幻寄曰臨濟曰凡演唱宗乘一句中須具三玄門一玄門須具三要薦福古分擘古人公案謂此為體中玄此為句中玄無論未達臨濟落處即於一句具三玄一玄具三要文義亦相戾甚矣寂音力斥之良是而謂薦福悞認玄沙三句為三玄則其悞與薦福等葢玄沙三句初未甞有體中句中之名兩家所陳俱以第三為極則沙之第一句謂盡十方世界更無他故祇是仁者等語已盡福之所謂體中玄義矣寂音乃摘其數語而為句中玄復以沙之第三句為體中玄淺深既自倒置強合其所本二強析其所本一傳會欺眾何異束蒲為脯原福立二種自己之意謂體中是教乘極則語句中是宗乘極則語尚是今時自己言句邊事必不涉言句契空劫自己始得其所謂玄中玄而盡佛祖心法其訶巴陵三語未足以報佛恩即指廬陵米價鎮州蘿蔔為句中玄謂悟此等言句未為悟道意也殊不知廬陵米價即空劫自己即具三玄三要佛佛授手授不可授之授授此而已燈燈相續續無所續之續續此而已謂此是言句別求空劫自己吾知其愈遠也寂音謂福不識陵活句彼豈以廬陵米價為死句固識為宗乘極則語直未識此語即空劫自己之分身雖終日言而未甞言與福所舉玄中玄諸公案無異道耳福既不能識此則玄中之所列世尊良久馬師無心情黃檗打臨濟又何能窺藩乎於不二法強生二解佛祖亦不奈渠何矣嗚呼世尊拈花便是青原拈米價使人盡解一笑而承受金色頭陀又何足貴哉宜乎薦福之未達也寂音又引楞嚴罪薦福立二種自己而楞嚴固有二種根本謂根本可云二種自己不可福肯俛首乎且福之言曰空劫自己是根蒂今時自己是枝葉福亦何甞截然二之必以此為罪則凡云真心妄心本來識神皆負罪哉福之分擘三玄實不知而妄作而音之斥福則又不能無疵音太息立言之難不誣也林間錄所載論玄要語悉本薦福其引參同契責法眼更自穿鑿當撰臨濟宗旨時音之見已日劫遠矣曇珍三要乃薦福流裔玄沙三句具沙章中咦欲契三玄三要句請看金色笑拈花窺鞭良馬今何處高樹扶疎挂晚霞師曰有時一喝如金剛王寶劒有時一喝如踞地師子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議師便喝寂音頌云金剛王劍覿露堂堂纔涉唇吻即犯鋒鋩踞地師子本無窠臼顧佇之間即成滲漏探竿影草不入陰界一點不來賊身自敗有時一喝不作喝用佛法大有只是牙痛師應機多用喝會下參徒亦學師喝師曰汝等總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲這裏分得賓主麼汝且作麼生分若分不得已後不得學老僧喝上堂次兩堂首座相見同時下喝僧問師還有賓主也無師曰賓主歷然師召眾曰要會臨濟賓主句問取堂中二首座上堂僧出作禮師便喝僧曰老和尚莫探頭好師曰你道落在甚麼處僧便喝人天眼目有師便打一句又僧問如何是佛法大意師便喝僧作禮師曰你道好喝也無僧曰草賊大敗師曰過在甚麼處僧曰再犯不容人天眼目有師便喝一句師曰大眾要會臨濟賓主句問取堂中二禪客崇覺空頌云孔明諸葛隱蓬廬明主求賢三下車為報將軍莫輕躁先生謀䇿必無虞師會下有同學二人相問一云離却中下二機請兄道一句子一云擬問則失一云與麼則禮拜老兄去也一云者賊師聞乃陞堂云要會臨濟賓主句問取堂中二禪客便下座徹菴璿頌云美人私語佇中庭轉盻金籠鸚鵡聽生怕禽言露心事手挼香稻暗叮嚀廣慧璉舉兩堂首座相見齊喝話云諸人且道還有賓主也無若道有賓主是個瞎漢若道無賓主也是個瞎漢不有不無萬里崖州你若向這裏道得也好與三十棒若道不得也好與三十棒衲僧家到這裏作麼生出得山僧圈䙡去良久云苦哉苦哉蝦蟇蚯蚓𨁝跳上三十三天撞著須彌山百雜碎遂拈拄杖云一隊無孔鐵椎速退速退示眾參學之人大須子細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘師子或乘象王如有真正學人便喝先拈出一個膠盆子善知識不辨是境便上他境上作模作樣便被學人又喝前人不肻放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物祇隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一個清淨境出善知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識更與安一重枷鎖學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正僧問克符禪師如何是賓中賓符曰倚門傍戶猶如醉出言吐氣不慚惺曰如何是賓中主符曰口念彌陁雙拄杖目瞽瞳人不出頭曰如何是主中賓符曰高提祖印當機用利物應知語帶悲曰如何是主中主符曰橫按鏌釾全正令太平寰宇斬痴頑曰既是太平寰宇為甚麼却斬痴頑符曰不許夜行剛把火直須當道與人看僧問神鼎諲如何是賓中賓鼎云瞎云如何是賓中主鼎云一似瞎云如何是主中賓鼎云故汝三十棒云如何是主中主鼎云耶了僧問雪竇顯如何是賓中賓顯曰滿面埃塵又曰噫復頌云賓中之賓少喜多嗔丈夫壯志當付何人曰如何是賓中主曰兆分其五又曰引復頌曰賓中之主玄沙猛虎半合半開唯自相許曰如何是主中賓曰月帶重輪又日收復頌曰主中之賓溫故知新互換相照師子嚬呻曰如何是主中主曰大千揑聚又曰揭復頌曰主中之主正令齊舉長劒倚天誰敢當禦總頌曰賓主分不分顢頇絕異聞解布勞生手寄言來白雲華嚴普孜舉四賓主話云賓中問主互換機鋒主中問賓同生同死主中辨主飲氣吞聲賓中覓賓白雲萬里故句中無意意在句中於斯明得一雙孤鴈撲地高飛於斯未明一對鴛鴦池邊獨立知音禪客相共證明影響異流切須子細良久曰若是陶淵明攢眉便歸去示眾我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時驅耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子汾陽云先照後用且共汝商量先用後照汝也是個人始得照用同時汝作麼生當抵照用不同時汝作麼生湊泊瑯琊覺云先照後用露師子之爪牙先用後照縱象王之威猛照用同時如龍得水致雨騰雲照用不同時提獎嬰兒俯憐赤子此是古人建立法門為合如是不合如是若合如是紀信乘九龍之輦不合如是項羽失千里之騅還有為瑯琊出氣底麼如無山僧自道去也卓拄杖下座慈明云有時先照後用有時先用後照有時照用同時有時照用不同時所以道有明有暗有起有倒乃喝一喝云且道是照是用還有緇素得出底麼若有試出來呈醜拙看若無山僧今日失利徑山杲云若也先照後用則瞎一切人眼若也先用後照則開一切人眼若也照用同時則半瞎半開若也照用不同時則全開全瞎此四則語有一則有賓無主有一則有主無賓有一則賓主俱無有一則全具賓主即今眾中或有個不受人瞞底漢來道者裏是甚麼所在說有說無說虗說實說照說用說主說賓攔胸搊住拽下禪牀痛椎一頓也怪伊不得上堂赤肉團上有一無位真人常從汝等面門出入未證據者看看時有僧出問如何是無位真人師下禪牀把住云道道其僧擬議師托開云無位真人是甚麼乾矢橛便歸方丈師見僧來舉起拂子僧禮拜師便打又有僧來師亦舉拂子僧不顧師亦打又有僧來參師舉拂子僧曰謝和尚指示師亦打雲門代云祇宜老漢大覺云得即得猶未見臨濟機在師問僧甚麼處來僧便喝師揖坐僧擬議師便打又一僧來師竪起拂子僧禮拜師便打復見僧來亦竪起拂子僧不顧師亦打徑山杲頌五月五日午時書赤口毒舌盡消除更饒急急如律令不須門上畵蜘蛛僧問如何是佛法大意師竪起拂子僧便喝師便打又僧問如何是佛法大意師亦竪起拂子僧便喝師亦喝僧擬議師便打乃曰大眾夫為法者不避喪身失命我於黃檗先師處三度問佛法的的大意三度被打如蒿枝拂相似如今更思一頓誰為下手時有僧出曰某甲下手師度與拄杖僧擬接師便打師陞堂有僧出師便喝僧亦喝便禮拜師便打問僧甚處來曰定州來師拈棒僧擬議師便打僧不肯師曰已後遇明眼人去在僧後參三聖纔舉前話三聖便打僧擬議聖又打天童華云臨濟三聖當時若有轉身句後代兒孫未至埽土驀拈拄杖云更有一個甚處去卓拄杖一下有一老宿參便問禮拜即是不禮拜即是師便喝宿便拜師曰好個草賊宿曰賊賊便出去師曰莫道無事好時首座侍立師曰還有過也無座曰有師曰賓家有過主家有過曰二俱有過師曰過在甚麼處座便出去師曰莫道無事好南泉聞云官馬相踏大覺到參師舉起拂子覺敷坐具師擲下拂子覺收坐具參堂去僧眾曰此僧莫是和尚親不禮拜又不喫棒師聞令喚覺覺至師曰大眾道汝不禮拜又不喫棒莫是長老親故覺乃珍重下去師問院主甚麼處去來曰州中糶黃米來師曰糶得盡麼曰糶得盡師以拄杖劃一劃曰還糶得這個麼主便喝師便打典座至師舉前話座曰院主不會和尚意師曰你又作麼生座禮拜師亦打黃龍南云院主下喝不可放過典座禮拜放過不可臨濟行令歸宗放過三十年後有人說破同普化赴施主齋次師問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然化趯倒飯牀師曰太粗生曰這裏是甚麼所在說粗說細次日又同赴齋師復問今日供養何似昨日化又趯倒飯牀師曰得即得太粗生化喝曰瞎漢佛法說甚麼粗細師乃吐舌妙喜曰且道臨濟兩次休去還有商量分也無若有且如何商量師一日與河陽木塔長老同在僧堂地爐內坐因說普化每日在街市掣風掣顛知他是凡是聖言猶未了普化入來師便問汝是凡是聖普化云汝且道我是凡是聖師便喝普化以手指云河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼師云者賊普化云賊賊便出去一日普化在僧堂前喫生菜師見云大似一頭驢普化便作驢鳴師謂直歲云細抹草料著普化云少室人不識金陵又再來臨濟一隻眼到處為人開趙州遊方到院在後架洗脚次師便問如何是祖師西來意州曰恰遇山僧洗脚師近前作聽勢州曰會即便會啗作甚麼師便歸方丈州曰三十年行脚今日錯為人下註脚師問杏山如何是露地白牛山曰吽吽師曰啞那山曰長老作麼師曰者畜生麻谷問大悲千手眼那個是正眼師搊住曰大悲千手眼作麼生是正眼速道速道谷拽師下禪牀却坐師問訊曰不審谷擬議師便喝拽谷下禪牀却坐谷便出谷又問十二面觀音那個是正面師下禪牀擒住曰十二面觀音甚處去也速道速道谷轉身擬坐師便打谷接住棒相捉歸方丈師云山僧無一法與人祇是治病解縛你取山僧口裏語不如休歇無事去又云一念緣起無生超出三乘權學示眾云今時學佛法者且要求真正見解若得真正見解生死不染去住自由不要求殊勝殊勝自至道流只如自古先德皆有出人底路如山僧指示人處只要你不受人惑要用便用更莫遲疑如今學者不得病在甚處病在不自信處你若自信不及即便忙忙地狥一切境被他萬境回換不得自由你若能歇得念念馳求心便與祖佛不別你欲識得祖佛麼只你面前聽法底是學人信不及便向外馳求設求得者皆是文字名相終不得他活祖意此時不遇萬劫千生輪迴三界狥好惡境掇去驢牛肚裏生道流約山僧見處與釋迦不別每日多般用處欠少甚麼六道神光未曾間歇若能如是見得即是一生無事人大德三界無安猶如火宅此不是你久停住處無常殺鬼一剎那間不擇貴賤老少你要與祖佛不別但莫外求你一念清淨心光是你屋裏法身佛一念無分別心光是你屋裏報身佛一念無差別心光是你屋裏化身佛此三種身是你即今目前聽法底人只為不向外馳求有此功用若據經論家取三種身為極則約山僧見處不然此三種身是名言亦是三種依古人云身依義立土據體論法性身法性土明知是光影大德你且識取弄影底人是諸佛之本源一切處是道流歸舍處是你四大色身不解說法聽法脾胃肝膽不解說法聽法虗空不解說法聽法是甚麼解說法聽法是你目前歷歷底者一個形段孤明是者個解說法聽法若如是見得便與祖佛不別但一切時中更莫間斷觸目皆是只為情生智隔想變體殊所以輪迴三界受種種苦約山僧見處無不甚深無不解脫道流心法無形通貫十方在目曰見在耳曰聞在鼻嗅香在口談論在手執捉在足運奔本是一精明分為六和合一心既無隨處解脫山僧恁麼說意在甚處只為道流一切馳求心不能歇上他古人閑機境道流取山僧見處坐斷報化佛頭十地滿心猶如客作兒等妙二覺擔枷鎖漢羅漢辟支猶如廁穢菩提涅槃如繫驢橛何以如此只為道流不達三祇劫空所以有此障礙若是真正道人終不如是但能隨緣消舊業任運著衣裳要行即行要坐即坐無一念心希求佛果緣何如此古人云若欲作業求佛佛是生死大兆大德時光可惜祇擬傍家波波地學禪學道認名認句求佛求祖求善知識意度莫錯道流你只有一個父母更求何物你自返照看古人云演若達多失却頭求心歇處即無事大德且要平常莫作模樣有一般不識好惡禿兵便即見神見鬼指東畫西好晴好雨如是之流盡須抵債向閻羅王前吞熱鐵丸有日在好人家男女被者般野狐精魅所著便即揑怪瞎屢生索飯錢有日在道流切要求取真正見解向天下橫行免被這一般精魅惑亂身心更莫造作只是平常你纔擬心早是錯了也且莫求佛佛是名句你還識馳求底麼三世十方佛祖出來也只為求法如今參學道流也只為求法得法始了未得依前輪迴五道云何是法法者是心法心法無形通貫十方目前現用人信不及便乃認名認句向文字中求其意度與佛法天地懸隔道流山僧說法說甚麼法說心地法便能入淨入穢入凡入聖入真入俗要且不是你真俗凡聖能與一切真俗凡聖安名一切真俗凡聖安者個名字不得道流把得便用更莫安名方契玄旨山僧說法與天下人別只如有個文殊普賢出來目前各現一身問法纔道咨和尚我早辨了也何以如此只為我見處別外不取凡聖內不住根本見徹本法更不疑謬又云道流佛法無用功處只是平常無事著衣喫飯屙矢送尿困來即臥愚人笑我智乃知焉古人云向外作工夫總是癡頑漢你且隨處作主立處皆真一切境緣回換不得縱有從來習氣五無間業皆為解脫大海今時學禪者總不識法猶如觸鼻羊逢著物安在口裏奴郎不辨賓主不分如是之流邪心入道即不得名為真出家人正是真俗家人夫出家者須辨得平常真正見解辨佛辨魔辨真辨偽辨凡辨聖若如是辨得名真出家人若魔佛不辨正是出一家入一家乃喚作造業眾生未得名為真出家人只如今有個佛魔同體若明眼道流魔佛俱打你若愛聖憎凡生死海裏沉浮未有了日時有僧問如何是佛魔乞垂開示曰你一念心疑處是佛魔你若達得萬法無生心如幻化更無一塵一法處處清淨即無佛魔佛與眾生是染淨二境約山僧見處無佛無眾生無古無今得者便得不勒時節亦無修證無得無失一切時中更無別法設有一法過此我說如夢如幻山僧所說只是道流現今目前孤明歷歷地聽法者此人處處不滯通徹十方三界自在入一切差別境不能回換一剎那間透入法界逢佛說佛逢祖說祖逢羅漢說羅漢逢餓鬼說餓鬼向一切處遊履國土教化眾生未曾離一念隨處清淨光透十方萬法一如道流大丈夫兒今日方知本來無事只為你信不及念念馳求捨頭覓頭自不能歇如圓頓菩薩入法界現身向淨土中厭凡欣聖如此之流取捨未忘染淨心在如禪宗見解又且不然直是現今更無時節山僧說處皆是一期藥病相治總無實法若如是見是真出家日消萬兩黃金道流莫取次被諸方老師印破面門道我解禪解道辯似懸河皆是造地獄業若是真正學道人不見世間過切急要求真正見解若達真心悟性圓明方始了畢問如何是真正見解乞再指示曰你但一切入凡入聖入染入淨入諸佛國土入彌勒樓閣入毗盧遮那世界處處皆現國土成住壞空佛出於世轉大法輪入無餘涅槃不見有去來相貌求其生死了不可得便入無生法界處處游履國土入華藏世界盡見諸法全真皆是實相語錄作盡見諸法空相皆無實法此從正法眼藏惟有聽法無依道人是諸佛之母所以佛從無依生若悟無依佛亦無得若如是見得是真正見解學人不了執為名句被他凡聖名礙所以障其道眼不得分明只如十二分教皆是表顯之說學者不會便向表顯名句上生解皆是依倚落在因果未免三界生死你欲得生死去住自由即今識取聽法底人無形無相無根無本無住處活鱍鱍地應是萬般施設用處只是無處所語錄所字下有以字覓著轉遠求之轉乖號為秘密道流你莫認個夢幻伴子遲晚中間便歸無常你向此世界中覓甚麼物作解脫覓取一口飯喫補毳過時且要訪尋善知識莫因循逐樂虗生浪死光陰可惜念念無常粗則被地水火風細則被生住異滅四大四相所逼無有了期道流今時且要識取四種無相境免被境緣擺撲問如何是四種無相境師曰你一念心愛被水溺你一念心嗔被火燒你一念心疑被地礙你一念心喜被風飄若能如是辨得不被境轉處處用境東涌西沒南涌北沒中涌邊沒邊涌中沒履水如地履地如水緣何如此為達四大如夢如幻故道流你只今聽法者不是你四大能用你四大若如是見得便乃去住自由約山僧見處沒嫌底法你若憎凡愛聖被聖凡境縛有一般學人向五臺山求文殊現早錯了也五臺山無文殊你欲識文殊麼只你目前用處始終不異處處不礙此個是活文殊你一念心無差別光處處總是普賢你一念心能自在隨處解脫此是觀音三昧法互為主伴顯即一時顯隱即一時隱一即三三即一如是解得方始好看教夫大善知識始敢毀佛毀祖是非天下排斥三藏教罵辱諸小兒向逆順中覓人所以我於十二年中求一個業性如芥子許不可得若似新婦子禪師便即怕趁出院不與飯喫不安不樂自古先輩到處人不信被出始知是貴若到處人盡肯堪作甚麼所以師子一吼野犴腦裂道流諸方說有道可修有法可證你且說證何法修何道你今用處欠少甚麼物修補何處後生小阿師不會便即信者般野狐精魅許他說事繫縛他人言道理行相應護惜三業始得成佛如此說者如春細雨古人云路逢達道人第一莫向道所以言若人修道道不行萬般邪境競頭生智劍出來無一物明頭未顯暗頭明所以古人云平常心是道大德覓甚麼物現今目前聽法無依道人歷歷地分明未曾欠少你若欲得與祖佛不別但如是見不用疑悞你心心不異名之活祖心若有異則性相別心不異故即性相不別問如何是心心不異處師曰你擬問早異了也性相各分道流莫錯世出世諸法皆無自性亦無生性但有空名名字亦空你祇麼認他閑名為實大錯了也設有皆是依變之境有個菩提依涅槃依解脫依三身依境智依菩薩依佛依你向依變國土中覓什麼物乃至三乘十二分教是拭不淨故紙佛是幻化身祖是老比丘你還是娘生已否你若求佛即被佛魔攝你若求祖即被祖魔縛你若有求皆苦不如無事有一般禿比丘向學人道佛是究竟於三大阿僧祇劫修行果滿始成道道流你若道佛是究竟緣什麼八十年後向拘尸羅城雙林樹間側臥而死去佛今何在明知與我生死不別你言三十二相八十種好是佛轉輪聖王應是如來明知是幻化古人云如來舉身相為順世間情恐人生斷見權且立處名假言三十二八十也空聲有身非覺體無相乃真形你道佛有六通是不可思議一切諸天神仙阿修羅大力鬼亦有神通應是佛否道流莫錯祇如阿修羅與天帝釋戰戰敗領八萬四千眷屬入藕絲孔中藏莫是聖否如山僧所舉皆是業通依通夫如佛六通者不然入色界不被色惑入聲界不被聲惑入香界不被香惑入味界不被味惑入觸界不被觸惑入法界不被法惑所以達六種色聲香味觸法皆是空相不能繫縛此無依道人雖是五蘊陋質便是地行神通道流真佛無形真法無相你祇麼幻化上頭作模作樣設求得者皆是野狐精魅竝不是真佛是外道見解夫如真學道人竝不取佛不取菩薩羅漢不取三界殊勝迥然獨脫不與物拘乾坤倒覆我更不疑十方諸佛現前無一念心喜三塗地獄頓現無一念心怖緣何如此我見諸佛空相變即有不變即無三界惟心萬法惟識所以夢幻空華何勞把捉惟有道流目前現今聽法底人入火不燒入水不溺入三塗地獄如游園觀入餓鬼畜生而不受報緣何如此無嫌底法你若愛聖憎凡生死海裏沉浮煩惱由心故有無心煩惱何拘不勞分別取相自然得道須臾你擬傍家波波地學得於三祇劫中終歸生死不如無事向叢林中牀角頭交脚坐道流你欲得如法但莫生疑展則彌綸法界收則絲髮不立歷歷孤明未曾欠少眼不見耳不聞喚作什麼物古人云說似一物則不中你但自家看更有什麼說亦無盡各自著力珍重道流是你目前用處與祖佛不別祇麼不信便向外求莫錯向外無法內亦不可得你取山僧口裏語不如歇業無事去已起者莫續未起者不要放起便勝你十年行脚約山僧見處無如許多般祇是平常著衣喫飯無事過時逢佛殺佛逢祖殺祖逢羅漢殺羅漢逢父母殺父母逢親眷殺親眷始得解脫不與物拘透脫自在你一念心歇得處喚作菩提樹你一念心不能歇得處喚作無明樹無明無住處無明無始終你若念念心歇不得便上他無明樹便入六道四生披毛戴角你若歇得便是清淨身界你一念不生便是上菩提樹三界神通變化意生化身有一般瞎禿子喫飯飽了便坐禪觀行把捉念漏不令放起厭喧求靜是外道法祖師云你若住心看靜舉心外照攝心內澄凝心入定如是之流皆是造作是你如今與麼聽法底人作麼生擬修他證他莊嚴他渠且不是修底物不是莊嚴得底物若教他莊嚴你一切物即莊嚴得山僧說向外無法學人不會即便向裏作解便即倚壁坐舌拄上齶湛然不動取此為是祖門佛法也大錯是你若取不動清淨境為是你即認他無明為郎主古人云湛湛黑暗深坑實可怖畏此之是也你若認他動者是一切草木皆解動應可是道否所以動者是風大不動者是地大動與不動俱無自性你若向動處捉他他向不動處立你若向不動處捉他他向動處立譬如潛泉魚鼓波而自躍大德動與不動是二種境還是無依道人用動用不動咸通八年丁亥四月十日將示滅說傳法偈曰沿流不止問如何真照無邊說似他離相離名人不稟吹毛用了急須磨復謂眾曰吾滅後不得滅却吾正法眼藏三聖出曰爭敢滅却和尚正法眼藏師曰已後有人問你向他道甚麼聖便喝師曰誰知吾正法眼藏向這瞎驢邊滅却言訖端坐而逝塔全身于府西北隅諡慧照寂音曰急須磨者船子曰直須藏身處沒蹤跡沒蹤跡處莫藏身也幻寄曰寂音祇識菜刀子未夢見吹毛劍在
