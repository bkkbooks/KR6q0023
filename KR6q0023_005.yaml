body:
  text: 六祖下第一世南嶽懷讓禪師金州杜氏子唐儀鳳二年四月八日降生有白氣上屬天太史奏之高宗宗問是何祥乎對曰國之法器不染世榮宗傳勅金州太守韓偕親往存慰年十歲惟樂佛書有玄靜三藏告師父母曰此子若出家必獲上乘廣度眾生至垂拱三年年十五依荊州玉泉寺弘景律師出家通天二年受戒習毗尼藏一日歎曰夫出家者當為無為法天上人間無有勝者遇同學坦然相與謁嵩山安公安令詣曹溪其見六祖悟緣具六祖章中師既得法侍祖復十五年先天二年往衡嶽居般若寺開元中有沙門道一在衡嶽常習坐禪師知是法器往問曰大德坐禪圖甚麼一曰圖作佛師乃取一磚於彼菴前石上磨一曰磨作甚麼師曰磨作鏡一曰磨磚豈得成鏡耶師曰磨磚既不成鏡坐禪豈得作佛一曰如何即是師曰如牛駕車車若不行打車即是打牛即是一無對師又曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理一聞示誨如飲醍醐禮拜問曰如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見師曰心地法眼能見乎道無相三昧亦復然矣一曰有成壞否師曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萠三昧華無相何壞復何成一蒙開悟心意超然侍奉九秋日益玄奧入室弟子總有六人師各印可曰汝等六人同證吾身各契其一一人得吾眉善威儀常浩一人得吾眼善顧盻智達一人得吾耳善聽理坦然一人得吾鼻善知氣神照一人得吾舌善譚說嚴峻一人得吾心善古今道一又曰一切法皆從心生心無所生法無能住若達心地所作無礙非遇上根宜慎辭哉有大德問如鏡鑄像像成後未審光向甚麼處去師曰如大德為童子時相貌何在法眼別云阿那個是大德鑄成底像曰祇如像成後為甚麼不鑑照師曰雖然不鑑照謾他一點不得馬大師闡化於江西師問眾曰道一為眾說法否眾曰已為眾說法師曰總未見人持個消息來眾無對因遣一僧去囑曰待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬師云自從胡亂後三十年不曾少鹽醬師然之徑山杲云雲門即不然夜夢不祥書壁大吉天寶三年八月十一日圓寂塔於衡嶽諡大慧吉州青原山靜居寺行思禪師幼歲出家參曹溪得法語具六祖章歸住青原六祖將示滅沙彌希遷問曰和尚百年後希遷當依附何人祖曰尋思去及祖順世遷每於靜處端坐寂若忘生第一座問曰汝師已逝空坐奚為遷曰我稟遺誡故尋思耳座曰汝有師兄思和尚今住吉州汝因緣在彼師言甚直汝自迷爾遷聞語便禮辭祖龕直詣靜居參禮師曰子何方來遷曰曹溪師曰將得甚麼來曰未到曹溪亦不失師曰若恁麼用去曹溪作甚麼曰若不到曹溪爭知不失遷又曰曹溪大師還識和尚否師曰汝今識吾否曰識又爭能識得師曰眾角雖多一麟足矣遷又問和尚自離曹溪甚麼時至此間師曰我却知汝早晚離曹溪曰希遷不從曹溪來師曰我亦知汝去處也曰和尚幸是大人莫造次他日師復問遷汝甚麼處來曰曹溪師乃舉拂子曰曹溪還有這個麼曰非但曹溪西天亦無師曰子莫曾到西天否曰若到即有也師曰未在更道曰和尚也須道取一半莫全靠學人師曰不辭向汝道恐已後無人承當師令遷持書與南嶽讓和尚曰汝達書了速回吾有個鈯斧子與汝住山遷至彼未呈書便問不慕諸聖不重己靈時如何嶽曰子問太高生何不向下問遷曰寧可永劫受沉淪不從諸聖求解脫嶽便休玄沙曰大小石頭被南嶽推倒直至如今起不得遷便回師問子返何速書信達否遷曰書亦不通信亦不達去日蒙和尚許個鈯斧子祇今便請師垂一足遷便禮拜尋辭往南嶽荷澤神會參師問甚處來曰曹溪師曰曹溪意旨如何會振身而立師曰猶帶瓦礫在曰和尚此間莫有真金與人麼師曰設有汝向甚麼處著玄沙云果然雲居錫云祇如玄沙道果然是真金是瓦礫僧問如何是佛法大意師曰廬陵米作麼價開元二十八年十一月十三日陞座告眾跏趺而逝六祖下第二世江西道一禪師漢州什邡縣人姓馬氏故俗稱馬祖或云馬大師容貌奇異牛行虎視引舌過鼻足下有二輪文幼歲於本邑羅漢寺出家受具於渝州圓律師開元中習定於衡嶽遇讓和尚發明大事同參六人惟師密授心印始居建陽佛迹嶺遷於臨川次至南康龔公山宋高僧傳先是此峯岫間魑魅所居人莫敢近犯者災釁立生及師至當宴息時有神紫衣玄冠致禮言捨此地為清淨梵場語終不見自爾猛鷙毒螫變心馴擾大曆中連帥路嗣恭請師開法四方學者雲集座下僧問和尚為甚麼說即心即佛曰為止小兒啼曰啼止時如何師曰非心非佛曰除此二種人來如何指示師曰向伊道不是物曰忽遇其中人來時如何曰且教伊體會大道肯堂充即心即佛頌云美似楊妃離玉閤嬌如西子下瓊樓日日與君花下醉更嫌何處不風流牧菴忠非心非佛頌云二月風光景氣浮少年公子御街遊銀牀踞坐傾杯酒三個孩童打馬毬僧問離四句絕百非請師直指西來意師曰我今日勞倦不能為汝說問取智藏去僧問西堂堂云何不問和尚僧云和尚教來問堂云我今日頭痛不能為汝說問取海兄去僧又問百丈丈云我到這裏却不會僧却回舉似師師曰藏頭白海頭黑圜悟勤云若以解路卜度却謂之相瞞有者道只是相推過有者道三個總識他問頭所以不答總是拍盲地將古人醍醐上味著毒藥在裏許所以馬祖道待汝一口吸盡西江水即向汝道與此公案一般若會得藏頭白海頭黑便會西江水話這僧將一擔懞懂換得個不安樂更勞他三大尊宿入泥入水畢竟這僧不瞥地雖然恁麼這三個宗師却被擔板漢勘破如今只管向語言上作活計云白是明頭合黑是暗頭合只管鑽研計較殊不知古人一句截斷意根須是向正脉裏自看始得穩當所以道末後一句始到牢關把斷要津不通凡聖若論此事如當門按一口劒相似擬議則喪身失命又道譬如擲劍揮空莫論及之不及但向八面玲瓏處會取不見古人道這漆桶或云野狐精或云瞎漢且道與一棒一喝是同是別若知千差萬別只是一般自然八面受敵要會藏頭白海頭黑麼五祖先師道封后先生問如何是西來意師曰只今是甚麼意龐居士問不昧本來人請師高著眼師直下覰士曰一種沒弦琴唯師彈得妙師直上覰士禮拜師歸方丈士隨後曰適來弄巧成拙雲峯悅云且道是賓家弄巧成拙主家弄巧成拙若揀得出三十棒一棒也較不得若揀不出明年更有長條在惱亂春風卒未休妙喜曰馬祖上下則不無爭奈昧却本來人居士雖然禮拜渾圇吞個棗馬師歸方丈士隨後入云適來弄巧成拙救得一半一夕西堂百丈南泉隨侍翫月次師問正恁麼時如何堂曰正好供養丈曰正好修行泉拂袖便行師曰經入藏禪歸海惟有普願獨超物外泐潭清云是則全是非則全非後來神鼎道只為老婆心切神鼎恁麼道大似金沙混雜玉石不分只如馬大師道經入藏禪歸海惟有普願獨超物外甚麼處是老婆心切處還辨得麼不省這個意修行徒苦辛僧參次師乃畫一圓相云入也打不入也打僧纔入師便打僧云和尚打某甲不得師靠拄杖休去雪竇顯云二俱不了和尚打某甲不得靠却拄杖擬議不來劈脊便棒問如何是西來意師便打曰我若不打汝諸方笑我也問如何得合道師曰我早不合道百丈問如何是佛法旨趣師曰正是汝放身命處有小師躭源行脚回於師前畫個圓相就上拜了立師曰汝莫欲作佛否曰某甲不解揑目師曰吾不如汝小師不對鄧隱峰辭師師曰甚麼處去曰石頭去師曰石頭路滑曰竿木隨身逢場作戲便去纔到石頭即繞禪牀一帀振錫一聲問是何宗旨石頭曰蒼天蒼天峰無語却回舉似師師曰汝更去問待他有答汝便噓兩聲峰又去依前問石頭乃噓兩聲峰又無語回舉似師師曰向汝道石頭路滑有僧於師前作四畫上一畫長下三畫短曰不得道一畫長三畫短離此四字外請和尚答師乃畫地一畫曰不得道長短答汝了也忠國師聞別云何不問老僧有講僧來問曰未審禪宗傳持何法師却問曰未審座主傳持何法主曰忝講得經論二十餘本師曰莫是師子兒否主曰不敢師作噓噓聲主曰此是法師曰是甚麼法主曰師子出窟法師乃默然主曰此亦是法師曰是甚麼法主曰師子在窟法師曰不出不入是甚麼法主無對百丈代云見麼遂辭出門師召曰座主主回首師曰是甚麼主亦無對師曰這鈍根阿師洪州廉使問曰喫酒肉即是不喫即是師曰若喫是中丞祿不喫是中丞福師問僧什麼處來云湖南來師云東湖水滿也未云未師云許多時雨水尚未滿道吾云滿也雲巖云湛湛地洞山云什麼劫中曾欠少一日謂眾曰汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又引楞伽經文以印眾生心地恐汝顛倒不自信此一心之法各各有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界惟心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈曰心地隨時說菩提亦祇寧事理俱無礙當生即不生僧問如何修道師云道不屬修若言修得修成還壞即同聲聞若言不修即同凡夫曰云何即得達道師云自性本來具足但於善惡事上不滯喚作修道人取善捨惡觀空入定即屬造作更若向外馳求轉疎轉遠但盡三界心量一念妄想即是三界生死根本但無一念即除生死根本即得法王無上珍寶無量劫來凡夫妄想諂曲邪偽我慢貢高合為一體故經云但以眾法合成此身起時惟法起滅時惟法滅此法起時不言我起滅時不言我滅前念後念中念念念不相待念念寂滅喚作海印三昧攝一切法如百千異流同歸大海都名海水住於一味即攝眾味住於大海即混諸流如人在大海中浴即用一切水所以聲聞悟迷凡夫迷悟聲聞不知聖心本無地位因果階級心量妄想修因證果住其空定八萬劫二萬劫雖即已悟却迷諸菩薩觀如地獄苦沉空滯寂不見佛性若是上根眾生忽遇善知識指示言下領會更不歷於階級地位頓悟本性故經云凡夫有反覆心而聲聞無也對迷說悟本既無迷悟亦不立一切眾生從無量劫來不出法性三昧常在法性三昧中著衣喫飯言談祇對六根運用一切施為盡是法性不解返源隨名逐相迷情妄起造種種業若能一念返照全體聖心汝等諸人各達自心莫記吾語縱饒說得河沙道理其心亦不增總說不得其心亦不減說得亦是汝心說不得亦是汝心乃至分身放光現十八變不如還我死灰來淋過死灰無力喻聲聞妄修因證果未淋過死灰有力喻菩薩道業純熟諸惡不染若說如來權教三藏河沙劫說不可盡猶如鈎鎖亦不斷絕若悟聖心總無餘事久立珍重一日示眾云道不用修但莫污染何為污染但有生死心造作趣向皆是污染若欲直會其道平常心是道何謂平常心無造作無是非無取捨無斷常無凡聖故經云非凡夫行非聖賢行是菩薩行只如今行住坐臥應機接物盡是道道即是法界乃至河沙妙用不出法界若不然者云何言心地法門云何言無盡燈一切法皆是心法一切名皆是心名萬法皆從心生心為萬法之根本故經云識心達本源故號為沙門名等義等一切諸法皆等純一無雜若於教門中得隨時自在建立法界盡是法界若立真如盡是真如若立理一切法盡是理若立事一切應有法字盡是事舉一千從事理無差盡是妙用更無別理皆由心之迴轉譬如月影有若干真月無若干諸源水有若干水性無若干森羅萬象有若干虗空無若干說道理有若干無礙慧無若干種種成立皆由一心也建立亦得掃蕩亦得盡是妙用妙用盡是自家非離真而有立處立處即真盡是自家體若不然者更是何人一切法皆是佛法諸法即是解脫解脫者即是真如諸法不出於真如行住坐臥悉是不思議用不待時節經云在在處處則為有佛佛是能仁有智慧善機情能破一切眾生疑網出離有無等縛凡聖情盡人法俱空轉無等輪超於數量所作無礙事理雙通如天起雲忽有還無不留蹤跡猶如畫水成文不生不滅是大寂滅在纏名如來藏出纏號淨法身體無增減能大能小能方能圓應物現形如水中月滔滔運用不立根苗不盡有為不住無為有為是無為之用無為是有為之依不住於依故云如空無所依心生滅義心真如義心真如者喻如明鏡照像鏡喻於心像喻於法若心取法即涉外因即是生滅義不取於法即是真如義聲聞耳聞佛性菩薩眼見佛性了達無二名平等性性無有異用則不同在迷為識在悟為智順理為悟順事為迷迷則迷自本心悟則悟自本性一悟永悟不復更迷如日出時不合於暗智慧日出不與煩惱暗俱了心境界妄想即除妄想既除即是無生法性本有有不假修禪不屬坐坐即有著若見此理真正合道隨緣度日坐起相隨戒行增薰積於淨業但能如是何慮不通久立珍重師於貞元四年正月中登建昌石門山於林中經行見洞壑平坦謂侍者曰吾之朽質當於來月歸茲地矣及歸遂示疾院主問和尚近日尊候如何師曰日面佛月面佛雪竇顯頌云日面佛月面佛五帝三皇是何物二十年來曾苦辛為君幾下蒼龍窟屈堪述明眼衲僧莫輕忽二月一日沐浴跏趺入滅世壽八十僧臘六十元和中追諡大寂禪師南嶽石頭希遷禪師端州高要陳氏子母懷師則不能茹葷幼而徇齊既冠然諾自許鄉民多殺牛祀鬼神師數毀祠奪牛歸歲恒數十後造曹溪得度見青原得法一日原問師曰有人道嶺南有消息師曰有人不道嶺南有消息曰若恁麼大藏小藏從何而來師曰盡從這裏去原然之門人道悟問曹溪意旨誰人得師曰會佛法人得曰師還得否師曰不得曰為甚麼不得曰我不會佛法僧問如何是解脫師曰誰縛汝問如何是淨土師曰誰垢汝問如何是涅槃曰誰將生死與汝師問新到從甚麼處來曰江西來師曰見馬大師否曰見師乃指一橛柴曰馬師何似這個僧無對却回舉似馬祖祖曰汝見橛柴大小曰沒量大祖曰汝甚有力曰何也祖曰汝從南嶽負一橛柴來豈不是有力問如何是西來意師曰問取露柱曰學人不會師曰我更不會大顛問道有道無俱是謗請師除師曰一物亦無除個甚麼師却問併却咽喉唇吻道將來顛曰無這個師曰若恁麼汝即得入門道悟問如何是佛法大意師曰不得不知曰向上更有轉處也無師曰長空不礙白雲飛問如何是禪師曰碌甎問如何是道師曰木頭師因看肇論至會萬物為己者其唯聖人乎乃拊几曰聖人無己靡所不己法身無象誰云自他圓鑑靈照於其間萬象體玄而自現境智非一孰云去來至哉斯語也遂掩卷不覺寢夢與六祖同乘一龜游泳深池之內覺而念曰靈龜者智也深池者性海也吾與祖師同乘靈智游性海矣遂著參同契曰竺土大仙心雪竇著語云誰是能舉東西密相付惜取眉毛人根有利鈍作麼生道無南北祖且欵欵靈源明皎潔撫掌呵呵枝派暗流注亦未相許執事原是迷展開兩手契理亦非悟拈却了也門門一切境捨短從長回互不回互以頭換尾回而更相涉這個是拄杖子不爾依位住莫錯認定盤星色本殊質象豈辨開眸聲元異樂苦還同掩耳暗合上中言心不負人明明清濁句口宜挂壁四大性自復隨所依如子得其母可知也火熱風動搖春氷自消水濕地堅固從旦至暮眼色耳音聲海宴河清鼻香舌醎醋可憑可據然依一一法重報君依根葉分布好明取本末須歸宗惟我能知尊卑用其語不犯之令當明中有暗暗必可明勿以暗相遇明還非覩當暗中有明一見三勿以明相覩無異說明暗各相對若為分比如前後步不知此萬物自有功旨爾寧止當言及用處縱橫十字事存函葢合子細看理應箭鋒拄莫教錯承言須會宗未兆非相勿自立規矩突出難辨觸目不會道又何妨運足焉知路也不惡進步非近遠唱彌高迷隔山河固和彌寡謹白參玄人聞必同歸光陰莫虗度誠哉是言也上堂吾之法門先佛傳授不論禪定精進唯達佛之知見即心即佛心佛眾生菩提煩惱名異體一汝等當知自己心靈體離斷常性非垢淨湛然圓滿凡聖齊同應用無方離心意識三界六道性自心現水月鏡像豈有生滅汝能知之無所不備師於唐天寶初至衡山南寺寺之東有石狀如臺乃結庵其上時號石頭和尚南嶽鬼神多顯跡聽法師皆與授戒偶一日見負米登山者師問之知為送供者師愍之明日即移庵下梁端貞元六年示寂德宗諡無際大師
