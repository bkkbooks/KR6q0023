body:
  text: 六祖下第十三世隆興府黃龍祖心晦堂寶覺禪師少為書生有聲年十九而目盲父母許以出家遂復明參雲峰悅三年難其孤硬告悅將去悅曰必往依黃檗南公師至黃檗四年不大發明又辭再上雲峰會悅謝世就止石霜因閲傳燈至僧問如何是多福一叢竹福曰一莖兩莖斜曰不會福曰三莖四莖曲師於此頓悟徹見二師用處徑回黃檗方展坐具南公曰子已入吾室矣師踊躍曰大事本來如是和尚何得教人看話百計搜尋南公曰若不令汝如此尋究到無用心處自見自肯即吾埋沒汝也僧寶傳曰師從容游泳陸沉衆中時時往決雲門語句南公曰知是般事便休汝用許多工夫作麼師曰不然但有纖疑在不到無學安能七縱八橫天回地轉哉復謁翠巖真真大奇之依止三年而真歿乃還黃檗南公使分座接納南公遷黃龍師復謁泐潭月公月以經論入玄聞或笑師政不自歇去乃下喬木入幽谷乎師曰彼以有得之得護前遮後我以無學之學朝宗百川師與夏倚公立談至肇論會萬物為自己者及情與無情共一體時有狗臥香桌下師以壓尺擊狗又擊香桌曰狗有情即去香桌無情自住情與無情如何得成一體公立不能對師曰才涉思惟便成剩法何曾會萬物為己哉嘗與僧論維摩曰三萬二千師子寶座入毗耶小室何故不礙為是維摩所現神力耶為別假異術耶夫難信之法故現此瑞有能信者始知本來自有之物何故復令便信曰若無信入小必妨大雖然既有信法從何而起耶又作偈曰樓閣門前才斂念不須彈指早開扃善財一去無消息門外春來草自青居士吳敦夫自謂多見知識心地明淨偶閲鄧隱峰傳見其倒卓化去而衣亦順身不褪忽疑之曰彼化之異故莫測而衣亦順之何也以問師師曰汝今衣順垂於地復疑之乎曰無所疑也師笑曰此既無疑則彼倒化衣亦順體何疑之有哉敦夫言下開解蘿湖野録辨是吳德夫九江守彭器資問曰人臨命終時有旨訣乎師曰有之曰願聞其說師曰待器資死即說器資起增敬曰此事須和尚始得師過法昌遇禪師遇問曰承聞和尚造草堂已畢工否師曰已畢工曰幾工師曰止用數百工遇恚曰大好草堂師拊掌笑曰且要天下人疑著上堂若也單明自己不悟目前此人有眼無足若悟目前不明自己有人有足無眼據此二人十二時中常有一物蘊在胸中物既在胸不安之相常在目前既在目前觸塗成滯作麼生得平穩去祖不言乎執之失度必入邪路放之自然體無去住幻寄曰好個赤梢鯉魚可惜向虀甕裏淹殺師於南公圓寂之日作偈曰昔人去時是今日今日依前人不來今既不來昔不往白雲流水空徘徊誰云稱尺平直中還有曲誰云物理齊種麻還得粟可憐馳逐天下人六六元來三十六洪覺範曰法華窮子追之即躃地常不輕直告之即被捶罵是二者不知直中有曲種麻得粟者也師室中常舉拳問僧曰喚作拳頭則觸不喚作拳頭則背喚作甚麼蘿湖野録云無盡居士見兜率悅禪師既有契證詢晦堂家風於悅欲往就見悅曰此老只一拳頭耳乃潛奉書於晦堂曰無盡居士世智辨聰非老和尚一拳垂示則安能使其知有宗門向上事耶未幾無盡遊黃龍訪晦堂於西園先以偈默書菴壁曰亂雲堆裏數峰高絶學高人此遁逃無奈俗官知住處前驅一喝散猿猱徐扣宗門事果示以拳頭話無盡默計不出悅之所料由是易之遂有偈曰久向黃龍山裏龍到來只見住山翁須知背觸拳頭外別有靈犀一點通靈源時為侍者尋題晦堂肖像曰三問逆摧超玄機於鷲嶺一拳垂示露赤體於龍峰聞時富貴見後貧窮年老浩歌歸去樂從教人喚住山翁黃太史魯直聞而笑曰無盡所言靈犀一點通此藞苴為虗空安耳穴靈源作偈分雪之是寫一字不著畫嗟乎無盡於宗門可謂具眼矣然因人之言昧宗師於晦堂鑒裁安在哉悅雖得無盡樂出其門奈狹中媢忌為叢林口實也幻寄曰兜率謂晦堂此老只一拳頭可謂妙得其髓其移書晦堂赤心片片無盡稱晦堂為住山翁蓋尊于十號靈源作頌順水行船魯直一笑因風縱火而仲溫云云兜率無盡且笑破鼻孔何能使晦堂點頭也將入滅命門人黃魯直廷堅主後事茶毗日鄰峰為秉炬火不續黃顧師之得法上首死心新禪師曰此老師有待於吾兄也新以喪拒黃強之新秉炬召衆曰不是餘殃纍及我彌天罪過不容誅而今兩腳捎空去不作牛兮定作驢以火炬打一圓相曰祇向這裏雪屈擲炬應手而爇窆靈骨於普覺塔之東答侍郎韓宗古悟後治習氣書見圭峰章隆興府寶峰克文雲菴真淨禪師狹府鄭氏子坐夏大溈聞舉僧問雲門佛法如水中月是否門曰清波無透路師乃領解往見黃龍不契却曰我有好處這老漢不識我遂往香城見順和尚順問甚處來師曰黃龍來曰黃龍近日有何言句師曰黃龍近日州府委請黃檗長老龍垂語云鐘樓上念讚牀腳下種菜有人下得語契便往住得勝上座云猛虎當路坐龍遂令去住黃檗順不覺云勝上座祇下得一轉語便得黃檗住佛法未夢見在師於言下大悟方知黃龍用處初勝居講聚時偶以扇勒窗櫺有聲忽憶教中道十方俱擊鼓十處一時聞因大悟白本講講令參問遂造黃龍僧寶傳載師悟緣無往見黃龍不契已下語稱師初學經論奪京洛講席經行龍門殿廡間見塑比丘像瞑目如在定因幡然自失南遊遍參所至辨論傾坐人目為飽參後於大溈聞僧誦雲門語而悟謂師天縱之資不由師訓自然得道特定宗旨于黃龍而已按大慧宗門武庫載師恆對南禪師真以手加額云不是這老和尚豈能如此輒顰蹙良久又宗門統要載師侍龍龍舉白雲端頌臨濟三頓棒云一拳拳倒黃鶴樓一腳踢翻鸚鵡洲有意氣時添意氣不風流處也風流大稱賞之師曰某甲見處與端兄一般龍曰汝作麼生會師擬開口龍喝曰端會汝不會則龍于師悟後尚相切劘如石霜之於楊岐武庫似有所承傳語或失真也遂回見黃龍問甚處來師曰特來禮拜和尚龍曰恰值老僧不在師曰向甚麼處去龍曰天台普請南嶽遊山師曰恁麼則學人得自在去也龍曰腳下鞋甚處得來師曰廬山七百五十文唱得龍曰何曾得自在師指鞋曰何嘗不自在龍異之一日龍曰適令侍者捲簾問渠捲起簾時如何曰照見天下放下簾時如何曰水泄不通不捲不放時如何侍者無語汝作麼生師曰和尚替侍者下涅槃堂始得龍喝曰關西人果無頭腦乃顧旁僧師指之曰只這僧也未夢見龍大笑師初遊方與二僧偕行到谷隱薛大頭問云三人同行必有一智如何是一智二僧無語師立下肩應聲便喝薛竪拳作相撲勢師曰不勞再勘薛拽拄杖趁出薛見石門慈照禪師師居洞山時僧問華嚴論云以無明住地煩惱便為一切諸佛不動智一切衆生皆自有之只為智體無性無依不能自了會緣方了且無明住地煩惱如何便成諸佛不動智理極淵深絶難曉達師曰此最分明可了解時有童了子方掃地呼之回首師指曰不是不動智却問如何是佛性童子左右視惘然而去師曰不是住地煩惱若能了之即今成佛問講師曰火災起時山河大地皆被焚盡世間虗空是否對曰教有明文安有不是之理師曰如許多灰燼將置何處講師舌大而乾笑曰不知師亦笑曰汝所講者紙上語耳居歸宗時方送法眼大師茶毗時雨新霽道方滑忽躂倒大衆爭掖而起師舉火把曰法眼茶毗歸宗遭攧呈似大衆更無可說劉宜翁嘗參佛印頗自負一日見師便問長老寫戲來得幾年師曰專候樂官來曰我不入這保社師曰爭奈即今在這場子裏劉擬護師拍手曰蝦蟇禪祇跳得一跳又坐次劉指師衣曰喚作甚麼師曰禪衣曰如何是禪師乃抖擻曰抖擻不下劉無語師打一下曰你伎倆如此敢勘老僧耶錢弋郎中訪師談久錢如廁師令侍者引從西邊去錢遽曰既是東司為甚麼向西去師曰多少人向東邊討後大慧述此云噁便是趙州問投子不許夜行投明須到亦不如此語好師報謁錢有獒逸出師避之錢戲曰禪者教誨龍虎乃畏狗乎師應聲曰易伏隈巖虎難降護宅龍錢歎賞之南康諸山相會佛印後至師問曰雲居來何遲曰為著草鞋從歸宗肚裏過所以遲師曰却被歸宗吞了曰爭奈吐不出師曰吐不出即屙出僧問如何是道師曰寶公云若欲將心求佛道問取虗空始出塵汝今求佛道虗空向汝道甚麼其僧於是大悟於言下僧問如何是佛師呵呵大笑曰何哂之有師曰笑你隨語生解曰偶然失利師喝曰不得禮拜僧便歸衆師復笑曰隨語生解僧問有一人欲出長安有一人欲入長安未審那個在先師曰多少人疑著曰不許夜行師曰蚊子錐鐵牛曰山頂老猿啼古木渡頭新鴈下平沙師曰長安人已入你合作麼生曰春日華山青師曰這僧雖然後生却可與商量僧問雲門大師欲一棒打殺釋迦老子和尚又欲糞掃堆裏殺雲門未審和尚罪過還許學人點檢也無師曰且莫造次曰和尚坐斷廬山為甚麼不識某甲這話師曰三十棒曰關師曰點曰劄師曰念汝做街坊師室中問僧云了也未僧云未了師云你喫粥了也未僧云了師云又道未了復云門外甚麼聲僧云雨聲師云又道未了復云面前是甚麼僧云屏風師云又道未了復云還會麼僧云不會乃云聽取一頌隨緣事事了日用何缺少一切但尋常自然不顛倒舒王問諸經皆首標時處圓覺經獨不然何也師曰頭乘所演直示衆生日用現前不屬今古只今老僧與相公同入大光明藏遊戲三昧互為賓主非干時處又問經曰一切衆生皆證圓覺而圭峰以證為具謂譯者之訛如何師曰圓覺如可改維摩亦可改也維摩豈不曰亦不滅受而取證夫不滅受蘊而取證者與皆證圓覺之意同蓋衆生現行無明即是如來根本大智圭峰之言非是舒王大悅稱賞者纍日示衆天地與我同根萬物與我一體腳頭腳尾橫三竪四北俱廬洲火發燒著帝釋眉毛東海龍王忍痛不禁轟一個霹靂直得傾湫倒嶽雲暗長空十字街頭廖胡子醉中驚覺起來拊手呵呵大笑云筠陽城中近來少賊乃拈拄杖云賊賊上堂裩無襠袴無口頭上青灰三五斗趙州老子少賣弄然則國清才子貴家富小兒驕其奈禾黍不陽豔競栽桃李春翻令力耕者半作賣花人上堂世尊三昧迦葉不知迦葉三昧阿難不知因甚不知只為甚深有異三德六味施佛及僧法界人天普同供養首座三昧大衆不知因甚不知對面不相識開單展鉢拈匙放筯大衆三昧各不相知因甚不知復拈拄杖橫按云我觀法王法法王法如是卓拄杖便下座上堂舉古人云如珠在盤不撥而自轉只如大衆開單展鉢拈匙把筯一切時中所作所為又何假人撥而後轉乃至雲門胡餅趙州柏樹德山棒臨濟喝又何假人撥而後轉自是你諸人不悟却錯會又干他胡餅柏樹棒喝甚麼事豈不見六祖大師云汝當一念自知非自己靈光常顯現示衆佛法兩字直是難得人有底不信自己佛事惟憑少許古人影響相似般若所知境界定相法門動即背覺合塵粘將去脫不得或學者來如印印泥相印授不惟自誤亦乃誤他洞山門下無佛法與人祇有一口劒凡是來者一一斬斷使伊性命不存見聞俱泯却向父母未生前與伊相見見伊擬近前便與斬斷然則剛刀雖利不斬無罪之人莫有無罪底麼也好與三十拄杖上堂洞山門下有時和泥合水有時壁立千仞你諸方擬向和泥合水處見洞山洞山又不在和泥合水處擬向壁立千仞處見洞山洞山且不在壁立千仞處擬向一切處見洞山洞山且不在一切處你擬不要見洞山鼻索又在洞山手裏擬瞌睡也把鼻索一掣祇見眼孔定動又不相識也不要你識洞山但識得自己也得示衆新豐古洞萬疊爭攢悟本真宗千林競簇古今勝地佛事長興所以昔日悟本大師有時提唱云惟有佛菩提是真歸仗處復喝一喝云猶作這個去就在諸禪德只如大師道猶作這個去就在且道意作麼生還知落處麼叢林中多有商量者有底道聞佛聞法似生冤家況更有歸仗處故遭悟本大師點檢有底道悟本只要人休歇去有底道悟本只見錐頭利不見鑿頭方似恁麼匹配又何曾夢見他古人既不如是又且如何諸禪德此個大事須子細不可粗心一等參禪窮教到底宗門中千差萬別隱顯殊塗惟大智方明降茲已往莫測涯際而今多是抱不哭孩兒打潔淨毬子把索放船抱橋柱澡洗彼此丈夫阿誰無分若便明去驅耕夫之牛奪饑人之食入火不燒入水不溺上堂昔有五百羅漢以六神通降一毒龍了不能得忽異方有一尊者至衆謂曰我等盡其神力降不可得尊者可能降之尊者乃彈指一下其龍便伏諸禪德據此還有優劣也無若言無五百衆盡其神力皆曰不能此尊者一彈指而毒龍便伏既有優劣如何可明於此明得作個出格道人動靜去來五眼不能覩十力不能知堪受人天供養日消萬兩黃金於此未明山門今日作齊供養羅漢且隨隊長連牀上開單展鉢下座幻寄曰若作象罔獲玄珠會便被毒龍噉却小參示衆云更有問話者麼良久云洎合放過乃喝復舉拂子云耶耶盡十方世界若凡若聖若僧若俗若草若木盡向拂子下成佛作祖無前無後一時解脫還有不解脫者麼設有命若懸絲又撫掌曰知恩者少所以此個事論實不論虗參須實參悟須實悟若纖毫不盡總落魔界豈不見古人道平地上死人無數過得荊棘林是好手如今人多是得個身心寂滅前後際斷一念萬年去休去歇去似古廟裏香爐去冷湫湫地去便為究竟殊不知却被此勝妙境界障蔽自己正知見不能現前神通光明不得發露或有執個一切平常心是道以為極則天是天地是地山是山水是水僧是僧俗是俗大盡三十日小盡二十九此依草附木不知不覺一向迷將去忽然問他我手何似佛手便道是和尚手我腳何似驢腳便道是和尚腳人人盡有生緣處那個是上座生緣處便道某是某州人是何言歟且莫錯會好凡百施為須要平常一路子以為穩當定將去合將去更不敢別移一步怕墮坑落塹長時一似雙盲底人行路一條拄杖子寸步拋不得緊把著憑將去步步依倚一日若道眼豁開頓覺前非拋却杖子撒開兩手十方蕩蕩七縱八橫東西南北無可不可豈可一向倚他門戶傍他行腳有甚快活自己畢竟如何不見雲門大師道而今天下老和尚多是師承學解露布葛藤印板上打來模子裏脫出當人若是明去何不一切臨時又不見臨濟大師云我這裏是活祖師西來意把來便用立處皆真他不說古又如何今又如何這語得那語不得那裏是虗這裏是實你與我拈出絲毫許實底道理來看此蓋當人眼不開自無見處一向承虗接響百般忌諱自纏自縛直饒與麼說當下忽然見得倜儻分明去也是棺木裏瞪眼如今還有無師智自然智不與萬法為侶者烜赫底丈夫漢齖齖千變萬化見我恁麼胡言漢語便好近前驀口摑拽下椅子擲向三門外喝散大衆豈不快哉還有麼良久云若無且看老僧騎案山跳入你諸人眼睛裏七顛八倒訶佛罵祖去也喝一喝下座宗門武庫云照覺禪師自泐潭移虎溪乃赴王子淳觀文所請開堂後百廢竝舉升堂小參入室無虗日嘗言晦堂真淨同門諸老祇參得先師禪不得先師道師曰蓋照覺以平常無事不立知見解會為道更不求妙悟却將諸佛諸祖德山臨濟曹洞雲門真實頓悟見性法門為建立楞嚴經中所說山河大地皆是妙明真心中所現物為膈上語亦是建立以古人談玄說妙為禪誣罔先聖聾瞽後昆眼裏無筋皮下無血之流隨例顛倒恬然不覺真可憐憫圓覺經云末世衆生希望成道無令求悟惟益多聞增長我見又云末世衆生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非衆生咎豈虗語哉所以真淨和尚小參云舉執個一切平常至憑將去晦堂和尚謂學者曰你去廬山無事甲裏坐地去而今子孫門如死灰良可嘆也朱顯謨世英問佛法大意師以書答曰辱書以佛法為問佛法至妙無二但未至於妙則互有長短苟至於妙則悟心之人如實知自心究竟本來成佛如實自在如實安樂如實解脫如實清淨而日用惟用自心自心變化把得便用莫問是非擬心思量已不是也不擬心一一天真一一明妙一一如蓮花不著水所以迷自心故作衆生悟自心故成佛而衆生即佛佛即衆生由迷悟故有彼此也如今學者多不信自心不悟自心不得自心明妙受用不得自心安樂解脫心外妄有禪道妄立奇特妄生取捨縱修行落外道二乘禪寂斷見境界洪覺範曰雲菴之言蓋救一時之弊然其旨要曉然可以發人之昧昧法界三觀六頌色空無礙如意自在萬象森羅影現中外出沒去來此土他界心印廓然融通廣大理事無礙如意自在倒把須彌卓向纖芥清淨法身圓滿土塊一點鏡燈十方海會事事無礙如意自在不動道場十方世界東涌西沒千差萬怪火裏蝍蟟吞却螃蟹事事無礙如意自在手把猪頭口誦淨戒趁出淫坊未還酒債十字街頭解開布袋張無盡寓荊南以道學自居少見推許佛果禪師謁之劇談華嚴旨要曰華嚴現量境界理事全真初無假法所以即一而萬了萬為一一復一萬復萬浩然莫窮心佛衆生三無差別卷舒自在無礙圓融此雖極則終是無風匝匝之波張於是不覺促榻師遂問曰到此與祖師西來意為同為別張曰同矣師曰且得沒交涉張色為之慍師曰不見雲門道山河大地無絲毫過患猶是轉句直得不見一色始是半提更須知有向上全提時節彼德山臨濟豈非全提乎張乃首肯翌日復舉事法界理法界至理事無礙法界師又問此可說禪乎張曰正好說禪也師笑曰不然正是法界量裏在蓋法界量未滅若到事事無礙法界法界量滅始好說禪如何是佛乾屎橛如何是佛麻三斤故真淨偈云云即舉此偈張曰美哉之論豈易聞乎事事無礙如意自在拈起一毛重重法界一念遍入無邊剎海只在目前或顯或晦事事不知色空誰會理事既休鐵船下海石火電光咄哉不快橫按鏌鋣魔軍膽碎崇寧元年十月十六日中夜沐浴更衣跏趺辭衆衆請說法師笑曰今年七十八四大將離別火風既分散臨行休更說遺誡諸徒衆畢泊然而寂又七日闍維五色成𦦨白光上騰烟所及皆成舍利道俗千餘人皆得之分塔於泐潭洞山大慧云老南下尊宿五祖只肯晦堂真淨二老而已自餘不肯他也五祖為人如綿裏一柄刀相似才按著便將咽㗋一刺刺殺你去也若是真淨腳上著也即腳上殺你手上著也即手上殺你咽㗋上著也即咽㗋上殺你潭州雲蓋守智禪師遊方至雙嶺寺謁法昌遇禪師遇方附火師揭簾遇詬曰誰故出我烟師反走遇呼曰來汝何所來曰大寧遇曰三門夜來倒知否師愕然曰不知遇曰吳中石佛大有人不曾得見師惘然即展拜遇使謁翠巖真久之無省及謁黃龍於積翠始盡所疑政和五年三月七日升座說偈曰未出世頭如馬杓出世後口如驢嘴百年終須自壞一任天下卜度歸方丈安坐良久乃化吉州隆慶院慶間禪師福州古田卓氏子母夢胡僧授以明珠而孕及生白光滿室幼不近酒胾年十一出家二十遠遊貌豐碩寡言語惟道是究所至自處罕與人接有即之者一舉手而去父事黃龍龍甚重之時與翠巖順公同在黃檗順時時詰問師師橫機無所讓順謂龍曰間輕易且語未辨觸淨龍曰法如是以情求間乃成是非師嘗問龍文首座何如在黃檗時龍曰渠在黃檗時如人暴富用錢如糞土邇來如數世富人一錢不虗用既龍過雙嶺師謁龍龍問甚處來師曰百丈曰幾時離彼師曰正月十三龍曰腳跟好痛與三十棒師曰非但三十棒龍喝曰許多時行腳無點氣息師曰百千諸佛亦乃如是龍曰汝與麼來何曾有纖毫到諸佛境界師曰諸佛未必到慶間境界龍隨問如何是汝生緣處師曰早晨喫白粥如今又覺饑問我手何似佛手師曰月下弄琵琶問我腳何似驢腳師曰鷺鷥立雪非同色龍咨嗟而視曰汝剃除鬚髮當為何事師曰祇要無事龍曰既無事何須剃髮師曰若不剃髮爭知無事曰與麼則數聲清磬是非外一個間人天地間也師曰是何言歟曰靈利衲子師曰也不消得龍便喝師拍一拍龍又喝師便出復侍次龍曰此間有辨上座者汝著精彩師曰他有甚麼長處曰他拊汝背一下又如何師曰作甚麼曰他展兩手師曰甚處學這虗頭來龍大笑師却展兩手龍喝師便出齊後又侍立龍問𢤱𢤱鬆鬆兩人共一碗作麼生會師曰百雜碎曰盡大地是個須彌山撮來掌中汝又作麼生會師曰兩重公案曰這裏從汝胡言漢語若到同安如何過得英邵武在同安師將往謁故云師曰渠也須到這個田地始得曰忽被渠指火罏曰這個是黑漆火罏那個是黑漆香桌甚處是不到處師曰慶間面前且從恁麼說話若是別人笑和尚去龍拍一拍師便喝明日同看僧堂曰好僧堂師曰極好工夫曰好在甚處師曰一梁拄一柱曰此未是好處師曰和尚又作麼生龍以手指曰這柱得與麼圓那枋得與麼匾師曰人天大善如識須是和尚始得便出龍出堂外曰適來與麼是肯你不肯你師曰若與麼何曾得安樂處師上方丈問訊龍曰據汝知見祇得上梢不得下梢師曰某甲上梢亦得下梢亦得曰如何是上梢師曰風過樹頭搖曰如何是下梢師曰刀斫斧鑿龍曰老僧即不然師曰如何是上梢曰頭鬅鬙耳卓朔曰如何是下梢曰緊帩草鞋師曰謝師答話龍便喝明日侍立龍問得坐披衣向後如何施設師曰遇方即方遇圓即圓曰汝與麼說話猶帶唇齒在師曰慶間即與麼和尚作麼生曰近前來為汝說師拊掌曰三十年用底今朝捉敗龍大笑曰一等是精靈師拂袖而去由是學者爭歸之師室中每垂問魚行水濁鳥飛毛落亮座主一入西山為甚麼杳無消息元豐四年三月七日告衆將入滅說偈曰露質浮世奄忽入滅五十三歲六七八月南嶽天台松風㵎雪珍重知音紅罏優鉢說偈畢乃入浴浴出方以巾搭膝而化神色不變為著衣手足和柔髮剃復出畫工就寫其真首忽自舉次日仍平視太守來觀願留全身而僧利儼曰遺言令化闍維日薪盡火滅跏趺不散以油沃薪益之乃化是日雲起風作飛瓦折木烟氣所至東西南北四十里凡草木沙礫之間皆得舍利如金色計其所獲幾數斛初蘇子由欲為作記而疑其事方臥痁夢有訶者曰間師事何疑哉疑即病矣子由夢中作銘覺復疏之中有云稽首三界尊間師不止此憫世狹劣故聊示其小者子由其知言哉洪覺範為師傳贊曰潛菴為豫言閉為人氣剛而語急嘗同宿見其坐而假寐夢語滾滾而領略識之皆古衲機緣初以為適然已而每每連榻莫不爾蓋其欵誠於道精一如此唐道氳譏明皇曩於般若聞薰不一而沉佇想自起現行間之去留踐履之驗非聞薰不一者也張無垢問大慧曰某每於夢中必誦語孟何如慧舉圓覺曰由寂靜故十方世界諸如來心於中顯現如鏡中像無垢曰非老師莫聞此論也又慧答向伯恭侍郎書曰示論悟與未悟夢與覺一一段因緣黃面老子云汝以緣心聽法此法亦緣謂至人無夢非有無之無謂夢與非夢一而已以是觀之則佛夢金鼓高宗夢傳說孔子夢奠兩楹亦不可作夢與非夢解却來觀世間猶如夢中事教中自有明文惟夢乃全妄想也而衆生顛倒以日用目前境界為實殊不知全體是夢而於其中復生虗妄分別以想心繫念神識紛飛為實夢殊不知正是夢中說夢顛倒中又顛倒故佛大慈悲老婆心切悉能遍入一切法界諸安立海所有微塵於一一塵中以夢自在法門開悟世界海微塵數衆生住邪定者入正定聚此亦普示顛倒衆生以目前實有底境界為安定海令悟夢與非夢悉皆是幻則全夢有實全實是夢不可取不可捨至人無夢之義如是而已來書見問乃是某三十六歲之所疑讀之不覺抓著癢處亦嘗以此問圜悟先師但以手指曰住住休妄想休妄想某復曰如某未睡著時佛所讚者依而行之佛所訶者不敢違犯從前依師及自做工夫零碎所得者惺惺時却得受用及乎上牀半醒半覺時已做主宰不得夢見得金寶則夢中歡喜無量夢見被人以刀杖相逼及諸惡境界則夢中怕怖惶恐自念此身尚存只是睡著已作主宰不得況地水火風分散衆苦熾然如何得不被回換到這裏方始著忙先師又曰待汝說底許多妄想絶時汝自到寤寐恆一處也初聞亦未之信每日我自顧寤與寐分明作兩段如何敢開大口說禪除非佛說寤寐恆一是妄語則我此病不須除佛語果不欺人乃是我自未了後因聞先師舉諸佛出身處薰風自南來忽然去却礙膺之物方知黃面老子所說是真語實語如語不誑語不妄語不欺人真大慈悲粉身沒命不可報礙膺之物既除方知寐時便是寤時底寤時便是寐時底佛言寤寐恆一方始自知這般道理拈出呈似人不得說與人不得如夢中境界取不得捨不得承問妙喜於未悟已前已悟之後有異無異不覺依實供通子細讀來教字字至誠不是問禪亦非見詰故不免以昔時所疑處吐露願居士試將老龐語謾提撕但願空諸所有切勿實諸所無先以目前日用境界作夢會了然後却將夢中底移來目前則佛金鼓高宗得說孔子奠兩楹决不是夢矣高峰妙禪師初參斷橋無所省既參雪巖欽令看無字初每詰其日用所做工夫如何久之不問做處一入門便問阿誰與你拖這死尸來聲未絶便痛拳打出未幾巖遷南明峰過徑山忽於夢中憶斷橋和尚室中所舉萬法歸一一歸何處話疑情頓發寢食俱忘東西不辨至第六日在堂下行見衆僧堂內出不覺輥於隊中至三塔閣上諷經擡頭忽見演和尚真讚有云百年三萬六千朝反覆元來是這漢頓悟巖所問拖死尸語如放下百二十斤擔子乃過南明謁巖巖屢加煅煉峰於古人公案雖不受瞞及開口則又覺有礙於日用中尚不得自由如缺人債相似巖遷天寧峰又隨侍巖問日間浩浩時還作得主麼峰云作得主巖云睡夢中作得主麼峰云作得主又問正睡著時無夢無想無見無聞主在甚麼處峰茫然不能答巖云從今日去也不要你學佛學法也不要你窮古窮今你只饑來喫飯困來打眠才眠覺來却抖擻精神我這一覺畢竟主人公在甚麼處安身立命峰稟教即自誓云𢬵一生作個癡呆漢定要這一著子明白經及五年一日寓菴睡覺正疑此事忽同宿道友推枕子墮地作聲驀然打破疑團如在網中跳出追憶日前所疑佛祖誵訛公案古今差別因緣恰如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處圜悟禪師和靈源瞌睡歌云懵懵懂懂無巴鼻兀兀陶陶絶忌諱信任流光動地遷不論冬夏惟瞌睡個中滋味佛不知空咄蛤蚌與螺師放身不管臥水底與發長捱布袋兒鼻息如雷誰顧得尋常少見有醒時沒醒時良有以要明瞌睡中宗旨從來一覺到天明佛來不解擡身起縱使舒光遍大千終難換我無憂底校疏親渾打失瞌睡根靈莫窮詰有人契會便參同睡著須知更綿密
