body:
  text: 應化聖賢文殊菩薩一日令善財採藥曰是藥者採將來善財遍觀大地無不是藥却來白曰無有不是藥者殊曰是藥者採將來善財遂於地上拈一莖草度與文殊殊接得示衆曰此藥能殺人亦能活人首山念云文殊大似掩耳偷鈴琅瑘覺云文殊可謂誠實之言要且額頭汗出口裏膠生天童華云大小文殊被善財換却眼睛石田薰頌云採藥與用藥相逢一會家殺人活人不眨眼白玉無瑕却有瑕文殊問菴提遮女曰生以何為義女曰生以不生生為生義殊曰如何是生以不生生為生義女曰若能明知地水火風四緣未嘗自得有所和合而能隨其所宜是為生義殊曰死以何為義女曰死以不死死為死義殊曰如何是死以不死死為死義女曰若能明知地水火風四緣未嘗自得有所離散而能隨其所宜是為死義菴提遮女問文殊曰明知生是不生之理為何却被生死之所流轉殊曰其力未充進山主問修山主明知生是不生之理為甚麼却被生死之所流轉修曰筍畢竟成竹去如今作篾使還得麼進云汝向後自悟去在修云某甲所見祇如此上座意旨如何進指云這個是監院房那個是典座房修乃禮謝簡翁敬頌云問處分明答處端當機覿面不相瞞死生生死元無際月上青山玉一團文殊大士嘗謂善住意天子云汝今若能違背諸佛毀謗法僧吾即將同汝如是梵行天子云大士今何故復如是語大士云天子如汝意者以何為佛天子云如如法界我言是佛大士云天子於汝意云何如如法界可染著乎天子云弗也大士云以是義故我如是説汝今若能背毀佛法僧吾將同汝如是梵行善住天子準上應有意字此或另是一天子而白文殊可共俱往如來之所咨受未聞亦同此時如法問難文殊云爾莫分別取著如來天子云如來今在何所令我莫著文殊云祇在目前天子云若如是者我何不見文殊云爾若一切不見是名真見如來天子云若見在前云何戒我莫取著如來文殊云爾今見前何有天子云有虗空界文殊云如來者虗空界是故虗空界者即是如來此中無有一物可分別者大小文殊趁著天子腳跟轉天子却惺惺文殊未具眼天親菩薩從彌勒內宮而下無著菩薩問曰人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審説甚麼法天親曰祇説這個法祗是梵音清雅令人樂聞薦福懷云彌勒已是錯説天親已是錯傳山僧今日將錯就錯與你諸人注破良久云諦聽諦聽向下文長付在來日維摩會上三十二菩薩各説不二法門文殊曰我於一切法無言無説無示無識離諸問答是為菩薩入不二法門於是文殊又問維摩仁者當説何等是菩薩入不二法門維摩默然文殊讚曰乃至無有語言文字是菩薩真入不二法門雪竇舉此至仁者當説何等是菩薩入不二法門不舉維摩默然便云維摩道甚麼又云勘破了也復頌云咄這維摩老悲生空懊惱臥疾毗耶離全身大枯稿七佛祖師來一室且頻掃請問不二門當時便靠倒不靠倒金毛師子無處討圜悟勤云如今禪和子便道無語是靠倒且莫錯認定盤星白雲端頌云一個兩個百千萬屈指尋文數不辦暫時放在暗前明日與君重計算善財參五十三員善知識末後到彌勒閣前見樓閣門閉瞻仰讚歎見彌勒從別處來善財作禮曰願樓閣門開令我得入尋時彌勒至善財前彈指一聲樓閣門開善財入已閣門即閉見百千萬億樓閣一一樓閣內有一彌勒領諸眷屬并一善財而立其前善財因無著菩薩問曰我欲見文殊何者即是財曰汝發一念心清淨即是無著曰我發一念心清淨為甚麼不見財曰是真見文殊須菩提尊者在巖中宴坐諸天雨花讚歎者曰空中雨花讚歎復是何人云何讚歎天曰我是梵天敬重尊者善説般若者曰我於般若未嘗説一字云何讚歎天曰如是尊者無説我乃無聞無説無聞是真説般若尊者一日説法次帝釋雨花者乃問此花從天得耶從地得耶從人得耶釋曰弗也者曰從何得耶釋乃舉手者曰如是如是雲門偃云帝釋舉手處與你四大五蘊釋迦老子是同是別妙喜曰須菩提解空第一生時家室盡空世尊才升座須菩提便出衆云希有世尊且道見甚麼道理便恁麼道天親菩薩作無量偈只讚希有二字圜悟禪師云一句是一個鐵橛故六祖聞應無所住而生其心便悟去無厭足王入大寂定乃敕有情無情皆順於王若有一物不順於王即入大寂定不得緊那羅王奏無生樂供養佛乃敕有情無情俱隨王去若有一物不隨王去即去佛處不得舍利弗尊者因入城遙見月上女出城舍利弗心口思惟此姊見佛否知得忍不得忍否我當問之才近便問大姊往甚麼處去女曰如舍利弗與麼去弗曰我方入城汝方出城何言如我恁麼去女曰諸佛弟子當依何住弗曰諸佛弟子依大涅槃而住女曰諸佛弟子既依大涅槃而住我亦如舍利弗與麼去舍利弗問須菩提夢中説六波羅蜜與覺時同異提曰此義深遠吾不能説會中有彌勒大士汝往彼問舍利弗問彌勒彌勒云誰是彌勒誰名彌勒舍利弗問天女曰何以不轉女身女曰我從十二年來求女人相了不可得當何所轉即時天女以神通力變舍利弗令如天女女自化身如舍利弗乃問言何以不轉女身舍利弗以天女像而答言我今不知云何轉面而變為女身鴦崛魔羅尊者未出家時外道受教為憍尸迦欲登王位用千人拇指為花冠已得九百九十九唯欠一指遂欲殺母取指時佛在靈山以天眼觀之乃作沙門在鴦崛前鴦崛遂釋母欲殺佛佛徐行鴦崛急行追之不及乃喚曰瞿曇住住佛告曰我住久矣是汝不住鴦崛聞之心忽開悟遂棄刃投佛出家賓頭盧尊者因阿育王內宮齋三萬大阿羅漢躬自行香見第一座無人王問其故海意尊者曰此是賓頭盧位此人近見佛來王曰今在何處者曰且待須臾言訖賓頭盧從空而下王請就座禮敬者不顧王乃問承聞尊者親見佛來是否者以手䇿起眉曰會麼王曰不會者曰阿耨達池龍王曾請佛齋吾是時亦預其數翠巖真云且道甚麼處見直饒雪天縹眇湖光淡蕩且莫説夢障蔽魔王領諸眷屬一千年隨金剛齊菩薩覓起處不得忽一日得見乃問曰汝當依何而住我一千年覓汝起處不得齊曰我不依有住而住不依無住而住如是而住法眼云障蔽魔王不見金剛齊即從只如金剛齊還見障蔽魔王麼妙喜曰既覓起處不得一千年隨從底是甚麼金剛齊云我不依有住而住不依無住而住互相熱謾法眼道障蔽魔王不見金剛齊即且從只如金剛齊還見障蔽魔王麼恁麼批判也是看孔著楔即今莫有知得妙喜起處底麼隨後咄云寐語作麼那吒太子析骨還父析肉還母然後現本身運大神力為父母説法廣額屠兒於涅槃會上放下屠刀立便成佛自云是賢劫千佛一數東山覺拈云今時叢林將為廣額是過去一佛權現屠兒且喜沒交涉又謂廣額是殺人不眨眼底漢揚下屠刀立便成佛且喜沒交涉又道廣額揚下屠刀曰我是千佛一數這一佛多少分明且喜沒交涉要識廣額麼夾路桃花風雨後馬蹄何處避殘紅文殊思業禪師世為屠宰一日戮豬次忽洞徹心源遂棄業為比丘述偈曰昨日夜叉心今朝菩薩面菩薩與夜叉不隔一條線往見文殊心道禪師道佛鑑法嗣也殊曰你正殺豬時見個甚麼便乃剃頭行腳師遂作鼓刀勢殊喝曰這屠兒參堂去師便下參堂住文殊日上堂舉趙州勘婆話乃曰勘破婆子面青眼黑趙州老漢瞞我不得秦跋陀禪師問生法師講何經論生曰大般若經師曰作麼生説色空義曰衆微聚曰色衆微無自性曰空師曰衆微未聚喚作甚麼生罔措師又問別講何經論曰大涅槃經師曰如何説涅槃之義曰涅而不生槃而不滅不生不滅故曰涅槃師曰這個是如來涅槃那個是法師涅槃曰涅槃之義豈有二耶某甲祇如此未審禪師如何説涅槃師拈起如意曰還見麼曰見師曰見個甚麼曰見禪師手中如意師將如意擲於地曰見麼曰見師曰見個甚麼曰見禪師手中如意墮地師斥曰觀公見解未出常流何得名喧宇宙拂衣而去其徒懷疑不已乃追師扣問我師説色空涅槃不契未審禪師如何説色空義師曰不道汝師説得不是汝師祇説得果上色空不會説得因中色空其徒曰如何是因中色空師曰一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微高僧傳作佛馱跋陀羅問鳩摩羅什語佛馱跋陀羅乃佛大先弟子也寶志禪師金陵東陽民朱氏之婦上巳日聞兒啼鷹窠中梯樹得之舉以為子七歲依鍾山大沙門僧儉出家專修禪觀宋太始二年髮而徒跣著錦袍往來皖山劒水之下以剪尺拂子拄杖頭負之而行梁武帝詔問弟子煩惑未除何以治之答曰十二帝問其旨如何答曰在書字時節刻漏中帝益不曉帝又問弟子何時得以靜心修習師曰安樂禁幻寄曰志公安樂禁及十二其旨與達磨之不識德山棒臨濟喝皆自靈山拈花一脈相承如塗毒鼓如太阿劒聞之者喪嬰之者斷不可以心思意解者而或者謂十二乃十二因緣治惑藥也其在書字時節刻漏中乃書之在十二時中也安樂禁禁者止也至安樂時乃止耳此所以為修習也是以趙州庭柏為三界唯心溈山拂子為附物顯理者同道座主奴也何足以語此或者語出傳燈録梁武未識達磨舉朝亦不識志公帝嘗詔畫工張僧繇寫師像僧繇下筆輒不自定師遂以指𠢐面門分披出十二面觀音妙相殊麗或慈或威僧繇竟不能寫他日與帝臨江縱望有物泝流而上師以杖引之隨杖而至乃紫栴檀也即以屬供奉官俞紹令雕師像頃刻而成神彩如生師嘗數日不食無飢容時或歌吟詞如讖記靈迹炳著士庶皆共事之初齊建元中武帝謂師惑衆收付建康獄既旦人見其入市及檢獄如故建康令以事聞帝延之於華林園忽一日重著三布帽亦不知於何所得之俄豫章王文惠太子相繼薨齊亦以此衰矣由是禁師出入至梁乃下詔褒師令勿復禁師問一梵僧承聞尊者喚我作屠兒曾見我殺生麼曰見師曰有見見無見見不有不無見若有見見是凡夫見無見見是聲聞見不有不無見是外道見未審尊者如何見梵僧曰你有此等見耶汾陽曰不枉西來師垂語曰終日拈香擇火不知身是道場又曰京都鄴都浩浩還是菩提大道法眼別云京都鄴都浩浩不是菩提大道又曰如我身空諸法空千品萬類悉皆同雲門云你立不見立行不見行四大五蘊不可得何處見有山河大地來是你每日把鉢盂噇飯喚甚麼作飯何處更有一粒米來大乘讚十首大道常在目前雖在目前難覩若欲悟道真體莫除聲色言語言語即是大道不假斷除煩惱煩惱本來空寂妄情相纏繞一切如影如響不知何惡何好有心取相為實定知見性不了若欲作業求佛佛是生死大兆生死業常隨身黑暗獄中未曉悟理本來無異覺後誰晚誰早法界量同太虗衆生智心自小但能不起吾我涅槃法食常飽一妄身臨鏡照影影與妄身不殊但欲去影留形不知身本同虗身本與影不異不得一有一無若欲存一捨一永與直理相疏更若愛聖憎凡生死海裏沉浮煩惱因心有故無心煩惱何居不勞分別取相自然得道須臾夢時夢中造作覺時覺境都無翻思覺時與夢顛倒二見不殊改迷取覺求利何異販賣商徒動靜兩忘常寂自然契合真如若言衆生異佛迢迢與佛常疏佛與衆生不二自然究竟無餘二法性本來常寂蕩蕩無有邊畔安心取捨之間被他二境回換斂容入定坐禪攝境安心覺觀機關木人修道何時得達彼岸諸法本空無著境似浮雲會散忽悟本性元空恰似熱病得汗無智人前莫説打你色身星散三報你衆生直道非有即是非無非有非無不二何須對有論虗有無妄心立號一破一個不居兩名由爾情作無情即是真如若欲存情覓佛將網山上羅魚徒費工夫無益幾許枉用工夫不解即心即佛真似騎驢覔驢一切不憎不愛這個煩惱須除除之則須除身除身無佛無因無佛無因可得自然無法無人四大道不由行得説行權為凡愚得理返觀於行始知枉用工夫未悟圓通大理要須言行相扶不得執他知解回光返本全無有誰解會此説教君向己推求自見昔時罪過除却五欲瘡疣解脫逍遙自在隨方賤賣風流誰是發心買者亦得似我無憂五內見外見總惡佛道魔道俱錯被此二大波旬便見厭苦求樂生死悟本體空佛魔何處安著只由妄情分別前身後身孤薄輪回六道不停結業不能除却所以流浪生死皆由橫生經略身本虗無不實返本是誰斟酌有無我自能為不勞妄心卜度衆生身同太虗煩惱何處安著但無一切希求煩惱自然銷落六可笑衆生蠢蠢各執一般異見但欲傍鏊求餅不解返本觀麵麵是正邪之本由人造作百變所須任意縱橫不假偏耽愛戀無著即是解脫有求又遭羅罥慈心一切平等真如菩提自現若懷彼我二心對面不見佛面七世間幾許癡人將道復欲求道廣尋諸義紛紛自救己身不了專尋他文亂説自稱至理妙好徒勞一生虗過永劫沉淪生老濁愛纏心不捨清淨智心自惱真如法界叢林反作荊棘荒草但執黃葉為金不悟棄金求寶所以失念狂走強力裝持相好口內誦經誦論心裏尋常枯稿一朝覺本心空具足真如不少八聲聞心心斷惑能斷之心是賊賊賊相除遣何時了本語默口內誦經千卷體上問經不識不解佛法圓通徒勞尋行數墨頭陀阿練苦行希望後身功德希望即是隔聖大道何由可得譬如夢裏渡河船師渡過河北忽覺牀上安眠失却渡船軌則船師及彼渡人兩個本不相識衆生迷倒羈絆往來三界疲極覺悟生死如夢一切求心自息九悟解即是菩提了本無有階梯堪歎凡夫傴僂八十不能跋蹄徒勞一生虗過不覺日月遷移向上看他師口恰似失嬭孩兒道俗崢嶸聚集終日聽他死語不觀己身無常心行貪如狼虎堪嗟二乘狹劣要須摧伏六府不食酒肉五辛邪眼看他飲咀更有邪行猖狂修氣不食鹽醋若悟上乘至真不假分別男女十十四科頌十四首菩提煩惱不二衆生不解修道便欲斷除煩惱煩惱本來空寂將道更欲覓道一念之心即是何須別處尋討大道祇在目前愚倒迷人不了佛性天真自然亦無因緣修造不識三毒虗假妄執浮沉生老昔時迷日為晚今日始覺非早持犯不二丈夫運用無礙不為戒律所制持犯本自無生愚人被他禁繫智者造作皆空聲聞觸途為滯大士肉眼圓通二乘天眼有翳空中妄執有無不達色心無礙菩薩與俗同居清淨曾無染世愚人貪著涅槃智者生死實際法性空無言説緣起略無人會百歲無智小兒小兒有智百歲佛與衆生不二衆生與佛無殊大智不異於愚何須向外求寶身田自有明珠正道邪道不二了知凡聖同途迷悟本無差別涅槃生死一如究竟攀緣空寂惟求意想清虗無有一法可得翛然自入無餘事理不二心王自在翛然法性本無十纏一切無非佛事何須攝念坐禪妄想本來空寂不用斷除攀緣智者無心可得自然無諍無喧不識無為大道何時得證幽玄佛與衆生一種衆生即是世尊凡夫妄生分別無中執有迷奔了達貪嗔空寂何處不是真門靜亂不二聲聞厭喧求靜猶如棄麵求餅餅即從來是麵造作隨人百變煩惱即是菩提無心即是無境生死即是涅槃貪嗔如焰如影智者無心求佛愚人執邪執正徒勞空過一生不見如來妙頂了達淫欲性空鑊湯罏炭自冷善惡不二我自身心快樂翛然無善無惡法身自在無方觸目無非正覺六塵本來空寂凡夫妄生執著涅槃生死本平四海阿誰厚薄無為大道自然不用將心畫度菩薩散誕靈通所作常含妙覺聲聞執法坐禪如蠶吐絲自縛法性本來圓明病愈何須執藥了知諸法平等翛然清虗快樂色空不二法性本無青黃衆生謾造文章吾我説他止觀自意擾擾顛狂不識圓通妙理何時得會真常自疾不能治療却教他人藥方外看將為是善心內猶若豺狼愚人畏其地獄智者不異天堂對境心常不起舉足皆是道場佛與衆生不二衆生自作分張若欲除却三毒迢迢不離災殃智者知心是佛愚人樂往西方生死不二世間諸法如幻生死猶若雷電法身自在圓通出入山河無間顛倒妄想本空般若無迷無亂三毒本自解脫何須攝念禪觀只為愚人不了從他戒律決斷不識寂滅真如何時得登彼岸智者無惡可斷運用隨心合散法性本來空寂不為生死所絆若欲斷除煩惱此是無明癡漢煩惱即是菩提何用別求禪觀實際無佛無魔心體無形無段斷除不二丈夫運用堂堂逍遙自在無妨一切不能為害堅固猶若金剛不著二邊中道翛然非斷非常五欲貪嗔是佛地獄不異天堂愚人妄生分別流浪生死猖狂智者達色無礙聲聞無不恓惶法性本無瑕翳衆生妄執青黃如來引接迷愚或説地獄天堂彌勒身中自有何須別處思量棄却真如佛像此人即是顛狂聲聞心中不了惟只趁逐言章言章本非真道轉加鬪爭剛強心裏蚖蛇蝮蠍螫著便即遭傷不解文中取義何時得會真常死入無間地獄神識枉受災殃真俗不二法師説法極好心中不離煩惱口談文字化他轉更增他生老真妄本來不二凡夫棄妄覓道四衆雲集聽講高座論義浩浩南坐北坐相爭四衆為言疑嫌為好雖然口談甘露心裏尋常枯燥自己元無一錢日夜數他珍寶恰似無智愚人棄却真金擔草心中三毒不捨未審何時得道解縛不二律師持律自縛自縛亦能縛他外作威儀恬靜心內恰似洪波不駕生死船筏如何渡得愛河不解真宗正理邪見言辭繁多有二比丘犯律便却往問優波優波依律説罪轉增比丘網羅方丈室中居士維摩便即來訶優波默然無對淨名説法無過而彼戒性如空不在內外娑婆勸除生滅不肯忽悟還同釋迦境照不二禪師體離無明煩惱從何處生地獄天堂一相涅槃生死空名亦無貪嗔可斷亦無佛道可成衆生與佛平等自然聖智惺惺不為六塵所染句句獨契無生正覺一念玄解三世坦然皆平非法非律自制翛然真入圓成絶此四句百非如空無作無依運用無礙我今滔滔自在不羡公王卿宰四時猶若金剛苦樂心常不改法寶踰於須彌智慧廣於江海不為八風所牽亦無精進懈怠任性浮沉若顛散誕縱橫自在這應是遮莫刀劍臨頭我曰應是亦安然不釆迷悟不二迷時以空為色悟即以色為空迷悟本無差別色空究竟還同愚人喚南作北智者達無西東欲覓如來妙理常在一念之中陽𦦨本非其水渴鹿狂趁忩忩自身虗假不實將空更欲覓空世人迷倒至甚如犬吠雷叿叿十二時頌平旦寅狂機內有道人身窮苦已經無量劫不信常擎如意珍若捉物入迷津但有纖毫即是塵不住舊時無相貌外求知識也非真日出卯用處不須生善巧縱使神光照有無起意便遭魔事嬈若施功終不了日夜被他人我拗不用安排只麼從何曾心地生煩惱食時辰無明本是釋迦身坐臥不知元是道只麼忙忙受苦辛認聲色覓疏親只是他家染污人若擬將心求佛道問取虗空始出塵禺中巳未了之人教不至假使通達祖師言莫向心頭安了義只守玄沒文字認著依前還不是暫時自肯不追尋曠劫不遭魔境使日南午四大身中無價寶陽𦦨空華不肯拋作意修行轉辛苦不曾迷莫求悟任你朝陽幾回暮有相身中無相身無明路上無生路日昳未心地何曾安了義他家文字沒親疏不用將心求的意任縱橫絶忌諱長在人間不在世運用不離聲色中歷劫何曾暫拋棄晡時申學道先須不厭貧有相本來權積聚無形何用要求真作淨潔却勞神万應是方認愚癡作近鄰言下不求無處所暫時喚作出家人目入酉虗幻聲音不長久禪悅珍羞尚不餐誰能更飲無明酒勿可拋勿可守蕩蕩逍遙不曾有縱你多聞達古今也是癡狂外邊走黃昏戌狂子施功投暗室假使心通無量時歷劫何曾異今日擬商量却啾唧轉使心頭黑如漆晝夜舒光照有無疑人喚作波羅蜜人定亥勇猛精進成懈怠不起纖毫修學心無相光中常自在超釋迦越祖代心有微塵還質應作窒礙放蕩長如癡兀人他家自有通人愛半夜子心住無生即生死生死何曾屬有無用時便用無文字祖師言外邊事識取起時還不是作意搜求實沒蹤生死魔來任相試雞鳴丑一顆圓光明已久內外推尋覔總無境上施為渾大有不見頭亦無手天地壞時渠不朽未了之人聽一言只這如今誰動口洪覺範曰志公十二時歌大明佛祖要妙然年代寖遠昧者多改易其語以徇其私其大害意者如曰夜半子心住無生即生死心法何曾屬有無用時便用沒文字乃作生死何曾屬有無言則工矣然下句血脈不貫既曰生死不屬有無又曰用時便用何哉幻寄曰覺範於文字轉接處求志公語脈既其華未既其實使生死不屬有無不可用時便用則心法不屬有無又何可用時便用且知生之未嘗生死之未嘗死翛然而來翛然而往非生死不屬有無而用時便用乎見有生死則有心法見無生死則無心法不見古人道生死中無佛則無生死耶生死心法同一幻泡未可若是分別也志公諸讚詠拔善惡刺裂凡聖網苟會其旨則踏毗盧頂𩕳上行一以情求則入地獄如箭射真龍象蹴踏非驢所堪也天監十三年冬將卒忽告衆僧令移寺金剛神像出置於外乃密謂人曰菩薩將去未及旬日無疾而終舉體香耎臨亡然一燭以付後閣舍人吳慶慶以事聞帝歎曰大師不復留矣燭者其以後事囑我乎因厚禮葬於鍾山獨龍阜仍令開善精舍敕陸倕製銘於冢內王筠立於寺門處處傳遺像焉幻寄曰可惜一枝燭分付不著人却作後事會咦若作佛法會便好與梁武一坑埋却因述頌云達磨隻履携歸𦵇嶺志公一燭梁宮搖影青陽已謝行人遠落花滿階月華冷銀河西橫玉漏殘夢破轆轤鳴露井善慧大士者婺州義烏縣人齊建武四年丁丑五月八日降於雙林鄉傅宣慈家本名翕年十六娶劉氏女名妙光生二子普建普成二十四與里人稽亭浦摝魚獲已沉籠水中曰去者適止者留人或謂之愚會有天竺僧嵩頭陀曰我與汝毗婆尸佛所發誓今兜率宮衣鉢現在何日當還因命臨水觀影見圓光寶蓋大士笑謂之曰爐韛之所多鈍鐵良醫之門足病人度生為急何思彼樂乎嵩指松山頂曰此可棲矣大士躬耕而居之有人盜菽麥瓜果大士見即與籃籠盛去日常營作夜則行道見釋迦金粟定光三如來放光襲其體大士乃曰我得首楞嚴定天嘉二年感七佛相隨釋迦引前維摩接後惟釋尊數顧共語為我補處也其山頂黃雲盤旋若蓋因號雲黃山梁武帝請講金剛經士才升座以尺揮案一下便下座帝愕然聖師曰陛下還會麼帝曰不會聖師曰大士講經竟又一日講經次帝至大衆皆起士端坐不動近臣報曰聖駕在此何不起士曰法地若動一切不安大士一日披衲頂冠靸履朝見帝問是僧耶士以手指冠帝曰是道耶士以手指靸履帝曰是俗耶士以手指衲衣有偈曰有物先天地無形本寂寥能為萬象主不逐四時凋又曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處祇這語聲是保寧勇云大衆傅大士此頌古今不墜一切人知向此瞥地者固多錯會者不少玄沙云大小傅大士只認得個昭昭靈靈洞山聰云且道衲僧家日裏還曾睡也無此兩轉語誰言世上無仙客須信壺中別有天保寧亦有一頌要眠時即眠要起時即起水洗面皮光啜茶濕却嘴大海紅塵飛平地波濤起呵呵阿呵呵囉哩囉囉哩又曰空手把鉏頭步行騎水牛人在橋上過橋流水不流斷橋倫頌云狗走抖擻口猴愁搜搜頭瑞巖門外水自古向西流張無盡見皓布裩舉大士此頌皓曰此頌得法身邊事頌不得法身向上事無盡曰請和尚頌皓遂應聲頌曰昨夜雨雱亨打倒葡萄棚知事普請行者人力拄底拄撑底撑撑撑拄拄到天明依舊可憐生心王銘曰觀心空王玄妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是佛是心是心是佛念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪嗔體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沉諸佛菩薩非此安心明心大士悟此玄音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性離空能凡能聖是故相勸好自防慎剎那造作還復漂沉清淨心智如世黃金般若法藏並在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今陳太建元年己丑有慧和法師不疾而終嵩頭陀亦於柯山靈巖寺入滅大士懸知曰嵩公兜率待我決不可久留也時四側花木方當秀實歘然枯瘁四月二十四日示衆曰此身甚可厭惡衆苦所集須慎三業精勤六度若墜地獄卒難得脫又曰吾去已不得移寢牀七日有法猛上人持像及鐘來鎮於此弟子問滅後形體若為曰山頂焚之又問不遂何如曰慎勿棺斂但壘甓作壇移尸於上屏風周繞絳紗覆之上建浮圖以彌勒像鎮之又問師之發迹可得聞乎曰我從第四天來為度汝等次補釋迦及傳普敏文殊慧集觀音何昌阿難同來贊助故大品經云有菩薩從兜率來諸根猛利疾與般若相應即吾身是也言訖趺坐而終世壽七十有三尋猛師果將到織成彌勒像及九乳鐘留鎮之須臾不見大士道具十餘事現在士於太清二年誓不食取佛生日焚身供養至日白黑六十餘人代不食燒身三百人剃心瀝血和香請大士住世士愍而從之士嘗遣弟子致書梁武中有云上善略以虗懷為本不著為宗亡相為因涅槃為果中善略以治身為本治國為宗天上人間果報安樂下善略以護養衆生勝殘去殺普令百姓俱稟六齋梁武問從來師事誰耶曰從無所從來無所來師事亦爾昭明問大士何不論義曰菩薩所説非長非短非廣非狹非有邊非無邊如如正理復有何言梁武又問何為真諦曰息而不滅武曰若息而不滅此則有色有色故鈍若如是者大士不免流俗曰臨財毋苟得臨難毋苟免武曰大士大識禮曰一切諸法不有不無武曰謹受大士來旨曰大千世界所有色象莫不歸空百川叢注不過於海無量妙法不出真如如來何故於三界九十六道中獨超其最視一切衆生有若赤子有若自己天下非道不安非理不樂武默然大士辭退南嶽慧思禪師姓李氏頂有肉髻牛行象視少以慈恕聞於閭里常夢梵僧勸出俗乃辭親入道及稟具常習坐日唯一食誦法華等經滿千遍又閲妙勝定經歎禪那功德遂發心尋友時慧聞法師有徒數百聞閲中觀論發明禪理故遙稟龍樹乃往受法晝夜攝心坐夏經三七日獲宿智通倍加勇猛尋有障起四支緩弱不能行步自念曰病從業生業由心起心緣無起外境何狀病業與身都如雲影如是觀已顛倒想滅輕安如故夏滿猶無所得深懷慙愧放身倚壁背未至間豁爾開悟法華三昧最上乘門示衆曰道源不遠性海非遙但向己求莫從他覓覓即不得得亦不真偈曰頓悟心源開寶藏隱顯靈通現真相獨行獨坐常巍巍百億化身無數量縱令逼塞滿虗空看時不見微塵相可笑物兮無比況口吐明珠光晃晃尋常見説不思議一語標名言下當又偈曰天不能蓋地不載無去無來無障礙無長無短無青黃不在中間及內外超羣出衆太虗玄指物傳心人不會嘗以道俗所施金字般若法華二經為衆隨文發解復命門人智顗代講至一心具萬行有疑請決師曰汝所疑乃大品次第意耳未是法華圓頓旨也吾昔於夏中一念頓發諸法現前吾既身證不勞致疑顗即咨受法華行三七日得悟陳光大六年六月二十三日自大蘇山將四十餘僧徑趨南嶽乃曰吾寄此山止期十載已後必事遠遊吾前身曾履此處巡至衡陽值一處林泉勝異師曰古寺也吾昔曾居俾掘之基址猶存又指巖下曰吾此坐禪賊斬吾首尋得枯骸一具自此化道彌盛陳主屢致慰勞供養目為大禪師因志公令人傳語曰何不下山教化衆生目視雲漢作麼師曰三世諸佛被我一口吞盡更有甚衆生可教化玄覺徵云且道是山頭語山下語師習慈忍行奉菩薩三聚戒衣服率用布寒則加之以艾將順世謂門人曰若有十人不惜身命常修法華般舟念佛三昧方等懺悔期於見證者隨有所須吾自供給如無此人吾即遠去矣時衆以苦行事難無有答者師乃屏衆泯然而逝小師雲辨號呌師開目曰汝是惡魔吾將行矣何驚動妨亂吾耶癡人出去言訖長往時異香滿室頂暖身軟顏色如常即太建九年六月二十二日也天台山修禪寺智者禪師諱智顗荊州華容人姓陳氏誕生之夕祥光燭鄰幼有奇相膚不受垢七歲入果願寺聞僧誦法華經普門品即隨念之忽自憶記七卷之文宛如宿習十五禮佛像誓志出家恍焉如夢見大山臨海際峰頂有僧招手復接入一伽藍云汝當居此汝當終此十八喪二親於果願寺依僧法緒出家二十進具陳乾明元年謁光州大蘇山慧思禪師思一見乃謂曰昔靈鷲同聽法華經今復來矣即示以普賢道場説四安樂行師入觀三七日誦法華經至藥王品曰是真精進是名真法供養如來於是悟法華三昧獲旋陀羅尼見靈山一會儼然未散宿通潛發以所證白思思曰非汝弗證非我莫識此乃法華三昧前方便初旋陀羅尼也縱令文字之師千萬不能窮汝之辨汝可傳燈莫作最後斷佛種人妙喜云智者悟旋陀羅三昧見靈山一會儼然未散或者謂之表法惟無盡居士閲首楞嚴經至是人始獲金剛心中處忽思智者當時所證見靈山一會儼然未散非表法也嘗語余曰當真證入時全身住在金剛心中李長者所謂無邊剎境自他不隔於毫端十世古今始終不離於當念智者見靈山一會儼然未散惟證是三昧者不待引喻默默自點頭矣又曰而今未獲旋陀羅尼者還見靈山一會否若見以何為證若不見是真精進是名真法供養如來只恁麼念過却成剩法矣太建元年辭思住金陵闡化凡説法不立文字以辨才故晝夜無倦七年謝遣徒衆隱天台山佛隴峰有定光禪師先居此峰謂弟子曰不久當有善知識領徒至此俄爾師至光曰還憶疇昔舉手招引時否師即悟禮像之徵悲憂交懷乃執手共至庵所其夜聞空中鐘磬之聲師曰是何祥也光曰此是犍椎集僧得住之象此處金地吾已居之北峰銀地汝宜居焉師嘗謂法華為一乘妙典蕩化城之執教釋草庵之滯情開方便之權門示真實之妙理會衆善之小行歸廣大之一乘遂出玄義曰釋名辨體明宗論用判教相之五重也名則法喻齊舉謂一乘妙法即衆生本性在無明煩惱不為所染如蓮花處於淤泥而體常淨故以為名此經開權顯實廢權立實會權歸實如蓮之華有含容開落之義華之蓮有隱現成實之義亦謂從本垂迹因迹顯本夫經題不越法喻人單復具足凡七種單三復三具足一攝一切名妙法蓮華即復之一也法譬為復名以召體體即實相謂一切相離實相無體故宗則一乘因果開示悟入佛之知見可尊尚故用則力用以開廢會之義有其力故然後判教相者以如來一代之説總判為五時八教五時者一佛初成道為上根菩薩説華嚴時二為小機説阿含時三彈偏折小歎大褒圓説方等時四蕩相遣執説般若時五會權歸實授三乘人及一切衆生成佛記説法華涅槃時八教者謂化儀四教即頓漸祕密不定也化法四教即藏生滅四諦通無生別無量圓也無作四諦惟法華圓理乃至治生産業一色一香無非實相該三世如來所演罄殫其致四正三接廣如本教捨此皆魔説故教理既明非觀行無以復性乃依一心三諦之理真俗中示三止觀一一觀心念念不可得先空次假後中離二邊而觀一心如雲外之月者此乃別教之行相也嘗云破一切惑莫盛乎空建一切法莫盛乎假究竟一切性莫大乎中故一中一切中無假無空而不中空假亦爾即圓教之行相如摩醯首羅天之三目非縱橫並別故第十四祖龍樹菩薩偈云因緣所生法我説即是空亦名為假名亦名中道義斯與楞嚴圓覺説奢摩他三摩鉢底禪那三觀名目雖殊其致一也達磨大師以心傳心不滯名數直為上上根智俾忘筌忘意故與此教同而不同智者禪師窮理盡性備足之門故與禪宗異而非異也三觀圓成法身不素即免同貧子也尚慮學者昧於修性或墮偏執故復創六即之義以絶斯患一理即佛者十法界衆生下至蟭螟同稟妙性從本以來常住清淨覺體圓滿一理齊平故執名相者不信即心即佛覩此而生信也二名字即佛者雖理性坦平而隨流者日用不知必假言教外薰得聞名字生信發解故起信論云以有妄想心故能知名義自此以下簡暗證者三觀行即佛者既聞名開解要假前之三觀而返源故圓教外凡也圓觀五陰為不思議境即五品位大師示居此位別教十信及藏通教皆名資糧位四相似即佛者觀行功深發相似用故內凡也圓伏無明入十信鐵輪位不斷見思惑至七信以去見思惑自隕得六根清淨如經云父母所生眼悉見三千界云云思大禪師示居此位若別教乃地前三十心也藏通皆名加行位楞嚴經唯識論三十心後別立四加行名位雖同詮旨逈異唯通悟者善巧融會五分真即佛者三心開發得真如用位位增勝故發圓初住即銅輪位也如龍女一念成佛現百界身從此轉勝至等覺位凡四十一心盡目真因分位雖殊圓理無別若別教即名十地藏通皆言見道位六究竟即佛者無明永盡覺心圓極證無所證故妙覺也起信論云始本不二名究竟覺仁王名寂滅上忍也別教權佛攝對圓行第二位耳藏通二教佛可知如上六位既皆即佛不屈不濫通具法報化三身為正三寶三德屬對交絡乃至十種三法含攝無遺偈云道識性般若菩提大乘身涅槃三寶德一一皆三法隨居四土為依四土者一常寂光法性土也法身居之身土相稱二實報無障礙攝二受用也自受用土報佛自居他受用土登地菩薩所居三方便有餘四淨穢同居並為應化土也地前菩薩二乘凡夫所居其實則非身非土無優無劣為對機故假説身土而分優劣師得身土互融權實無礙故三十餘年晝夜宣演生四種益具四悉檀悉遍也檀翻名施禪師之法遍施有情隨根得益如雲世界悉檀生歡喜益云云門人灌頂日記萬言而編結之總目為天台教隋開皇十七年十一月十七日帝遣使詔師將行乃告門人曰吾今往而不返汝等當成就佛隴南寺一依我圖侍者曰若非師力豈能成辦師曰乃是王家所辦汝等見之吾不見也師初欲建寺於石橋禪寂中見阜幘絳衣三神人語曰所欲建寺今非其時三國既一當有大施主建之寺建而國清宜名曰國清至隋開皇十八年詔司馬王弘依師所圖建國清寺二十一日到剡東石城寺百尺石像前不進二十四日顧侍者曰觀音來迎不久應去時門人智朗請曰不審何位何生師曰吾不領衆必淨六根損己利他獲預五品耳五品弟子即法華三昧前方便之位與思大禪師昔語冥符命筆作觀心偈唱諸法門綱要訖趺坐而逝壽六十臘四十弟子等迎歸佛隴巖大業元年詔使者送弟子智璪及寺額入山赴師忌齋到日集僧開石室唯覩空榻時會千僧至時忽剩一人咸謂師化身來受供師始受禪教終乎滅度常披一壞衲冬夏不釋居天台二十二年建大道場一十有二所國清最居其後及荊州玉泉寺等共三十六所度僧一萬五千人寫經一十五藏造金銅塑畫像八十萬尊事迹甚廣具如本傳泗州僧伽大師唐高宗時至長安洛陽行化歷吳楚間手執楊枝混於緇流或問師何姓即答曰我姓何又問師何國人師曰我何國人烏龍長老訪馮濟川話次云昔有官人問泗州大聖何姓云姓何官云住何國云住何國此意如何龍云大聖本不姓何亦不是何國人馮笑云大聖決定姓何住何國往返數次遂致書妙喜乞斷此公案喜云有六十棒將三十棒打大聖不合道姓何三十棒打濟川不合道大聖決定姓何若烏龍長老教自領出去宿州民賀跋氏捨宅為伽藍師曰此本佛宇令掘地果得古云是香積寺齊李龍建所創又獲金像衆謂然燈如來師曰普光王佛也因以為寺額景龍二年詔迎住大薦福寺中宗稱弟子三年三月三日示滅敕就薦福寺漆身起塔忽臭氣滿城上祝送師歸臨淮言訖異香騰馥寶月問氷壺慈雲無不覆為甚麼大聖不就薦福壺云不見道君子愛財月云此是洞山底長老分上作麼生壺云你還覺髑髏痛麼月云恁麼則是處是慈氏壺云矢臭氣中宗問萬回僧伽是何人回云觀音化身萬回法雲公虢州閿鄉張氏子貞觀六年五月五日生弱齡笑傲如狂一日令家人灑掃云有勝客來是日三藏玄奘自西國還訪之公問印度風境了如所見藏作禮圍繞稱是菩薩有兄萬年久征遼左母程氏思其音信公曰此甚易耳乃告母而往至暮而還及持到書人因呼曰萬回其他靈迹甚多不及録天台豐干禪師不知何許人居天台國清寺剪髮齊眉衣布裘嘗誦唱道歌乘虎入松門衆僧驚畏本寺厨中有二苦行曰寒山子拾得二人執㸑終日晤語潛聽者都不解時謂風狂獨與師相親一日寒山問古鏡未磨如何照燭師曰氷壺無影像猿猴探水月曰此是不照燭也更請師道師曰萬德不將來教我道甚麼寒拾俱禮拜師欲遊五臺問寒拾曰汝共我去遊五臺便是我同流若不共我去遊五臺不是我同流山曰你去遊五臺作甚麼師曰禮文殊山曰你不是我同流師尋獨入五臺逢一老人便問莫是文殊麼曰豈可有二文殊師作禮未起忽然不見趙州因沙彌舉此州代干云文殊文殊後回天台山示滅師凡有人問佛理止答隨時二字初閭丘胤出牧丹丘將議巾車忽患頭痛醫莫能愈師造丘以呪水噴之立差胤異之乞一言師曰到任記謁文殊普賢曰此二菩薩何在師曰即國清寺寒山拾得也胤後既至任即入寺問師所在及寒拾蹤迹僧道翹對曰豐干舊院在經藏後今閴無人矣寒拾二人現在僧厨執役胤入師房惟見虎迹復問翹師在此作何行業翹曰惟事春榖供僧間則諷詠乃入厨訪寒拾如下章敘之寒山子本無氏族始豐縣西有寒明二巖以其於寒巖中居止得名也容貌枯瘁布襦零落以樺皮為冠曳大木屐時來國清寺就拾得取衆僧殘食及菜滓食之或廊下徐行或望空噪罵寺僧以杖逼逐拊掌大笑而去衆僧炙茄次將茄串向僧背上打一下僧回首山呈起茄串曰是甚麼僧曰這風顛漢山向旁僧曰你道這僧費却我多少鹽醬趙州遊天台路次相逢山見牛迹問州曰還識牛麼州曰不識山指牛迹曰此是五百羅漢遊山州曰既是羅漢為甚麼却作牛去山曰蒼天蒼天州呵呵大笑山曰作甚麼州曰蒼天蒼天山曰這廝兒宛有大人之作閭丘入厨見山同拾得圍罏語笑丘致拜二人連聲咄叱且笑曰豐干饒舌二人即相携出松門閭丘又至寒巖禮謁送衣服藥物二人高聲喝之曰賊賊便縮身入巖石縫中唯曰汝諸人各各努力其石縫忽然而合閭丘哀慕令僧道翹尋其遺迹得所書林間葉上及村墅屋壁辭頌共三百餘首後曹山寂禪師為之注釋謂之對寒山子詩行於世拾得者不言名氏因豐干禪師山中經行至赤城道側見兒孤啼拾歸國清故名後沙門靈熠攝受令知食堂香燈忽一日登座與佛像對盤而餐復于憍陳如上座塑形前呼曰小果聲聞靈熠怒因罷斥令厨內滌器每濾食滓以筒盛之寒山來即與負去一日掃地寺主問汝名拾得因豐干拾得汝歸汝畢竟姓個甚麼拾得放下苕帚叉手而立寺主再問拈帚掃地竟去寺主罔測寒山捶胸云蒼天蒼天拾得却問汝作甚麼山曰不見東家人死西家助哀二人作舞哭笑而去國清寺半月念戒衆集拾得拍手曰聚頭作想那事如何維那叱之拾得曰大德且住無嗔即是戒心淨即出家我性與你合一切法無差僧厨食為烏所拾得以杖抶伽藍神曰汝食不能護何能護伽藍是夕神示夢合寺僧曰拾得譴我由是著異呼曰賢士未幾與寒山隱石巖而逝道翹纂寒山詩得偈亦附焉明州奉化縣布袋和尚未詳氏族自稱名契此形裁腲脮蹙額皤腹出語無定寢臥隨地常以杖荷一布囊凡供身之具盡貯囊中入肆聚落見物則乞醯魚葅才接入口分少許囊中時號長汀子布袋師也嘗雪中臥雪不沾身人以此奇之或就人乞其貨則售示人吉凶必應期無忒天將雨即著濕草履途中驟行遇亢陽即曳高齒木屐市橋上竪膝而眠民以此驗之有一僧在師前行師乃拊僧背一下僧回頭師曰乞我一文錢曰道得即與你一文師放下布袋叉手而立白鹿和尚問如何是布袋師便放下布袋問如何是布袋下事師便負之而去先保福和尚問如何是佛法大意師放下布袋義手保福曰為只如此還更有向上事師負之而去師在街衢立有僧問和尚在這裏作甚麼師曰等個人曰來也來也歸宗柔和尚別云歸去來師云汝不是這個人曰如何是這個人師曰乞我一文錢師有歌曰只個心心心是佛十方世界最靈物縱橫妙用可憐生一切不如心真實騰騰自在無所為間間究竟出家兒若覩目前真大道不見纖毫也大奇萬法何殊心何異何勞更用尋經義心王本自絶多知智者祇明無學地非聖非凡復若何不強分別聖情孤無價心珠本圓淨凡名異相妄空呼人能弘道道分明無量清高稱道情携錫若登故國路莫愁諸處不聞聲又有偈曰是非憎愛世偏多仔細思量奈我何寬却肚腸須忍辱豁開心地任從他若逢知己須依分縱遇冤家也共和若能了此心頭事自然證得六波羅此應是一偈下章應別是一偈燈録并作一偈恐非我有一布袋虗空無罣礙展開遍十方入時觀自在吾有三寶堂裏空無色相不高亦不低無遮亦無障學者體不如來者難得樣智慧解安排千中無一匠四門四果生十方盡供養吾有一軀佛世人皆不識不塑亦不裝不雕亦不刻無一滴灰泥無一點彩色人畫畫不成賊偷偷不得體相本自然清淨非拂拭雖然是一軀分身千百億又偈曰一鉢千家飯孤身萬里遊青目覩人少問路白雲頭梁貞明三年丙子三月師將示滅於嶽林寺東廊下端坐磐石而説偈曰彌勒真彌勒分身千百億時時示時人時人自不識偈畢安然而化其後復現於他州亦負布袋四衆競圖其像法華志言大士壽春許氏子弱冠遊東都繼得度於七俱胝院留講肆久之一日讀雲門録忽契悟未幾宿命遂通獨語笑口吻囁嚅日常不輟世傳誦法華因以名之丞相呂許公問佛法大意師曰本來無一物一味却成真集仙王質問如何是祖師西來意師曰青山影裏潑藍起寶塔高吟撼曉風又曰請法華燒香師曰未從齋戒覓不向佛邊求國子助教徐嶽問祖師西來意師曰街頭東畔底徐曰某甲未會師曰三般人不會僧問世有佛否師曰寺裏文殊有問師凡耶聖耶遂舉手曰我不在此住慶曆戊子十一月二十三日將化謂人曰吾從無量劫來成就逝多國土分身揚化今南歸矣言畢右脅而逝宋仁宗始不豫國嗣未立大臣請擇宗室賢者居京師仁宗夜焚香默禱曰翊日化成殿具齋虔請法華大士俯臨無却左右莫聞也清旦道衣凝立而待俄侍衛奏言法華自右掖門直趨寢殿禁兵呵止不得仁宗笑曰吾請之來耳及至竟升御榻而坐仁宗以儲嗣為問索筆大書十三十三數行擲筆去至英宗即位乃濮安懿王第十三子也扣氷澡先古佛建寧新豐翁氏子母夢比丘風神炯然荷錫求宿人指謂曰此辟支佛也已而孕生於武宗會昌四年香霧滿室彌日不散年十三求出家父母許之依烏山興福寺沙門行全為師咸通乙酉落髮受具初以講説為衆所歸棄謁雪峰手携鳧茨一包醬一器獻之峰曰包中是何物師曰鳧茨峰曰何處得來師曰泥中得峰曰泥深多少師曰無丈數峰曰還更有麼師曰轉有轉深又問器中何物曰醬峰曰何處得來曰自合得峰曰還熟也未曰不較多峰異之曰子異日必為王者師初居溫嶺繼居將軍巖二虎侍側神人獻地為瑞巖院學者爭集嘗謂衆曰古聖修行全憑苦節吾今夏則衣楮冬則扣氷而浴故人號為扣氷古佛後住靈曜上堂四衆雲臻教老僧説個甚麼便下座有僧燒炭積成火龕曰請師入此修行曰真玉不隨流水化琉璃爭奪衆星明曰莫祇這便是麼曰且莫認奴作郎曰畢竟如何曰梅花臘月開天成戊子應閩王之召王敬禮謝茶次師提起槖子曰會麼曰不會曰人王法王各自照了留十日以疾辭至十二月二日沐浴升堂告衆而逝王與道俗備香薪蘇油茶毗之祥曜滿山獲五色舍利塔於瑞巖正寢千歲寶掌和尚中印度人周威烈十二年丁卯降神受質則左掌握拳七歲祝髮乃展因名寶掌魏晉間東遊此土入蜀禮普賢留大慈常不食日誦般若等經千餘卷有詠之者曰勞勞玉齒寒似迸巖泉急有時中夜坐階前神鬼泣一日謂衆曰吾有願住世千歲今六百二十有六矣故人以千歲稱之旋遊五臺復南歷衡嶽黃梅匡廬尋入建業會達磨入梁就而扣請悟無生忍武帝高其道臘延供內庭未幾如吳述偈曰梁城遇導師參禪了心地飄零二浙遊更盡佳山水遂遍探兩浙名山後居浦江之寶嚴與朗禪師友善每通問遣白犬馳往朗則使青猿故有題朗壁者云白犬銜書至青猿洗鉢回云顯慶二年正旦手塑一像至九日成謂門人慧雲曰此肖誰雲曰與和尚無異即澡浴易衣趺坐謂雲曰吾住世已一千七十二年今將謝世聽吾偈曰本來無生死今亦示生死吾得去住心他生復來此又囑曰吾滅後六十年有僧來取吾骨勿拒言訖而逝入滅五十四年有刺浮長老自雲門至塔所禮曰冀塔洞開少選塔戶果啓其骨連環若黃金浮即持往秦望山建窣堵波奉藏以周威烈丁卯至唐高宗顯慶二年實一千七十二年其在此土蓋歷四百餘歲云懶殘唐天寶初衡嶽寺執役僧也退食即收所餘而食性懶而食殘故號懶殘鄴侯李泌微時在寺中讀書李固異人能識微察殘所為知不凡每謂人曰殘師中宵梵唱恆響徹山林其音先悽惋而後喜悅必謫墮之人時將去矣一夕李潛往道名瞻拜師大詬曰是將賊我李拜益恭師撥牛糞火中出一芋以半授李啖之李捧食再拜謝師曰慎勿多言領取十年宰相後德宗使人召之師寒涕垂膺使者見而笑令拭涕師曰我豈有工夫為俗人拭涕耶竟不能致刺史將祭嶽祠方修磴道中夜風雷一峰隕巨石當道橫臥修磴者以十牛挽之而又以數百人助挽屹不動師笑曰無煩多力遂履石石盤旋而動聲若震雷疾下路遂開人如神之寺門外虎豹忽成羣師語衆僧曰為爾盡驅彼授我箠衆以箠授師才出寺一虎遽銜師去而虎豹亦隨絶蹤師有歌曰兀然無事無改換無事何須論一段直心無散亂他事不須斷過去已過去未來猶莫算兀然無事坐何曾有人喚向外覓工夫總是癡頑漢糧不畜一粒逢飯但知陟立切世人多事人相趁渾不及我不樂生天亦不愛福田飢來喫飯困來即眠愚人笑我智乃知焉不是癡鈍本體如然要去即去要住即住身披一破衲腳著娘生袴多言復多語由來反相誤若欲度衆生無過且自度莫謾求真佛真佛不可見妙性及靈臺何須受薰煉心是無事心面是娘生面劫石可移動個中無改變無事本無事何須讀文字削除人我本冥合個中意種種勞筋骨不如林下睡兀兀舉頭見日高喫飯從頭𢫫將功用功展轉冥蒙取即不得不取自通吾有一言絶慮忘緣巧説不得只用心傳更有一語無過直與細如毫末大無方所本自圓成不勞機杼世事悠悠不如山丘青松蔽日碧澗長流山雲當幕夜月為鉤臥藤蘿下塊石枕頭不朝天子豈羡王侯生死無慮更復何憂水月無形我常只寧萬法皆爾本自無生兀然無事坐春來草自青法順大師姓杜氏世傳文殊化身也降靈於雍州萬年縣神迹炳著不可勝紀有患聾者投師師呼之則聾愈有患啞者投師師與之言則啞愈武功縣僧為毒龍所魅衆掖以請師師端拱面之坐龍遂附病僧曰大師所向義無復留尋即釋然師大弘華嚴圓頓之旨作法界觀文簡理盡天下宗之嘗作法身頌曰嘉州牛喫草益州馬腹脹天下覓醫人灸豬左膊上義學莫能窺其旨餘具如本傳清涼澄觀國師姓夏侯氏山陰人才供二筆撰華嚴疏鈔窮圓頓之旨神異種種有識咸戴化後門人見有金甲神人空中翩然西逝門人拜問神何為曰取華嚴菩薩牙歸供養耳門人異之遂啓塔戶視之師容貌如生而失二牙以是知師為華嚴菩薩也師有答皇太子問心要書傳燈載之而妙喜正法眼藏亦具載焉其詞曰至道本乎一心心法本乎無住無住心體靈知不昧性相寂然包含德用該攝內外能深能廣非有非空不生不滅無終無始求之而不得棄之而不離迷現量則惑苦紛然悟真性則空明廓徹雖即心即佛惟證者方知然有證有知則慧日沉沒於有地若無照無悟則昏雲掩蔽於空門若一念不生則前後際斷照體獨立物我皆如直造心源無智無得不取不捨無對無修然迷悟更依真妄相待若求真棄妄猶棄影勞形若體妄即真猶處陰影滅若無心忘照則萬慮都捐若任運寂知則衆行爰起放曠任其去住靜鑒覺其源流語默不失玄微動靜未離法界言止則雙忘知寂論觀則雙照寂知語證則不可示人説理則非證不了是以悟寂無寂真知無知以知寂不二之一心契空有雙融之中道無住無著莫攝莫收是非兩忘能所雙絶斯絶亦寂則般若現前般若非心外新生智性乃本來具足然本寂不能自現實由般若之功般若之與智性翻覆相成本智之與始修實無兩體雙亡證入則妙覺圓明始末該融則因果交徹心心作佛無一心而非佛心處處成道無一塵而非佛國故真妄物我舉一全收心佛衆生渾然齊致是知迷則人隨於法法法萬差而人不同悟則法隨於人人人一智而融萬境言窮慮絶何果何因體本寂寥孰同孰異惟忘懷虗朗消息沖融其猶透水月華虗而可見無心鑒象照而常空矣
