body:
  text: 六祖下第七世吉州資福如寶禪師陳操尚書來師畫一圓相操曰弟子與麼來早是不著便更畫圓相師於中著一點操曰將謂是南番舶主師便歸方丈閉却門郢州芭蕉山慧清禪師上堂拈拄杖示衆曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座大溈哲云大溈即不然你有拄杖子我奪你拄杖子你無拄杖子我與你拄杖子大溈即如是諸人還用得也未若人用得德山先鋒臨濟合後若用不得且還本主天童正覺云你有則一切有你無則一切無有無自是當人與奪關芭蕉甚事正恁麼時作麼生是你拄杖子問賊來須打客來須看忽遇客賊俱來時如何師曰屋裏有一緉破草鞋曰祇如破草鞋還堪受用也無師曰汝若將去前凶後不吉師謂衆曰我年二十八到仰山參見南塔見上堂曰汝等諸人若是個漢從娘肚裏出來便作師子吼好麼我於言下歇得身心便住五載汝州南院慧顒禪師亦曰寶應上堂赤肉團上壁立千仞僧問赤肉團上壁立千仞豈不是和尚道師曰是僧便掀倒禪牀師曰這瞎驢亂做僧擬議師便打趁出妙喜曰吾今為汝保任此事終不虗也復頌云赤肉團邊用得親主賓有理各難伸兩個駝子相逢著世上於今無直人問僧近離甚處曰襄州師曰來作甚麼曰特來禮拜和尚師曰恰遇寶應老不在僧便喝師曰向汝道不在又喝作甚麼僧又喝師便打僧禮拜師曰這棒本是汝打我我且打汝要此話大行瞎漢參堂去問僧近離甚處曰襄州師曰是甚麼物恁麼來曰和尚試道看師曰適來禮拜底曰錯師曰禮拜底錯個甚麼曰再犯不容師曰三十年弄馬騎今日被驢撲瞎漢參堂去問從上諸聖向甚麼處去師曰不上天堂則入地獄曰和尚又作麼生師曰還知寶應老漢落處麼僧擬議師打一拂子曰你還知喫拂子底麼曰不會師曰正令却是你行又打一拂子雪竇云令既自行且拂子不知來處雪竇道個瞎且圖雪上加霜妙喜云權衡臨濟三要三玄須還他南院始得雪竇為甚麼却道拂子不知來處妙喜亦道個瞎且圖兩得相見問僧名甚麼曰普參師曰忽遇矢橛作麼生僧曰不審師便打上堂諸方祇具啐同時眼不具啐同時用僧便問如何是啐同時用師曰作家不啐啐同時失曰此猶未是某甲問處師曰汝問處作麼生僧曰失師便打其僧不肯後於雲門會下聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟遂奔回省覲師已圓寂乃謁風穴穴一見便問上座莫是當時問先師啐同時話底麼僧曰是穴曰汝當時作麼生會曰某甲當時如在燈影裏行相似穴曰汝會也雲居悟云且作麼生是啐同時眼若得眼明其用自備又道作家不啐啐同時失何故不啐所以道子若哮吼其母即喪諸人還明得麼乃頌曰子若哮吼其母即喪全歸其子十方通暢大用現前理自然何必起心作模樣更若不會雲居拄杖僧才參入方丈以手指云敗也師乃拈起拄杖度與僧僧才接師便打雲峯悅云這僧雖然頭上有光不知腳下似漆直饒十字縱橫朝打三千暮打八百守廓侍者問德山曰從上諸聖向甚麼處去山曰作麼作麼師曰敕點飛龍馬跛鱉出頭來山便休去來日浴出師過茶與山山於背上拊一下曰昨日公案作麼生師曰這老漢今日方始瞥地山又休去師行腳到襄州華嚴和尚會下一日嚴上堂曰大衆今日若是臨濟德山高亭大愚鳥窠船子兒孫不用如何若何便請單刀直入華嚴與汝證據師出禮拜起便喝嚴亦喝師又喝嚴亦喝師禮拜起曰大衆看這老漢一場敗闕又喝一喝拍手歸衆嚴下座歸方丈時風穴作維那上去問訊嚴曰維那汝來也叵耐守廓適來把老僧扭揑一上待集衆打一頓趁出穴曰趁他遲了也自是和尚言過他是臨濟下兒孫本分恁麼嚴方息怒穴下來舉似師師曰你著甚來由勸這漢我未問前早要棒喫得我話行如今不打搭却我這話也穴曰雖然如是已遍天下也師到鹿門一日見楚和尚與僧道話次鹿門下來問楚和尚你終日披披搭搭作甚麼楚云和尚見某甲披披搭搭那門便喝楚亦喝兩家總休去師云諸上座你看這兩個瞎漢隨後便喝門歸方丈却令侍者請師上來云老僧適來與楚闍黎賓主相見什麼處敗缺師曰轉見病深門云老僧自見興化來便會也師云和尚到興化時某甲為侍者記得與麼時語門云請舉看師遂舉興化問和尚甚處來和尚云五臺來化云還見文殊麼和尚便喝化云我問你還見文殊麼又惡發作麼和尚又喝化不語和尚作禮化至明日教某甲喚和尚和尚早去也化上堂云你看這個僧擔條斷貫索向南方去也已後也道見興化來師云今日公案恰似與麼時底門云興化當時為甚無語師曰見和尚不會賓主句所以不語及欲喚和尚持論和尚已去也鹿門明日特為煎茶晚參告衆曰夫參學龍象直須子細入室決擇不得容易逴得個語便以為極則道我靈利只如山僧當初見興化時認得個動轉底見人道一喝兩喝便休以為佛法也今日被明眼人覷破却成一場笑具圖個甚麼只為我慢無明不能回轉親近上流賴得明眼道人不惜身命對衆證據此恩難報何故興化云饒你喝得興化老人上三十三天却撲下來一點氣也無欵欵地蘇息起來向你道未在何故如此興化未曾向紫羅帳裏撒真珠與你在胡喝亂喝作麼真謂藥石之言道流難信如今直須明辨取豈不慶快平生參學事畢汝州西院思明禪師從上座到法席旬日常自曰莫道會佛法人覓個舉話底人也無師聞而默之異日上法堂次師召從舉首師曰錯進三兩步師又曰錯近前師曰適來兩錯是上座錯是思明老漢錯曰是從錯師曰錯錯乃曰上座且在這裏過夏共汝商量這兩錯不肯便去後住相州天平山每舉前話曰我行腳時被惡風吹到汝州有西院長老勘我連下兩錯更留我過夏待共我商量我不道恁麼時錯我發足向南方去時早知錯了也首山念云據天平作恁麼解會未夢見西院在何故話在圜悟勤云如今人聞他道發足向南方去時早知道錯了也便去卜度道未行腳時自無許多佛法禪道及至行腳被諸方熱瞞不可未行腳時喚地作天喚山作水幸無一星事若總恁麼作流俗見解何不買一片帽戴大家過時有什麼用處佛法不是這個道理寶壽和尚第二世在先寶壽為供養主壽問父母未生前還我本來面目來師立至夜深下語不契翌日辭去壽曰汝何往師曰昨日蒙和尚設問某甲不契往南方參知識去壽曰南方禁夏不禁冬我此間禁冬不禁夏汝且作街坊過夏若是佛法闤闠之中浩浩紅塵常說正法師不敢違一日街頭見兩人交爭揮一拳曰你得恁麼無面目師當下大悟走見寶壽未及出語壽便曰汝會也不用說師便禮拜壽臨遷化時囑三聖請師開堂師開堂日三聖推出一僧師便打聖云與麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在師擲下拄杖便歸方丈雲峯悅云臨濟一宗掃地而盡因甚麼却到這裏驀拈拄杖云甚麼處去也真淨頌探騎飛來棒下獰瞎人翻滿鎮州城太平本是將軍致不許將軍見太平真如頌法眼持來付與誰三聖推僧決衆疑將軍令舉羣夫駭直得盲聲徹四夷師將順寂謂門人曰汝還知吾行履處否曰知和尚長坐不臥師又召僧近前來僧近前師曰去非吾眷屬言訖而化洪州鳳棲同安院常察禪師僧問學人未曉時機乞師指示師曰參差松竹籠烟薄重疊峰巒月上遲僧擬進語師曰劒甲未施賊身已露僧曰何也師曰精陽不剪霜前竹水墨徒誇海上龍僧繞禪牀而出師曰閉目食蝸牛一場酸澀苦新到持錫繞師三匝振錫一下曰凡聖不到處請師道師鳴指三下僧曰同安今日嚇得忘前失後師曰闍黎發足何處僧珍重便出師曰五湖衲子一錫禪人未到同安不妨疑著僧回首曰遠聞不如近見師曰貪他一杯酒失却滿船魚問僧近離何處曰江西師曰江西法道何似此間曰賴遇問著某甲若問別人則禍生也師曰老僧適來造次曰某甲不是嬰兒徒用止啼黃葉師曰傷鱉恕龜殺活由我僧又問久造玄微如何洞曉師曰老僧耳背分明問將來曰快不打籬邊雀曰師暗中臨鏡誰辨妍曰向上機關如何洞曉師曰何必曰休休師曰始解乘舟擬跨劒水問僧甚處來曰五臺師曰還見文殊麼僧展兩手師曰展手頗多文殊難覩曰氣急殺人師曰不覩雲中雁焉知沙塞寒曰遠趨丈室乞師一言師曰孫臏門下徒話鑽龜曰名不浪得師曰喫茶去僧珍重便出師曰雖得一場榮刖却一雙足師問僧眼界無光如何得見曰北斗東轉南斗西移師曰夫子入太廟曰與麼則同安門下道絶人荒去也師曰橫抱嬰孩擬彰皇簡師一日遊山次大衆隨之師曰階前翠竹砌下黃花古人道真如般若同安即不然時有僧曰古人也好和尚師曰不貪香餌味可謂碧潭龍曰諸方眼目不怪陶潛師曰闍黎閉目中秋坐却怪月無光曰階前翠竹砌下黃花又作麼生師曰安南未伏塞北那降僧禮拜師曰名稱普聞問僧近離甚處曰太原師曰太原近日法道如何曰只見雲隨日出水逐波生不知太原法道如何師曰豈不是離太原乎曰苦苦師曰不覩海雲色微覺旱雷聲曰以金易鍮憎真愛假師便歸方丈僧拂袖便出師曰得縮頭時且縮頭吉州禾山無殷禪師生吳氏福州人七齡雪峰存禪師見之愛其純粹化其親令出家年二十乃剃落受具辭遊方至九峰虔公問汝遠來何所見當由何路出生死對曰重昏廓闢盲者自盲虔笑以手揮之曰佛法不如是師不懌請曰豈無方便曰汝問我師理前語問之曰奴見婢殷勤師於是依止十餘年問習學謂之聞絶學謂之鄰過此二者謂之真過如何是真過師曰禾山解打鼓曰如何是真諦師曰禾山解打鼓問即心即佛則不問如何是非心非佛師曰禾山解打鼓曰如何是向上事師曰禾山解打鼓雪竇頌一拽石二搬土發機須是千鈞弩象骨老師曾輥毬爭似禾山解打鼓報君知莫莽鹵甜者甜兮苦者苦諸方目此為禾山四打鼓又僧問護國澄鶴立枯松時如何澄云腳跟下一場懡㦬又問雪覆千山時如何澄云日出後一場懡㦬又問會昌沙汰時護法神向甚麼處去澄云三門外兩個漢一場懡㦬諸方謂之護國三懡㦬又保福問僧殿裏是甚麼佛僧曰和尚定當看福曰釋迦佛僧曰莫瞞人好福曰却是你瞞我又問僧曰你名甚麼曰咸澤曰或遇枯涸時如何曰誰是枯涸者曰我曰和尚莫瞞人好曰却是你瞞我又問僧你作甚麼業喫得恁麼大僧曰和尚也不小福作蹲身勢僧曰和尚莫瞞人好福曰却是你瞞我又問浴主浴鍋闊多少主曰請和尚量看福作量勢主曰和尚莫瞞人好福曰却是你瞞我諸方謂之保福四瞞人松菴間舉此三種語云諸人要會麼間上座為你頌出頌曰禾山打鼓護國懡㦬保福瞞人三個骨朵為君一言總頌出鎖建隆元年庚申二月示有微疾三月二日令侍者開方丈集大衆曰後來學者未識禾山即今識取於是泊然而化洪覺範曰石霜言遍界不曾藏而其子聞公臨化曰今日分明說似君我斂目時齊聽取九峯言盡乾坤是汝當人自體何處安眼耳鼻舌而其子殷公臨化曰後來學者未識禾山即今識取豫觀其父子兄弟語言行履如形著影出聲呼谷應而近世禪者尚佇思可悲憐也鳳翔府青峰傳楚禪師一日洛浦問院主去甚麼處來師曰掃雪來浦曰雪深多少師曰樹上總是浦曰得即得汝向後住個雪窟定矣後訪白水水曰見說洛浦有生機一路是否師曰是水曰止却生路向熟路上來師曰生路上死人無數熟路上不著活漢水曰此是洛浦底你底作麼生師曰非但洛浦夾山亦不奈何水曰夾山為甚麼不奈何師曰不見道生機一路袁州木平山善道禪師初謁洛浦問一漚未發已前如何辨其水脉浦曰移舟諳水脉舉棹別波瀾師不契乃參蟠龍語同前問龍曰移舟不別水舉棹即迷源師從此悟入雲峯悅云木平若於洛浦言下悟去猶較些子可惜許向蟠龍死水裏淹殺後有問如何是木平對云不勞斧斤果然只在這裏諸禪德大凡發足遊方也須甄別邪正識辨真僞帶些眼筋始得然雖如是賊過後張弓妙喜曰雲峯此語亦能瞎人眼亦能開人眼郢州桐泉山禪師參黃山山問天門一合十方無路有人道得擺手出漳江師曰蟄戶不開龍無龍句山曰是你恁麼道師曰是即直言是不是直言不是山曰擺手出漳江山復問下和到處荊山秀玉印從他天子傳時如何師曰靈鶴不於林下憩野老不重太平年山深肯之夷一盲引衆盲悲哉台州瑞巖師彥禪師閩之許氏子自幼披緇秉戒無缺初禮巖頭問曰如何是本常理頭曰動也曰動時如何頭曰不是本常理師良久頭曰肯即未脫根塵不肯即永沈生死師遂領悟便禮拜後謁夾山山問甚處來曰臥龍來山曰來時龍還起也未師乃顧視之山曰灸瘡瘢上更著艾燋曰和尚又苦如此作甚麼山休去妙喜曰若不藍田射石虎幾乎誤殺李將軍師問夾山與麼即易不與麼即難與麼與麼即惺惺不與麼不與麼即居空界與麼不與麼請師速道山曰老僧瞞闍黎去也師喝曰這老和尚而今是甚時節便出去後有僧舉似巖頭頭云苦哉將我一枝佛法與麼流將去師尋居丹丘瑞巖坐磐石終日如愚每自喚主人公復應諾乃曰惺惺著他後莫受人瞞後有僧參玄沙沙問近離甚處曰瑞巖沙云有何言句示徒僧舉前話沙云一等是弄精魂也甚奇怪乃云何不且在彼住云已遷化也沙云而今還喚得應麼僧無對鏡清問天不能覆地不能載豈不是師曰若是即被覆載清曰若不是瑞巖幾遭也師自稱曰師彥嘗有三僧胡形清峭目若流電差肩並足致禮師問曰子從何來曰天竺來曰何時發曰朝行適至曰得無勞乎曰為法忘勞諦視之足皆不蹈地師令入堂上位安置明旦忽焉不見又嘗有村媼來禮師曰汝莫拜急歸救取數百物命媼歸見其婦方拾田螺歸媼因亟投水中又數家召齊一一同時見師來赴至終闍維有巨蛇從樹杪投身火聚及薪盡舍利散飛風動草木紛紛而墜師生平神異之蹟不可勝述云福州羅山道間禪師問石霜起滅不停時如何霜曰直須寒灰枯木去一念萬年去函蓋相應去全清絶點去師不契謁巖頭復如前問頭喝曰是誰起滅師於此有省師在禾山送同行矩長老出門把拄杖向面前一攛矩無對師曰石牛攔古路一馬生雙駒後僧舉似疏山山云石牛攔古路一馬生三寅保福問巖頭道與麼與麼不與麼不與麼意作麼生師召福福應諾師曰雙明亦雙暗福禮謝三日後却問前日蒙和尚垂慈祇為看不破師曰盡情向汝道了也福曰和尚是把火行山師曰若與麼據汝疑處問將來福曰如何是雙明亦雙暗師曰同生亦同死福又禮謝而退別有僧問福同生亦同死時如何福曰彼此合取狗口僧曰和尚收取口喫飯其僧却問師同生亦同死時如何師曰如牛無角曰同生不同死時如何曰如虎帶角後有僧問招慶慶云彼此皆知何故我若東勝身洲道一句西瞿耶尼洲也知天上道一句人間也知心心相知眼眼相照師因遊漳州見三平云和尚遷化時衆請韓亡名作喪主韓將一條手巾蓋一面䤬鑼以一口露刃劒橫放䤬鑼上直到龕前放下云還有人道得麼若道得某即作喪主若道不得即不作喪主道道衆無對韓便躍却䤬鑼哭云蒼天蒼天先師遠矣師云噫大奇大奇三平門下六百來人總被這俗漢吞却也陳老師當時若在未放他過時有僧問祇如他與麼來作麼生祗對師云我當時若在只將三尺布蓋却頭橫亞一把露刃刀以手揭起孝幕當門而坐看韓家個漢要作喪主也未得要不作喪主也未得進之須有禮退之須有禮幻寄曰眉毛在也無師住羅山初入院上堂才攬衣欲坐即云珍重便下座良久却回云未識底近前來時有僧才出禮拜師云也大苦僧禮拜起云某甲咨和尚師便喝出僧問如何是奇特一句師云道甚麼良久云若是上士腳才跨門便委得若也覿面相呈猶是鈍漢口喃喃地不消一钁會麼不是禪不是道不是佛不是法是甚麼靈鋒寶劒常露現前亦能殺人亦能活人若能操持一任操持若也出場定當須是個漢始得機機相副法法無根互為賓主雖然如此切忌承當何故你若野干鳴我即師子吼我若野干鳴你亦師子吼你若師子吼我亦師子吼臨時布取意句有主宰所以道意中句句中意意中不停句句中不停意意句不同倫合作麼生會意能剗句句能剗意意句交馳是為可畏意句不明事理不通只是個無孔鐵椎古人喚作流俗阿師似這般底如稻麻竹葦有甚麼用處此個門中須是個漢眼卓朔地點著便轉轆轆地豈是你清濁可羡凡聖能詮有恁麼漢上士相逢如擊石火如𪹼龜紋迅速如風捷辨如電快著精彩一人半人事褫言句動逾萬億低頭學禪卒不可得所以道恁麼則易不恁麼則難亦云恁麼則難不恁麼則易諸人作麼生大須細意兄弟夫行腳也須帶眼莫被遮般底却教你直須冥然去須得綿綿去苦哉被遮般底無辜枷著有甚麼出期遮個如水上葫蘆子有人按得麼常露現前滔滔地自由自在未曾有一法解蓋得伊未曾有一法解等得伊撥著便露觸著便轉轆轆地蓋聲蓋色展即周流無滯常露目前豈是兀兀底出則無無不是入則個個歸源聲前迥迥地豈墮有無所以道聲前一句非聖不傳未曾親近如隔大千聲前一思大家具知這個作麼生會尋常道聲前有路從汝洞明句後不來猶虧一半纖毫不透如隔鐵圍奇特相逢將何詰對大凡唱教須會目前生死意句殺活方可褒揚殺人刀活人劒上古之機鋒亦是今時之樞要摧魔破執不得不無直露真詮須知已有的能破的大用無虧圓通現前魔難措手若也未得如此一切四威儀中合作麼生明顯還見伊面孔麼遮裏尋常道面門一思常時無間諸人還得恁麼也無若實未明且須自立露倮倮地不與萬法為鄰一切法蓋伊不得所以古人道目前無法意在目前不是目前法非耳目之所到第一須得本智現前本地風光常露倮倮地自由自在出入無滯方可違時乃至龍神擎花無路外道潛不見有蹤不是泯形實去兄弟透頂透底始得莫只遮邊那邊逴得些子言句州處插語指東畫西舉古舉今遮般底椎殺一萬個有甚麼罪過明朝後日錮鏴人家男女打汝鬼骨臀有日在知麼宗門深奧酌度胸襟粗飱易飽細嚼難饑根本差殊良由自錯虗勞一報空腹高心過是阿誰食人言語揀擇是非只占己長終無是處無事珍重臨遷化上堂集衆良久展左手主事罔測乃令東邊師僧退後又展右手又令西邊師僧退後乃曰欲報佛恩無過流通大教歸去也歸去也珍重言訖莞爾而寂福州玄沙師備宗一禪師福州閩縣謝氏子少漁於南臺江上及壯忽棄舟從芙蓉山靈訓禪師斷髮詣南昌開元通玄律師所受具足戒芒鞋布衲食才接氣宴坐終日衆異之初兄事雪峰既而師承之峰以其苦行呼為頭陀一日峰問阿那個是備頭陀師曰終不敢誑於人異日峰召曰備頭陀何不遍參去師曰達磨不來東土二祖不往西天峰然之暨登象骨山乃與師同力締搆玄徒臻萃師入室咨決罔替晨昏又閲楞嚴發明心地由是應機敏捷與修多羅冥契諸方玄學有所未決必從之請益至與雪峰徵詰亦當仁不讓峰曰備頭陀再來人也正法眼藏云初欲遍歷諸方參尋知識携囊出嶺築著腳指流血痛楚歎曰是身非有痛從何來遂回雪峯雪峰上堂曰要會此事猶如古鏡當臺胡來胡現漢來漢現師出衆曰忽遇明鏡來時如何峰曰胡漢俱隱師曰老和尚腳跟猶未點地在雪峰指火曰三世諸佛在火𦦨裏轉大法輪師曰近日王令稍嚴峰曰作麼生師曰不許攙奪行市雲門曰火𦦨為三世諸佛說法三世諸佛立地聽黃龍新云雪峰雲門交互爭輝薪盡火滅三世諸佛向甚麼處聽莫戀白雲深處坐切忌寒灰燒殺人侍雪峰遊山次峰指面前地曰這一片地好造個無縫塔師曰高多少峰乃顧視上下師曰人天福報即不無和尚若是靈山授記未夢見在峰曰你又作麼生師曰七尺八尺雪峰曰世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈師指火罏曰火罏闊多少峰曰如古鏡闊師曰老和尚腳跟未點地在與雪峰夾籬次師問夾籬處還有佛法也無峰曰有師曰如何是夾籬處佛法峰撼籬一下師曰某甲不與麼峰曰子又作麼生師曰穿過篾頭來師辭雪峰云啓和尚人人自由自在某甲如今下山去峰云是誰與麼道師曰是和尚與麼道峰曰汝作麼生師云不自由自在峰云知雪峰謂師曰有個南際長老問無有答不得者際一日到雪峰峰令訪師師曰古人道此事惟我能知長老作麼生際曰須知有不求知者師曰山頭老漢喫許多辛苦作麼大溈真如舉此云玄沙恁麼道大溈恁麼舉不得動著何故如擊塗毒鼓遠近聞皆喪師見僧來禮拜乃曰禮拜著因我得禮汝徑山杲頌云夫子不識字達磨不會禪玄沙無此語切莫妄流傳僧問如何是學人自己師曰用自己作麼雲門云沒量大人被語脉裏轉却僧隨問門如何是學人自己門云忽然路上有人喚衲僧齊你也隨分得飯喫鼓山來師作一圓相示之山曰人人出這個不得師曰情知汝向驢胎馬腹裏作活計山曰和尚又作麼生師曰人人出這個不得山曰和尚與麼道却得某甲為甚麼道不得師曰我得汝不得閩王送荔枝與師師拈起示衆云這個荔枝得恁麼紅這個荔枝得恁麼赤諸人作麼生會若道得一色猶是儱侗若道是衆色又落斷常諸人作麼生有僧出云不可不識荔枝師自代云只是荔枝智證傳曰夫以言逐言以理遣理皆世流布想非能見道楞伽經曰如楔出楔如玄沙嘗曰學者當用處不換機而雖老於叢林者亦莫識此語可嘆也玄沙嘗食荔枝問衆曰這個荔枝得與麼紅這個得與麼赤你諸人且作麼生若道一色又是儱侗若道是衆色只成個斷常你諸人且作麼生彥瑫曰也只和尚自分別玄沙曰這儱侗愚癡有什麼交涉沖機曰都來只是一色玄沙曰總與麼儱侗有什麼了時乃回顧問皎然汝作麼生道皎然曰不可不識荔枝玄沙曰只是荔枝又曰汝諸人如許多時在我這裏總與麼說話不辨緇素不識吉凶我比來向汝道用處不換機因甚麼只管對話有什麼交涉道囐禪師曰先聖憫汝顛倒馳逐將一句子解落汝知是般事掉放間處自著些筋力却於機語上答出話頭將作禪道非惟自賺亦乃賺他師與韋監軍茶話次軍曰占波國人語話稍難辨何況五天梵語還有人辨得麼師提起托子云識得這個即辨得雲門舉云玄沙何用繁詞又云適來道甚麼師一日見三人新到自去打普請鼓三下却歸方丈新到具威儀了亦自去打普請鼓三下却入僧堂久往來白師云新到輕欺和尚師云打鐘集衆勘過大衆集新到不赴師令侍者去喚新到才至法堂却向侍者背上拍一下云和尚喚你侍者至師處新到便歸堂久住乃問和尚何不勘新到師云我與你勘了也普請斫柴次見一虎天龍曰和尚虎師曰是汝虎歸院後天龍問適來見虎云是汝未審尊意如何師曰娑婆世界有四種極重事若人透得不妨出得陰界妙喜代云也知和尚為人切雪竇云要與人天為師前面端的是虎保寧勇頌猛虎當塗獨振威爪牙真個利如錐可憐不覺亡身者碎骨拾來良可悲韋監軍來謁乃曰曹山和尚甚奇怪師曰撫州取曹山幾里韋指旁僧曰上座曾到曹山否曰曾到韋曰撫州取曹山幾里曰百二十里韋曰恁麼則上座不到曹山韋却起禮拜師曰監軍却須禮此僧此僧却具慙愧師南遊莆田縣排百戲迎接來日師問小塘長老昨日許多喧鬧向甚麼處去也塘提起衲衣角師曰料掉沒交涉黃龍新云奇怪諸禪德扶竪宗乘須是小塘長老始得玄沙何故道料掉沒交涉我即不然昨日許多喧閙向甚麼處去天共白雲曉水和明月流問承和尚有言聞性遍周沙界雪峰打鼓這裏為甚麼不聞師曰誰知不聞師問鏡清教中道不見一法為大過患且道不見甚麼法清指露柱曰莫是不見這個法師曰浙中清水白米從汝喫佛法未夢見在大溈哲云若不是鏡清幾乎忘前夫後何故不逢別者終不開拳雪竇云大小鏡清被玄沙熱瞞我當時若見但向他道靈山授記也未到如此長慶來師問除却藥忌作麼生道慶曰放憨作麼師曰雪峰山橡子拾食來這裏雀兒放糞泉守王公請師登樓先語客司曰待我引大師到樓前便舁却梯客司稟旨公曰請大師登樓師視樓復視其人乃曰佛法不是此道理師與泉守在室中說話有一沙彌揭簾入見却退步而出師曰那沙彌好與二十拄杖守曰恁麼即某甲罪過同安顯別云祖師來也師曰佛法不是恁麼鏡清云不為打水有僧問不為打水意作麼生清云青山碾為塵敢保沒間人東禪齊云只如玄沙意作麼生或云直饒恁麼去也好與拄杖或云事在當機或云拈破會處此三說還會玄沙意也無問承和尚有言盡十方世界是一顆明珠學人如何得會師曰盡十方世界是一顆明珠用會作麼僧便休師來日却問其僧盡十方世界是一顆明珠汝作麼生會曰盡十方世界是一顆明珠用會作麼師曰知汝向鬼窟裏作活計師因雪峰遷化為喪主三朝集衆煎茶次師於靈前拈起一隻盞云問大衆先師在日從你道如今且作麼生道若道得則先師無過若道不得則過在先師還有人道得麼如是三問衆皆無對師遂撲破盞子歸院後問中塔作麼生會塔云先師有甚麼過師便面壁塔便出去師復召塔塔回首師問你作麼生會塔便面壁師休去上堂衆集遂將拄杖一時趁下却回向侍者道我今日作得一解險入地獄如箭射者曰喜得和尚再復人身翠巖芝云大小玄沙前不到村後不至店且作麼生道得出身之路道吾真云大小芝老只是偏枯若是道吾即不然玄沙與侍者一人具隻眼師云若論此事喻如一片田地四至界分結契賣與諸人了也只有中心樹子猶屬老僧在師垂語曰諸方老宿盡道接物利生祇如三種病人汝作麼生接患盲者拈槌竪拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得若接不得佛法無靈驗時有僧出曰三種病人還許學人商量否師曰許汝作麼生商量其僧珍重出師曰不是不是羅漢曰桂琛現有眼耳口和尚作麼生接師曰慙愧便歸方丈中塔曰三種病人即今在甚麼處又一僧曰非惟瞞他兼亦自瞞法眼云我當時見羅漢舉此僧語我便會三種病人雲居錫云祇如此僧會不會若道會玄沙又道不是若道不會法眼為甚麼道我因此僧語便會三種病人上座無事上來商量大家要知有僧請益雲門門曰汝禮拜著僧禮拜起門以拄杖挃之僧退後門曰汝不是患盲麼復喚近前來僧近前門曰汝不是患聾麼門曰會麼曰不會門曰汝不是患啞麼僧于是有省圜悟勤舉此乃舉五祖演上堂云一人會得說不得一人不會却說得二人若來參如何辨得他若辨這兩人不得管取為人解粘去縛不得在若辨得才見入門我便著草鞋向你肚裏走幾遭也猶自不省討甚麼碗出去且莫作盲聾瘖啞會好雪竇舉此便喝云這盲聾瘖啞漢若不是雲門驢年去如今有底或拈槌豎拂他又不管教伊近前他又不來問會麼他又不應諸方還奈何得麼雪竇若不奈何汝這一隊驢漢又堪作什麼以拄杖一時趁散雪竇頌盲聾瘖啞杳絶機宜天上天下堪笑堪悲離婁不辨正色師曠豈識玄絲爭如獨坐虗窗下葉落花開自有時復云還會也無無孔鐵鎚妙喜拈云這僧雖然悟去只悟得雲門禪若是玄沙禪更買草鞋始得妙喜頌玄沙三種病人語透過雲門六不收莫待是非來入耳從前知己反為讐師見亡僧謂衆曰亡僧面前正是觸目菩提萬里神光頂後相學者多溟涬其語有時云諸禪德汝諸人盡巡方行腳來稱我參禪學道為有奇特去處為當只恁麼東問西問若有試通來我為汝證明是非我盡識得還有麼若無當知只是趁謴是汝既到這裏來我今問汝汝諸人還有眼麼若有即今便合識得還識得麼若不識便被我喚作生盲生聾底人還是麼肯恁麼道麼禪德亦莫自屈是汝真實何曾是恁麼人十方諸佛把汝向頂上著不敢錯誤著一分子只道此事惟我能知會麼如今相紹繼盡道承他釋迦我道釋迦與我同參汝道參阿誰會麼大不容易知莫非大悟始解得知若是限劑所悟亦莫能覯汝還識大悟麼不可是汝向髑髏前任他鑑照不可是汝說空說無說遮邊那邊有世間法有一個不是世間法和尚子虗空猶從迷妄幻生如今若是大肯去何處有遮個稱說尚無虗空消息何處有三界業次父母緣生與汝樁立前後如今道無尚是誑語豈況是有知麼是汝多時行腳和尚子稱道有覺悟底事我今問汝只如巔山巖崖迥絶人處還有佛法麼還裁辨得麼若辨不得卒未在我尋常道亡僧面前正是觸目菩提萬里神光頂後相若人覯得不妨出得陰界脫汝髑髏前意想天衣懷云亡僧面前即且置只如活人背後底是個甚麼都來只是汝真實人體何處更別有一法解蓋覆汝知麼還信得麼解承當得麼大須努力上堂佛道間曠無有程途無門解脫之門無意道人之意不在三際故不可升沈建立乖真非屬造化動則起生死之本靜則醉昏沈之鄉動靜雙泯即落空亡動靜雙收顢頇佛性必須對塵對境如枯木寒灰臨時應用不失其宜鏡照諸像不亂光輝鳥飛空中不雜空色所以十方無影像三界絶行蹤不墮往來機不住中間意鐘中無鼓響鼓中無鐘聲鐘鼓不相交句句無前後如壯士展臂不藉他力師子遊行豈求伴侶九霄絶翳何在穿通一段光明未曾昏昧若到這裏體寂寂常的的日赫𦦨裏無邊表圓覺空中不動搖吞爍乾坤迥然照夫佛出世者元無出入名相無體道本如如法爾天真不同修證祇要虗間不昧作用不涉塵泥個中纖毫道不盡即為魔王眷屬句前句後是學人難處所以一句當天八萬門永絶生死僧寶傳作一句當機八萬法門生死路絶直饒得似秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事道人行處如火銷氷終不却成氷箭既離弦無返回勢所以牢籠不肯住呼喚不回頭古聖不安排至今無處所若到這裏步步登玄不屬邪正識不能識智不能知動便失宗覺即迷旨二乘膽顫十地魂驚語路處絶心行處滅直得釋迦掩室於摩竭淨名杜口于毗邪須菩提唱無說而顯道釋梵絶聽而雨花若與麼現前更疑何事沒棲泊處離去來今限約不得心思路絶不因莊嚴本來真淨動用語笑隨處明了更無缺少今時人不悟個中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏睛才有念起旋旋破除細想才生即便遏捺如此見解即是落空亡底外道魂不散底死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑這裏分明則不然也不是隈門傍戶句句現前不得商量不涉文墨本絶塵境本無位次權名個出家兒畢竟無蹤跡真如凡聖地獄人天祇是療狂子之方虗空尚無改變大道豈有升沈悟則縱橫不離本際若到這裏凡聖也無立處若向句中作意則沒溺殺人若向外馳求又落魔界如如向上沒可安排恰似焰罏不藏蚊蚋此理本來平坦何用剗除動靜揚眉是真解脫道不強為意度建立乖真若到這裏纖毫不受指意則差便是千聖出頭來也安一字不得久立珍重又示衆夫古佛真宗常隨物現堂堂應用處處流輝隱顯坦然高低盡照是以沙門上士道眼惟先契本明心方為究竟森羅萬象一體同源廓爾無邊誰論有滯塵劫中事都在目前時人曠隔年深致乖常體迷心認物以背真宗執有滯空不遇良朋道友只自於疑誤私作解縱有商量渾成意度及至尋窮理地不辨正邪況平生自己未曾撈摝若乃先賢古德便自知時克己推功菴巖石室古德云情存聖量猶落法塵已見未忘還成滲漏不可道持齊持戒長坐不臥住意觀空凝神入定便當去也有甚麼交涉西天外道入得八萬劫定凝神寂靜閉目藏睛灰身滅智劫數滿後不免輪回蓋為道眼不明生死根源不破夫出家兒即不然不可同他外道也莫非真實明達具大知見能與諸佛同徹寂照忘知虗含萬像如今甚麼處不是汝甚麼處不分明甚麼處不露現何不與麼會去若無這個田地時中爭奈諸般滲漏何總成虗妄阿那個便是平生得力處如實未有發明切須在急時中忘餐失寢似救頭然如喪身命冥心自救放捨間緣歇却心識方有少許相親若不如是明朝後日盡被識情帶將去有甚麼自由分如今却不如他無情之物敷唱分明土木石頭說法非常真實只是少人能聽若聞此說始可商量且道無情說底法作麼生商量試道看不可道無言無說也無視無聽也不可道無問而自說稱讚所行道不見善財童子參五十三人知識末後見彌勒彈指之頃得入門才入門後其門自閉於樓閣中覩百千諸佛過去捨身受身所參一百二十人知識化境於樓閣中一時俱現為其證明善財疑心頓息大凡三條椽下具遮個真實發明即可商量便向四生六道中同於諸佛淨土更懼何生死且阿誰知他一切諸法都無實體至於靈山會上迦葉親聞猶如話月古德云善惡都莫思量猶如指月乃至三乘行位解脫菩薩涅槃聖德聖果竝如空花兔角不見道却來觀世間猶如夢中事有為心法不可相依日久年深全無利益只為違真棄本厭離凡情欣心聖道作此見知不出他限量拋他五陰不去不見道諸行無常是生滅法你只擬向前爭能明得可中徹去方得知之若未究得當知盡是虗頭世間難信之法具大根器方能明達今生若徹去萬劫亦然古德云直向今生須了却誰能纍劫受餘殃珍重上堂我今問汝諸人且承當得個甚麼事在何世界安身立命還辨得麼若辨不得恰似揑目生花見事便差知麼如今目前現有山河大地色空明暗種種諸物皆是狂勞花相喚作顛倒知見夫出家人識心達本源故號為沙門汝今既已剃髮披衣為沙門相即便有自利利他分如今看著盡黑漫漫地墨汁相似自救尚不得爭解為得人仁者佛法因緣事大莫作等間相似聚頭亂說雜話趁謴過時光陰難得可惜許大丈夫兒何不自省察看是甚麼事祇如從上宗乘是諸佛頂族汝既承當不得所以我方便勸汝但從迦葉門接續頓超去此一門超凡聖因果超毗盧妙莊嚴世界海超他釋迦方便門直下永劫不教有一物與汝作眼見何不自急急究取未必應作可道我且待三生兩生久積淨業仁者宗乘是甚麼事不可由汝用功莊嚴便得去不可他心宿命便得去會麼祇如釋迦出頭來作許多變弄說十二分教如瓶灌水大作一場佛事向此門中用一點不得用一毛頭伎倆不得知麼如同夢事亦如寐語沙門不應出頭來不同夢事蓋為識得知麼識得即是大出脫大徹頭人所以超凡越聖出生離死離因離果超毗盧越釋迦不被凡聖因果所謾一切處無人識得汝知麼莫祗長戀生死愛網被善惡業拘將去無自由分饒汝鍊得身心同虗空去饒汝到精明湛不搖處不出識陰古人喚作如急流水流急不覺妄為恬靜恁麼修行盡出他輪𢌞際不得依前被輪𢌞去所以道諸行無常直是三乘功果如是可畏若無道眼亦不究竟何似如今博地凡夫不用一毫工夫便頓超去解省心力麼還願樂麼勸汝我如今立地待汝搆去更不教汝加功鍊行如今不恁麼更待何時還肯麼便下座上堂汝諸人如在大海裏坐沒頭浸却了更展手問人乞水喫夫學般若菩薩須具大根器有大智慧始得若有智慧即今便出脫得去若是根器遲鈍直須勤苦耐志日夜忘疲無眠失食如喪考妣相似恁麼急切盡一生去更得人荷挾剋骨究實不妨易得搆去且況如今誰是堪任受學底人仁者莫祇是記言記語恰似念陀羅尼相似踏步向前來口裏哆哆和和地被人把住詰問著沒去處便嗔道和尚不為我答話恁麼學事大苦知麼有一般坐繩牀和尚稱善知識問著便搖身動手點眼吐舌瞪視更有一般說昭昭靈靈靈臺智性能見能聞向五蘊身田裏作主宰恁麼為善知識大賺人知麼我今問汝汝若認昭昭靈靈是汝真實為甚麼瞌睡時又不成昭昭靈靈若瞌睡時不是為甚麼有昭昭時汝還會麼這個喚作認賊為子是生死根本妄想緣起汝欲識根由麼我向汝道昭昭靈靈祇因前塵色聲香等法而有分別便道此是昭昭靈靈若無前塵汝此昭昭靈靈同於龜毛兔角仁者真實在甚麼處汝今欲得出他五蘊身田主宰但識取汝祕密金剛體古人向汝道圓成正遍遍周沙界我今少分為汝智者可以譬喻得解汝還見南閻浮提日麼世間人所作興營養身活命種種心行作業莫非皆承日光成立祇如日體還有許多般心行麼還有一周遍處麼欲識金剛體亦須如是看祇如今山河大地十方國土色空明暗及汝身心莫非盡承汝圓成威光所現直是天人羣生類所作業次受生果報有情無情莫非承汝威光乃至諸佛成道成果接物利生莫非盡承汝威光祇如金剛體還有凡夫諸佛麼有汝心行麼不可道無便得當去也知麼汝既有如是奇特當陽出身處何不發明取因何却隨他向五蘊身田中鬼趣裏作活計直下自謾去忽然無常殺鬼到來眼目譸張身見命見恁麼時大難支荷如生脫龜殼相似大苦仁者莫把瞌睡見解便當却去未解蓋覆得毛頭許汝還知麼三界無安猶如火宅且汝未是得安樂底人祇大作羣隊干他人世這邊那邊飛走野鹿相似但求衣食若恁麼爭行他王此字疑誤道知麼國王大臣不拘執汝父母放汝出家十方施主供汝衣食土地龍神荷護汝也須具慙愧知恩始得莫孤負人好長連牀上排行著地銷將去道是安樂未在皆是粥飯將養得汝爛冬瓜相似變將去土裏埋將去業識茫茫無本可據沙門因甚麼到恁麼地祇如大地上蠢蠢者我喚作地獄劫住如今若不了明朝後日入驢胎馬肚裏牽犂拽耙銜鐵負鞍碓搗磨磨水火裏燒煮去大不容易受大須恐懼好是汝自纍知麼若是了去直下永劫不曾教汝有這個消息若不了此煩惱惡業因緣不是一劫兩劫得休直與汝金剛齊壽知麼問後上宗乘如何理論師曰少人聽曰請和尚直道師曰患聾作麼又曰仁者如今事不獲已教我抑下如是威光苦口相勸百千方便如此如彼共汝相知聞盡成顛倒知見將此咽㗋脣吻祇成得個野狐精業謾汝我還肯麼祗如有過無過惟我自知汝爭得會若是恁麼人出頭來甘伏呵責夫為人師匠大不易須是善知識始得知我如今恁麼方便助汝猶尚不能搆得可中純舉宗乘是汝向甚麼處安措還會麼四十九年是方便祇如靈山會上有百萬衆惟有迦葉一人親聞餘皆不聞汝道迦葉親聞底事作麼生不可道如來無說說迦葉不聞聞便得當去不可是汝修因成果福智莊嚴底事知麼且如道吾有正法眼藏付囑大迦葉我道猶如話月曹溪竪拂子還如指月所以道大唐國內宗乘中事未曾見有一人舉唱設有人舉唱盡大地人失却性命如無孔鐵椎相似一時亡鋒結舌去汝諸人賴遇我不惜身命共汝顛倒知見隨汝狂意方有申問處我若不共汝恁麼知聞去汝向甚麼處得見我會麼大難努力珍重上堂曰太虗日輪是一切人成立太虗現在諸人作麼生滿目覷不見滿耳聽不聞此兩處省不得便是瞌睡漢若明徹得坐却凡聖坐却三界夢幻身心無一物如針鋒許為緣為對直饒諸佛出來作無限神通變現設如許多教網未曾措著一分毫惟助初學誠信之門還會麼水鳥樹林却解提綱他甚端的自是少人聽非是外事天魔外道是孤恩負義天人六趣是自欺自狂應是誑字如今沙門不薦此事翻成弄影漢生死海裏浮沉幾時休息去自家幸有此廣大門風不能紹繼得更向五蘊身田裏作主宰還夢見麼如許多田地教誰作主宰大地載不起虗空包不盡豈是小事若要徹即今這裏便明徹去不教仁者取一法如微塵大不教仁者捨一法如毫髮許還會麼又云若的自肯當人分上不論初學入叢林可謂共諸人久踐與過去諸佛無所乏少如大海水一切魚龍初生至老吞吐受用悉皆平等所以道初發心者與古佛齊肩又云汝諸根盡成顛倒古人以無窮妙藥醫療對治直至十地未得惺惺將知大不容易古人思惟如喪考妣如今兄弟見似等間何處別有人為汝了得可惜時光虗度何妨密密地自究子細觀尋至無著處自息諸緣去又云是諸人見有險惡見有大蟲刀劒諸事逼汝身命便生無限怕怖如似什麼恰如世間畫師一般自畫作地獄變相作大蟲刀劒了好好地看了却自生怕怖汝今諸人亦復如是百般見有是汝自幻出自生怕怖亦不是別人與汝為過汝今欲覺此幻惑麼但識取汝金剛眼睛若識得不曾教汝有纖塵可得露現何處更有虎狼刀劍解愶嚇得汝直至釋迦如是伎倆亦覓出頭處不得所以我向汝道沙門眼把定世界函蓋乾坤不漏絲髮何處更有一物為汝知見知麼何不急究取師疾大法難舉罕遇上根學者依語生解隨照失宗乃示綱宗三句曰第一句且自承當現成具足盡十方世界更無他故祇是仁者更教誰見誰聞都來是汝心王所為全成不動智只缺自承當喚作開方便門使汝信有一分真常流注亘古亘今未有不是未有不非者然此句只成平等法何以故但是以言遣言以理逐理平常性相接物利生耳且於宗旨猶是明前不明後號為一味平實分證法身之量未有出格之句死在句下未有自由分若知出格量不被心魔所使入到手中便轉換落落地言通大道不墮平懷之見是謂第一句綱宗也第二句𢌞因就果不著平常一如之理方便喚作轉位投機生殺自在縱奪隨宜出生入死廣利一切迥脫色欲愛見之境方便喚作頓超三界之佛性此名二理雙明二義齊照不被二邊之所動妙用現前是謂第二句綱宗也第三句知有大智性相之本通其過量之見明陰洞陽廓周沙界一真體性大用現前應化無方全用全不用全生全不生方便喚作慈定之門是謂第三句綱宗也幻寄曰沙謂迦葉親聞猶如話月而確然示人以此三句遂與古塔主抗軛其然豈其然乎洪公好奇誇博事未必盡實多此類矣師有偈曰萬里神光頂後相沒頂之時何處望事已成意亦休此個來蹤觸處周智者撩著便提取莫待須臾失却頭又曰玄沙遊徑別時人切須知三冬陽氣盛六月降霜時有語非關舌無言切要詞會我最後句出世少人知梁開平二年戊辰十二月二十七日示疾而化師狀短小然精神可掬聽法座下者盈七百閲世七十有四坐四十四夏福州長慶慧稜禪師初參靈雲問如何是佛法大意雲曰驢事未去馬事到來師不契參雪峰舉前話峰曰汝豈不是蘇州人師曰某甲豈不知是蘇州人峰見玄沙舉此沙曰恐他因緣不在和尚處教伊下來某向他說師到玄沙處舉前話沙曰你是稜道者作麼生不會師曰不知靈雲與麼道意作麼生沙曰只是稜道者不可外覓師曰和尚作麼生與麼說某名不可不識乞和尚說道理沙曰你是兩浙人我是福州人作麼生不會師曰實不會乞和尚說破沙曰我豈不是向你說也師曰某甲特地來乞和尚為說莫與麼相弄沙曰你聞鼓聲也無師曰某不可不識鼓聲也沙曰若聞鼓聲只是你師曰不會沙曰且喫粥去了便來師喫粥了便上曰乞和尚說破沙曰不是喫粥了也師曰乞和尚說破莫相弄某甲且辭歸去沙曰你來時從那裏路來師曰大目路來沙曰你去也從大目路去作麼生說相弄如是往來雪峰玄沙二十年坐破七個蒲團不明此事一日捲簾忽然大悟乃有頌曰也大差也大差捲起簾來見天下有人問我是何宗拈起拂子劈口打峰舉謂沙曰此子徹去也沙曰未可此是意識著述更須勘過始得至晚衆僧上來問訊峰謂師曰備頭陀末肯汝在汝實有正悟對衆舉來師又頌曰萬象之中獨露身惟人自肯乃方親昔時謬向途中覓今日看來火裏氷峰乃顧沙曰不可更是意識著述師問峰曰從上諸聖傳授一路請師垂示峰良久師設禮而退峰乃微笑師入方丈參峰曰是甚麼師曰今日天晴好曬麥自此酬問未嘗爽于玄旨保福辭歸雪峰謂師曰山頭和尚或問上座信作麼生祇對師曰不避腥羶亦有少許曰信道甚麼師曰教我分付阿誰曰從展雖有此語未必有恁麼事師曰若然者前程全自闍黎師與保福遊山福問古人道妙峰山頂莫祇這個便是也無師曰是即是可惜許僧問鼓山祇如長慶恁麼道意作麼生山云孫公若無此語可謂髑髏遍野師在西院問詵上座曰這裏有象骨山汝曾到麼曰不曾到師曰為甚麼不到曰自有本分事在師曰作麼生是上座本分事詵乃提起衲衣角師曰為當祇這個別更有曰上座見個甚麼師曰何得龍頭蛇尾問僧甚處來曰鼓山來師曰鼓山有不跨石門底句有人借問汝作麼生道曰昨夜報慈宿師曰劈脊棒汝又作麼生曰和尚若行此棒不虗受人天供養師曰幾合放過問如何得不疑不惑去師乃展兩手僧不進語師曰汝更問我與汝道僧再問師露膊而坐僧禮拜師曰汝作麼生會曰今日風起師曰恁麼道未定人見解汝於古今中有甚麼節要齊得長慶若舉得許汝作話主其僧但立而已師却問汝是甚處人曰向北人師曰南北三千里外學妄語作麼僧無對雪峰問云吾見溈山問仰山從上諸聖什麼處去仰云或在天上或在人間汝道仰山意作麼生師云若問諸聖出沒處與麼道即不可峰云汝渾不肯忽有人問汝作麼生道師云但道錯峰云是汝不錯師云何異於錯上堂撞著道伴交肩過一生參學事畢上堂淨潔打疊了也却近前問我覓我劈脊與你一棒有一棒到你你須生慙愧無一棒到你你又向甚麼處會上堂總似今日老胡有望保福曰總似今日老胡絶望玄覺云恁麼道是相見語不是相見語漳州保福院從展禪師年十五禮雪峰為受業師遊吳楚間後歸執侍峰一日忽召曰還會麼師欲近前峰以杖拄之師當下知歸常以古今方便詢于長慶一日慶謂師曰寧說阿羅漢有三毒不可說如來有二種語不道如來無語祇是無二種語師曰作麼生是如來語慶曰聾人爭得聞師曰情知和尚向第二頭道慶曰汝又作麼生師曰喫茶去雪竇頌云頭兮第一第二臥龍不鑒止水無處有月波澄有處無風浪起稜禪客稜禪客三月禹門遭點額圜悟勤云如今人不去他古人轉處看只管去句下走便道長慶當時不便用所以落第二頭保福云喫茶去便是第一頭若只恁麼看到彌勒下生也不見古人意若是作家終不作這般見解跳出這窠窟向上自有一條路你若道聾人爭得聞有甚麼不是處保福云喫茶去有甚麼是處轉沒交涉是故道他參活句不參死句因舉盤山道光境俱亡復是何物洞山道光境未亡復是何物師曰據此二尊宿商量猶未得勦絶乃問長慶如今作麼生道得勦絶慶良久師曰情知和尚向鬼窟裏作活計慶却問作麼生師曰兩手扶犂水過膝長慶問見色便見心還見船子麼師曰見曰船子且置作麼生是心師却指船子僧問雪峰生平有何言句得似𦏰羊挂角時師曰我不可作雪峰弟子不得雪竇顯云一千五百個布衲保福較些子上堂有人從佛殿後過見是張三李四從佛殿前過為甚麼不見且道佛法利害在甚麼處僧曰為有一分粗境所以不見師乃叱之自代曰若是佛殿即不見曰不是佛殿還可見否師曰不是佛殿見個甚麼將化示微疾僧入丈室問訊師曰吾與汝相識年深有何方術相救曰方術甚有聞說和尚不解忌口又謂衆曰吾旬日來氣力困劣別無他祇是時至也僧問時既至矣師去即是住即是師曰道道曰恁麼則某甲不敢造次師曰失錢遭罪言訖而寂福州鼓山神宴興聖國師大梁李氏子幼惡葷羶樂聞鐘梵年十二時有白氣數道騰於所居屋壁師題壁曰白道從茲速改張休來顯現作妖祥宗祛邪行歸真見必得超凡入聖鄉題罷氣即隨滅年甫志學遘疾甚亟夢神人與藥覺而頓愈明年又夢梵僧告曰出家時至矣遂依衛州白鹿山規禪師披削嵩嶽受具謂同學曰古德云白四羯磨後全體戒定慧豈準繩而可拘也於是杖錫遍扣禪關而但記語言存乎知解及造雪嶺朗然符契一日參雪峰峰知其緣熟忽起搊住曰是甚麼師釋然了悟亦忘其了心惟舉手搖曳而已峰曰子作道理耶師曰何道理之有峰審其懸解撫而印之師與招慶相遇次慶曰家常師曰太無厭生慶曰且欵欵師却曰家常慶曰今日未有火師曰太鄙吝生慶曰穩便將取去師問保福古人道非不非是不是意作麼生福拈起茶盞師曰莫是非好師示衆云若論此事如一口劍時有僧問承和尚言若論此事如一口劍和尚是死尸學人是死尸如何是劍師云拖出這死尸僧應諾歸衣鉢下結束便行師至晚問首座問話底僧在否座云當時便去也師云好與二十棒雪竇云諸方老宿盡道鼓山失却一隻眼殊不知重賞之下必有勇夫雖然如此若子細點檢將來未免一坑埋却東禪齊云這僧若不肯鼓山有甚過若肯何得便發去又云鼓山拄杖賞伊罰伊具眼底試商量看師有偈曰直下猶難會尋言轉更賒若論佛與祖特地隔天涯師舉問僧汝作麼生會僧無語乃謂侍者曰某甲不會請代一轉語者曰和尚與麼道猶隔天涯在僧舉似師師喚侍者問汝為這僧代語是否者曰是師便打趁出院問東使只如仰山祇對溈山於面前與一畫意作麼生東使云作家麼師云兄真個與麼作麼生東使云日可冷月可熱被師攔胸與一托清源王太尉問安只了院主云劫火洞然向甚麼處𢌞避院主云這裏𢌞避太尉不肯自代云不𢌞避進云為什麼不𢌞避太尉云他不出頭𢌞避什麼師云什麼處見他道不出頭師因與清源王太尉說話云但是世間一切雜學底事盡是網太尉云只如今還網得也無師云太尉𠰚太尉乃展手云即今有甚麼師云只這一網亦不少太尉舉南陽喚侍者事趙州云如空中書字雖然不成而文彩已彰師云只如與麼道是宗國師不宗國師太尉云宗與不宗俱是彰也師云只如趙州意旨作麼生太尉云不孤負趙州師云此是句也趙州意作麼生太尉云作麼師云彰也趙州意作麼生太尉無對龍華照布衲一夕指半月問溥上座曰那一片甚麼處去也溥曰莫妄想師曰失却一片也妙喜曰自起自倒問未剖已前請師斷師曰落在甚麼處曰失口即不可師曰也是寒山送拾得僧禮拜師曰住住闍黎失口山僧失口曰惡虎不食子師曰驢頭出馬頭回明州翠巖令參永明禪師上堂一夏與兄弟東語西話看翠巖眉毛在麼長慶云生也雲門云關保福云作賊人心虗翠巖芝云為衆竭力禍出私門雪竇頌云翠巖示徒干古無對關字相酬失錢遭罪潦倒保福抑揚難得嘮嘮翠巖分明是賊白圭無玷誰辨真假長慶相諳眉毛生也圜悟勤拈云人多錯會道白日青天說無向當話無事生事夏末先自說過先自點檢免得別人點檢他且喜沒交涉這般見解謂之滅胡種族歷代宗師出世若不垂示於人都無利益圖個甚麼到這裏見得透方知古人有驅耕夫之牛奪饑人之食手段如今人問著便向言句下咬嚼眉毛上作活計看他屋裏人自然知他行履處千變萬化節角聱訛著著有出身之路便能如此與他酬唱此語若無奇特雲門保福長慶三人咂咂地與他酬唱作甚麼保福云作賊人心虗只因此語惹得適來說許多情解且道保福意作麼生切忌向句下覓他古人你若生情起念則換你眼睛殊不知保福下一轉語截斷翠巖腳跟長慶云生也人多道長慶隨翠巖腳跟轉所以道生也且得沒交涉不知長慶自出他見解道生也各有出身處我且問你是什麼處是生處一似作家面前金剛王寶劍直下便用若能打破常流見解截斷得失是非方見長慶與他酬唱處雲門云關不妨奇特只是難參雲門大師多以一字禪示人雖一字中須具三句看他古人臨機唱酬自然與今時人迥別此乃下句底樣子他雖如此道意決不在那裏既不在那裏且道在什麼處也須子細自參始得又拈雪竇頌云雪竇道千古無對他只道看翠巖眉毛在麼有什麼奇特處便乃千古無對須知古人吐一言半句出來不是造次須是有定乾坤底眼始得雪竇著一言半句如金剛王寶劍如踞地獅子如擊石火似閃電光若不是頂門具眼爭能見他古人落處這個示衆直得千古無對過於德山棒臨濟喝且道雪竇為人意在什麼處你且作麼生會他道千古無對關字相酬失錢遭罪這個意如何直饒是具透關底眼到這裏也須子細始得且道是翠巖失錢遭罪是雪竇失錢遭罪是雲門失錢遭罪你若透得許你具眼潦倒保福抑揚難得抑自己揚古人且道保福在甚麼處是抑什麼處是揚嘮嘮翠巖分明是賊且道他偷什麼來雪竇道却是賊切忌隨他語脉轉却到這裏須是自有操持始得白圭無玷頌翠巖大似白圭相似更無些瑕翳誰辨真假可謂罕有人辨得雪竇有大才所以從頭至尾一串穿却末後却方道長慶相諳眉毛生也且道生也在什麼處急著眼看越州鏡清寺道怤順德禪師永嘉陳氏子六歲不茹葷親黨強啖以枯魚隨即嗢噦遂求出家于本州開元寺受具遊方抵閩謁雪峰峰問甚處人曰溫州人峰曰恁麼則與一宿覺是鄉人也曰祇如一宿覺是甚麼處人峰曰好喫一頓棒且放過一日師問祇如古德豈不是以心傳心峰曰兼不立文字語句師曰祇如不立文字語句心如何傳峰良久師禮謝峰曰更問我一轉豈不好師曰就和尚請一轉問頭峰曰祇恁麼為別有商量師曰和尚恁麼即得峰曰於汝作麼生師曰孤負殺人雪峰謂衆曰堂堂密密地師出問是甚麼堂堂密密峰起立曰道甚麼師退步而立雪峰垂語曰此事得恁麼尊貴得恁麼綿密師曰道怤自到來數年不聞和尚恁麼示誨峰曰我向前雖無如今已有莫有所妨麼曰不敢此是和尚不已而已峰曰致使我如此師從此信入而且隨衆時謂之小怤布衲普請次雪峰舉溈山道見色便見心汝道還有過也無師曰古人為甚麼事峰曰雖然如此要共汝商量師曰恁麼則不如道怤鉏地去師再參雪峰峰問甚處來師曰嶺外來峰曰甚麼處逢見達磨師曰更在甚麼處峰曰未信汝在師曰和尚莫恁麼粘膩好峰便休師後遍歷諸方益資權智因訪先曹山山問甚麼處來師曰昨日離明水山曰甚麼時到明水師曰和尚到時到山曰汝道我甚麼時到師曰適來猶記得山曰如是如是師因僧問新年頭還有佛法也無師曰有曰如何是新年頭佛法師曰元正啓祚萬物咸新曰謝師答話師曰鏡清今日失利僧問明教寬新年頭還有佛法也無寬曰無曰日日是好日年年是好年為甚却無寬曰張公喫酒李公醉曰老老大大龍頭蛇尾寬曰明教今日失利佛鑑勤頌云新年佛法鏡清有須信親言出親口新年佛法明教無西天鬍子沒髭鬚可笑兩翁同失利南海波斯失却鼻太平今夜太郎當還如雪上更加霜歲寒孫臏收却劍釣魚船上謝三郎問學人啐請師師曰還得活也無曰若不活遭人怪笑師曰也是草裏漢雪竇頌云古佛有家風對揚遭貶剝子母不相知是誰同啐覺猶在殼重遭撲天下衲僧徒名邈師一日於僧堂自擊鐘曰玄沙道底玄沙道底僧問玄沙道甚麼師乃畫一圓相僧曰若不久參爭知與麼師曰失錢遭罪問學人未達其源請師方便師曰是甚麼源曰其源師曰若是其源爭受方便僧禮拜退雪竇云死水裏浸却有甚用處侍者問和尚適來莫是成褫伊麼師曰無曰莫是不成褫伊麼師曰無曰未審意旨如何師曰一點水墨兩處成龍雪竇云猶較些子雪竇不是減鏡清威光要與這僧相見是甚麼源其源三十年後與汝三十棒普請鉏草次浴頭請師浴師不顧如是三請師舉钁作打勢頭便走師召曰來來頭回首師曰向後遇作家分明舉似頭後到保福舉前語未了福以手掩其口頭却回舉似師師曰饒伊恁麼也未作家問僧近離甚處曰石橋師曰本分事作麼生曰近離石橋師曰我豈不知你近離石橋本分事作麼生曰和尚何不領話師便打僧曰某甲話在師曰你但喫棒我要這話行問僧門外甚麼聲曰雨滴聲師曰衆生顛倒迷己逐物曰和尚作麼生師曰洎不迷己曰洎不迷己意旨如何師曰出身猶可易脫體道應難報恩懷嶽禪師臨遷化上堂山僧十二年來舉揚宗教諸人怪我甚麼處若要聽三經五論此去開元寺咫尺言訖告寂安國弘瑫禪師參雪峰峰問甚麼處來曰江西來峰曰甚麼處見達磨曰分明向和尚道峰曰道甚麼曰甚麼處去來一日雪峰見師忽擒住曰盡乾坤是個解脫門把手拽伊不肯入曰和尚怪弘瑫不得峰拓開曰雖然如此爭奈背後許多師僧何師舉國師文云得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺藜之園問僧曰一語須具得失兩意汝作麼生道僧舉拳曰不可喚作拳頭也師不肯亦舉拳別云祇為喚這個作拳頭長生山皎然禪師久依雪峰一日與僧斫樹次峰曰斫到心且住師曰斫却著峰曰古人以心傳心汝為甚麼道斫却師擲下斧曰傳峰打一拄杖而去普請次雪峰負一束藤路逢一僧便拋下僧擬取峰便踏倒歸謂師曰我今日踏這僧快師曰和尚却替這僧入涅槃堂始得峰便休去雪峰問光境俱亡復是何物師曰放皎然過有道處峰曰放汝過作麼生道曰皎然亦放和尚過峰曰放汝二十棒師便禮拜玄沙問我觀如來前際不來後際不去今亦無住長老作麼生師云放某甲過有個道處沙云放你過作麼生道師默然沙云教誰委師云和尚不委沙云情知你向鬼窟裏作活計師休去越山師鼐禪師初參雪峰而染指後因閩王請於清風樓齊坐久舉目忽覩日光忽然頓曉而有偈曰清風樓上赴官齊此日平生眼豁開方信普通年遠事不從蔥嶺帶將來歸呈雪峰峰然之臨終示偈曰眼光隨色盡耳識逐聲銷還源無別旨今日與明朝乃跏趺而逝太原孚上座初在揚州光孝寺講涅槃經有禪者阻雪因往聽講至三因佛性三德法身廣談法身妙理禪者失笑師講罷請禪者喫茶白曰某甲素志狹劣依文解義適蒙見笑且望見教禪者曰實笑座主不識法身師曰如此解說何處不是曰請座主更說一遍師曰法身之理猶若太虗竪窮三際橫亘十方彌綸八極包括二儀隨緣赴感靡不周遍曰不道座主說不是祇是說得法身量邊事實未證法身在師曰既然如是禪德當為代說曰座主還信否師曰焉敢不信曰若如是座主輟講旬日於室內端然靜慮收心攝念善惡諸緣一時放却師一依所教從初夜至五更聞鼓角聲忽然契悟便去扣門禪者曰阿誰師曰某甲禪者咄曰教汝傳持大教代佛說法夜來為甚麼醉酒臥街師曰禪德自來講經將生身父母鼻孔扭揑從今已去更不敢如是禪者曰且去來日相見師遂罷講遍歷諸方名聞宇內嘗遊浙中登徑山法會一日於大佛殿前有僧問上座曾到五臺否師曰曾到曰還見文殊麼師曰見曰甚麼處見師曰徑山佛殿前見其僧後適閩川舉似雪峰峰曰何不教伊入嶺來師聞乃趣裝入嶺初至雪峰廨院憩錫因分柑子與僧長慶問甚麼處將來師曰嶺外將來曰遠涉不易擔負將來師曰柑子柑子次日上山雪峰聞乃集衆師到法堂上顧視雪峰便下看知事雲竇云一千五百人善知識被孚老一便高竪降旗明日却上禮拜曰某甲昨日觸忤和尚峰曰知是般事便休雪竇云果然雲門因僧問作麼生是觸忤處門便打雪竇云打得百千萬個有甚麼用處直須盡大地人喫棒方可扶竪雪峰且道孚上座具甚麼眼雲居舜云大小雪峰被孚上座惑亂一上只這孚上座也是擔枷過狀雪竇宗云只知其一不知其二殊不知雪峰坐籌帷幄決勝干里孚上座逞盡平生見解也只在雪峰圈䙡裏幻寄曰一翳在目空花亂墜峰一日見師乃指日示之師搖手而出峰曰汝不肯我那師曰和尚搖頭某甲擺尾甚麼處是不肯峰曰到處也須諱却一日衆僧晚參峰在中庭臥師曰五州管內祇有這老和尚較些子峰便起去峰問師見說臨濟有三句是否師曰是曰作麼生是第一句師舉目視之峰曰此猶是第二句如何是第一句師叉手而退自此雪峰深器之一日玄沙上問訊雪峰峰曰此間有個老鼠子今在浴室裏沙曰待與和尚勘過言訖到浴室遇師打水沙曰相看上座師曰已相見了沙曰甚麼劫中曾相見師曰瞌睡作麼沙却入方丈白雪峰曰已勘破了峰曰作麼生勘伊沙舉前話峰曰汝著賊也妙喜曰又勘破一個保福簽瓜次師至福曰道得與汝瓜喫師曰把將來福度與一片師接得便去師到投子子云久嚮太原孚上座莫便是麼師作掌勢子云老僧招得師便出子云且聽諸方斷看師却回首子便打鼓山問父母未生時鼻孔在甚麼處師曰老兄先道山曰如今生也汝道在甚麼處師不肯山却問作麼生師曰將手中扇子來山與扇子再徵前話師搖扇不對山罔測乃毆師一拳鼓山赴大王請雪峰門送回至法堂乃曰一隻聖箭直射九重城裏去也師曰是伊未在峰曰渠是徹底人師曰若不信待某甲去勘過遂趁至中路便問師兄向甚麼處去山曰九重城裏去師曰忽遇三軍圍繞時如何山曰他家自有通霄路師曰恁麼則離宮失殿去也山曰何處不稱尊師拂袖便回峰問如何師曰好隻聖箭中路折却了也遂舉前話峰乃曰奴渠語在師曰這老凍膿猶有鄉情在徑山杲云衆中商量道甚麼處是聖箭折處云鼓山不合答他話是聖箭折處鼓山不合說道理是聖箭折處恁麼批判非惟不識鼓山亦乃不識孚老殊不知孚上座正是一枚賊漢於鼓山面前納一場敗闕懡㦬而歸却向雪峰處拔本大似屋裏販揚州若非雪峰有大人相這賊向甚麼處容身當時可惜放過却成不了底公案只今莫有為古人出氣底麼試出來我要問你甚麼處是聖箭折處後歸維揚陳尚書留在宅供養一日謂尚書曰來日講一遍大涅槃經報答尚書書致齊茶畢師遂升座良久揮尺一下曰如是我聞乃召尚書書應諾師曰一時佛在便乃脫去
