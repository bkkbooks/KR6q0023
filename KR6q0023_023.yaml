body:
  text: 六祖下第十世汾州太子院善昭禪師生俞氏太原人也器識沉𨗉少緣飾有大智於一切文字不由師訓自然通曉年十四父母相繼而亡孤苦厭世相剃髮受具杖䇿遊方所至少留不喜觀覽或譏其不韻師歎之曰是何言之陋哉從上先德行腳正以聖心未通驅馳決擇耳不緣山水也師歷諸方見老宿者七十有一人皆妙得其家風尤喜論曹洞石門徹禪師者蓋其派之魁奇者師作五位偈呈之曰五位參尋切要知纖毫才動即差違金剛透匣誰能曉惟有那吒第一機舉目便令三界靜振鈴還使九天歸正中妙挾通回互擬議鋒鋩失却威徹拊手稱善然師終疑臨濟兒孫別有奇處最後至首山問百丈捲簟意旨如何曰龍袖拂開全體現師曰師意如何曰象王行處絶狐蹤於是大悟言下拜而起曰萬古碧潭空界月再三撈摝始應知有問者曰是何道理便爾自肯曰正是我放身命處服勤甚久辭去遊湘衡間長沙太守張公茂宗以四名剎請師擇之而居師笑一夕遁去北抵襄沔太守劉公昌言恨見之晚時洞山谷隱皆虗席太守敦請師辭前後八請堅臥不答淳化四年首山歿西河道俗千餘人協心削牘遣沙門契聰迎請住持汾州太平寺太子院師閉關高枕聰排闥而入讓之曰佛法大事靜退小節風穴懼應讖憂宗旨墜滅幸而有先師先師已棄世汝有力荷擔如來大法者今何時而欲安眠哉師矍起握聰手曰非公不聞此語促辦嚴吾行矣既至宴坐一榻足不越閫者三十年天下道俗仰慕不敢名同曰汾州僧問如何是接初機底句師曰汝是行腳僧又問如何是辨衲僧底句師曰西方日出卯又問如何是正令行底句師曰千里持來呈舊面又問如何是立乾坤底句師曰北俱盧洲長粳米食者無嗔亦無喜又曰只將此四轉語驗天下衲僧才見汝出來驗得了也大愚芝云先師謂將此四句語驗天下衲僧大衆子細思量將此四句語被天下衲僧一時勘破妙喜曰諸人要識大愚麼三年無改於父之道可謂孝矣師論三玄三要語皆具臨濟章此則亦已見彼以大愚芝妙喜拈語故復列之此問真正修道人不見世間過未審不見個甚麼過師曰雪埋夜月深三尺陸地行舟萬里程曰和尚是何心行師曰却是你心行問大悲千手眼如何是正眼師曰瞎曰恁麼則一條拄杖兩人舁師曰三家村裏唱巴歌曰恁麼則和尚同在裏頭師曰謝汝殷勤鄭工部到茶話次鄭呈師偈曰黃紙休遮眼青雲自有陰莫將間學解埋沒祖師心復云只將此偈驗天下長老師曰與麼則汾陽也在裏頭云擔枷過狀師云更不再勘鄭云兩重公案師云知即得鄭良久師噓一聲鄭云文寶文寶師云在甚所在鄭云不容某甲出氣爭得嗔他道淹滯長老在此師曰是何言歟鄭云實師云也不得放過鄭云請師一偈師云不間紙墨隨示偈云荒草尋幽徑巖松迥布陰幾多玄學客失却本來心上堂汾陽有三訣衲僧難辨別更擬問如何拄杖驀頭楔時有僧問如何是三訣師便打僧禮拜師曰為汝一時頌出第一訣接引無時節巧語不能詮雲綻青天月第二訣舒光辨賢哲問答利生心拔却眼中楔第三訣西國胡人說濟水過新羅北地用鑌鐵復曰還有人會麼會底出來通個消息要知遠近莫祇恁麼記言記語以當平生有甚麼利益不用久立珍重上堂謂衆曰夫說法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷弦弦斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真智五同遍普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那個同具足是甚麼同遍普何人同真智孰能總同參那個同大事何物同一質有點得出底麼點得出者不吝慈悲點不出來未有參學眼在切須辨取要識是非面目見在不可久立珍重妙喜曰汾陽老子末後若無個面目現在一場敗闕雖然如是未免喪我兒孫喝一喝頌云兔角龜毛眼裏栽鐵山當面勢崔嵬東西南北無門入曠劫無明當下灰寂音頌十智同真面目全於中一智是根源若人欲見汾陽老擘破三玄作兩邊人天眼目載師與僧問答語僧問如何是一同一質師云綿州附子漢州薑如何是二同大事師云火官頭上風車子如何是三總同參師云萬象森羅齊稽首如何是四同真智師云鬼家活計如何是五同遍普師云石頭土塊如何是六同具足師云乞兒籮易滿如何是七同得失師云披毛戴角銜鐵負鞍如何是八同生殺師云放汝命通汝氣如何是九同音吼師云驢鳴犬吠啓圓通如何是十同得入師云且居門外與甚麼人同得入師云鬼爭漆桶與誰同音吼師云風吹石臼念摩訶作麼生同生殺師云猛虎入羊羣甚麼物同得失師云牛頭沒馬頭回阿那個同具足師云上座更缺個甚麼是甚麼同遍普師云狸奴白牯放毫光何人同真智師云認著依然還不是孰與總同參師云識得木上座也未那個同大事師云穿過髑髏何物同一質師云含元殿裏問長安幻寄曰梵音和雅令人樂聞人天眼目載師十八問汾陽云大意除實問默問難辨須識來意餘者總有時節言說淺深相度祇應不得妄生穿鑿彼此無益雖是善因而招惡果切須子細請益問僧問馬祖如何是佛祖云即心即佛趙州云殿裏底呈解問僧問龍牙天不能蓋地不能載時如何牙云道者合如是察辨問僧問臨濟學人有一問在和尚處時如何濟云速道速道僧擬議濟便打投機問僧問天皇疑情未息時如何皇云守一非真偏辟問僧問芭蕉盡大地是個眼睛乞師指示蕉云貧兒遇餿飯心行問僧問興化學人皂白未分乞師方便化隨聲便打探拔問僧問風穴不會底人為甚麼不疑穴云靈龜行陸地爭免拽泥蹤不會問僧問玄沙學人乍入叢林乞師指示沙云汝聞偃溪水聲麼僧云聞沙云從者裏入擎擔問僧問老宿世智辨聰總不要拈出還我話頭來宿便打置問問僧問雲門瞪目不見邊際時如何門曰鑑故問問僧問首山一切衆生皆有佛性為甚麼不識山云識借問問僧問風穴大海有珠如何取得穴云象罔到時光璨爛離婁行處浪滔天實問問僧問二祖學人只見和尚是僧如何是佛是法祖云是佛是法汝知之乎假問問僧問徑山者個是殿裏底那個是佛山云者個是殿裏底審問問僧問老宿一切諸法本來是有那個是無老宿云汝問甚分明何勞更問吾徵問問僧問睦州祖師西來當為何事州云你道為何事僧無語州便打明問問外道問佛不問有言不問無言世尊良久道云世尊大慈大悲開我迷雲令我得入默問問外道到佛處無言而立世尊云甚多外道道云世尊大慈大悲令我得入師復云凡有學者偏僻之問或蓋覆將來辨師家眼目或呈知見擎頭戴角一一識之盡皆打得只為當面識破或貶或剝明鏡當臺是何精魅之敢現何有妖狐能隱本形者也幻寄曰汾陽老人抽儱侗刺拔顢預楔一時間畫彩虗空設當時有聞其說便出來問如何是佛且道是擎擔問不會問十八問中那一問不該莫是不可喚作借問問麼方便呼為佛聻莫是不可喚作偏辟問麼你道佛外有甚麼聻一大藏教詮不出西天四七唐土二三說不到乃拈以問師家豈特皂白未分乞師方便是心行問若道不是無言而立之默問試道如何是佛說了個甚麼不可世尊良久答外道不問無言不得也學者須是自悟始得不見汾陽老人道莫祇恁麼記言記語以當平生有甚麼利益并汾苦寒師暫罷夜參有異比丘振錫而至謂師曰會中有大士六人奈何不說法言訖升空而去師密記以偈曰胡僧金錫光請法到汾陽六人成大器勸請為敷揚時楚圓守芝號上首叢林知名龍德府尹李侯與師有舊請師主承天使者三至不赴使者受罰復至曰必得師俱往不然有死而已師曰老病業已不出山借往當先後之何必俱耶使者曰師諾則先後惟所擇師乃令設饌俶裝告衆曰老僧去也誰人隨得一僧出曰某甲隨得師曰汝日行幾里曰五十里師曰汝隨我不得又一僧出曰某甲日行七十里師曰汝亦隨我不得侍者出曰某甲隨得但和尚到處即到師曰汝乃隨得老僧復顧使者曰吾先行矣停箸而化侍者即立化於側閲世七十有八坐五十六夏化跡出續燈及師語録并州承天院三交智嵩禪師或稱唐明參首山問如何是佛法的的大意山曰楚王城畔汝水東流師於此有省頓契佛意乃作三玄偈曰要用直須用心意莫定動三歲師子吼十方沒狐種我有真如性如同幕裏隱打破六門關顯出毗盧印真骨金剛體可誇六塵一拂永無遮廓落世界真無體體上無為真到家山聞乃請喫茶問這三頌是汝作來耶師曰是山曰或有人教汝現三十二相時如何師曰某甲不是野狐精山曰惜取眉毛師曰和尚落了多少山以竹篦頭上打曰這漢向後亂作去在師辭首山山以拄杖送師師接得有偈曰和尚拄杖照破龍象臨濟家風落在我掌山云莫相帶纍師打山一坐具山曰果然帶纍師云今日捉敗這老漢山云又似得便宜又似落便宜鄭工部入院見法座便問是甚麼人位次師云老僧部云自家爭敢師云工部莫壓良為賤部云真個師云不敢遂把手入方丈部云此室常現八未曾有難得之法長老還有也無師以袖拂工部面部云與麼則今日得清凉也師云且與後人作榜樣茶話次部云汾陽有個昭禪師愛看讀某甲留一偈師云略請見示部舉云黃紙休遮眼青雲自有陰莫將間學解埋沒祖師心師云工部慣得其便部云者賊師云更不再勘工部問百尺竿頭獨打毬萬丈懸崖絲繫腰時如何師曰幽州著腳廣南廝撲鄭無語師曰勘破這胡漢鄭曰二十年江南界裏這回却見禪師師曰瞎老婆吹火楊侍郎李駙馬與師問答問彌陀演化於西方達磨傳心於東土胡來漢現水到渠成五嶽鎮靜以崢嶸百谷朝宗而浩渺一靈之性託境現形三有之中憑何立命師云仙人無婦玉女無夫楊云尼剃頭不復生子師云陝府鐵牛能哮吼嘉州大像念摩訶李云側跳上山嶺師云騎牛不著靴廣慧璉云進象倒戈汾陽昭云端身裂面破妙喜曰月下看弄雪師子問玄沙不出嶺保壽不渡河善財參知識五十三員慧遠結黑白一十八士雪峰三度上投子智者九旬講法華遮六個漢為復野干鳴為復師子吼速道速道師云水急魚行澀峰高鳥不棲楊云泗州大聖師云土上加泥更一重李云舌上覆金錢師云半夜歌樂動誰是得知音廣慧璉云歌謠滿路人皆望汾陽昭云看壁畫人笑妙喜云野干鳴師子吼問風穴提印南院傳衣昭公演化於西河嵩師領徒於并壘南宗之旨北土大興且道二師承誰恩力師云不入蓮池浴懶向雪山遊楊云清凉山裏萬菩薩師云維摩會中諸聖集李云背負乾薪遭野火師云口是禍門廣慧漣云藏頭白海頭黑汾陽昭云告天手捺地噓噓妙喜曰猢猻騎鱉背問忉利透日月之上四禪無風火之災三交駕鐵牛之車臨汝握全提之印獼猴有一面古鏡狸奴有萬里神光直下承當是何人也師云朝看東南暮看西北楊云狸奴白牯却知有師云淹殺家頭蒿李云月裏煮油鐺師云石人腰帶廣慧璉云陳蒲鞋周金剛汾陽昭云直掇又逢胡釘鉸妙喜曰小出大遇問一切諸佛盡在裏許動即喪身失命著兩頭俱瞎擬議之時千山萬水直下會得也是炭庫裏坐地有不惜眉毛者通個消息來師云百雜碎楊云平生不妄語師云也要道過李云出穴兔遭罥師云東西無滯礙南北得自由廣慧璉云振錫下泥犂汾陽昭云穿山透石壁鼻孔血淋淋妙喜曰自作自受師復有頌曰一言才出徹龍庭攪動須彌帝釋驚三世諸佛齊坐了杖頭傀儡弄雙睛楊答云今年桃李味甘香一顆千金買得嘗貯藥胡蘆拖鼠尾穴門小窄轉難藏師又答千年桃核未聞香幾度逢春難得嘗靈龜曳尾除蹤跡沙中抱子更難藏楊又答五臺山裏有文殊羅漢天台洞裏居為問子湖一隻狗何如興化一頭驢師又答忽聞師子吼引出象王威把定聖凡路誰人敢揚眉擬議塵沙劫動念隔千岐瞬目他方去早已著灰泥楊再答蜘蛛網中坐蟲兒不敢過昨夜三更雪百鳥盡遭餘果熟樹枝垂鵝肥甑箄破借問末山尼何如劉鐵磨師再答山高人難上海深不見底樵夫漫踏鞋漁父休誇水言却超百億收來維摩詰若覓同道人曠劫不相識師作宗本頌左顧右黃昏莽鹵展手回來早是彰露且道作麼生是彰露底句楊云正殺人時努出頭師云兩腳捎空手叉胸李云左鬚右髮隱文章師云名利已彰天下去丫頭女子倒騎牛師復云維摩一默文殊贊善若遇老僧在彼各與三十棒且道這二老漢過在什麼處楊云頭破作七分如阿梨樹枝師云迦葉不擎拳阿難不合掌李云似犢牛兒未用角時師云忙屈拳打令師復云教有明文佛身充滿於法界老僧今日充滿於法界侍郎即今在什麼處楊云布裙一截泥努出膝蓋子師云寬口布袴三尺杖李云河水一擔直三文師云只見鼻頭津不見頂後濕汝州葉縣廣教院歸省禪師參首山山一日舉竹篦問曰喚作竹篦即觸不喚作竹篦則背喚作甚麼師掣得擲地上曰是甚麼山曰瞎師於言下豁然頓悟問維摩丈室不以日月為明和尚丈室以何為明師曰眉分八字曰未審意旨如何師曰雙耳垂肩問如何是和尚深深處師曰猫有歃血之功虎有起尸之德曰莫便是也無師曰碓搗東南磨推西北問忽遇大闡提人來還相為也無師曰法久成弊曰慈悲何在師曰年老成魔問己事未明以何為驗師曰閙市裏折靜槌曰意旨如何師曰日午點金鐙問聞鐘聲只有這個聲為復別有師曰腦後三斤師勘一僧曰近離什麼處僧曰東京師曰你因甚口上破僧曰和尚也須子細師曰七棒對十三庫下喫茶去師與僧行路次因見死人僧便問車在這裏牛在甚麼處師曰你蹩躠行僧云牛又無行個甚麼師云你既無牛因甚踏破腳僧云恁麼即親從葉縣來也師云莫亂走師因去將息寮看病僧僧乃問曰和尚四大本空病從何來師曰從闍黎問處來僧喘氣又問曰不問時如何師曰撒手臥長空僧曰㖿便脫去上堂良久曰夫行腳禪流直須著忖參學須具參學眼見地須得見地句方有相親分始得不被諸境惑亦不落於惡道畢竟如何委悉有時句到意不到妄緣前塵分別影事有時意到句不到如盲摸象各說異端有時意句俱到打破虗空界光明照十方有時意句俱不到無目之人縱橫走忽然不覺落深坑師到洞山問洞山廓然無依法歸何處山云三番羯磨師云恁麼即知音不和也山云知音不和底事作麼生師云龜毛拂子長三尺山云你因什麼眉鬚墮落師便禮拜潭州神鼎洪諲禪師嘗與數耆宿至襄沔間一僧舉論宗乘頗敏捷會野飯山店中供辦而僧論說不已師曰三界惟心萬法惟識惟識惟心眼聲耳色是甚麼人語僧曰法眼語師曰其義如何曰惟心故根境不相到惟識故聲色摐然師曰舌味是根境否曰是師以筯策菜入口中含胡而語曰何謂相入耶坐者駭然僧不能答師曰途路之樂終未到家見解入微不名見道參須實參悟須實悟閻羅大王不怕多語僧拱而退上堂舉洞山曰貪瞋癡太無知賴我今朝識得伊行便打坐便捶分付心王子細推無量劫來不解脫問汝三人知不知師曰古人與麼道神鼎則不然貪瞋癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來元解脫何須更問知不知有僧自汾州來傳是舉道者師倚拄杖曰一朵峰巒上獨樹不成林時如何僧曰水分江樹淺遠㵎碧泉深又問作麼生是回互之機僧曰盲人無眼又問曰我在衆時不會汾陽一偈上座久在法席必然明了僧曰請和尚舉看師曰鵝王飛鳥去馬頭嶺上住天高蓋不得大家總上路作麼僧舉起坐具曰萬年松在祝融峰師曰不要上座答話試說看僧曰忽憶少年曾覽照十分光彩臉邊紅即拂衣去師曰弄巧成拙師住神鼎以一朽牀為說法座其甘枯淡無比德臘俱高諸方尊之如古趙州襄州谷隱山蘊聰慈照禪師初參百丈恆和尚因結夏百丈上堂舉中觀論曰正覺無名相隨緣即道場師便出問如何是正覺無名相丈曰汝還見露柱麼師曰如何是隨緣即道場丈曰今日結夏次參首山問學人親到寶山空手回時如何山曰家家門前火把子師於言下大悟呈偈曰我今二十七訪道曾尋覓今朝喜得逢要且不相識後到大陽玄和尚問近離甚處師曰襄州陽曰作麼生是不隔底句師曰和尚住持不易陽曰且坐喫茶師便參衆去侍者問適來新到祗對住持不易和尚為甚麼教坐喫茶陽曰我獻他新羅附子他酬我舶上茴香你去問他有語在侍者請師喫茶問適來祗對和尚道住持不易意旨如何師曰真鍮不博金僧侍立次師問甚麼處坐曰後架裏坐師曰你向甚麼處舉話曰與主人公舉話師曰主人公姓甚麼曰不得姓師曰名甚麼曰不得名師曰恁麼則不識主人公也僧便喝師不對幻寄曰石門不對是肯伊不肯伊僧問若能轉物即同如來未審三門佛殿如何轉師曰我向汝道汝還信麼曰和尚誠言安敢不信師曰這漆桶問古人索火意旨如何師曰任他滅曰滅後如何師曰初三十一因作清凉河堰僧問忽遇洪水滔天還堰得也無師曰上拄天下拄地曰劫火洞然又作麼生師曰橫出竪沒語録作師問直歲清凉堰從汝堰忽遇洪水滔天時堰得麼曰在裏頭師曰與誰同伴歲無語却請師代師曰透過新羅歲復問和尚忽遇洪水云云與上同問寸絲不挂法網無邊為甚麼却有迷悟師曰兩桶一擔問一處火發任從你救八方齊發時如何師曰快曰還求出也無師曰若求出即燒殺你僧禮拜師曰直饒你不求出也燒殺你上堂五白猫兒爪距獰養來堂上絶蟲行分明上樹安身法切忌遺言許外生作麼生是許外生底句莫錯舉上堂十五日已前諸佛生十五日已後諸佛滅十五日已前諸佛生你不得離我這裏若離我這裏我有鈎子鈎你十五日已後諸佛滅你不得住我這裏若住我這裏我有錐子錐你且道正當十五日用鈎即是用錐即是遂有偈曰正當十五日鈎錐一時息更擬問如何回頭日又出師住石門時太守以私意笞辱之既歸衆僧迎於道左首座趨前問訊曰太守無辜屈辱和尚如此師以手指地云平地起骨堆隨指湧一堆土太守聞之令人削去復湧如初後太守全家死於襄州又僧問深山巖崖還有佛法也無師曰有曰如何是深山巖崖中佛法曰奇怪石頭形似虎火燒松樹勢如龍無盡居士愛其語而石門録獨不載二事皆妙喜親見無盡居士說深山嚴崖語今載會元矣汝州廣慧院元璉禪師初依招慶真覺禪師日事炊㸑有間誦經真覺見而問曰汝念甚麼經對曰維摩經真覺曰經在這裏維摩在甚麼處師茫然無以酬泣涕曰大丈夫漢被人一問無詞可措豈不愧哉於是謁閩中尊宿歷五十餘員不能契旨遂趨河南首山山問近離甚處師曰漢上山竪起拳曰漢上還有這個麼師曰這個是甚麼碗鳴聲山曰瞎師曰恰是拍一拍便出他日又問學人親到寶山空手回時如何山曰家家門前火把子師當下大悟云某甲不疑天下老和尚舌頭也山曰汝會處作麼生與我說來看師曰祇是地上水碙砂也山曰汝會也師便禮拜妙喜云你道念和尚還肯他廣慧也無若道肯他何故不與一棒若道不肯他何故不與一棒有人於此道得妙喜與你一棒楊億侍郎問天上無彌勒地下無彌勒未審在甚麼處師曰敲甎打瓦許郎中式漕西蜀經由謁師適接見於佛前許曰先拜佛先拜長老師曰蝦蟇吞大蟲許曰恁麼則總不拜去也師曰運使話墮許曰許長老具一隻眼師以衣袖便拂許曰今日看破便禮拜師見智門綱宗歌曰胡蜂不戀舊時窠猛將那肯家中死曰祚兄消許多氣力作麼我尋常說禪如手中扇子舉起便有風不舉一點也無既稱宗師却以實法與人好將一把火照看與麼開口面皮厚多少巖頭云若以實法與人土也消不得知麼究取好莫面面相在此作麼示衆佛法本來無事從上諸聖盡是揑怪強生節目壓良為賤埋沒兒孫更有雲門趙州德山臨濟死不惺惺一生受屈老僧這裏即不然便是釋迦老子出來也貶向他方世界教伊絶跡去何故如此免慮喪我兒孫老僧與麼道你等諸人作麼生會若於這裏會得去豈不慶快教你脫却毛衫做個灑灑地衲僧去更若不會來年更有新條在惱亂春風卒未休有僧入室請益云和尚適來言便是釋迦老子出來也貶向他方世界舉未了師云你若恁麼會入地獄如箭射云未審作麼生會師便打僧擬議師云會麼云不會師云山僧今日不避諸方檢責為你說破將此深心奉塵剎是即名為報佛恩妙喜舉了咄曰好人不肯做須要屎裏臥景祐三年歲在丙子正月二十六日示四圓相自書虎狗鼠牛字於中揭方丈門遂至九月二十六日示寂景德間宗師為高名士大夫所尊服而又享有高壽預知報謝師其冠也鐵佛院智嵩禪師有同參到師見便問還記得相識麼參頭擬議第二僧打參頭一坐具曰何不快祗對和尚師曰一箭兩垛仁王院處評禪師問首山如何是佛法大意山便喝師禮拜山拈棒師曰老和尚沒世界那山拋下拄杖曰明眼人難謾師曰草賊大敗智門罕迥禪師為北塔僧使點茶次師起揖曰僧使近上坐使曰子頭上爭敢安巢師曰捧上不威龍隨後打一坐具使茶罷起曰適來却成觸忤和尚師曰江南杜禪客覓甚麼第二碗丞相王隨居士謁首山得言外之旨自爾履踐深明大法臨終書偈曰畫堂燈已滅彈指向誰說去住本尋常春風掃殘雪廬州圓通緣德禪師混跡南昌上藍寺宋齊丘至僧衆趨迎師閲經自若丘問看甚麼經師舉經以示丘異之遂知名後主延至金陵後居廬山之圓通曹翰渡江入寺禪者驚走師宴坐如平日翰至不起翰怒曰汝不聞殺人不眨眼將軍乎師熟視曰汝安知有不懼生死和尚耶翰因警悚增歎翰曰禪者何為而散師曰擊鼓自集翰遣裨校擊之無至者翰曰不至何也師曰公有殺心故爾因自起擊之禪者乃集翰拜問決勝之䇿師曰非禪者所知師每領諸剎無所事去留惟頽然默坐而學者自成規矩平生著一衲裙以繩貫其褶處夜申其裙以當被太平興國二年十月七日升堂曰脫離世緣乃在今日以衲衣并所著木屐留付山中使門人纍青石為塔曰他日塔作紅色吾再來也泊然而化閲世八十坐六十三夏幻寄曰德師說法如雲如雨世人不聞以有耳聽也無耳者至今聞其雷音不絶也郢州大陽山警玄禪師十九為大僧聽圓覺了義講席無能及者旋棄去遊方初到梁山問如何是無相道場山指觀音曰這個是吳處士畫師擬進語山急索曰這個是有相底那個是無相底師遂有省便禮拜山曰何不道取一句師曰道即不辭恐上紙筆山笑曰此語上去在師獻偈曰我昔初機學道迷萬水千山覔見知明今辨古終難會直說無心轉更疑蒙師點出秦時鏡照見父母未生時如今覺了何所得夜放烏雞帶雪飛山謂可興洞上之宗上堂諸禪德須明平常無生句妙玄無私句體明無盡句第一句通一路第二句無賓主第三句兼帶去一句道得師子嚬呻二句道得師子返躑三句道得師子踞地縱也周遍十方擒也一時坐斷正當恁麼時作麼生通得個消息若不通得個消息來朝更獻楚王看問如何是平常無生句師曰白雲覆青山青山頂不露曰如何是妙玄無私句師曰寶殿無人不侍立不種梧桐免鳳來曰如何是體明無盡句師曰手指空時天地轉回塗石馬出紗籠曰如何是師子嚬呻師曰終無回顧意爭肯落平常曰如何是師子返躑師曰周旋往返全歸父繁興大用體無虧曰如何是師子踞地師曰迥絶去來機古今無變異僧問亡僧遷化向甚麼處去師曰亡僧幾時遷化曰爭奈相送何師曰紅罏𦦨上縧絲縷靉靆雲中不點頭師神觀奇偉從兒稚中即日一食住大陽足不越限脅不至席者五十年天聖五年七月十六日辭衆又三日以偈寄王曙侍郎其略曰吾年八十五修因至於此問我歸何處頂相終難覩停筆而化師初會下有承剖兩衲子號稱奇傑皆先師卒及年八十時歎無可繼洞宗者乃以頂相及偈寄浮山遠公使為求法器遠得投子青俾續洞宗語在浮山章中明州雪竇重顯禪師遂寧府李氏子依普安院仁銑上人出家受具之後橫經講席究理窮玄詰問鋒馳機辨無敵首造智門即伸問曰不起一念云何有過門召師近前師才近前門以拂子驀口打師擬開口門又打師豁然開悟留止五年盡得其道乃復遍參洞山聰禪師每新到參便問溈山水牯牛意作麼生對者多不契山旨師到亦如前問師曰作後人標榜山擬道師以坐具拂一下便行山曰且來上座師曰未參堂師到大龍為知客一日問曰語者默者不是非語非默更非總是總不是拈却大用現前時人知有未審大龍如何龍曰子有如是見解師曰這老漢瓦解氷消龍曰放你三十棒師禮拜歸衆龍却喚適來問話底僧來師便出龍曰老僧因甚麼瓦解氷消師曰轉見敗闕龍作色曰叵耐叵耐師休去後舉似南嶽雅和尚雅曰大龍何不與本分草料師曰和尚更須行腳問羅漢林曰法爾不爾如何指南林曰只為法爾不爾師曰大衆記取某甲話頭拂衣歸衆林下堂却令侍者請師至方丈問上座適來不肯老僧那師曰和尚當代宗匠焉敢不肯林曰你為甚拂衣歸衆師曰還許某甲說道理也無林曰你說看師拍一拍下去參大愚芝與雲峰悅遊最久後出世燒香法嗣北塔即智門有大龍小師曰何不與先師燒香師曰昔僧問先師如何是堅固法身先師曰山花開似錦㵎水湛如藍我頌此因緣報他恩了也雲峰悅知師不嗣芝特過勘師一日與遊山次驀曰入荒田不揀信手拈來草觸目未嘗無臨機何不道師拈起一莖禾示之悅不肯曰夢也未夢見在師曰你不肯即休僧問遠離翠峰祖席已臨雪竇道場未審是一是二師曰馬無千里謾追風曰恁麼則雲散家家月師曰龍頭蛇尾漢六人新到相看便問參頭夫為上將須是七事隨身兩刃交鋒作麼生僧云久嚮翠巖有此一著師云一著放過還我草鞋錢來僧便喝師便棒僧約住拄杖與師一拍師云未到翠峯與你二十棒了也僧無語師曰且在一邊問第二副將作麼生僧茫然師曰一狀領過喫茶了師把住參頭適來公案這裏即與麼堂中作麼生舉僧無語師打一坐具推出師問新到甚處人僧提起坐具師曰蝦跳不出斗僧曰𨁝跳師便打僧曰更𨁝跳師又打僧便走師喚回僧作禮曰觸忤和尚師曰我要這話行你又走作甚麼僧曰已遍天下了也師復打五棒僧曰有諸方在師曰你只管喫棒師又喚第二底近前來問甚處人僧曰鼎州人師曰敗也僧曰青天白日師曰兩重公案僧曰恰是師以拄杖指曰你擬𨁝跳僧擬議師亦打五棒參頭曰這僧喫棒與某甲不同師一時喚近前僧珍重便走師隨後與一拄杖有數僧到師曰新到那曰是師曰參堂去僧才行師曰來來僧回首師曰洞庭難得師僧到與你一碗茶喫寶華侍者來看師師問寶華多少衆者云不勞和尚如此師云我好好問爾𨁝跳作甚麼者云也不得放過師云真師子兒喫茶了師把住云適來得恁麼無禮者擬議被師一掌云歸去分明舉似寶華問僧名甚麼云義懷師云何不名懷義云當時致得師云誰與汝安著云某甲受戒來十年也師云行腳費却多少草鞋云和尚莫謾人好師云我也沒量罪過汝作麼生僧無語師云脫空謾語漢便打僧問昭昭於心目之間而相不可覩晃晃於色塵之內而理不可分既在心目之間為甚麼不覩其相師曰花須連夜發莫待曉風吹曰與麼則雲散家家月師曰毗婆尸佛早留心僧方禮拜師以拄杖打一下曰不得放過僧問猿抱子歸青嶂裏鳥銜花落碧巖前古人意旨如何曰夾山猶在曰和尚如何曰依稀似曲才堪聽又被風吹別調中僧却問如何是翠峰境曰春至桃花亦滿溪僧禮拜師曰山僧今日敗闕有人點檢得出許他頂門上具一隻眼便下座宗首座到方擬人事師約住云既知信之韜略便須拱手歸降宗云今日敗闕師云劒刃未施賊身已露宗云氣急殺人師云敗將不斬宗云是師云禮拜著宗云三十年後有人舉在師云已放你過問聰道者久參事作麼生道者曰青天白日師曰亂走作麼者便喝師曰喫棒者擬舉手師打一坐具曰你看這瞎漢亂與師一日見僧來拈拄杖云我兩手分付你作麼生僧退身云不敢師云為甚麼捧上不成龍云三十年後恐孤負和尚師放下拄杖云吽吽與數僧遊山次見牯牛舉頭師問牯牛舉頭作甚麼僧云怕和尚穿却師不肯自云看入草底因燒亡僧師問僧還將得火來麼曰將得來師曰弄假像真問僧甚處來曰浴來師曰三身中那一身浴曰或鼓聲前或鼓聲後師曰飽叢林又一日問僧你浴未曰某甲此生不浴師曰你不浴圖個甚麼曰今日被和尚勘破師曰賊不打貧兒家首座寫真師曰既是首座為甚麼却有兩個曰爭之不足師曰你問我我與你道座擬問師曰雪竇門下上堂僧問如何是時節因緣師曰瞌睡漢僧便喝師云詐惺惺復云譬若世界壞時大水競作其間無量衆生或沒未沒互相悲號仰望蒼蒼皆云相救時四禪天人一見高聲便喝咄哉衆生我預曾報汝令頻頻上來汝却不聽如今有什麼救處乃拍手云歸堂師云十方無壁落四面亦無門古人向甚麼處見客若道得接手句許汝天上天下上堂田地穩密底佛祖不敢近為甚麼擡腳不起神通遊戲底鬼神不能測為甚麼下腳不得直饒十字縱橫朝打三千暮打八百師又云槌擊妙喜世界百雜碎底人為甚麼處處解持鉢又云知時頻到香積國底人為甚麼拄杖頭上失却眼又云一花開天下春古佛為甚麼不著便你若透得救取天下老宿忽若有個衲僧出來云和尚且自救也許伊是金毛師子又云義出豐年儉生不孝於佛法中作麼生辨損益又云一塵一佛國一葉一釋迦德山何以卓牌於閙市又云入林不動草入水不動波投子因甚麼腳下五色索透關底試辨看或云佛未出世時一人人鼻孔撩天出世後為甚麼杳無消息代云賊不打貧兒家復問僧賊不打貧兒家因甚麼却打代云須到如此或云善來文殊還知敗闕麼代云一箭雨垛又云一箭雨垛為甚麼却敗闕代云善來文殊或云上來則擾擾端坐則昏昏脫灑一句作麼生道代云春無三日晴又云春無三日晴去住還堪笑衲僧晒却何時了代云某甲看或云文殊起佛見法見貶向二鐵圍山衲僧起佛見法見列在三條椽下翠峰起佛見法見誰敢著代云稱尺在手或云洞庭湖水一吸淨盡魚鱉向甚麼處藏身代云咦又問摘茶僧云茶叢列作鼻孔茶葉是你眼睛作麼生摘代云今日不著便師云一問一答總未有事在直饒乾坤大地草木叢林盡為衲僧異口同聲各置百千問難也不消長老彈指一下乃竝高低普應前後無差徑山杲云假使大地盡末為塵一一塵有一一口一一口具無礙廣長舌相一一舌相出無量差別音聲一一音聲發無量差別言詞一一言詞有無量差別妙義如上塵數衲僧各各具如是口如是舌如是音聲如是言詞如是妙義同時致百千問難問問各別不消長老咳嗽一聲一時答了乘時於中作無量無邊廣大佛事一一佛事周遍法界所謂一毛現神變一切佛同說經於無量劫不得其邊際便恁麼去閙熱門庭即得正眼觀來正是業識茫茫無本可據祖師門下一點也用不著幻寄曰摩醯首羅三眼雪竇但見右眼妙喜但見左眼若是正眼二師夢也未夢見在戲靠安巖呈雙溪大師頌陝府鐵牛却知有春秋幾幾成過咎一身還作二如來黑白不分辨香臭疏黑白無從天地不仁萬物蠢蠢若謂非緣竹何從筍髮兮髮兮黑白是準革轍二門頌劫火曾洞然木人淚先落可憐傅大士處處失樓閣一德雲閒古錐幾下妙峰頂喚他癡聖人擔雪共填井二祖佛未生前已振塗毒鼓如今誰樂聞請試分回互三宛轉復宛轉真金休百鍊喪却毗耶離無人解看箭虗堂愚頌迦葉聆箏起舞淵明聞鐘皺眉息耕古室危坐半窗凍日熙熙葛蘆覃頌風捲浮雲盡青天絶點埃山川俱在目何必上高臺悲學者尋流失源作為道日損偈曰三分光陰早二過靈臺一點不揩磨區區逐日貪生去喚不回頭爭奈何無禪才云雪竇老漢顢顢頇頇儱儱侗侗更參三十年也未會禪在然雖始是土曠人稀試聽下個注腳乃頌云瞎却摩醯三隻眼南北東西路不分千林落葉無人掃獨自松門展腳眠且菴仁頌云鋸解稱錘油煎石磉兩手擎來有功者賞緣生義頌義列緣生笑未聞孰呈布鼓過雷門金剛鐵券諸方問報道三千海嶽昏名實無當偈玉轉珠回佛祖言精通猶是汙心田老盧只解長舂米何得風流萬古傳迷悟相反頌霏霏梅雨灑高層五月山房冷似氷莫道乾坤乖大信未明心地是炎蒸道貴如愚頌雨過寒雲曉半開數峰如畫碧崔嵬空生不解巖中坐惹得天花動地來大功不宰頌牛頭峰頂鎖重雲獨坐寥寥寄此身百鳥不來春又過不知誰是到菴人晦跡自怡頌圖畫當年愛洞庭波心七十二峯青如今高臥思前事添得盧公倚石屏與時寡合頌居士門高謁未期間隈巖石且相宜太湖三萬六千頃月在波心說向誰皇祐四年六月十日沐浴罷整衣側臥而化閲世七十三坐五十夏建塔本山瑞州洞山曉聰禪師遊方時在雲居作燈頭見僧說泗州大聖近日在揚州出現有設問曰既是泗州大聖為甚麼却向揚州出現師曰君子愛財取之以道後僧舉似蓮花峯祥菴主主大驚曰雲門兒孫猶在中夜望雲居拜之僧問達磨未傳心地印釋迦未解髻中珠此時若問西來意還有西來意也無師曰六月雨淋淋寬其萬姓心曰恁麼則雲散家家月春來處處花師曰腳跟下到金剛水際是多少僧無語師曰祖師西來特唱此事自是上座不薦所以從門入者不是家珍認影迷頭豈非大錯既是祖師西來特唱此事又何必更對衆忉忉珍重師嘗負柴上山路逢一僧問山上有柴何故向山下擔柴師放柴於地曰會麼曰不會師曰我要燒石林鞏頌柴火煎熬擔在身相逢狹路不堪論淡烟落日青山外滿地難收刀斧痕發供養主示衆云住持之道勞他十方高人且實際理地不受一塵佛事門中不捨一法蓋為清衆之故所以忘勞然盡大地作一胡餅天下人盡得喫惟有深沙神不得喫怒發將蒺藜杖打一棒瓦解氷消師手植萬松於東嶺而恆誦金剛般若經山中人因名其嶺曰金剛方植松而寶禪師至時覩自五祖來師問上嶺一句作麼生道寶曰氣急殺人師拄钁呵曰從何得此隨語生解阿師見問上嶺便言氣急佛法却成流布寶請代語師曰氣喘殺人逍遙問嶺在此金剛在何處師指曰此一株是老僧親栽天聖八年六月八日示疾持不食七日集道俗曰法席當令自寶住持因與門人敘透法身話說偈曰參禪學道莫茫茫問透法身北斗藏余今老倒尫羸甚見人無力得商量惟有鉏頌知我道種松時復上金剛言卒而化又七日闍維得五色舍利塔於西阿洞山自寶禪師作達磨讚云師真徒邈三界無著擬欲安排知君大錯虗勞指點何處捫摸要識師真乾坤廓落正法眼藏自此上作敘此下乃讚師相兮世所希師眉兮陳雲垂師眼兮電光輝師鼻兮聳須彌師口門無齒兮過在誰擬涉流沙兮何不自知非彼此丈夫兮傳法與阿誰更住少林兮懡㦬却西歸遇衲僧兮好與一頓椎雖然如是兮不會莫針錐琅琊覺和尚覩此讚乃述頌云師眼兮深師鼻兮大師耳兮穿師舌兮快師身兮黑師心兮戴手携隻履返流沙熊耳石塔今猶在只將此頌驗盡天下衲僧妙喜曰此一字不得動著動著則禍生師少即持戒甚嚴行腳時嘗旅宿為娼所窘師坐達旦及發娼索宿錢仍與之自焚被褥而去娼愧告父母謂師真佛子請致齊自懺後住歸宗一日扶杖出門值縣尉過呵令避路師側立道左尉馬見師忽跪伏不行尉廉知是師再拜而去繼遷雲居山神一夕以輿舁師繞山行師呵令舁致方丈神如教舁致焉潭州北禪智賢禪師歲夜小參曰年窮歲盡無可與諸人分歲老僧烹一頭露地白牛炊黍米飯煮野菜羹燒榾柮火大家喫了唱村田樂何故免見倚他門戶傍他牆剛被時人喚作郎便下座歸方丈至夜深維那入方丈問訊曰縣裏有公人到勾和尚師曰作甚麼那曰道和尚宰牛不納皮角師遂捋下頭帽擲在地上那便拾去師跳下禪牀攔胸擒住呌曰賊賊那將帽子覆師頂曰天寒且還和尚師呵呵大笑那便出去時法昌為侍者師顧昌曰這公案作麼生昌曰潭州紙貴一狀領過南安巖自嚴尊者依雲豁五年密契心法自後頗著異跡除懷仁江蛟害馴武平黃石巖蛇虎至可使令驅南安江眠槎民有禱者輒得如願有僧自惠州來曰河源有巨舟著沙萬牛挽不可動願得以載磚建塔於南海為衆生福田師曰此陰府之物然付汝偈取之偈曰天零灞水生陰府船王移莫立沙中久納福蔭菩提僧即舟倡偈而舟為動萬衆歡呼至五羊有巨商從借以載僧許之方解繂俄風作失舟所在有沙彌無多聞性而事師謹願師憐之作偈使誦久當聰明偈曰大智發於心於心何處尋成就一切義無古亦無今於是世間章句吾伊上口師示人多以偈率題贈以之中四字於其後莫有識其旨者初西竺尊者至南康盤古山曰後當有白衣菩薩來興此山至是師以鄰僧亡遵教茶毗而未聞官忤吏遂白衣適遊此山樂而棲息三年竟成叢林符波利所記云淳化乙卯正月初六日集衆曰吾此日生今正是時遂右脅而化林間録集衆曰下有汝等當知妙性廓然本無生滅示有去來更疑何事二十字天台山德韶國師處州龍泉人族陳氏母葉夢白光觸體覺而娠生而傑異年十五有梵僧見之拊其背曰汝當出家塵中無置汝所也乃往依龍歸寺剃髮十八詣信州開元寺受滿分戒後唐同光中謁舒州投子菴主不契造龍牙遁禪師問雄雄之尊因甚麼親近不得遁曰如火與火曰忽遇水來又作麼生遁曰汝不會我語又問天不蓋地不載此理如何遁曰合如是師惘然固要為說遁曰道者汝向後自會去師後於通玄峯澡浴次忽省前話遂具威儀望龍牙禮拜曰當時若向我說今日決定罵也時疏山有矮師叔者精峭號能齧鏃機師問百匝千重是何人境界矮曰左搓芒繩縛鬼子曰不落古今請師說矮曰不說曰為什麼不說矮曰個中不辨有無師曰師今善說矮駭之久而辭去所至少留見知識五十四人括磨搜剝窮極隱祕後至臨川謁法眼眼一見深契之師以遍涉叢林但隨衆而已無所咨參有僧問法眼禪師曰十二時中如何得頓息萬緣去法眼曰空與汝為緣耶色與汝為緣耶言空為緣則空未無緣言色為緣則色心不二日用果何物為汝緣乎師聞悚然異之又有問者曰如何是曹源一滴水法眼曰是曹源一滴水於是師大悟于座下平生疑滯渙若氷釋感涕沾衣法眼曰汝當大弘吾宗行矣無自滯洪覺範曰僧問法眼如何是曹源一滴水而法眼但曰是曹源一滴水韶公乃開悟後僧有問韶如何是古佛心曰此問不弱問那吒太子析骨還父析肉還母如何是太子身曰大家見上座問則問答之間不令意根樁立蓋嘗曰大凡言教須絶滲漏而學者方爭趨微妙之域欲見佛祖之心譬如趨越而首燕也歟問一人執炬自燼其身一人抱氷橫尸於路此二人阿誰辨道師曰不遺者曰不會乞師指示師曰你名敬新曰未審還有人證明也無師曰有曰甚麼人證明師曰敬新興教明和尚問曰飲光持釋迦丈六之衣在雞足山候彌勒下生將丈六之衣披在千尺之身應量恰好祇如釋迦身長丈六彌勒身長千尺為復是身解短耶衣解長耶師曰汝却會明拂袖便出去師曰小兒子山僧若答汝不是當有因果汝若不是吾當見之明歸七日吐血浮光和尚勸曰汝速去懺悔明乃至師方丈悲泣曰願和尚慈悲許某懺悔師曰如人倒地因地而起不曾教汝起倒明又曰若許懺悔某當終身給侍師為出語曰佛佛道齊宛爾高低釋迦彌勒如印印泥僧問承古有言若人見般若即被般若縛若人不見般若亦被般若縛既見般若為甚麼却被縛師曰你道般若見甚麼曰不見般若為甚麼亦被縛師曰你道般若甚麼處不見乃曰若見般若不名般若不見般若亦不名般若且作麼生說見不見所以古人道若缺一法不成法身若剩一法不成法身若有一法不成法身若無一法不成法身此是般若之真宗也云衆真宗不二萬德無言正當明時如王寶劍所以如來於一切處成等正覺於刀山劍樹上成等正覺於鑊湯罏炭裏成等正覺於棒下成等正覺於喝下成等正覺所以一動一靜一去一來一生一滅未曾有纖毫異相未曾有纖毫別相更無毫釐絲髮許作見聞心識解會何故誠謂是非路絶妙性天機所以云汝生我亦生汝殺我亦殺生殺輪王機交馳激電掣上堂佛法現成一切具足豈不見道圓同太虗無缺無餘若如是也且誰缺誰剩誰是誰非誰是會者誰是不會者所以道東去亦是上座西去亦是上座南去亦是上座北去亦是上座因甚麼却成東西南北若會得自然見聞覺知路絶一切諸法現前何故如此為法身無相觸目皆形般若無知對緣而照一時徹底會取好諸上座出家兒合作麼生此是本有之理未為分外識心達本源故名為沙門若識心皎皎地實無絲毫障癡上座久立珍重上堂眼中無色識色中無眼識眼識二俱空何能令見色是眼則不能自見其己體若不能自見云何見餘物古聖方便皆為說破若於此明得寂靜法不寂靜法也收盡明得遠離法不遠離法亦收盡未來現在亦無遺餘名一法界何有遮障各自信取師有偈曰通玄峰頂不是人間心外無法滿目青山法眼聞曰即此一頌可起吾宗妙喜曰滅却法眼宗只緣這一頌師以涅槃四種聞示學者諸方目為韶國師四料揀云聞聞百丈端頌云秋江清淺時白鷺和烟島良哉觀世音全身入荒草聞不聞百丈端頌云解語非干舌能言豈是聲不知常顯露剛道有虧盈不聞聞百丈端頌云波生元是水空性逐方圓除却方圓器胡孫夜播錢不聞不聞百丈端頌云理事兩俱忘誰人敢度量渾崙無縫罅遍界不曾藏開寶四年辛未華頂西峰忽摧聲振一境六月有星隕於峰頂林木皆白二十八日集衆告別而化金陵清凉泰欽法燈禪師在衆日性豪逸不事事衆易之法眼獨契重眼一日問衆虎項金鈴是誰解得衆無對師適至眼舉前語問師曰繫者解得眼曰汝輩輕渠不得上堂有僧出禮拜師曰道者前時謝汝請我將甚麼與汝好僧擬問次師曰將謂相悉却成不委上堂某甲本欲居山藏拙養病過時奈緣先師有未了底公案出來與他了却時有僧問如何是先師未了底公案師便打曰祖禰不了殃及兒孫曰過在甚麼處師曰過在我殃及你江南國主為鄭王時受心法於法眼之室聞此問師曰先師有甚麼不了底公案師曰現分析次翠巖芝云為衆竭力禍出私門天童覺云這僧若是個漢出來便與掀倒禪牀不惟自有出身之路亦免祖禰不了殃及兒孫圜悟舉云山僧卑志本亦如斯今日出來祇為正祖先師有個現成公案對衆舉揚有不惜性命底試出來挨拶看如無不免自拈自弄去也喝一喝以拂子擊禪牀下座杭州靈隱清聳禪師參法眼眼指雨謂師曰滴滴落在上座眼裏師初不喻旨後因閲華嚴感悟承眼印可上堂曰十方諸佛常在汝前還見麼若言見將心見將眼見所以道一切法不生一切法不滅若能如是解諸佛常現前又曰見色便見心且喚甚麼作心山河大地萬象森羅青黃赤白男女等相是心不是心若是心為甚麼却成物象去若不是心又道見色便見心還會麼祇為迷此而成顛倒種種不同於無同異中強生同異且如今直下承當頓豁本心皎然無一物可作見聞若離心別求解脫者古人喚作迷波討源卒難曉悟洪州百丈道恆禪師參法眼因請益外道問佛不問有言不問無言敘語未終眼曰住住汝擬向世尊良久處會那師從此悟入上堂實是無事諸人各各是佛更有何疑得到這裏古人道十方同聚會個個學無為此是選佛場心空及第歸且作麼生是心空不是那裏閉目冷坐是心空此正是意識想解上座要會心空麼但識自心便見心空所以道過去已過去未來更莫算兀然無事坐何曾有人喚設有人喚上座應他好不應他好若應他阿誰喚上座若不應他又不患聾也三世體空且不是木頭也所以古人道心空得見法王還見法王麼也祇是老病僧又莫道渠自代好珍重上堂衆才集便曰喫茶去或時衆集便曰珍重或時衆集便曰歇後有頌曰百丈有三訣喫茶珍重歇直下便承當敢保君未徹薦福古舉此語示衆云大衆只如恆和尚作此一頌且道見處如何還知得失否要會麼據他三度上堂時節恰似個好人後來作此一頌恰如面上雕兩行字若是通人達士舉起便知後學初機難為揀辨老僧與汝從頭注出百丈有三訣賊身已露喫茶珍重歇贓物出來直下便承當敢保君未徹大似抱贓判事然雖如此諸仁者須具擇法眼方能證明如或邪正不分可謂顢頇佛性更須博問賢良可惜虗生浪死永明道潛禪師謁法眼眼曰子於參請外看甚麼經師曰華嚴經眼曰總別同異成壞六相是何門攝屬師曰文在十地品中據理則世出世間一切法皆具六相也眼曰空還具六相也無師無對眼曰汝問我師乃問空還具六相也無眼曰空師於是開悟踊躍禮謝眼曰子作麼生會師曰空眼然之異日因四衆士女入院眼問曰律中道隔壁聞叉釧聲即名破戒見覩金銀合雜朱紫駢闐是破戒不是破戒師曰好個入路眼曰汝向後有五百毳徒為王侯所重在師後於衢州古寺覽閲藏經嘗宴坐中見文殊現形不覺起而作禮及詣杭禮阿育王塔跪而頂戴淚下如雨問掌塔僧曰舍利人不目擊還實有否僧云按傳記云藏在內角中望若懸鐘焉師疑未已遂苦到跪禮更無間然俄見舍利在懸鐘之外蠢瞤而行師悲喜交集又光文大師自為檀越請於山齊行三七日普賢懺忽見遍吉御象在塔寺三門亭下其象鼻直枕行懺所建隆二年辛酉九月十八日示寂入棺之際有白光晝發舉衆皆見闍維舍利不可勝紀有屠者自惟惡業展襟就火聚乞求須臾獲七顆杭州報恩慧明禪師一日有新到參師問近離甚處曰都城師曰上座離都城到此山則都城少上座此間剩上座剩則心外有法少則心法不周說得道理即住不會即去僧無對妙喜代曰和尚謾某甲不得某甲亦謾和尚不得復曰即今莫有道得相謾句者麼若也道得許汝跳得金剛圈吞得栗棘蓬師問朋彥上座曰從上諸聖及諸先德還有不悟者無彥曰諸聖先德豈有不悟者哉師曰一人發真歸源十方虗空悉皆銷隕今天台山嶷然如何得銷隕去彥無對資嚴長老問如何是現前三昧師曰還聞麼嚴曰某甲不患聾師曰果然患聾雲居清錫禪師有廖天使入院見供養法眼真乃問曰真前是什麼果子師曰假果子廖曰既是假果子何以將供養真師曰也祇要天使識假漳州羅漢智依禪師問僧今夏在甚麼處僧曰在無言上座處師曰還曾問訊他否僧曰也曾問訊師曰無言作麼生問得僧曰若得無言甚麼處不問得師喝曰恰似問老兄師與彥端長老喫餅餤端曰百種千般其體不二師曰作麼生是不二體端拈起餅餤師曰祇守百種千般端曰也是和尚見處師曰汝也是羅公詠梳頭樣師將示滅乃謂衆曰今晚四大不和暢雲騰鳥飛風動塵起浩浩地還有人治得麼若治得永劫不相識若治不得時時常見我言訖告寂金陵報慈文邃禪師嘗究首楞嚴為之節解句釋自謂深符經旨謁法眼眼曰楞嚴豈不是有八還義師曰是眼曰明還甚麼師曰明還日輪眼曰日輪還甚麼師懵然眼戒令焚所注文師始依眼請益金陵報恩院玄則禪師問青峰如何是學人自己峰曰丙丁童子來求火後謁法眼眼問甚處來師曰青峰眼曰青峰有何言句師舉前話眼曰上座作麼生會師曰丙丁屬火而更求火如將自己求自己眼曰與麼會又爭得師曰某甲祇與麼未審和尚如何眼曰你問我我與你道師問如何是學人自己眼曰丙丁童子來求火師於言下頓悟開堂日李王與法眼俱在會僧問龍吟霧起虎嘯風生學人知是出世邊事到此為甚麼不會師曰會取好僧舉頭看師又看法眼乃抽身入衆法眼與李王當時失色眼歸方丈令侍者喚問話僧至眼曰上座適來問底話許你具眼人天衆前何不禮拜蓋覆却眼摵一坐具其僧三日後吐光而終歸宗䇿真禪師初名慧超謁法眼問曰慧超咨和尚如何是佛眼曰汝是慧超師從此悟入圜悟勤云諸方商量者多作情解道慧超便是佛所以法眼恁麼答有者道大似騎牛覓牛有者道問處便是有甚麼交涉若恁麼會不惟孤負自己亦乃深屈古人雪竇頌云江國春風吹不起鷓鴣啼在深花裏三級浪高魚化龍癡人猶戽夜塘水圜悟云江西江南多作兩般解會道江國春風吹不起頌汝是慧超這個消息直饒江國春風也吹不起鷓鴣啼在深花裏頌諸方商量浩浩似鷓鴣啼在深花裏有甚麼交涉殊不知雪竇這兩句只是一句要得無縫無罅明明向汝道言也端語也端蓋天蓋地他問如何是佛眼云汝是慧超雪竇道江國春風吹不起鷓鴣啼在深花裏向這裏薦得去可以丹霄獨步何啻浪高魚化龍若作情解便是癡人猶戽夜塘水昔端師翁亦有一偈云三文大光錢買得個油糍喫向肚裏了當下不聞饑此頌甚好只是不如雪竇措詞好住後上堂諸上座見聞覺知秖可一度秖如會了是見聞覺知不是見聞覺知要會麼與諸上座說破了也待汝悟始得久立珍重同安紹顯禪師因雲蓋山乞瓦造殿有人問既是雲蓋何用乞瓦僧無對師代曰瓦遇其人觀音從顯禪師上堂衆集良久曰文殊深讚居士未審居士受讚也無若受讚何處有居士耶若不受讚文殊不可虗發言也大衆作麼生會太平興國八年九月中謂檀那袁長史曰老僧三兩日間歸鄉去袁曰和尚年尊何更思鄉師曰歸鄉圖個好鹽喫袁不測其言翌日師不疾坐亡洛京興善棲倫禪師因宮師李繼勳終世有僧問是法住法位世間相常住未審宮師李公向甚麼處去也師曰恰被汝問著曰恁麼即虗申一問師曰汝不妨靈利古賢院謹禪師侍立法眼次眼問一僧曰自離此間甚麼處去來曰入嶺來眼曰不易曰虗涉他如許多山水眼曰如許多山水也不惡其僧無語師於此有省音釋卷二十一之二十三舸嘉我切歌上聲大船艨莫紅切音蒙戰船䑳音論舟名讇丑剡切音諂言𣯶蘇含切糝平聲毛長貌堅姚切音驕斷首倒懸也頷五感切點頭以應也簉初救切去聲疾衝也𩥇之善切音戰馬臥土中匹米切音嚭傾首也不正也揎音宣捋也引也㡧側硬切音諍開張畫繪也弇於檢切淹上聲摐初莊切音瘡撞鐘鼓也僜音鄧俊僜不著事㖀盧沒切音勒聲也畬音于二歲所治之田𭣟直角切音濁築也糝桑感切靸上聲窬雲俱切音于門邊小竇呼委切灰上聲火焚壞也戽荒故切呼去聲舟中抒水器鐺抽更切音撐釜屬沔莫典切音勉揳先結切音屑鑌卑民切音賓鑌鐵為刀甚利褶席入切音集袴也繂劣戌切音律大繩又曰以竹為索用維舟者瞤殊倫切音純目動也
