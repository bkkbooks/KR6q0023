body:
  text: 六祖下第四世福州長慶大安禪師造百丈禮而問曰學人欲求識佛何者即是丈曰大似騎牛覓牛師曰識得後如何丈曰如人騎牛至家師曰未審始終如何保任丈曰如牧牛人執杖視之不令犯人苗稼師自茲領旨更不馳求同參祐禪師創居溈山師躬耕助道祐歸寂衆請主法上堂汝諸人總來就安求覓甚麼若欲作佛汝自是佛擔佛傍家走如渴鹿趁陽𦦨相似何時得相應去汝欲作佛但無許多顛倒攀緣妄想惡覺垢欲不淨衆生之心便是初心正覺佛更向何處別討所以安在溈山三十年來喫溈山飯屙溈山矢不學溈山禪祇看一頭水牯牛若落路人草便把鼻孔拽轉來才犯人苗稼即便鞭撻調伏既久可憐生受人言語如今變作個露地白牛常在面前終日露迥迥地趁亦不去汝諸人各自有無價大寶從眼門放光照見山河大地耳門放光領釆一切善惡音響如是六門晝夜常放光明亦名放光三昧汝自不識取影在四大身中內外扶持不教傾側如人負重擔從獨木橋上過亦不教失腳且道是甚麼物任持便得如是且無絲髮可見豈不見志公和尚云內外追尋覓總無境上施為渾大有珍重師室中每問僧有句無句如藤倚樹子意何如羅山道間禪師在禾山因清貴上座説話次貴云天下無第一人大小溈山猶輸他道吾間云有甚麼語輸他貴舉石霜辭溈山才禮拜起溈山問有句無句如藤倚樹子意如何霜無對却到道吾吾問甚處來霜云溈山來吾云有甚麼言句霜遂舉前話吾云汝何不道取霜云祇為道不得吾云汝為我看菴待我與你報讐去吾往溈山山泥壁次忽回首見道吾在背後山便云智頭陀因何到在此吾云某甲不為別事來祇為和尚問諸道者有句無句如藤倚樹還是也無溈云是吾便問樹倒藤枯時如何溈山呵呵大笑被道吾捺向泥裏溈山總不管貴上座舉了云這個豈不是溈山輸與他道吾羅山云上座三十年後若有把茅蓋頭切忌舉著這個話貴不肯却與道吾作主被羅山擒下地云白大衆各請停喧某甲今日與清貴上座直為溈山雪屈話且須側聆貴云知也知也便禮拜羅山云何不早道你還識道吾麼只是館驛裏本色撮馬糞漢問此陰已謝彼陰未生時如何師曰此陰未謝那個是大德曰不會師曰若會此陰便明彼陰問黃巢軍來和尚向甚麼處回避師曰五蘊山中曰忽被他捉著時如何師曰惱亂將軍福州古靈神贊禪師本州大中寺受業後行腳遇百丈開悟却回受業本師問曰汝離吾在外得何事業曰並無事業遂遣執役一日因澡身命師去垢師乃拊背曰好所佛堂而佛不聖本師回首視之師曰佛雖不聖且能放光本師又一日在窗下看經蜂子投窗紙求出師覩之曰世界如許廣闊不肻出鑽他故紙驢年去遂有偈曰空門不肻出投窗也太癡百年鑽故紙何日出頭時本師置經問曰汝行腳遇何人吾前後見汝發言異常師曰某甲蒙百丈和尚指個歇處今欲報慈德耳本師於是告衆致齋請師説法師乃登座舉唱百丈門風曰靈光獨耀迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛本師於言下感悟曰何期垂老得聞極則事師後住古靈聚徒數載臨遷化剃浴聲鐘告衆曰汝等諸人還識無聲三昧否衆曰不識師曰汝等靜聽莫別思惟衆皆側聆師儼然順寂塔存本山大慈寰中禪師上堂山僧不解答話祇能識病時有僧出師便歸方丈法眼云衆中喚作病在目前不識玄覺云且道大慈識病不識病此僧出來是病不是病若言是病每日行住不可總是病若言不是病出來又作麼生雪竇拈云大凡扶竪宗乘須辨個得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便棒諸方識病不答話有僧出必然別有長處敢有一個動著大唐天子只三人虗堂愚頌輕如毫末重如山地角天涯去復還黃葉隕時風骨露水邊依舊石斕斑趙州問般若以何為體師曰般若以何為體州大笑而出明日州掃地次師曰般若以何為體州置帚拊掌大笑師便歸方丈僧辭師問甚麼處去曰江西去師曰我勞汝一段事得否曰和尚有甚麼事師曰將取老僧去得麼曰更有過於和尚者亦不能將去師便休僧後舉似洞山山曰闍黎爭合恁麼道曰和尚作麼生山曰得法眼別云和尚若去某甲提笠子天童云大慈合伴不著這僧不如獨行也須是恁麼始得直饒大慈古佛也不奈這擔板漢何且道別有甚麼長處山又問其僧大慈別有甚麼言句曰有時示衆曰説得一丈不如行取一尺説得一尺不如行取一寸山曰我不恁麼道曰和尚作麼生山曰説取行不得底行取説不得底雲居云行時無説路説時無行路不説不行時合行甚麼路洛浦云行説俱到即本分事無行説俱不到即本分事在天台平田普岸禪師訪茂源和尚源才起迎師近前把住云開口即失閉口即喪去此二途請師別道源以手掩鼻師放開云一步較易兩步較難源云著甚死急師云若非是師不免諸方點檢僧參師打一拄杖其僧近前把住拄杖師曰老僧適來造次僧却打師一拄杖師曰作家作家僧禮拜師把住曰是闍黎造次僧大笑師曰這個師僧今日大敗也臨濟訪師到路口先逢一嫂在田使牛濟問嫂平田路向甚麼處去嫂打牛一棒曰這畜生到處走到此路也不識濟又曰我問你平田路向甚麼處去嫂曰這畜生五歲尚使不得濟心語曰欲觀前人先觀所使便有抽釘拔楔之意及見師師問你還曾見我嫂也未濟曰已收下了也師遂問近離甚處濟曰江西黃檗師曰情知你見作家來濟曰特來禮拜和尚師曰已相見了也濟曰賓主之禮合施三拜師曰既是賓主之禮禮拜著瑞州五峰常觀禪師因僧辭師曰汝諸方去莫謗老僧在這裏曰某甲不道和尚在這裏師曰汝道老僧在甚麼處僧竪起一指師曰早是謗老僧也潭州石霜山性空禪師僧問如何是祖師西來意師云如人在千尺井中不假寸繩出得此人即答汝西來意僧曰近日湖南暢和尚出世亦為人東語西話師喚沙彌拽出這死尸著沙彌即仰山山後問耽源如何出得井中人源曰咄癡漢誰在井中山復問溈山溈召慧寂山應諾溈曰出也仰山住後常舉前語謂衆曰我在耽源處得名溈山處得地廣州和安寺通禪師禮佛次禪者問座主禮底是甚麼師曰是佛禪者乃指像曰這個是何物師無對至夜具威儀禮問今日所問某甲未知意旨如何禪者曰座主幾夏耶師曰十夏禪者曰還曾出家也未師轉茫然禪者曰若也不會百夏奚為乃命同參馬祖及至江西祖已圓寂遂謁百丈頓釋疑情師住後一日召仰山將牀子來山將到師曰却送本處著山從之師召慧寂山應諾師曰牀子那邊是甚麼物山曰枕子師曰枕子這邊是甚麼物山曰無物師復召慧寂山應諾師曰是甚麼山無對師曰去通禪中毒旁及仰山洪州東山慧禪師同大于南用到茶堂有僧近前不審用曰我既不納汝汝亦不見我不審阿誰僧無語師曰不得平白地恁麼問伊用曰大于亦無語那于把定其僧曰是你恁麼纍我亦然便打一摑用大笑曰朗月與青天大于侍者到師問金剛正定一切皆然秋去冬來且作麼生者曰不妨和尚借問師曰即今即得去後作麼生者曰誰敢問著某甲師曰大于還得麼者曰猶要別人點檢在師曰輔弼宗師不廢光彩侍者禮拜百丈山涅槃和尚一日謂衆曰汝等與我開田我與汝説大義衆開田了歸請説大義師乃展兩手衆罔措趙州觀音院真際從諗禪師曹州郝鄉人也姓郝氏童稚於本州扈通院披剃未納戒便抵池陽參南泉值泉偃息而問曰近離甚處師曰瑞像泉曰還見瑞像麼師曰不見瑞像祇見臥如來泉便起坐問汝是有主沙彌無主沙彌師曰有主沙彌泉曰那個是你主師近前躬身曰仲冬嚴寒伏惟和尚尊候萬福泉器之許其入室他日問泉曰如何是道泉曰平常心是道師曰還可趣向也無泉曰擬向即乖師曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非耶師於言下悟理乃往嵩嶽琉璃壇納戒仍返南泉一日問泉曰知有底人向甚麼處去泉曰山前檀越家作一頭水牯牛去師曰謝師指示泉曰昨夜三更月到窗雲峰悅云若不是南泉洎被打破蔡州師在井樓上打水次見南泉過便抱柱懸却腳曰相救相救南泉上胡梯曰一二三四五師少頃却去禮謝曰適來謝相救師在南泉時泉牽一頭水牯牛入僧堂內巡堂而轉首座乃向牛背上三拍泉便休去師却將一束草安首座面前首座無對南泉上堂師出問明頭合暗頭合泉便下座歸方丈師曰這老和尚被我一問直得無言可對首座曰莫道和尚無言好自是上座不會師便打一掌曰此掌合是堂頭老漢喫師到茱萸執拄杖於法堂上從東過西萸曰作甚麼師曰探水萸曰我這裏一滴也無探個甚麼師以杖倚壁便下琅琊覺云勢去奴欺主時衰鬼弄人大慧杲云鉤在不疑之地到道吾才入堂吾曰南泉一隻箭來也師曰看箭吾曰過也師曰中或作茱萸上堂曰看箭師亦曰看箭云云雪竇云二俱作家蓋是茱萸趙州二俱不作家箭鋒不相拄直饒齊發齊中也只是個射垛漢到黃檗檗見來便閉方丈門師乃把火於法堂內呌曰救火救火檗開門捉住曰道道師曰賊過後張弓雪竇顯云直是好笑笑須三十年忽有個衲僧問雪竇笑個甚麼笑賊過後張弓師行腳見二菴主一人作丫角童師問訊二人殊不顧來日早晨丫角童將一鐺飯來放地上分作三分菴主將席子近前坐丫角童亦將席近前相對坐亦不喚師師乃亦將席子近前坐丫角童目顧於師菴主云莫言侵早起更有夜行人師云何不教詔這行者菴主云他是人家男女師云洎合放過丫角童便起顧視菴主云多口作麼丫角童從此入山不見師到投子處對坐齋投子將蒸餅與師喫師曰不喫不久下胡餅投子教沙彌度與師師接餅却禮沙彌三拜師到雲居居云老老大大何不覓個住處去師云作麼生是某甲住處居云山前有個古寺基師云和尚自住取又到茱萸萸云老老大大何不筧個住處師云甚麼處是某甲住處萸云老老大大住處也不知師云三十年弄馬騎今日却被驢子撲師到一菴主處問有麼有麼主竪起拳頭師曰水淺不是泊船處便行又到一菴主處問有麼有麼主亦竪起拳頭師曰能縱能奪能殺能活便作禮瞎堂遠頌云換手捶胸哭老爺棺材未出死尸斜不如掘地深埋却管取來年喫嫩茄圜悟勤云佛祖命脈列聖鉗錘換斗移星經天緯地有般漢未出窠窟只管道舌頭在趙州口裏殊不知自己性命已屬他人若能握向上綱宗與二菴主相見便可以定龍蛇別緇素正好著力還知趙州落處麼切忌顢頇薑山愛云趙州只見錐頭利不見鑿頭方雲居舜云趙州當時甚生意氣要且鼻孔在二菴主手裏僧問師學人乍入叢林乞師指示師云喫粥了也未云喫粥了也師云洗鉢盂去其僧因此大悟雲門云且道有指示無指示若言有趙州向伊道個甚麼若言無這僧為甚悟去雲峰悅云雲門不識好惡恁麼説話大似為蛇畫足雲峰則不然這僧恁地悟去入地獄如箭射妙喜曰雲門老漢大似阿修羅王托動三有大城諸煩惱海隨後喝云寐語作甚麼復云雲峰雖善背手抽金鏃翻身控角弓爭奈蹉過雲門何又云趙州與這僧若不得雲門一生受屈而今諸方有一種瞎漢往往盡作洗鉢盂話會了雪竇顯云我不似雲門為蛇畫足直言向你道問者如蟲禦木答者偶爾成文雖然與麼瞎却衲僧眼作麼生免得此過諸仁者要會麼還爾趙州喫粥也未拈却這僧喫粥了也雪竇與你拄杖子歸堂湛堂準頌云之乎者也衲僧鼻孔大頭向下禪人若也不會問取東村王大姐師示衆云此事的的沒量大人出這裏不得老僧到溈山見僧問如何是祖師西來意山云與我過牀子來若是宗師須以本分事接人始得時有僧問如何是祖師西來意師曰庭前柏樹子曰和尚莫將境示人師曰我不將境示人曰如何是祖師西來意師曰庭前柏樹子後法眼問光孝覺曰近離甚處曰趙州眼曰承聞趙州有柏樹子話是否曰無眼曰往來皆謂趙州有此語上座何得道無曰先師實無此語和尚莫謗先師好徑山杲云若道有此語蹉過覺鐵嘴若道無此語又蹉過法眼若道兩邊都不涉又蹉過趙州直饒總不恁麼別有透脫一路入地獄如箭射畢竟如何舉起拂子云還見古人麼喝一喝五祖演云如何是祖師西來意庭前柏樹子恁麼會便不是了也如何是祖師西來意庭前柏樹子恁麼會方始是徑山杲云要識五祖師翁麼腦後見腮莫與往來雲居祐舉柏樹子話云奇哉古聖垂一言半句可謂截斷聖凡門戶直示彌勒眼睛今昔無墜衆中異解多塗商量非一埋沒宗旨錯判名言或謂青青翠竹盡是真如鬱鬱黃花無非般若或謂山河草木物物皆是真心顯現何獨庭前柏樹子乎塵毛瓦礫都是一法界中重重無盡理事圓融或謂庭前柏樹子才舉便直下薦取覿體全真擬議之間早落塵境須是當人作用臨機相見或棒或喝或擎起拳頭衣袖一拂這個眼目如石火電光相似或謂庭前柏樹子更有甚麼事趙州直下為人實頭説話飢來喫飯困即打眠動展施為盡是自家受用如斯見解如麻似粟皆是天魔種族外道邪宗但取識情分別用心取捨強作知見何不遊方遍歷求善知識決擇身心略似個衲僧古來自有宗門師範我佛心宗釋梵諸天拱手敬信三賢十聖罔測其由乃舉拂子云若向這裏悟去山河大地與汝同參復顧左右云道林爭敢壓良為賤佛日才頌趙州庭柏説與禪客黑漆屏風松欏亮槅葉縣省和尚因僧請益柏樹子話省曰我不辭與汝説還信麼曰和尚重言爭敢不信省曰汝還聞簷頭雨滴聲麼其僧豁然不覺失聲云㖿省曰汝見個甚麼道理僧以頌對云簷頭雨滴分明歷歷打破乾坤當下心息真如院方禪師參琅琊惟看柏樹子話每入室陳其所見不容措辭嘗被喝出忽一日大悟直入方丈曰我會也琅琊曰汝作麼生會方曰夜來牀薦暖一覺到天明琅琊可之雪竇顯在大陽時有客舉光孝覺語問曰覺趙州侍者眼問柏樹因緣乃言無此語而眼肯之其旨安在哉顯曰宗門抑揚寧有軌轍乎時有苦行名韓大伯侍其旁輒匿笑去顯詰其笑故韓曰笑知客智眼未正擇法不明顯曰豈有説乎韓對以偈曰一兔橫身當古路蒼鷹才見便生擒後來獵犬無靈性空向枯樁舊處尋顯陰異之因結以為友後顯得法於智門唱導於雪竇稱雲門中興嘗經行植杖衆衲環之顯問有問雲門樹凋葉落時如何門曰體露金風雲門答這僧耶為解説耶有稱宗上座者曰待老漢有悟處即説顯驚視之曰非韓大伯乎曰老漢瞥地也顯因集衆乞升座説法焉師一日於雪中倒臥曰相救相救有僧便去身邊臥師便起去翠巖芝云此僧在趙州圈䙡裏有人出得麼師問新到曾到此間麼曰曾到師曰喫茶去又問僧僧曰不曾到師曰喫茶去後院主問曰為甚麼曾到也云喫茶去不曾到也云喫茶去師召院主主應諾師曰喫茶去僧到睦州州問曾到趙州麼僧云曾到州云有何言句僧舉喫茶話州云慚愧却問趙州意作麼生僧云只是一期方便州云苦哉趙州被爾將一杓屎潑便打州却問沙彌爾作麼生沙彌便禮拜州亦打僧問沙彌適來和尚打爾意作麼生彌云若不是我和尚不打某甲雪竇舉云這僧克由叵耐將一杓屎潑他二員古佛諸上座若能辨得非惟趙睦二州雪屈亦乃翠巖與天下老宿無過若辨不得到處潑人卒未了在問狗子還有佛性也無師曰無曰上至諸佛下至螻蟻皆有佛性狗子為甚麼却無師曰為伊有業識在又僧問狗子還有佛性也無師曰有曰既有為甚麼入這皮袋裏來師曰知而故犯妙喜恆舉此則語至無字令學者參云佛語祖語諸方老宿語千差萬別若透得個無字一時透過不用博量不用注解不用要得分曉又云不得作有無商量不得作真無之無卜度不用向開口處承當不用向舉起處作道理不用墮在空寂處不用將心等悟不用向宗師説處領略不用掉在無事甲裏但行住坐臥時時提撕狗子還有佛性也無無提撕得熟口議心思不及方寸裏七上八下如生鐵橛沒滋味時切莫退志得如此時却是個好底消息忽然打失布袋不覺拊掌大笑矣又云茶裏飯裏喜時怒時淨處穢處妻兒聚頭處與賓客相酬酢處辦公家職事處了私門婚嫁處都是第一等做工夫提撕舉覺底時節又云既有個趨向狗子無佛性話冷地裏慢提撕則個若道知是般事便休我説此人智眼未明在妙喜雖似平地起風雷然亦不出雪峰道底師因侍者報大王來也師云萬福大王者云未到在師云又道來也黃龍南云頭頭漏泄罕遇仙陀侍者只解報客不知身在帝鄉趙州入草求人不覺渾身泥水秀才問佛不違衆生所願是否師曰是曰某甲欲覓和尚手中拄杖得否師曰君子不奪人所好曰某甲不是君子師曰我亦不是佛僧問如何是道師曰牆外底曰不問這個道師曰你問那個道曰大道師曰大道透長安問如何是佛師曰殿裏底曰殿裏者豈不是泥龕塑像師曰是曰如何是佛師曰殿裏底問和尚姓甚麼曰常州有問甲子多少曰蘇州有問如何是趙州曰東門西門南門北門問如何是祖師意師敲牀腳曰祇這莫便是否師曰是即脫取去問如何是毗盧圓相師曰老僧自幼不曾眼花曰豈不為人師曰願汝常見毗盧圓相官人問和尚還入地獄否師曰老僧末上入曰大善知識為甚麼入地獄師曰我若不入阿誰教化汝問久嚮趙州石橋到來祇見略彴師曰汝祇見略彴且不見石橋曰如何是石橋師曰度驢度馬曰如何是略彴師曰個個