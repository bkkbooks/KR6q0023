七斤雪竇頌編辟曾挨老古錐七斤衫重幾人知而今拋向西湖裏下載清風付與誰僧寫師真呈師曰且道似我不似我若似我即打殺老僧不似我即燒却真僧無對玄覺云留取供養師托起鉢曰三十年後若見老僧留取供養若不見即撲破別僧曰三十年後敢道見和尚師乃撲破師問僧曾看法華經麼曰曾看曰衲衣在空間假名阿練若誑惑世間人爾作麼會僧擬禮拜師曰爾披衲衣來麼曰披來師曰莫惑我曰作麼得不惑去師曰莫取我語雪竇舉云大小趙州龍頭蛇尾諸人若能辨得便乃識破趙州如或不明個個高擁衲衣莫惑翠峰好問初生孩子還具六識也無師曰急水上打毬子僧却問投子急水上打毬子意旨如何子曰念念不停留掃地次僧問和尚是大善知識為甚麼掃地師曰塵從外來曰既是清淨伽藍為甚麼有塵師曰又一點也問恁麼來底師還接否曰接曰不恁麼來底師還接否曰接曰恁麼來者從師接不恁麼來者如何接師曰止止不須説我法妙難思有一婆子令人送錢請轉藏經師受施利了却下禪牀轉一匝乃曰傳語婆轉藏經已竟其人回舉似婆婆曰比來請轉全藏如何祇為轉半藏徑山杲云衆中商量道如何是那半藏或云再繞一匝或彈指一下或咳嗽一聲或喝一喝或拍一拍恁麼見解只是不識羞若是那半藏莫道趙州更繞一匝直饒百千萬億匝於婆子分上只得半藏設使更繞須彌山百千萬億匝於婆子分上亦只得半藏假饒天下老和尚共如是繞百千萬億匝於婆子分上也只得半藏設使山河大地森羅萬象若草若木各具廣長舌相異口同音從今日轉到盡未來際於婆子分上亦只得半藏諸人要識婆子麼良久云鴛鴦繡出從君看不把金針度與人問承聞和尚親見南泉是否師云鎮州出大蘿蔔頭圜悟勤云有者道鎮州從來出大蘿蔔頭天下皆知趙州從來參見南泉天下皆知這僧更問所以道鎮州出大蘿蔔且得沒交涉江西澄散聖判謂之東問西答喚作不答話不上他圈䙡若恁麼會爭得遠録公云此是旁瞥語收在九帶中若恁麼會夢也未夢見在更帶纍趙州去官人問丹霞燒木佛院主為甚麼眉鬚墮落師云官人宅內變生作熟是甚麼人云所使師云却是他好手馬大夫問和尚還修行也無師云老僧若修行即禍事云和尚既不修行教甚麼人修行師云大夫是修行底人云某甲何名修行師曰若不修行爭得撲在人王位中餧得來赤凍紅地無有解出期大夫乃下淚拜謝問作何方便即得聞於未聞師云未聞且置你曾聞個甚麼來問不離言句如何得獨脫師云離言句是獨脫云適來無人教某甲來師云因甚麼到此云和尚何不揀出師云我早個揀了也師問僧甚處來曰江西來師曰趙州著在甚麼處僧無對問不見邊表時如何師指淨瓶云這個喚作甚麼云淨瓶師曰大好不見邊表有僧問生死二路是同是別師以頌答云道人問生死生死若為論雙林一池水朗月耀乾坤喚他句上識此是弄精魂欲會個生死顛人説夢春洞山問僧甚處來曰掌鞋來山曰自解依他曰依他山曰他還指闍黎也無僧無對師代云若允即不違保壽問胡釘鉸汝莫是胡釘鉸麼曰不敢壽曰還釘得虗空麼曰請和尚打破虗空來壽便打胡曰和尚莫錯打某甲師曰向後有多口阿師與你點破在胡後到師處舉前話師曰汝因甚麼被他打胡曰不知過在甚麼處師曰祇這一縫尚不奈何胡於此有省師曰且釘這一縫雪竇顯舉云我要打這三個漢一打趙州不合瞎却胡釘鉸眼二打保壽不能塞却趙州口三打胡釘鉸不合放過保壽驀拈拄杖云更有一個大衆一時退擊禪牀一下師問新到離甚麼處云雪峰師云雪峰有甚麼言句云雪峰尋常道盡十方世界都來是沙門一隻眼你等諸人向甚麼處屙師云闍黎若回寄個鍬子去師問僧甚處來曰摘茶來師曰間雲蓋智頌道著不著何處摸索背後龍鱗面前驢腳反身筋斗孤雲野鶴阿呵呵新到參師曰甚處來曰南方來師曰佛法盡在南方汝來這裏作甚麼曰佛法豈有南北耶師曰饒汝從雲居雪峰來祇是個擔板漢崇壽稠云和尚是據客置主人師聞沙彌喝參向侍者曰教伊去者乃教去沙彌便珍重師曰沙彌得入門侍者在門外師問一婆子甚麼處去曰偷趙州筍去師曰忽遇趙州又作麼生婆與一掌師休去瞎堂遠頌云去若丘山重來如一羽輕去來無別路傾蓋白頭新師因有老宿問近離甚處師云滑州宿云幾程到這裏師云一躂到宿云好個捷疾鬼師云萬福大王宿云參堂去師應喏喏師一日到僧堂後逢一僧乃問大德總向甚處去僧云普請去師遂於袖中取刀度與云老僧住持事繁請上座為我折倒却便引頸向前其僧便走僧辭師曰甚處去曰諸方學佛法去師竪起拂子曰有佛處不得住無佛處急走過三千里外逢人不得錯舉曰與麼則不去也師曰摘楊花摘楊花徑山杲頌云有佛處不得住生鐵稱錘被蟲蛀無佛處急走過撞著嵩山破竈墮三千里外莫錯舉兩個石人相耳語恁麼則不去也此話已行遍天下摘楊花摘楊花唵嚤呢噠哩吽𠷑吒尼問如何是密密意師以手掐之尼曰和尚猶有這個在師曰却是你有這個在問十二時中如何用心師曰汝被十二時辰使老僧使得十二時乃曰兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行腳時除却二時粥飯是雜用心處除外更無別用心處若不如是大遠在又謂衆曰你若一生不離叢林不語五年十載無人喚你作啞漢已後佛也不奈你何你若不信截取老僧頭去上堂金佛不度罏木佛不度火泥佛不度水真佛內裏坐菩提涅槃真如佛性盡是貼體衣服亦名煩惱實際理地甚麼處著一心不生萬法無咎汝但究理坐看三二十年若不會截取老僧頭去夢幻空華徒勞把捉心若不異萬法一如既不從外得更拘執作麼如羊相似亂拾物安向口裏老僧見藥山和尚道有人問著但教合取狗口老僧亦教合取狗口取我是垢不取我是淨一似獵狗專欲得物喫佛法在甚麼處千人萬人盡是覓佛漢子於中覓一個道人無若與空王為弟子莫教心病最難醫未有世界早有此性世界壞時此性不壞一從見老僧後更不是別人祇是個主人公這個更向外覓作麼正恁麼時莫轉頭換腦若轉頭換腦即失却也僧問承師有言世界壞時此性不壞如何是此性師曰四大五陰曰此猶是壞底如何是此性師曰四大五陰法眼云是一個兩個是壞不壞且作麼生會試斷看妙喜曰軍營裏大王雪竇頌泥佛不度水神光照天地立雪如未休何人不雕偽金佛不度罏人來訪子湖牌中數個字清風何處無木佛不度火常思破竈墮杖子忽擊著方知孤負我示衆云兄弟若從南方來者即與下載若從北方來者即與裝載所以道近上人問道即失道近下人問道即得道兄弟正人説邪法邪法亦隨正邪人説正法正法亦隨邪諸方難見易識我這裏易見難識又云此事如明珠在掌胡來胡現漢來漢現老僧拈一枝草作丈六金身用將丈六金身作一枝草用佛即是煩惱煩惱即是佛又僧問未審佛是誰家煩惱師曰與一切人煩惱曰如何免得師曰用免作麼又云老僧此間即以本分事接人若教老僧隨伊根機接人自有三乘十二分教接他了也若是不會是誰過歟已後遇著作家漢也道老僧不孤負他但有人問以本分事接人師自受南泉印可乃歸曹州省受業師親屬聞師歸咸欲來會師聞曰俗塵愛網無有了期已辭出家不願再見遂携瓶錫遍歷諸方常謂七歲兒童勝我者我即問伊百歲老翁不及我者我即教他及往趙州觀音院燕趙二王同至院見師師端坐不起燕王問曰人王尊耶法王尊耶師曰若在人王人王中尊若在法王法王中尊二王聞之歡然敬服乃同供養師志效古人住持枯稿僧堂無前後架旋營齋食繩牀一角折以繩繫殘薪支之屢有願為製新者師不許也住持四十餘年未嘗以一書告檀越唐乾寧四年十一月二日右脅泊然而寂壽一百二十歲諡真際大師湖南長沙景岑招賢禪師上堂我若一向舉揚宗教法堂前須草深一丈事不獲已向汝諸人道盡十方世界是沙門眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我常向汝諸人道三世諸佛法界衆生是摩訶般若光光未發時汝等諸人向甚麼處委悉光未發時尚無佛無衆生消息何處得山河國土來時有僧問如何是沙門眼師曰長長出不得又曰成佛成祖出不得六道輪回出不得僧曰未審出個甚麼不得師曰晝見日夜見星曰學人不會師曰妙高山色青又青妙喜曰熟處難忘師與仰山玩月次山曰人人盡有這個祇是用不得師曰恰是倩汝用山曰你作麼生用師劈胸與一踏山曰㘞直下似個大蟲自此諸方稱為岑大蟲長慶云前彼此作家後彼此不作家乃別云邪法難扶遊山歸首座問和尚甚處去來師曰遊山來座曰到甚麼處師曰始從芳草去又逐落花回座曰大似春意師曰也勝秋露滴芙蕖雪竇著語云謝答話復頌云大地絶纖埃何人眼不開始隨芳草去又逐落花回羸鶴翹寒木狂猿嘯古臺長沙無限意咄有秀才看千佛名經問曰百千諸佛但見其名未審居何國土還化物也無曰黃鶴樓崔皓題後秀才還曾題也未曰未曾曰得間題取一篇好黃龍新頌云黃鶴樓前法戰時百千諸佛豎降旗問渠國土歸何處贏得多才一首詩問本來人還成佛也無師曰汝見大唐天子還自種田割稻麼曰未審是何人成佛師曰是汝成佛僧無語師曰會麼曰不會師曰如人因地而倒依地而起地道甚麼問向上一路請師道師曰一口針三尺線曰如何領會師曰益州布揚州絹僧問師同參會和尚曰和尚見南泉後如何會默然僧曰和尚未見南泉已前作麼生會曰不可更別有也僧回舉似師師示偈曰百尺竿頭不動人雖然得入未為真百尺竿頭須進步十方世界是全身僧便問祇如百尺竿頭如何進步師曰朗州山澧州水曰不會師曰四海五湖皇化裏妙喜曰要見長沙更進一步若有人問如何是遮一步待我欵欵地與你葛藤竺尚書問蚯蚓斬為兩段兩頭俱動未審佛性在阿那頭師曰莫妄想曰爭奈動何師曰會即風火未散書無對師喚尚書書應諾師曰不是尚書本命曰不可雕却即今祇對別有第二主人師曰喚尚書作至尊得麼曰恁麼總不祇對時莫是弟子主人否師曰非但祇對與不祇對時無始劫來是個生死根本示偈曰學道之人不識真祇為從來認識神無始劫來生死本癡人喚作本來人燈録作兩則風火未散上作一則師喚尚書下又作一則語亦小異此從宗門統要正法眼藏妙喜曰即今祇對者既不是本來人却喚甚麼作本來人良久曰我恁麼道且作死馬醫又皓月供奉問師蚯蚓斷為兩段兩頭俱動未審佛性在阿那頭師曰動與不動是何境界曰言不干典非智者之所談祇如和尚言動典不動是何境界出自何經師曰灼然言不干典非智者之所談大德豈不見首楞嚴云當知十方無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅復示偈曰最甚深最甚深法界人身便是心迷者迷心為衆色悟時剎境是真心身界二塵無實相分明達此是知音問如何轉得山河國土歸自己去師曰如何轉得自己成山河國土去曰不會師曰湖南城下好養民米賤柴多足四鄰僧無語師示偈曰誰問山河轉山河轉向誰圓通無兩畔法性本無歸問南泉道三世諸佛不知有狸奴白牯却知有為甚麼三世諸佛不知有師曰未入鹿苑時猶較些子曰狸奴白牯為甚麼却知有師曰汝爭怪得伊問和尚繼嗣何人師曰我無人得繼嗣曰還參學也無師曰我自參學曰師意何如師示偈曰虗空問萬象萬象答虗空誰人親得聞木義丱角童示衆若心是生則夢幻空華亦應是生若身是生則山河大地萬象森羅亦應是生問教中説幻意是有耶師曰大德是何言歟曰恁麼則幻意是無邪師曰大德是何言歟曰恁麼則幻意是不有不無邪師曰大德是何言歟曰如某三明盡不契於幻意未番和尚如何明教中幻意師曰大德信一切法不思議否曰佛之誠言那敢不信師曰大德言信二信之中是何信曰如某所明二信之中是名緣信師曰依何教門得生緣信曰華嚴云菩薩摩訶薩以無障無礙智慧信一切世間境界是如來境界又華嚴云諸佛世尊悉知世法及諸佛法性無差別決定無二又華嚴云佛法世間法若見其真實一切無差別師曰大德所舉緣信教門甚有來處聽老僧與大德明教中幻意若人見幻本來真是則名為見佛人圓通法法無生滅無滅無生是佛身華嚴座主問虗空為是定有為是定無師曰言有亦得言無亦得虗空有時但有假有虗空無時但無假無曰如和尚所説有何教文師曰大德豈不聞首楞嚴云十方虗空生汝心內猶如片雲點太清裏豈不是虗空生時但生假名又云汝等一人發真歸元十方虗空悉皆銷殞豈不是虗空滅時但滅假名老僧所以道有是假有無是假無問如何是文殊師曰墻壁瓦礫是曰如何是觀音師曰音聲語言是曰如何是普賢師曰衆生心是曰如何是佛師曰衆生色身是曰河沙諸佛體皆同何故有種種名字師曰從眼根返源名文殊耳根返源名觀音從心返源名普賢文殊是佛妙觀察智觀音是佛無緣大慈普賢是佛無為妙行三聖是佛之妙用佛是三聖之真體用則有河沙假名體則總名一薄伽梵問南泉遷化向甚麼處去師曰東家作驢西家作馬曰學人不會此意如何師曰要騎即騎要下即下三聖令秀上座問曰南泉遷化向甚麼處去師曰石頭作沙彌時參見六祖秀曰不問石頭見六祖南泉遷化向甚麼處去師曰教伊尋思去秀曰和尚雖有千尺寒松且無抽條石筍師默然秀曰謝和尚答話師亦默然秀回舉似三聖聖曰若恁麼猶勝臨濟七步然雖如此待我更驗看至明日三聖上問承聞和尚昨日答南泉遷化一則語可謂光前絶後今古罕聞師亦默然問亡僧遷化甚麼處去也師示偈曰不識金剛體却喚作緣生十方真寂滅誰在復誰行林間録曰長沙岑禪師因僧亡以手摩之曰大衆此僧却真實為諸人提綱商量會麼乃有偈曰目前無一法當處亦無人蕩蕩金剛體非妄亦非真又曰雪峯和尚亦因見亡僧作偈曰低頭不見地仰面不見天欲識金剛體但看髑髏前玄沙曰亡僧面前正是觸目菩提萬里神光頂後相有僧問法眼如何是亡僧面前觸目菩提法眼答曰是汝面前又問遷化向甚麼處去答曰亡僧幾曾遷化進曰爭奈即今何答曰汝不識亡僧天衣懷云亡僧面前即且置只如活人背後底是甚麼近代尊宿不復以此旨曉人獨晦堂老師時一提起作南禪師圓寂日偈曰去年三月十有七一夜春風撼籌室三角麒麟入海中空餘片月波心出真不掩偽曲不藏直誰人為和雪中吟萬古知音是今日又云昔人去時是今日今日依前人不來今既不來昔不往白雲流水空悠哉誰云稱尺平直中還有曲誰云物理齊種麻還得粟可憐馳逐天下人六六元來三十六皓月供奉問天下善知識證三德涅槃也未師曰大德問果上涅槃因中涅槃曰問果上涅槃師曰天下善知識未證曰為甚麼未證師曰功未齊於諸聖曰功未齊於諸聖何為善知識師曰明見佛性亦得名為善知識曰未審功齊何道名證大涅槃師示偈曰摩訶般若照解脫甚深法法身寂滅體三一理圓常欲識功齊處此名常寂光曰果上三德涅槃已蒙開示如何是因中涅槃師曰大德是進山主問修山主曰明知生是不生之理為甚麼為生死之所流轉修曰筍畢竟成竹去如今作篾使還得麼進曰汝向後自悟去在修曰某所見祇如此上座意旨又如何進指曰這個是監院房那個是典座房修即禮謝初師久依南泉有投機偈曰今日還鄉入大門南泉親道遍乾坤法法分明皆祖父回頭慙愧好兒孫泉答曰今日投機事莫論南泉不道遍乾坤還鄉盡是兒孫事祖父從來不出門鄂州茱萸山和尚上堂擎起一橛竹曰還有一虗空裏釘得橛麼時有靈虗上座出衆曰虗空是橛師便打虗曰莫錯打師便下座雲門偃云矢上加尖有僧云和尚適來與麼道那門云捶鐘謝響得個蝦蟇出來衢州子湖巖利蹤禪師於門下立牌曰子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命臨濟會下二僧來參方揭簾師喝曰看狗僧回顧師便歸方丈或有人問子湖狗師曰嘷嘷僧無語師便歸方丈劉鐵磨參師曰汝是劉鐵磨否曰不敢師曰左轉右轉曰和尚莫顛倒師便打與勝光和尚鉏園次師驀按钁回視光曰事即不無擬心即差光便問如何是事被師攔胸踏倒光從此有省僧問自古上賢還達真正理否師曰達僧曰真正理作麼生達師曰霍光當時賣假銀城與單于契書是甚麼人作僧無語示衆諸法蕩蕩何絆何拘汝等於中自生難易心源一統綿亘十方上上根人自然明白不見南泉道如斯癡鈍世且還稀歷歷分明有無不是只少個丈夫之志致見如斯疲勞汝欲得易會麼自古及今未曾有一個凡夫聖人出現汝前亦無有一善語惡語到汝分上為甚麼故為善善無形為惡惡無相既已無我把甚麼為善惡立那個是凡聖汝信否還保任否有甚麼回避處恰似日中逃影相似還逃得麼今之既爾古之亦然今古齊時汝還諱得麼佛法玄妙了得者自相䇿發無為小緣妨於大事汝不見道寧可終身立法誰能一旦忘緣仁者要得會禪麼各歸衣鉢下看示衆幸自可憐生苦死向人前討些子聲色唇吻作麼我且問你聲色兩字作麼生討得還會麼我道聲色如泡為復為你説破為復為你討聲色試商量看莫生容易志剛用心若了根源終非他物譬如圓鏡男來男現女來女彰乃至僧俗青黃山河萬物隨其色相一鏡傳輝不可是鏡有多般但能映物而露仁者還識得鏡未若不識鏡盡被男女青黃山河類等礙汝光明有甚麼出氣處若識鏡去乃至青黃男女大地山河有想無想四足多足胎卵情生天堂地獄咸於一鏡中悉得其分劑長短劫數若色若空並能了之更非他物汝豈不聞諸法如義光陰箭速莫漫悠悠大事因緣決須了取僧問如何是大圓鏡師云一切物著不得進云為甚麼一切物著不得師云汝是一切物還著得汝否仁者本自具足本自周備直教無纖塵法礙你眼光始得若有微塵底不盡不是一生半劫賺汝皮囊汝性命根境法中造諸妖怪山精鬼魅附汝行持得少為足鼓弄片皮於佛法却為毒害譏禮塔廟毀彼持經師子身中蟲自食師子身中肉仁者豈不見目前太虗還有纖毫欠少處麼若也於中體得這個消息不妨出得凡聖境界了得世間出世間之智一法既爾萬法亦然仁者還樂也無示衆天上人間輪回六道乃至蠢動含靈未曾於此一分真如中有些子相違處還信麼還領受得麼大凡行腳也須具大信根作個丈夫始得何處得與麼難信他古人只見道個即心是佛即心是法便承信去隨處茅茨石室長養聖胎只待道果成熟汝今何不效他行取仁者可煞分明並無參雜治生産業與諸實相不相違背初子湖山下有陶家無子夫婦日夕焚禱師一日過而問曰爾何所祈陶告之故師曰汝施我竹我施汝子陶遂施竹其夕感異夢隨舉一男衆因號師神力禪師廣明中無疾歸寂塔於本山荊南白馬曇照禪師常曰快活快活及臨終時呌苦苦又曰閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子曰汝道當時是如今是院主無對法眼代云此時但掩耳出去終南山雲際師祖禪師初參南泉問摩尼珠人不識如來藏裏親收得如何是藏泉曰與汝往來者是師曰不往來者如何泉曰亦是曰如何是珠泉召師祖師應諾泉曰去汝不會我語師從此信入雪竇顯云百尺竿頭作伎倆不是好手這裏著得隻眼賓主互換便能深入虎穴或不恁麼縱饒師祖悟去也是龍頭蛇尾漢圜悟云南泉一期垂手收放擒縱則不無要且未見向上事在只如盡大地是如來藏向甚麼處著珠盡大地是摩尼珠向甚麼處著藏若明得有轉身處許你具一隻眼鄧州香嚴下堂義端禪師僧問某甲曾辭一老宿宿曰去則親良朋附善友某今辭和尚未審有何指示師曰禮拜著僧禮拜師曰禮拜一任禮拜不得認奴作郎池州靈鷲間禪師上堂是汝諸人本分事若教老僧道即是與蛇畫足時有僧問與蛇畫足即不問如何是本分事師曰闍黎試道看僧擬再問師曰畫足作麼日子和尚因亞溪來參師作起勢溪曰這老山鬼猶見某甲在師曰罪過罪過適來失祇對溪欲進語師便喝溪曰大陳當前不妨難禦師曰是是溪曰不是不是趙州云可憐兩個漢不識轉身句蘇州西禪和尚僧問三乘十二分教則不問如何是祖師西來的的意師舉拂子示之其僧不禮拜竟參雪峰峰問甚麼處來曰浙中來峰曰今夏甚麼處曰西禪峰曰和尚安否曰來時萬福峰曰何不且在彼從容曰佛法不明峰曰有甚麼事僧舉前話峰曰汝作麼生不肯伊曰是境峰曰汝見蘇州城裏人家男女否曰見峰曰汝見路上林木池沼否曰見峰曰凡覩人家男女林木池沼總是境汝還肯否曰肯峰曰祇如舉起拂子汝作麼生不肯僧乃禮拜曰學人取次發言乞師慈悲峰曰盡乾坤是個眼汝向甚麼處蹲坐僧無語池州甘贄行者一日入南泉設齋黃檗為首座行者請施財座曰財法二施等無差別甘曰恁麼道爭消得某甲嚫便將出去須臾復入曰請施財座曰財法二施等無差別甘乃行嚫翠巖真云甘贄行者黠兒落節黃檗施財何曾夢見妙喜舉翠巖語云一等是隨邪逐惡這雲居羅漢較些子又一日入寺設粥仍請南泉念誦泉乃白椎曰請大衆為狸奴白牯念摩訶般若波羅蜜甘拂袖便出泉粥後問典座行者在甚處座曰當時便去也泉便打破鍋子妙喜云心不負人面無慙色頌云南泉打破間家具浩浩諸方作話看今日為君重舉過明明歷歷不顢頇洪州雙嶺玄真禪師初問道吾無神通菩薩為甚麼足迹難尋吾曰同道者方知師曰和尚還知否吾曰不知師曰何故不知吾曰去你不識吾語師後於鹽官處悟旨焉福州芙蓉山靈訓禪師初參歸宗問如何是佛宗曰我向汝道汝還信否曰和尚誠言安敢不信宗曰即汝便是師曰如何保任宗曰一翳在眼空華亂墜法眼云若無後語有甚麼歸宗師辭宗問甚麼處去師曰歸嶺中去宗曰子在此多年裝束了却來為子説一上佛法師結束了上去宗曰近前來師乃近前宗曰時寒途中善為師聆此言頓忘前解漢南高亭和尚有僧自夾山來禮拜師便打僧曰特來禮拜何得打某甲僧再禮拜師又打趁僧回舉似夾山山曰汝會也無曰不會山曰賴汝不會若會即夾山口啞新羅大茅和尚上堂欲識諸佛師向無明心內識取欲識常住不凋性向萬物遷變處識取五臺山智通禪師自稱大禪佛初在歸宗會下忽一夜連呌曰我大悟也衆駭之明日上堂衆集宗曰昨夜大悟底僧出來師出曰某甲宗曰汝見甚麼道理便言大悟試説看師曰師姑原是女人做宗異之師便辭去宗門送與提笠子師接得笠子戴頭上便行更不回顧後居臺山法華寺臨終有偈曰舉手攀南斗回身倚北辰出頭天外看誰是我般人鎮州普化和尚者不知何許人也師事盤山密受記莂而佯狂出言無度暨盤山順世乃於此地行化或城市或冢間振一鐸曰明頭來明頭打暗頭來暗頭打四面八方來旋風打虗空來連架打一日臨濟令僧捉住曰總不恁麼來時如何師拓開曰來日大悲院裏有齋僧回舉似濟濟曰我從來疑著這漢五祖演舉云若是五祖即不然有人問總不恁麼來時如何和聲便打是他須道五祖盲枷瞎棒我只要你恁麼道何故一任舉似諸方凡見人無高下皆振鐸一聲或將鐸就人耳邊振之或附其背有回顧者即展手曰乞我一錢師見馬步使出喝道師亦喝道作相撲勢馬步使令人打五棒師曰似即似是即不是師嘗於闤闠間搖鐸唱曰覓個去處不可得時道吾遇之把住問曰汝擬去甚麼處師曰汝從甚麼處來吾無語師掣手便去臨濟初開堂師首往贊佐唐咸通初將示滅乃入市謂人曰乞我一個直裰人或與披襖或與布裘皆不受振鐸而去臨濟令人送與一棺師笑曰臨濟廝兒饒舌便受之乃辭衆曰普化明日去東門死也郡人相率送出城師厲聲曰今日葬不合青烏乃曰明日南門遷化人亦隨之又曰明日出西門方吉人出漸稀出已還返人意稍怠第四日自擎棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之已不見惟聞空中鐸聲漸遠莫測其由壽州良遂禪師參麻谷谷見來便將鉏頭去鉏草師到鉏草處谷殊不顧便歸方丈閉却門師次日復去谷又閉門師乃敲門谷問阿誰師曰良遂才稱名忽然契悟曰和尚莫謾良遂良遂若不來禮拜和尚洎被經論賺過一生谷便開門相見及歸講肆謂衆曰諸人知處良遂總知良遂知處諸人不知虔州處微禪師僧問三乘十二分教體理得妙與祖意是同是別師曰須向六句外鑒不得隨聲色轉曰如何是六句師曰語底默底不語不默總是總不是汝合作麼主僧無對問仰山汝名甚麼山曰慧寂師曰那個是慧那個是寂山曰祇在目前師曰猶有前後在山曰前後且置和尚見個甚麼師曰喫茶去金州操禪師請米和尚齋不排坐位米到展坐具禮拜師下禪牀米乃坐師位師却席地而坐齋訖米便去侍者曰和尚受一切人欽仰今日坐位被人奪却師曰三日後若來即受救在米三日後果來曰前日遭賊湖南上林戒靈禪師初參溈山山曰大德作甚麼來師曰介胄全具山曰盡卸了來與大德相見師曰卸了也山咄曰賊尚未打卸作甚麼師無對仰山代曰請和尚屏却左右溈山以手指曰喏喏師後參永泰方諭其旨永泰靈湍馬祖法嗣五臺山祕魔巖和尚常持一木叉每見僧來禮拜即叉却頸曰那個魔魅教汝出家那個魔魅教汝行腳道得也叉下死道不得也叉下死速道速道學徒鮮有對者霍山通和尚訪師才見不禮拜便攛入懷裏師拊通背三下通起拍手曰師兄三千里外賺我來三千里外賺我來便回湖南祇林和尚每叱文殊普賢皆為精魅手持木劍自謂降魔才見僧來參便曰魔來也魔來也以劍亂揮歸方丈如是十二年後置劍無言僧問十二年前為甚麼降魔師曰賊不打貧兒家曰十二年後為甚麼不降魔師曰賊不打貧兒家
