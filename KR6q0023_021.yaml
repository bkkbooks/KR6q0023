body:
  text: 六祖下第八世吉州資福貞𨗉禪師上堂隔江見資福剎竿便回去腳跟下好與三十棒況過江來時有僧才出師曰不堪共語郢州芭蕉山繼徹禪師別參風穴穴問如何是正法眼師曰泥彈子穴異之次謁先芭蕉蕉上堂舉仰山道兩口一無舌此是吾宗旨師豁然有省彭州承天院辭確禪師僧問衆罪如霜露慧日能消除時如何師曰亭臺深夜雨樓閣靜時鐘曰為甚麼因緣會遇時果報還自受師曰管筆能書片舌解語汝州風穴延沼禪師餘杭劉氏子少魁礨有英氣於書無所不觀然無經世意父兄強之仕一應舉至京師即東歸從開元寺智恭律師剃髮受具遊講肆玩法華玄義修止觀定慧夙師爭下之棄去遊名山到越州謁鏡清清問近離甚處師曰自浙東來清曰還過小江也無師曰大舸獨飄空小江無可濟清曰鏡水秦山鳥飛不度子莫道聽途言師曰滄溟尚怯艨䑳勢列漢飛航渡五湖清竪拂子曰爭奈這個何師曰這個是甚麼清曰果然不識師曰出沒卷舒與師同用清曰杓卜聽虗聲熟睡饒讇語師曰澤廣藏山理能伏豹清曰捨罪放愆速須出去師曰出去即失便出到法堂乃曰夫行腳人因緣未盡其善不可便休去却回曰某甲適來輒陳小騃冒瀆尊顏伏蒙慈悲未賜罪責清曰適來言從東來豈不是翠巖來師曰雪竇親棲寶蓋東清曰不逐亡羊狂解息却來這裏念篇章師曰路逢劍客須呈劍不是詩人莫獻詩清曰詩速祕却略借劍看師曰首甑人擕劒去清曰不獨觸風化亦自顯顢頇師曰若不觸風化爭明古佛心清曰如何是古佛心師曰再許允容師今何有清曰東來衲子菽麥不分祇聞不已而已何得抑已而已師曰巨浪涌千尋澄波不離水清曰一句截流萬機寢削師便禮拜清曰衲子俊哉到黃龍龍曰石角穿雲路垂條意若何師曰紅霞籠玉象擁嶂照川原曰恁麼則相隨去也師曰和尚低聲到華嚴嚴曰我有牧牛歌輒請闍黎和師曰羯鼓棹鞭牛豹跳遠村海樹嘴盧都因寓止華嚴為維那屬廓侍者從南院來侍者見嚴語具前卷侍者章中師心奇之因結為友遂默悟三玄旨要歎曰臨濟用處如是耶廓使更見南院師參南院入門不禮拜院曰入門須辨主師曰端的請師分院於左膝拍一拍師便喝院於右膝拍一拍師又喝院曰左邊一拍且置右邊一拍作麼生師曰瞎院便拈棒師曰莫盲枷瞎棒奪打和尚莫言不道院擲下棒曰今日被黃面浙子鈍置一場師曰和尚大似持鉢不得詐道不饑院曰闍黎曾到此間麼師曰是何言歟院曰老僧好好相借問師曰也不得放過便下參衆了却上堂頭禮謝院曰闍黎曾見甚麼人來師曰在襄州華嚴與廓侍者同夏院曰親見作家來院問南方一棒作麼商量師曰作奇特商量師却問和尚此間一棒作麼商量院拈拄杖曰棒下無生忍臨機不見師師於言下大徹玄旨遂依止六年碧巖集云初參雪峰五年因請益臨濟兩堂首座齊喝濟云賓主歷然語峰云吾昔與巖頭欽山去見臨濟屬濟已示寂若要會他賓主話須參他派下尊宿師遂辭行見瑞巖巖常自喚主人公師云自拈自弄有甚麼難後在襄州鹿門與廓侍者過夏廓指使參南院一日舉見雪峰語院云雪峰古佛集又舉見南院語如上院復云你看俊流自是機鋒峭峻南院亦未辨得他至次日南院只作尋常問云今夏在甚麼處師云鹿門與廓侍者同過夏院云原來親見作家來又云他向你道什麼師云始終只教某甲一向作主院便打推出方丈云這般納敗闕底漢有什麼用處師自此服膺在南院會下作園頭一日院到園裏問云南方一棒云云同上妙喜拈南院問師南方一棒話曰風穴當時好大展坐具禮三拜不然與掀倒禪牀乃回顧冲密曰你道風穴當時禮拜即是掀倒禪牀即是冲密曰草賊大敗妙喜曰你看這瞎漢便打一日南院謂師曰汝乘願力來荷大法非偶然也問曰汝聞臨濟將終時語否曰聞之曰臨濟曰誰知吾正法眼藏向這瞎驢邊滅却渠平生如師子見即殺人及其將死何故屈膝妥尾如此對曰密付將終全主即密又問三聖如何亦無語乎對曰親承入室之真子不同門外之遊人南院頷之又問汝道四種料簡語料簡何法對曰凡語不滯凡情即墮聖解學者大病先聖哀之為施方便如楔出楔曰如何是奪人不奪境曰新出紅罐金彈子簉破闍黎鐵面皮又問如何是奪境不奪人曰芻草乍分頭腦裂亂雲初綻影猶字又問如何是人境俱奪曰躡足進前須急急捉鞭當鞅莫遲遲又問如何是人境俱不奪曰常憶江南三月裏鷓鴣啼處百花香又問臨濟有三句當日有問如何是第一句濟曰三要印開朱點窄未容擬議主賓分師隨聲便喝又問如何是第二句濟曰妙解豈容無著問漚和爭負截流機師曰未問已前錯又問如何是第三句濟曰但看棚頭弄傀儡抽牽全藉裏頭人師曰明破即不堪於是南院以為可以支臨濟後唐長興二年至汝水風穴寺時寺已摧殘惟草屋數椽師入駐錫日乞村落夜燃松脂單丁者七年檀信乃為新之成叢林僞晉天福二年上元開法上堂祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住印即是不印即是還有人道得麼時有盧陂長老出問學人有鐵牛之機請師不搭印師曰慣釣鯨鯢澄巨浸却憐蛙步𩥇泥沙陂注思師喝曰長老何不進語陂擬議師便打一拂子曰還記得話頭麼陂擬開口師又打一拂子時有牧主曰信知佛法與王法一般師曰見甚麼道理主曰當斷不斷反招其亂師便下座上堂若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安怗於此明得闍黎無分全是老僧於此不明老僧却是闍黎闍黎與老僧亦能悟却天下人亦能瞎却天下人欲識闍黎麼右邊一拍曰這裏是欲識老僧麼左邊一拍曰這裏是五祖演云太平即不然若立一塵法堂前草深一丈不立一塵錦上添花何也不見道九九八十一窮漢受罪畢才擬展腳眠蚊蟲獦蚤出示衆先師曰欲得親切莫將問來問會麼問在答處答在問處雖然如是有時問不在答處答不在問處汝若擬議老僧在汝腳跟底大凡參學眼目直須臨機大用現前勿自拘於小節設使言前薦得猶為滯殼迷封句下精通未免觸途狂見應是向來依他作解明珠兩岐與汝一切掃却直教個個如師子兒吒呀地對衆證據哮吼一聲壁立千仞誰敢正眼覷著覷著即瞎却渠眼師問懷本上座云有事借問得麼本云不可惜口去也師云不惜口即道本擬議師便打又問第二人莫道得麼僧云道甚麼師又打又問第三人云三人同行必有我師作麼生是我師僧云見參禮次師亦打云過這邊立復云將頭不猛誤纍三軍瞎漢參堂去本至明日上堂頭親近云某甲夜來有甚麼過便蒙賜棒師云你要會麼以手左邊一拍云這裏是祖師意以手右邊一拍云這裏是教意還會麼本不肯便去後到頴橋安上座處舉前話安云風穴棒折那本云上座臂腕終不向外曲安云你會風穴道者裏是祖意教意麼非唯你不會直饒白兆老口赫赤地教他舉也舉不得防禦使問南院大善知識還具見聞覺知否院便掌使不肯遂以前語復問師師云荊棘荒榛棄來久矣云妙用又如何師云王子帶刀全意氣貧人擒倒語聲𧬜使深肯之遂舉到南院院隨問便掌語師云是深相為使方委悉上堂舉寒山詩曰梵志死去來魂識見閻老讀盡百王書未免受捶拷一稱南無佛皆以成佛道僧問如何是一稱南無佛師曰燈連鳳翅當空照月映蛾眉面看問摘葉尋枝即不問直截根源事若何師曰赴供凌晨去開塘帶雨歸問隨緣不變者忽遇知音時如何師曰披簑側立千峰外引水澆蔬五老前問九夏賞勞請師言薦師曰出袖拂開龍洞雨泛杯波涌鉢囊花問最初自恣合對何人師曰一把香芻拈未暇六環金錫響遙空問如何是清淨法身師曰金沙灘頭馬郎婦問如何是佛師曰杖林山下竹筋鞭真淨頌云杖林山下竹筋鞭水在深溪月在天良馬不知何處去阿難依舊世尊前宋開寶六年八月旦日登座說偈曰道在乘時須濟物遠方來慕自騰騰他年有叟情相似日日香煙夜夜燈至十五日跏趺而化前一日手書別檀越閲世七十有八坐五十有九夏頴橋安禪師號鐵胡與鍾司徒向火次鍾忽問三界焚燒時如何出得師以香匙撥開火鍾擬議師曰司徒司徒鍾忽有省郢州興陽歸靜禪師初參西院便問擬問不問時如何院便打師良久院曰若喚作棒眉鬚墮落師於言下大悟鄂州黃龍山誨機超慧禪師初參巖頭問如何是祖師西來意頭曰你還解救糍麼師曰解頭曰且救糍去後到玄泉問如何是祖師西來意泉拈起一莖皂角曰會麼師曰不會泉放下皂角作洗衣勢師便禮拜曰信知佛法無別泉曰你見甚麼道理師曰某甲曾問巖頭頭曰你還解救糍麼救糍也祇是解粘和尚提起皂角亦是解粘所以道無別泉呵呵大笑師遂有省幻寄曰玄泉若無後笑幾乎帶纍巖頭黃龍一笑下脫却毛角尚未免牽犁拽耙問急切相投請師通信師曰火燒裙帶香問風恬浪靜時如何師曰百尺竿頭五兩垂問毛吞巨海芥納須彌未是學人本分事如何是學人本分事師曰封了合盤市裏揭師將順世僧問百年後鉢囊子甚麼人將去師曰一任將去曰裏面事如何師曰線綻方知曰甚麼人得師曰待海燕雷聲即向汝道言訖而寂婺州明招德謙禪師受羅山印記靡滯於一隅激揚玄旨諸老宿皆畏其敏捷後學鮮敢當其鋒者到招慶指壁畫問僧那個是甚麼神曰護法善神師曰會昌沙汰時向甚麼處去來僧無對師令僧問演侍者演曰汝甚麼劫中遭此難來僧回舉似師師曰直饒演上座他後聚一千衆有甚麼用處僧禮拜請別語師曰甚麼處去也到坦長老處坦曰夫參學一人所在亦須到半人所在亦須到師便問一人所在即不問如何是半人所在坦無對後令小師問師師曰汝欲識半人所在麼也祇是弄泥團漢清上座舉仰山插鍬話問師古人意在叉手處插鍬處師召清清應諾師曰還夢見仰山麼清曰不要上座下語祇要商量師曰若要商量堂頭自有一千五百人老師在到雙巖巖請喫茶次曰某甲致一問若道得便捨院與闍黎住若道不得即不捨院遂舉金剛經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出且道此經是何人說師曰說與不說拈向這邊著祇如和尚決定喚甚麼作此經巖無對師又曰一切賢聖皆以無為法而有差別則以無為法為極則憑何而有差別祇如差別是過不是過若是過一切聖賢悉皆是過若不是過決定喚甚麼作差別巖亦無語師曰噫雪峰道底到堯菴乃提起縧子云得恁麼鬍𣯶𣯶地菴云莫錯認定盤星師曰恰是訪保寧於中路相遇便問兄是道伴中人乃點鼻頭曰這個礙塞我不徹與我拈却少時得麼寧曰和尚有來多少時師曰噫幾賺我踏破一緉草鞋便回國泰代曰非但某甲諸佛亦不奈何師曰因甚麼以己妨人師在疾一日國泰深和尚來問疾侍者通報云深師叔來師乃令請深才入方丈師便云阿㖿阿㖿深師叔救取老僧深云和尚有什麼救處師舉頭一覷云咦眼子烏㖀㖀地依前是舊時深上座乃回身面壁更不相見師病愈往國泰深乃領衆出接至門首師乃指金剛云者兩個漢在這裏作什麼深揎拳作金剛勢師云殿裏黃面老子笑你師問國泰瑫和尚云古人道俱胝祇念三行呪便得名超一切人作麼生與他拈却三行呪便得名超一切人國泰竪起一指師云不因今日爭識得瓜州客師會迅菴主在高司徒宅見挂彌勒㡧子師指彌勒佛喚云菴主主應諾師云這漢還徹也未主無語師云黃連和根煮也未是苦後國泰代合掌云善哉善哉師云和尚與他鄰舍住菴即得師在招慶因普請去王太傅宅取木佛傅乃問大衆云忽遇丹霞又作麼生衆無語師當時提起向頂上云也要分付著人嘗與僧擁罏僧問曰目前無法意在目前不是目前法非耳目所到那句是主那句是賓師指火曰與我向此中拈出一莖眉毛得麼僧曰非但學人盡大地人喪身失命師曰汝因甚麼自把髻投衙乎徑山杲云這僧有頭無尾明招有尾無頭有人道得頭尾圓全句雲門與你拄杖子師在婺州智者寺居第一座尋常不受淨水主事嗔曰上座不識觸淨為甚麼不受淨水師跳下牀提起淨瓶曰這個是觸是淨事無語師乃撲破師有師叔在廨院不安附書來問曰某甲有此大病如今正受疼痛一切處安置伊不得還有人救得麼師回信曰頂門上中此金剛箭透過那邊去也會下有僧去住菴一年後却來禮拜曰古人道三日不相見莫作舊時看師撥開胸曰汝道我有幾莖蓋膽毛僧無對師却問汝甚麼時離菴曰今朝師曰來時折腳鐺子分付與阿誰僧又無對師乃喝出師有偈曰師子教兒迷子法進前跳躑忽翻身羅紋結角交加處鶻眼龍睛失却真臨遷化上堂曰一百年中祇看今日今日事作麼生吾住此山四十年惟用一劍活人眼目乃拈巾曰如今有純陀麼指向諸方展看作擲勢僧問純陀獻供末後殷勤時如何師曰莫相孤負好又問和尚遷化向什麼處去舉足曰足下看又問百年後以何為極則師提巾便擲中夜問侍者昔日靈山會上釋迦如來展開雙足放百寶光遂展足曰吾今放多少者曰昔日世尊今宵和尚師以手撥眉曰莫孤負麼乃說偈曰驀刀叢裏逞全威汝等諸人善護持火裏鐵牛生犢子臨岐誰解凑吾機偈畢端坐而逝漳州羅漢院桂琛禪師常山李氏子為兒童時日一素食既冠事本府萬歲寺無相大師披削登戒學毗尼一日為衆升臺宣戒本布薩已乃曰持戒但律身而已依文作解豈發聖智乎於是訪南宗初謁雲居雪峰猶未有所見後造玄沙一言啓發廓爾無惑沙問三界惟心汝作麼生會師指椅子曰和尚喚這個作甚麼曰椅子師曰和尚不會三界惟心曰我喚這個作竹木汝喚作甚麼師曰桂琛亦喚作竹木曰盡大地覔一個會佛法底人不可得師自爾愈加激勵師侍沙在方丈說話夜深侍者閉却門沙曰門總閉了汝作麼生得出去師曰喚甚麼作門法燈別云和尚莫欲歇去漳州牧王公請住城西石山十餘年遷止羅漢破垣敗簣人不堪其憂非忘身為法者不至因插田次見僧問甚處來曰南州師曰彼中佛法如何曰商量浩浩地師曰爭如我這裏栽田博飯契曰爭奈三界何師曰喚甚麼作三界問僧甚處來曰南方來師曰南方知識有何言句示徒曰彼中道金屑雖貴眼裏著不得師曰我道須彌在汝眼裏問如何是羅漢一句師曰我向汝道却成兩句保福僧到師問彼中佛法如何曰有時示衆曰塞却你眼教你不見塞却你耳教你聽不聞坐却你意教你分別不得師曰吾問你不塞你眼見個甚麼不塞你耳聞個甚麼不坐你意作麼生分別東禪齊云那僧聞了忽然省去更不他遊上座如今還會麼若不會每日見個甚麼妙喜曰富嫌千口少貧恨一身多僧報曰保福遷化也師曰保福遷化地藏入塔師見僧舉拂子曰還會麼曰謝和尚慈悲示學人師曰見我竪拂子便云示學人汝每日見山見水可不示汝又見僧來舉拂子其僧讚歎禮拜師曰見我竪拂子便禮拜讚歎那裏掃地竪起掃帚為甚麼不讚歎問一佛出世普為羣生和尚今日為個甚麼師曰甚麼處遇一佛曰恁麼即學人罪過師曰謹退玩月次乃曰雲動有雨去有僧曰不是雲動是風動師曰我道雲亦不動風亦不動曰和尚適來又道雲動師曰阿誰罪過問僧甚處來曰秦州師曰將得甚麼物來曰不將得物來師曰汝為甚麼對衆謾語其僧無對師却問秦州豈不是出鸚鵡曰鸚鵡出在隴西師曰也不較多王太傅上雪峰施衆僧衣時從弇上座不在師弟代上名受衣弇歸弟曰某甲為師兄上名了弇曰汝道我名甚麼弟無對師代云師兄得恁麼貪又曰甚麼處是貪處又代云兩度上名雲居錫云甚麼處是弇上座兩度上名處師與長慶保福入州見牡丹障子保福曰好一朵牡丹花長慶曰莫眼花師曰可惜許一朵花玄覺云三尊宿語還有親疏也無祇如羅漢恁麼道落在甚麼處上堂諸上座不用低頭思量思量不及便道不用揀擇委得下口處麼汝向什麼處下口試道看還有一法近得汝還有一法遠得汝麼同得汝異得汝麼既然如是為甚麼却特地艱難去上堂宗門玄妙為當祇恁麼也更別有奇特若別有奇特汝且舉將來看若無去不可將兩個字便當却宗乘也何者兩個字謂宗乘教乘也汝才道著宗乘便是宗乘道著教乘便是教乘禪德佛法宗乘原來由汝口裏安立名字作取說取便是也斯須向這裏說平說實說圓說常禪德汝喚甚麼作平實把甚麼作圓常傍家行腳理須甄別莫相埋沒得些子聲色名字貯在心頭道我會解善能揀辨汝且會個甚麼揀個甚麼記持得底是名字揀辨得底是聲色若不是聲色名字汝又作麼生記持揀辨風吹松樹也是聲蝦蟇老鴉呌也是聲何不那裏聽取揀辨去若那裏有個意度模樣祇如老師口裏又有多少意度與上座莫錯即今聲色摐摐地為當相及不相及若相及即汝靈性金剛祕密應有壞滅去也何以如此為聲貫破汝耳色穿破汝眼因緣即塞却汝幻妄走殺汝聲色體爾不可容也若不相及又甚麼處得聲色來會麼相及不相及試裁辨看少間又道是圓常平實甚麼人恁麼道未是黃夷村裏漢解恁麼說是他古聖垂些子相助顯發今時不識好惡便安圓實道我別有宗風玄妙釋迦佛無舌頭不如汝些子便恁麼點胸若論殺盜淫罪雖重猶輕尚有歇時此個謗般若瞎却衆生眼入阿鼻地獄吞鐵丸莫將為等間所以古人道過在化主不干汝事珍重師作明道偈曰至道淵曠勿以言宣言宣非旨孰云有是觸處皆渠豈喻真虗真虗設辨如鏡中現有無雖彰在處無傷無傷無在何拘何礙不假功成將何法爾法爾不爾俱為脣齒若以斯陳埋沒宗旨宗非意陳無以見聞見聞不脫如水中月於此不明翻成剩法一法有形翳汝眼睛眼睛不明世界崢嶸我宗奇特當陽顯赫佛及衆生皆承恩力不在低頭思量難得拶破面門蓋覆乾坤決須薦取脫却根塵其如不曉謾說而今師因疾僧問和尚尊侯較否師以杖拄地曰汝道這個還痛否曰和尚問阿誰師曰問汝曰還痛否師曰元來共我作道理後唐天成三年戊子秋師復至閩城舊止遍遊近城諸剎乃還示微疾沐浴安坐而化闍維收舍利建塔洪覺範曰地藏琛禪師能大振雪峰玄沙之道者其祕重大法恬退自處之效也歟豫嘗想見其為人城隈古寺門如死灰道容清深戲禪客曰諸方說禪浩浩地爭如我此間栽田博飯喫有旨哉安國慧球禪師玄沙室中參訊居首因問如何是第一月沙曰用汝個月作麼師從此悟入上堂我此間粥飯因緣為兄弟舉唱終是不常欲得省要却是山河大地與汝發明其道既常亦能究竟若從文殊門入者一切無為土木瓦礫助汝發機若從觀音門入者一切音響蝦蟇蚯蚓助汝發機若從普賢門入者不動步而到以此三門方便示汝如將一隻折箸攪大海水令彼魚龍知水為命會麼若無智眼而審諦之任汝百般巧妙不為究竟師問了院主祇如先師道盡十方世界是真實人體你還見僧堂麼了曰和尚莫眼花師曰先師遷化肉猶暖在福州大章山契如菴主得法玄沙初隱於小界山山有朽杉若菴第能容身師遂居之清豁沖煦二長老嚮師名未嘗會遇一旦同訪之值師採粟豁問道者如菴主在何所師曰從甚麼處來曰山下來師曰因甚麼得到這裏曰這裏是什麼處所師揖曰那下喫茶去二公方省是師遂詣菴所頗味高論晤坐於左右不覺及夜覩豺虎奔至菴前自然馴繞豁因有詩曰行不等間行誰知去住情一餐猶未飽萬戶勿聊生非道應難伏空拳莫與爭龍吟雲起處間嘯兩三聲天台國清寺師靜上座始遇玄沙示衆曰汝諸人但能一生如喪考妣吾保汝究得徹去師躡前語問曰祇如教中道不得以所知心測度如來無上知見又作麼生沙曰汝道究得徹底所知心還測度得及否師從此信入後居天台三十餘載不下山博綜三學操行孤立禪寂之餘常閲龍藏遐邇欽重時謂大靜上座嘗有人問弟子每當夜坐心念紛飛未明攝伏之方願垂示誨師曰如或夜間安坐心念紛飛却將紛飛之心以究紛飛之處究之無處則紛飛之念何存反究究心則能究之心安在又能照之智本空所緣之境亦寂寂而非寂者蓋無能寂之人也照而非照者蓋無所照之境也境智俱寂心慮安然外不尋枝內不住定二塗俱泯一性怡然此乃還源之要道也師因覩教中幻義乃述一偈問諸學流曰若道法皆如幻有造諸過惡應無咎云何所作業不忘而藉佛慈興接誘時有小靜上座答曰幻人興幻幻輪圍幻業能招幻所治不了幻生諸幻苦覺知如幻幻無為二靜上座並終於本山泉州招慶院道匡禪師在長慶會下作桶頭常與衆僧語話一日慶見乃曰爾每日口嘮嘮地作麼師曰一日不作一日不食慶曰與麼則磨弓錯箭去也師曰專待尉遲來慶曰尉遲來後如何師曰教伊筋骨遍地眼睛突出慶便出去普請擔泥次師中路按拄杖問僧云上窟泥下窟泥僧云上窟泥師打一棒又問一僧僧云下窟泥師亦打一棒又問明招招放下泥擔叉手云請師鑑師便休徑山杲云招慶雖然休去爭奈明招不甘雲門當時若見他放下泥擔云請師鑑劈脊也與一棒看他如何折合襄州鷲嶺明遠禪師初參長慶慶問汝名甚麼師曰明遠慶曰那邊事作麼生師曰明遠退兩步慶曰汝無端退兩步作麼師無語慶曰若不退步爭知明遠師乃諭言太傅王延彬居士一日入招慶佛殿指鉢盂問殿主這個是甚麼鉢主曰藥師鉢公曰祇聞有降龍鉢主曰待有龍即降公曰忽遇拏雲浪來時作麼生主曰他亦不顧公曰話墮也玄沙曰盡你神力走向甚麼處去保福曰歸依佛法僧百丈恆作覆鉢勢雲門曰他日生天莫孤負老僧公到招慶煎茶朗上座與明招把銚忽翻茶銚公問茶罏下是甚麼朗曰捧罏神公曰既是捧罏神為甚麼翻却茶朗曰事官千日失在一朝公拂袖便出明招曰朗上座喫却招慶飯了却向外邊打野榸朗曰上座作麼生招曰非人得其便雪竇顯云當時但踏倒茶罏復頌云來問若成風應機非善巧堪悲獨眼龍曾未呈牙爪牙爪開呈雲雷逆水之波經幾回谷山行崇禪師謂門弟子曰吾雖不在未嘗不為諸兄弟若委悉報恩常為人處許汝出意想知解五陰身田若委不得猶待報恩開兩片皮方是為人保汝未出得意想知解所以古人喚作鬼家活計蝦蟇衣下客欲得速疾相應即如今立地便證驗取識取有什麼罪過不然根思遲回且以日及夜尋究將去忽然一日見更莫以少為足更能研窮究竟乃至淫坊酒肆若觸若淨若好若惡以汝所見事教盡是此境界入如入律若更見一法如絲髮許不見此個事我說為無明翳障直須不見有法是別底法方得圓備到這裏更能翻擲自由開合不成痕縫如水入水如火入火如風入風如空入空若能如是直下提一口劍刺斷天下人疑網一如不作相似所以古人道繁興大用舉必全真若有個漢到與麼境界誰敢向前說是說非何以故此人是個漢超諸限量透出因果一切處管束此人不得兄弟若能如是即可若未得如此且直須好與此字應誤莫取次發言吐氣沈墜却汝無量劫莫到與麼時便道報恩不道漳州報恩院道熙禪師因與保福送書到泉州王太尉尉問漳南和尚近日還為人也無師曰若道為人即屈著和尚若道不為人又屈著太尉來問太尉曰道取一句待鐵牛能齧草木馬解含煙師曰某甲惜口喫飯尉良久又問驢來馬來師曰驢馬不同途尉曰爭得到這裏師曰特謝太尉領話招慶省僜禪師初參保福福一日入大殿覩佛像乃舉手問師曰佛恁麼意作麼生師曰和尚也是橫身福曰一橛我自收取師曰和尚非惟橫身福然之鼓山智嶽禪師初遊方至鄂州黃龍問久嚮黃龍及乎到來祇見赤斑蛇龍曰汝祇見赤斑蛇不見黃龍師曰如何是黃龍龍曰滔滔地師曰忽遇金翅鳥來又作麼生龍曰性命難存師曰恁麼則被他吞却去也龍曰謝闍黎供養師便禮拜傳燈云師初未省覺後至鼓山啓發始悟微旨報國照禪師佛塔被雷霹有問祖佛塔廟為甚麼却被雷霹師曰通天作用曰既是通天作用為甚麼却霹佛師曰作用處何處見有佛曰爭奈狼藉何師曰見甚麼衢州烏巨山儀宴開明禪師吳興許氏子於唐乾符三年生誕之夕異香滿室紅光如晝光啓中隨父鎮信安強為娶師不願遂遊歷諸方機契鏡清歸省父母乃於郭南創別舍以遂師志舍旁陳司徒廟有凜禪師像師往瞻禮失師所之後郡守展祀祠下見師入定於廟後叢竹間蟻蠧其衣敗葉沒䏶或者云是許鎮將之子也自此三昧忽出忽入子湖訥禪師未知師所造淺深問曰子所住定蓋小乘定耳時方啜茶師呈起槖曰是大是小訥駭然尋謁括蒼唐山德嚴禪師嚴問汝何姓曰姓許嚴曰誰許汝曰不別嚴默識之遂與剃染嘗令摘桃浹旬不歸往尋見師攀桃倚石泊然在定嚴鳴指出之開運中遊江郎巖覩石龕謂弟子慧興曰豫入定此中汝當礨石塞門勿以吾為念興如所戒明年興意師長往啓龕視師素髮被肩胸臆尚暖徐自定起了無異容復回烏巨侍郎慎公鎮信安馥師之道命義學僧守榮詰其定相師不與之辨榮意輕之時信安人競圖師像而尊事皆獲舍利榮因愧服禮像謝𠎝亦獲舍利歎曰此後不敢以深解測序矣錢忠懿王感師見夢遣使圖像至適王患目疾展像作禮如夢所見隨雨舍利目疾頓瘳因錫號開明宋太宗聞師定力加禮延師師不赴特以肩輿迎至便殿咨對太宗深契尋即丐歸淳化元年示寂壽一百十五臘五十七闍維白光燭天舍利五色徽宗政和三年嘉州路旁大樹因風摧折中有一僧禪定鬚髮被體指爪繞身奏聞帝令肩輿入京命西天總持三藏以金磬出其定遂問何代僧曰我乃東林遠法師之弟名慧持因遊峩嵋入定於樹遠法師無恙否藏曰遠法師晉人也化去七百年矣持遂寂然藏問師既至此欲歸何所持曰陳留縣復入定帝製三偈令繪像頒行偈曰七百年來老古錐定中消息許誰知爭如隻履西歸去生死何勞木作皮藏山於澤亦藏身天下無藏道可親寄語莊周休擬議樹中不是負趨人有情身不是無情彼此人人定裏身會得菩提本無樹不須辛苦問盧能福州林陽瑞峰院志端禪師本州人也初參安國見僧問如何是萬象之中獨露身國舉一指其僧不薦師於是冥契玄旨乃入室白曰適來見那僧問話志端有個省處國曰汝見甚麼道理師亦舉一指曰這個是甚麼國然之師禮謝謂門弟子曰佛法無許多般但凡聖一真猶存見隔見存即凡情忘即佛教中謂之稱性緣起則俯仰進止屈伸謙敬無一法可轉變有生住異滅相況我祖師門下合作何理論舉拂子曰曹溪用不盡底時人喚作頭角生山僧拈來拂蚊子薦得乾坤陷落開寶元年八月遺偈曰來年二月二別汝暫相棄燒灰散四林免占檀那地明年正月二十八日州民競入山瞻禮師尚無恙參問如常至二月一日州官率諸官同至山訊候經宵二日齊罷上堂辭衆時圓應長老出問曰雲愁霧慘大衆嗚咽未當告別先賜一言師垂一足應曰法鏡不臨於此土寶月又照於何方師曰非汝境界應曰恁麼則漚生漚滅元歸水師去師來是本常師作噓聲復與數僧酬答罷歸方丈至亥時問衆曰世尊滅度時節是何日曰二月十五日子時師曰吾今日子前遂泊然坐化閲世七十八坐六十夏保福清豁禪師參睡龍龍問曰豁闍黎見何尊宿來還悟也未曰清豁嘗訪大章得個信處龍於是上堂集衆召曰豁闍黎出來對衆燒香說悟處老僧與汝證明師出衆乃拈香曰香已拈了悟即不悟龍大悅而許之師將順世遺偈曰世人休說路行難鳥道羊腸咫尺間珍重苧溪溪畔水汝歸滄海我歸山即往貴湖卓菴未幾謂門人曰吾滅後將遺骸施諸蟲蟻勿置墳塔言訖潛入湖頭山坐磐石儼然長往弟子遍覔而得稟遺戒延七日竟無蟲蟻侵蝕闍維散於林間四祖山清皎禪師年七十時遺偈曰吾年八十八滿頭垂白髮顒顒鎮雙峰明明千江月黃梅揚祖教白兆承宗訣日日告兒孫勿令有斷絶淳化四年癸巳八月二十三日入滅年八十八傳燈載此以師光十八年而識化期也會元作臨終時偈失矣大龍時洪禪師僧問色身敗壞如何是堅固法身師曰山花開似錦㵎水碧如藍妙喜拈云若以此明堪固法身生身入地獄雪竇顯頌問曾不知答還不會月冷風高古巖寒檜堪笑路逢達道人不將語默對手把瑚鞭驪珠盡擊碎不擊碎增瑕纇國有憲章三千條罪同安志禪師先同安將示寂上堂曰多子塔前宗子秀五老峰前事若何如是三舉莫有對者師出曰夜明簾外排班立萬里歌謠道太平安曰須是這驢漢始得廬山佛手巖行因禪師廬山之北有巖如五指下有石窟可三丈餘師宴處其中因號佛手巖和尚不序弟子有鄰菴僧為之供侍常有異鹿錦囊鳥馴擾其側江南李主三召不起乃堅請就棲賢開堂不逾月潛歸巖室一日示微疾謂旁僧曰日午吾去矣及期僧報日午也師下牀行數步屹然立化巖上有松一株同日枯槁李主備香薪茶毗塔於巖陰泉州龜洋慧忠禪師會昌初詔天下廢釋氏教及宣宗即位詔重興之而師笑曰仙去者未必受籙成佛者未必須僧遂過中不食不宇而禪迹不出山者三十年以三偈自見曰雪後始知松柏操雲收方見濟淮分不因世主令還俗那辨雞羣與鶴羣多年塵土自騰騰雖著伽黎未是僧今日歸來酬本志不妨留髮候然燈形容雖變道常存混俗心源亦不昏試讀善財巡禮偈當時豈例是沙門一旦謂弟子曰衆生不能解脫者情纍爾悟道易明道難問如何得明道去師曰但脫情見其道自明矣夫明之為言信也如禁蛇人信其呪力藥力以蛇綰弄揣懷袖中無難未知呪藥等力者怖駭棄去但諦見自心情見便破今千疑萬慮不得用者是未見自心者也忽索香焚罷安坐而化塔全身於無了禪師塔之東襄州廣德義禪師謁先廣德作禮問曰如何是和尚密密處德曰隱身不必須巖谷闤闠堆堆覩者稀師曰恁麼則酌水獻花去也德曰忽然雲霧靄闍黎作麼生師曰採汲不虗施廣德欣然曰大衆看取第二代廣德襄州廣德周禪師問教中道阿逸多不斷煩惱不修禪定佛記此人成佛無疑此理如何師曰鹽又盡炭又無曰鹽盡炭無時如何師曰愁人莫向愁人說說向愁人愁殺人妙喜曰古人恁麼答話喚作洗腳上船石門慧徹禪師僧問雲光作牛意旨如何師曰陋巷不騎金色馬回途却著破襴衫雲光法師不事戒律志公曰出家何為光曰吾不齊而齊食而非食後招報作牛拽車於途志公見之呼曰雲光牛舉首志曰何不道拽而非拽牛墮淚跳號而卒益州青城香林院澄遠禪師依雲門十八年為侍者門凡接師則呼曰遠侍者師應諾門曰是甚麼如此者十八年一曰方悟門曰我乃今更不呼汝矣師一日辭門門曰光含萬象一句作麼生道師擬議門令更住三年普請鉏地次有一僧曰看俗家失火師曰那裏火曰不見那師曰不見曰瞎漢是時一衆皆言遠上座敗闕後明教寬聞舉曰須是我遠兄始得問美味醍醐為甚麼變成毒藥師曰導江紙貴問如何是西來的的意師曰坐久成勞雪竇顯頌云一個兩個千萬個脫却籠頭卸却䭾左轉右轉隨後來子湖要打劉鐵磨問一子出家九族解脫目連為甚麼母入地獄師曰確將示寂辭知府宋公璫曰老僧行腳去通判曰這僧風狂八十歲行腳去那裏宋曰大善知識去住自由歸謂衆曰老僧四十年方打成一片言訖而逝有僧參舉道者一日遊山次僧曰香林道老僧四十年求成一片不可得此意如何舉曰老僧也恁麼却問其僧會麼曰不會舉示偈曰香林成一片老僧也恁麼不待此月終重為子決破至月末舉遂遷化韶州白雲子祥禪師上堂諸人會麼但向街頭市尾屠兒魁劊地獄鑊湯處會取若恁麼會得堪與人天為師若向衲僧門下天地懸殊更有一般底祇向長連牀上作好人去汝道此兩般人那個有長處無事珍重問僧不壞假名而談實相作麼生僧指椅子曰這個是椅子師以手撥椅曰與我將鞋袋來僧無對師曰這虗頭漢雲門聞乃云須是我祥兄始得將示滅白衆曰某甲雖提祖印未盡其中事諸仁者且道其中事作麼生莫是無邊中內外已否若如是會即大地如鋪沙良久曰去此即他方相見言訖而寂鼎州德山緣密禪師上堂我有三句語示汝諸人一句函蓋乾坤一句截斷衆流一句隨波逐浪作麼生辨若辨得出有參學分若辨不出長安路上輥輥地智證傳以此為雪峰三句其傳曰宗師約法以定綱宗以簡偏邪如雪峰三句玄沙嘗言之曰是汝諸人見有險惡見有大蟲刀劍諸事來逼汝身命便生無限怖畏恰如世間畫師自畫作地獄變相畫大蟲刀劍了好好地看著却自生怕怖亦不是別人與汝為過汝如今欲免此幻惑麼但識取金剛眼睛若識得不曾教有纖塵可得露現何處更有虎狼刀劍解嗋嚇得汝直至釋迦如是伎倆亦覓出頭處不得所以我向汝道沙門眼把定世界函蓋乾坤不漏絲髮何處更有一物為汝知見如是出脫如是奇特何不究取此函蓋乾坤句也又曰鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後如壯士展臂不借他力如師子遊行豈求伴侶此截斷衆流句也又曰大唐國內宗乘未有一人舉唱設有一人舉唱盡大地人失却性命無孔鐵椎相似一時亡鋒結舌去汝諸人賴我不惜身命共汝顛倒知見隨汝狂意方有申問處我若不共汝與麼知問去汝向什麼處得見我此隨波逐浪句也幻寄曰覺範此語與古塔主分擘三玄又何異圜悟曰雲門大師多以一字禪示人雖一字中須具三句此三句無論是雪峰是密師語要之窺其籓者必圜悟若覺範則欲登高而入淵者也示衆俱胝和尚但有問答只竪一指頭寒則普天普地寒雪竇云甚麼處見俱胝老熱則普天普地熱雪竇云莫錯認定盤星復云森羅萬象徹下孤危大地山河通上險絶甚麼處得一指頭禪妙喜曰可謂是貴人多忘上堂但參活句莫參死句活句下薦得永劫無滯一塵一佛國一葉一釋迦是死句揚眉瞬目舉指竪拂是死句山河大地更無誵訛是死句時有僧問如何是活句師曰波斯仰面看曰恁麼則不謬去也師便打嶽州巴陵新開院皓鑒禪師初到雲門門曰雪峰和尚道開却門達磨來也語具雲門章中住後更不作法嗣書祇將三轉語上雲門僧問如何是道師曰明眼人落井保寧頌秋夜霜天月正明仰觀星象約三更一條大路平如掌歸去何妨徹曉行問如何是吹毛劍師曰珊瑚枝枝撐著月雪竇頌要平不平大巧若拙或指或掌倚天照雪大冶兮磨礱不下良工兮拂拭未歇別別珊瑚枝枝撐著月問如何是提婆宗師曰銀碗裏盛雪雪竇頌老新開端的別解道銀碗裏盛雪九十六個應自知不知却問天邊月提婆宗提婆宗赤幡之下起清風雲門見曰他後老僧忌日祇消舉此三轉語足以報恩問僧遊山來為佛法來曰清平世界說甚麼佛法師曰好個無事禪客曰早是多事了也師曰上座去年在此過夏了曰不曾師曰與麼則先來不相識下去隨州雙泉山師寬明教禪師初在雲門一日聞白槌曰請師寬充典座師翻筋斗出衆曰雲門禪屬我矣又一日雲門問師今日喫得幾個胡餅師曰五個門曰露柱喫得幾個師曰請和尚茶堂裏喫茶師一日訪白兆兆曰老僧有個木魚頌師曰請舉看兆曰伏惟爛木一橛佛與衆生不別若以杖子擊著直得聖凡路絶師曰此頌有成褫無成褫兆曰無成褫師曰佛與衆生不別聻侍僧救曰有成褫師曰直得聖凡路絶聻當時白兆一衆失色襄州洞山守初宗慧禪師初參雲門門問近離甚處師曰查渡門曰夏在甚處師曰湖南報慈曰幾時離彼師曰八月二十五門曰放汝三頓棒師至明日却上問訊昨日蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去師於言下大悟遂曰他後向無人烟處不蓄一粒米不種一莖菜接待十方往來盡與伊抽釘拔楔拈却炙脂帽子脫却鶻臭布衫教伊灑灑地作個無事衲僧豈不快哉門曰你身如椰子大開得如許大口師便禮拜雪竇拈云雲門氣宇如王拶著便氷消瓦解當時若據令而行子孫也未到斷絶圜悟勤云大溈真如和尚愛教人看此因緣拈人情解有者道雲門道近離甚處山曰查渡此是放一頓棒夏在甚處山曰湖南報慈此是放一頓棒幾時離彼中來山曰八月二十五此是放一頓棒分明是三頓棒且喜沒交涉又有底道洞山實頭所以放他三頓棒有底道當時便好一喝更說如何若何總是狂解總不恁麼畢竟作麼生所以古人道承言須會宗勿自立規矩拈他情解便會只為雲門語好便發得洞山悟處一如臨濟見大愚只被大愚拈他情見便會得徹後來僧問洞山如何是佛便只道麻三斤看他那裏是安排得來祖師門下一便見那裏有許多般千聖萬聖挨拶教人見到這裏雖然點破綱宗要且意在未屙時明眼漢沒窠臼所以巖頭道若論戰也個個立在轉處向未屙時一便見廓天一路相似靈利漢疑著處一點便會雪竇拈謂雲門一似霸王相似因甚麼拶著便氷消瓦解雪竇嫌雲門老婆心如此當時真個好打到這裏拈則許你拈會則不許你會若只恁麼會又錯了也當時劈脊便棒趕出去已放過了也教他後來道如何是佛麻三斤前也不著村後也不著店天下人不奈何若奈何時如何鼻孔撩天示衆語中有語名為死句語中無語名為活句諸禪德作麼生是活句到這裏實難得人若也不動一塵不撥一境見事便道答話長老下腳不得東西南北莫知多少要得去離泥水活人眼目舉唱宗風激揚大事不道全無其奈還少只緣未達其源落在第八魔境界中識得個不名不物無是無非頭頭物物無不具足道我得安樂田地更不求餘凡有扣擊問難即便敲牀竪拂更不惜便施便設便行便用向惡水坑裏頭出頭沒弄個無尾猢猻到臘月三十日鼓也打破猢猻又走却了手忙腳亂一無所成悔將何及若是個衲僧乍可凍殺餓殺終不著他鶻臭布衫又曰言無展事語不投機乘言者喪滯句者迷於此四句語中見得分明也作個脫灑衲僧根椽片瓦粥飯因緣堪與人天為善知識於此不明終成莽鹵林間録曰雲菴平生說法多稱初悟門度越格量偶閲舊記見其寄道友偈并序曰昔洞山參雲門悟旨于言下入佛正知見所有炙脂帽子鶻臭布衫皆脫去以四句偈明其悟蓋得展事自在之用投機善巧之風故其應機接物不乘言不滯句如師子王得大自在於哮吼時百獸震駭蓋法王法如是故也又世所傳見雲門者皆坐脫立亡何哉以無佛法知見故也因隨句釋以奉寄曰大用現前能展事春來何處不開花放伊三頓參堂去四海當知共一家又曰千差萬別解投機明眼宗師在此時北斗藏身雖有語出羣消息少人知又曰遊山玩水便乘言自己商量總不偏鶻臭布衫脫未得且隨風俗度流年又曰滯句乘言是瞽聾參禪學道自無功語來不費纖毫力火裏蝍蟟吞大蟲又曰舉唱宗乘闡揚大教須得法眼精明方能鑒辨緇素切緣真妄一源水乳同器到此難分洞山尋常以心中眼觀身外相觀之又觀乃辨真僞若不如是何名善知識夫善知識者驅耕夫之牛奪饑人之食方名善知識即今天下那個是真善知識諸德參得幾個善知識來也不是等間直須參教徹教透千聖莫能證明方顯大丈夫兒不見釋迦老子明星出時豁然大悟與大地衆生同時成佛無前後際豈不暢哉雖然如是若遇明眼衲僧也好劈脊便棒問維摩掌擎四世界未審維摩身在甚處師曰在闍黎後底曰為甚麼在學人後底師曰還我話頭來問如何是佛師曰麻三斤福嚴良雅時為首座師參罷至首座寮問曰我今日答這僧話得麼雅曰恰值某淨髮師曰你元來作這去就拂袖便出雅曰這老漢將謂我明他這話不得因作偈呈曰五彩畫牛頭黃金為點額春晴二月初農人皆取則寒食賀新正鐵錢三五百師見深肯之僧問智門洞山道麻三斤意旨如何門曰花簇簇錦簇簇僧無語門曰會麼僧曰不會門曰南地竹兮北地木僧回舉似師師曰我不為汝說為大衆說遂上堂云言無展事語不投機承言者喪滯句者迷雪竇顯頌金烏急玉兔速善應何曾有輕觸展事投機見洞山跛鱉盲龜入空谷花簇簇錦簇簇南地竹兮北地木因思長慶陸大夫解道合笑不合哭咦問僧甚處來曰汝州師曰此去多少曰七百里師曰踏破幾緉草鞋曰三緉師曰甚處得錢買曰打笠子師曰參堂去僧應諾問僧莫便是新到否曰是師曰夜來投棲處今朝事如何曰今朝風較急青山背上行師曰不是更道曰珍重師便打問不向心頭安了義如何得達祖師言師曰六腳蜘蛛上板牀問自古及今不從人得六祖黃梅夜聞何事師曰志公拄杖曰得用時如何師曰用那曲尺作甚麼問十二時中行住坐臥自省覺時如何師曰看人喫飯曰爭奈樹影不斜何師曰親言出親口問金鍮現前請師辨師曰兩腳蝦蟇吞却月都監太保問眼處入正受諸塵三昧起此意如何師云洞山茶碗裏有太保太保茶碗裏有洞山太保無語却將此語問谷隱隱云不落無言說問延慶慶云喚甚麼作三昧幻寄曰三師恁麼道忒殺廉纖若有人問幻寄如何是眼處入正受諸塵三昧起但向伊道過隨牛狗兒頌家有一狗兒騃小人難見終日隨牛去未省使人喚見客不作聲見人偏能善擬議上門來早是輸他便好好報禪師須著精神看任汝靈利人不覺為死漢淳化元年秋七月無疾跏趺而化金陵奉先深禪師同明和尚在衆時聞僧問法眼如何是色眼竪起拂子或曰雞冠花或曰貼肉汗衫二人特往請益問曰承聞和尚有三種色語是否眼曰是師曰子過新羅便歸衆時李主在座下不肯乃白法眼曰寡人來日致茶筵請二人重新問話明日茶罷備綵一箱劍一口謂二師曰上座若問話得是奉賞雜綵一箱若問不是祇賜一劍法眼升座師復出問今日奉敕問話師還許也無眼曰許曰子過新羅捧綵便行大衆一時散去時法燈作維那乃鳴鐘集衆僧堂前勘師衆集燈問承聞二上座久在雲門有甚奇特因緣舉一兩則來商量看師曰古人道白鷺下田千點雪黃鸝上樹一枝花維那作麼生商量燈擬議師打一坐具便歸衆師同明和尚到淮河見人牽網有魚從網透出師曰明兄俊哉一似個衲僧相似明曰雖然如此爭如當初不撞入網羅好師曰明兄你缺悟在明至中夜方省妙喜曰明上座省得底且道是網羅裏底是出網羅底幻寄曰催得吳霜點𩯭稠韶州雙峰竟欽禪師上堂進一步則迷理退一步則失事饒你一向兀然去又同無情僧問如何得不同無情去師曰動轉施為曰如何得不迷理失事去師曰進一步退一步僧作禮師曰向來有人恁麼會老僧不肯伊曰請師直指師便打太平興國二年三月謂門弟子曰吾不久去汝矣可砌個卵塔五月二十三日工畢師曰後日子時行矣及期適雲門爽禪師溫門舜峰諸老夜話侍者報三更師索香焚之合掌而化洞山清稟禪師參雲門門問今日離甚處曰慧林門舉拄杖曰慧林大師恁麼去汝見麼師曰深領此問門顧左右微笑而已智證傳大涅槃經曰所言二諦其實是一方便說二如人醉未吐見日月轉謂有轉日及不轉日醒人但見不轉不見於轉轉二為粗不轉為妙傳曰三藏全是轉之二如彼醉者大乘經帶一轉二而說不轉之者一也起信曰以一切法本來惟心實無於念而有妄心不覺起念見諸境界故說明以此義例轉二為粗也又曰心性不起即是大智慧光明義例不轉為妙也洞山清稟禪師惟宴坐一日呼侍者下法堂謂曳木者無損階砌侍者出視無有還白寂無人跡稟又使求之侍者臨簷俯視乃羣蟻曳蜻蜓翼緣階而上蓋靜極妙而靈知也幻寄曰凡情聖量皆轉也雖洞見十方遍聞三界猶屬聖量之轉稟師以蟻曳蜻蜓翼為曳木其靈通昧略若在夢境而覺範以靜妙許之異乎經之所謂不轉為妙哉如何是不轉曰蜻蜓翼北禪寂禪師問僧甚處來曰黃州師曰夏在甚處曰資福師曰福將何資曰兩重公案師曰爭奈在北禪手裏曰在手裏即放取師便打僧不甘師隨後趁出雲門山朗上座自幼肄業講肆聞僧問雲門如何是透法身句門曰北斗裏藏身師罔測微旨遂造雲門門才見便把住曰道道師擬議門托開乃示頌曰雲門聳峻白雲低水急游魚不敢棲入戶已知來見解何勞再舉轢中泥師因斯大悟
