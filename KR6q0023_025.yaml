body:
  text: 六祖下第十二世隆興府黃龍慧南禪師信州玉山章氏子童齓不茹葷不嬉戲年十一棄家十九受具足戒至廬山歸宗老宿自寶集衆坐師却倚寶時時眴之師自是坐必跏趺行必直視及依泐潭澄禪師令分座接物名振諸方雲峰悅見之歎曰南有道之器也惜未授本色鉗鎚耳會同遊西山夜話雲門法道峰曰澄公雖是雲門之後法道異矣師詰其所以異峰曰雲門如九轉丹砂點鐵成金澄公如藥汞銀徒可玩入煆則流去師怒以枕投之明日峰謝過又曰雲門氣宇如王甘死語下乎澄公有法授人死語也死語其能活人乎即背去師挽之曰若如是則誰可汝意峰曰石霜圓手段出諸方子宜見之不可後也師默計之曰悅師翠巖使我見石霜於悅何有哉即造石霜中塗聞慈明不事事慢侮少叢林遂登衡嶽謁福嚴賢賢命掌書記俄賢卒郡守以慈明補之師心喜且欲觀其人以驗雲峰之言明既至貶剝諸方件件數為邪解而泐潭密付之旨皆在所斥中師為之氣索遂造其室明曰書記已領徒遊方借使有疑可坐而商略師哀懇愈切明曰公學雲門禪必善其旨如云放洞山三頓棒是有喫棒分無喫棒分師曰有喫棒分明色莊曰從朝至暮鵲噪鴉鳴皆應喫棒明即端坐受師炷香作禮明復問脫如汝會雲門意旨則趙州道臺山婆子我為汝勘破了也且那裏是他勘破婆子處師汗下不能答次日又詣明詬罵不已師曰罵豈慈悲法施耶明曰你作罵會那師於言下大悟作頌曰傑出叢林是趙州老婆勘破沒來由而今四海明如鏡行人莫與路為讐呈明明以手指沒字師為易有字明頷之圜悟勤云黃龍老南禪師昔未見石霜會一肚皮禪翠巖憫之勸謁慈明只窮究玄沙語靈雲未徹處應時瓦解氷消遂受印可三十年只以此印拈諸方解路瘥病不假驢馱藥緊要處豈有如許多佛法也林間録云師辭明曰大事畢竟如何明呵曰著衣喫飯不是畢竟屙屎送尿不是畢竟後開法同安初受請日泐潭遣僧來審提唱之語有曰智海無性因覺妄以成凡覺妄元虗即凡心而見佛便爾休去將謂同安無折合隨汝顛倒所欲南斗七北斗八泐潭聞之不懌俄聞嗣石霜化主歸上堂世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是甚麼人良久云聻便下座時翠巖真為首座藏主問云適來和尚道第五種不易是甚麼人真曰腦後見腮莫與往來師問翠巖承聞首座常將女子出定話為人是否巖曰無師曰奢而不儉儉而不奢為甚道無巖曰若是本分衲僧也少他鹽醬不得師却回首喚侍者報典座明日只煮白粥洞山圓禪師嗣雪竇年甚少開先暹道者舉之以應筠人之請時師住黃檗因出邑相見於淨戒寺師默無所言但焚香相向危坐而已自申時至三鼓圓即起曰夜深妨和尚偃息趨出明日各還山師問永首座汝在廬山識今洞山老否永曰不識止聞其名久之進曰和尚此回見之如何人師曰奇人永退問侍者汝隨和尚見洞山夜語及何事侍者以實告永曰疑殺天下人有僧侍立師顧視久之問曰百千三昧無量妙門作一句説與汝汝還信否對曰和尚誠言何敢不信師指其左曰過這邊來僧將趨忽咄之曰隨聲逐色有甚了期出去一僧知之即趨入師理前語問之亦對曰安敢不信師又指其左曰過這邊來僧堅住不往師又咄曰汝來親近我反不聽我語出去覺範曰門風壁立佛祖喪氣故能起臨濟已墜之道而今人誣其家風但是平實商量可笑也舜老夫暮年有所開示但曰本自無事從我何求師聞之謂侍者曰老夫耄矣何不有事令無事無事令有事是謂淨佛國土成就衆生座主德普講席有聲兩川稱為義虎因禪者激勸乃造師問阿難問迦葉世尊付金襴外傳何法迦葉呼阿難阿難應諾迦葉曰倒却門前剎竿著意旨如何師曰上人出蜀曾到玉泉否曰曾到又問曾挂搭否曰一夕便發師曰智者道場關將軍打供與結緣幾時何妨普默然良久理前問師俯首普趨出大驚曰兩川義虎不消此老一唾普後住禾山十有二年元祐五年十二月二十五日謂左右曰諸方尊宿死叢林必祭吾以為徒虗設吾若死汝曹當先祭乃令從今辨祭衆以其老又好戲語復曰和尚幾時遷化曰汝輩祭絶即行於是幃寢室坐普其中置祭讀文跪揖上食普飫餐自如自門弟子下及莊力日次為之至明年元日祭絶曰明日雪晴乃行至時晴忽雪雪止普安坐焚香而化示衆舉永嘉禪師道遊江海涉山川尋師訪道為參禪自從認得曹溪路了知生死不相關諸上座那個是遊底山川那個是尋底師那個是參底禪那個是訪底道向淮南兩浙廬山南嶽雲門臨濟而求師訪道洞山法眼而參禪是向外馳求名為外道若以毗盧自性為海般若寂滅智為禪名為內求若外求走殺汝若住於五蘊內求則縛殺汝是故禪者非內非外非有非無非實非虗不見道內見外見俱錯佛道魔道俱惡瞥然與麼去兮月落西山更尋聲色兮何處名邈師室中常問僧曰人人盡有生緣上座生緣在何處正當問答交鋒却復伸手曰我手何似佛手又問諸方參請宗師所得却復垂腳曰我腳何似驢腳三十餘年示此三問學者莫能契旨天下叢林目為三關脫有酬者師無可否斂目危坐人莫涯其意南州潘興嗣嘗問其故師曰已過關者掉臂徑去安知有關吏從關吏問可否此未透關者也師自頌曰生緣有語人皆識水母何曾離得蝦但見日頭東畔上誰能更喫趙州茶我手佛手兼舉禪人直下薦取不動干戈道出當處超佛越祖我腳驢腳並行步步踏著無生直待雲開日現方知此道縱橫總頌曰生緣斷處伸驢腳驢腳伸時佛手開為報正湖參學者三關一一透將來清隱清源云先師初侍棲賢湜泐潭澄歷二十年宗門奇奧經論玄要莫不貫穿及因雲峰指見慈明則一字無用遂設三關語以驗學者而學者如葉公畫龍龍現即怖湛堂準頌云我手佛手十八十九雲散月圓癡人夜走我腳驢腳放過一著龐老笊籬清平木杓人人生緣北律南禪道吾舞笏華亭撑船張無盡頌云我手何似佛手天下衲僧無口縱饒撩起便行也是鬼窟裏走諱不得我腳何似驢腳又被黐膠粘著翻身直上兜率天已是遭他老鼠藥吐不得人人有個生緣鐵圍山下幾千年三災燒到四禪天這漢猶自在旁邊殺得工夫林間録云雲蓋智禪師嘗謂豫言曰昔吾再入黃檗至坊塘見一僧自山中來因問三關語兄弟近日如何商量僧曰有語甚妙可以見意我手何似佛手曰月下弄琵琶或曰遠道擎空鉢我腳何似驢腳曰鷺鷥立雪非同色或曰空山踏落花如何是汝生緣處曰某甲某處人或曰早晨喫白粥如今又肚飢時戲之曰前塗有人問上座如何是佛手驢腳生緣意旨汝將遠道擎空鉢對之耶汝將鷺鷥立雪非同色對之耶若俱將對則佛法混濫若揀擇對則機事偏枯其僧直視無所言吾謂之曰雪峰道底師住歸宗時一夕火起大衆譁動山谷而師安坐如平時僧洪準欲掖之走師叱之準曰和尚縱厭世間慈明法道何所賴耶因整衣起而火已及榻坐抵獄為吏者拷掠百至師怡然引咎不以纍人惟不食而已兩月而後得釋鬚髮不翦皮骨僅在真點胸迎於中途見之不自知泣下曰師兄何至是也師叱之曰這俗漢真不覺下拜智證傳曰下獄不食六十日既釋放菴於石門之南塔嘗謂門弟子曰我在獄證法華經菩薩遊戲三昧經曰菩薩遊戲神通淨佛國土心不好樂呵小乘也以其不能成就衆生耳弟子請聞其説黃龍曰凡獄吏之治有罪者察見其情偽必痛加捶楚欺詐之實盡則自釋雖有酷刑不能申也罪至於死亦所甘心者智迄情枯故也今學者馳求之狂欺詐之病不以知見之慧鍛之何由而釋故其平生止以三種語驗天下衲子豫少年聞老宿夜語及之今草年也其説有補叢林故録焉師風度凝遠叢林中有終身未嘗見其破顏者居積翠時一夕燕坐間光爥室戒侍者令勿言熙寧二年三月十六日四祖演長老通法嗣書上堂山僧才輕德薄豈堪人師蓋不昧本心不欺諸聖未免生死今免生死未出輪回今出輪回未得解脫今得解脫未得自在今得自在所以大覺世尊於然燈佛所無一法可得六祖夜半於黃梅又傳個甚麼乃説偈曰得不得傳不傳歸根得旨復何言憶得首山曾漏泄新婦騎驢阿家牽翌日午時端坐示寂闍維得五色舍利塔於前山袁州楊岐方會禪師遠州宜春冷氏子少警敏不事筆研及出家閲經典輒自神會折節參老宿慈明自南源徙道吾石霜師皆佐之總院事依之雖久然未有省發每咨參明曰庫司事繁且去他日又問明曰監寺異日兒孫遍天下在何用忙為一日明適出雨忽作師偵之小徑既見遂搊住曰這老漢今日須與我説不説打你去明曰監寺知是般事便休語未卒師大悟即拜於泥塗問曰狹路相逢時如何明曰你且躲避我要去那裏去師歸來日具威儀詣方丈禮謝明呵曰未在慈明飯罷恆山行禪者問道多失所在師闞其出未遠即撾鼓集衆慈明怒數曰少叢林暮而升座何從得此規繩乎師曰汾陽乃晚參也一日明上堂師出問幽鳥語喃喃辭雲入亂峰時如何明曰我行荒草裏汝又入深村師曰官不容針更借一問明便喝師曰好喝明又喝師亦喝明連喝兩喝師禮拜明曰此事是個人方能擔荷師拂袖便行白雲端禪師示衆云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而常處此菩提座大衆作麼生説個隨緣赴感底道理祇於一彈指間盡大地含生根機一時應得周足而未嘗動著一毫頭便且喚作隨緣赴感而常處此座祇如山僧此者受法華請相次與大衆相別去宿松縣裏開堂了方歸院去且道還離此座也無若道離則世諦流布若道不離作麼生見得個不離底事莫是無邊剎境自他不隔於毫端十世古今始終不離於當念麼又莫是一切無心一時自遍麼若恁麼正是掉棒打月到這裏直須悟始得悟後更須遇人始得你道既悟了便休又何必更須遇人若悟了遇人底當垂手方便之時著著自有出身之路不瞎却學者眼若祇悟得乾蘿蔔頭底不惟瞎却學者眼兼自己動便先自傷鋒犯手你看我楊岐先師問慈明師翁道幽鳥語喃喃舉至師禮拜大衆須知悟了遇人者向十字街頭與人相逢却在千峯頂上握手千峯頂上相逢却在十字街頭握手所以山僧嘗有頌云他人住處我不住他人行處我不行不是與人難共聚大都緇素要分明山僧此者臨行解開布袋頭一時撒在諸人面前了也有眼者莫錯怪好珍重一日慈明問師馬祖見讓師便悟去且道迷却在甚麼處師曰要悟即易要迷即難圜悟頌云要悟即易要迷即難絲毫透不盡咫尺隔千山説食終不飽著衣方免寒憶昔五臺曾有語前三三與後三三後住楊岐受請日拈法衣示衆云會麼若也不會今日無端走入水牯牛隊裏去也還知麼筠陽九岫萍實楊岐遂升座時有僧出師曰漁翁未擲釣躍鱗衝浪來僧便喝師曰不信道僧拊掌歸衆師曰消得龍王多少風問師唱誰家曲宗風嗣阿誰師曰有馬騎馬無馬步行曰少年長老足有機籌師曰念汝年老放汝三十棒問如何是佛師曰三腳驢子弄蹄行曰莫祇這便是麼師曰湖南長老徑山杲禪師頌云楊岐一頭驢只有三隻腳潘閬倒騎歸攧殺黃幡綽乃曰更有問話者麼試出來相見楊岐今日性命在汝諸人手裏一任橫拖倒拽為甚麼如此大丈夫兒須是當衆決擇莫背地裏似水底按葫蘆相似當衆引驗莫便面赤有麼有麼出來決擇看如無楊岐今日失利師便下座九峰勤和尚把住云今日喜得個同參師曰作麼生是同參底事曰九峰牽犂楊岐拽耙師曰正恁麼時楊岐在前九峰在前勤擬議師拓開曰將謂同參元來不是慈明忌辰設齋衆才集師於真前以兩手揑拳安頭上以坐具畫一畫打一圓相便燒香退身三步作女人拜首座曰休揑怪師曰首座作麼生座曰和尚休揑怪師曰兔子喫牛嬭第二座近前打一圓相便燒香亦退身三步作女人拜師近前作聽勢座擬議師打一掌曰這漆桶也亂做妙喜曰楊岐老漢大似溺却一船麻却來戽斗裏掃問僧秋色依依朝離何處曰去夏在上藍師曰不涉程塗一句作麼生道曰兩重公案師曰謝上座答話僧喝師曰那裏學得這虗頭來曰明眼尊宿難瞞師曰恁麼則楊岐隨上座去也僧擬議師曰念汝鄉人在此放汝三十棒問來僧曰雲深路僻高駕何來曰天無四壁師曰踏破多少草鞋僧便喝師曰一喝兩喝後作麼生曰看這老和尚著忙師曰拄杖不在且坐喫茶又問來僧敗葉堆雲朝離何處曰觀音師曰觀音腳跟下一句作麼生道曰適來相見了也師曰相見底事作麼生其僧無對師曰第二上座代參頭道看亦無對師曰彼此相鈍置室中問僧栗棘蓬你作麼生吞金剛圈你作麼生透一日三人新到師問三人同行必有一智提起坐具曰參頭上座喚這個作甚麼曰坐具師曰真個那曰是師復曰喚作甚麼曰坐具師顧左右曰參頭却具眼問第二人欲行千里一步為初如何是最初一句曰到和尚這裏爭敢出手師以手畫一畫僧曰了師展兩手僧擬議師曰了問第三人近離甚處曰南源師曰楊岐今日被上座勘破且坐喫茶一日七人新到師問陳勢既圓作家戰將何不出陳與楊岐相見僧以坐具便打師曰作家僧又打師曰一坐具兩坐具又作麼生僧擬議師背面立僧又打師曰你道楊岐話頭落在甚處僧指面前曰在這裏師曰三十年後遇明眼人不得錯舉好且坐喫茶一日八人新到師問一字陳圓作家戰將何不出陳與楊岐相見僧云和尚照顧話頭師曰楊岐今日抱馬拖旗去也僧云新戒打退鼓師云道僧擬議師云道僧撫掌一下師曰謝上座答話僧無語師曰將頭不猛纍及三軍且坐喫茶楊畋提刑山下過師出接提刑乃問和尚法嗣何人曰慈明大師曰見個甚麼道理便法嗣他曰共鉢盂喫飯曰與麼則不見也師捺膝曰甚麼處是不見楊大笑師曰須是提刑始得又曰請入院燒香楊曰却待回來師乃獻茶信楊曰這個却不消得有甚乾𪹼𪹼底禪希見云些子師指茶信曰這個尚自不要豈況乾𪹼𪹼底禪楊擬議師呈頌曰示作王臣佛祖罔措為指迷源殺人無數楊曰和尚為甚麼就身打劫師曰元來是我家裏人楊大笑師曰山僧罪過皇祐改元示寂塔於雲蓋洪覺範曰臨濟七傳而得石霜圓圓之子一為積翠南一為楊岐會南之設施如坐四達之衢聚珍怪百物而鬻之遺簪墮珥隨所探焉駸駸末流冒其氏者未可一二數也會乃如玉人之治璠璵碔砆廢矣故其子孫皆光明照人克世其家蓋碧落無贋本也洪州翠巖可真禪師參慈明因之金鑾同善侍者坐夏善慈明高弟師自負親見慈明天下無可意者善與語知其未徹一日同山行舉論鋒發善拈一片瓦礫置盤石上曰若向這裏下得一轉語許你親見慈明師左右視擬對之善叱曰佇思停機情識未透何曾夢見師愧悚即還石霜慈明見來叱曰本色行腳人必知時節有甚急事夏未了早至此師泣曰被善兄毒心終礙塞人故來見和尚明遽問如何是佛法大意師曰無雲生嶺上有月落波心明瞋目喝曰頭白齒豁猶作這個見解如何脫離生死師悚然求指示明曰汝問我師理前語問之明震聲喝曰無雲生嶺上有月落波心師於言下大悟師因首座不安遣侍者往問訊座晚間自來陳謝師曰法身不安色身不安座曰早來承侍者相問師曰泥裏洗土塊座曰和尚常用此機師曰夜來天帝釋冠子為甚落地座無對師曰南山起雲北山下雨遂喝出師因黃國博問百丈華長老既是百丈為甚却短小華曰今日好天晴黃不契却請師代語師曰但問將來黃再問師曰須彌南畔把手同行黃佇思却問意旨如何師曰蚊子上鐵牛黃又佇思曰不會請和尚為某甲説師曰你離却妻子來老僧為你説黃曰祇如和尚還行得麼師曰上藍寺裏送客一日行百千遭師語南禪師曰我他日十字街頭作個粥飯主人有僧自黃檗來我必勘之南公曰何必他日我作黃檗僧汝今試問師便問近離甚處曰黃檗師曰見説堂頭老子腳跟不點地是否曰上座何處得這消息來師曰有人傳至南公笑曰却是汝腳跟不點地師亦大笑而去好問僧魯祖常見僧來參何故便面壁去未有契其機者自作偈曰坐斷千山與萬山勸人除却是非難池陽近日無消息果中當年不目觀師將入滅示疾甚勞苦席藁於地轉側不少休哲侍者垂泣曰平生訶佛罵祖今何為乃爾師熟視呵曰汝亦作此見解耶即起趺坐呼侍者燒香煙起遂示寂金陵蔣山贊元禪師傅大士遠孫三歲出家七歲為大僧十五遊方謁慈明明一見曰好好著槽廠師遂作驢鳴明曰真法器耳俾為侍者助舂破薪泯泯者十年明歿葬於石霜師種植八年乃去兄事蔣山心禪師心歿乃繼其席王荊公與師遊如昆弟問祖師意旨師不答公益扣之師曰公般若有障三有近道之質一更一兩生來或得純熟公曰願聞其説師曰公受氣剛大世緣深以剛大氣遭深世緣必以身任天下之重懷經濟之志用舍不能必則心未平以未平之心持經世之志何時能一念萬年哉又多怒而學問尚理於道為所知愚此其三也特視名利如脫髮甘淡泊如頭陀此為近道且當以教乘滋茂之可也公再拜受教及公貴震天下無月無耗師未嘗發視公罷政府舟至石頭入寺已二鼓師出迎一揖而退公坐束偏從官賓客滿座公環視問師所在侍者對曰已寢久矣公結屋定林往來山中稍覺煩動即造師相向默坐終日而去公弟平甫素豪縱見師即悚然加敬問佛法大意師亦不答平甫固請為説師曰佛祖無所異於人所以異者能自護心念耳岑樓之木必有本本於毫末滔天之水必有原原於濫觴清淨心中無故動念危乎岌哉甚於岑樓浩然橫肆甚於滔天其可動耶佛祖更相付授必丁寧之曰善自護持平甫曰佛法止於此乎師曰至美不華至言不煩夫華與煩去道遠甚而流俗以之申公論治世之法猶謂為治者不在多言顧力行如何耳況出世間法乎每客來無貴賤寒溫外無別語即斂目如入定嘗饌僧俄報厨庫火且及潮音堂衆吐飯蒼黃師啜啖自若食畢無所問又嘗出郭有狂人入寺手殺一僧即自剄尸相枕左右走報交武於道師歸過尸處未嘗視登寢堂危坐職事側立冀師有所處分師斂目如平日竟不得請而去師提綱宗要機鋒迅敏僧問魯祖面壁意旨如何師曰住持事繁問如何是大善知識師曰屠牛剝羊曰為甚麼如此師曰業在其中元祐元年忽曰吾欲還東吳促辦嚴俄化洪州大寧道寬禪師僧問如何是露地白牛師以火筯橫火罏上曰會麼曰不會師曰頭不欠尾不剩問丹霞燒木佛院主為甚眉鬚墮落師曰賊不打貧兒家在同安見僧遷化僧問既是同安為甚病僧遷化師曰布施不如還債問飲光正見為甚拈花却微笑師曰忍俊不禁問天下禪客為甚麼出這個不得師曰往往如斯僧問教中云始知衆生本來成佛為甚麼有煩惱菩提師曰甘草甜黃連苦曰却成兩個去也師曰你不妨會得好問既是一真法界為甚麼有千差萬別師曰根深葉盛曰未審還出得這個也無師曰弄巧成拙潭州道吾悟真禪師示衆舉洞山云五臺山上雲蒸飯佛殿階前狗矢天幡竿頭上煎䭔子三個猢孫夜簸錢老僧即不然三面狸奴腳踏月兩頭白牯手拏煙戴冠碧兔立庭柏脫殼烏龜飛上天老僧葛藤盡被汝諸人覷破了也洞山老人甚是奇特雖然如是只行得三步四步且不過七跳人跳且道誵訛在甚麼處老僧今日不惜眉毛一時布施良久曰丁寧損君德無言真有功任從滄海變終不為君通問如何是常照曰針鋒上須彌如何是寂照曰眉毛裏海水如何是本來照曰草鞋裏𨁝跳問者退師曰常照寂照本來照草鞋底下常𨁝跳更會針鋒上須彌眉毛中水常渺渺問僧甚處來曰僧堂裏來曰聖僧道甚麼僧近前不審師曰東家作驢西家作馬曰過在甚麼處曰萬里崖州上堂拗折稱衡將甚麼定斤兩拈却鉢盂匙箸將甚麼喫飯不如向三家村裏東卜西卜忽然卜著脫却鼻孔上堂夜來雷聲震地今朝絀雨霏霏乾枯滋潤萬物萌芽且道嘉州大像長得髭鬚多少還有道得者麼若也道得陝府鐵牛是常不輕菩薩若道不得土宿拽脫你鼻孔師問僧先行不到末後太過僧擬提坐具師指曰離却坐具作麼生道僧曰和尚那裏得這消息來師便打僧擬提起坐具師又打曰瞎漢僧擬議師又打曰且坐喫茶僧便坐師曰甚處來曰石霜師曰怪得師臥病院主問和尚近日尊候如何師曰粥飯頭不得氣力良久曰會麼曰不會師曰老鼠尾上帶研椎數人新到禮拜師曰總是浙裏師僧曰猢孫向火師曰𨁝跳作麼僧曰今日得見和尚師曰伏惟尚響僧無語師便打師在慈明會裏一日提螺螄一籃繞院行云賣螺螄令衆下語皆不契有一老宿揭簾見以目顧視師放身便臥師放籃子便行蘇州定慧超信禪師問僧忠國師無情説法南方尊宿如何商量僧曰諸方皆云六根互用師曰教中道無眼耳鼻舌身意將甚麼互用僧擬議師劈脊便打越州薑山方禪師僧問如何是不動尊師曰單著布衫穿市過曰學人未曉師曰騎驢踏破洞庭波曰透過三級浪專聽一聲雷師曰伸手不見掌曰還許學人進向也無師曰踏地告虗空曰雷門之下布鼓難鳴師曰八花毬子上不用繡紅旗曰三十年後此話大行師便打正作二則透過下另一則問奔流度刃疾𦦨過風未審薑山門下還許借借也無師曰天寒日短夜更長曰錦帳繡鴛鴦行人難得見師曰髑髏裏面氣衝天僧召和尚師曰雞頭鳳尾曰諸方泥裏洗薑山畫將來師曰薑山今日為客且望闍黎善傳雖然如是不得放過乃拍禪牀一下宣州興教院坦禪師為銀工淬礪瓶器次有省即出家參琅邪機語頓契後依天衣舉住興教有雪竇化主省宗出問諸佛未出世人人鼻孔撩天出世後為甚麼杳無消息師曰雞足峰前風悄然宗曰未在更道師曰大雪滿長安宗曰誰人知此意令我憶南泉拂袖歸衆更不禮拜師曰新興教今日失利便歸方丈令人請宗至師曰適來錯祇對一轉語人天衆前何不禮拜蓋覆却宗曰大丈夫膝下有黃金爭肯禮拜無眼長老師曰我別有語在宗乃理前語至未在更道處師曰我有三十棒寄與打雪竇宗禮拜江州歸宗可宣禪師漢州人參琅邪一語頓契後住歸宗時郭功甫任南昌尉相與甚厚而為郡守所捃寄書功甫曰某世緣尚有六年奈州主抑逼當棄餘喘托生公家願無見阻功甫閲書驚喜且頷之中夜其妻夢間見師入其寢失聲曰此不是和尚來處功甫撼而問之以夢告功甫笑取書以示果孕及生乃名宣老期年記問如昔三歲白雲端過功甫始見即曰吾姪來也雲曰與和尚相別幾年宣倒指曰四年矣雲曰甚處相別曰白蓮莊上雲曰以何為驗曰爹爹媽媽明日請和尚齋忽聞推車聲雲問門外是甚麼聲宣以手作推車勢雲曰過後如何曰平地兩條溝果六周無疾而逝秀州長水子璿講師郡之嘉興人也自落髮誦楞嚴不輟從洪敏法師講至動靜二相了然不生有省謂敏曰敲空擊木尚落筌蹄舉目揚眉已成擬議去此二塗方契斯旨敏拊而證之然欲探禪源罔知攸往聞琅邪道重當世即趨其席值上堂次出問清淨本然云何忽生山河大地琅邪憑陵答曰清淨本然云何忽生山河大地師領悟禮謝曰願侍巾瓶琅邪謂曰汝宗不振久矣宜勵志扶持報佛恩德勿以殊宗為介也乃如教再拜以辭後住長水承稟日顧衆曰道非言象得禪非擬議知會意通宗曾無別致由是二宗仰之嘗疏楞嚴等經盛行於世南嶽雲峰文悅禪師南昌徐氏子短小粹美有精識年十九杖䇿遍遊江淮常默坐下板念耆宿之語疑之曰吾聞臨濟在黃檗三年黃檗不識也陳尊宿者教之令問佛法大意三問而三被打未聞諄諄授之也至大愚而悟則為江西宗耆宿教我意非徒然我所欲聞者異耳乃扣大愚值愚升座曰大家相聚喫莖虀若喚作一莖虀入地獄如箭射便下座師大駭夜造方丈愚問來何所求曰求心法愚曰法輪未轉食輪先轉後生趁色力健何不為衆乞食我忍飢不暇何暇為汝説禪乎師不敢違未幾愚移翠巖師納疏罷復過翠巖求指示巖曰汝不念乍住屋壁疏漏又寒雪宜為衆乞炭師亦奉命事罷復造丈室巖曰佛法不怕爛却堂司闕人今以煩汝師受之不樂恨巖不去心地坐後架桶箍忽散自架墮落師忽然開悟頓見巖用處走搭伽黎上寢堂巖迎笑曰維那且喜大事了畢師再拜不及吐一辭而出服勤八年後出世翠巖時首座領衆出迎問曰德山宗乘即不問如何是臨濟大用師曰你甚處去來座擬議師便掌座擬對師喝曰領衆歸去一衆畏服僧問巔山巖崖還有佛法也無師曰有曰如何是巔山巖崖佛法師曰猢孫倒上樹妙喜曰若人信受奉行一生參學事畢曾入室舉僧問趙州萬法歸一一歸何所師便喝僧茫然師便問趙州道甚麼僧擬議師以拂子驀口打僧問佛不化本國和尚為甚麼歸鄉住持師曰放過一著僧擬議師便打上堂未達境惟心起種種分別達境惟心已分別即不生知諸法惟心便捨外塵相諸禪德只如大地山河明暗色空法法現前作麼生説個捨底道理於此明得正在半塗須知向上更有一竅在便下座解夏上堂僧問西天以蠟人為驗和尚此間以何為驗師曰鐵彈子曰學人無用功處也師曰學語之流上堂即今休去便休去欲覓了時無了時此事若向言語上作解意根下卜度天地懸殊大丈夫一刀兩段猶未相應豈況被人喚去方丈裏塗糊指注舉楞嚴肇論根塵色法向上向下有無得失他時後日死不得其地近世更有一般宗匠二三十年馳聲走譽只管教人但莫上他言句喚作透聲色便問東答西以為格外之句將此狂解相沿習從此混傷宗教誑惑後生苦哉苦哉我王庫中無如是刀總若似與麼行腳清風林下守株人涼兔漸遙春草緑下座嘉祐七年七月八日升座辭衆説偈曰住世六十六年為僧五十九夏禪流若問旨歸鼻孔大頭向下遂泊然而化闍維得五色舍利塔于禹溪之北安吉州西余端師子始見弄師子發明心要往見龍華受印可遂歸里中合綵為師子皮時被之因號端師子到華亭衆請上堂師升座曰靈山師子雲間哮吼佛法無可商量不如打個筋斗便下座章丞相請説法吳山開堂日僧宣疏至推倒回頭躍翻不托七軸之蓮經未誦一聲之漁父先聞回頭和尚以左道惑衆與潤守呂公方食肉師徑趨至指之曰正當與麼時如何是佛回頭窘無以對師捶其頭推倒而去妖人不托説法秀州聽者傾城師搊住問如何是佛不托擬議師躍之而去常誦法華經好歌漁父詞故云師命止宣遂登座拈香祝聖罷引聲吟曰本是瀟湘一釣客自東自西自南北大衆雜然稱善師顧笑曰諦觀法王法法王法如是便下座子厚與師對坐方食次言欲請師住墳寺師瞋目對之曰章惇章惇請我看墳我却喫素你却喫葷子厚為大笑問羚羊未挂角時如何師曰怕曰既是大善知識為甚却怕師曰不曾見恁差異畜生偶病牙謂衆僧曰明日遷化去衆以為戲語請説偈師索筆大書曰端師子太慵懶未死牙齒先壞爛二時伴衆赴堂粥飯都趕不辦如今得死是便宜長眠百事皆不管第一不著看官第二不著喫粥飯五更遂化東京天寧芙蓉道楷禪師幼學辟穀隱伊陽山後試法華得度謁投子於海會乃問佛祖言教如家常茶飯離此之外別有為人處也無子曰汝道寰中天子敕還假堯舜禹湯也無師欲進語子以拂子摵師口曰汝發意來早有三十棒也師即開悟再拜便行子曰且來闍黎師不顧子曰汝到不疑之地耶師以手掩耳後作典座子曰厨務勾當不易師曰不敢子曰煮粥耶蒸飯耶師曰人工淘米著火行者煮粥蒸飯子曰汝作甚麼師曰和尚慈悲放他間去一日侍投子遊菜園子度拄杖與師師接得便隨行子曰理合恁麼師曰與和尚提鞋挈杖也不為分外子曰有同行在師曰那一人不受教子休去至晚問師早來説話未盡師曰請和尚舉子曰卯生日戌生月師即點燈來子曰汝上來下去總不徒然師曰在和尚左右理合如此子曰奴兒婢子誰家屋裏無師曰和尚年尊缺他不可子曰得恁殷勤師曰報恩有分大觀初開封尹李孝壽奏師道行卓冠叢林宜有以褒顯之敕賜紫及定照師號師力陳昔誓不受利名具表辭上不允令孝壽躬往諭天子旌善之意師確然不回上怒收付有司有司憐其無罪曰長老枯瘁有疾乎言有疾即於法免刑師曰已悉厚意乃不敢妄言實無疾也恬然受刑編管淄州從之者愈衆明年冬敕自便菴于芙蓉湖示衆略曰夫出家者為厭塵勞求脫生死休心息念斷絶攀緣遇聲遇色如石上栽花見利見名如眼中著屑無始以來此等不是不曾經歷何須苦苦貪戀如今不歇更待何時能盡今時更有何事若得心中無事佛祖猶是冤家一切世事自然冷淡方始那邊相應你不見隱山至死不肯見人趙州至死不肯告人匾擔拾橡栗為食大梅以荷葉為衣紙衣道者祇披紙玄泰上座祇著布石霜置枯木堂與人坐臥祇要死了你心投子使人辦米同煮共餐要得省取你事且從上諸聖有如此榜樣若無長處如何甘得諸仁者若也於斯體究的不虧人若也不肯承當向後深恐費力又云山僧今日向諸人説家門已是不著便豈可更去升堂入室拈槌竪拂張眉努目東棒西喝如癎病發相似不見達磨西來少室山下面壁九年二祖至於立雪斷臂可謂受盡艱辛然而達磨不曾措一辭二祖不曾問著一句喚達磨作不為人得麼喚二祖作不求師得麼作五偈述其門風一曰妙唱不干舌偈曰剎剎塵塵處處談不參禪處善財參空生也解通消息花雨巖前鳥不銜二曰死蛇驚出草偈曰日炙風吹草裏埋觸他毒氣又還乖暗地若教開死口長安依舊絶人來三曰解針枯骨吟偈曰死中活得是非常密用他家別有長半夜髑髏吟一曲氷河紅𦦨却清涼四曰鐵鋸和三臺偈曰不是宮商調誰人和一場伯牙何所措此曲舊來長五曰古今無間偈曰一法元無萬法空個中那許悟圓通將謂少林消息斷桃花依舊笑春風政和八年五月十四日索筆書偈曰吾年七十六世緣今已足生不愛天堂死不怕地獄撒手橫身三界外騰騰任運何拘束移時乃逝隨州大洪山報恩禪師衛之黎陽劉氏子世皆碩儒師未冠舉方略擢上第後厭塵境請于朝乞謝簪紱為僧上從其請遂遊心祖道至投子未久即悟心要子曰汝再來人也宜自護持與張無盡友善張嘗以書問三教大要曰清涼疏第三卷西域邪見不出四見此方儒道亦不出此四見如莊老計自然為因能生萬物即是邪因易曰太極生兩儀太極為因亦是邪因若謂一陰一陽之謂道能生萬物亦是邪因若計一為虗無則是無因今疑老子自然與西天外道自然不同何以言之老子曰常無欲以觀其妙常有欲以觀其徼無欲則常有徼則已入其道矣謂之邪因豈有説乎易曰一陰一陽之謂道陰陽不測之謂神神也者妙萬物而為言寂然不動感而遂通天下之故今乃破陰陽變易之道為邪因撥去不測之神豈有説乎望紙後批示以斷疑網故也師答曰西域外道宗多塗要其會歸不出有無四見而已謂有見無見亦有亦無見非有非無見也蓋不即一心為道則道非我有故名外道不即諸法是心則法隨見異故名邪見如謂之有有則有無如謂之無無則無有有無則有見競生無有則無見斯起若亦有亦無見非有非無見亦猶是也夫不能離諸見則無以明自心無以明自心則不能知正道矣故經云言詞所説法小智妄分別不能了自心云何知正道又曰有見即為垢此則未為見遠離於諸見如是乃見佛以此論之邪正異塗正由見悟殊致故也故清涼以莊老計道法自然能生萬物易謂太極生兩儀一陰一陽之謂道以自然太極為因一陰一陽為道能生萬物則是邪因計一為虗無則是無因嘗試論之夫三界惟心萬緣一致心生故法生心滅故法滅推而廣之彌綸萬有而非有統而會之究竟寂滅而非無非無亦非非無非有亦非非有四執既亡百非斯遣則自然因緣皆為戲論虗無真實俱是假名矣至若謂太極陰陽能生萬物常無常有斯為衆妙之門陰陽不測是謂無方之神雖聖人設教示悟多方然既異一心寧非四見何以明之蓋虗無為道道則是無若自然若太極若一陰一陽為道道則是有常無常有則是亦有亦無陰陽不測則是非有非無先儒或謂妙萬物謂之神則非物物物物物似應作非物則亦是無故西天諸大論師皆以心外有法為外道萬法惟心為正宗蓋以心為宗則諸見自亡言雖或異未足以為異也心外有法則諸見競生言雖或同未足以為同也雖然儒道聖人固非不知之乃存而不論耳良以未即明指一心為萬法之宗雖或言之猶不論也如西天外道皆大權菩薩示化之所施為橫生諸見曲盡異端以明佛法是為正道此其所以為聖人之道順逆皆宗非思議之所能知矣故古人有言緣昔真宗未至孔子且以繫心今知理有所歸不應猶執權教然知權之為權未必知權也知權之為實斯知權矣是亦周孔老莊設教立言之本意一大事因緣之所成始所成終也然則三教一心同塗異轍究竟道宗本無言説非維摩大士孰能知此意也東京慧林宗本圓照禪師無錫管氏子謁天衣衣舉天親從彌勒內宮而下無著問云人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審説甚麼法天親曰祇説這個法如何是這個法師久而開悟而喜寢鼻息聞者厭之白於衣衣曰此子吾家精進幢也汝輩他日當依賴之無多談衣一日室中問師即心即佛時如何師曰殺人放火有甚麼難名遂藉甚高麗僧統義天以王子奉國命使於朝聞師名請以弟子禮見問其所得以華嚴經對師曰華嚴經三身佛報身説耶化身説耶法身説耶義曰法身説師曰法身遍周沙界當時聽衆何處蹲立義茫然無對李端願居士世以佛學名師問曰十方同聚會個個學無為既曰無為作麼生學李無對神宗最重師嘗召對師翛然自如無所加損出都日王公貴人送者車騎相屬師誨之曰歲月不可把玩老病不與人期惟勤修勿怠是真相為聞者莫不感動出世於瑞光開堂日集衆擊鼓鼓旋於地圓轉震響衆驚却有僧出曰此和尚法雷震地之祥也言畢失僧所在自是法席日盛衆恆五百住淨慈時民張氏有女子死母夢女以罪報為蛇覺得蛇棺下持詣師為説法令置故處俄有黑蟬翔棺上而蛇亡母祝曰果我女入我籠更持汝詣淨慈果入師復為説法其夕夢女曰二報幸解脫矣元符二年十二月甲子將入滅沐浴而臥門弟子環擁請曰和尚道遍天下今日不可無偈幸強起安坐師熟視曰癡子我尋常尚懶作偈今日特地圖個甚麼尋常要臥便臥不可今日特地坐也索筆大書曰後事付守榮擲筆憨臥撼之已去矣師老隱于蘇之靈巖門弟子遂塔全身焉洪覺範曰富鄭公居洛中見顒華嚴誦本語作偈寄之曰因見顒師悟入深夤緣傳得老師心東南謾説江山遠目對靈光與妙音王顯謨漢之初見本登座以目四顧乃證本心豫聞馬鳴曰如來在世衆生色心殊勝圓音一演隨類得解今去佛之世二千餘年而能使王公貴人聞風而悟瞻顏而證則其大願真慈之力無愧紹隆之職者東京法雲寺法秀禪師秦州辛氏子母夢老僧托宿覺而有娠先是麥積山老僧與應乾寺魯和尚者善嘗欲從魯遊方魯老之既去謂魯曰他日當尋我竹鋪坡前鐵場嶺下魯後聞其所俄有兒生既往視之兒為一笑三歲願從魯歸遂承魯姓十九試經圓具習圓覺華嚴妙入精義而頗疑禪宗至隨州護國讀淨果禪師曰僧問報慈如何是佛性慈曰誰無又問淨果果曰誰有其僧因有悟師大笑曰豈佛性敢有無之矧又曰因以有悟哉其氣拂膺聞壞禪師法席之盛徑往參謁懷貌寒危坐垂涕沾衣師初易之懷收涕問座主講何經師曰華嚴曰華嚴以何為宗師曰法界為宗曰法界以何為宗師曰以心為宗曰心以何為宗師無對懷曰毫𨤲有差天地懸隔汝當自看必有發明後聞僧舉白兆參報慈情未生時如何慈曰隔師忽大悟住真州長蘆衆千人有全椒長老至登座衆目笑之無出問者師出拜趨問如何是法秀自己椒笑曰秀鐵面乃不識自己乎師曰當局者迷一衆服其荷法心長蘆福長老道眼不明常將所得施利舟載往上江齋僧師聞之往驗其虗實適至見福上堂云入荒田不揀可殺顢頇信手拈來草猶較些子便下座師大驚曰説禪如此誰道不會乃謂諸方生滅也遂躬造方丈禮謁具説前事仍請益提唱之語福為依文解義師曰若如此諸方不漫道你不會禪福不肯師曰請打鐘集衆有法秀上座在此與和尚理會福休去李伯時善畫馬師呵曰汝士大夫以畫名矧又畫馬期人誇妙妙入馬腹中亦足懼伯時遂絶筆師勸畫觀音贖過黃魯直工豔詞師亦詆呵之魯直笑曰又當置我馬腹耶師曰汝以豔語動天下人淫心不止馬腹正怨生泥犂耳黃竦然悔謝遂勵精求道元祐五年八月示寂將入滅呼侍者更衣安坐説偈曰來時無物去時空南北東西事一同六處住持無所補師良久監寺惠當進曰和尚何不道末後句師曰珍重珍重言訖而逝延恩法安禪師亦天衣嗣至黃山如意院見敗屋破垣無以蔽風雨安求居之十年大廈如化成乃棄去下江漢航二浙上天台泝淮汶所至接物利生未嘗失言亦未嘗失人晚居武寧延恩寺草屋數楹敗牀不簀師殊安之令尹紏豪右謀為一新師笑曰檀法本以度人今非其發心而強之是名作業不名佛事也棲止十年而叢林成僧至如歸師與秀師昆弟且相得秀所居莊嚴妙天下説法如雲雨其威光可以為兄弟接羽翼而天飛也秀以書招師師讀之一笑而已僧問其故師笑曰吾始見秀有英氣謂可語乃今而後知其癡癡人正不可與語也問者瞚視久之曰何哉師曰比丘法當一鉢行四方秀既不能爾乃於八達衢頭架大屋從人乞飯以養數百間漢非癡乎師每謂人曰萬事隨緣是安樂法元豐甲子七月命弟子取方丈文書聚火焚之以院事付一僧八月辛未歿禮部楊傑居士字次公號無為歷參諸名宿晚從天衣遊衣每引老龐機語令參究深造後奉祠太山一日雞初鳴覩日如盤湧忽大悟乃別老龐偈曰男大須婚女大須嫁討甚間工夫更説無生話書寄衣衣稱善會芙蓉楷禪師公曰與師相別幾年蓉曰七年公曰學道來參禪來蓉曰不打這鼓笛公曰恁麼則空遊山水百無所能也蓉曰別來未久善能高鑒公大笑公有辭世偈曰無一可戀無一可捨太虗空中之乎者也將錯就錯西方極樂金陵蔣山法泉禪師晚奉詔住大相國智海禪寺問衆曰赴智海留蔣山去就孰是衆皆無對師索筆書偈曰非佛非心徒擬議得皮得髓謾商量臨行珍重諸禪侶門外千山正夕陽書畢坐逝明州大梅法英禪師宣和初敕天下僧尼為德士師肆筆解老子詣進上稱善人以為諛明年秋詔復天下僧尼師獨無改志紹興初晨起戴樺皮冠披鶴氅執象簡穿朱履使擊鼓集衆升座召大衆曰蘭芳春谷菊秋籬物物榮枯各有時昔毀僧尼專奉道後平道復僧尼且道僧尼形相作麼生復取冠示衆曰吾頂從來似月圓雖冠其髮不成仙今朝拋下無遮障放出神光照碧天擲之於地隨易僧服提鶴氅曰如來昔日貿皮衣數載慙將鶴氅披還我丈夫調御服須知此物不相宜擲之舉象簡曰為嫌禪板太無端豈料遭他象簡瞞今日因何忽放下普天致仕老仙官擲之提朱履曰達磨携將一隻歸兒孫從此赤腳走借他朱履代麻鞋休道時難事掣肘化鵬未遇不如鵾畫虎不成反類狗擲之橫拄杖曰今朝拄杖化為龍分破華山千萬重復倚肩曰珍重佛心真聖主好將堯德振吾宗擲下拄杖斂目而逝邢州開元法明上座得法報本歸里落魄多嗜酒呼盧醉則唱柳詞數闋人呼為醉和尚一日謂寺衆曰吾明旦當行汝等無他往衆竊笑之翌晨攝衣就座大呼曰吾去矣聽吾一偈衆聞奔視師乃曰平生醉裏顛蹶醉裏却有分別今宵酒醒何處楊柳岸曉風殘月言訖寂然撼之已委蛻矣簽判劉經臣居士字興朝初於佛法未之信會東林總禪師吳迪之因醉心祖道既而謁慧林沖於僧問雪竇如何是諸佛本源竇曰千峰寒色語下有省歲餘官雒幕謁韶山杲將去任辭韶韶曰公如此用心何愁不悟爾後或有非常境界無量歡喜宜急收拾收拾得即成法器收拾不得或致失心未幾復謁智海請問因緣海曰古人道平常心是道你十二時中放光動地不自覺知向外馳求轉疏轉遠公益疑不解一夕入室海舉波羅提尊者對香至王見性是佛之語問公不能對疑甚歸寢至五鼓覺方追念間見種種異相表裏通徹六根震動天地回旋如雲開月現喜不自勝因憶韶山所囑遂抑之及明趨智海以所得告海為證據且曰更須用得始得公曰莫要履踐否海厲聲曰這個是甚麼事却説履踐公默契遂著明道諭儒篇以警世曰明道在乎見性余之所悟者見性而已孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安逸也性也楊子曰視聽言貌思性所有也有見於此則能明乎道矣當知道不遠人人之於道猶魚之於水未嘗須臾離也唯其迷己逐物故終身由之而不知佛曰大覺儒曰先覺蓋覺此耳昔人有言曰今古應無墜分明在目前又曰大道祇在目前要且目前難覩欲識大道真體不離聲色言語又曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止欲識佛去處祇這語聲是此佛者之語道為最親者立則見其參於前也在輿則見其倚于衡也瞻之在前也忽焉地後也取之左右逢其原也此儒者之語道最邇者奈何此道惟可心傳不立文字故世尊拈花而妙心傳於迦葉達磨面壁而宗旨付於神光六葉既敷千花競秀分宗列派各有門庭故或瞬目揚眉擎拳舉指或行棒行喝竪拂拈槌或持叉張弓輥毬舞笏或拽石搬土打鼓吹毛或一默一言一噓一笑乃至種種方便皆是親切為人然祇為太親故人多罔措瞥然見者不隔絲毫其或沉吟迢迢萬里欲明道者宜無忽焉祖祖相傳至今不絶真得吾儒所謂憤而不發開而弗違者矣余之有得實在此門反思吾儒自有此道良哉孔子之言默而識之一以貫之故目擊而道存指掌而意喻凡若此者皆合宗門之妙旨得教外之真機然而孔子之道傳之子思子思傳之孟子孟子既沒不得其傳而所以傳於世者特文字耳故余之學必求自得而後已幸余一夕開悟凡目之所見耳之所聞心之所思口之所談手足之所運動無非妙者得之既久日益見前每以與人人不能受然後知其妙道果不可以文字傳也嗚呼是道也有其人則傳無其人則絶余既得之矣誰其似之乎終余之身而有其人耶無其人耶所不可得而知也故為記頌歌語以流播其事而又著此篇以諭吾徒云幻寄曰簽判不能于千峯寒色瞥地遂帶纍波羅提尊者入無尾巴猢孫隊中輪轉流浪悲夫杭州淨土院惟政禪師律身精嚴蔣侍郎堂與師為方外交蔣一日語師曰明日有客集願師來灑以甘露師諾之矣明日遣人要之師以一偈授曰昨日曾將今日期出門倚杖又思惟為僧祇合居巖谷國士筵中甚不宜竟不往有問者曰師以禪師名乃不談禪何也師曰日夜煩萬象敷演耳言語有間而此法無盡所謂造化無盡藏也師恆騎黃犢故俗呼政黃牛
