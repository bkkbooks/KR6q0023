body:
  text: 六祖下第九世汝州首山省念禪師萊州狄氏子受業於本郡南禪寺才具尸羅遍遊叢席常密誦法華經衆目為念法華也晚於風穴會中充知客一日侍立次穴乃垂涕告之曰不幸臨濟之道至吾將墜於地矣師曰觀此一衆豈無人耶穴曰聰明者多見性者少師曰如某者如何穴曰吾雖望子之久猶恐耽著此經不能放下師曰此亦可事願聞其要穴遂上堂舉世尊以智蓮目顧視大衆乃曰正當恁麼時且道説個甚麼若道不説而説又是埋沒先聖且道説個甚麼師乃拂袖下去穴擲下拄杖歸方丈侍者隨後請益曰念法華因甚不祇對和尚穴曰念法華會也次日師與真園頭同上問訊次穴問真曰作麼生是世尊不説説真曰鵓鳩樹頭鳴穴曰汝作許多癡福作麼何不體究言句又問師曰汝作麼生師曰動容揚古路不墮悄然機穴謂真曰汝何不看念法華下語徑上杲云我當時若見這老漢恁麼道深掘一坑一時埋却更牽牛在上踏過却須放真公出一頭始得山僧恁麼道且不是抑強扶弱亦不是杜撰差排你若識得鵓鳩樹頭鳴意在麻畬裏便識得動容揚古路不墮悄然機遮兩轉語畢竟是一耶是二耶若道是一為甚麼風穴只肯念法華不肯真園頭若道是二爭奈落霞與孤鶩齊飛秋水共長天一色參又一日穴升座顧視大衆師便下去穴即歸方丈白兆楚和尚至汝州宣化風穴令師往傳語才相見提起坐具便問展即是不展即是兆曰自家看取師便喝兆曰我曾親近知識來未嘗輒敢恁麼造次師曰草賊大敗兆曰來日若見風穴和尚待一一舉似師曰一任一任不得忘却師乃先回舉似風穴穴曰今日又被你收下一員草賊師曰好手不張名兆次日才到相見便舉前話穴曰非但昨日今日和贓捉敗師於是名振四方學者望風而靡開法首山問僧不從人薦得底事試道看僧便喝師曰好好相借問惡發作麼僧又喝師曰今日放過即不可僧擬議師喝之問僧近離何處曰襄州師曰夏在何處曰洞山師曰還我洞山鼻孔來曰不會師曰却是老僧罪過問有一人蕩盡來時師還接否師曰蕩盡即置那一人是誰曰風高月冷師曰僧堂內幾人坐臥僧無對師曰賺殺老僧問如何是梵音相師曰驢鳴犬吠乃曰要得親切第一莫將問來問還會麼問在答處答在問處汝若將問來問老僧在汝腳底汝若擬議即沒交涉時有僧出禮拜師便打僧便問挂錫幽巖時如何師曰錯僧曰錯師又打僧寶傳見風穴章前已録入而會元列此於師章中乃首尾語亦異此必師因僧問答而引風穴語發明耳遂復録于此問如何是佛師曰新婦騎驢阿家牽曰未審此語甚麼句中收師曰三玄收不得四句豈能該曰此意如何師曰天長地久日月齊明又僧問新婦騎驢阿家牽意旨如何師曰百歲翁翁失却父曰百歲翁翁豈有父耶師曰汝會也又曰此是獨坐無尊卑從上無一法與人問學人乍入叢林乞師指示師曰闍黎在老僧會裏多少時曰已經冬夏師曰莫錯舉似人乃曰若論此事實不挂一元字腳便下座問仗鏌鋣劍擬取師頭時如何師噓一聲僧曰苦痛深師便打問僧近離何處曰廣慧師曰穿雲不渡水渡水不穿雲離此二途速道曰昨夜宿長橋師曰與麼則合喫首山棒也曰尚未參堂師曰兩重公案曰恰是師曰耶耶夜有僧入室師曰誰僧不對師曰識得汝也僧笑師曰更莫是別人麼因作偈曰輕輕踏地恐人知語笑分明更莫疑智者只今猛提取莫待天明失却雞師問僧近離甚處僧曰襄州師云路上曾逢達磨也無僧近前不審師云這個是驢前馬後底僧云和尚又如何師曰非公境界且坐喫茶僧才坐師又問在甚麼處過夏僧云石門師云水牯牛安樂麼僧云及時水草師曰為甚麼傷人苗稼僧云對和尚不敢造次師云放過即不可便打示衆曰佛法無多子只是汝輩自信不及若能自信千聖出頭來無奈汝何何故如此為向汝面前無開口處祇為汝自信不及向外馳求所以到這裏假如便是釋迦佛也與汝三十棒然雖如是初機後學憑個什麼道理且問汝輩還得與麼也未良久曰若得與麼方名無事示衆諸上座不得盲喝亂喝者裏尋常向你道賓則始終賓主則始終主賓無二賓主無二主若有二賓二主即是兩個瞎漢所以我若立時你須坐我若坐時你須立坐則共你坐立則共你立雖然如是到這裏急著眼始得若是眼孔定動即千里萬里何故如此如隔窗看馬騎相似擬議即沒交涉諸上座既然於此留心直須子細不要掠虗好他日異時賺著你在諸人若也有事近前無事珍重師示衆曰識得拄杖子行腳事畢三角云識得拄杖子入地獄如箭妙峯善舉師語畢著語云錯又舉三角語畢亦著語云錯老僧則不然識得拄杖子錯頌云妙峯三個錯不是無病藥龐公賣笊籬清平道木杓嘗作綱宗偈曰咄哉拙郎君汾陽注曰素潔條然巧妙無人識運機非耳目打破鳳林關蕩盡玲瓏性著靴水上立塵泥自異咄哉巧女兒汾陽曰妙智理圓融攛梭不解織無間功不立看他鬬雞人旁觀審騰距爭功不自傷水牛也不識全力能負不露頭角背陰山子向陽多葉縣省云迥無背面南來北往意如何不墮有無邊若人問我西來意從來無間斷東海東面有新羅大地不奈何或作示衆三首淳化三年十二月四日午時上堂説偈曰今年六十七老病隨緣且遣日今年記却來年事來年記著今朝日至四年月日無爽前記上堂辭衆仍説偈曰諸子謾波波過却幾恆河觀音指彌勒文殊不奈何良久曰白銀世界金色身情與無情共一真明暗盡時都不照日輪午後示全身日午後泊然而化闍維得五色舍利塔于首山語録有小參示衆云老僧擬欲歸鄉什麼人隨得去時有僧問未審和尚什麼時去師云待有伴即向汝道僧云無伴底事作麼生師云盡日不逢人明明不知處僧云忽遇一人又作麼生師云迷子不歸家失却來時路僧云請師指個歸鄉路師云枯木藏龍不存依倚僧云和尚什麼時節却回師云一去不知音六國無消息僧云正當歸鄉底事又作麼生師云獨唱胡家曲無人和得齊僧云忽遇知音在時如何師云山上石人齊拍掌溪邊野老笑呵呵僧云歸鄉回來底事又作麼生師云八國奉朝衣四相無遷改僧云未審居何位次師云文殊不坐金臺殿自有逍遙竹拂枝此應是師臨化問答因附録廣慧真禪師即真園頭風穴問會昌沙汰時護法善神向什麼處去師曰常在闤闠中要且無人見穴曰你徹也妙喜云汝道風穴自徹也未黑水和尚參黃龍問雪覆蘆花時如何龍曰猛烈師曰不猛烈龍又曰猛烈師又曰不猛烈龍便打師於此有省便禮拜棗樹第二世和尚問僧近離甚處曰漢國師曰漢國天子還重佛法也無曰苦哉賴值問著某甲問著別人則禍生師曰作甚麼曰人尚不見有何佛法可重師曰闍黎受戒來多少時曰二十夏師曰大好不見有人便打呂巖真人字洞賓京川人也唐末三舉不第偶於長安酒肆遇鍾離權授以延命術自爾人莫之究嘗遊廬山歸宗書鐘樓壁曰一日清間自在身六神和合報平安丹田有寶休尋道對境無心莫問禪未幾道經黃龍山覩紫雲成蓋疑有異人乃入謁值龍擊鼓升堂龍見意必呂公也欲誘而進厲聲曰座旁有竊法者呂毅然出問一粒粟中藏世界半升鐺內煮山川且道此意如何龍指曰這守尸鬼呂曰爭奈囊有長生不死藥龍曰饒經八萬劫終是落空亡呂薄訝飛劍脅之劍不能入遂再拜求指歸龍詰曰半升鐺內煮山川即不問如何是一粒粟中藏世界呂於言下頓契作偈曰棄却瓢囊摵碎琴如今不戀汞中金自從一見黃龍後始覺從前錯用心龍囑令加護襄州清溪山供進禪師在地藏時居第一座一日地藏上堂二僧出禮拜藏曰俱錯二僧無語下堂請益修山主修曰汝自巍巍堂堂却禮拜擬問他人豈不是錯師聞之不肯修乃問未審上座又作麼生師曰汝自迷暗焉可為人修憤然上方丈請益藏指廊下曰典座入庫頭去也修乃省過又一日師問修山主曰明知生是不生之理為甚麼為生死之所流修曰筍畢竟成竹去如今作篾使還得麼師曰汝向後自悟去在修曰某所見止如此上座意旨又如何師指曰這個是監院房那個是典座房修即禮謝師經行次衆僧隨從乃謂衆曰古人有甚麼言句大家商量時有從上座出衆擬問次師曰這沒毛驢渙然省悟漪即參西院明者升州清涼院休復悟空禪師北海王氏子幼出家十九納戒嘗自謂曰苟尚能詮則為滯筏將趣凝寂復患墮空既進退莫決捨二何之乃參尋宗匠依地藏經年不契直得成病入涅槃堂一夜藏去看乃問復上座安樂麼師曰某甲為和尚因緣背藏指燈籠曰見麼師曰見藏曰祇這個也不背師於言下有省後修山主問訊地藏乃曰某甲百劫千生曾與和尚違背來此者又值和尚不安藏遂竪起拄杖曰祇這個也不背師忽然契悟撫州龍濟紹修禪師別與法眼同參地藏所得謂已臻極暨同辭至建陽途中談次眼忽問古人道萬象之中獨露身是撥萬象不撥萬象師曰不撥眼曰説甚麼撥不撥師懵然不知却回地藏藏問子去未久何以却來師曰有事未決豈憚跋涉山川藏曰汝跋涉許多山川也還不惡師未喻旨乃問古人道萬象之中獨露身意旨如何藏曰汝道古人撥萬象不撥萬象師曰不撥藏曰兩個也師駭然沈思而却問未審古人撥萬象不撥萬象藏曰汝喚甚麼作萬象師方省悟再謁法眼酬詰悉符子方上座自長慶來謁法眼眼舉長慶偈問曰作麼生是萬象之中獨露身子方舉拂子眼曰恁麼會又爭得曰和尚尊意如何眼曰喚甚麼作萬象曰古人不撥萬象眼曰萬象之中獨露身説甚麼撥不撥子方豁然僧寶傳子方問法眼曰公久親長慶乃嗣地藏何意哉眼曰以不解長慶説萬象之中獨露身故子方舉拂子示之眼曰撥萬象不撥萬象方曰不撥萬象眼曰獨露身𠰚方曰撥萬象眼曰萬象之中𠰚子方於是悟旨曰吾幾枉度此生示衆具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有個入處若辨不得莫道不疑好妙喜曰點石化為金玉易勸人除却是非難又云是柱不見柱非柱不見柱是非已去了是非裏薦取妙喜咄云又是從頭起問如何得出三界師曰是三界則一任出曰不是三界又如何師曰甚麼處不是三界問僧甚處來曰翠巖師曰翠巖有何言句示徒曰尋常道出門逢彌勒入門見釋迦師曰與麼道又爭得曰和尚又如何師曰出門逢阿誰入門見甚麼僧於言下有省酒仙遇賢禪師姑蘇長洲林氏子母夢吞大珠而孕生多異祥貌偉怪口容雙拳七歲嘗沈大淵而衣不潤遂去家師嘉禾永安可依三十剃染圓具往參龍華發明心印回居明覺院惟事飲酒醉則成歌頌警道俗因號酒仙偈曰緑水紅桃花前街後巷走百餘遭張三也識我李四也識我識我不識我兩個拳頭那個大兩個之中一個大曾把虗空一𭣟破摩娑令教却恁麼拈取須彌枕頭臥楊子江頭浪最深行人到此盡沈吟他時若到無波處還似有波時用心金斝又聞泛玉山還報頽莫教更漏促趁取月明回貴買朱砂畫月算來枉用工夫醉臥緑楊陰下起來強説真如泥人再三叮囑莫教失却衣珠一六二六其事已足一九二九我要喫酒長伸兩腳眠一𭔏音忽起來天地還依舊門前緑樹無啼鳥庭下蒼苔有落花聊與東風論個事十分春色屬誰家秋至山寒水冷春來柳緑花紅一點動隨萬變江村煙雨濛濛有不有空不空笊籬撈取西北風生在閻浮世界人情幾多愛惡祇要喫些酒子所以倒街臥路死後却産娑婆不願超生淨土何以故西方淨土且無酒酤師於祥符二年上元凌晨浴罷就室合拳右舉左張其口而化鼎州梁山緣觀禪師會下有個園頭參得禪衆中多有不信者一日有僧去撩撥他要其露個消息乃問園頭何不出問堂頭一兩則話結緣園頭云我除是不出問若出須教這老漢下禪牀立地在及梁山上堂果出問曰家賊難防時如何山曰識得不為冤曰識得後如何山云貶向無生國裏曰莫是他安身立命處也無山云死水不藏龍曰如何不活水裏龍山云興波不作浪曰忽然傾湫倒嶽時如何梁山果然從法座上走下把住云闍黎莫教濕著老僧袈裟角徑山杲云須知悟底人與悟底人相見自然縱奪可觀黃龍清云梁山老漢洞達機宜堪稱作者爭奈借便開門展轉令人著賊黃龍即不然才見伊問家賊難防時如何便與一刀兩段教伊永絶窺窬之地然雖如是忽有個衲僧出來却指山僧云賊賊又作麼生支遣具眼者辨取懷安軍雲頂德敷禪師成都帥請就衙升座有樂營將出禮拜起回顧下馬臺曰一口吸盡西江水即不問請師吞却階前下馬臺師展兩手唱曰細抹將來營將猛省隨州智門光祚禪師僧問一切智智清淨還有地獄也無師曰閻羅王是鬼做上堂一法若有毗盧墮在凡夫萬法若無普賢失其境界正當恁麼時文殊向甚麼處出頭若也出頭不得金毛師子腰折幸好一盤飯莫待糝薑椒上堂山僧記得在母胎中有一則語今日舉似大衆諸人不得作道理商量還有人商量得麼若商量不得三十年後不得錯舉上堂赫日裏我人雲霧裏慈悲霜雪裏假褐雹子裏藏身還藏身得麼若藏不得却被雹子打破髑髏示衆數日好雨且道雨從甚處來若道從天降那個是天若道從地出喚甚麼作地若更不會所以古人道天地之前徑時人莫強移個中生解會眼上更安錐韶州大歷和尚初參白雲雲舉拳曰我近來不恁麼也師領旨連州寶華和尚問僧甚處來曰大容來師曰大容近日作麼生曰近來合得一甕醬師喚沙彌將一碗水來與這僧照影因有僧問大容曰天賜六銖披挂後將何報答我皇恩容曰來披三事衲歸挂六銖衣師聞之乃曰這老凍齈作恁麼語話容聞令人傳語曰何似奴緣不斷師曰比為拋磚祇圖引玉蘄州五祖師戒禪師湖州上方嶽禪師少與雪竇顯公結伴遊淮山聞師住五祖喜勘驗顯未欲前嶽乃先往徑造丈室師曰上人名甚麼對曰齊嶽師曰何似泰山嶽無語師即打趕翌日復謁師曰汝作甚麼嶽回首以手畫圓相呈之師曰是甚麼嶽曰老老大大胡餅也不識師曰趁罏竈熱更搭一個嶽擬議師拽拄杖趕出門及數日後嶽再詣乃提起坐具曰展則大千沙界不展則毫髮不存為復展即是不展即是師遽下繩牀把住云既是熟人何須如此嶽又無語師又打出以是觀五祖真一代龍門矣嶽三進而三遭點額張無盡謂雪竇雖機鋒頴脫亦望崖而退得非自全也耶師暮年至大愚倚拄杖談笑而化荊南福昌惟善禪師問僧近離甚麼處對曰大別曰在大別多少時對曰三年曰水牯使甚麼人做對曰不曾觸他一粒米曰二時喫個甚麼僧無語師便打有僧自號映達摩才入方丈提坐具曰展即遍周法界不展即賓主不分展即是不展即是師曰汝平地喫交了也映曰明眼尊宿果然有在師便打映曰奪拄杖打倒和尚莫言不道師曰棺木裏瞪眼漢且坐喫茶茶罷映前白曰適來容易觸忤和尚師曰兩重公案罪不重科便喝去之問俗士年多少曰四十四師曰添一減一是多少其人無對師便打乃自代云適來猶記得問超山主汝名甚麼對曰與和尚同名師曰回互不回互對曰不回互師便打問僧甚麼處來對曰復州曰什麼物與麼來對曰請和尚試辨看曰禮拜著僧曰喏師曰自領出去三門外與汝三十棒南禪師嘗曰我與翠巖悅在福昌時適病寒服藥出汗悅從禪侶遍借被咸無焉有紙衾者皆以衰老亦可數悅太息曰善公本色作家也蓮花峰祥菴主嘗示衆云若是此事最是急切須是明取始得若是明得時中免被拘繫便得隨處安間亦不要將心捺伏須是自然合他古轍去始得才到學處分劑便須露布個道理以為佛法幾時得心地休歇去上座却請與麼相委好示寂日拈拄杖示衆曰古人到這裏為甚麼不肯住衆無對師乃曰為他途路不得力復曰畢竟如何以杖橫肩曰楖𣗖橫擔不顧人直入千峰萬峰去言畢而逝圜悟舉至直入千峯萬峯去著語云也好與三十棒只為他擔板腦後見腮莫與往來又云諸人還裁辨得蓮花峰菴主麼腳跟也未點地在國初時在廬山蓮花峰卓菴古人既得道之後茅茨石室中折腳鐺兒內煮野菜根喫過日且不求名利放曠隨緣垂一轉語且要報佛祖恩傳佛心印才見僧來便拈拄杖云古人到這裏為甚麼不肯住前後二十餘年終無一人答得只這一問也有權有實有照有用若也知他圈䙡不消一揑你且道因什麼二十年如此問既是宗師所為何故只守一橛若向個裏見得自然不向情塵上走凡二十年中有多少人與他平展下語呈見解做盡伎倆設有道得也不到他極則處況此事雖不在言句中非言句即不能辨不見道道本無言因言顯道所以驗人端的處下口便知音古人垂一言半句亦無他只要見你知有不知有他見人不會所以自代云為他途路不得力看他道得自然契理契機幾曾失却宗旨古人云承言須會宗勿自立規矩如今只管撞將去便了得則得爭奈顢頇儱侗若到作家漢將三要語印空印泥印水驗他便見方木逗圓孔無下落處到這裏討一個同得同證臨時向什麼處求若是知有底人開懷通個消息有何不可若不遇人且卷而懷之且問你諸人拄杖子是衲僧尋常用底因什麼却道塗路不得力古人到此不肯住其實金屑雖貴落眼成翳石室善道和尚當時遭沙汰常以拄杖示衆云過去諸佛也恁麼未來諸佛也恁麼現前諸佛也恁麼雪峰一日僧堂前拈拄杖示衆云這個只為中下根人時有僧出問云忽遇上上人來時如何峰拈拄杖便去雲門云我即不似雪峯打破狼藉僧問未審和尚如何雲門便打大凡參問也無許多事為你外見有山河大地內見有見聞覺知上見有諸佛可求下見有衆生可度直須一時吐却然後十二時中行住坐臥打成一片雖在一毛頭上寬若大千沙界雖居鑊湯爐炭中如在安樂國土雖居七珍八寶中如在茅茨蓬蒿下這般事若是通方作者到古人實處自然不費力他見無人搆得他底復自徵云畢竟如何又奈何不得自云楖𣗖橫擔不顧人直入千峯萬峯去這個意又作麼生且道指什麼處為地頭不妨句中有眼言外有意自起自倒自放自收豈不見嚴陽尊者路逢一僧拈起拄杖云是什麼僧云不識嚴云一條拄杖也不識嚴復于地上劄一下云還識麼僧云不識嚴云土窟子也不識嚴復以拄杖擔云會麼僧云不會嚴云楖𣗖橫擔不顧人直入千峯萬峯去古人到這裏為什麼不肯住雪竇有頌云誰當機舉不賺亦還稀摧殘峭峻銷鑠玄微重關曾巨闢作者未同歸玉兔乍圓乍缺金烏似飛不飛盧老不知何處去白雲流水共依依因甚麼山僧道腦後見腮莫與往來才作較計便是黑山鬼窟裏作活計若見得徹信得及千人萬人自然羅籠不住奈何不得動著拶著自然有殺有活雪竇會他意道直入千峯萬峯去方始成頌要知落處看取雪竇頌云眼裏塵沙耳裏土千峯萬峯不肯住落花流水太茫茫剔起眉毛何處去雪竇頌得甚好有轉身處不守一隅便道眼裏塵沙耳裏土此一句頌蓮花峰菴主衲僧家到這裏上無攀仰下絶己躬於一切時中如癡似兀不見南泉道學道之人如癡鈍者也難得禪月詩云常憶南泉好言語如斯癡鈍者還希法燈云誰人知此意令我憶南泉南泉又道七百高僧盡是會佛法底人惟有盧行者不會佛法只會道所以得他衣鉢且道佛法與道相去多少雪竇拈云眼裏著沙不得耳裏著水不得或若有個漢信得及把得住不受人瞞祖佛言教是什麼熱碗鳴聲便請高挂鉢囊拗折拄杖管取一員無事道人又云眼裏著得須彌山耳裏著得大海水有一般漢受人商量祖佛言教如龍得水似虎靠山却須挑起鉢囊橫擔拄杖亦是一員無事道人復云恁麼也得不恁麼也得然後沒交涉三員無事道人中要選一人為師正是這般生鐵鑄就底漢何故或遇惡境界或遇奇特境界到他面前悉皆如夢相似不知有六根亦不知有旦暮直饒到這般田地切忌守寒灰死火打入黑漫漫處去也須是有轉身一路始得不見古人道莫守寒巖異草青坐却白雲宗不妙所以蓮花峰菴主道為他途路不得力直須是千峰萬峰去始得且道喚甚麼作千峰萬峰雪竇只愛他道楖𣗖橫擔不顧人直入千峰萬峰去所以頌出且道向什麼處去還有知得去處者麼落花流水太茫茫落花紛紛流水茫茫閃電之機眼前是什麼剔起眉毛何處去雪竇為什麼也不知他去處只如山僧適來舉拂子且道即今在什麼處你諸人若見得與蓮花峰菴主同參其或未然三條椽下七尺單前試去參詳看此圜悟老人所舉揚古公案世所謂評唱大慧亟其板不令流行者正恐使宗家入講窟孤達磨西來之意永塞悟門也至流而為萬松林泉則直是魔罥較此又大在下風矣聊舉一以蔽諸覽者嘗一臠而知全鼎哉指月録評唱止録此則及南泉與陸亘對牡丹花兩則藍田縣真禪師上堂成山假就於始簣修塗託至於初步上座適來從地爐邊來還與初步同別若言同即不會不遷若言別亦不會不遷上座作麼生會還會麼這裏不是那裏那裏不是這裏且道一處兩處是遷不遷是來去不是來去若於此顯明得便乃古今一如初終自爾念念無常心心永滅所以道觀方知彼去去者不至方上座適來恁麼來却請恁麼去參金陵清涼院文益禪師餘杭魯氏子七歲落髮弱齡稟具屬律匠希覺師盛化於明州師往預聽習究其微旨振錫南邁抵福州參長慶不大發明後同紹修法進三人欲出嶺過地藏院阻雪少憩附罏次藏問此行何之師曰行腳去藏曰作麼生是行腳事師日不知藏曰不知最親切又同三人舉肇論至天地與我同根處藏曰山河大地與上座自己是同是別師曰別藏竪起兩指師曰同藏又竪起兩指便起去雪霽辭去藏門送之問曰上座尋常説三界惟心萬法惟識乃指庭下片石曰且道此石在心內在心外師曰在心內藏曰行腳人著甚麼來由安片石在心頭師窘無以對即放包依席下求決擇近一月餘日呈見解説道理藏語之曰佛法不恁麼師曰某甲辭窮理絶也藏曰若論佛法一切現成師於言下大悟僧寶傳徵山河大地與自己同別處作老僧曰山河大地與自己是同是別師曰同僧竪兩指熟視曰兩個即起去師大驚問聲色兩字甚麼人透得師却謂衆曰諸上座且道這僧還透得也未若會此僧問處透聲色也不難師問修山主毫釐有差天地懸隔兄作麼生會修曰毫釐有差天地懸隔師曰恁麼會又爭得修曰和尚如何師曰毫𨤲有差天地懸隔修便禮拜保寧勇頌云石城親切問同參不話東西便指南明暗兩條來往路依稀屈曲在煙嵐徑山杲云若是徑山門下更買草鞋行腳始得何故毫釐有差天地懸隔何處得這消息來因僧來參次師以手指簾尋有二僧齊去捲簾師云一得一失師指凳子云識得凳子周匝有餘雲門云識得凳子天地懸殊天衣云識得凳子梌楠木做妙喜云識得凳子好剃頭洗腳雖然如是大有人錯會在雪竇云澤廣藏山理能伏豹圜悟勤云雪竇如此道未審是明他語點他語是褒是貶師問覺上座船來陸來曰船來師曰船在甚麼處曰船在河裏覺退師問旁僧曰你道適來這僧具眼不具眼師令僧取土添蓮盆僧取土到師曰橋東取橋西取曰橋東取師曰是真實是虗妄問僧甚處來曰泗州禮拜大聖來師曰今年大聖出塔否曰出師却問旁僧曰汝道伊到泗州不到浮山遠云這僧到即到泗州只是不見大聖道場全云這僧見即見大聖不曾識法眼東禪觀云這僧到也到泗州見也見大聖識也識法眼祇是自討頭不見僧慧超問如何是佛師曰汝是慧超圜悟勤云有者道慧超便是佛所以法眼恁麼答有者道大似騎牛覔牛有者道問處便是有甚麼交涉若恁麼會去不惟孤負自己亦乃深屈古人雪竇頌江國春風吹不起鷓鴣啼在深花裏三級浪高魚化龍癡人猶戽夜塘水師與悟空禪師向火拈起香匙問曰不得喚作香匙兄喚作甚麼空曰香匙師不肯空後二十餘日方明此語雲門問僧甚處來曰江西來門曰江西一隊老宿寱語住也未僧無對後僧問師不知雲門意作麼生師曰大小雲門被這僧被這僧勘破五雲云甚麼處是勘破雲門處要會麼法眼亦被後僧勘破也生法師曰敲空作響擊木無聲師忽聞齋魚聲謂侍者曰還聞麼適來若聞如今不聞如今若聞適來不聞會麼嘗指竹問僧曰還見麼曰見師曰竹來眼裏眼到竹邊曰總不與麼師笑曰死急作麼法燈別云當時但擘眼向師歸宗柔別云和尚祇是不信某甲師因患腳僧問訊次師曰非人來時不能動及至人來動不得且道佛法中下得甚麼語曰和尚且喜得較師不肯自別云和尚今日似減因開井被沙塞却泉眼師曰泉眼不通被沙礙道眼不通被甚麼礙僧無對師代曰被眼礙師見僧搬土次乃以一塊土放僧擔上曰吾助汝僧曰謝和尚慈悲師不肯一僧別云和尚是甚麼心行師便休去師問講百法論僧曰百法是體用雙陳明門是能所兼舉座主是能法座是所作麼生説兼舉有老宿代云某甲喚作個法座歸宗柔代云不勞和尚如此雪竇別老宿語云和尚分半院與某甲始得問六處不知音時如何師曰汝家眷屬一羣子師又曰作麼生會莫道恁麼來問便是不得汝道六處不知音眼處不知音耳處不知音若也根本是有爭解無得古人道離聲色著聲色離名字著名字所以無想天修得經八萬大劫一朝退墮諸事儼然蓋為不知根本真實次地疑第修行三生六十劫四生一百劫如是直到三祇果滿他古人猶道不如一念緣起無生超彼三乘權學等見又道彈指圓成八萬門剎那滅却三祇劫也須體究若如此用多少氣力上堂盡十方世界皎皎地無一絲頭若有一絲頭即是一絲頭法燈云若有一絲頭不是一絲頭謂門弟子曰趙州曰莫費力也大好言語何不仍舊去世間法尚有門佛法豈無門自是不仍舊故諸佛諸祖祇於仍舊中得如初夜鐘不見有絲毫異得與麼恰好聞時無一聲子鬧何以故為及時節無心曰死且不是死止於一切祇為不仍舊忽然非次聞時諸人盡驚愕道鐘子怪鳴也且如今日道孟夏漸熱即不可方隔一日能校多少向五月一日道便成賺須知校絲髮不得於方便中向上座道不是時蓋為賺所以不仍舊寶公曰暫時自肯不追尋歷劫何曾異今日還會麼今日只是塵劫但著衣喫飯行住坐臥晨參暮請一切仍舊便為無事人也又曰見道為本明道為功便能得大智慧力若未得如此三界可愛底事直教去盡才有纖毫還應未可祇如汝輩睡時不瞋便喜此是三界昏亂習熟境界不惺惺便昏亂蓋緣汝輩雜亂所致古人謂之夾幻金即是真其如礦何若覷得徹骨徹髓是汝輩力脫未能如是觀察他什麼樓臺殿閣諸聖未必長把却汝手汝未必依而行之古今如此也又曰出家兒但隨時及節便得寒即寒熱即熱欲識佛性義當觀時節因緣古今方便不少石頭初看肇論至會萬物為己者其惟聖人乎則曰聖人無己靡所不己乃作參同契首言竺土大仙心無過此語也中間亦只尋常説話夫欲會萬物為自己去蓋盡大地無一法可見已而又囑曰光陰莫虗度所以告汝輩但隨時及節便得若也移時失候即虗度光陰於非色中作色解於非色作色解即是移時失候且道色作非色解還當得否若與麼會便是沒交涉正是癡狂兩頭走有甚麼用處但守分過時好上堂大衆久立乃謂之曰祇恁麼便散去還有佛法道理也無試説看若無又來這裏作麼若有大市裏人叢處亦有何須到這裏諸人各曾看還源觀百門義海華嚴論涅槃經諸多䇿子阿那個教中有這個時節若有試舉看莫是恁麼經裏有恁麼語是此時節麼有甚麼交涉所以道微言滯於心首嘗疑誤為緣慮之場實際居於目前翻為名相之境又作麼生得翻去若也翻去又作麼生得正去還會麼莫祇恁麼念䇿子有甚麼用處上堂曰諸上座時寒何用上來且道上來好不上來好或有上座道不上來却好甚麼處不是更用上來作什麼更有上座道是伊也不得一向又須到和尚處始得諸上座且道這兩個人於佛法中還有進趣也未上座實是不得並無少許進趣古人喚作無孔鐵椎生盲生聾無異若更有上座出來道彼二人總不得為什麼如此為伊執著所以不得諸上座總似恁麼行腳總似恁麼商量且圖什麼為復只要弄唇嘴為復別有所圖恐伊執著且執著什麼為復執著理執著事執著色執著空若是理理且作麼生執若是事事且作麼生執著色著空亦然山僧所以尋常向諸上座道十方諸佛十方善知識時常垂手諸上座時常接手十方諸佛垂手時有也什麼處是諸上座時常接手處還有會處會取好若未會得莫道總是都來圓取諸上座傍家行腳也須審諦著些精彩莫只藉少智慧過却時光師有頌曰理極忘情謂如何有喻齊到頭霜夜月任運落前溪果熟兼猿重山長似路迷舉頭殘照在元是住居西三界惟心頌曰三界惟心萬法惟識惟識惟心眼聲耳色色不到耳聲何觸眼眼色耳聲萬法成辦萬法匪緣豈觀如幻大地山河誰堅誰變華嚴六相義頌曰華嚴六相義同中還有異異若異於同全非諸佛意諸佛意總別何曾有同異男子身中入定時女子身中不留意不留意絶名字萬象明明無理事示衆這裏聚集少時為上座僧堂裏這裏聚集少時為上座三門頭這裏聚集少時為上座寮舍裏為復説上座過別有道理會下有數尊宿對一人云諸佛出世也有這個方便一人云今日離章義一人云你道伊為甚麼處一人云點燈等上座來多時也一人云甚麼處聚集來周顯德五年戊午七月十七日示疾李國主駕至慰問閏月五日剃髮澡身告衆訖跏趺而逝顏貌久而如生閲世七十有四坐五十有四夏塔全身於江寧丹陽鄉
