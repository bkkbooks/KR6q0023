body:
  text: 那羅延窟學人瞿汝稷槃談集吳郡天池山人嚴澂道澈甫較後學梅巖釋開慧捐資重梓後學釋義行重閱七佛毗婆尸佛過去莊嚴劫第九百九十八尊偈曰身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住長阿含經云人壽八萬歲時此佛出世種剎利姓拘利若父槃頭母槃頭婆提居般頭婆提城坐波波羅樹下說法三會度人三十四萬八千神足二一名騫茶二名提舍侍者無憂子方膺尸棄佛莊嚴劫第九百九十九尊偈曰起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性長阿含經云人壽七萬歲時此佛出世種剎利姓拘利若父明相母光曜居光相城坐分陀利樹下說法三會度人二十五萬神足二一名阿毗浮二名婆婆侍者忍行子無量毗舍浮佛莊嚴劫第一千尊偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅長阿含經云人壽六萬歲時此佛出世種剎利姓拘利若父善燈母稱戒居無喻城坐婆羅樹下說法二會度人一十三萬神足二一扶遊二多摩侍者寂滅子妙覺拘留孫佛現在賢劫第一尊偈曰見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別長阿含經云人壽四萬歲時此佛出世種婆羅門姓迦葉父禮得母善枝居安和城坐尸利沙樹下說法一會度人四萬神足二一薩尼二毗樓侍者善覺子上勝拘那含牟尼佛賢劫第二尊偈曰佛不見身知是佛若實有知別無佛智者能知罪性空坦然不怖於生死長阿含經云人壽三萬歲時此佛出世種婆羅門姓迦葉父大德母善勝居清淨城坐烏暫婆羅門樹下說法一會度人三萬神足二一舒槃那二多樓侍者安和子導師迦葉佛賢劫第三尊偈曰一切眾生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福長阿含經云人壽二萬歲時此佛出世種婆羅門姓迦葉父梵德母財主居波羅奈城坐尼拘律樹下說法一會度人二萬神足二一提舍二婆羅婆侍者善友子集軍幻寄曰始予錄指月錄七佛第書其偈阿含化跡皆削焉既見世之人粗聞即心即佛者率多撥無報化乃悟昔人載此之妙密葢偈闡法身之極致阿含示化跡之大略可謂斷常俱遣事理兩融者矣傳燈成於道原而裁定於楊大年其旨不苟也因具錄之此錄稍錄神通亦以此釋迦牟尼佛賢劫第四尊姓剎利父淨飯王母摩耶剎利氏自天地更始閻浮洲初闢已來世為王佛歷劫修行值然燈佛授記於此劫作佛後於迦葉佛世以菩薩成道上生覩史陀天名護明大士及應運時至乃降神於摩耶當此土周昭王二十四正宗作九年甲寅四月初八日自摩耶右脇誕生生時放大智光明照十方世界地涌金蓮花自然捧雙足一手指天一手指地周行七步目顧四方曰天上天下惟吾獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平雲峰悅云雲門雖有定亂之謀且無出身之路琅琊覺云雲門可謂將此深心奉塵剎是則名為報佛恩僧問九峰䖍云承聞和尚有言諸聖間出祇是傳語人是否曰是曰世尊一手指天一手指地云天上天下惟吾獨尊為甚麼却喚作傳語人峰曰祇為一手指天一手指地所以喚作傳語人自降生後種種神異具如經言至四十二正宗作二十七年年十九二月八日欲求出家而自念言當復何遇即於四門遊觀見生老病死四等事心有悲喜而作思惟此老病死終可厭離於是夜子時有淨居天人於窓牖中叉手白言出家時至可去矣於是諸天捧所乘馬足超然凌虗逾城而去曰不斷八苦不成無上菩提不轉法輪終不還也淨飯王思甚遣其臣勸諭還宮者萬計確然不回入檀特山修道始於阿藍迦藍處三年學不用處定知非便捨復至頭藍弗處三年學非非想定知非亦捨又至象頭山同諸外道日食麻麥經於六年世尊自思曰今此苦行非正解脫吾當受食而後成佛即沐浴於尼連河天為之偃樹世尊援之而出受牧牛氏女所獻乳糜尋詣畢鉢樹下天帝化人擷瑞草以藉坐景雲祥風四起紛披天魔念世尊道成且受折抑率眾作難窮現可怖可欲諸境世尊泊然不動以指按地地大震魔皆顛仆於是降之故經云以無心意無受行而悉摧伏諸外道先歷試邪法示諸方便發諸異見令至菩提乃於穆王三年癸未正宗作昭王三十三年戊寅歲二月七日之夕入正三昧至八日明星出時廓然大悟成等正覺乃歎曰奇哉一切眾生具有如來智慧德相但以妄想執著不能證得時年三十矣或云成道於臘月八日以周正二月乃夏正臘月也成道後六年歸為淨飯王說法王大喜遣其族五百貴子從之出家世尊一日陞座大眾集定文殊白椎曰諦觀法王法法王法如是世尊便下座芭蕉徹云忙忙者帀地普天雪竇頌云列聖叢中作者知法王法令不如斯會中若有仙陀客何必文殊下一椎幻寄曰於斯薦得則華嚴論所謂未離兜率已降王宮未出母胎度人已畢十世古今始終不離於當念無邊剎境自他不隔於毫端是顧虎頭畵人影雖得其神而終是畵香嚴上樹話雪峰望州亭與汝相見了也話玄沙三種病人亡僧面前觸目菩提深山巖崖佛法高峰見雪巖巖問睡著未夢主人都是依樣畵猫兒咦此俱是畵如何是真咄不見雲門云且道非非想天今有幾人退位過此更參三十年世尊一日陞座默然而坐阿難白椎曰請世尊說法世尊云會中有二比丘犯律行故我不說法阿難以他心通觀是比丘遂乃遣出世尊還復默然阿難又白適來為二比丘犯律是二比丘已遣出世尊何不說法世尊云吾誓不為二乘聲聞人說法便下座南堂靜云前箭猶輕後箭深世尊一日陞座迦葉白椎曰世尊說法竟便下座世尊在忉利天為母說法優填王思佛命匠雕栴檀像及世尊下忉利天像亦出迎世尊三喚三應乃云無為真佛實在我身咦在那一個身世尊在忉利九十日及辭天界而下四眾八部俱往空界奉迎有蓮花色比丘尼作念云我是尼身必居大僧後見佛不如用神力變作轉輪聖王千子圍繞最初見佛果滿其願世尊纔見乃訶云蓮花色比丘汝何得越大僧見吾汝雖見吾色身且不見吾法身須菩提巖中宴坐却見吾法身薦福懷云蓮花色比丘被熱謾且致還知瞿曇老人性命在別人手裏麼世尊示隨色摩尼珠問五方天王此珠所作何色時五方天王互說異色世尊藏珠復擡手曰此珠作何色天王曰佛手中無珠何處有色世尊曰汝何迷倒之甚吾將世珠示之便強說有青黃赤白色吾將真珠示之便總不知時五方天王悉自悟道世尊因黑氏梵志獻合歡梧桐花佛召仙人放下著梵志放下左手一株花佛又召仙人放下著梵志又放下右手一株花佛又召仙人放下著梵志曰吾今兩手俱空更教放下個甚麼佛曰吾非教汝放捨其花汝當放捨外六塵內六根中六識一時捨却無可捨處是汝放身命處梵志於言下悟無生忍世尊因普眼菩薩欲見普賢不可得見乃至三度入定徧觀三千大千世界覓普賢不可得見而來白佛佛曰汝但於靜三昧中起一念便見普賢於是普眼纔起一念便見普賢向空中乘六牙白象雲居舜云諸仁者且作麼生會雲居道普眼推倒世尊世尊推倒普眼你道普賢在甚處世尊因五通仙人問世尊有六通我有五通如何是那一通佛召五通仙人仙人應諾佛曰那一通你問我雪竇顯云老胡元不知有那一通却因邪打正瑯琊覺云世尊不知可謂因正而打邪五通不知因邪而打正雲峰悅云大小瞿曇被外道勘破了有旁不肯底出來我要問你作麼生是那一通翠巖芝云五通如是問世尊如是答要且不會那一通寶葉源頌云那一通你問我口是禍門招因帶果慚愧慈悲大法王丙乙離壬不屬火斷橋倫頌云那一通你問我玄關倒插無鬚鎖等閒一掣掣得開三個老婆相對坐妙喜云今時有一種弄泥團漢往往在那一通處錯認定盤星世尊一日勅阿難食時將至汝當入城持鉢阿難應諾世尊曰汝既持鉢須依過去七佛儀式阿難便問如何是七佛儀式世尊召阿難阿難應諾世尊曰持鉢去世尊因有比丘問我於世尊法中見處即有證處未是世尊當何所示世尊曰比丘某甲當何所示是汝此問世尊因耆婆善別音響至一塚間見五髑髏乃敲一髑髏問耆婆此生何處曰此生人道又敲一曰此生何處曰此生天道又別敲一問耆婆此生何處耆婆罔知生處世尊因七賢女遊尸陀林一女指尸曰尸在這裏人在甚處去一女曰作麼作麼諸姊諦觀各各契悟感帝釋散花曰惟願聖姊有何所須我當終身供給女曰我家四事七珍悉具足惟要三般物一要無根樹子一株二要無陰陽地一片三要呌不響山谷一所帝釋曰一切所須我悉有之若三般物我實無有女曰汝若無此爭解濟人帝釋罔措遂同往白佛佛曰憍尸迦我諸弟子大阿羅漢不解此義唯有諸大菩薩乃解此義世尊因地布髮掩泥獻花於然燈佛然燈見布髮處遂約退眾乃指地曰此一方地宜建一梵剎時眾中有一賢于長者持標於指處插曰建梵剎竟時諸天散花相讚世尊嘗於阿難行次見一古佛塔世尊便作禮阿難曰此是甚麼人塔世尊曰過去諸佛塔阿難曰過去諸佛是甚麼人弟子世尊曰是吾弟子阿難曰應當如是世尊因自恣日文殊三處過夏迦葉欲白椎擯出纔拈椎乃見百千萬億文殊迦葉盡其神力椎不能舉世尊遂問迦葉汝擬擯那個文殊迦葉無對昭覺勤云可惜放過一著待釋迦老子道你欲擯那個文殊便與一椎看他作麼合殺雲居元云一家有事百家忙城東有一老母與佛同生不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面乃至十指掌中總皆是佛雪竇顯云它雖是個老婆宛有丈夫之作既知廻避稍難不免吞聲飲氣如今不欲見佛即許你切忌以手掩面何故明眼底著將謂雪竇門下教你老婆禪世尊因文殊至諸佛集處值諸佛各還本處唯有一女人近於佛坐而入三昧文殊乃白佛云何此人得近佛而我不得佛告文殊汝但覺此女令從三昧起汝自問之文殊繞女人三帀鳴指一下乃托至梵天盡其神力而不能出世尊曰假使百千文殊亦出此女人定不得下方過四十二恒河沙國土有罔明菩薩能出此女人定須臾罔明大士從地湧出作禮世尊世尊勅罔明出罔明却至女子前鳴指一下女子於是從定而出五雲逢云不惟文殊不能出此定但恐如來也出此定不得祇如教意怎生體解翠巖真好問僧文殊是七佛之師因甚出女子定不得罔明從下方來因甚却出得女子定莫有能對者獨英劭武方其問時以手掐其膝而去真笑曰賣匙箸客未在洪覺範曰教中有女子出定因緣叢林商略甚眾自非道眼明白親見作家未能明也大愚芝禪師每問僧曰文殊是七佛之師為甚出女子定不得罔明菩薩下方而至但彈指一聲便能出定莫有對者乃自代云僧投寺裏宿賊打不防家予滋愛其語作偈記之曰出定只消彈指佛法豈用工夫我今要用便用不管罔明文殊雲庵和尚見之明日陞座用前話乃曰文殊與罔明見處還有優劣也無若言無文殊何故出女子定不得只如今日行者擊動法鼓大眾同到座前與罔明出女子定是同是別良久曰不見道欲識佛性義當觀時節因緣大眾總是祖師門下客參玄上士試諦觀看若見得出家事畢解脫安樂世俗塵勞不用閒觀喝一喝下座雲庵亦有偈曰佛性天真事誰云別有師罔明彈指處女子出禪時不費纖毫力何曾動所思眾生總平等日用自多疑妙喜云有一種商量古人公案謂之針線工夫又謂之郎君子弟禪如商量女子出定語云文殊是七佛之師為甚麼出女子定不得云文殊與女子無緣罔明是初地菩薩為甚麼出得女子定云與女子有緣下語云冤有頭債有主又有商量道文殊不合有心所以出女子定不得罔明無心所以出得下語云有心用處還成錯無意求時却宛然又有商量道文殊為甚麼出女子定不得杓柄在女子手裏罔明為甚麼出得如蟲禦木又云因風吹火又云爭奈女子何邪解甚者至於作女子入定勢出定勢推一推彈指一下哭蒼天數聲伏惟尚饗拂袖之類冷地看來慚惶殺人妙喜頌云出得出不得是定非正定罔明與文殊喪却窮性命圜悟勤頌云大定等虗空廓然誰辨的女子與瞿曇據令何條直師子奮迅兮搖蕩乾坤象王回旋兮不資餘力孰勝孰負誰出誰入雨散雲收青天白日君不見馬駒踏殺天下人臨濟未是白拈賊尼妙總頌云金不博金水不洗水兩既不成一何有爾罔明文殊靴裏弄指天衣懷頌云文殊托上梵天罔明輕輕彈指女子黃面瞿曇看他一倒一起寶峯照頌云拂拭瑤琴月下彈調高雪曲和應難五侯費盡平生志從此詩書懶更看石門易頌云坐擁羣峯覆白雲鸎啼深谷不知春巖前花雨紛紛落午夢初回識故人佛燈珣頌云瞿曇身心如泥女子肝腸似鐵文殊貪尋鍋子罔明由來著楔歷觀大地眾生不解閉門作活不動干戈建太平雨過青山如黛潑佛照光頌云一畝之地三蛇九鼠仔細看來是何面嘴殃崛摩羅因持鉢至一長者門其家婦人正值產難長者曰瞿曇弟子汝為至聖當有何法能免產難殃崛語長者曰我乍入道未知此法待我回問世尊却來相報乃返具事白佛佛告殃崛汝速去報言我從賢聖法來未曾殺生殃崛奉佛語疾往告之其婦得聞當時分㝃徑山杲禪師遊方時以此因緣請益湛堂準禪師堂曰正𭺗著我癢處這話是金矢法不會如金會得如矢山曰豈無方便堂曰我有個方便只是你剗地不會山曰望和尚慈悲堂曰殃崛云我乍入道未知此法待問世尊未到佛座下他家生下兒子時如何佛言我從賢聖法來未曾殺生殃崛持此語未到它家已生下兒子時如何山當時理會不得及見圓悟後過虎丘閱華嚴經至菩薩登第七地證無生法忍云佛子菩薩成就此忍即時得入菩薩第八不動地為深行菩薩難可知無差別離一切相一切想一切執著無量無邊一切聲聞辟支佛所不能及離諸喧諍寂滅現前譬如比丘具足神通得心自在次第乃至入滅盡定一切動心憶想分別悉皆止息此菩薩摩訶薩亦復如是住不動地即捨一切功用行得無功用法身口意業念務皆息住於報行譬如有人夢中見身墮在大河為欲渡故發大勇猛施方便故即便寤𭔏既寤𭔏已所作皆息菩薩亦爾見眾生身在四流中為救度故發大勇猛起大精進故至此不動地既至此已一切功用靡不皆息二行相行皆不現前此菩薩摩訶薩菩薩心佛心菩提心涅槃心尚不現起况復起於世間之心山於是豁然打失布袋湛堂所說方便忽然現前山後甞頌此因緣其頌曰華陰山前百尺井中有寒泉徹骨冷誰家美人來照影不照其餘照斜領鼓山珪公亦同頌云月裏仙娥不畵眉只將雲霧作羅衣不知夢逐青鸞去猶把花枝葢面歸世尊一日因文殊在門外立乃曰文殊文殊何不入門來文殊曰我不見一法在門外何以教我入門報慈遂徵云為復是門內語門外語溈山喆代云吾不如汝黃龍新云文殊恁麼道入得門入不得門若入得門氷消瓦解無邊身菩薩將竹杖量世尊頂丈六了又丈六量到梵天不見世尊頂乃擲下竹杖合掌說偈云虗空無有邊佛功德亦然若有能量者窮劫不可盡世尊因乾闥婆王獻樂其時山河大地皆作琴聲迦葉起作舞王問迦葉豈不是阿羅漢諸漏已盡何更有餘習佛曰實無餘習莫謗法也王又撫琴三徧迦葉亦三度作舞王曰迦葉作舞豈不是習佛曰實不曾作舞王曰世尊何得妄語佛曰不妄語汝撫琴山河大地木石盡作琴聲豈不是王曰是佛曰迦葉亦復如是所以實不曾作舞王乃信受修山主問澄源禪師乾闥婆王奏樂直得須彌岌峇海水騰波迦葉作舞作麼生會源云迦葉過去世普作樂人來習氣未除修云須彌岌峇海水騰波又作麼生源休去幻寄云有底道世尊以藥去病澄源以病去藥夢也未夢見乾闥婆王在世尊在第六天說大集經勅他方此土人間天上一切獰惡鬼神悉皆輯會受佛付囑擁護正法設有不赴者四天門王飛熱鐵輪追之令集既集會已無有不順佛勅者各發弘誓擁護正法唯有一魔王謂世尊曰瞿曇我待一切眾生成佛盡眾生界空無有眾生名字我乃發菩提心天衣懷舉云臨危不變真大丈夫諸仁者作麼生下得一轉語與黃面瞿曇出氣尋常神通妙用智慧辨才都使不著盡閻浮大地人莫不愛佛到這裏何者是佛何者是魔還有人辨得麼良久云欲識魔麼開眼見明欲識佛麼閉眼見暗魔之與佛一時穿却鼻孔妙喜曰天衣老漢恁麼批判直是奇特雖然如是未免話作兩橛若向何者是佛何者是魔處休去不妨使人疑著却云開眼合眼郎當不少又云拄杖一時穿却鼻孔雪上加霜妙喜却為黃面老子代一轉語待遮魔王如此道了只向他道幾乎錯喚你做魔王此語有兩負門若人檢點得出許你具衲僧眼世尊因調達謗佛生身入地獄遂令阿難問你在地獄中安否曰我雖在地獄如三禪天樂佛又令問你還求出否曰我待世尊來便出阿難曰佛是三界導師豈有入地獄分調達曰佛既無入地獄分我豈有出地獄分翠巖真云親言出親口湛堂準頌云好笑提婆達多入捺落十小劫波雖然得三禪妙樂吹布毛須還鳥窠松源岳頌云地獄天堂八字打開誰知無去亦無來若言已得三禪樂未免將身自活埋世尊因文殊忽起法見佛見被世尊威神攝向二鐵圍山五雲逢云甚麼處是二鐵圍山還會麼如今人有起法見佛見五雲與烹茶兩甌且道是賞伊罰伊同教義不同教義白雲端云大眾世尊當時無大人相如今若有向承天這裏起法見佛見承天終不敢教動著他何謂如此但得雪消去自然春到來五祖演云白雲則具大慈悲遂拍手云曼殊室利普賢大士不審今後更敢也無自云一度被蛇傷怕見斷井索世尊因靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各自見殺父害母及諸重罪於自心內各各懷疑於甚深法不能證入於是文殊承佛神力遂手握利劒持逼如來世尊乃謂文殊曰住住不應作逆勿得害吾吾必被害為善被害文殊師利爾從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人乃至能生所生父母於是五百比丘同讚歎曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺天童傑云為人須為徹殺人須見血文殊費盡腕頭氣力且不知此劍來處帶累釋迦老子通身是口也分疏不下五百比丘恁麼悟去入地獄如箭射忽若踏翻大海踢倒須彌雲門扇子𨁝跳上天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生商量良久云自從舞得三臺後拍拍元來總是歌世尊因外道問不問有言不問無言世尊良久外道歎曰世尊大慈大悲開我迷雲令我得入作禮而去阿難白佛外道得何道理稱讚而去世尊曰如世良馬見鞭影而行雪竇顯云邪正不分過猶鞭影又云迷雲既開决定見佛還許它同參也無若共相委知則天下宗師竝為外道伴侶如各非印證則東土衲僧不如西天外道又頌云機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回喚得回鳴指三下圜悟勤云鳴指三下是點破是撒沙徑山杲云邪正兩分正猶鞭影百丈恒舉此請益法眼語未終法眼云住住汝擬向世尊良久處會那丈從此悟入世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應二若言有智不應一一二之義其義云何佛言大王汝於過去龍光佛時曾問此義我今無說汝今無聽無說無聽是為一義二義翠巖真云波斯匿王善問不善荅世尊善答不善問一人理上偏枯一人事上偏枯翠巖當時若見點一把火照看黃面老面皮厚多少薦福懷云諸仁者大王分明問世尊分明荅賓主歷然作麼生說個無說無聞底道理世尊因外道問昨日說何法世尊曰說定法外道曰今日說何法曰不定法外道曰昨日說定法今日何說不定法世尊曰昨日定今日不定五祖戒云何得將別人物作自己用溈山喆云世尊大似看樓打樓大溈即不然待問昨日說定今日何說不定但云非汝境界薦福懷云黃面老被外道拶著出自偶然雖然如此邪正未分若人辨得許你頂門具眼世尊因有異學問諸法是常耶世尊不對又問諸法是無常耶世尊亦不對異學曰世尊具一切智何不對我世尊曰汝之所問皆為戲論世尊甞在尼俱律樹下坐次因二商人問世尊還見車過否曰不見還聞否曰不聞莫禪定否曰不禪定莫睡眠否曰不睡眠商人乃歎曰善哉善哉世尊乃覺而不見世尊因長爪梵志索論義預約曰我義若墮當斬首以謝世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去行至中路有省乃歎曰我義兩處負墮是見若受負門處粗是見不受負門處細一切人天二乘不知我義墮處惟有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道於是同五百徒眾一時投佛出家證阿羅漢天衣懷頌云是見若受破家門是見不受共誰論匾擔驀折兩頭脫一毛頭上現乾坤世尊一日坐次見二人舁猪過乃問這個是甚麼曰佛具一切智猪子也不識世尊曰也須問過大陽玄云不因世尊問洎乎忘却地藏恩云瞿曇老漢也是無端大似節目上更生節目忽被二人呵呵大笑舁猪便行一場懡㦬世尊在靈山會上拈花示眾是時眾皆默然唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉白雲端云迦葉善觀風雲別氣色雖然如是還覺頂門重麼復頌云盡說拈花微笑是不知將底辨宗風若言心眼同時證未免朧在夢中僧問雲峯悅靈山拈花意旨如何悅云一言已出駟馬難追迦葉微笑意旨如何悅云口是禍門世尊至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告曰吾以正法眼藏密付於汝汝當護持并勅阿難副貳傳化無令斷絕而說偈曰法本法無法無法法亦法今付無法時法法何曾法爾時世尊說此偈已復告迦葉吾將金縷僧伽黎衣傳付於汝轉授補處至慈氏佛出世勿令朽壞迦葉聞偈頭面禮足曰善哉善哉我當依勅恭順佛教世尊臨入涅槃文殊大士請佛再轉法輪世尊咄曰文殊吾四十九年住世未曾說一字汝請吾再轉法輪是吾曾轉法輪耶雪峯空云且道世尊從文殊請不從文殊請世尊於涅槃會上以手摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億眾悉得契悟雲峯悅云然膏肓之病不足以發藥雲峯今日且作死馬醫汝等諸人皮下有血麼爾時世尊至拘尸那城告諸大眾吾今背痛欲入涅槃即往熈連河側娑羅雙樹下右脇累足泊然宴寂復從棺起為母說法特示雙足化婆耆并說無常偈曰諸行無常是生滅法生滅滅已寂滅為樂時諸弟子即以香薪競茶毗之燼後金棺如故爾時大眾即於佛前以偈讚曰凡俗諸猛熾何能致火爇請尊三昧火闍維金色身爾時金棺從座而舉高七多羅樹往反空中化火三昧須臾灰生得舍利八斛四斗即穆王五十二正宗作三十六年壬申歲二月十五日也自世尊滅後一千一十七年教至中夏即後漢永平十年戊辰歲也世尊涅槃日迦葉最後至世尊乃於槨中露雙趺示之佛鑑懃頌云未出王宮已涅槃何須雙足露金棺致令迦葉雙眉皺慶喜門前倒剎竿諸師拈頌諸經語句經題字僧問地藏堔以字不成八字不是未審是甚麼字藏曰看取下注脚徑山杲頌云以字不成八字非爍迦羅眼不能窺一毛頭上重拈出憤怒那吒失却威幻寄曰有以漚和二字釋此者是以柏樹子話為三界唯心同一鼻孔座主見也華嚴論未離兜率已降王宮未出母胎度人已畢徑山杲頌云利刃有蜜不須䑛蠱毒之家水莫甞不䑛不甞俱不犯端然衣錦自還鄉金剛經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅雪竇顯頌云明珠在掌有功者賞胡漢不來全無伎倆伎倆既無波旬失途瞿曇瞿曇識我也無復云勘破了也圓悟勤云且道雪竇勘破瞿曇瞿曇勘破雪竇具眼者試定當看無我相無人相龐居士問講金剛經座主云無我相無人相阿誰講阿誰聽主無對士示偈云無我亦無人作麼有疎親勸君休歷座何似直求真金剛般若性外絕一纖塵我聞并信受纔是假名陳文殊所說般若經清淨行者不入涅槃破戒比丘不入地獄此山應頌云飲官酒臥官街當處死當處埋寒山逢拾得撫掌笑咍咍徑山杲頌云壁上安燈盞堂前寘酒臺悶來打三盞何處得愁來高峯妙頌云涅槃地獄本無差只為從前被眼遮三脚驢兒纔𨁝跳鑊湯罏炭是吾家圓覺經居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實徑山杲頌云荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛師答林少瞻云但將此頌放在上面却將經文移來下面頌却是經經却是頌如此做工夫看莫管悟不悟心頭休要忙亦不可放緩如調弦之法緊緩得其所則曲調自成矣瑯琊覺禪師甞問講僧曰如何是居一切時不起妄念對曰起即是病又問如何是於諸妄心亦不息滅對曰息即是病又問如何是住妄想境不加了知對曰知即是病又問如何是於無了知不辨真實對曰辨即是病覺公笑曰汝識藥矣未誠藥中之忌也寶覺禪師則為之偈曰黃花熳熳翠竹珊珊江南地煖塞北春寒遊人去後無消息留得雲山到老看一切障礙即究竟覺雪堂行頌云枯樹雲充葉凋梅雪作花擊桐成木響蘸雪喫冬瓜長天秋水孤鶩落霞裴休為圓覺敘有云終日圓覺而未甞圓覺者凡夫也具足圓覺而住持圓覺者如來也宋徑山慈辨禪師寶印別其語曰具足圓覺住持圓覺者凡夫也終日圓覺未甞圓覺者如來也從容錄楞伽經五法三自性八識二無我徑山杲頌云陝府鐵牛白癩嘉州大象耳聵兩個病痛一般咄哉漆桶不快維摩經須菩提持鉢入維摩舍乞食時維摩詰取鉢盛飯謂言汝能於食等者諸法亦等諸法等者於食亦等如是行乞乃可取食乃至彼外道六師是汝之師彼師所墮汝亦隨墮乃可取食入諸邪見不到彼岸住於八難不得無難同於煩惱離清淨法汝得無諍三昧一切眾生亦得是定其施汝者不名福田供養汝者墮三惡道為與眾魔共一手作諸勞侶汝與眾魔及諸塵勞等無有異於一切眾生而有怨心謗諸佛毀於法不入眾數終不得滅度汝若如是乃可取食妙喜頌云獨坐許誰知青山對落暉花須連夜發莫待曉風吹楞嚴經佛謂阿難見見之時見非是見見猶離見見不能及竹庵珪云落花有意隨流水流水無情戀落花徑山杲頌云春至百花開秋來還落葉黃面老瞿曇休搖三寸舌海印信頌云見不及處江山滿目不覩纖毫花紅柳綠白雲出沒本無心流水滔滔豈盈縮汝等一人發真歸元此十方空皆悉銷隕尼無著頌云一人發真歸元十方虗空消隕試問楊岐栗蓬何似雲門胡餅諸可還者自然非汝不汝還者非汝而誰竹庵珪云常恨春歸無覔處不知轉入此中來喝一喝云三十年後莫道能仁教壞人家男女天目禮頌云不汝還兮復是誰殘紅落滿釣魚磯日斜風動無人掃燕子啣將水際飛咄咄是無等等呪阿難復白佛言若此妙明真淨妙心本來徧圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生卍庵顏頌云雙劒峯前古寺基天尊元是一牟尼時難只得同香火莫聽閑人說是非佛告阿難吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝雪竇顯頌云全象全牛意不殊從來作者共名模如今要見瞿曇老剎剎塵塵在半途湛堂準頌云老胡徹底老婆心為阿難陀意轉深韓幹馬嘶芳草渡戴嵩牛臥綠楊陰若能轉物即同如來白雲端頌云若能轉物即如來春至山花處處開自有一雙窮相手不曾容易舞三臺法華經是法住法位世間相常住朴翁銛頌云世間相常住黃鶯啼綠樹真個可憐生動著便飛去佛放眉間白毫相光炤東方萬八千世界圓極岑頌云蠻奴赤脚上皇州賣盡珍奇跨白牛貪著市朝人作市又隨歌舞上官樓多意氣好風流月冷珠簾挂玉鉤分明忘却來時路百尺竿頭輥繡毬諸法從本來常自寂滅相昔有僧誦此忽起疑日夕不置忽聞鶯聲頓然開悟遂續前語為偈曰諸法從本來常自寂滅相春至百花開黃鶯啼柳上假使滿世間皆如舍利弗盡思共度量不能測佛智破庵先頌云雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界現於三界如斯之事如來明見無有錯謬圓極岑頌云岣嶁峯頭神禹字青石赤形模奇無目仙人纔一見便應撫掌笑嘻嘻雲暗蒼龍化葛陂就中一句是正頌有人檢點得出許你具一隻眼大通智勝佛十劫坐道場佛法不現前不得成佛道徑山杲頌云燕坐道場經十劫一一從頭俱漏泄世間多少守株人掉棒擬打天邊月
