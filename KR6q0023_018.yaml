body:
  text: 六祖下第六世撫州曹山本寂禪師泉州莆田黃氏子少業儒年十九往福州靈石出家二十五登戒尋謁洞山山問闍黎名甚麼師曰本寂山曰那個聻師曰不名本寂山深器之此與雲居對洞山語同僧寶傳師名耽章此燈録所載遂仍之自此入室盤桓數載乃辭去山遂密授洞上宗旨復問曰子向甚麼處去師曰不變異處去山曰不變異處豈有去耶師曰去亦不變異遂造曹溪禮祖塔自螺川還止臨川有佳山水因定居焉以志慕六祖乃名山為曹示衆曰凡情聖見是金銷玄路直須回互夫取正命食者須具三種墮一者披毛戴角二者不斷聲色三者不受食時有稠布衲問披毛戴角是甚麼墮師曰是類墮曰不斷聲色是甚麼墮師曰是隨墮曰不受食是甚麼墮師曰是尊貴墮乃曰食者即是本分事知有不取故曰尊貴墮不執初心知有自己及聖位故曰類墮若初心知有己事回光之時擯却色聲香味觸法得寧謐即成功勳後却不執六塵等事隨分而昧任之則礙所以外道六師是汝之師彼師所墮汝亦隨墮乃可取食食者即是正命食也亦是就六根門頭見聞覺知祇是不被他染污將為墮且不是同向前均地本分事尚不取豈況其餘事耶師凡言墮謂混不得類不齊凡言初心者所謂悟了同未悟耳燈録無凡情聖見至三者不受食四十一字林間録無凡情聖見至回互十三字僧寶傳自稠布衲問答後則云夫冥合初心而知有是類墮知有而不礙六塵是隨墮維摩經云外道六師是汝之師彼師所墮汝亦隨墮乃可取食食者正命食也食者亦是就六根門頭見聞覺知只不被他染污將為墮且不是同也此覺範節釋曹山之語也林間乃直述曹山之語也自師凡言下二十四字亦記者之辭也隨墮言不礙六塵而云不被染污又云本分事尚不取豈況其餘古人立言知所坊矣智證傳曰世尊説九因九緣未盡壽量而死何等為九謂食無度量食時不宜不消復食生而不吐熟而持之不近醫藥不知于己若損若益非時非量行非梵行此名非時死豫以是觀之乃知時而食即不枉死故名正命食黃檗曰今時才出來者只欲多知多解廣求文義喚作修行不知多知解翻成壅塞唯多與兒酥乳消與不消都總不知三乘學道人皆此樣盡名食不消食不消者所謂知解不消皆為毒藥盡向生滅邊收真如之中無此事故以此知曹山貴正命食立三墮又曰維摩經曰為壞和合相故應取食為不受故應受彼食以空聚相入於聚落所見色與盲等所聞聲與響等所嗅香與風等所食味不分別受諸觸如智證知諸法如幻相無自性無他性本自不然今則無滅此不斷聲色墮所由立也又曰須菩提不見佛不聞法彼外道六師富蘭那伽葉末伽黎拘賖黎子刪闍夜毗羅胝子阿耆多翅舍欽婆羅迦羅鳩馱迦旃延尼犍陀若提子等是汝之師因其出家彼師所墮汝亦隨墮乃可取食此隨墮之所由立也又曰謗諸佛毀於法不入衆數終不得滅度汝若如是乃可取食此尊貴墮之所由立也豫嘗深觀曹山其自比六祖無所愧以其蕩除聖凡之情有大方便南泉曰三世諸佛不知有狸奴白牯却知有乃不如曹山止言一墮字耳覺範三墮頌類墮頌紛然作息同銀碗裏盛雪若欲異牯牛與牯牛何別隨墮頌有聞皆無聞有見元無物若斷聲色求木偶當成佛尊貴墮頌生在帝王家那復有尊貴自應著珍御顧見何驚異大陽玄曰此三種須明轉位始得一曰水牯牛是類墮是沙門轉身語是異類中事若不曉此意即有所滯直是要你一念無私即有出身之路二曰不斷聲色是隨墮以不明聲色故隨處墮須向聲色有出身之路作麼生是聲色外一句曰聲不自聲色不自色故云不斷指掌當指何掌也三曰不受食是尊貴墮須是知那邊了却來這邊行履不虗此位即坐在尊貴幻寄曰佛説比丘乞食乃正命食破四邪命食邪命謂醫卜種植等具于教乘華嚴疏諸典中曹山取正命食表本分事蓋本此寂音引瑜珈九因黃檗兒酥語意雖佳而失其本矣僧寶傳述三墮語遺尊貴墮智證傳以不斷聲色與隨墮分二而遺類墮濟公不取僧寶智證獨載林間固有所擇也至於大陽謂不明聲色故隨處墮與坐在尊貴是直以墮為墮落非曹山旨也寂音又曰金剛般若曰知我説法如筏喻者法尚應捨何況非法西天此土聖賢釋者無慮千餘人然莫如無著得佛之意雙林大士又從而申明之無著於此判為言説法身意以為筏者言説也雖與人俱然亦不類如筏行水中而實不住非法者二邊也在筏且不類豈於二邊而止住耶故曰何況非法大士偈曰渡河須用筏到岸不須船人法俱名執悟理詎勞詮中流仍被溺誰論在二邊有無如取一即被污心田故曹洞宗旨有混不得類不齊之語也幻寄曰洪師如漢儒援經傅事僧問學人通身是病請師醫師曰不醫曰為甚麼不醫師曰教汝求生不得求死不得問沙門豈不是具大慈悲底人師曰是曰忽遇六賊來時如何師曰亦須具大慈悲曰如何具大慈悲師曰一劒揮盡曰盡後如何師曰始得和同問眉與目還相識也無師曰不相識曰為甚麼不相識師曰為同在一處曰恁麼則不分去也師曰眉且不是目曰如何是目師曰端的去曰如何是眉師曰曹山却疑曰和尚為甚麼却疑師曰若不疑即端的去也師示衆云諸方盡把格則何不與他道却令他不疑去雲門在衆出問密密處為甚麼不知有師曰只為密密所以不知有門曰此人如何親近師曰莫向密密處親近門曰不向密密處時如何師曰始解親近門曰喏喏妙喜曰濁油更著黑燈心雲門問如何是沙門行師曰喫常住苗稼者是曰便恁麼去時如何師曰你還畜得麼曰畜得師曰你作麼生畜曰著衣喫飯有甚麼難師曰何不道披毛戴角門禮拜問家貧遭劫時如何師曰不能盡底去曰為甚麼不能盡底去師曰賊是家親師問德上座菩薩在定聞香象渡河出甚麼經曰出涅槃經師曰定前聞定後聞曰和尚流也師曰道也太煞道祇道得一半曰和尚如何師曰灘下接取妙喜曰甚麼處去也鏡清問清虗之理畢竟無身時如何師曰理即如此事作麼生曰如理如事師曰謾曹山一人即得爭奈諸聖眼何曰若無諸聖眼爭鑑得個不恁麼師曰官不容針私通車馬大溈哲云曹山雖然善能切磋琢磨其奈鏡清玉本無瑕要會麼不經敏手終成廢器問教中道大海不宿死尸如何是大海師曰包含萬有者曰既是包含萬有為甚麼不宿死尸師曰絶氣息者不著曰既是包含萬有為甚麼絶氣息者不著師曰萬有非其功絶氣息者有其德曰向上還有事也無師曰道有道無即得爭奈龍王按劒何問具何知解善能問難師曰不呈句曰問難個甚麼師曰刀斧斫不入曰恁麼問難還有不肯者麼師曰有曰是誰師曰曹山問僧作甚麼曰掃地師曰佛前掃佛後掃曰前後一時掃師曰與曹山過靸鞋來問親何道伴即得常聞於未聞師曰同共一被蓋曰此猶是和尚得聞如何是常聞於未聞師曰不同於木石曰何者在先何者在後師曰不見道常聞於未聞問一牛飲水五馬不嘶時如何師曰曹山解忌口紙衣道者來參師問莫是紙衣道者否者曰不敢師曰如何是紙衣下事者曰一裘才挂體萬法悉皆如師曰如何是紙衣下用者近前應諾便立脫師曰汝祇解與麼去何不解恁麼來者忽開眼問曰一靈真性不假胞胎時如何師曰未是妙者曰如何是妙師曰不借借者珍重便化師示頌曰覺性圓明無相身莫將知見妄疏親念異便於玄體昧心差不與道為鄰情分萬法沈前境識鑒多端喪本真如是句中全曉會了然無事昔時人問強上座曰佛真法身猶若虗空應物現形如水中月作麼生説個應底道理曰如驢覷井師曰道則太煞道祇道得八成曰和尚又如何師曰如井覷驢僧舉藥山問僧年多少曰七十二山曰是七十二那曰是山便打此意如何師曰前箭猶似可後箭射人深曰如何免得此棒師曰王敕既行諸侯避道僧問香嚴如何是道嚴曰枯木裏龍吟曰如何是道中人嚴曰髑髏裏眼睛僧不領乃問石霜如何是枯木裏龍吟霜曰猶帶喜在曰如何是髑髏裏眼睛霜曰猶帶識在又不領問師如何是枯木裏龍吟師曰血脈不斷曰如何是髑髏裏眼睛師曰乾不盡曰未審還有得聞者麼師曰盡大地未有一人不聞曰未審枯木裏龍吟是何章句師曰不知是何章句聞者皆喪遂示偈曰枯木龍吟真見道髑髏無識眼初明喜識盡時消息盡當人那辨濁中清昭覺勤云念不異心不差圓融五位君臣跳出無明三毒便可以向枯木上生花寒巖中吹律看他三個老宿一人透語滲漏一人透情滲漏一人透見滲漏若善參詳便可玄關獨步還委悉麼莫守寒巖異草青坐斷白雲機不妙徑山杲舉圜悟透三種語了云諸人還揀得出麼若揀不出妙喜不惜眉毛為諸人説破香嚴透語滲漏被語言縛殺石霜透情滲漏被情識使殺曹山透見滲漏被見聞覺知惑殺分明説了具眼者辨取寂音曰喜識盡時消息盡當人那辨濁中清者達觀所謂偏正互縱橫迢然忌十成龍門須要透鳥道不堪行石女霜中織泥牛火裏耕兩頭如脫得古木一枝榮是也師讀杜順傅大士所作法身偈曰我意不欲與麼道門弟子請別作之既作偈又注釋之其詞曰渠本不是我非我我本不是渠非渠渠無我即死仰汝取活我無渠即余不別有渠如我是佛要且不是佛我如渠即驢二俱不立不食空王俸若遇御飯直須吐却何假雁傳書不通信我説橫身唱為以唱君看背上毛不與你相似乍如謠白雪將謂是白雪猶恐是巴歌傳此句無注示學人偈曰從緣薦得想應疾就體消停得力遲瞥起本來無處所吾師暫説不思議寂音曰豫以是觀之千聖皆稱此一念之心起時了不可得是真不可思議也離則決定無別殊勝故如是了知豈不疾乎華嚴經曰以少方便疾成菩提曰然則學者何為而不信耶曰如竹林善會禪師為道吾發之以見船子言下省悟既去而回顧船子笑曰這漢疑我別有也於是覆其舟蓋信力尚微未大通透故耳幻寄曰千古繫驢橛子師作四禁偈曰莫行心處路不挂本來衣何須正恁麼切忌未生時示衆曰僧家在此等衣線下理須會會字似應在須字上通向上事莫作等間若也承當處分明即轉他諸聖向自己背後方得自由若也轉不得直饒學得十成却須向他背後叉手説什麼大話若轉得自己則一切粗重境來皆作得主宰假如泥裏倒地亦作得主宰如有僧問藥山曰三乘教中還有祖意也無答曰有曰既有達磨又來作麼答曰只為有所以來豈非作得主宰轉得歸自己乎如經曰大通智勝佛十劫坐道場佛法不現前不得成佛道言劫者滯也謂之十成亦曰斷滲漏也只是十道頭絶矣不忘大果故云守住耽著名為取次承當不分貴賤我常見叢林好論一般兩般還能成立得事麼此等但是説向去事路布汝不見南泉曰饒汝十成猶較王老師一線道也大難事到此直須子細始得明白自在不論天堂地獄餓鬼畜生但是一切處不移易元是舊時人只是不行舊時路若有欣心還成滯著若脫得揀什麼古德云只恐不得輪回汝道作麼生只如今人説個淨潔處愛説向去事此病最難治若是世間粗重事却是輕淨潔病為重只如佛味祖味盡為滯著先師曰擬心是犯戒若也得味是破齋且喚什麼作味只是佛味祖味才有欣心便是犯戒若也如今説破齋破戒即今三羯磨時早破了也若是粗重食嗔癡雖難斷却是輕若也無為無事淨潔此乃重無以加也祖師出世亦只為這個亦不獨為汝今時莫作等間狸奴白牯修行却快不是有禪有道如汝種種馳求覓佛覓祖乃至菩提涅槃幾時休歇成辦乎皆是生滅心所以不如狸奴白牯兀兀無知不知佛不知祖乃至菩提涅槃及以善惡因果但飢來喫草渴來飲水若能恁麼不愁不成辦不見道計較不成是以知有乃能披毛戴角牽犂拽耒得此便宜始較些子不見彌勒阿閦及諸妙喜等世界被他向上人喚作無慚愧懈怠菩薩亦曰變易生死尚恐是小懈怠在本分事合作麼生大須子細始得人人有一坐具地佛出世侵他不得恁麼體會修行莫趁快利欲知此事饒今成佛成祖去也只這是便墮三塗地獄六道去也只這是雖然沒用處要且離他不得須與他作主宰始得若作得主宰即是不變易若作主宰不得便是變易也不見永嘉云莽莽蕩蕩招殃禍問如何是莽莽蕩蕩招殃禍曰只這個總是問曰如何免得曰知有即得用免作麼但是菩提涅槃煩惱無明等總是不要免乃至世間粗重之事但知有便得不要免免即同變易去也乃至成佛成祖菩提涅槃此等殃禍為不小因什麼如此只為變易若不變易直須觸處自由始得南平鍾王雅重師致禮教請師但書大梅山居頌一首付使者大梅和尚自得心印於大寂遂入四明梅子真舊隱縛茆燕處唐貞元中鹽官會下有僧因採拄杖迷路至菴所問和尚在此多少時梅曰祇見四山青又黃又問出山路向甚麼處去梅曰隨流去僧歸舉似鹽官官曰我在江西時曾見一僧自後不知消息莫是此僧否遂令僧去招之梅答以偈曰摧殘枯木倚寒林幾度逢春不變心樵客遇之猶不顧郢人那得苦追尋一池荷葉衣無數滿地松花食有餘剛被世人知住處又移茅舍入深居寂師寫辭南平者摧殘枯木一偈也梅諸機緣具於第九卷此因録寂師辭南平事嘉梅之幽韻復述其肥遁之迹云後偈或作隱山和尚偈天復辛酉夏夜問知事今日是幾何日月對曰六月十五師曰曹山平生行腳到處只管九十日為一夏明日辰時吾行腳去及時焚香宴坐而化閲世六十有二坐三十有七夏門弟子葬全身於山之西阿洪州雲居道膺禪師幽州玉田王氏子童丱出家於范陽延壽寺二十五成大僧其師令習聲聞篇聚非其好棄之遊方至翠微問道會有僧自豫章來盛稱洞山法席師遂造焉山問甚處來師曰翠微來山曰翠微有何言句示徒師曰翠微供養羅漢某甲問供養羅漢羅漢還來否微曰你每日噇個甚麼山曰實有此語否師曰有山曰不虗參見作家來山問汝名甚麼師曰道膺山曰向上更道師曰向上即不名道膺山曰與老僧祇對道吾底語一般師問如何是祖師意山曰闍黎他後有把茅蓋頭忽有人問如何祇對師曰道膺罪過山謂師曰吾聞思大和尚生倭國作王是否師曰若是思大佛亦不作山然之山問師甚處去來師曰踏山來山曰那個山堪住師曰那個山不堪住山曰恁麼則國內總被闍黎占却師曰不然山曰恁麼則子得個入路師曰無路山曰若無路爭得與老僧相見師曰若有路即與和尚隔山去也山乃曰此子已後千人萬人把不住去在師結菴於三峰經旬不赴堂山問子近日何不赴齋師曰每日自有天神送食山曰我將謂汝是個人猶作這個見解在汝晚間來師晚至山召膺菴主師應諾山曰不思善不思惡是甚麼師回菴寂然宴坐天神自此竟尋不見如是三日乃絶山問師作甚麼師曰合醬山曰用多少鹽師曰旋入山曰作何滋味師曰得山問大闡提人作五逆罪孝養何在師曰始成孝養自爾洞山許為室中領袖劉禹端公上山謝雨問師云雨從何來師曰從端公問處來端公遂禮三拜歡喜而退行數步師召云端公公回首師問云問從何來公無語歸家三日而死大慧拈云劉禹端公無語歸家三日而死正𭺗著弘覺癢處只是不知轉身一路當初待伊道問從何來但依前禮三拜歡喜而退且教弘覺疑三十年又東平嘗問一官人風作何色雪竇因并頌云雨從何來風作何色龍門萬仞曾留宿客進退相將誰遭點額風作何色雨從何來不用彈指樓閣門開波波稜稜南方未回師曾令侍者送袴與一住菴道者道者曰自有娘生袴竟不受師再令侍者問娘未生時著個甚麼道者無語後遷化有舍利持似於師師曰直饒得八斛四斗不如當時下得一轉語好師在洞山作務誤剗殺蚯蚓山曰這個聻師曰他不死山曰二祖往鄴都又作麼生師不對後有僧問和尚在洞山剗殺蚯蚓因緣和尚豈不是無語師曰當時有語祇是無人證明問山河大地從何而有師曰從妄想有曰與某甲想出一鋌金得麼師便休去僧不肯雲門云已是葛藤不能折合待伊道想出一鋌金得麼拈拄杖便打新羅僧問佛陀波利見文殊為甚却回去師曰祇為不將來所以却回去問教中道是人先世罪業應墮惡道以今世人輕賤故此意如何師曰動則應墮惡道靜則為人輕賤示衆曰佛法有什麼多事行得即是但知心是佛莫愁佛不解語欲得如是事還須如是人若是如是人愁個甚麼若云如是事即難自古先德醇素任真元來無巧設有人問如何是道或時答㼾磚木頭作麼皆重元來他根本腳下實有力即是不思議人握土成金若無如是事饒汝説得簇花簇錦相似直道我放光動地世間更無過也盡説了合殺頭人總不信受元來自家腳下虗無力汝等譬如獵狗但尋得有蹤迹底若遇羚羊挂角時非但不見蹤迹氣息也不識僧便問羚羊挂角時如何答曰六六三十六曰會麼僧曰不會曰不見道無蹤迹其僧舉似趙州州曰雲居師兄猶在僧便問羚羊挂角時如何州曰九九八十一曰挂角後如何州曰九九八十一曰得恁麼難會州曰有甚麼難會曰請和尚指示州曰新羅新羅又問長慶羚羊挂角時如何慶曰草裏漢曰挂後如何慶曰亂呌喚曰畢竟如何慶曰驢事未去馬事到來又問世尊有密語迦葉不覆藏如何是世尊密語師呼問者名曰會麼曰不會曰汝若不會世尊有密語汝若會迦葉不覆藏乃曰僧家發言吐氣須有來由莫當等間這裏是什麼所在爭受容易凡問個事也須識好惡若不識尊卑良賤不知觸犯信口亂道也無利益並家行腳到處覓相似語所以尋常向兄弟道莫怪不相似恐怕同學多去第一莫將來將來不相似言語也須看他前頭八十老人入場屋不是小兒戲不是因循底事一言參差即千里萬里難為收攝蓋為學處容易不著力敲骨打髓須有來由言語如鉗如夾如鈎如鎖須教相續不斷始得頭頭上具物物上明豈不是得妙底事一種學大須仔細研窮直須諦當的的無差到這裏有什麼䠄跣處有什麼擬議處向去底人須常慘悚戢翼始得若是知有底人自解護惜終不取次十度發言九度休去為什麼如此常恐無利益體得底人心若臘月扇口邊直得醭出不是強為任運如此欲得與麼事須是與麼人既是與麼人不愁恁麼事恁麼事即難得又曰汝等直饒學得佛邊事早是錯用心了也不見古人講得天花落石點頭尚不干自己事自餘是什麼間如今擬將有限身心向無限中用有什麼交涉如將方木逗圓孔中多少聱訛若無與麼事饒汝説得簇花簇錦也無用處未離情識在若一切事須向這裏及盡始得無過方得出身若有一毫髮去不盡即被塵纍豈況更多差之毫釐過犯山嶽不見古人道學處不玄盡是流俗閨閣中物捨不得俱為滲漏直須向這裏及取去及去及來併盡一切事始得無過如人頭頭上了物物上通祇喚作了事人終不喚作尊貴將知尊貴一路自別便是世間極重極貴物不得將來向尊貴邊須知不可思議不當好心所以古人道猶如雙鏡光光相對光明相照更無虧盈豈不是一般猶喚作影像邊事如日出時光照世間明朗是一半那一半喚作甚麼如今人未認得光影門頭戶底粗淺底事將作屋裏事又爭得將知尊貴一路自別下燈録無便是世間諸語但云不見道從門入者非寶捧上不成龍二句而已又曰得者不輕微明者不賤用識者不咨嗟解者無厭惡從天降下即貧窮從地涌出即富貴門裏出身則易身裏出門則難動則埋身千尺不動則當處生苗一言迥脫獨拔當時語言不要多多則無用處僧問如何是從天降下即貧窮曰不貴得又問如何是從地涌出則富貴曰無中或有又曰了無所有得無所圖言無所是行無所依心無所託及盡始得無過在衆如無衆無衆如在衆在身如無身處世如無世豈不是無嬈其德超於萬類脫一切羈鎖千人萬人得尚道不當自己如今若得共起初一般古人曰體得那邊事却來這邊行李李當作履下同那邊有什麼事這邊又作麼生行李所以道有也莫將來無也莫將去現在底是誰家事又曰欲體此事直似一息不來底人方與那個人相應若體得這個人意方有少許説話分方有少許行李分暫時不在如同死人豈況如今論年論月不在如人常在愁什麼家事不辦欲知久遠事祇在如今如今若得久遠亦得如人千鄉萬里歸家行到即是是即一切總是不是即一切總不是直得頂上光𦦨生亦不是能為一切一切不為道終日貪前頭事失却背後事若見背後事失却前頭事如人不前後有什麼事僧問有人衣錦繡入來見和尚後為甚寸絲不挂曰直得琉璃殿上行撲倒也須粉碎乃曰若有一毫許去及不盡即被塵纍豈況更多不見尋常道升天底事須對衆掉却十成底事須對衆去却擲地作金聲不須回頭顧著自餘有什麼用處不見二祖當時詩書博覽三藏聖教如觀掌中因甚麼更求達磨安心將知此門中事不是等間所以道智人不向言中取得人豈向説中求不是異於常徒息一切萬纍道暫時不在塗路便有來由非但惡眷屬善眷屬也覓不得甚麼去通身去歸家去省覲去始脫得諸有門去去得牢籠脫險難異常徒又曰如掌中觀物決定決定方可隨緣若一如此千萬亦然千萬之中難為一二一二不可得不見道顯照底人即易得顯己底人即難得不道全無即是希有若未得如此不受強為強為即生惱生惱即退道退道則罪來加身即見不得説什麼大話汝既出家如囚免獄少欲知足莫貪世榮忍飢忍渴志存無為得在佛法中十生九死也莫相拋出生入死莫違佛法斬釘截鐵莫負如來事宜無多各自了取有事近前無事莫立自示衆佛法有什麼多事至此悉依僧寶傳師住持三十年道遍天下衆至千五百人南昌鍾王師尊之願以為世世師唐天福元年秋示微疾十二月二十八日為大衆開最後方便敘出世始卒之意衆皆愴然越明年正月三日問侍者今日是幾對云初三師云三十年後但云祇這是乃端然告寂撫州疏山匡仁禪師吉州新淦人投本州元證禪師出家一日告其師往東都聽習未經歲月忽曰尋行數墨語不如默捨己求人假不如真遂造洞山值山早參出問未有之言請師示誨山曰不諾無人肯師曰還可功也無山曰你即今還功得麼師曰功不得即無諱處山他日上堂曰欲知此事直須如枯木生花方與他合師問一切處不乖時如何山曰闍黎此是功勳邊事幸有無功之功子何不問師曰無功之功豈不是那邊人山曰大有人笑子恁麼問師曰恁麼則迢然去也山曰迢然非迢然非不迢然師曰如何是迢然山曰喚作那邊人即不得師曰如何是非迢然山曰無辨處山問師空劫無人家是甚麼人住處師曰不識山曰人還有意旨也無師曰和尚何不問他山曰現問次師曰是何意旨山不對洎洞山順世弟子禮終乃到潭州大溈值溈示衆曰行腳高士直須向聲色裏睡眠聲色裏坐臥始得師出問如何是不落聲色句溈竪起拂子師曰此是落聲色句溈放下拂子歸方丈師不契便辭香嚴嚴曰何不且住師曰某甲與和尚無緣嚴曰有何因緣試舉看師遂舉前話嚴曰某甲有個語師曰道甚麼嚴曰言發非聲色前不物師曰元來此中有人遂囑香嚴曰向後有住處某甲却來相見乃去溈問嚴曰問聲色話底矮闍黎在麼嚴曰已去也溈曰曾舉向子麼嚴曰某甲亦曾對他來溈曰試舉看嚴舉前話溈曰他道甚麼嚴曰深肻某甲溈失笑曰我將謂這矮子有長處元來祇在這裏此子向去若有個住處近山無柴燒近水無水喫師聞福州大溈安和尚示衆曰有句無句如藤倚樹師特入嶺到彼值溈泥壁便問承聞和尚道有句無句如藤倚樹是否溈曰是師曰忽遇樹倒藤枯句歸何處溈放下泥盤呵呵大笑歸方丈師曰某甲三千里賣却布單特為此事而來和尚何得相弄溈喚侍者取錢二百與這上座去遂囑曰向後有獨眼龍為子點破在溈山次日上堂師出問法身之理理絶玄微不奪是非之境猶是法身邊事如何是法身向上事溈舉起拂子師曰此猶是法身邊事溈曰如何是法身向上事師奪拂子摺折擲向地上便歸衆溈曰龍蛇易辨衲子難謾後聞婺州明招謙和尚出世謙眇一目徑往禮拜招問甚處來師曰閩中來招曰曾到大溈否師曰到招曰有何言句師舉前話招曰溈山可謂頭正尾正祇是不遇知音師亦不省復問忽遇樹倒藤枯句歸何處招曰却使溈山笑轉新師於言下大悟乃曰溈山元來笑裏有刀遙望禮拜悔過楊岐示衆云有句無句如藤倚樹文殊維摩撒手歸去楊岐恁麼道也是看錮鏴更有後語不得錯舉妙喜曰利動君子招一日問虎生七子那個無尾巴師曰第七個無尾巴香嚴出世師不爽前約遂往訪之嚴上堂僧問不求諸聖不重己靈時如何嚴曰萬機休罷千聖不携師在衆作嘔聲曰是何言歟嚴聞便下座曰適對此僧語必有不是致招師叔如是未審過在甚麼處師曰萬機休罷猶有物在千聖不擕亦從人得如何無過嚴曰却請師叔道師曰若教某甲道須還師資禮始得嚴乃禮拜躡前問師曰何不道肯諾不得全嚴曰肯又肯個甚麼諾又諾於阿誰師曰肯即肯他千聖諾即諾於己靈嚴曰師叔恁麼道向去倒屙三十年在師住後果病吐二十七年而愈師却每於食後抉口令吐曰香嚴師兄記我三十年倒屙尚欠三年在師後問鏡清肯諾不得全子作麼生會清曰全歸肯諾師曰不得全又作麼生清曰個中無肯路師曰始愜病僧意師到夾山山上堂師問承師有言目前無法意在目前如何是非目前法山曰夜月流輝澄潭無影師作掀禪牀勢山曰闍黎作麼生師曰目前無法了不可得山曰大衆看取這一員戰將師參巖頭頭見來乃低頭佯睡師近前而立頭不顧師拍禪牀一下頭回首曰作甚麼師曰和尚且瞌睡拂袖便行頭呵呵大笑曰三十年弄馬騎今日被驢撲上堂病僧咸通年前會得法身邊事咸通年後會得法身向上事雲門出問如何是法身邊事師曰枯樁曰如何是法身向上事師曰非枯樁曰還許某甲説道理也無師曰許曰枯樁豈不是明法身邊事師曰是曰非枯樁豈不是明法身向上事師曰是曰祇如法身還該一切也無師曰法身周遍豈得不該門指淨瓶曰祇如淨瓶還該法身麼師曰闍黎莫向淨瓶邊覓門便禮拜妙喜曰雲門禮拜不是好心有僧為師造壽塔畢白師師曰將多少錢與匠人曰一切在和尚師曰為將三錢與匠人為將兩錢與匠人為將一錢與匠人若道得與吾親造壽塔來僧無語後僧舉似大嶺菴間和尚即羅山也嶺曰還有人道得麼僧曰未有人道得嶺曰汝歸與疏山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人纍他匠人鬚眉墮落僧回如教而説師具威儀望大嶺作禮歎曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺徑山杲頌鑿壞十方常住地三錢使盡露尸骸羅山古佛雖靈驗未免將身一處埋應菴華頌鑿開蒼徑造浮圖往復商量價不孤無限落花隨水去夕陽春色滿江湖崇覺空頌三文與匠人每愛佳人笑目青音容常隔一沙汀黃河誰道如今輥波浪無風不挂情頌兩文與匠人懊惱牛欄昨夜開嶺頭人喚不歸來煩君道與西江月莫照孤燈冷處灰頌一文與匠人行因感東事須分寶塔凌空直一文要會疏山端的意吾家宗祖在并汾師臨遷化有偈示衆曰我路碧空外白雲無處間世有無根樹黃葉風送還偈終而逝青林師虔禪師初參洞山山問近離甚處師曰武陵曰武陵法道何似此間師曰胡地冬抽筍山曰別甑炊香飯供養此人師拂袖便出山曰此子向後走殺天下人在師在洞山栽松次有劉辰翁者求偈師作偈曰長長三尺餘鬱鬱覆青草不知何代人得見此松老劉得偈呈洞山山謂曰此是第三代洞山主人師辭洞山山曰子向甚麼處去師曰金輪不隱的遍界絶紅塵山曰善自保任師珍重而出洞山門送謂師曰恁麼去一句作麼生道師曰步步踏紅塵通身無影像山良久師曰老和尚何不速道山曰子得恁麼性急師曰某甲罪過便禮辭住青林後遷洞山凡有新到先令搬柴三轉然後參堂有一僧不肯問師曰三轉內則不問三轉外如何師曰鐵輪天子寰中旨僧無對師便打趁出問學人徑往時如何師曰死蛇當大路勸子莫當頭曰當頭者如何師曰喪子命根曰不當頭者如何師曰亦無回避處曰正當恁麼時如何師曰失却也曰向甚麼處去師曰草深無覓處曰和尚也須隄防始得師拊掌曰一等是個毒氣高安白水本仁禪師上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧問如何是聲不是聲師曰喚作色得麼曰如何是色不是色師曰喚作聲得麼僧作禮師曰且道為汝説答汝話若向這裏會得有個入處師將順世焚香白衆曰香煙盡處是吾涅槃時也言訖跏趺而坐息隨煙滅潭州龍牙山居遁證空禪師參翠微乃問學人自到和尚法席一個餘月不蒙示誨一法意在於何微曰嫌甚麼師又問洞山山曰爭怪得老僧法眼別云祖師來也雲居齊云此三大尊宿還有親疏也無若有那個親若無親疏眼在甚麼處師又問翠微如何是祖師意微曰與我將禪板來師遂過禪板微接得便打師曰打即任打要且無祖師意又問臨濟如何是祖師意濟曰與我將蒲團來師乃過蒲團濟接得便打師曰打即任打要且無祖師意後有僧問和尚行腳時問二尊宿祖師意未審二尊宿明也未師曰明即明也要且無祖師意東禪齊云衆中道佛法即有秖是無祖師意若恁麼會有何交涉別作麼生會無祖師意底道理雪竇頌龍牙山裏龍無眼死水何曾振古風禪板蒲團不能用只應分付與盧公盧公付了亦何憑坐倚休將繼祖燈堪對暮雲歸未合遠山無限碧層層圜悟勤云雪竇據欵結案他雖恁麼頌且道意在甚麼處甚處是無眼甚處是死水裏且道是扶持伊是滅伊威光人多錯會道為甚麼只應分付與盧公殊不知却是龍牙分付與人僧寶傳云初謁翠微不契至臨濟亦不契乃造洞山悟本價禪師問如何是祖師西來意價曰待洞水逆流即向汝道師豁然大悟研味其旨悲欣交集覺範曰豫觀龍牙偈曰學道先須有悟由還如慣鬪快龍舟雖然舊閣間田地一度贏來方始休君若隨緣得似風吹沙走石不勞功但於事上通無事見色聞聲不用聾皆清深精密如其為人疑問翠微臨濟祖意度禪板蒲團機語在已見洞山之後雪竇以瞎龍死水罪之龍牙聞之必大笑師復舉德山頭落底語因自省過遂止於洞山隨衆參請一日問如何是祖師西來意山曰待洞水逆流即向汝道師始悟厥旨服勤八稔此見於濟公燈録師有頌曰學道如鑽火逢煙未可休直待金星現歸家始到頭後神鼎諲舉云山僧即不然學道如鑽火逢煙便可休莫待金星現燒額又燒頭翠巖真云若論頓也龍牙猶在半途若論漸也神鼎猶欠悟在於此復且如何諸仁者今年多落葉幾處掃歸家問十二時中如何著力師曰如無手人欲行拳始得大溈秀云是則是又教人陰界中作活計十二時中如何用力如有手人行拳又且如何問古人得個甚麼便休去師曰如賊入空室問維摩掌擎世界未審維摩向甚麼處立師曰道者汝道維摩掌擎世界問如何是祖師西來意師曰待石烏龜解語即向汝道曰石烏龜語也師曰向汝道甚麼裴相國入大安寺問諸大德曰羅睺羅以何為第一曰以密行為第一裴不肯遂問此間有何禪者時師在後園種菜遂請來問羅睺羅以何為第一師曰不知裴便拜曰破布裹真珠報慈嶼讚師真曰日出連山月圓當戶不是無身不欲全露師一日在帳中坐僧問不是無身不欲全露請師全露師撥開帳子曰還見麼曰不見師曰不將眼來報慈聞云龍牙祇道得一半雲門令僧舉此公案云汝舉我與汝道僧舉了門云我不妨與你道上堂夫參玄人須透過祖佛始得新豐和尚道祖佛言教似生冤家始有參學分若透不得即被祖佛謾去僧問祖佛還有謾人之心也無師曰汝道江湖還有礙人之心也無乃曰江湖雖無礙人之心為時人過不得江湖成礙人去不得道江湖不礙人祖佛雖無謾人之心為時人透不得祖佛成謾人去不得道佛祖不謾人若透得祖佛過此人過却祖佛若也如是始體得佛祖意方與向上人同如未透得但學佛學祖則萬劫無有出期僧曰如何得不被祖佛謾去師曰道者直須自悟去始得益州北院通禪師初參夾山問曰目前無法意在目前不是目前法非耳目之所到豈不是和尚語山曰是師乃掀倒禪牀叉手而立山起來打一拄杖師便下去法眼云此他掀倒禪牀何不便去須待他打丁一棒去意在甚麼處次參洞山山上堂曰坐斷主人公不落第二見師出衆曰須知有一人不合伴山曰猶是第二見師便掀倒禪牀山曰老兄作麼生師曰待某甲舌頭爛即向和尚道後辭洞山擬入嶺山曰善為飛猿嶺峻好看師良久山召通闍黎師應諾山曰何不入嶺去師因有省更不入嶺京兆府蜆子和尚不知何許人也事迹頗異居無定所自印心於洞山混俗閩川不畜道具不循律儀冬夏惟披一衲逐日沿江岸採掇蝦蜆以充其腹暮即宿東山白馬廟紙錢中居民目為蜆子和尚華嚴靜禪師聞之欲決真假先潛入紙錢中深夜師歸嚴把住曰如何是祖師西來意師遽答曰神前酒臺盤嚴放手曰不虗與我同根生越州乾峰和尚上堂法身有三種病二種光須是一一透得始解歸家穩坐須知更有向上一竅在雲門出問菴內人為甚麼不知菴外事師呵呵大笑門曰猶是學人疑處師曰子是甚麼心行門曰也要和尚相委師曰直須與麼始解穩坐門應喏喏上堂舉一不得舉二放過一著落在第二雲門出衆曰昨日有人從天台來却往徑山去師曰典座來日不得普請便下座妙喜曰彼此揚家醜賴遇無旁觀者雲門到曰請和尚答話師曰到老僧也未門曰恁麼那恁麼那師曰將謂猴白更有猴黑問十方薄伽梵一路涅槃門未審路頭在甚麼處師以拄杖畫云在這裏僧後請益雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼寶峰文云乾峯與麼道還夢見也未若是老僧則不然十方薄伽梵一路涅槃門未審路頭在甚處劈脊便棒却問他路頭在甚處待伊擬開口熱喝出去更有個雲門折腳老比丘不分緇素不辨邪正拈起扇子云云似這般和泥合水漢糞堆頭埋却十個五個有甚麼過阿呵呵樂不樂足不足而今幸對山青水緑年來事事一時休信任身心懶拘束大衆休瞌睡好問僧甚處來曰天台師曰見説石橋作兩段是否曰和尚甚處得這消息來師曰將謂華頂峰前客元是平田莊裏人法石光禪師因舊住相訪師問頃年有一則公案與你商量不下如今作麼生云未入門時早呈似和尚了也師云這裏又作麼生云不可頭上安頭師劃一劃云這裏且置你為甚麼踏斷天台石橋僧無語師云脫空妄語漢出去幻寄曰此二尊宿勘僧一人得法身二種光一人得法身三種病若人辨得出許具隻眼澧州欽山文𨗉禪師與巖頭雪峰過江西到一茶店喫茶次師曰不會轉身通氣者不得茶喫頭曰若恁麼我定不得茶喫峰曰某甲亦然師曰這兩個老漢話頭也不識頭曰甚處去也師曰布袋裏老鴉雖活如死頭退後曰看看師曰奯公且置存公作麼生峰以手畫一圓相師曰不得不問頭呵呵曰太遠生師曰有口不得茶喫者多巨良禪客參禮拜了便問一鏃破三關時如何師曰放出關中主看良曰恁麼則知過必改師曰更待何時良曰好隻箭放不著所在便出去師曰闍黎且來良回首師下禪牀擒住曰一鏃破三關即且置試為欽山發箭看良擬議師打七棒曰且聽個亂統漢疑三十年有僧舉似同安察安曰良公雖解發箭要且未中的僧便問未審如何得中的去安曰關中主是甚麼人僧回舉似師師曰良公若解恁麼也免得欽山口然雖如此同安不是好心亦須看始得雪竇顯頌云與君放出關中主放箭之徒莫莽鹵取個眼兮耳必聾捨個耳兮目雙瞽可憐一鏃破三關的的分明箭後路君不見玄沙有言兮大丈夫先天為心祖天童覺云山推嶽積來瓦解氷消去則時人知有與我放出關中主看且合作麼生有底道當時便喝當時便掌然則一期瞎用則得要且未是關中主在還體得麼當堂不正坐那赴兩頭機瑞州九峰通玄禪師僧問自心他心得相見否師曰自己尚不見他人何可觀偽唐乾寧三年二月十七日晨興戒其徒曰無虗度光陰無虗消信施既已出家惟道是履名大丈夫於是寂然在定至三月二十日乃化閲世六十有三坐四十二夏師引法華經以明五位語具洞山五位章中
