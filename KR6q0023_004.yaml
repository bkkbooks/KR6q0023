body:
  text: 東土祖師初祖菩提達磨大師者南天竺國香至王第三子也姓剎帝利本名菩提多羅後於般若多羅尊者得法尊者謂曰汝於諸法已得通量達磨者通大之義也宜名達磨因改今名祖問尊者當往何國作佛事者曰汝雖得法未可遠遊且止南天待吾滅後六十七載當往震旦設大法藥直接上根慎勿遠行衰於日下祖又曰彼有大士堪為法器否千載之下有留難否者曰汝所化之方獲菩提者不可勝數吾滅後六十餘年彼國有難水中文布自善降之汝至南方勿住彼惟好有為功業不見佛理汝縱到彼亦不可久留聽吾偈曰路行跨水復逢羊獨自栖栖暗渡江日下可憐雙象馬二株嫩桂久昌昌又問曰此後更有何事者曰從是已去一百五十年而有小難聽吾讖偈曰心中雖吉外頭凶川下僧房名不中為遇毒龍生武子忽逢小鼠寂無窮又問此後如何者曰却後二百二十年林下見一人當得道果聽吾讖曰震旦雖濶無別路要假兒孫腳下行金雞解銜一粒粟供養十方羅漢僧復演諸偈皆預讖佛教隆替事具寶林傳及聖胄集祖恭稟教義服勤四十年逮尊者順世遂演化本國時有二師一名佛大先二名佛大勝多本與祖同學佛陀跋陀小乘禪觀佛大先既遇般若波羅尊者捨小趣大與祖並化時號為二甘露門矣而佛大勝多更分徒而為六宗第一有相宗第二無相宗第三定慧宗第四戒行宗第五無得宗第六寂靜宗各封己解別展化源祖喟然歎曰彼之一師已陷牛迹況復支離而分六宗我若不除永纏邪見言已微現神力至有相宗所問曰一切諸法何名實相彼衆中有一尊長薩婆羅答曰於諸相中不互諸相是名實相祖曰一切諸相而不互者若名實相當何定耶彼曰於諸相中實無有定若定諸相何名為實祖曰諸相不定便名實相汝今不定當何得之彼曰我言不定不説諸相當説諸相其義亦然祖曰汝言不定當為實相定不定故即非實相彼曰定既不定即非實相知我非故不定不變祖曰汝今不變何名實相已變已往其義亦然彼曰不變當在在不在故故變實相以定其義祖曰實相不變變即非實於有無中何名實相薩婆羅心知聖師懸解潛達即以手指虗空曰此是世間有相亦能空故當我此身得似此否祖曰若解實相即見非相若了非相其色亦然當於色中不失色體於非相中不礙有故若能是解此名實相彼衆聞已心意朗然欽禮信受祖瞥然匿迹至無相宗所而問曰汝言無相當何證之彼衆中有波羅提者答曰我明無相心不現故祖曰汝心不現當何明之彼曰我明無相心不取捨當於明時亦無當者祖曰於諸有無心不取捨又無當者諸明無故彼曰入佛三昧尚無所得何況無相而欲知之祖曰相既不知誰云有無尚無所得何名三昧彼曰我説不證證無所證非三昧故我説三昧祖曰非三昧者何當名之汝既不證非證何證波羅提聞祖辨析即悟本心禮謝於祖懺悔往謬祖記曰汝當得果不久證之此國有魔非久降之言已忽然不現至定慧宗所問曰汝學定慧為一為二彼衆中有婆蘭陀者答曰我此定慧非一非二祖曰既非一二何名定慧彼曰在定非定處慧非慧一即非一二亦不二祖曰當一不一當二不二既非定慧約何定慧彼曰不一不二定慧能知非定非慧亦復然矣祖曰慧非定故然何知哉不一不二誰定誰慧婆蘭陀聞之疑心氷釋至第四戒行宗所問曰何者名戒云何名行當此戒行為一為二彼衆中有一賢者答曰一二二一皆彼所生依教無染此名戒行祖曰汝言依教即是有染一二俱破何言依教此二違背不及於行內外非明何名為戒彼曰我有內外彼已知竟既得通達便是戒行若説違背俱是俱非言及清淨即戒即行祖曰俱是俱非何言清淨既得通故何談內外賢者聞之即自慚服至無得宗所問曰汝云無得無得何得既無所得亦無得得彼衆中有寶靜者答曰我説無得非無得得當説得得無得是得祖曰得既不得得亦非得既云得得得得何得彼曰見得非得非得是得若見不得名為得得祖曰得既非得得得無得既無所得當何得得寶靜聞之頓除疑網至寂靜宗所問曰何名寂靜於此法中誰靜誰寂彼衆中有尊者答曰此心不動是名為寂於法無染名之為靜祖曰本心不寂要假寂靜本來寂故何用寂靜彼曰諸法本空以空空故於彼空空故名寂靜祖曰空空已空諸法亦爾寂靜無相何靜何寂彼尊者聞師指誨豁然開悟於是六衆咸誓歸依化被南天聲馳五印經六十載度無量衆後值異見王欲毀佛法王故祖之姪也祖憫之欲開其蒙而六衆亦各念佛法有難師將何所匡濟祖遙知衆意彈指應之六衆悉聞云此我師信響也皆至祖所祖曰一翳蔽空孰為翦之前無相宗宗勝欲行祖曰汝雖辨慧道力未全且與王無緣勝辭祖竟至王所廣陳法要王曰汝今所解其法何在宗勝曰如王治化當合其道王所有道其道何在王曰我所有道將除邪法汝所有法將伏何人祖不起於座懸知宗勝義墮召波羅提曰宗勝不稟吾語與王論屈汝急往救波羅提曰願假神力言訖雲起足下遂乘以見王王正問宗勝忽見愕然忘其所問而顧波羅提曰乘空來者是正是邪提曰我非邪正而來正邪王心若正我無邪正王雖驚異而驕慢方熾即擯宗勝令出波羅提曰王既有道何擯沙門我雖無解願王致問王怒而問曰何者是佛提曰見性是佛王曰師見性否提曰我見佛性王曰性在何處提曰性在作用王曰是何作用我今不見提曰今現作用王自不見王曰於我有否提曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現提曰若出現時當有其八王曰其八出現當為我説波羅提即説偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟悔謝前非咨詢法要妙喜云即今敢問諸人那箇是佛性那箇是精魂王復問波羅提師承為誰提曰大王之叔菩提達磨也王聞遽勑近臣迎祖至王宮祖為王懺悔往非王聞泣謝隨詔宗勝歸國近臣曰宗勝被謫時已捐軀投崖矣祖曰勝尚在召之當至初勝受擯耻不能正王遂投身危崖俄有神人以手捧承置於巖上勝曰我忝沙門當與正法為主不能抑絶王非是以捐身自責神何佑助願示所以於是神人乃説偈曰師壽於百歲八十而造非為近至尊故熏修而入道雖具少智慧而多有彼我所見諸賢等未嘗生珍敬二十年功德其心未恬靜聰明輕慢故而獲至於此得王不敬者常感果如是自今不疏怠不久成奇智諸聖悉存心如來亦復爾勝聞偈欣然遂宴坐巖間至是王遣使山中召勝祖謂王曰知勝來乎王曰未知祖曰再命乃來耳使者至山而勝辭果再命乃至祖念東震旦國佛記後五百歲般若智燈運光於彼遂囑弟子不若蜜多羅住天竺傳法而躬至震旦乃辭祖塔別學侶且謂王曰勤修白業吾去一九即回祖泛重溟凡三周寒暑達於南海實梁普通七年庚子歲九月二十一日也廣州刺史蕭昂具禮迎供表聞武帝帝遣使齋詔迎請以十月一日至金陵帝問曰朕即位以來造寺寫經度僧不可勝紀有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德祖曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不悟雪竇頌云聖諦廓然何當辨的對朕者誰還云不識因茲暗渡江豈免生荊棘闔國人追不再來千古萬古空相憶休相憶清風匝地有何極顧視左右云這裏還有祖師麼喚來與老僧洗腳別記云帝後舉問志公公曰陛下還識此人不帝曰不識公曰此是觀音大士傳佛心印帝悔欲遣使追請公曰莫道遣一使請闔國人去他未采著在圜悟勤云武帝道不識且道與達磨道底是同是別似則也似是即未是人多錯會道前來達磨是答他禪後來武帝是對他志公問乃相識之識且得沒交涉當時志公恁麼問且道作麼生祇對何不一棒打殺免見塗糊志公化在天監十三年相去已久此必繆傳今録此者以勤公拈語也祖知機不契是月十九日潛回江北十一月二十三日屆洛陽寓止嵩山少林寺面壁而坐終日默然人莫之測謂之壁觀婆羅門有僧神光久居伊洛博覽群籍善談玄理每歎曰孔老之教禮術風規莊易之書未盡妙理近聞達磨大士住止少林至人不遙當造玄境遂詣祖參承祖常端坐面壁莫聞誨勵光自惟曰昔人求道敲骨取髓刺血濟飢布髮掩泥投崖飼虎古尚若此我又何人值大雪光夜侍立遲明積雪過膝立愈恭祖顧而憫之問曰汝久立雪中當求何事光悲淚曰惟願和尚慈悲開甘露門廣度群品祖曰諸佛無上妙道曠劫精勤難行能行非忍而忍豈以小德小智輕心慢心欲冀真乘徒勞勤苦光聞祖誨勵潛取利刀自斷左臂置於祖前祖知是法器乃曰諸佛最初求道為法忘形汝今斷臂吾前求亦可在祖遂因與易名曰慧可乃曰諸佛法印即得聞乎祖曰諸佛法印匪從人得可曰我心未寧乞師與安祖曰將心來與汝安可良久曰覔心了不可得祖曰我與汝安心竟芭蕉清云金剛與泥人揩背圜悟勤云正當與麼時法身在甚麼處越九年欲返天竺命門人曰時將至矣汝等盍言所得乎有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨最後慧可禮拜依位而立祖曰汝得吾髓乃顧慧可而告之曰昔如來以正法眼付迦葉大士展轉囑纍而至於我我今付汝汝當護持并授汝袈裟以為法信各有所表宜可知矣可曰請師指陳祖曰內傳法印以契證心外付袈裟以定宗旨後代澆薄疑慮競生云吾西天之人言汝此方之子馮何得法以何證之汝今受此衣法却後難生但出此衣并吾法偈用以表明其化無礙至吾滅後二百年衣止不傳法周沙界明道者多行道者少説理者多通理者少潛符密證千萬有餘汝當闡揚勿輕未悟一念回機便同本得聽吾偈曰吾本來茲土傳法救迷情一花開五葉結果自然成祖又曰吾有楞伽經四卷亦用付汝即是如來心地要門令諸衆生開示悟入吾自到此凡五度中毒我嘗自出而試之置石石裂緣吾本離南印來此東土見赤縣神州有大乘氣象遂踰海越漠為法求人際會未諧如愚若訥今得汝傳授吾意已終別記云祖初居少林寺九年為二祖説法秖教外息諸緣內心無喘心如墻壁可以入道慧可種種説心性曾未契理祖秖遮其非不為説無念心體可忽曰我已息諸緣祖曰莫成斷滅去否可曰不成斷滅祖曰此是諸佛所傳心體更勿疑也言已乃與徒衆往禹門千聖寺止三日有期城太守楊衒之早慕佛乘問祖曰西天五印師承為祖其道如何祖曰明佛心宗行解相應名之曰祖又問此外如何祖曰須明他心知其今古不厭有無於法無取不賢不愚無迷無悟若能是解故稱為祖又曰弟子歸心三寶亦有年矣而智慧昏蒙尚迷真理適聽師言罔知攸措願師慈悲開示宗旨祖知懇到即説偈曰亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同躔超然名之曰祖衒之聞偈悲喜交并曰願師久住世間化導群有祖曰吾即逝矣不可久留根性萬差多逢愚難衒之曰未審何人弟子為師除得否祖曰吾以傳佛祕密利益迷塗害彼自安必無此理衒之曰師若不言何表通變觀照之力祖不獲已乃為讖曰江槎分玉浪管炬開金鎖五口相共行九十無彼我衒之莫測禮辭而去時魏氏奉釋禪雋如林光統律師流支三藏者僧中鸞鳳而議多與祖相違祖玄風所被有識咸歸彼徒生嫉數加毒藥莫能中傷至第六度以化緣既畢遂端居而逝葬熊耳山起塔定林寺其年魏使宋雲𦵇嶺回見祖手携隻履翩翩而逝雲問師何往祖曰西天去雲歸具説其事及門人啓壙棺空惟隻履存焉詔取遺履少林寺供養至唐開元十五年丁卯為信道者竊在五臺今不知所在傳燈載師示寂之日為魏莊永安元年戊申十月五日通論據史辨其訛故今削去禾山方曰死心先師每舉隻履西歸話以問衲子而實難明諸方或謂之隱顯或謂不可有兩箇或謂惟此一事實若也恁麼未識祖師意旨諸人要見麼濁中清清中濁勿謂麒麟生隻角西行東向路不差大用頭頭如啐莫莫玄要靈機休卜度二祖慧可大師武牢人姬氏子父寂以無子禱祈既久一夕有異光照室母遂懷妊故生而名之曰光少則超然博極載籍尤善談老莊後覽佛乘遂盡棄去依寶靜禪師出家遍學大小乘義年三十三返香山終日宴坐又八年於寂默中忽見一神人謂曰將欲受果汝其南矣翌日覺頭痛如刺欲治之忽聞空中曰此換骨也往見靜述其事靜視之見頂骨嶢然如五峯秀出以有神異更名神光靜語祖曰汝相吉祥而神令汝南彼少林有達磨大士必汝師矣祖遂造少室逮得法至北齊天平二年有一居士年踰四十不言名氏聿來設禮而問祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺士良久曰覓罪了不可得祖曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之即為剃髮曰是吾寶也宜名僧璨其年三月十八日於光福寺受具自茲疾漸愈執侍經二載祖遂囑纍付以衣法偈曰本來緣有地因地種花生本來無有種花亦不曾生又曰汝受吾教宜處深山未可行化當有國難般若多羅懸記所謂心中雖吉外頭凶者是也吾亦有宿纍今往酬之汝諦思聖記勿罹世難善去善行俟時傳付祖乃往鄴都化導四衆皈依三十四載遂韜光混迹變易儀相或入酒肆或過屠門或習街談或隨廝役或問之曰師是道人何故如是祖曰我自調心何關汝事後至管城縣匡救寺説法有辨和法師正於其寺講涅槃經其徒多去之而從祖和憤嫉興謗於邑宰翟仲侃侃加祖以非法祖怡然委順識真者謂之償債時年一百七矣隋文帝開皇十三年癸丑三月十六也葬磁州滏陽縣東北七十里唐德宗諡大祖禪師辨和或云道恆恆聞祖語詆為邪説遣徒破祖其徒至輒欣服不去恆有遇之塗者恆曰我用爾許功開爾眼今反爾耶其徒曰我眼本正因師故邪恆遂深怒密謀興謗致祖非法皓月供奉問長沙岑和尚古德云了即業障本來空未了應須償宿債只如師子尊者二祖大師為甚却償債去沙曰大德不識本來空月曰如何是本來空沙曰業障是曰如何是業障沙曰本來空是月無語沙以偈示之曰假有元非有假滅亦非無涅槃償債義一性更非殊三祖僧璨大師不知何許人以白衣謁二祖得度傳法後隱於舒之皖公山往來太湖縣司空山當後周毀法祖深自韜晦居無常處積十餘載人無能知者至隋開皇十二年有沙彌道信年始十四來禮祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信於言下大悟統要云信於是有省又問如何是古佛心祖曰汝今是甚麼心曰我今無心祖曰汝既無心諸佛豈有耶信于是頓息其疑服勞九載後於吉州受戒侍奉尤謹祖屢試以玄微知其緣熟乃付衣法偈曰華種雖因地從地種華生若無人下種華地盡無生祖又曰昔可大師付吾法後往鄴都行化三十餘年今吾得汝何滯此乎即適羅浮山優遊二載却還舊址逾月士民奔趨大設檀供祖為四衆廣宣心要訖於法會大樹下合掌立化隋煬大業二年丙寅十月十五日也祖説法三十餘年絶口不談其姓族鄉邑常語四祖云有人借問勿道於我處得法祖著信心銘曰至道無難惟嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識玄旨徒勞念靜圓同太虗無欠無餘良由取舍所以不如莫逐有緣勿住空忍一種平懷泯然自盡止動歸止止更彌動惟滯兩邊寧知一種一種不通兩處失功遣有沒有從空背空多言多慮轉不相應絶言絶慮無處不通歸根得旨隨照失宗須臾返照勝却前空前空轉變皆由妄見不用求真惟須息見二見不住慎莫追尋才有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能由境滅境逐能沉境由能境能由境能欲知兩段原是一空一空同兩齊含萬象不見精粗寧有偏黨大道體寬無易無難小見狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絶惱繫念乖真昏沉不好不好勞神何用疏親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空花何勞把捉得失是非一時放却眼若不寐諸夢自除心若不異萬法一如一如體玄兀爾忘緣萬法齊觀歸復自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作俱息狐疑盡淨正信調直一切不留無可記憶虗明自照不勞心力非思量處識情難測真如法界無他無自要急相應惟言不二不二皆同無不包容十方智者皆入此宗宗非延促一念萬年無在不在十方目前極小同大忘絶境界極大同小不見邊表有即是無無即是有若不如是必不須守一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今圓悟勤云人多錯會道至道本無難亦無不難只是唯嫌揀擇若恁麼會一萬年也未夢見在中峯本禪師作信心銘闢義解每兩句下申以示語次述義解乃作闢義復繫以偈聊録二三要之大旨悉如是矣至道無難唯嫌揀擇初示語云神光烜赫萬靈罔測踞羣象之深淵啓重玄之大宅臨濟用金剛王發雷轟霆震之令望影尤難德山遣木上座奮風馳電走之威追蹤莫及陶形鑄象不居其有功負海擎山似覺其無力黃面漢四十九年有手只好拏空白拈賊千七百箇有口惟堪挂壁最現成難委悉擬向當陽指似伊早是門前起荊棘次述義解云祖師道至道無難唯嫌揀擇義解者謂此兩句乃一篇之要綱一銘之本旨然信之一言全該悟證非信行之信也如法華之諸子於會權入實之際作信解品以述其懷吾祖目之曰至道唯佛證之曰菩提衆生昧之曰無明教中彰之為本覺皆一心之異名也至若遍該名相涉入色空異轍殊塗千條萬目豈乖優劣靡隔悟迷莫不由斯而著如趙州之柏樹子楊岐之金剛圈密菴之破沙盆東山之鐵酸餡異端並起邪法難扶則知至道之話行矣該通事理融貫古今説箇無難早成剩語然聖凡染淨極目全真揀擇情生迥乖至體是謂唯嫌揀擇也下文雖殊悉稟其意闢曰依稀相似倣佛不同且至道二字任你意解謂無難之旨須相應始得自非心開神悟妙契冥符迥絶見知超出言象者望無難之旨不啻天淵於根境相對差別互陳不能當處解脫擬將箇無難不簡擇底道理存乎胸臆又豈止於認賊為子矣故於此不能忘言偈曰至道不應嫌揀擇莫言揀擇墮凡情快須擉瞎娘生眼白日挑燈讀此銘良由取捨所以不如示語云薦福莫趙州無雪峯放出南山鱉鼻雲門打殺東海鯉魚興化赴村齋向古廟裏躲卒風暴雨丹霞燒木佛却教院主墮眉鬚疑殺人間幾丈夫述義解云祖師道良由取捨所以不如義解者謂此心既如太虗之圓無相不具一切皆如你於染淨法中瞥生取捨則不如也闢曰若是真正本色參學上士見此等説話底人便與劈面唾不為性燥蓋像龍不能致雨故也偈曰取既非如捨不如是牛誰敢喚為驢大千沙界金剛體也是重栽頷下鬚一種平懷泯然自盡示語云不動道場無生法忍皓月照扉清風拂屏枕有佛處不得住鐵裹燈心無佛處急走過花鋪蜀錦三千里外摘楊花十方虗空盡銷隕易商量難定準海底泥牛喫鐵鞭百草頭邊風凜凜述義解云祖師道一種平懷泯然自盡義解者謂取捨之情既盡聖凡知見無依自然一切處平常一切處泯滅闢曰白日青天莫寐語好即今眼見色耳聞聲喚甚麼作平懷不平懷偈曰泯然盡處事無涯百草頭邊正眼開生死涅槃俱揑碎不知何處著平懷無咎無法不生不心示語云太華山非險滄溟海不深盧同月蝕詩有何難讀伯牙流水曲煞有知音惟有東山暗號子收來無縫罅放去卒難尋攪擾幾多伶俐客摩裩擦袴到于今述義解云祖師道無咎無法不生不心義解者謂此二句返上二句而言謂無咎則萬法自消不生則一心自寂法消心寂至道之體沖然不待得而得矣闢曰昔僧問趙州學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了也州云洗鉢盂去此僧悟去且道此僧當時悟無咎耶悟無法耶悟不生耶悟不心耶試定當看偈曰法法只因無咎咎心心多謂不生生寒猿夜哭巫山月客路原來不可行中峯老人費爾許唇舌要之不出圓悟大師數語也今之人讀此銘順文解義未有出於所述義解者然則自昔宗師深斥此何哉莫是擬心即差不作義解則得麼咦去去西天路迢迢十萬餘莫錯領解賺到臘月三十日手忙腳亂懊悔則遲也四祖道信大師者姓司馬氏世居河內後徙於蘄州廣濟縣生而超異幼慕空宗諸解脫門宛如宿習既嗣祖風攝心無寐脅不至席者六十年于隋大業十三載領徒衆抵吉州值群盜圍城七旬不解萬衆惶怖祖愍之教念摩訶般若時賊衆望雉堞間若有神兵乃相謂曰城內必有異人稍稍引去唐武德甲申歲師却返蘄春住破頭山學侶雲臻一日往黃梅縣路逢一小兒骨相奇秀異乎常童祖問曰子何姓答曰姓即有不是常姓祖曰是何姓答曰是佛性祖曰汝無姓耶答曰性空故無祖默識其法器即俾侍者至其母所乞令出家母以宿緣故殊無難色遂捨為弟子以至付法傳衣偈曰華種有生性因地華生生大緣與性合當生生不生貞觀癸卯歲太宗嚮師道味欲瞻風彩詔赴京祖上表遜謝前後三返第四度命使曰如果不起取首來使至山諭旨祖乃引頸就刃神色儼然使回以狀聞帝彌欽重高宗永徽辛亥歲閏九月四日忽垂誡門人曰一切諸法悉皆解脫汝等各自護念流化未來言訖安坐而逝壽七十有二塔於本山明年四月八日塔戶自開儀相如生爾後門人遂不敢復閉焉五祖弘忍大師者蘄州黃梅人也先為破頭山中栽松道者嘗請於四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶儻若再來吾尚可遲汝乃去行水邊見一女子浣衣揖曰寄宿得否女曰我有父兄可往求之曰諾我即敢行女首肯之即回策而去女周氏季子也歸輒孕父母大惡逐之女無所歸日傭紡里中夕止於衆館之下已而生一子以為不祥因拋濁港中明日見之泝流而上氣體鮮明大驚遂舉之成童隨母乞食里人呼為無姓兒逢一智者歎曰此子缺七種相不逮如來後遇信大師得法嗣化於破頭山咸亨中有居士姓盧名慧能自新州來參謁祖問曰汝自何來盧曰嶺南祖曰欲須何事盧曰唯求作佛祖曰嶺南人無佛性若為得佛盧曰人即有南北佛性豈然祖令隨衆作務盧曰弟子自心常生智慧不離自性即是福田未審和尚教作何務祖曰這獦獠根性太利著槽廠去盧禮足而退便入碓坊服勞於杵臼晝夜不息經八月祖知付授時至告衆曰正法難解不可徒記吾言持為己任汝等各自隨意述一偈若語意冥符則衣法皆付時會下七百餘僧上座神秀者學通內外衆所宗仰咸推稱曰若非尊秀疇敢當之神秀竊聆衆譽不復思惟乃於廊壁書一偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃祖因經行忽見此偈知是神秀所述乃讚歎曰後代依此修行亦得勝果其壁本欲令處士盧珍繪楞伽變相及見題偈在壁遂止不畫各令念誦盧在碓坊忽聆誦偈乃問同學是何章句同學曰汝不知和尚求法嗣令各述心偈此則秀上座所述和尚深加歎賞必將付法傳衣也盧曰其偈云何同學為誦盧良久曰美則美矣了則未了同學訶曰庸流何知勿發狂言盧曰子不信耶願以一偈和之同學不答相視而笑盧至夜密告一童子引至廊下盧自秉燭請別駕張日用於秀偈之側寫一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖後見此偈曰此是誰作亦未見性衆聞祖語遂不之顧逮夜祖潛詣碓坊問曰米白也未盧曰白也未有篩祖以杖三擊其碓盧即以三鼓入室祖告曰諸佛出世為一大事故隨機大小而引導之遂有十地三乘頓漸等旨以為教門然以無上微妙祕密圓明真實正法眼藏付於上首大迦葉尊者展轉傳授二十八世至達磨居于此土得可大師承襲以至於今以法寶及所傳袈裟用付於汝善自保護無令斷絶聽吾偈曰有情來下種因地果還生無情既無種無性亦無生盧跪受訖問法則既受衣付何人祖曰昔達磨初至人未之信故傳衣以明得法今信心已熟衣乃爭端止於汝身不復傳也且當遠隱俟時行化所謂受衣之人命如懸絲也盧曰當隱何所祖曰逢懷即止遇會且藏盧禮足已捧衣而出是夜南邁大衆莫知五祖自後不復上堂大衆疑怪致問祖曰吾道行矣何更詢之復問衣法誰得耶祖曰能者得於是衆議盧行者名能即共奔逐祖既付衣法復經四載至上元二年忽告衆曰吾今事畢時可行矣即入室安坐而逝壽七十有四塔於黃梅東山代宗諡曰大滿塔曰法雨及宋遣師將平江南祖肉身出血如淚珠識者知李氏必亡也六祖慧能大師姓盧氏父行母李氏感異夢覺而異香滿室因有娠六年乃生毫光騰空黎明有僧來語祖之父曰此子可名慧能父曰何謂也僧曰惠者以法惠濟衆生能者能作佛事語畢不知所之祖不飲母乳遇夜神人灌以甘露三歲父喪母嫠居家貧甚幼則樵採鬻薪以養母一日負薪過市中聞客讀金剛經至應無所住而生其心有所感悟而問客曰此何法也曰此金剛經黃梅東山五祖忍和尚恆教人誦此經祖聞語勃然思出家求法乃乞于一客為其母備歲儲遂辭母直抵韶州遇高行士劉志略結為交友尼無盡藏者即志略之姑也嘗讀涅槃經師暫聽之即為解説其義尼遂執卷問字祖曰字即不識義即請問尼曰字尚不識曷能會義祖曰諸佛妙理非關文字尼驚異之告鄉里耆艾請居寶林寺寺廢已久四衆營緝朝夕奔湊俄成寶坊祖曰我求大法止此何為遂棄之抵黃梅參禮五祖語在五祖章當呈偈後三鼓入五祖室五祖復徵其初悟應無所住而生其心語祖言下大徹遂啓五祖曰一切萬法不離自性何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無動搖何期自性能生萬法五祖知悟本性謂祖曰不識本心學法無益若識本心見自本性即名丈夫天人師佛遂傳衣法黃龍新禪師頌曰六祖當年不丈夫倩人書壁自塗糊分明有偈言無物却受他家一鉢盂妙喜曰且道鉢盂是物不是物若道是物死心老亦非丈夫若道非物爭奈鉢盂何金剛經悟緣陸氏壇經初敘祖聞經有悟不言至應無所住而有開入惟云聞經有省至三更入室時五祖以袈裟圍祖不令人見為説金剛經至應無所住而大徹此從藏本壇經三更入室五祖徵金剛經傳燈不載其語五祖送祖至九江驛邊令祖上船祖隨即把櫓五祖曰合是吾渡汝祖曰迷時師度悟時自度度名雖一用處不同能蒙師傳法今已得悟只合自性自度五祖云如是如是以後佛法由汝大行祖禮辭南行者兩月至大庾嶺僧惠明本將軍同數百人來欲奪衣鉢明先趁及祖擲衣鉢於石曰此衣表信可力爭耶明舉衣鉢不能動乃曰我為法來不為衣來祖曰汝既為法來可屏息諸緣勿生一念吾為汝説明良久祖曰不思善不思惡正與麼時那箇是明上座本來面目惠明言下大悟復問曰上來密語密意外還更有密意旨否祖曰與汝説者即非密也汝若返照密在汝邊明曰惠明雖在黃梅實未省自己面目今蒙指示如人飲水冷暖自知今行者即惠明師也祖曰汝若如是吾與汝同師黃梅善自護持明又問惠明今向甚處去祖曰逢袁則止遇蒙則居明禮辭還至嶺下謂衆曰向涉崔嵬杳無蹤迹當別道尋之趁衆遂散後明居袁州蒙山避祖諱更名道明祖後至曹溪物色之者稍稍聞遂避難於四會之獵人隊中經十五載時與獵人隨宜説法獵人令守網有獲悉放每飯時常以菜寄煮肉鍋或問則對曰但喫肉邊菜儀鳳元年正月八日忽念説法時至遂出至廣州法性寺值印宗法師講涅槃經寓止廊廡間暮夜風揚剎幡聞二僧對論一曰幡動一曰風動往復不已祖曰不是風動不是幡動仁者心動一衆竦然雪峯云大小祖師龍頭蛇尾好與二十棒孚上座侍次咬齒峯云我與麼道也好與二十棒妙喜云要識孚上座麼犀因玩月紋生角要識雪峯麼象被雷驚花入牙雪竇舉巴陵示衆云祖師道不是風動不是幡動既不是幡風向甚麼處著有人與祖師作主出來與巴陵相見雪竇道風動幡動既是風幡向甚麼處著有人與巴陵作主亦出來與雪竇相見復頌云不是幡兮不是風衲僧於此作流通渡河用筏尋常事南山燒炭北山紅又不是風幡何處著新開作者曾拈却如今懞懂癡禪和漫道玄玄為獨腳育王普崇頌云非風非幡無處著是風是幡無著處撩天俊鶻悉迷蹤踞地金毛還失措阿呵呵悟不悟令人却憶謝三郎一𮈔獨釣寒江雨天台韶云古聖方便猶如河沙祖師道非風幡動仁者心動斯乃無上心印法門我輩是祖師門下客合作麼生會祖師意莫道風幡不動汝心妄動莫道不撥風幡就風幡通取莫道風幡動處是什麼有云附物明心不須認物有云色即是空有云非風幡動應須妙會如是解會與祖師意旨有何交涉既不許如是會諸上座合如何知悉若於這裏徹底悟去何法門而不明百千諸佛方便一時洞了更有甚麼疑情所以古人道一了千明一迷萬惑上座豈是今日會得一則明日又不會也智證傳楞伽經偈曰由自心執著心似外境轉彼所見非有是故説惟心傳曰曹溪六祖隱晦時號盧居士嘗客廣州精舍夜經行聞兩僧論風幡一曰風動一曰幡動六祖前曰肯使俗流輒與高論否正以風幡非動仁者心動耳法空禪師深居五臺山每夜必聞有聲召曰空禪法空患之久而自悟曰皆我自心之境安有外聲哉以法遣之自後遂絶夫言彼所見非有者以風幡相待無有定屬以無定屬緣生則名無生六祖所示見境既爾則空禪所悟聞塵亦然首楞嚴曰見聞如幻翳三界若空華聞復翳根除塵消覺圓淨淨極光通達寂照含虗空却來觀世間猶如夢中事者渠不信夫幻寄曰豫少讀宋人詩麥浪豈緣風滾滾荷珠不為露涓涓躍然喜謂是風幡公案好注腳及讀雪峯雪竇諸大老拈提語爽然自失洪公此傳未可過諸老門限也印宗延至上席徵詰奧義見祖言簡理當不由文字乃曰久聞黃梅衣法南來莫是行者否祖曰然印宗作禮請衣鉢出示大衆令瞻禮宗復問曰黃梅付囑如何指授祖曰指授即無惟論見性不論禪定解脫宗曰何不論禪定解脫祖曰為是二法不是佛法佛法是不二之法宗又問如何是佛法不二之法祖曰法師講涅槃經明佛性是佛法不二之法如高貴德王菩薩白佛言犯四重禁作五逆罪及一闡提等當斷善根佛性否佛言善根有二一者常二者無常佛性非常非無常是故不斷名為不二一者善二者不善佛性非善非不善是名不二蘊之與界凡夫見二智者了達其性無二無二之性即是佛性印宗聞説歡喜合掌真淨和尚舉印宗問祖不二之法祖云云曰諸禪德彼時小巧禪道早是中半丁也如今叢林多是惟論禪定解脫無念無為且道六祖底是如今底是分即是不分即是若分去有違有順有是有非若不分又不辨邪正埋沒我宗乘譬如世間道路有直有迂有險有善其行路者可行即行可止即止大衆還識泐潭老僧麼良久云將此深心奉塵剎是則名為報佛恩正月十五日印宗會諸名德為祖剃髮二月八日就法性寺智光律師授滿分戒其戒壇即宋求那跋陀三藏之所置也三藏記云後當有肉身菩薩在此壇受戒又梁末真諦三藏於壇之側手植二菩提樹謂衆曰却後一百二十年有大開士於此樹下演無上乘度無量衆祖受戒已於此樹下開東山法門宛如宿契次日韋使君請益師升座告大衆曰總淨心念摩訶般若波羅蜜多復云善知識菩提般若之智世人本自有之只緣心迷不能自悟須假大善知識示導見性當知愚人智人佛性本無差別只緣迷悟不同所以有愚有智吾今為説摩訶般若波羅蜜法使汝等各得智慧志心諦聽吾為汝説善知識世人終日口念般若不識自性般若猶如説食不飽口但説空萬劫不得見性終無有益善知識摩訶般若波羅蜜是梵語此言大智慧到彼岸此須心行不在口念口念心不行如幻如化如露如電口念心行則心口相應本性是佛離性無別佛何名摩訶摩訶是大心量廣大猶如虗空無有邊畔亦無方圓大小亦非青黃赤白亦無上下長短亦無嗔無喜無是無非無善無惡無有頭尾諸佛剎土盡同虗空世人妙性本空無有一法可得自性真空亦復如是善知識莫聞吾説空便即著空第一莫著空若空心靜坐即著無記空善知識世界虗空能含萬物色像日月星宿山河大地泉源溪澗草木叢林惡人善人惡法善法天堂地獄一切大海須彌諸山總在空中世人性空亦復如是善知識自性能含萬法是大萬法在諸人性中若見一切人惡之與善盡皆不取不捨亦不染著心如虗空名之為大故曰摩訶善知識迷人口説智者心行又有迷人空心靜坐百無所思自稱為大此一輩人不可與語為邪見故善知識心量廣大遍周法界用即了了分明應用便知一切一切即一一即一切去來自由心體無滯即是般若善知識一切般若智皆從自性而生不從外入莫錯用意名為真性自用一真一切真心量大事不行小道口雖終日説空心中不修此行恰似凡人自稱國王終不可得非吾弟子善知識何名般若般若者唐言智慧也一切處所一切時中念念不愚常行智慧即是般若行一念愚即般若絶一念智即般若生世人愚迷不見般若口説般若心中常愚常自言我修般若念念説空不識真空般若無形相智慧心即是若作如是解即名般若智何名波羅蜜此是西竺語唐言到彼岸解義離生滅著境生滅起如水有波浪即名為此岸離境無生滅如水常通流即名為彼岸故號波羅蜜善知識迷人口念當念之時惟妄惟非念念若行是名真性悟此法者是般若法修此行者是般若行不修即凡一念修行自身等佛善知識凡夫即佛煩惱即菩提前念迷即凡夫後念悟即佛前念著境即煩惱後念離境即菩提善知識摩訶般若波羅蜜最尊最上最第一無住無往亦無來三世諸佛從中出當用大智慧打破五蘊煩惱塵勞如此修行定成佛道變三毒為戒定慧善知識我此法門從一般若生八萬四千智慧何以故為世人有八萬四千塵勞若無塵勞智慧常現不離自性悟此法者即是無念無憶無著不起誑妄用自真如性以智慧觀照於一切法不取不捨即是見性成佛道善知識若欲入甚深法界及般若三昧者須修般若行持誦金剛般若經即得見性當知此功德無量無邊經中分明讚歎莫能具説此法門是最上乘為大智人説為上根人説小根小智人聞心生不信何以故譬如大龍下雨於閻浮提城邑聚落悉皆漂流如漂棗葉若雨大海不增不減若大乘人若最上乘人聞説金剛經心開悟解故知本性自有般若之智自用智慧常觀照故不假文字譬如雨水不從天有元是龍能興致令一切衆生一切草木有情無情悉皆蒙潤百川衆流却入大海合為一體衆生本性般若之智亦復如是善知識小根之人聞此頓教猶如草木根性小者若被大雨悉皆自倒不能增長小根之人亦復如是元有般若之智與大智人更無差別因何聞法不自開悟緣邪見障重煩惱根深猶如大雲覆蓋於日不得風吹日光不現般若之智亦無大小為一切衆生自心迷悟不同迷心外見修行覔佛未悟自性即是小根若開悟頓教不執外修但於自心常起正見煩惱塵勞常不能染即是見性善知識內外不住去來自由能除執心通達無礙能修此行與般若經本無差別善知識一切修多羅及諸文字皆因人置因智慧性方能建立若無世人一切萬法本自不有故知萬法本自人興一切經書因人説有緣其中人有愚有智愚為小人智為大人愚者問於智人智者與愚人説法愚人忽悟解心開即與智人無別善知識不悟即佛是衆生一念悟時衆生是佛故知萬法盡在自心何不從自心中頓見真如本性菩薩戒經云我本元自性清淨若識自心見性皆成佛道淨名經云即時豁然還得本心善知識我於忍和尚處一聞言下便悟頓見真如本性是以將此教法流行令學道者頓悟菩提各自觀心自見本性若自不悟須覔大善知識解最上乘法者直示正路是善知識有大因緣所謂化導令得見性一切善法因善知識能發起故三世諸佛十二部經在人性中本自具有不能自悟須求善知識指示方見若自悟者不假外求若一向執謂須要他善知識方得解脫者無有是處何以故自心內有知識自悟若起邪迷妄念顛倒外善知識即有教授救不可得若起正真般若觀照一剎那間妄念俱滅識自本性一悟即至佛地善知識智慧觀照內外明徹識自本心若識本心即本解脫若得解脫即是般若三昧般若三昧即是無念何名無念若見一切法心不染著是為無念用即遍一切處亦不著一切處但淨本心使六識出六門於六塵中無染無雜來去自由通用無滯即是般若三昧自在解脫名無念行若百不思常令念絶即是法縛即名邊見善知識悟無念法者萬法盡通悟無念法者見諸佛境界悟無念法者至佛地位善知識後代得吾法者將此頓教法門於同見同行發願受持如事佛故終身而不退者定入聖位然須傳授從上已來默傳分付不得匿其正法若不同見同行在別法中不得傳付損彼前人究竟無益恐愚人不解謗此法門百劫千生斷佛種性善知識吾有一無相頌各須誦取在家出家但依此修若不自修惟記吾言亦無有益聽吾頌曰説通及心通如日處虗空惟傳見性法出世破邪宗法即無頓漸迷悟有遲疾只此見性門愚人不可悉説即雖萬般合理還歸一煩惱暗宅中常須生慧日邪來煩惱至正來煩惱除邪正俱不用清淨至無餘菩提本無性起心即是妄淨心在妄中但正無三障世人若修道一切盡不妨常見自己過與道即相當色類自有道各不相妨惱離道別覔道終身不見道波波度一生到頭還自懊欲得見真道行正即是道自若無道心暗行不見道若真修道人不見世間過若見他人非自非却是左他非我不非我非自有過但自却非心打除煩惱破僧愛不關心長伸兩腳臥欲擬化他人自須有方便勿令彼有疑即是自性現佛法在世間不離世間覺離世覔菩提恰如求兔角正見名出世邪見是世間邪正盡打却菩提性宛然此頌是頓教亦名大法船迷聞經纍劫悟則剎那間韋刺史問曰弟子常見僧俗念阿彌陀佛願生西方請和尚説得生彼否願為破疑祖曰使君善聽慧能與説世尊在舍衛城中説西方引化經文分明説去此不遠若論相説里數有十萬八千即身中十惡八邪便是説遠説遠為其下根説近為其上智人有兩種法無兩般迷悟有殊見有遲疾迷人念佛求生於彼悟人自淨其心所以佛言隨其心淨則佛土淨使君東方人但心淨即無罪雖西方人心不淨亦有愆東方人造罪念佛求生西方西方人造罪念佛求生何國凡愚不了自性不識身中淨土願東願西悟人在處一般所以佛言隨所住處恆安樂使君心地但無不善西方去此不遙若懷不善之心念佛往生難到今勸善知識先除十惡即行十萬後除八邪乃過八千念念見性常行平直到如彈指便覩彌陀使君但行十善何須更念往生不斷十惡之心何佛即來迎請若悟無生頓法見西方只在剎那不悟念佛求生路遙如何得達惠能與諸人移西方於剎那間目前便見各願見否衆皆頂禮云若此處見何須更願往生願和尚慈悲便現西方普令得見祖曰大衆世人自色身是城眼耳鼻舌是門外有五門內有意門心是地性是王王居心地上性在王在性去王無性在身心存性去身心壞佛向性中作莫向身外求自性迷即是衆生自性覺即是佛慈悲即是觀音喜捨名為勢至能淨即釋迦平直即彌陀人我是須彌邪心是海水煩惱是波浪毒害是惡龍虗妄是鬼神塵勞是魚鱉貪嗔是地獄愚癡是畜生善知識常行十善天堂便至除人我須彌倒去邪心海水竭煩惱無波浪滅毒害忘魚龍絶自心地上覺性如來放大光明外照六門清淨能破六欲諸天自性內照三毒即除地獄等罪一時消滅內外明徹不異西方不作此修如何到彼大衆聞説了然見性悉皆禮拜俱歎善哉唱言普願法界衆生聞者一時悟解祖曰若欲修行在家亦得不由在寺在家能行如東方人心善在寺不修如西方人心惡但心清淨即是自性西方韋公又問在家如何修行願為教授祖曰吾與大衆作無相頌但依此修常與吾同處無別若不作此修剃髮出家於道何益頌曰心平何勞持戒行直何用修禪恩則親養父母義則上下相憐讓則尊卑和睦忍則衆惡無喧若能鑽木出火淤泥定生紅蓮苦口的是良藥逆耳必是忠言改過必生智慧護短心內非賢日用常行饒益成道非由施錢菩提只向心覔何勞向外求玄聽説依此修行天堂只在目前祖復曰善知識總須依偈修行見取自性直成佛道法不相待幻寄曰祖師教人除人我去邪心與秀師時時勤拂拭是同是別若道是別別在甚處若道是同秀師何以不契黃梅若道此是第二頭語祖師又云依偈修行直成佛道不為第二頭語也於此徹證始有參學分不然特是念言語漢祖師雖日在前末如之何又當用大智慧打破五蘊煩惱塵勞祖語也無念無憶無著祖訓也而對薛簡則斥以智慧照破煩惱對臥輪則云不斷百思想法道何不侔也是以喚作竹篦則觸不喚作竹篦則背不得有言不得無言須彌山乾矢橛青州布衫廬陵米價皆使參學者入壇經之妙筏必契此而後可云能讀壇經也今人讀此者率謂明白簡易無疑於心而於諸方風馳電轉之機則又茫若是未夢見壇經者也果能契于壇經彼風馳電轉者直家常茶飯耳何復疑哉示衆云善知識我此法門以定慧為本大衆勿迷言定慧別定慧一體不是二定是慧體慧是定用即慧之時定在慧即定之時慧在定若識此義即是定慧等學諸學道人莫言先定發慧先慧發定各別作此見者法有二相口説善相心中不善空有定慧定慧不等若心口俱善內外一種定慧即等自悟修行不在於諍若諍先後即同迷人不斷勝負却增我法不離四相善知識定慧猶如何等猶如燈光有燈即光無燈即暗燈是光之體光是燈之用名雖有二體本同一此定慧法亦復如是又云善知識云何立無念為宗只緣口説見性迷人於境上有念念上便起邪見一切塵勞妄想從此而生自性本無一法可得若有所得妄説禍福即是塵勞邪見故此法門立無念為宗善知識無者無何事念者念何物無者無二相無諸塵勞之心念者念真如本性真如即是念之體念即是真如之用真如自性起念非眼耳鼻舌能念真如有性所以起念真如若無眼耳色聲當時即壞善知識真如自性起念六根雖有見聞覺知不染萬境而真性常自在故經云能善分別諸法相於第一義而不動又云此門坐禪元不著心亦不著淨亦不是不動若言著心心元是妄知心如幻故無所著也若言著淨人性本淨由妄念故蓋覆真如但無妄想性自清淨起心著淨却生淨妄妄無處所著者是妄淨無形相却立淨相言是工夫作此見者障自本性却被淨縛善知識若修不動者但見一切人時不見人之是非善惡過患即是自性不動善知識迷人身雖不動開口便説他人是非長短好惡與道違背若著心著淨即障道也無相頌曰迷人修福不修道只言修福便是道布施供養福無邊心中三惡元來造擬將修福欲滅罪後世得福罪還在但向心中除罪緣各自性中真懺悔忽悟大乘真懺悔除邪行正即無罪學道常於自性觀即與諸佛同一類吾祖惟傳此頓法普願見性同一體若欲當來覔法身離諸法相心中洗努力自見莫悠悠後念忽絶一世休若悟大乘得見性虔恭合掌至心求此頌為撥無因果者録南嶽懷讓禪師禮祖祖曰何處來曰嵩山祖曰什麼物恁麼來曰説似一物即不中祖曰還可修證否曰修證即不無污染即不得祖曰只此不污染諸佛之所護念汝既如是吾亦如是西天般若多羅讖汝足下出一馬駒踏殺天下人應一作病在汝心不須速説傳燈祖問什麼物恁麼來讓無語遂經八載忽然有省乃白祖某甲有箇會處祖曰作麼生讓云云與此同青原行思禪師參祖問曰當何所務即不落階級祖曰汝曾作什麼來曰聖諦亦不為祖曰落何階級曰聖諦尚不為何階級之有祖深器之令首衆永嘉玄覺禪師少習經論精天台止觀法門閲維摩經發明心地後遇左溪朗禪師激勵與東陽策禪師同詣曹溪初到振錫繞祖三匝卓然而立祖曰夫沙門者具三千威儀八萬細行大德自何方來生大我慢曰生死事大無常迅速祖曰何不體取無生了無速乎曰體即無生了本無速祖曰如是如是于時大衆無不愕然覺方具威儀參禮須臾告辭祖曰返太速乎曰本自非動豈有速耶祖曰誰知非動曰仁者自生分別祖曰汝甚得無生之意曰無生豈有意耶祖曰無意誰當分別曰分別亦非意祖歎曰善哉少留一宿時謂一宿覺僧法海參問曰即心即佛願垂指諭祖曰前念不生即心後念不滅即佛成一切相即心離一切相即佛吾若具説窮劫不盡聽吾偈曰即心名慧即佛乃定定慧等等燈下等字作持意中清淨悟此法門由汝習性用本無生雙修是正法海言下大悟以偈讚曰即心元是佛不悟而自屈我知定慧因雙修離諸物僧智通看楞伽經約千餘遍不會三身四智禮祖求解其義祖曰三身者清淨法身汝之性也圓滿報身汝之智也千百億化身汝之行也若離本性別説三身即名有身無智若悟三身無有自性即名四智菩提聽吾偈曰自性具三身發明成四智不離見聞緣超然登佛地吾今為汝説諦信永無迷莫學馳求者終日説菩提通曰四智之義可得聞乎祖曰既會三身便明四智何更問耶若離三身別談四智此名有智無身也即此有智還成無智復説偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但用名言無實性若於轉處不留情繁興永處那伽定轉識為智者教中云轉前五識為成所作智轉第六識為妙觀察智轉第七識為平等性智轉第八識為大圓鏡智雖六七因中轉五八果上轉但轉其名而不轉其體也通禮謝以偈贊曰三身元我體四智本心明身智融無礙應物任隨形起修皆妄動守住匪真精妙旨因師曉終無污染名僧志道覽涅槃經至諸行無常是生滅法生滅滅已寂滅為樂而生疑禮祖求發明祖曰汝作麼生疑對曰一切衆生皆有二身謂色身法身也色身無常有生有滅法身有常無知無覺經云生滅滅已寂滅為樂者未審是何身寂滅何身受樂若色身者色身滅時四大分散全是苦苦不可言樂若法身寂滅即同草木瓦石誰當受樂又法性是生滅之體五蘊是生滅之用一體五用生滅是常生則從體起用滅則攝用歸體若聽更生即有情之類不斷不滅若不聽更生即永歸寂滅同於無情之物如是則一切諸法被涅槃之所禁伏尚不得生何樂之有祖曰汝是釋子何習外道斷常邪見而議最上乘法據汝所解即色身外別有法身離生滅求於寂滅又推涅槃常樂言有身受者斯乃執吝生死耽著世樂汝今當知佛為一切迷人認五蘊和合為自體相分別一切法為外塵相好生惡死念念遷流不知夢幻虗假枉受輪回以常樂涅槃翻為苦相終日馳求佛愍此故乃示涅槃真樂剎那無有生相剎那無有滅相更無生滅可滅是則寂滅現前當現前之時亦無現前之量乃謂常樂此樂無有受者亦無不受者豈有一體五用之名何況更言涅槃禁伏諸法令永不生斯乃謗佛毀法聽吾偈曰無上大涅槃圓明常寂照凡愚謂之死外道執為斷諸求二乘人目以為無作盡屬情所計六十二見本妄立虗假名何為真實義唯有過量人通達無取捨以知五蘊法及以蘊中我外現衆色象一一音聲相平等如夢幻不起凡聖見不作涅槃解二邊三際斷常應諸根用而不起用想分別一切法不起分別想劫火燒海底風鼓山相擊真常寂滅樂涅槃相如是吾今強言説令汝捨邪見汝勿隨言解許汝知少分道聞已踊躍作禮而退僧志徹初名行昌姓張少任俠自南北分化二宗主雖忘彼我而徒侶競起愛憎北宗既自立秀師為六祖忌祖傳衣天下所聞囑行昌刺祖祖心通預知其事置金十兩於座間昌懷刃入室祖舒頸就之昌揮刃者三都無所損祖曰正劍不邪邪劍不正只負汝金不負汝命昌驚仆久而方蘇求哀悔過願出家祖以金授曰汝且去恐衆或害汝他日易形而來吾當攝受昌稟旨宵遁遂出家精進一日念祖前命過祖禮覲祖曰吾久念汝汝何來晚曰蒙和尚赦罪今雖出家苦行難報深恩其唯傳法度生乎弟子常覽涅槃經未曉常無常義乞和尚慈悲略為宣説祖曰無常者即佛性也有常者即善惡一切諸法分別心也曰和尚所説大違經文祖曰吾傳佛心印安敢違於佛經曰經説佛性是常和尚却言無常善惡諸法乃至菩提心皆是無常和尚却言是常此則相違令學人轉加迷惑祖曰涅槃經吾昔聽尼無盡藏讀誦一遍便為講説無一字一義不合經文乃至為汝終無二説曰學人識量淺昧願和尚委曲開示祖曰汝知否佛性若常更説甚麼善惡諸法乃至窮劫無有一人發菩提心者故吾説無常正是佛説真常之道也又一切諸法若無常有心字非者即物物皆有自性容受生死而真常性有不遍之處故吾説常者正是佛説真無常義也佛比為凡夫外道執於邪常諸二乘人於常計無常共成八倒故於涅槃了義教中破彼偏見而顯説真常真樂真我真淨汝今依言背義以斷滅無常及確定死常而錯解佛之圓妙最後微言縱覽千遍有何所益行昌忽如醉醒乃説偈曰因守無常心佛演有常性不知方便者猶春池拾礫我今不施功佛性而見前非師相授與我亦無所得祖曰汝今徹也宜名志徹僧志常參祖祖問汝從何來欲求何事曰學人近禮大通和尚蒙示見性成佛之義未決狐疑望賜開示祖曰彼有何言句汝試舉看曰到彼三月未蒙開示以為法切故中夜哀懇大通乃曰汝見虗空否對曰見通曰汝見虗空有相貌否對曰虗空無形有何相貌通曰汝之本性猶如虗空返觀自性了無一物可見是名正見無一物可知是名真知無有青黃長短但見本源清淨覺體圓明即名見性成佛亦名極樂世界亦名如來知見學人雖聞此説猶未決了乞和尚示誨令無凝滯祖曰彼師所説猶存見知故令汝未了吾今示汝一偈曰不見一法存無見大似浮雲遮日面不知一法守空知還如太虗生閃電此之知見瞥然興錯認何曾解方便汝當一念自知非自己靈光常顯現常聞偈已心意豁然乃述偈曰無端起知見著相求菩提情存一念悟寧越昔時迷自性覺源體隨照枉遷流不入祖師室茫然趣兩頭禪者智隍初參五祖自謂已得正受菴居長坐積二十年祖弟子玄䇿遊方至河朔聞隍之名造菴問云汝在此作什麼隍曰入定䇿曰汝云入定為有心入耶無心入耶若無心入者一切無情草木瓦石應合得定若有心入者一切有情含識之流亦應得定隍曰我正入定時不見有有無之心䇿曰不見有有無之心即是常定何出何入若有出入即非大定隍無對良久問曰師嗣誰耶䇿曰我師曹溪六祖隍云六祖以何為禪定䇿曰我師所説妙湛圓寂體用如如五陰本空六塵非有不出不入不定不亂禪性無住離住禪寂禪性無生離生禪想心如虗空亦無虗空之量隍聞是説徑來謁祖祖問曰仁者何來隍具述前緣祖曰誠如所言汝但心如虗空不著空見應用無礙動靜無心凡聖情亡能所俱泯性相如如無不定時也燈録及正法眼藏皆無汝但以下三十五字止云祖愍其遠來便埀開決隍於是大悟二十年所得心都無影響其夜河北士庶聞空中有聲云隍禪師今日得道也有一童子名神會年十三自玉泉來參禮祖曰知識遠來艱辛還將得本來否若有本則合識主試説看會曰以無住為本見即是主祖曰這沙彌爭合取次語會曰和尚坐禪還見不見祖以拄杖打三下云吾打汝痛不痛對曰亦痛亦不痛祖曰吾亦見亦不見神會問如何是亦見亦不見祖云吾之所見常見自家過不見他人是非好惡是以亦見亦不見汝言亦痛亦不痛如何汝若不痛同其木石若痛則同凡夫即起恚恨汝向前見不見是二邊痛不痛是生滅汝自性且不見敢爾弄人神會禮拜悔謝一日祖告衆曰我有一物無頭無尾無名無字無背無面諸人還識否神會出曰是諸佛之本源神會之佛性祖曰向汝道無名無字汝便喚作本源佛性汝向去有把茆蓋頭也只成個知解宗徒唐中宗神龍元年詔遣使薛簡迎祖祖以疾辭簡問曰京城禪德皆云欲得會道必須坐禪習定若不因禪定而得解脫者未之有也未審師所説法如何師曰道由心悟豈在坐也經云若言如來若坐若臥是行邪道何故無所從來亦無所去無生無滅是如來清淨禪諸法空寂是如來清淨坐究竟無證豈況坐耶簡曰弟子回京主上必問願師慈悲指示心要傳奏兩宮及京城學道者譬如一燈燃百千燈冥者皆明明明無盡師曰道無明暗明暗是代謝之義明明無盡亦是有盡相待立名故淨名經云法無有比無相待故簡曰明喻智慧暗喻煩惱修道之人若不以智慧照破煩惱無始生死憑何出離祖曰煩惱即是菩提無二無別若以智慧照破煩惱者此是二乘見解羊鹿等機上智大根悉不如是簡曰如何是大乘見解祖曰明與無明凡夫見二智者了達其性無二無二之性即是實性實性者處凡愚而不減在賢聖而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師説不生不滅何異外道祖曰外道所説不生不滅者將滅止生以生顯滅滅猶不滅生説不生我説不生不滅者本自無生今亦不滅所以不同外道汝若欲知心要但一切善惡都莫思量自然得入清淨心體湛然常寂妙用恆沙簡蒙指教豁然大悟禮辭歸闕表奏師語詔加褒美僧問黃梅意旨甚麼人得祖曰會佛法人得曰和尚還得否祖曰我不會佛法徑山杲頌云蕉芭蕉芭有葉無了忽然一陳狂風起恰似東京大相國寺裏三十六院東廊下北角頭王和尚破袈裟畢竟如何歸堂喫茶蜀僧方辨來謁曰善塑祖正色曰試塑看方辨不領旨乃塑祖真可高七尺曲盡其妙祖觀之曰汝善塑性不善佛性酬以衣物辨禮謝而去有僧舉臥輪禪師偈曰臥輪有伎倆能斷百思想對境心不起菩提日日長祖聞之曰此偈未明心地若依而行之是加繫縛因示一偈曰惠能沒伎倆不斷百思想對境心數起菩提作麼長延和壬子七月是年初號太極五月改延和八月改先天命門人於新州國恩寺建報恩塔仍令促工先天二年夏末落成七月一日集徒衆曰吾至八月欲離世間汝等有疑早須相問為汝破疑令汝迷盡吾若去後無人教汝法海等聞悉皆涕泣惟有神會神情不動祖曰神會小師却得善不善等毀譽不動哀樂不生餘者不得數年山中竟修何道汝今悲泣為憂阿誰若憂吾不知去處吾自知去處吾若不知去處終不預報於汝汝等悲泣蓋為不知吾去處若知吾去處即不合悲泣法性本無生滅去來汝等盡坐吾與汝説一偈名曰真假動靜偈汝等誦取此偈與吾意同依此修行不失宗旨衆僧作禮請祖説偈偈曰一切無有真不以見於真若見於真者是見盡非真若能自有真離假即心真自心不離假無真何處真有情即解動無情即不動若修不動行同無情不動若覔真不動動上有不動不動是不動無情無佛種善能分別相第一義不動但作如此見即是真如用報諸學道人努力須用意莫於大乘門却執生死智若言下相應即共論佛義若實不相應合掌令歡喜此宗本無諍諍即失道意執逆諍法門自性入生死衆聞偈已普皆作禮法海再拜問曰和尚入滅衣法當付何人祖曰吾忝受忍大師衣法今為汝等説法不付其衣蓋汝等信根純熟決定不疑堪任大事據達磨舊記衣亦不合傳矣復曰諸善知識汝等各各淨心聽吾説法汝等諸人自心是佛更莫狐疑外無一物而能建立皆是本心生萬種法故經云心生種種法生心滅種種法滅若欲成就種智須達一相三昧一行三昧若於一切處而不住相於彼相中不生憎愛亦無取捨不念利益成壞等事安間恬靜虗融淡泊此名一相三昧若於一切處行住坐臥純一直心不動道場真成淨土此名一行三昧若人具二三昧如地有種含藏長養成就其實一相一行亦復如是我今説法猶如時雨溥潤大地汝等佛性譬之種子遇茲霑洽悉得發生承吾旨者決獲菩提依吾行者定證妙果聽吾偈曰心地含諸種普雨悉皆萌頓悟花情已菩提果自成説偈已復曰其法無二其心亦然其道清淨亦無諸相汝等慎勿觀靜及空其心此心本淨無可取捨各自努力隨緣好去七月八日謂門人曰吾欲歸新州汝等速理舟楫大衆哀留甚堅祖曰諸佛出現猶示涅槃有來必去理亦常然吾此形骸歸必有所衆曰師從此去早晚可回祖曰葉落歸根來時無口法雲秀云非但來時無口去時亦無鼻孔又問曰正法眼藏傳付何人祖曰有道者得無心者通又問後莫有難否祖曰吾滅後五六年當有一人來取吾首聽吾記曰頭上養親口裏須餐遇滿之難楊柳為官又曰吾去七十年有二菩薩從東方一在家一出家同時興化建立吾宗締緝伽藍昌隆法嗣又問佛祖傳授次第祖為詳述摩訶迦葉而下至祖次第八月三日復示衆曰吾滅度後莫作世情悲泣雨淚受人弔問身著孝服非吾弟子亦非正法但識自本心見自本性無動無靜無生無滅無去無來無是無非無住無往恐汝等心迷不會吾意今再囑汝令汝見性吾滅度後依此修行如吾在日若違吾教縱吾在世亦無有益復説偈曰兀兀不修善騰騰不造惡寂寂斷見聞蕩蕩心無著説偈已端坐至三更謂門人曰吾行矣奄然遷化於時異香滿室白虹屬地林木變白禽獸哀鳴十一月廣韶新三郡官僚暨門人僧俗爭迎真身莫決所之乃焚香禱曰香煙指處師所歸焉時香煙直貫曹溪十一月十三日遷神龕并衣鉢歸曹溪次年七月入塔門人憶念取首之記以鐵漆固頸入塔時白光自塔起上亘天三日始散祖春秋七十有六蓋年二十四而傳衣三十九祝髮説法利生三十七載開元十年八月有張滿者受新羅僧賄偽服衰絰為孝子夜入塔盜祖首欲持歸供養守塔者聞塔中有聲起視滿驚逸而祖頸微有傷處刺史柳無忝縣令楊侃共督捕得滿祖弟子令韜謂彼意在供養且佛教慈悲冤親平等柳守嘉歎釋滿不治外紀云祖至曹溪寶林覩堂宇湫隘不足容衆欲廣之遂謁里人陳亞仙曰老僧欲乞檀那一坐具地亞仙曰和尚坐具幾許濶祖以坐具示之亞仙唯然祖展坐具彌布曹溪四境四天王各現其方亞仙曰和尚法力廣大他日興造願存祖墓餘願盡捨為寶坊然此地乃生龍白象來脈只可平天不可平地寺後興建一依其言先是西國智藥三藏經其地謂林巒泉水宛如西天寶林宜建一梵剎一百七十年後當有無上法寶於此演化得道者如林宜號寶林韶州牧侯敬中表聞建寺時梁天監三年祖之來適符其記殿前有潭一所龍常出沒其間一日現形甚巨波浪洶涌雲霧陰翳徒衆皆懼祖曰爾能現大身不能現小身若為神龍當能變化以小現大以大現小也其龍忽沒俄頃復現小身躍出潭面祖展鉢曰你且不敢入老僧鉢盂裏祖以鉢承之龍伏鉢中不能動持之上堂為説法要龍遂蛻骨而去其骨長七寸許首尾角足皆具留傳本寺林間録曹溪大師將入涅槃門人行瑫超俗法海等問和尚法何所付曹溪曰付囑者二十年外於此地弘揚又問誰人答曰若欲知者大庾嶺上以網取之圭峯立荷澤為正傳的付乃文釋之曰嶺者高也荷澤姓高故密示之耳欲抑讓公為旁出則曰讓則曹溪門下旁出之泛徒此類數可千餘嗚呼逐鹿者不見山攫金者不見人殆非虗言方密公所見惟荷澤故諸師不問是非例皆毀之如大庾嶺上以網取之之語是大師末後全提妙旨而輒以意求讓公僧中之王而謂之泛徒詳味密公之意可以發千載之一笑又云老安國師有言曰金剛經云應無所住而生其心無所住者不依色不住聲不住迷不住悟不住體不住用而生其心者即一切法而顯一心若住善生心即善現住惡生心即惡現本心即隱沒若無所住十方世界惟是一心信知曹溪大師云風幡不動是心動修山主有偈曰風動心搖樹雲生性起塵若明今日事昧却本來人幻寄曰洪師訶密公意求網取而以義路釋風幡正是徐六喻擔板耳不見修山主道若明今日事昧却本來人耶咦
