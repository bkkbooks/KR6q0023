body:
  text: 六祖下第十六世臨安府徑山宗杲大慧普覺禪師語要上師宣城奚氏子其母夢一僧黑頰隆鼻神人衛之造於臥室問其何所居對曰嶽北覺而有身哲宗元祐四年己巳十一月十日巳時誕師白光透室舉邑稱異年十六出家燈録作十二非此從年譜十七落髮即喜宗門中事遍閲諸家語録尤喜雲門睦州語嘗疑五家宗派元初只是一個達磨甚處有許多門庭性俊逸不羈十九遊方初至太平杯度菴菴主迎待恭甚曰夜夢伽藍神告以雲峰悅師來戒令肅候也杯度老宿因以悅語示師師過目成誦人遂謂雲峰後身既謁宣州明寂珵禪師請益雪竇拈古頌古珵不假一言令自見自説師輒洞達微旨珵歎曰杲必再來人也過郢州大陽見元首座洞山微和尚堅首座師周旋三公會下甚久盡得曹洞宗旨見其授受之際必臂香以表不妄付念曰禪有傳授豈佛祖自證自悟之法棄之為方敷文普説云微固有悟門只是不合將功動五位偏正回互五王子之類許多家事來傳被我一傳得了寫作一紙榜在僧堂前大丈夫參禪豈肯就宗師口邊喫野狐涎唾盡是閻老子面前喫鐵棒底遍歷諸方嘗至奉聖初和尚處值初上堂師出問承和尚有言金蓮從地湧寶蓋自天垂為是神通妙用為是法爾如然初曰金蓮從地湧寶蓋自天垂師曰鸞鳳不棲荊棘樹燕雛猶戀舊時窠初曰三年不相見便有許多般師曰只如適來僧道昔日世尊今朝和尚又作麼生初便喝師曰這一喝未有主在初回頭取拄杖稍遲師曰掣電之機徒勞佇思拍手一下歸衆已而參心印珣公珣令至寶峰依湛堂準公師始至機辨縱橫一日湛堂問曰你鼻孔今日因甚無半邊對曰寶峰門下堂曰杜撰禪和又一日於粧十王處問曰此官人姓甚麼對曰姓梁堂姓梁堂以手自摸頭曰爭奈姓梁底對個幞頭對曰雖無幞頭鼻孔髣佛堂曰杜撰禪和又看經次問曰看甚麼經對曰金剛經堂曰是法平等無有高下為甚麼雲居山高寶峰山低對曰是法平等無有高下堂曰你做得個座主使下一日侍次湛堂視師指爪曰想東司頭籌子不是汝洗師承訓即代黃龍忠道者作淨頭九月按普説云某自聞湛堂和尚此説終身不養爪甲才長一菽不剪湛堂和尚便於手指上出現一日堂問曰杲上座我這裏禪你一時理會得教你説也説得教你做拈古頌古小參普説你也做得祇是有一事未在你還知麼對曰什麼事堂曰你祇欠這一解在㘞若你不得這一解我方丈裏與你説時便有禪才出方丈便無了惺惺思量時便有禪才睡著便無了若如此如何適得生死對曰正是某甲疑處湛堂疾亟師問曰倘和尚不復起某甲依誰可了此大事堂曰有個勤巴子我雖不識渠然汝必依之可了汝事若見渠不了便修行去後世出來參禪及堂化後師往荊南謁張無盡求塔銘張問曰公祇恁麼著草鞋遠來師曰某數千里行乞來見相公又問年多少師曰二十八又問水牯牛年多少師曰兩個又問什麼處學得這虗頭來師曰今日親見相公張笑曰且坐喫茶才坐又問遠來有何事師趨前曰泐潭和尚示寂茶毗眼睛牙齒數珠不壞舍利無數求大手筆作塔銘激勵後學張曰有問問公若道得即作塔銘師曰請相公問張曰聞準老眼睛不壞是否曰是張曰我不問這個眼睛曰相公問什麼眼睛張曰金剛眼睛曰若是金剛眼睛在相公筆頭上張曰若如此老夫為他點出光明令他照天照地去也師謝張遂著銘銘有云四大色身諸緣假合從本已來舍利豈有體性若梵行精潔白業堅固靈明廓微預知報謝不驚不怖則依正二報毫釐不失世間粗心於本分事上十二時中不曾照管微細流注生大我慢此是業主鬼來借宅如此而欲舍利流珠諸根不壞其可得乎復謁靈源草堂諸大老咸被賞識與洪覺範遊覺範嘗見其十智同真頌云兔角龜毛眼裏栽鐵山當面勢崔巍東西南北無門入曠劫無明當下灰歎曰作怪我二十年做工夫也只道得到這裏又過無盡無盡與論百丈再參馬祖因緣語具百丈章中無盡亟賞之促師見圜悟及悟住天寧師往依之自惟曰當以九夏為期其禪若不異諸方妄以余為是我則造無禪論去也枉費精神蹉跎歲月不若弘一經一論把本修行庶他生後世不失為佛法中人既見悟晨夕參請悟舉雲門東山水上行語令參師凡呈四十九轉語悟不肯悟一日升座舉雲門語曰天寧即不然若有人問如何是諸佛出身處但向他道薰風自南來殿閣生微涼師聞舉豁然以白悟悟察師雖得前後際斷動相不生却坐淨裸裸處語師曰也不易你到這個田地但可惜死了不能得活不疑言句是為大病不見道懸崖撒手自肯承當絶後再蘇欺君不得須知有這個道理師曰某甲只據如今得處已是快活更不能理會得也悟令居擇木堂為不釐務侍者日同士大夫間話入室日不下三四每舉有句無句如藤倚樹問之師才開口悟便曰不是經半載念念不忘於心一日同諸客飯師把箸在手都忘下口悟笑曰這漢參黃楊木禪却倒縮去師曰這個道理恰似狗看熱油鐺欲舐舐不得欲捨捨不得悟曰你喻得極好這個便是金剛圈栗棘蓬也一日問曰聞和尚當時在五祖曾問這話不知五祖道甚麼悟笑而不答師曰當時須對衆問如今説亦何妨悟曰我問有句無句如藤倚樹意旨如何祖曰描也描不成畫也畫不就又問樹倒藤枯時如何祖曰相隨來也師當下釋然曰我會也悟遂舉數誵訛因緣詰之師酬對無滯悟曰始知我不汝欺遂著臨濟正宗記付之師既大徹反於數禪客有疑乃以問悟悟云我這裏禪如大海相似你須將個大海來傾去始得若只將鉢盂盛得些子去便休是你器量只如此教我怎奈何能有幾個得到你田地往時只有個璟上座與你一般却已死了也未幾令分座室中握竹篦以驗學者叢林浩然歸重會女真之變欲取禪師十數師在選獲免趨吳虎丘閲華嚴至八地文洞徹昔所請問湛堂殃崛奉佛語救産難因緣初師以此請益湛堂堂曰正𭺗著我癢處這話是金矢法不會如金會得如矢師曰豈無方便堂曰我有個方便只是你剗地不會師曰望和尚慈悲堂曰殃崛云我乍入道未知此法待問世尊未到佛座下他家生下兒子時如何我自從賢聖法來未曾殺生殃崛持此語未到他家已生下兒子時如何師茫然至是讀至菩薩登第七地證無生法忍云佛子菩薩成就此忍即時得入菩薩第八不動地為深行菩薩難可知無差別離一切相一切想一切執著無量無邊一切聲聞辟支佛所不能及離諸喧諍寂滅現前譬如比丘具足神通得心自在次第乃至入滅盡定一切動心憶想分別悉皆止息此菩薩摩訶薩亦復如是住不動地即捨一切功用行得無功用法身口意業念務皆息住於報行譬如有人夢中見身墮在大河為欲渡故發大勇猛施大方便以大勇猛施方便故即便寤𭔏既寤𭔏已所作皆息菩薩亦爾見衆生身在四流中為救度故發大勇猛起大精進以勇猛精進故至此不動地既至此已一切功用靡不皆息二行相行皆不現前此菩薩摩訶薩菩薩心佛心菩提心涅槃心尚不現起況復起於世間之心師因豁然打失布袋湛堂所説方便忽然現前圜悟詔住雲居師往覲悟即請為第一座冬至秉拂昭覺元禪師出衆問云眉間挂劍時如何師曰血濺梵天悟於座下以手約云住住問得固好答得更奇元乃歸衆師每入室圜悟時來聽其語一日入室罷上方丈悟云或有個禪和子得似老僧汝又如何支遣師云何幸如之正如東坡説作劊子手一生得遇一個肥漢剮悟呵呵大笑云你倒與我入室拶得我上壁也悟又問達磨西來將何傳授師曰不下總作野狐精見解又問據虎頭收虎尾第一句下明宗旨如何是第一句師曰此是第二句悟常言近來諸方盡成窠臼五祖下我與佛鑑佛眼三人結社參禪如今早見逗漏出來佛鑑下有一種作狗子呌鵓鳩鳴取笑人佛眼下有一種覷燈籠露柱指東畫西如眼見鬼一般我這裏且無這兩般病師曰擊石火閃電光引得無限人弄業識舉了便會了豈不是佛法大窠窟悟不覺吐舌乃云休管他我只以契證為期若不契證斷不放過師曰契證即得苐恐只恁麼傳將去舉了便悟了硬主張擊石火電閃光業識茫茫未有了日悟深肯之勘辨師在雲居作首座一日到西積莊遇一暫到從圓通來云因看首座頌女子出定話有個悟處特來求首座印證師云你去不是僧云某甲未道見處為甚麼道不是師再三搖手云你去不是不是僧懡㦬而退問僧不是心不是佛不是物你作麼生會曰領師曰領你屋裏七代先靈僧便喝師曰適來領而今喝干他不是心不是佛不是物甚麼事僧無語師打出問僧我前日有一問在你處你先前日答了我也即今因甚麼瞌睡僧曰如是如是師曰道甚麼僧曰不是不是師連打兩棒曰一棒打你如是一棒打你不是師室中多問衲子喚作竹篦則觸不喚作竹篦則背不得下語不得無語不得於意根下卜度不得揚在無事甲裏不得於舉起處承當不得良久不得作女人拜繞禪牀不得拂袖便行一切總不得速道速道僧擬進語師便打趁出時罕有善其機者有僧聞舉奪却竹篦師曰奪却竹篦我且許你奪却我喚作拳頭則觸不喚作拳頭則背你又如何奪更饒你道個請和尚放下著我且放下著我喚作露柱則觸不喚作露柱則背你又如何奪我喚作山河大地則觸不喚作山河大地則背你又如何奪時有舟峯長老云某甲看和尚竹篦子話如籍沒却人家財産了更要人納物事師曰你譬得極妙我真要你納物事你無所從出便須討死路去也或投河或赴火𢬵得方始死得死了却緩緩地再活起來喚你作菩薩則歡喜喚你作賊漢則惡發依前只是舊時人所以古人道懸崖撒手自肯承當絶後再蘇欺君不得到這裏始契得竹篦子話又僧聞舉曰請和尚放下竹篦即與和尚道師放下僧拂袖便出師曰侍者認取這僧又舉問僧僧曰甕裏怕走却鱉那師下禪牀擒住曰此是誰語速道僧曰實不敢謾昧此是竹菴和尚教某恁麼道師連打數棒曰分明舉似諸方師又舉問彌光光曰杜撰長老如麻似粟師曰你是第幾個光曰今日捉敗這老賊師深肯之近禮侍者久侍師默究竹篦話無所入一日入室罷求指示師曰你是個福州人我説個喻向你如將名品荔枝和皮殼剝了送在你口裏秖是不解吞禮不覺失笑曰和尚吞却即禍事師後復問曰前日吞了底荔枝秖是你不知滋味禮曰若知滋味轉見禍事師肯之才見僧入便曰不是出去僧便出師曰沒量大人被語脈裏轉却次一僧入師亦曰不是出去僧却近前師曰向你道不是更近前覓個甚麼便打出復一僧入曰適來兩僧不會和尚意師低頭噓一聲僧罔措師打曰却是你會老僧意師才見僧入便云你不會出去僧便出去次一僧入師亦云你不會出去僧亦出復一僧入師云適來兩個上座一人解收不解放一人解放不解收你還辨得麼僧云一狀領過師云領過後別有甚好消息僧拍手一下便出師云三十年後悟去在問僧路逢達道人不將語默對時如何僧珍重便出師呵呵大笑次一僧來師曰我適來問這僧路逢達道人不將語默對時如何他珍重便出你道他會不會僧擬問訊師便打出問僧不與萬法為侶者是甚麼人曰無面目漢師曰適來有個師僧恁麼道打出去了也僧擬議師便打問僧香嚴上樹話你作麼生會曰好對春風唱鷓鴣師曰虎頭上座道樹上即不問未上樹道將一句來又作麼生曰適來對和尚道了也師曰好對春風唱鷓鴣是樹上語樹下語僧擬對師便打僧問某參禪不得病在甚麼處師曰病在這裏曰某因甚却參不得師曰開眼尿牀漢我打你去問僧國師三喚侍者意旨如何曰魚行水濁師曰莫豚沸僧無語便打問僧馬大師道自從胡亂後三十年不曾少鹽醬作麼生曰隨家豐儉師曰好個隨家豐儉只是你不會僧擬議師便打僧請益夾山境話道聲未了師便喝僧茫然師曰你問甚麼僧擬舉師連打喝出問僧道不用修但莫染污如何是不染污底道曰某甲不敢道師曰你為甚麼不敢道曰怕染污師高聲曰行者將糞箕笤帚來僧茫然師便打出問僧一切智智清淨無二無二分無別無斷故作麼生會曰一切智智清淨無二無二分無別無斷故某但恁麼會師曰抱取貓兒來僧無語師便喝出問僧還記得話頭麼曰不記得師曰你來這裏管甚麼事便打問僧五祖道趙州狗子無佛性也勝貓兒十萬倍如何曰風行草偃師曰你也不得亂説却作麼生會僧無語師曰學語之流便打出師才見僧入便云釋迦老子來也僧近前師云不是便打次一僧入師亦曰釋迦老子來也僧當面問訊便出師曰却似真個僧才入師便曰諸佛菩薩畜生驢馬庭前柏樹子麻三斤乾矢橛你是一枚無狀賊漢曰久知和尚有此機要師曰我已無端入荒草是你屎臭氣也不知僧拂袖便出師曰苦哉佛陀耶問侍者曰幾多人入室幾人道得著幾人道不著侍者曰某甲只管看師忽展手曰我手何似佛手侍者曰天寒且請和尚通袖便行師隨打一竹篦曰且道是賞你罰你有僧請益不知某甲死向甚麼處去師曰你道只今是生耶死耶僧曰生也不道死也不道師曰你做得漸源奴僧擬議師便打出又一僧來師曰適來這僧納一場敗闕你還知麼僧曰知師亦打出問僧巖頭才跨德山門便問是凡是聖德山便喝巖頭禮拜意作麼生曰好個消息師曰那裏是好處僧便喝師曰你這一喝未有主在出去問僧恁麼也不得不恁麼也不得恁麼不恁麼總不得作麼生曰總得師曰拋却甜桃樹緣山摘醋梨問僧你道禪還受教也無曰萬里一條鐵師曰爭奈觀音院裏有彌勒僧擬議師便打出問僧你名甚麼曰法如師曰僧堂佛殿如否曰如師曰老僧被你勘破僧擬議師便打鳥龍長老訪馮濟川話次云昔有官人問泗州大聖何姓聖云姓何官云住何國聖云住何國此意如何龍曰大聖本不姓何亦不是何國人馮笑曰大聖決定姓何住何國如是往返數次遂致書於師乞斷此公案師云有六十棒將三十棒打大聖不合道姓何三十棒打濟川不合道大聖決定姓何若烏龍長老教自領出去一日同到明菴見壁間畫髑髏濟川頌云尸在這裏人今何在始知一靈不居皮袋師不肯自頌云即此形骸便是其人一靈皮袋皮袋一靈張子韶至上堂僧問大顛為韓文公趁却首座意旨如何師曰鮎魚上竹竿一日一千里進云學人未了乞師慈悲師云更要第二杓惡水在進云只如首座也扣齒三下過在甚麼處師云過在扣齒處進云莫謗他首座好師云你見個甚麼道理便恁麼道進云誰知遠煙浪別有好思量師云你莫謗徑山好進云今日侍郎或問和尚春秋多少又且如何師云向他道百十二歲進云喚作謗徑山得麼師云你又謗侍郎也僧問古人道如人上樹口銜樹枝手不攀枝腳不踏樹未審還有答話分也無師云答話了也進云學人問樹上話和尚為甚麼向樹下答師云只為你在樹下問進云謾得大衆眼麼師云灼然謾不得進云只如樹子未生消息未動香嚴向甚麼處得這話頭來師云向你漆桶裏得來進云只如和尚道喚作竹篦則觸不喚作竹篦則背還有為人處也無師云無進云恁麼則成虗設師云虗設乃云如人上樹口銜樹枝手不攀枝腳不踏樹樹下有人問西來意答他則喪身失命不答又違他所問是時香嚴才恁麼道便有個旁不肯底喚作虎頭上座出衆云樹上即不問樹下道將一句來師云險香嚴呵呵大笑師云險徑山這兩險有一險如天普蓋似地普擎有一險料掉沒交涉還有揀得出者麼若揀得出非惟親見香嚴亦使虎頭上座無安身立命處如無徑山將現成公案為你諸人下個注腳喚作竹篦則觸不喚作竹篦則背酬答法要佛言若有欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙佛境界非是外境界有相佛乃自覺聖智之境界也決欲知此境界不假莊嚴修證而得當淨意根下無始時來客塵煩惱之染如虗空之寬曠遠離意識中諸取虗偽不實妄想亦如虗空則此無功用妙心所向自然無滯礙矣示李獻臣又云古德有言尋牛須訪迹學道貴無心迹在牛還在無心道易尋所謂無心者非如土木瓦石頑然無知謂觸境遇緣心定不動不取著諸法一切處蕩然無障無礙無所染污亦不住在無染污處觀身觀心如夢如幻亦不住在夢幻虗無之境到得如此境界方始謂之真無心且非口頭説底無心若未得真無心只據説底與默照邪禪何以異哉但得本莫愁末空却此心是本既得本則種種語言種種智慧日用應物隨緣七顛八倒或喜或怒或好或惡或順或逆皆末也於隨緣處能自覺知則無少無剩示黃伯成既學此道十二時中遇物應緣處不得令惡念相續或照顧不著起一惡念當急著精彩拽轉頭來若一向隨他去相續不斷非獨障道亦謂之無智慧人昔溈山問懶安汝十二時中當何所務安云牧牛山云汝作麼生牧安云一回入草去驀鼻拽將回山云子真牧牛也學道人制惡念當如懶安之牧牛則久久自純熟矣示李獻臣又云他弓莫把他馬莫騎他人之事莫知此雖常言亦可為入道之資糧但常自檢察自旦至暮有甚利人自利之事稍覺偏枯當須自警不可忽也又云昔道林禪師居秦望山長松之上時人謂之鳥窠和尚白居易侍郎鎮錢塘特入山中謁之乃問禪師坐處甚危險師曰老僧有甚危險侍郎險尤甚曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作衆善奉行曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十老人行不得白遂作禮而去今欲省心力莫管他三歲孩兒道得道不得八十老人行得行不得但諸惡莫作便了此語信也著不信也著請思之又云世人現行無明矯而為善善雖未至豈不勝寡廉鮮耻託善而為惡者教中謂之因地不真果招紆曲苟能直心直行直取無上菩提可謂真大丈夫之所為矣塵劫來事只在如今如今會得塵劫來事即時瓦解氷消如今不會更經塵却亦只如是如是之法亘古恆然未嘗移易一絲毫許又云世間塵勞之事如鈎鎖連環相續不斷得省便省為無始時來習得熟若不力與之爭日久月深不知不覺入得頭深臘月三十日卒著手腳不辦要得臨命終時不顛錯便從如今作事處莫教顛錯如今作事處顛錯欲臨命終時不顛錯無有是處又云有一種人早晨看經念佛懺悔晚間縱口業罵詈人次日依前禮佛懺悔卒歲窮年以為日課此乃愚之甚也殊不知梵語懺摩此云悔過謂之斷相續心一斷永不復續一懺永不復造此吾佛懺悔之意學道之士不可不知也又云學道人十二時中心意識常要寂靜無事亦須靜坐令心不放逸身不動搖久久習熟自然身心寧怗於道有趣向分寂靜波羅蜜定衆生散亂妄覺耳若執寂靜處便為究竟則被默照邪禪之所攝持矣梵語般若此云智慧未有明般若而貪欲瞋恚癡者未有明般若而毒害衆生者作如此等事底與般若背馳焉得謂之智慧示陳次仲以生死事在念則心術已正心術既正則日用應緣時不著用力排遣既不著排遣則無邪非無邪非則正念獨脫正念獨脫則理隨事變理隨事變則事得理融事得理融則省力才覺省力時便是學此道得力處也得力處省無限力省力處得無限力示羅孟弼此事許聰明靈利漢擔荷若使聰明靈利則無擔荷分聰明靈利者雖易入而難於保任蓋入處不甚深而力弱故也聰明靈利者才聞善知識説著個中事便眼目定動早將心意識領解了也似此者自作障礙永劫無有悟時外鬼作殃猶可治此乃家親作祟不可禳禱也永嘉云損法財滅功德莫不由茲心意識此之謂也示李獻臣心意識之障道甚於毒蛇猛虎何以故毒蛇猛虎尚可回避聰明利智之士以心意識為窟宅行住坐臥未嘗頃刻不與之相酬酢日久月深不知不覺與之打作一塊亦不是要作一塊為無始時來行得這一路子熟雖乍識得破欲相遠離亦不可得故曰毒蛇猛虎尚可回避而心意識真是無你回避處示羅孟弼士大夫多以有所得心求無所得法何謂有所得心聰明靈利思量計較者是何謂無所得法思量不行計較不到聰明靈利無處安著者是不見釋迦老子在法華會上舍利弗殷勤三請直得無啓口處然後盡力道得個是法非思量分別之所能解此是釋迦老子究竟此事開方便門示真實相之椎輪也昔雪峰真覺禪師為此事之切三度到投子九度上洞山因緣不相契後聞德山周金剛主化遂造其室一日問德山從上宗風以何法示人德山云我宗無語句亦無一法示人後又問從上宗乘中事學人還有分也無德山拈拄杖便打云道什麼雪峰於棒下方打破漆桶以是觀之聰明靈利思量計較於此個門中一點也用不著古德有言般若如大火聚近之則燎却面門擬議尋思便落意識永嘉云損法財滅功德莫不由茲心意識故知心意識非獨障道亦使得人七顛八倒作諸不善既有究竟此道之心須是具決定志不到大休大歇大解脫處誓畢此生不退不墮佛法無多子久長難得人世間塵勞中事如鈎鎖相續不斷志意下劣者往往甘心與伊作伴侶不覺不知被伊牽挽將去除是當人夙有願力方肯退步思量永嘉又云無明實性即佛性幻化空身即法身法身覺了無一物本原自性天真佛若如是思量驀然向思量不及處見得無一物底法身即是當人出生死處前所云無所得法不可以有所得心求便是這個道理也士大夫一生在思量計較中作活計才聞善知識説無所得法心裏便疑惑怕落空去妙喜每見如此説者即問他只這怕落空者還空也無十個有五雙分疏不下蓋平時只以思量計較為窟宅乍聞説著不得思量底話便茫然無討巴鼻處殊不知只這無討巴鼻處便是自家放身命底時節也敦立道友靖康中在夷門相會是時春秋鼎盛便知有此段大事因緣敘事不録但以博極羣書於九經十七史內入得太深聰明太過理路太多定力太少被日用應緣處牽挽將去故於腳跟下不能得啐地折嚗地斷耳若時時正念現前怕生死之心不變則日月浸久生處自熟熟處自生矣且那個是熟處聰明靈利思量計較底是那個是生處菩提涅槃真如佛性絶思惟分別搏量卜度不到無你用心安排底是驀然時節到來或於古人入道因緣上或因看經教時或於日用應緣若善若不善若身心散亂若逆順境界現前若暫得心意識寧靜時忽地踏翻關棙子不是差事示徐敦立士人博覽羣書本以資益性識而反以記持古人言語蘊在胸中作事業資談柄殊不知聖人説教之意所謂終日數他寶自無半錢分看讀佛教亦然當須見月忘指不可依語生解古德云佛説一切法為度一切心我無一切心何用一切法有志之士讀書看教能如是方體聖人之意少分也示李獻臣又云近日叢林以古人奇言妙語問答為差別因緣狐媚學者殊不本其實諸佛説法惟恐人不會縱有隱覆之説則旁引譬喻令衆生悟入而已如僧問馬祖如何是佛祖曰即心是佛於此悟入又有何差別於此不悟即此即心是佛便是差別因緣參禪人看經教及古德入道因緣但虗却心不用向聲名句義上求玄妙求悟入若起此心即障却自己正知見永劫無有入頭處盤山云譬如擲劍揮空莫論及之不及不可忽淨名云法過眼耳鼻舌身意欲徹此法先須屏除六根門頭使無少過患何謂過患被色聲香味觸法所轉而不能遠離於經教及古德言句上求知見覓解會者是苟能於經教及古德入道因緣中不起第二念直下知歸則於自境界他境界無不如意無不自在者德山見僧入門便棒臨濟見僧入門便喝諸方尊宿喚作劈面提持直截分付妙喜喚作第一等拖泥帶水直饒向一棒一喝下全身擔荷得已是不丈夫漢被他驀頭澆一杓惡水了也況於一棒一喝下求奇特覓妙會乃是不唧𠺕中又不唧𠺕者示鄧子立昔李文和都尉參石門慈照聰禪師悟臨濟宗旨有一偈曰學道須是鐵漢著手心頭便判直取無上菩提一切是非莫管妙哉斯言可以為光明種子發機之助也示李獻臣又云佛是衆生藥衆生病除藥亦無用或病去藥存入佛境界而不能入魔境界其病與衆生未除之病等病瘥藥除佛魔俱掃始於此大事因緣有少分相應耳佛是衆生界中了事漢衆生是佛界中不了事漢欲得一如但佛與衆生一時放下則無了無不了古德云但於事上通無事見色聞聲不用聾示聶妙證是人知得世間有為虗妄不實底道理及至對境遇緣驀地撞在面前不隨他去則被伊穿却鼻孔定也蓋無始時來熟處太熟生處太生雖暫識得破終是道力不能勝他業力且那個是業力熟處是那個是道力生處是然道力業力本無定度但看日用現行處一個昧與不昧耳味却道力則被業力勝却業力勝則觸塗成滯觸塗成滯則處處染著處處染著則以苦為樂故釋迦老子謂滿慈子曰汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相遮個是昧道力而被業力勝者釋迦老子又曰我以妙明不滅不生合如來藏而如來藏惟妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪遮個是現行處不昧道力而勝業力者然兩處俱歸虗妄若捨業力而執著道力則我説是人不會諸佛方便隨宜説法何以故不見釋迦老子曰若取法相即著我人衆生壽者若取非法相即著我人衆生壽者是故不應取法不應取非法前所云道力業力本無定度是也若有智慧丈夫兒借道力為器仗攘除業力業力既除道亦虗妄所以道但以假名字引導於衆生未識得破時千難萬難識得破後有甚難易龐居士曰凡夫志量狹妄説有難易離相如虗空盡契諸佛智戒相亦如空迷人自作持病根不肯拔只自弄花枝要識病根麼不是別物只是個執難執易妄生取捨者遮個病根拔不盡生死海裏浮沉直是無出頭時昔張拙秀才才被尊宿點著病源便解道斷除煩惱重增病趨向真如亦是邪隨分世緣無礙涅槃生死等空華要得直截不疑佛祖不疑生死但常放教方寸虗豁豁地事來則隨時撥置如水之定如鑑之明好惡妍醜到來逃一毫不得信知無心自然境界不可思議示呂舜元要識法麼真如佛性菩提涅槃是要識病麼妄想顛倒貪嗔邪見是雖然如是離妄想顛倒無真如佛性離貪嗔邪見無菩提涅槃且道分即是不分即是若分存一去一其病轉深若不分正是顢頇佛性儱侗真如畢竟作麼生説個除病不除法底道理有般漢聞恁麼説便道即法是病即病是法但有言説都無實義順真如則顛倒妄想貪嗔邪見悉皆是法隨顛倒則真如佛性菩提涅槃悉皆是病恁麼見解莫道我披衲衣便是作他座主奴也未得在何故須知平地上死人無數灼然過得荊棘林者是好手不見古人云設有一法過於涅槃吾説亦如夢幻苟能於夢幻中如實而證如實而解如實而修如實而行以如實之法能自調伏起大悲心作種種方便復能調伏一切衆生而於衆生不作調伏不調伏想亦復不作顛倒想不作貪嗔邪見想不作真如佛性菩提涅槃想不作除病不除法想不作存一去一分不分想既無如是之想則一道清淨平等解脫魏矼請升座既曰虗幻則作時亦幻受時亦幻知覺時亦幻迷倒時亦幻過去現在未來皆悉是幻今日知非則以幻藥復治幻病病瘥藥除依前只是舊時人若別有人有法則是邪魔外道見解也答曾天遊又云善財於彌勒彈指之頃尚能頓忘諸善知識所證三昧況無始虗偽惡業習氣耶若以前所作底罪為實則現今目前境界皆為實有乃至官職富貴恩愛悉皆是實不識別後日用應緣處不被外境所奪否視堆案之文能撥置否與物相遇時能動轉否住寂靜處不妄想否體究個事無雜念否故黃面老子有言心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉空寂過去事或善或惡不須思量思量則障道矣未來事不須計較計較則狂亂矣現在事在面前或順或逆亦不須著意著意則擾方寸矣但一切臨時隨緣酬酢自然合著遮個道理逆境界易打順境界難打逆我意者只消一個忍字定省少時便過了順境界直是無你回避處如磁石與鐵相偶彼此不覺合在一處無情之物尚爾況現行無明全身在裏許作活計者當此境界若無智慧不覺不知被他引入羅網却向裏許要求出路不亦難乎所以先聖云入得世間出世無餘便是遮個道理也近世有一種修行失方便者往往認現行無明為入世間便將世間法強差排作出世無餘之事可不悲乎除夙有誓願即時識得破作得主不被他牽引故淨名有言佛為增上慢人説離淫怒癡為解脫耳若無增上慢者佛説淫怒癡性即是解脫若免得此過於逆順境界中無起滅相始離得增上慢名字恁麼方可作入得世間謂之有力量漢已上所説都是妙喜平昔經歷過底即今亦只如此修行願公趁色力強健亦入是三昧答樓樞密細讀來書乃知四威儀中無時間斷不為公冗所奪於急流中時自猛省殊不放逸道心愈久愈堅固深愜鄙懷然世間塵勞如火熾然何時是了正在閙中不得忘却竹椅蒲團上事平昔留心靜勝處正要閙中用若鬧中不得力却似不曾在靜中做工夫一般承有前緣駁雜今受此報之歎獨不敢聞命若動此念則障道矣古德云隨流認得性無喜亦無憂淨名云譬如高原陸地不生蓮花卑濕污泥乃生此花老胡云真如不守自性隨緣成就一切事法又云隨緣赴感靡不周而常處此菩提座豈欺人哉若以靜處為是閙處為非則是壞世間相而求實相離生滅而求寂滅好靜惡閙時正好著力驀然閙裏撞翻靜時消息其力能勝竹椅蒲團上千萬億倍答曾天遊乍得身心寧靜切須努力不得便向寧靜處躲根教中謂之解脫深坑可畏之處須教轉轆轆如水上葫蘆自由自在不受拘牽入淨入穢不礙不沒方於衲僧門下有少親近分若只抱得不哭孩兒有甚用處示空慧臨濟云汝若歇得念念馳求心與釋迦老子不別不是欺人第七地菩薩求佛智心未滿足故謂之煩惱直是無你安排處著一星兒外料不得數年前有個許居士認得個門頭戶口將書來呈見解云日用中空豁豁地無一物作對待方知三界萬法一切元無直是安樂快活放得下因示之以偈曰莫戀淨潔處淨潔使人困莫戀快活處快活使人狂如水之任器隨方圓短長放下不放下更請細思量三界與萬法匪歸何有鄉若只便恁麼此事大乖張為報許居士家親作禍殃豁開千聖眼不須頻禱禳示嚴子卿學道人日用空境易而空心難境空而心不空心為境所勝但空心而境自空矣若心已空而更起第二念欲空其境則是此心未得空復為境所奪此病不除生死無由出離不見龐公呈馬祖偈云十方同聚會個個學無為此是選佛場心空及第歸此心既空矣心外復有何物而可空耶思之示黃伯成心不馳求不妄想不緣諸境即此火宅塵勞便是解脫出三界之處何以故佛不云乎於一切境無依無住無有分別明見法界廣大安立了諸世間及一切法平等無二故遠行地菩薩以自所行智慧力故出過一切二乘之上雖得佛境界藏而示住魔境界雖超魔道而現行魔法雖示同外道行而不捨佛法雖示隨順一切世間而常行一切出世間法此乃火宅塵勞中真方便也學般若人捨此方便而隨順塵勞定為魔所攝持又於隨順境中強説道理謂煩惱即菩提無明即大智步步行有口口談空自不責業力所牽更教人撥無因果便言飲酒食肉不離菩提行盜行淫無妨般若如此之流邪魔惡毒入其心腑都不覺知欲出塵勞如潑油救火可不悲哉示真如又云打得徹了方可説煩惱即菩提無明即大智本來廣大寂滅妙心中清淨圓明蕩然無一物可作障礙如太虗空一般佛之一字亦是外物況更有塵勞煩惱作對待耶此事如青天白日皎然清淨不變不動無減無增各各當人日用應緣處頭頭上明物物上顯取之不得捨之常存蕩蕩無礙了了空虗如水上葫蘆拘牽他不得惹絆他不得古來有道之士得之向生死海中頭出頭沒全體受用無欠無餘不見有生死塵勞之狀如析栴檀片片皆是將甚麼作生死塵勞生死塵勞從甚麼處起收因結果時却向甚麼處著既無著處則佛是幻法是幻三界二十五有十二處十八界空蕩蕩地到得這個田地佛之一字亦無處著佛之一字尚無著處真如佛性菩提涅槃何處有也故傅大士有言恐人生斷見權且立虗名學道人理會不得一向去古人入道因緣上求玄求妙求奇特覓解會不能見月忘指直下一刀兩段永嘉所謂空拳指上生實解根境法中虗揑怪於五蘊十二處十八界二十五有塵勞中妄自囚執如來説為可憐憫者不見巖頭和尚有言汝但無欲無依便是能仁都來只有一個父母所生底肉塊子一點氣不來便屬他人所管肉塊子外更有甚麼把甚麼作奇特玄妙把甚麼作菩提涅槃把甚麼作真如佛性士大夫要究竟此事初不本其實只管要於古人公案上求知求解直饒你知盡解盡一大藏教臘月三十日生死到來時一點也使不著又有一種才聞知識説如是事又將心意識搏量卜度云若如此則莫落空否士大夫十個有五雙作遮般見解妙喜不得已向他道你未曾得空何怕之有如船未翻先要跳入水去見伊不領略不惜口業又為他打葛藤一上云只遮怕落空底還空得也無你眼若不空將甚麼觀色耳若不空將甚麼聽聲鼻若不空將甚麼知香臭舌若不空將甚麼嘗味身若不空將甚麼覺觸意若不空將甚麼分別萬法佛不云乎無眼耳鼻舌身意無色聲香味觸法乃至十二處十八界二十五有乃至聲聞緣覺菩薩佛及佛所説之法菩提涅槃真如佛性及説此法者聽此法者作如是説者受如是説者皆悉無有得如是了喚作空耶喚作不空耶喚作佛耶喚作菩薩耶喚作聲聞耶喚作緣覺耶喚作菩提涅槃耶喚作真如佛性耶道我聰明靈利不受人瞞向遮裏試定當看若是定當得出止宿草菴且居門外若定當不出切忌開大口説過頭話大丈夫漢決欲究竟此一段大事因緣一等打破面皮性燥竪起脊梁骨莫順人情把自家平昔所疑處貼在額頭上常時一似欠了人百萬貫錢被人追索無物可償生怕被人耻辱無急得急無忙得忙無大得大底一件事方有趨向分此處比原文節去論口鼓子禪一段晝三夜三孜孜矻矻茶裏飯裏喜時怒時淨處穢處妻兒聚頭處與賓客相酬酢處辦公家職事處了私門婚嫁處都是第一等做工夫提撕警覺底時節昔李文和都尉在富貴叢中參得禪大徹大悟楊文公參得禪時身居翰苑張無盡參得禪時作江西轉運使只遮三大老便是個不壞世間相而談實相底樣子也又何曾須要去妻孥休官罷職咬菜根苦形劣志避喧求靜然後入枯禪鬼窟裏作妄想方得悟道來不見龐居士有言但自無心於萬物何妨萬物常圍繞鐵牛不怕師子吼恰似木人見花鳥木人本體自無情花鳥逢人亦不驚心境如如只遮是何慮菩提道不成在世俗塵勞中能不忘生死事雖未即打破漆桶然亦種得般若種智之深異世出頭來亦省心力亦不至流落惡趣中大勝耽染塵勞不求脫離謂此事不可容易且作歸敬信向處似此見解者不可勝數士大夫學道與我出家兒大不同出家兒父母不供甘旨六親固已棄離一瓶一鉢日用應緣處無許多障道底冤家一心一意體究此事而已士大夫開眼合眼處無非障道底冤魂若是個有智慧者只就裏許做工夫淨名所謂塵勞之儔為如來種怕人壞世間相而求實相又設個喻云譬如高原陸地不生蓮花卑濕污泥乃生此花若就裏許如楊文公李文和張無盡三大老打得透其力勝我出家兒二十倍何以故我出家兒在外打入士大夫在內打出在外打入者其力弱在內打出者其力強強者謂所乖處重而轉處有力弱者謂所乖處輕而轉處少力雖力有強弱而所乖則一也示徐敦濟附𠠇參政請就天竺升座僧間高揖釋迦不拜彌勒時如何師云夢裏惺惺進云將謂和尚忘却師云你記得試道看進云雖道不得要旦不失師云原來不會進云從上來事分付阿誰師云分付瞎漢進云臨濟一宗全憑渠力師云旦喜不干你事問昔日七賢女遊尸陀林一女云尸在這裏人向甚麼處去一女云作麼作麼當時齊悟無生法忍如何是無生法忍師云拈却髑髏裏底進云輝騰今古爍破乾坤師云這田庫奴進云只如四主薄即今在甚麼處師舉起拂子云在這裏進云惟憑這個力念念更無差師云摩竭令行傳萬古乃云拈提要妙掘地覓天就裏明真望空啓告直得心心不觸物念念絶扳緣觀法界於一微塵之中見一微塵遍法界之內塵塵爾念念爾法法爾猶是教乘極則未是衲僧放身命處若識得衲僧放身命處則出生入死得大自在以生死為遊戲之場而不被生死之所留礙其或不然未免葛藤妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真乃顧視大衆云今日參政相公為亡男主簿盡七之晨命山僧升於此座為衆舉揚僧俗交參同臨斯會又是倜甚麼若言是妄現今説法聽法歷歷孤明復是何物眼若是妄將甚麼觀色耳若是妄將甚麼聽聲鼻若是妄將甚麼嗅香舌若是妄將甚麼了味身若是妄將甚麼覺觸意若是妄將甚麼分別眼耳鼻舌身意色聲香味觸法既不是妄一真何依真既無依一道平等到這裏方如主簿昔日雖生本不曾生今日雖滅本不曾滅既不曾生又不曾滅更喚甚麼作圓明妙性真妄名相何處安著還委悉麼騰身一擲太虛外鼻孔依前搭上唇下座從來無法與人但為人做得指路頭底漢子耳古德云有所得是野干鳴無所得是師子吼佛是通變底人於四十九年中三百六十餘會説法隨其根性而引導之故於十法界內一音演説衆生隨類各獲饒益譬如東風一拂萬卉齊敷佛所説法亦復如是若有意於十法界內作饒益則是以我説法欲使衆生隨類得度不亦難乎不見舍利弗在般若會上問文殊曰諸佛如來不覺法界耶文殊曰弗也舍利弗諸佛尚不可得云何有佛而覺法界法界尚不可得云何法界為諸佛所覺看他兩人恁麼激揚又何曾著意來從上諸佛諸祖為人皆有如是體裁自是後來兒孫失其宗旨各立門戶造妖揑怪示曾叔遲以湛然號公祖師云但有心分別計較自心見量者悉皆是夢若心識寂滅無一念動處是名正覺覺既正則於日用二六時中見色聞聲嗅香了味覺觸知法行住坐臥語默動靜無不湛然亦自不作顛倒想有想無想悉皆清淨既得清淨動時顯湛然之用不動時歸湛然之體體用雖殊而湛然則一也如析栴檀片片皆栴檀今時有一般杜撰漢自己腳跟下不實只管教人攝心靜坐坐教絶氣息此輩名為可憐愍者請公只恁麼做工夫山野雖然如此指示公真不得已耳若實有恁麼做工夫底事即是染污公矣此心無有實體如何硬收攝得住擬收攝向甚處安著既無安著處則無時無節無古無今無凡無聖無得無失無靜無亂無生無死亦無湛然之名亦無湛然之體亦無湛然之用亦無恁麼説湛然者亦無恁麼受湛然説者答許壽源佛説一切法為度一切心我無一切心何用一切法法本無法心亦無心心法兩空是真實相而今學道之士多怕落空作如是解者錯認方便執病為藥深可憐愍故龐居士有言汝勿嫌落空落空亦不惡又云但願空諸所有切勿實諸所無若覷得遮一句子破無邊惡業無明當下瓦解氷消如來所説一大藏教亦注解遮一句子不出當人若具決定信知得有如是大解脫法只在知得處撥轉上頭關棙子則龐公一句與佛説一大藏無異無別無前無後無古無今無少無剩亦不見有一切法亦不見有一切心十方世界空蕩蕩地亦莫作空蕩蕩地見若作是見則便有説空者便有聞説空者便有一切法可聽便有一切心可證既可聽可證則內有能證之心外有所證之法此病不除教中謂之以我説法亦謂之謗佛法僧又教中云若取法相即著我人衆生壽者若取非法相即著我人衆生壽者前所云內有能證之心外有所證之法便是遮個道理也佛弟子陳惇知身是妄知法是幻於幻妄中能看個狗子無佛性話忽然洗面摸著鼻孔伊有書來呈見解試手説禪如虎生三日氣已食牛其間通消息處雖似吉獠棒打地有著處則入地數寸不著處則全無巴鼻然大體基本已正而大法未明亦初心入道之常病耳苟能知是般事撥向一邊却把諸佛諸祖要妙門一時塞斷向威音那畔討個生涯處方於法得自在矣釋迦老子云若但讚佛乘衆生沒在苦信知如是事以我所證擴而充之然後不被法縛不求法脫恁麼也得不恁麼也得恁麼不恁麼總得凡有言句凡所受用如壯士展臂不借他力箭既離弦無返回勢非是強為法如是故得如此了始可言無善無惡無佛無衆生等事而今大法未明若便説恁麼話恐墮在永嘉所謂豁達空撥因果莽莽蕩蕩招殃禍中不可不知也但得本莫愁末久久淹浸得熟不愁不成一片勉之勉之示陳明仲佛又言不應於一法一事一身一國土一衆生見於如來應遍於一切處見於如來佛者覺義謂於一切處常遍覺故所謂遍見者見自己本源自性天真佛無一時一處一法一事一身一國土一衆生界中而不遍故也衆生迷此而輪轉三界受種種苦諸佛悟此而超諸有海受殊勝妙樂然苦樂皆無實體但迷悟差別而苦樂異途耳故杜順云法身流轉五道名曰衆生衆生現時法身不現也示李獻臣又鄭成忠請普説師云如今心地未明底不免疑道世界從甚麼處起將來却向甚麼處滅為復先有世界為復先有人若道先有世界古德不應云三界惟心所現萬法惟識所變若道先有人既未有世界人却在甚麼處安頓遮些子不妨被他窒礙説先有世界也不是先有人也不是大法一明不著排遣自然分曉幻寄曰吾初讀華嚴十無盡藏品至菩薩有無記法而疑之調華嚴菩薩具一切智何獨於此數端而獨無記及讀徑山老人語乃知菩薩之無記杜人言思正所以使之深證後如黃檗被喝處蓋見無邊沙界于毛端臨濟喫棒時則拈十世古今于眼睫若以言思求必流魔外又云善惡皆從自心起且道離却舉足動步思量分別外喚甚麼作自心自心却從甚麼處起若識得自心起處無邊業障一時清淨種種殊勝不求而自至矣又云生從何處來死向何處去知得來去處方名學佛人知生死底是阿誰受生死底復是阿誰不知來去處底又是阿誰忽然知得來去處底又是阿誰看此話眼眨眨地理會不得肚裏七上八下方寸中如頓却一團火相似底又是阿誰若要識但向理會不得處識取若便識得方知生死決定不相干涉又云凡看經教及古德入道因緣心未明了覺得迷悶沒滋味如咬鐵橛相似時正好著力第一不得放捨乃是意識不行思量不到絶分別滅理路處尋常可以説得道理分別得行處盡是情識邊事往往多認賊為子不可不知也又答王大授云不識左右別後日用如何做工夫若是曾於理性上得滋味經教上得滋味祖師言句上得滋味眼見耳聞上得滋味舉足動步處得滋味心思意想處得滋味都不濟事若要直下休歇應是從前得滋味處都莫官他却去沒撈摸處沒滋味處試著意看若著意不得撈摸不得轉覺得沒柄可把捉理路義路心意識都不行如土木瓦石相似時莫怕落空此是當人放身命處不可忽不可忽又答李似表云示諭欲妙喜因書指示徑要處只遮求指示徑要砥一念早是刺頭入膠盆了也不可更向雪上加霜雖然有問不可無答請左右都將平昔或自看經教話頭或因人舉覺指示得滋味歡喜處一時放下依前百不知百不會如三歲孩兒相似有性識而未行却向未起求徑要底一念子前頭看看來看去覺得轉沒巴鼻方寸轉不寧怗時不得放緩遮裏是坐斷千聖頂𩕳處往往學道人多向這裏打退了左右若信得及只向未起求徑要指示一念前看看來看去忽然睡夢覺不是差事又云趙州狗子無佛性話喜怒靜鬧處亦須提撕第一不得用意等悟若用意等悟則自謂我即今迷執迷待悟縱經塵劫亦不能得悟但舉話頭時略抖擻精神看是個甚麼道理常以生不知來處死不知去處二事貼在鼻孔尖上茶裏飯裏靜處閙處念念孜孜常似欠却人百萬貫錢債無所從出心胸煩悶回避無門求生不得求死不得當恁麼時善惡路頭相次絶也覺得如此時正好著力只就這裏看個話頭僧問趙州狗子還有佛性也無州云無看時不用博量不用注解不用要得分曉不用向開口處承當不用向舉起處作道理不用墮在空寂處不用將心等悟不用向宗師説處領略不用掉在無事甲裏但行住坐臥時時提撕狗子還有佛性也無無提撕得熟口議心思不及方寸裏七上八下如咬生鐵橛沒滋味時切莫退志得如此時却是好底消息不見古德有言佛説一切法為度一切心我無一切心何用一切法非但祖師門下如是佛説一大藏教盡是這般道理衆生惡業障重逐日下得牀來便心識紛飛思量名利擔却人我妄想顛倒從旦至暮如鈎鎖連環相續不斷都不厭惡乍起一念向此個門中著意思量便要我會心意識安排不到便生煩惱早要罷休有著甚來由之説如此者不可勝數舜元道友即不然既知缺減界中種種虗妄一心一意向自己腳跟下理會生從何處來死向何處去既不知來處又不知去處現今歷歷孤明與人分是非別好醜底決定是有是無是真實是虗妄直待到如人飲水冷暖自知不向他人口頭受處分忽然噴地一發到究竟安樂大休大歇處方始自肯以此軸來求指示掇筆信手一揮遂成一段葛藤然則事不孤起起必有由若一向作葛藤會又爭得不見昔日子湖和尚有言祖師西來也只是個冬寒夏熱夜暗日明只為你徒無意立意無事生事無內外強作內外無東西謾應作漫説東西所以奢摩不能明了以至根境不能自由以是評量舜元不曾來妙喜處求法語妙喜元不曾寫一字冬寒夏熱夜暗日明內外中間東西南北元不曾移易增減一絲毫許何以故我宗無語句亦無一法與人既無一法與人即今寫底是個甚麼説冬寒夏熱內外中間者又是個甚麼東西南北不曾移易一絲毫者又是個甚麼咄有也不可得無也不可得冬寒夏熱也不可得內外中間也不可得作如是説者亦不可得受如是説者亦不可得一絲毫亦不可得舜元亦不可得妙喜亦不可得不可得亦不可得不可得中只麼得舜元到者裏合作麼生參只這作麼生參亦無著處然後此語亦不受此語既不受妙喜決定無説舜元決定無聞無説處是真説無聞處是真聞如是則妙喜即是舜元舜元即是妙喜妙喜舜元無二無二分無別無斷故嘉州大像喫黃連陝府鐵牛滿口苦苦不苦分明覷見沒可覩咄示呂舜元疑生不知來處死不知去處底心未亡則是生死交加但向交加處看個話頭僧問趙州和尚狗子還有佛性也無州云無但將疑生不知來處死不知去處底心移來無字上則交加之心不行矣交加之心既不行則疑生來死去底心將絶矣但向欲絶未絶處廝崖時節因緣到來驀然噴地一下便了示李伯和僧問趙州狗子還有佛性也無州云無此一字便是個破生死疑心底刀子也這刀子柄只在當人手中教別人下手不得須是自家下手始得若捨得性命方肯自下手若捨性命不得且只管在疑不破處崖將去驀然自肯捨命一下便了那時方信靜時便是閙時底閙時便是靜時底語時便是默時底默時便是語時底不著問人亦自然不受邪師胡説亂道也又云日用二六時中不得執生死佛道是有不得撥生死佛道歸無但只看個狗子還有佛性也無趙州云無答陳季任老居士所作所為冥與道合但未能得㘞地一下耳若日用應緣不失故步雖未得㘞地一下臘月三十日閻家老子亦須拱手歸降況一念相應耶妙喜老漢雖未目擊觀其行事大小折中無過不及只此便是道所合處到這裏不用作塵勞想亦不用作佛法想佛法塵勞都是外事然亦不得作外事想但回光返照作如是想者從甚麼處得來所作所為時有何形段所作既辦隨我心意無不周旋無有少剩正當恁麼時承誰恩力如此做工夫日久月深如人學射自然中的矣衆生顛倒迷己逐物耽少欲味甘心受無量苦逐日未開眼時未下牀時半惺半覺時心識已紛飛隨妄想流蕩矣作善作惡雖未發露未下牀時天堂地獄在方寸中已一時成就矣及待發時已落在第八佛不云乎一切諸根自心現器身等藏自妄想相施設顯示如河流如種子如燈如風如雲剎那展轉壞躁動如猿猴樂不淨處如飛蠅無厭足如風火無始虗偽習氣因如汲水輪等事如此識得破便喚作無人無我智天堂地獄不在別處只在當人半惺半覺未下牀時方寸中並不從外來發未發覺未覺時切須照顧照顧時亦不得與之用力爭爭著則費力矣祖不云乎止動歸止止更彌動才覺日用塵勞中漸漸省力時便是當人得力之處便是當人成佛作祖之處便是當人變地獄作天堂之處便是當人穩坐之處便是當人出生死之處便是當人致君堯舜之上之處便是當人起疲氓於凋瘵之處便是當人福蔭子孫之處到這裏説佛説祖説心説性説玄説妙説理説事説好説惡亦是外邊事如此等事尚屬外矣況肯作塵勞中先聖所訶之事耶作好事尚不肯豈肯作不好事耶若信得此説及永嘉所謂行亦禪坐亦禪語默動靜體安然不是虗語請依此行履始終不變易則雖未徹證自己本地風光雖未明見自己本來面目生處已熟熟處已生矣切切記取才覺省力處便是得力處也妙喜老漢每與個中人説此話往往見説得頻了多忽之不肯將為事居士試如此做工夫看只十餘日便自見得省力不省力得力不得力矣如人飲水冷暖自知説與人不得呈似人不得先德云語證則不可示人説理則非證不了自證自得自信自悟處除曾證曾得已信已悟者方默默相契未證未得未信未悟者不唯自不信亦不信他人有如此境界老居士天資近道現定所作所為不著更易以他人較之萬分中已省得九千九百九十九分只欠噴地一發便了士大夫學道多不著實理會除却口議心思便茫然無所措手足不信無措手足處正是好處只管心裏要思量得到口裏要説得分曉殊不知錯了也佛言如來以一切譬喻説種種事無有譬喻能説此法何以故心智路絶不思議故信知思量分別障道必矣若得前後際斷心智路自絶矣若得心智路絶説種種事皆此法也此法既明即此明處便是不思議大解脫境界只此境界亦不可思議境界既不可思議一切譬喻亦不可思議種種事亦不可思議只這不可思議底亦不可思議此語亦無著處只這無著處底亦不可思議如是展轉窮詰若事若法若譬喻若境界如環之無端無起處無盡處皆不可思議之法也所以云菩薩住是不思議於中思議不可盡入此不可思議處思與非思皆寂滅然亦不得住在寂滅處若住在寂滅處則被法界量之所管攝教中謂之法塵煩惱滅却法界量種種殊勝一時蕩盡了方始好看庭前柏樹子麻三斤乾矢橛狗子無佛性一口吸盡西江水東山水上行之類忽然一句下透得方始謂之法界無量回向如實而見如實而行如實而用便能於一毛端現寶王剎坐微塵裏轉大法輪成就種種法破壞種種法一切由我如壯士展臂不借他力師子遊行不求伴侶種種勝妙境界現前心不驚異種種惡業境界現前心不怕怖日用四威儀中隨緣放曠任運逍遙到得這個田地方可説無天堂無地獄等事永嘉云亦無人亦無佛大千沙界海中漚一切聖賢如電拂此老若不到這個田地如何説得出來此語錯會者甚多苟未徹根源不免依語生解便道一切皆無撥無因果將諸佛諸祖所説言教盡以為虗謂之誑惑人此病不除乃莽莽蕩蕩招殃禍者也佛言虗妄浮心多諸巧見若不著有便著無若不著此二種便於有無之間搏量卜度縱識得此病定在非有非無處著倒故先聖苦口丁寧令離四句絶百非直下一刀兩段更不念後思前坐斷千聖頂𩕳四句者乃有無非有非無亦有亦無是也若透得此四句了見説一切諸法實有我亦隨順與之説有且不被此實有所礙見説一切諸法實無我亦隨順與之説無且非世間虗豁之無見説一切諸法亦有亦無我亦隨順與之説亦有亦無且非戲論見説一切諸法非有非無我亦隨順與之説非有非無且非相違淨名云外道六師所墮汝亦隨墮是也答張暘叔趙州云老僧逐日除二時粥飯是雜用心餘外更無雜用心處且道這老漢在甚處著倒若於這裏識得他面目始可説行亦禪坐亦禪語默動靜體安然未能如是當時時退步向自己腳跟下子細推窮我能知他人好惡長短底是凡是聖是有是無推窮來推窮去到無可推窮處如老鼠入牛角驀地偷心絶則便是當人四稜榻地歸家穩坐處示熊叔雅伏承第五令嗣以疾不起父子之情千生百劫恩愛之所流注想當此境界應有訛缺無有是處五濁世中種種虗幻無一真實請行住坐臥常作是觀則日久月深漸漸消磨矣然正煩惱時子細揣摩窮詰從甚麼處起若窮起處不得現今煩惱底却從甚麼處得來正煩惱時是有是無是虗是實窮來窮去心無所之要思量但思量要哭但哭哭來哭去思量來思量去抖擻得藏識中許多恩愛習氣盡時自然如氷歸水還我個本來無煩惱無思量無憂無喜底去耳入得世間出世無餘世間法則佛法佛法則世間法也父子天性一而已若子喪而父不煩惱不思量如父喪而子不煩惱不思量還得也無若硬止遏哭時又不敢哭思量時又不敢思量是特欲逆天理滅天性揚聲止響潑油救火耳正煩惱時總不是外事且不得作外邊想永嘉云無明實性即佛性幻化空身即法身是真語實語不誑不妄語恁麼見得了要思量要煩惱亦不可得作是觀者名為正觀若他觀者名為邪觀邪正未分正好著力此是妙喜決定義無智人前莫説答汪彥章衆生日用現行無明順無明則生歡喜逆無明則生煩惱佛菩薩則不然借無明以為佛事為衆生以無明為窟宅逆之則是破他窟宅順之則隨其所著而誘導之淨名云塵勞之儔為如來種永嘉云無明實性即佛性幻化空身即法身便是這個道理也示張太尉益之向自己腳跟下推窮我這取富貴底從何處來即今受富貴底異日却向何處去既不知來處又不知去處便覺心頭迷悶正迷悶時亦非他物只就這裏看個話頭僧問雲門如何是佛門云乾矢橛但舉此話忽然伎倆盡時便悟也切忌尋文字引證胡亂博量注解縱然注解得分明説得有下落盡是鬼家活計疑情不破生死交加疑情若破則生死心絶矣生死心絶則佛見法見亡矣佛見法見尚亡況復更起衆生煩惱見耶但將迷悶底心移來乾矢橛上一抵抵住怖生死底心迷悶底心思量分別底心作聰明底心自然不行也覺得不行時莫怕落空忽然向抵住處絶消息不勝慶快平生得消息絶了起佛見法見衆生見思量分別作聰明説道理都不相妨日用四威儀中但常放教蕩蕩地靜處閙處常以乾矢橛提撕日往月來水牯牛自純熟矣第一不得向外面別起疑也乾矢橛上疑破則恆河沙數疑一時破矣答呂隆禮示曾天遊云莫於古人言句上只管如疊塔子相似一層了又一層枉用工夫無有了期但只存心於一處無有不到底時節因緣到來自然築著磕著噴地省去耳不起一念還有過也無云須彌山一物不將來時如何放下著這裏疑不破只在這裏參更不必自生枝葉也答呂居仁云千疑萬疑只是一疑話頭上疑破則千疑萬疑一時破話頭不破則且就上面與之廁崕若棄了話頭別去文字上起疑經教上起疑古人公案上起疑日用塵勞中起疑皆是邪魔眷屬既辦此心第一不要急急則轉遲矣又不得緩緩則怠惰矣如調琴之法緊緩要得中方成曲調但向日用應緣處時時覷捕我遮能與人決斷是非曲直底承誰恩力畢竟從甚麼處流出覷捕來覷捕去平昔生處路頭自熟生處既熟則熟處却生矣那個是熟處五陰六入十二處十八界二十五有無明業識思量計較心識晝夜熠熠如野馬無暫停息底是這一落索使得人流浪生死使得人做不好事這一落索既生則菩提涅槃真如佛性便現前矣當現前時亦無現前之量故古德契證得了便解道應眼時若千日萬象不能逃影質應耳時若幽谷大小音聲無不足如此等事不假他求不借他力自然向應緣處活鱍鱍地未得如此且將思量世間塵勞底心回在思量不及處試思量看教看無字話頭云云答榮茂實既已知有此段大事因緣決定不從人得則便好頓捨外塵時時向自己腳跟下推窮推來推去內不見有能推之心外不見有所推之境淨裸裸赤灑灑沒可把如水上放葫蘆無人動著常蕩蕩地拘牽他不得惹絆他不得撥著便動觸著便轉如是自在如是瞥脫如是靈聖不與千聖同途不與衲僧借借直能號令佛祖佛祖號令他不得當人知是般事便好猛著精彩向百尺竿頭更進一步如進得這一步則不異善財童子於普賢毛孔剎中行一步過不可説不可説佛剎微塵數世界如是而行盡未來劫猶不能知一毛孔中剎海次第剎海藏剎海差別剎海普入剎海成剎海壞剎海莊嚴所有邊際似這般境界亦不是外邊起心用意修證得來只是當人腳跟下本來具足底道理耳不見德山和尚有言汝但無事於心無心於事則虗而靈空而妙若毫端許言之本末者皆為自欺何故毫釐繫念三塗業因瞥爾情生萬劫羈鎖聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無纍乎及其厭之又成大患恁麼説話棒打石人頭嚗嚗論實事前所云內不見有能推之心外不見有所推之境便是這個道理也這個道理向事上覷則疾若向意根下思量卜度則轉疏轉遠矣所以釋迦老子在法華會上只度得個八歲底女人華嚴會上只度得個童子涅槃會上只度得個屠兒看他這三個成佛底樣子又何曾向外取證辛勤修學來佛亦只言我今為汝保任此事終不虗也只説為他保任而已且不説有法可傳令汝向外馳求然後成佛幸有如此體格何故不信苟能直下信得及不向外馳求亦不於心內取證則二六時中隨處解脫何以故既不向外馳求則內心寂靜既不於心內取證則外境幽間故祖師云境緣無好醜好醜起於心心若不強名妄情從何起妄情既不起真心任遍知當知內心外境只是一事切忌作兩般看記得溈山問仰山妙淨明心子作麼生會仰山云山河大地日月星辰溈山云汝只得其事仰山云和尚適來問甚麼溈山云妙淨明心仰山云喚作事得麼溈山云如是如是觀使師重敘事不録為立號曰妙淨居士師重勉之行住坐臥造次顛沛不可忘了妙淨明心之義妄念起時不必用力排遣只舉僧問趙州狗子還有佛性也無趙州云無舉來舉去和這舉話底亦不見有只這知不見有底亦不見有然後此語亦無所受驀地於無所受處不覺失聲大笑一巡時便是歸家穩坐處也示趙師重巖頭云若欲他時播揚大教須是一一從自己胸襟流出蓋天蓋地始是大丈夫所為巖頭之語非獨發明雪峰根器亦可作學此道者萬世規式所謂胸襟流出者乃是自己無始時來現量本自具足才起第二念則落比量矣比量是外境莊嚴所得之法現量是父母未生前威音那畔事從現量中得者氣力粗從比量中得者氣力弱氣力粗者能入佛又能入魔氣力弱者入得佛境界往往於魔境界打退鼓不可勝數此事不在聰明靈利亦不在鈍根淺識據實而論只以噴地一發為準的耳才得這個消息凡有言句非離真而立處立處即真所謂胸襟流出蓋天蓋地者如是而已非是做言語求奇特他人道不出錦心繡口意句尖新以為胸襟流出也示曾叔遲欲學此道當於自己腳跟下理會才涉秋毫知見即蹉過腳跟下消息腳跟下消息通了種種知見無非盡是腳跟下事故祖師云正説知見時知見即是心當心即知見知見即如今若如今不越一念向腳跟下頓亡知見便與祖師把手共行未能如是切忌向知見上著倒示陳次學世間法全仗口議心思學出世間法用口議心思則遠矣佛不云乎是法非思量分別之所能解永嘉云損法財滅功德莫不由茲心意識蓋心意識乃思量分別之窟宅也決欲荷擔此段大事因緣請猛著精彩把這個來為先鋒去為殿後底生死魔根一刀斫斷便是出頭時節正當恁麼時方用得口議心思著何以故第八識既除則生死魔無處棲泊生死魔無棲泊處則思量分別底渾是般若妙智更無毫髮許為我作障所以道觀法先後以智分別是非審定不違法印得到這個田地了儘作聰明儘説道理皆是大寂滅大究竟大解脫境界更非他物故盤山云全心即佛全佛即人是也未得如是直須行住坐臥勿令心意識得其便久久純熟自然不著用力排遣矣示謝廓然尋常計較安排底是識情隨生死遷流底亦是識情怕怖慞惶底亦是識情而今參學之人不知是病只管在裏許頭出頭沒教中所謂隨識而行不隨智以故昧却本地風光本來面目若或一時放得下百不思量計較忽然失腳踏著鼻孔即此識情便是真空妙智更無別智可得若別有所得別有所證則又却不是也如人迷時喚東作西及至悟時即西便是東無別有東此真空妙智與太虗空齊壽只這大虗空中還有一物礙得他否雖不受一物礙而不妨諸物於空中往來此真空妙智亦然生死凡聖垢染著一點不得雖著不得而不礙生死凡聖於中往來答曾天遊心火熾然熠熠不息貪欲嗔恚癡繼之如鈎鎖連環相續不斷若無猛烈志氣日月浸久不覺被五陰魔所攝持若能一念緣起無生不離貪欲嗔恚癡倒用魔王印驅諸魔侶以為護法善神且非強為法如是故示謝廓然禪不在靜處不在閙處不在思量分別處不在日用應緣處然雖如是第一不得捨却靜處閙處日用應緣處思量分別處參忽然眼開都是自家屋裏事示聶寺丞但於日用應緣處不昧則日月浸久自然打成一片何處為應緣處喜時怒時判斷公事時與賓客相酬酢時與妻子聚會時思量善惡時觸境遇緣時皆是噴地一發時節千萬記取示熊叔雅這個道理只為太近遠不出自家眼睛裏開眼處便刺著合眼處亦不欠少開口處便道著合口處亦自現成擬欲起心動念承當渠早已蹉過十萬八千了也答劉彥沖狗子無佛性話左右如人捕賊已知窩盤處但未捉著耳請快著精彩不得有少間斷時時向行住坐臥處看讀書史處修仁義禮智信處侍奉尊長處提誨學者處喫粥喫飯處與之廝崖忽然打失布袋夫復何言示汪聖錫古德有言但辦肯心必不相賺只恐當人信不及於日用應緣處被外境所奪不能純一做工夫則成間斷當間斷時未免方寸擾擾正擾擾時却是個好底時節佛言居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實便是這個道理也這個道理説似人不得惟證悟者舉起便知落處示謝廓然示諭自得山野向來書之後每遇閙中躲避不得處常自點檢而未有著力工夫只這躲避不得處便是工夫了也若更著力點檢則却又遠矣昔魏府老華嚴云佛法在日用處行住坐臥處喫茶喫飯處語言相問處所作所為處舉心動念又却不是也正當躲避不得處切忌起心動念作點檢想祖師云分別不生虗明自照又龐居士云日用事無別惟吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絶點埃神通并妙用運水及搬柴又先聖云但有心分別計較自心現量者悉皆如夢切記取躲避不得時不得更擬心不擬心時一切現成亦不用理會利亦不用理會鈍總不干他利鈍之事亦不干他靜亂之事正當躲避不得時忽然打失布袋不覺拊掌大笑矣記取記取此事若用一毫毛工夫取證則如人以手撮摩虗空祇益自勞耳示陳季任情識未破則心火熠熠地正當恁麼時但只以所疑底話頭提撕如僧問趙州狗子還有佛性也無州云無只管提撕舉覺左來也不是右來也不是又不得將心等悟又不得向舉起處承當又不得作玄妙領略又不得作有無商量又不得作真無之無卜度又不得坐在無事甲裏又不得向擊石火閃電光處會直得無所用心心無所之時莫怕落空這裏却是好處驀然老鼠入牛角便見倒斷也此事非難非易除是夙曾種得般若種智之深曾于無始曠大劫來承事真善知識熏習得正知正見在靈識中觸境遇緣於現行處築著磕著如在萬人叢裏認得自家父母相似當恁麼時不著問人自然求覔底心不馳散矣雲門云不可説時即有不説時即無也不可商量時便有不商量時便無也又自提起云且道不商量時是個甚麼恐人不會又自云更是甚麼答張安國大凡涉世有餘之士久膠於塵勞中忽然得人指令向靜默處做工夫乍得胸中無事便認著以為究竟安樂殊不知似石壓草雖暫覺絶消息奈何根株猶在寧有證徹寂滅之期要得真正寂滅現前必須于熾然生滅之中驀地一跳跳出不動一絲毫便攪長河為酥酪變大地作黃金臨機縱奪殺活自由利他自利無施不可示富季申昔嚴陽尊者問趙州一物不將來時如何州云放下著嚴陽云一物既不將來放下個甚麼州云放不下擔取去嚴陽於言下大悟又有僧問古德學人奈何不得時如何古德云老僧亦奈何不得僧云學人在學地故是奈何不得和尚是大善知識為甚麼亦奈何不得古德云我若奈何得則便拈却你這不奈何僧於言下大悟二僧悟處即是樓樞密迷處樓樞密疑處即是二僧問處法從分別生還從分別滅滅諸分別法是法無生滅答樓樞密與向伯恭論夢覺書見隆慶間師章中示諭臘月三十日已到要之日用當如是觀察則世間塵勞之心自然消隕矣塵勞之心既消隕則來日依前孟春猶寒矣古德云欲識佛性義當觀時節因緣此個時節乃是黃面老子出世成佛坐金剛座降伏魔軍轉法輪度衆生入涅槃底時節與解空所謂臘月三十日時節無異無別到這裏只如是觀以此觀者名為正觀異此觀者名為邪觀邪正未分未免隨他時節遷變要得不隨時節但一時放下著放到無可放處此語亦不受依前只是解空居士更不是別人答劉季高章敬和尚曰至理亡言時人不悉強習他事以為功能不知自性元非塵境是個微妙大解脫門所有鑑覺不染不礙如是光明未曾休廢曩劫至今固無變易猶如日輪遠近斯照雖及衆色不與一切和合靈燭妙明非假鍛鍊為不了故取於物象但如揑目妄起空華徒自疲勞枉經劫數若能返照無第二人舉措施為不虧實相左右自言根鈍試如此返照看能知鈍者還鈍也無若不回光返照只守鈍根更增煩惱乃是向幻妄上重增幻妄空花上更添空花也但相聽能知根性鈍者決定不鈍雖不得守著這個鈍底然亦不得捨却這個鈍底參取捨利鈍在人不在心此心與三世諸佛一體無二若有二則法不平等矣受教傳心俱為虗妄求真覓實轉見參差但知得一體無二之心決定不在利鈍取捨之間則便當見月亡指直下一刀兩段若更遲疑思前算後則乃是空拳指上生實解根境法中虗揑怪於陰界中妄自囚執無有了時答陳季任伏承杜門息交世事一切闊略朝夕惟以某向所舉話頭提撕甚善甚善既辦此心當以悟為則若自生退屈謂根性陋劣更求入頭處正是含元殿裏問長安在甚處耳正提撕時是阿誰能知根性陋劣底又是阿誰求入頭處底又是阿誰妙喜不避口業分明為居士説破只是個汪彥章更無兩個只有一個汪彥章更那裏得個提撕底知根性陋劣底求入頭處底來當知皆是汪彥章影子並不干他汪彥章事若是真個汪彥章根性必不陋劣必不求入頭處但只信得自家主人公皮並不消得許多勞攘昔有僧問仰山禪宗頓悟畢竟入門的意如何山曰此意極難若是祖宗門下上根上智一聞千悟得大總持此根人難得其有根微智劣所以古德道若不安禪靜慮到這裏總須茫然僧曰除此格外還有別方便令學人得入也無山曰別有別無令汝心不安我今問汝汝是甚處人曰幽州人山曰汝還思彼處否曰常思山曰彼處樓臺林苑人馬駢闐汝返思思底還有許多般也無曰某甲到這裏一切不見有山曰汝解猶在境信位即是人位即不是妙喜已是老婆心切須著更下個注腳人位即是汪彥章信位即是知根性陋劣求入頭處底若於正提撕話頭時返思能提撕底還是汪彥章否到這裏間不容髮若佇思停機則被影子惑矣請快著精彩不可忽不可忽答汪彥章向承示諭性根昏鈍而黽勉修持終未得超悟之方某頃在雙徑答富季申所問正與此問同能知昏鈍者決定不昏鈍更欲向甚處求超悟士大夫學此道却須借昏鈍而入若執昏鈍自謂我無分則為昏鈍魔所攝矣蓋平昔知見多以求證悟之心在前作障故自己正知見不能現前此障亦非外來亦非別事只是個能知昏鈍底主人公耳故瑞巖和尚居常在丈室中自喚云主人公又自應云諾惺惺著又自應云諾他時後日莫受人謾又自應云諾諾古來幸有恁麼榜樣慢向這裏提撕看是個甚麼只這提撕底亦不是別人只是這能知昏鈍者耳能知昏鈍者亦不是別人便是李寶文本命元辰也此是妙喜不得已應病與藥略為居士指個歸家穩坐底路頭而已若便認定死語真個喚作本命元辰則是認識神為自己轉沒交涉矣故長沙和尚云學道之人不識真只為從來詔識神無量劫來生死本癡人喚作本來人前所云借昏鈍而入是也但只看能知得如是昏鈍底畢竟是個甚麼只向這裏看不用求超悟看來看去忽地大笑去矣此外無可言者答李茂嘉士大夫學道利根者蹉過鈍根者難入難入則自生退屈蹉過則起謗無疑若要著中但將蹉過底移在難入處却將難入底移在蹉過處自然怗怗地不作難入蹉過之解矣得如此了却好向這裏全身放下放下時亦不得作放下道理古德所謂放蕩長如癡兀人他家自有通人愛示陳次仲昏沉掉舉先聖所訶靜坐時才覺此兩種病現前但只舉狗子無佛性話兩種病不著用力排遣當下怗怗地矣日久月深才覺省力便是得力處也亦不著做靜勝工夫只這便是工夫也答富季申令兄寶學公初未嘗知管帶忘懷之事信手摸著鼻孔雖未盡識得諸方邪正而基本堅實邪毒不能侵忘懷管帶在其中矣若一向忘懷管帶生死心不破陰魔得其便未免把虗空隔絶作兩處處靜時受無量樂處閙時受無量苦要得苦樂均平但莫起心管帶將心忘懷十二時中放教蕩蕩地忽爾舊習瞥起亦不著用心遏捺只就瞥起處看個話頭狗子還有佛性也無無正當恁麼時如紅罏上一點雪相似眼辨手親者一趠趠得方知懶融道恰恰用心時恰恰無心用曲談名相勞直説無繁重無心恰恰用常用恰恰無今説無心處不與有心殊不是誑人語答𠠇彥沖示諭應緣日涉差別境界未嘗不在佛法中又於日用動容之間以狗子無佛性話破除情塵若作如是工夫恐卒未得悟入請於腳跟下照顧差別境界從甚麼處起動容周旋之間如何以狗子無佛性話破除情塵能知破除情塵者又是阿誰佛不云乎衆生顛倒迷己逐物物本無自性迷己者自逐之耳境界本無差別迷己者自差別耳既日涉差別境界又在佛法中既在佛法中則非差別境界既在差別境界中則非佛法矣拈一放一有甚了期廣額屠兒在涅槃會上放下屠刀立地便成佛豈有許多忉忉怛怛來日用應緣處才覺涉差別境界時但只就差別處舉狗子無佛性話不用作破除想不用作情塵想不用作差別想不用作佛法想但只看狗子無佛性話但只舉個無字亦不用存心等悟若存心等悟則境界也差別佛法也差別情塵也差別狗子無佛性話也差別間斷處也差別無間斷處也差別遭情塵惑亂身心不安樂處也差別能知許多差別底亦差別若要除此病但只看個無字但只看廣額屠兒放下屠刀云我是千佛一數是實是虗若作虗實商量又打入差別境界上去也不如一刀兩段不得念後思前念後思前則又差別矣玄沙云此事限約不得心思路絶不因莊嚴本來真淨動用語笑隨處明了更無欠少今時人不悟個中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏睛隨有念起旋旋破除細想才生即便遏捺如此見解即是落空亡底外道魂不散底死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑左右來書云云盡是玄沙所訶底病寂照邪禪埋人底坑子不可不知也舉話時都不用作許多伎倆但行住坐臥處勿令間斷喜怒哀樂處莫生分別舉來舉去看來看去覺得沒理路沒滋味心頭熱悶時便是當人放身命處也記取記取莫見如此境界便退心如此境界正是成佛作祖底消息也而今默照邪師輩只以無言無説為極則喚作威音那畔事亦喚作空劫已前事不信有悟門以悟為誑以悟為第二頭以悟為方便語以悟為接引之詞如此之徒謾人自謾誤人自誤亦不可不知日用四威儀中涉差別境界覺得省力時便是得力處也得力處極省力若用一毫毛氣力支撑定是邪法非佛法也但辦取長遠心與狗子無佛性話廝崖崖來崖去心無所之忽然如睡夢覺如蓮花開如披雲見日到恁麼時自然成一片矣但日用七顛八倒處只看個無字莫管悟不悟徹不徹三世諸佛只是個無事人諸代祖師亦只是個無事人古德云但於事上通無事見色聞聲不用聾又古德云愚人除境不亡心智者亡心不除境於一切處無心則種種差別境界自無矣而今士大夫多是急性便要會禪於經教上及祖師言句中博量要説得分曉殊不知分曉處却是不分曉底事若透得個無字分曉不分曉不著問人矣老漢教士大夫放教鈍便是這個道理也作鈍榜狀元亦不惡只怕拖白耳一笑答宗直閣知迷不悟是大錯執迷待悟其錯益大何以故為不覺故迷執迷待悟乃不覺中又不覺迷中又迷決欲破此兩重關請一時放下著若放不下迷迷悟悟盡未來際何有休歇示黃伯成又云學此道未得個入頭處時覺得千難萬難聞宗師舉著愈覺難會蓋以取證求歇底心不除反被此作障礙此心才歇方知非難非易亦非師家可以傳授欲得將心待悟將心待休歇從腳下參到彌勒下生亦不能得悟亦不能得休歇轉加迷悶耳平田和尚曰神光不昧萬古徽猷入此門來莫存知解又古德曰此事不可以有心求不可以無心得不可以語言造不可以寂默通此是第一等入泥入水老婆説話往往參禪人只恁麼念過殊不子細看是甚道理若是個有筋骨底才聞舉著直下將金剛王寶劒一截截斷此四路葛藤則生死路頭亦斷凡聖路頭亦斷計較思量亦斷得失是非亦斷當人腳跟下淨裸裸赤灑灑沒可把豈不快哉豈不暢哉不見昔日灌溪和尚初參臨濟濟見來便下繩牀驀胸擒住灌溪便云領領濟知其已徹即便推出更無言句與之商量當恁麼時灌溪如何思量計較祗對得古來幸有如此榜樣如今人總不將為事只為粗心灌溪當初若有一點待悟待證待休歇底心在前時莫道被擒住便悟便是縛却手腳繞四天下拖一遭也不能得悟也不能得休歇答曾天遊示諭蚤歲知信向此道晚年為知解所障未有一悟入處欲知日夕體道方便既荷至誠不敢自外據欵結案葛藤少許只這求悟入底便是障道知解了也更別有甚麼知解為公作障畢竟喚甚麼作知解知解從何而至被障者復是阿誰只此一句顛倒有三自言為知解所障是一自言未悟甘作迷人是一更在迷中將心待悟是一只這三顛倒便是生死根本直須一念不生顛倒心絶方知無迷可破無悟可待無知解可障如人飲水冷暖自知久久自然不作這個見解也但就能知知解底心上看還障得也無能知知解底心上還有如許多般也無從上大智慧之士莫不皆以知解為儔侶以知解為方便於知解上行平等慈於知解上作諸佛事如龍得水似虎靠山終不以此為惱只為他識得知解起處既識得起處即此知解便是解脫之場便是出生死處既是解脫之場出生死處則知底解底當體寂滅知底解底既寂滅能知知解者不可不寂滅菩提涅槃真如佛性不可不寂滅更有何物可障更向何處求悟入答富季申定光大師妙道問雲門此心此性迷悟向背如何乞省要處指示雲門良久不答妙道再問雲門笑曰若論省要處則不可指示於人若可指示則不省要矣妙道曰豈無方便令學人趣向雲門曰若論方便則心無迷悟性無向背但人立迷悟見執向背解欲明此心見此性而此心此性即隨人顛倒錯亂流入邪途以故佛魔不辨邪正不分蓋不了此性此心之夢幻妄立二種之名言以向背迷悟為實認此心此性為真殊不知若實若不實若妄若非妄世間出世間但是假言説故淨名云法不可見聞覺知若行見聞覺知是則見聞覺知非求法也又古德云若取自己自心為究竟必有他物他人為對治又佛謂富樓那曰汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界我以妙明不滅不生合如來藏而如來藏惟妙覺明圓照法界如來藏即此心此性也而佛權指色空相傾相奪為非以妙明不滅不生為是此兩段是藥語治迷悟二病非佛定意也為破執迷悟心性向背為實法者之言耳不見金剛藏菩薩曰一切三世惟是言説一切諸法於言説中無有依處一切言説於諸法中亦無依處苟迷悟見亡向背解絶則此心洞明如皎日此性寬廓等虗空當人腳跟下放光動地照徹十方覩斯光者盡證無生法忍到恁麼時自然與此心此性默默相契方知昔本無迷今本無悟悟即迷迷即悟向即背背即向性即心心即性佛即魔魔即佛一道清淨平等無有平等不平等者皆吾心之常分非假於他術既得恁麼亦是不得已而言之不可便以為實若以為實則又是不識方便認定死語重增虗妄展轉惑亂無有了期到這裏無你用心處不若知是般事撥置一邊却轉頭來看馬大師即心即佛非心非佛不是心不是佛不是物趙州庭前柏樹子雲門須彌山大愚鋸解稱鎚嚴陽尊者土塊汾州莫妄想俱胝竪指頭畢竟是何道理此乃雲門方便也妙道思之示妙道禪人只這著忙底便是臘月三十日消息也如何是佛乾矢橛這裏不透與臘月三十日何異答呂隆禮示諭能行佛事而不解禪語能與不能無別無同但知能行者即是禪語會禪語而不能行佛事如人在水底坐呌渴飯籮裏坐呌飢何異當知禪語即佛事佛事即禪語能行能解在人不在法答樊茂實擔荷此段大事因緣須是有決定志若半信半疑則沒交涉矣古德云學道如鑽火逢煙未可休直待金星現歸家始到頭欲知到頭處自境界他境界一如是也示李獻臣又云趙州和尚云老僧十二時中除二時粥飯是雜用心餘無雜用心處此是這老和尚真實行履處不用作佛法禪道會無常迅速生死事大衆生界中順生死底事如麻似粟撥整了一番又一番到來若不把生死兩字貼在鼻尖兒上作對治則直待臘月三十日手忙腳亂如落湯螃蟹時方始知悔則遲也若要直截請從而今便截斷示聶寺丞欲學此道須是具決安信逢逆順境心不動搖方有趣向分佛言信能永滅煩惱本信能專向佛功德信於境界無所著遠離諸難得無難又云信能超出衆魔路示現無上解脫道如上所説教有明文佛豈欺人耶若半明半暗半信半不信則觸境遇緣心生疑惑乃是於境界心有所著不能於此道決定無疑滅煩惱本遠離諸難諸難者為無決定信被自己陰魔所撓若能一念緣起無生則不越此念即時超出魔路所謂魔路亦非他物乃是昧却此心於此心外妄生差別諸見而此心即隨差別妄念流轉故成就魔境若能直下信此心決定本來成佛頓忘諸見即此魔路便是當人出生死菩提路也示鄧子立道家者流全以妄想心想日精月華吞霞服氣尚能留形住世不被寒暑所侵況回此心此念全在般若中耶先聖明明有言喻如太末蟲處處能泊惟不能泊於火焰之上衆生心亦爾處處能緣惟不能緣於般若之上苟念念不退初心把自家心識緣世間塵勞底回來抵在般若上雖今生打未徹臨命終時定不為惡業所牽流落惡道來生出頭隨我今生願力定在般若中現成受用此是決定底事無可疑者答曾天遊臘月三十日到來恩愛也使不著勢力也使不著財寶也使不著性氣也使不著官職也使不著富貴也使不著眼光落地時惟有平昔造善造惡兩路境界一一現前作惡多作善少則隨惡業流浪將去作善多作惡少則隨善業生人天十善之家去既知得這兩路子皆屬虗幻然後發勇猛精進堅固不退之心決欲超情離見透脫生死臘月三十日善惡兩路拘執我不得示鄧兩府宅
