body:
  text: 六祖下第十六世臨安府徑山宗杲大慧普覺禪師語要下酬答法要之餘示諭自到城中著衣喫飯抱子弄孫色色仍舊既亡拘滯之情亦不作奇特之想宿習舊障亦稍輕微三復斯語歡喜踴躍此乃學佛之驗也儻非過量大人於一笑中百了千當則不能知吾家果有不傳之妙若不爾者疑怒二字法門盡未來際終不能壞使太虗空為雲門口草木瓦石皆發光明助說道理亦不奈何方信此段因緣不可傳不可學須是自證自悟自肯自休方始徹頭公今一笑頓亡所得夫復何言黃面老子曰不取衆生所言說一切有為虗妄事雖復不依言語道亦復不著無言說來書所說既亡拘滯之情亦不作奇特之想暗與黃面老子所言契合即是說者名為佛說離是說者即波旬說山野平昔有大誓願寧以此身代一切衆生受地獄苦終不以此口將佛法以為人情瞎一切人眼公既到恁麼田地自知此事不從人得但且仍舊更不須問大法明未明應機礙不礙若作是念則不仍舊矣承過夏後方可復出甚愜病僧意若更熱荒馳求不歇則不相當也前日見公歡喜之甚以故不敢說破恐傷言語今歡喜既定方敢指出此事極不容易須生慚愧始得往往利根上智者得之不費力遂生容易心便不修行多被目前境界奪將去作主宰不得日久月深迷而不返道力不能勝業力魔得其便定為魔所攝持臨命終時亦不得力千萬記取前日之語理則頓悟乘悟并銷事非頓除因次第盡行住坐臥切不可忘了其餘古人種種差別言句皆不可以為實然亦不可以為虗久久純熟自然默默契自本心矣不必別求殊勝奇特也此下舉水潦見馬祖鼓山見雪峰慧明大庾嶺見六祖三師悟緣具于三師章以三尊宿三段因緣較公於一笑中釋然優劣何如請自斷看還更別有奇特道理麼若更別有則却似不曾釋然也但知作佛莫愁佛不解語古來得道之士自己既充足推己之餘應機接物如明鏡當臺明珠在掌胡來胡現漢來漢現非著意也若著意則有實法與人矣公欲大法明應機無滯但且仍舊不必問人久久自點頭矣臨行面稟之語請書于座右此外別無說縱有說於公分上盡成剩語矣葛藤太多姑置是事答李漢老李又具書云邴比蒙誨答備悉深旨邴自有驗者三一事無逆順隨緣即應不留胸中二夙習濃厚不加排遣自爾輕微三古人公案舊所茫然時復瞥地此非自昧者前書大法未明之語蓋恐得少為足當擴而充之豈別求勝解耶淨除現流理則不無敢不銘佩師又答書云信後益增瞻仰不識日來隨緣放曠如意自在否四威儀中不為塵勞所勝否寤寐二邊得一如否於仍舊處無走作否於生死心不相續否但盡凡情別無聖解公既一笑豁開正眼消息頓亡得力不得力如人飲水冷暖自知矣然日用之間當依黃面老子所言刳其正性除其助因違其現業此乃了事漢無方便中真方便無修證中真修證無取捨中真取捨也古德云皮膚脫落盡惟一真實在又如栴檀繁柯脫落盡惟真栴檀在斯違現業除助因刳正性之極致也公試思之如此說話於了事漢分上大似一柄臘月扇子恐南地寒暄不常也少不得一笑師又與江少明書云承連日去與參政道話甚善甚善此公歇得馳求心得言語道斷心行處滅差別異路見古人腳手不被古人方便文字所羅籠山僧見渠如此所以更不曾與之說一字恐鈍置他直候渠將來自要與山僧說話方始共渠眉毛廝結理會在不只恁麼便休學道人若馳求心不歇縱與之眉毛廝結理會何益之有正是癡狂外邊走耳參政漢老也即日蒸溽不審燕處悠然放曠自如無諸魔撓否日用四威儀內與狗子無佛性話一如否於動靜二邊能不分別否夢與覺合否理與事會否心與境皆如否老龐云心如境亦如無實亦無虗有亦不管無亦不拘不是聖賢了事凡夫若真個作得個了事凡夫釋迦達磨是甚麼泥團土塊三乘十二分教是甚麼熱碗鳴聲公既於此個門中自信不疑不是小事要須生處放教熟熟處放教生始與此事少分相應耳往往士大夫多於不應有如字意中得個瞥地處却於如意中打失了不可不使公知在如意中須時時以不如意中時節在念切不可暫忘也但得本莫愁末但知作佛莫愁佛不解語這一著子得易守難切不可忽須教頭正尾正擴而充之然後推己之餘以及物答劉彥修昔楊文公大年三十歲見廣慧璉公除去礙膺之物自是已後在朝廷居田里始終一節不為功名所移不為富貴所奪亦非有意輕功名富貴道之所在法如是故也趙州云諸人被十二時使老僧使得十二時此老此說非是強為亦法如是故也大率為學為道一也而今學者往往以仁義禮智信為學以格物忠恕一以貫之之類為道只管如博謎子相似又如衆盲摸象各說異端釋不云乎以思惟心測度如來圓覺境界如取螢火燒須彌山臨生死禍福之際都不得力蓋由此也楊子云學者所以修性性即道也黃面老子云性成無上道圭峰云作有義事是惺悟心作無義事是狂亂心狂亂由情念臨終被梵牽惺悟不由情臨終能轉業所謂義者是義理之義非仁義之義而今看來這老子亦未免析虗空為兩處仁乃性之仁義乃性之義禮乃性之禮智乃性之智信乃性之信義理之義亦性也此句有脫文應云義理之義固性也仁義之義亦性也詳上下文可見作無義事即背此性作有義事即順此性然順背在人不在性也仁義禮智信在性不在人也人有賢愚性即無也若仁義禮智信在賢而不在愚則聖人之道有揀擇取捨矣如天降雨擇地而下矣所以云仁義禮智信在性而不在人也賢愚順背在人而不在性也楊子所謂修性性亦不可修亦順背賢愚而已圭峰所謂惺悟狂亂是也趙州所謂使得十二時被十二時使是也若識得仁義禮智信之性起處則格物忠恕一以貫之在其中矣肇法師云能天能人者豈天人之所能哉所以云為學為道一也答汪聖錫豫雖學佛者然愛君憂國之心與忠義士大夫等但力所不能而年運往矣喜正惡邪之志與生俱生永嘉所謂假使鐵輪頂上旋定慧圓明終不失豫雖不敏敢直下自信不疑示成機宜季恭又云博極羣書只要知聖人所用心處知得了自家心術即正心術正則種種雜毒種種邪說不相染汙矣又云學不至不是學學至而用不得不是學學不能化物不是學學到徹頭處文亦在其中武亦在其中事亦在其中理亦在其中忠義孝道乃至治身治人安國安之術無有不在其中者釋迦老子云常在於其中經行及坐臥便是這個消息也未有忠於君而不孝於親者未有孝於親而不忠於君者但聖人所讚者依而行之聖人所訶者不敢違犯則於忠於孝於事於理治身治人無不周旋無不明了為學為道一也為學則學未至於聖人而期於必至為道則求其放心於物我物我一如則道學雙備矣示莫潤甫又云在儒教則以正心術為先心術既正則造次顛沛無不與此道相契前所云為學為道一之義也在吾教則曰若能轉物即同如來在老氏則曰慈曰儉曰不敢為天下先能如是學不須求與此道合自然默默與之相投矣佛說一切法為度一切心我無一切心何用一切法當知讀經看教博極羣書以見月忘指得魚忘筌為第一義則不為文字語言所轉而能轉得語言文字矣士大夫不曾向佛乘中留心者往往以佛乘為空寂之教戀著個布袋子聞人說空說寂則生怕怖殊不知只這怕怖底心便是生死根本佛自有言不壞世間相而談實相又云是法住法位世間相常住寶藏論云寂兮寥兮寬兮廓兮上則有君下則有臣父子親其居尊卑異其位以是觀之吾佛之教密密助揚至尊聖化者亦多矣又何嘗只談空寂而已如俗謂李老君說長生之術正如硬差排佛談空寂之法無異老子之書原不曾說留形住世亦以清淨無為為自然歸宿之處自是不學佛老者以好惡以相誣謗爾不可不察也愚謂三教聖人立教雖異而其道同歸一致此萬古不易之義然雖如是無智人前莫說打你頭破額裂示張大尉既得外護者存心相照自可撥置人事頻與衲子輩作佛事久久自殊勝更望室中與之子細不得容人情不得共伊落草直似之以本分草料教伊自悟自得方是尊宿為人體裁也若是見伊遲疑不薦便與之下注腳非但瞎却他眼亦乃失却自家本分手段答圭和尚既已承當個事須卓卓地做教徹頭徹尾以平昔實證實悟底一著子端居丈室如擔百二十斤擔子從獨木橋上過腳蹉手跌則和自家性命不可保況復與人抽釘拔楔救濟他人耶古德云此事如八十翁翁入場屋豈是兒戲又古德云我若一向舉揚宗教法堂前草深一丈須倩人看院始得巖頭每云向未屙已前一便眼卓朔地晏國師不跨石門句睦州現成公案放你三十棒汾陽無業莫妄想魯祖凡見僧入門便轉身面壁而坐為人時當不昧這般體裁方不失從上宗旨耳答逮長老又云衲子到室中下刃要緊不得拖泥帶水如雪峰空禪師頃在雲居雲門相聚老漢知渠不自欺是個佛法中人故一味以本分鉗鎚似之後來自在別處打發大法既明向所受過底鉗鎚一時得受用方知妙喜不以佛法當人情去年送得一冊語録來造次顛沛不失臨濟宗旨今送在衆寮中與衲子輩看老漢因掇筆書其後特為發揚使本分衲子為將來說法之式若使老漢初為渠拖泥帶水說老婆禪眼開後定罵我無疑所以古人云我不重先師道德只重先師不為我說破若為我說破豈有今日便是這個道理也趙州云若教老僧隨伊根機接人自有三乘十二分教接他了也老僧這裏只以本分事接人若接不得自是學者根性遲鈍不干老僧事思之思之歸宗斬蛇南泉斬猫兒學語之流多謂之當機妙用亦謂之大用現前不存軌則殊不知總不是這般道理具超方眼舉起便知落處若大法不明打瓦鑽龜何時是了示李獻臣大珠和尚云心逐物為邪物從心為正雖則一期應病與藥未免垛生招箭而今未了底聞此語而不疑則大珠空費老婆心已了底聞此語而不疑則心與物俱是剩法畢竟如何不許夜行投明須到示空慧四則右一既有個趣向狗子無佛性話冷地裏慢提撕則個若道知是般事便休我說此人智眼未明在妙喜雖似平地起風雷然亦不出雪峰道底二五通仙人問佛佛有六通我有五通如何是那一通佛遂召五通仙人五通仙人應諾佛云那一通汝問我今時有一種弄泥團漢往往多在那一通處錯認定盤星三國師三喚侍者話瑞巖喚主人公話睦州擔板漢話投子漆桶話雪峰輥毬話風穴佛話這六個老古錐各缺悟在妙喜恁麼道大似掉棒打月旁觀看之不為分外四昔龐居士有言有男不婚有女不嫁大家團圞頭共說無生話後來元豐間有個士人謂之無為居士姓楊名傑字次公嘗參前輩於宗門中有真實得力處曾和龐公此偈云男大須婚女長須嫁討甚間工夫更說無生話這兩個俗漢子將他十方常住一片田地不向官中印契各自分疆列界道我知有而時時向無佛處稱尊當時亦有個不平底謂之海印信禪師時住蘇州定慧因見無為此偈亦有一偈曰我無男婚亦無女嫁困來便打眠管甚無生話這三個老漢說此三偈快然居士開眼也著合眼也著不開不合也著妙喜只得冷地看看則不無畢竟快然居士向開眼處著到耶合眼處著到耶不開不合處著到耶若在開眼處著到則落在龐公圈䙡裏在合眼處著到則落在楊無為圈䙡裏在不開不合處著到則落在海印禪師圈䙡裏快然見恁麼說定道總不恁麼若總不恁麼又落在妙喜圈䙡裏要出三老圈䙡則易要出妙喜圈䙡則難快然畢竟如何出得待歸延平嫁了女却緩緩地來為你說破因記得古德一偈并書其後庶幾快然不在中途躲根亦老婆心之切耳偈曰學道如鑽火逢烟未可休直待金星現歸家始到頭更有一個問頭且那裏是快然歸底家若透得這一問男婚女嫁都在裏許若未識得家且業識茫茫儘在外邊走亦怪妙喜不得示羅快然昔靈雲和尚因見桃花忽然悟道有偈曰三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至如今更不疑溈山和尚詰其所悟與之符契乃印可曰從緣悟道永無退失又雪峰和尚自作壽塔銘序曰夫從緣有者始終而成壞非從緣得者歷劫而常堅此二尊宿所見且道是一般是兩般若道是一般一人以從緣而得為是一人以從緣而得為非若道兩般不可二大老各立門戶疑惑後人咦鵝王擇乳素非鴨類知立禪人還知二大老落處麼若不知雲門直為你說破二由一有一亦莫守一心不生萬法無咎已上兩段不同收歸上科咄示知立禪人承夜夢焚香入山僧之室甚從容切不得作夢會須知是真入室不見舍利弗問須菩提夢中說六波羅蜜與覺時同別須菩提云此義幽深吾不能說此會有彌勒大士汝往彼問咄逗漏不少雪竇云當時若不放過隨後與一劄誰云彌勒誰是彌勒者便見氷消瓦解咄雪竇亦逗漏不少或有人問只如曾待制夜夢入雲門之室且道與覺時同別雲門即向他道誰是入室者誰是為入室者誰是作夢者誰是說夢者誰是不作夢會者誰是真入室者咄亦逗漏不少答曾天游石頭和尚云謹白參玄人光陰莫虗度這一句子開眼也著合眼也著忘懷也著管帶也著狂亂也著寂靜也著此是徑山如此差排想杜撰長老輩別有差排處也咄且置是事答劉彥冲古德云句能剗意意能剗句意句交馳是為可畏又云意中不停句句中不停意如招慶問羅山云巖頭和尚道恁麼恁麼不恁麼不恁麼意旨如何羅山遂喚大師招慶應諾山云雙明亦雙暗慶便作禮而去三日後復來問前日和尚意旨如何山云我盡情向汝道了也慶云大師是把火行山云若如是據你疑處問將來慶云如何是雙明亦雙暗山云同生亦同死慶又禮謝而去後有僧問羅山同生不同死時如何山云如牛無角又問同生亦同死時如何山云如虎帶角欲了從上來事當以此段因緣時時在念然不得著意穿鑿穿鑿即錯示黃伯成僧問趙州柏樹子還有佛性也無州云有僧云幾時成佛州云待虗空落地僧云虗空幾時落地州云待柏樹子成佛看此話不得作柏樹子不成佛想虗空不落地想畢竟如何虗空落地時柏樹子成佛柏樹子成佛時虗空落地定也思之示聶寺丞梁武帝問達磨朕造寺度僧不可勝數有何功德達磨曰無功德帝曰云何無功德達磨曰此但人天小果有漏之因如影之隨形雖有而非實曰如何是真功德答曰淨智妙圓體自空寂如是功德不以世求帝始問如何是聖諦第一義答曰廓然無聖曰對朕者誰答曰不識帝不契達磨遂渡江之魏如今要見真功德不用別求只向不識處薦取若透得此二字一生參學事畢示謝機宜吾佛大聖人能空一切相成萬法智而不能即滅定業況博地凡夫耶居士既是個中人想當亦入是三昧昔有僧問一老宿世界恁麼熱未審向甚麼處回避老宿曰向鑊湯罏炭裏回避曰只如鑊湯罏炭裏作麼生回避曰衆苦不能到願居士日用四威儀中只如此做工夫老宿之言不可忽此是妙喜得效底藥方非與居士此道相契此心相知亦不肯容易傳授只用一念相應草湯下更不用別湯使若用別湯便令人發狂不可不知也一念相應草不用他求亦只在居士四威儀中明處明如日黑處黑如漆若信手拈來以本地風光一照無有錯者亦能殺人亦能活人故佛祖常以此藥向鑊湯罏炭裏醫苦惱衆生生死大病號大醫王不識居士還信得及否若言我自有父子不傳之祕方不用向鑊湯罏炭裏回避底妙術却望居士布施也答劉季高示諭求一語與信道人做工夫既看圓覺經經中豈止一語而已哉諸大菩薩各隨自所疑處發問世尊據所疑一一分明剖析大段分曉前所給話頭亦在其中矣經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知此語最親切於無了知不辨真實老漢昔居雲門菴時嘗頌之曰荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛但將此頌放在上面却將經文移來下面頌却是經經却是頌試如此做工夫看莫管悟不悟心頭休熱忙亦不可放緩如調琴之法緊緩得其所則曲調自成矣答林少瞻室中垂示師云大凡參禪不必有機鋒便言我是昔雲蓋智和尚道眼明白因太守入山憩談空亭問如何是談空亭智云只是個談空亭太守不喜遂舉問本慕顧本云只將亭說法何用口談空太守乃喜遷本住雲蓋若以本較智則大遠乃知真實事不可以機鋒取寶峰元首座亦有道之士答話機鋒鈍覺範號元為五斗蓋開口取氣炊得五斗米熟方答得一轉語武庫又云師在寶峯時元首座極見喜師嘗乞假訪李商老歸元見遽云噁野了也無常迅速師不覺汗下可見其人矣今時人只解順顛倒不解順正理如何是佛云即心是佛却以為尋常及至問如何是佛云燈籠緣壁上天台便道是奇特豈不是順顛倒嚴陽尊者見趙州有僧問如何是佛云土塊如何是法云地動也如何是僧云喫粥喫飯問如何是新興水云前面江裏師云似這般法門恰似兒戲相似入得這般法門方安樂得人如真淨和尚拈提古今不在雪竇之下而末流傳習却成惡口小家只管問古人作麼生真如又如何下語楊岐又如何下語你管得許多間事瘥病不假驢駝藥若是對病與藥籬根下拾得一莖草便可療病說甚麼朱砂附子人參白术師一日云我這裏無逐日長進底禪遂彈指一下云若會去便罷參乃云今時一般宗師為人入室三五遍辨白他不出却教他說悟處更問你見處如何學人云某見處說不得却云你說不得我如何見得你去若恁麼地如何為人不見泉大道到慈明明云片雲橫谷口遊人何處來泉云夜間何處火燒出古人墳明云未在更道泉便作虎聲明便打一坐具泉推明向禪牀上明却作虎聲泉云我見八十四人善知識惟師繼得臨濟宗風看他恁麼問答數句子那裏便是見他處須是如此始得山僧待人志誠須是資質是始得此是一超直入如來地參禪須是直心直行直言直語心言直故始終地位中間永無諸委曲相祖師西來直指人心見性成佛僧問雲門如何是佛門云乾矢橛擬議思量已曲了也何況脫空耶今時兄弟知見情解多須要記間言長語來這裏答大似手中握無價摩尼寶珠被人問你手中是甚麼却放下拈起一個土塊可煞癡若恁麼參到驢年也不省我這裏無法與人祇是據款結案恰如將個琉璃瓶子來護惜如什麼我一見便為你打破你又將得摩尼珠來我又奪了見你恁地來我又和你兩手截了所以臨濟和尚道逢佛殺佛逢祖殺祖逢羅漢殺羅漢你且道既稱善知識為甚麼却要殺人你且看他是什麼道理而今兄弟做工夫不省這個過在何處只為要去明他且如恁麼也不得不恁麼也不得恁麼不恁麼總不得作麼生是你將一轉語便去明得麼永明他不得古人忒煞直截你不肯去直截處行祇為分明極翻令所得遲師云我平生好罵人因看玄沙語録大喜他勘靈雲道諦當甚諦當敢保老兄未徹在可謂壁立萬仞後來與靈雲說話了却云你恁麼方始是徹後頭却恁麼撒矢撒尿却問圓悟如何悟笑云他後頭却恁麼地我也理會不得遂下來歸到寮方知玄沙大段作怪遂舉似圓悟悟笑云且喜你知晦堂云今時諸方多是無此藥頭師云切忌外人聞此粗言菩薩人眼見佛性須是眼見始得普說錢計議請普說師云法不可見聞覺知若行見聞覺知是則見聞覺知非求法也既離見聞覺知外却喚甚麼作法到這裏如人飲水冷暖自知除非親證親悟方可見得若實曾證悟底人拈起一絲毫頭盡大地一時明得今時不但禪和子便是士大夫聰明靈利博極羣書底人個個有兩般病若不著意便是忘懷忘懷則墮在黑山下鬼窟裏教中謂之昏沉著意則心識紛飛一念續一念前念未止後念相續教中謂之掉舉不知有人人腳跟下不沉不掉底一段大事因緣如天普蓋似地普擎未有世界先有此段大事因緣世界壞時此段大事因緣不會動著一絲毫頭往往士大夫多是掉舉而今諸方有一般默照邪禪見士大夫為塵勞所障方寸不寧怗便教他寒灰枯木去一條白練去古廟香罏去冷湫湫地去將這個休歇人你道還休歇得麼殊不知這個猢孫子不死如何休歇得來為先鋒去為殿後底不死如何休歇得此風往年福建路極盛妙喜紹興初入閩住菴時便力排之謂之斷佛慧命千佛出世不通懺悔彼中有個士人鄭尚明極聰明教乘也理會得道藏也理會得儒教則故是也一日持一片香來妙喜室中怒氣可掬聲色俱厲曰昂有一片香未燒在欲與和尚理會一件事只如默然無言是法門中第一等休歇處和尚肆意詆訶昂心疑和尚不到這田地所以信不及且如釋迦老子在摩竭提國三七日中掩室不作聲豈不是佛默然毗耶離城三十二菩薩各說不二法門末後維摩詰無語文殊讚善豈不是菩薩默然須菩提在巖中宴坐無言無說豈不是聲聞默然天帝釋見須菩提在巖中宴坐乃雨花供養亦無言豈不是凡夫默然達磨遊梁歷魏少林冷坐九年豈不是祖師默然魯祖見僧便面壁豈不是宗師默然和尚因甚麼却力排默照以為邪非妙喜曰尚明你問得我也是待我與你說我若說不行却燒一炷香禮你三拜我若說得行却受你燒香禮拜我也不與你說釋迦老子及先德言句我即就你屋裏說所謂借婆帔子拜婆年乃問你曾讀莊子麼曰是何不讀妙喜曰莊子云言而足終日言而盡道言而不足終日言而盡物道物之極言默不足以載非言非默義有所極我也不曾看郭象解并諸家注解只據我杜撰說破你這默然豈不見孔夫子一日大驚小怪曰參乎吾道一以貫之曾子曰唯你措大家才聞個唯字便來這裏惡口却云這一唯與天地同根萬物一體致君於堯舜之上成家立國出將入相以至啓手足時不出這一唯且喜沒交涉殊不知這個道理便是曾子言而足孔子言而足其徒不會却問曰何謂也曾子見他理會不得却向第二頭答他話謂夫子之道不可無言所以云夫子之道忠恕而已矣要之道與物至極處不在言語上不在默然處言也載不得默也載不得公之所說尚不契莊子意何況要契釋迦老子達磨大師意耶你要理會得莊子非言非默義有所極麼便是雲門大師拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾你若會得雲門這個說話便是莊子說底曾子說底孔子說底一般渠遂不作聲妙喜曰你雖不語心未伏在然古人決定不在默然處坐地明矣你適來舉釋迦掩室維摩默然且看舊時有個座主喚作肇法師把那無言說處說出來與人云釋迦掩室於摩竭淨名杜口于毗耶須菩提唱無說以顯道釋梵絶聽而雨花斯皆理為神御故口以之而默豈曰無辨辨所不能言也這個道理與神忽然相撞著不覺到說不得處雖然不語其聲如雷故曰豈曰無辨蓋辨所不能言也這裏世間聰明辨才用一點不得到得恁麼田地方始是放身捨命處這般境界須是當人自證自悟始得所以華嚴經云如來宮殿無有邊自然覺者處其中此是從上諸聖大解脫法門無邊無量無得無失無默無語無去無來塵塵爾剎剎爾念念爾法法爾只為衆生根性狹劣不到三教聖人境界所以分彼分此殊不知境界如此廣大云向黑山下鬼窟裏默然坐地故先聖訶為解脫深坑是可怖畏之處以神通道眼觀之則是刀山劒樹鑊湯罏炭裏坐地一般座主家向不滯在默然處況祖師門下客却道才開口便落今時且喜沒交涉尚明不覺作禮妙喜曰公雖作禮然更有事在至晚間來入室乃問他今年幾歲曰六十四又問你六十四年前從甚麼處來渠開口不得被我將竹篦劈脊打出去次日又來室中曰六十四年前尚未有昂在如何和尚却問昂從甚麼處來妙喜曰你六十四年前不可元在福州鄭家只今這聽法說法一段歷歷孤明底未生已前畢竟在甚麼處曰不知妙喜曰你若不知便是生大今生且限百歲百歲後你待飛出三千大千世界外去須是與他入棺材始得當爾之時四大五蘊一時解散有眼不見物有耳不聞聲有個肉團心分別不行有個身火燒刀斫都不覺痛到這裏歷歷孤明底却向甚麼處去曰昂也不知妙喜曰你既不知便是死大故曰無常迅速生死事大便是這個道理這裏使聰明也不得記持也不得我更問你平生做許多之乎者也臘月三十日將那一句敵他生死須是知得生來死去處分曉始得若不知即是愚人渠方心伏從此遂救他不坐在無言無說處肯來這下做工夫答曾天游云老龐云但願空諸所有切勿實諸所無只了得這兩句一生參學事畢今時有一種剃頭外道自眼不明只管教人死獦狚地休去歇去若如此休歇到千佛出世也休歇不得轉使心頭迷悶耳又教人隨緣管帶忘情默照照來照去帶來帶去轉加迷悶無有了期殊失祖師方便錯指示人教人一向虗生浪死更教人是事莫管但只恁麼歇去歇這來情念不生到恁麼時不是冥然無知直是惺惺歷歷這般底更是毒害瞎却人眼又云教人管帶此是守目前鑑覺而生解者教人硬休去歇去此是守忘懷空寂而生解者歇到無覺無知如土木瓦石相似當恁麼時不是冥然無知又是錯認方便解縛語而生解者教人隨緣照顧莫教惡覺現前遮個又是認著髑髏情識而生解者教人但放曠任其自在莫管生心動念念起念滅本無實體若執為實即生死心生矣遮個又是守自然體為究竟法而生解者如上諸病非干學人之事皆由瞎眼宗師錯指示耳答劉彥修云臘月三十日作麼生折合去不可眼光欲落未落時向閻家老子道待我澄神定慮少時却去相見答張安國云或以無言無說坐在黑山鬼窟裏閉眉合眼謂之威音那畔父母未生時消息亦謂之默而常照為禪者如此等輩不求妙悟以悟為落在第二頭以悟為誑唬人以悟為建立自既不會悟亦不信有悟底妙喜嘗為衲子輩說世間工巧伎藝若無悟處尚不得其妙況欲脫生死答榮茂實云有一種唱邪說為宗師者謂學者曰但只管守靜不知守者是何物靜者是何人却言靜底是基本却不信有悟底謂悟底是枝葉更引僧問仰山曰今時人還假悟也無仰山曰悟則不無爭奈落在第二頭癡人面前不得說夢便作實法會謂悟是第二頭殊不知溈山自有警覺學者之言直是痛切曰研窮至理以悟為則此語又向甚處著不可溈山疑誤後人要教落在第二頭也黃德用請普說德用黃端夫子端夫初懇吳元昭撰疏乞分楊岐一枝至其家庵開法師遣彌光應其請時端夫卒德用昆仲請師普說德用昆仲特詣當菴揮金辦供命山僧普說舉揚宗旨以答諸聖加被之恩且喚甚麼作宗旨宗旨又如何舉揚近代佛法可傷邪師說法如恆河沙各立門風各設奇特逐旋揑合疑誤後昆不可勝數參禪者既不具擇法眼為師者又道眼不明以至如是雲門初與元昭不相識頃在江西見渠跋所施華嚴梵行品自言於梵行品有悟入處不疑天下老師舌頭那時已得其要領即與兄弟說此人只悟得個無梵行而已已被邪師印破面門了也雲居若見須盡力救他及乎在長樂相見便來咨問入室即時將渠悟入處兩句斷了曰公所悟者永嘉所謂豁達空撥因果莽莽蕩蕩招殃禍耳更為渠引梵行品中錯證據處曰於身無所取於修無所著於法無所住過去已滅未來未至現在空寂無作業者無受報者此世不移動彼世不改變此中何法名為梵行梵行從何處來誰之所有體為是誰由誰而作為是有為是無為是色為非色為是受為非受為是想為非想為是行為非行為是識為非識如是觀察梵行法不可得故若依此引證謂無梵行是真梵行則是謗大般若入地獄如箭射更為渠說而今諸方邪師輩各各自言得無上菩提各說異端欺胡謾漢將古人入道因緣妄生穿鑿或者以良久默然無言無說為空劫已前事教人休去歇去歇教如土木瓦石相似去又怕人道坐在黑山下鬼窟裏隨後便引祖師語證據云了了常知故言之不可及歇得如土木瓦石相似時不是冥然無知直是惺惺歷歷行住坐臥時時管帶但只如此修行久久自契本心矣或者以脫去情塵不立窠臼為門戶凡古人公案舉了早會了也或師家問不是心不是佛不是物你作麼生會便云和尚不妨惺惺或云和尚甚麼處去來或云不可矢上更加尖或云謾却多少人或再舉一遍云不是心不是佛不是物凡問他古人因緣皆向舉起處承當擊石火閃電光處會舉了便會了凡有所問皆不受喚作脫灑自在得大快樂或者以三界惟心萬法惟識為主牽引一類古人相似處作證明以眼見耳聞為得力處凡通入處未有不由見物而悟者未有不由聞聲而悟者凡有施設倣效古人相似處有人問話只粘定學家問頭便答謂之言下合無生正如福州人聯麻相似喚作綿密不落情塵如僧問古德如何出得三界去云把將三界來為你出或云喚甚麼作三界或云會得這僧問頭出三界也不難如僧問法眼如何是曹源一滴水答云是曹源一滴水慧超咨和尚如何是佛答云汝是慧超引如此之類作證乃全是全不是又如論藥山夜間示衆云我有一句子待特牛生兒即向汝道有僧出衆云特牛已生兒也自是和尚不道藥山云點燈來其僧便歸衆後來法燈出語云且道生底是牯牛是牸牛自代云雙生也商量時亦作言下合無生會藥山云我有一句子待特牛生兒便是道了也所以這僧領得便出來道特牛已生兒也自是和尚不道直是綿密不露鋒鋩法燈微云且道生底是牸牛是牯牛又自代云雙生也亦只作言下合無生會云他自問牯牛牸牛乃自代云雙生也更無少剩佛眼也覷不見將此等語作以的破的不露鋒鋩不費氣力會又如古人指一片石問學者云此一片石在心內在心外答云在心內古德云你著甚死急心內著一片石衆中商量云不合以內外答他若以內外答則法有少剩矣出語云大好一片石或云痛領一問或云喚甚麼作一片石成云諾諾或云在法堂前或云謝師指示或云和尚還識羞麼或云鈍置殺人凡答如此話只以一句包却謂之綿密謂之不走作如此之見叢林甚多或者謂一切語言總不干事凡舉覺時先大瞪却眼如小兒患天弔見神見鬼一般只於瞪眉努眼處領略更錯引古人言句證據曰舉不顧即差互擬思量何劫悟舉時須要以眼顧視只是以古人言句提撕一遍喚作不在言句上如柏樹子洗鉢盂麻三斤之類若過得一個時餘者撥牌子過更不費力如此之類此擊石火閃電光底只添得個瞪眉努眼而已亦各各自謂得祖師巴鼻莫謗他古人好如舉僧問雲門如何是透法身句門云北斗裏藏身你作麼生會學者即大瞪却眼云北斗裏藏身師家或權為沮抑學者又連呌數聲云北斗裏藏身北斗裏藏身以為把得定作得主不受轉換師家奈何不下亦喚作實頭方始問其意旨如何遂下語云佛眼也覷不見或云舉頭天外看或問如何是祖師西來意庭前柏樹子即下語云一枝南一枝北或云能為萬象主不逐四時凋已上盡在瞪眉努眼提撕處然後下合頭語以為奇特癡漢不可瞪眉努眼時便有禪不瞪眉努眼時便無禪也不可提撕時便有禪不提撕時便無禪也或者見雲門如此說便又錯會云提撕時也是不提撕時也是更無兩般似這般底更是救不得或者都不理會才說著佛法說著悟處便是發狂更錯引古人言句云本無迷悟人只要今日了凡古人因緣謂之設權亦謂之建立實頭底只在不作佛法商量處凡有問答一一具實祇對平常無事天是天地是地露柱是木頭金剛是泥塑饑來喫飯困來打眠更有何事豈不見真淨和尚云莫將無事會無事困人心往往中無事毒者却以此言為非或者見古人公案不可以理路商量處便著一轉沒交涉底語一應應過謂之玄妙亦謂之不涉義路亦謂之當機透脫如僧問趙州萬法歸一一歸何所州云我在青州作一領布衫重七斤之類多少人錯商量云這僧致得個問頭奇特不是趙州有出身之路便奈何不得云萬法歸一一更無所歸若有所歸即有實法所以趙州識得破當機妙用一應應過云我在青州作一領布衫重七斤多少奇特或者商量道萬法歸一一歸何所一若無所歸即落空去所以趙州道我在青州作一領布衫重七斤趙州遮一轉語直是奇特不落有無答得甚妙或者謂雲門如此說只是怕人執著若不執著便是祖師心要只要得是事不著自由自在非離真而立處立處即真更有甚麼事或問他父母未生時如何是你本來面目便云無侍者祇對和尚將個業識作本命元辰如此之流盡是癡狂外邊走又有一般底自知道眼不明禪不取信於人無以開示學者自來又不曾聽教旋於座主處作短販逴得一言半句狐媚聾俗臨濟和尚曰有一般瞎禿兵向教乘中取意度商量成於句義如將屎塊子口中含了却吐與別人直是叵耐元昭初見如此說心中雖疑口頭甚硬尚對山僧冷笑當晚來室中只問渠個狗子無佛性話便去不得方始知道參禪要悟在長樂住十日二十遍到室中呈盡伎倆奈何不得方始著忙山僧實向渠道不須呈伎倆直須啐地折嚗地斷方敵得生死呈伎倆有甚了期仍向渠道不須著忙今生參不得後世參遂乃相信便辭去隔十餘日忽然寄書來并頌古十首皆山僧室中問渠底因緣書中云在延平路上驀然有省某終不敢自謾方信此事不從人得其中一首曰不是心不是佛不是物通身一串金鎖骨趙州參見老南泉解道鎮州出蘿蔔山僧甚是疑著時光禪便問據此頌還了得生死否雲門向渠道了得了不得却請問取元昭去比得光禪書云學士相見盡如和尚所說大衆且道說個甚麼咦疑殺天下人具眼者辨取今時參禪者不問了得生死了不得生死只求速效且要會禪無有一個不說道理如檀越執事見其愛說道理遂將個沒道理底因緣與渠看僧問雲門如何是佛門云乾矢橛又恐渠作道理會先與渠說不得云道在矢溺道在稊稗道在瓦礫即色明心附物顯理不得道處處真塵塵盡是本來人之類渠看此語奈何不下用盡氣力去看終看不破忽然一日省得此事不可以道理通便道我有個悟處遂連作數頌來呈見解一曰大虗寥廓強為名任是僧繇畫不成何用尋源問端的都無一法可當情又曰到家豈復說塗程萬木春來自向榮若遇上流相借問扶桑東畔日輪生又曰𦏰羊過後絶追尋妙訣空傳在少林間把無絃彈一曲清風明月兩知音又曰撒手懸崖信不虗根塵頓盡更無餘始知佛法無多子向外馳求轉見疏山僧向渠道作得頌也好說得道理也是只是去道轉遠渠不甘又作一頌曰切忌談玄說妙那堪隨聲逐色和遮一橛掃除大家都無見識又有書來云看此話直得言悟道斷心行處滅無言可說無理可伸不起纖毫修學心百不知百不會不涉思惟不入理路直是安樂山僧又向渠道這個是出格底道理若是乾矢橛話如此說得落時如鋸解稱鎚麻三斤狗子無佛性一口吸盡西江水不是心不是佛不是物有句無句如藤倚樹即心即佛話皆可如此說得也既不可如此須是悟始得悟則事同一家不悟則萬別千差差之毫釐失之千里切須子細從教人道雲門待檀越無禮但心不負人面無慙色渠見山僧如此至誠相告方知佛法無人情乃相信既相信只教看如何是佛乾矢橛亦只要得渠啐地折曝地斷若以渠作從官捨財創庵置莊田供衆乃至供養山僧之故便以為是則盡大地窮漢更無參禪分也非但失却善知識辨人眼亦乃賺他百劫千生不是小事今夏更有數人衲子不肯向省力處做工夫只管熱忙亦來呈見解作頌古雲門向他道不是這個道理便道把定他不肯放過我且問你你還自放得過也未趙州云諸方難見易識我這裏易見難識雲門尋常問學者喚作竹篦則觸不喚作竹篦則背不得下語不得無語十個有五雙眼𭽯地縱有作聰明呈見解者盡力道得個領字或來手中奪却竹篦或拂袖便行自餘邪解不可勝數更無一個皮下有血古德云此事如八十翁翁入場屋不是小兒戲若可揑合得時揑合千千萬萬了也既不可揑合須是悟始得此外別無道理若你實有悟處師家故言不是亦招因果不小今日因齊慶讚舉似大衆蓋黃端夫知有雲門始因元昭光禪往彼住庵亦因元昭端夫二子今日設齊請山僧普說亦因元昭雲門打這一場葛藤亦因元昭既然如是且道元昭畢竟事作麼生良久云待渠冬間親到雲門那時始與諸人說破拍禪牀下座秦國夫人請普說夫人計氏法真張魏公浚母也少寡居屏居紛華蔬食禮誦師遣謙禪過魏公公因請謙為夫人指示夫人問曰徑山和尚尋常如何為人謙因舉師教人看狗子無佛性及竹篦子話并述不得向舉起處承當等語且令暫輟禮誦專意看話得透話頭則禮誦皆妙用夫人遂諦信一日忽洞然因自述語緣及數偈呈師偈有曰逐日看經文如逢舊識人勿言頻有礙一舉一回新師見而肯之以誕辰請師普說章首問答敘事不録今日是秦國夫人計氏誕辰謙禪昨日上來告山僧子細說些禪病且與秦國結大衆般若緣山僧向他道禪有甚麼病可說禪又不曾患頭疼又不曾患腳痛又不曾患耳聾又不曾患眼暗只是參禪底人參得差別證得差別用心差別依師差別因此差別故說名為病非謂禪有病也如何是佛即心是佛有甚麼病狗子還有佛性也無無有甚麼病喚作竹篦則觸不喚作竹篦則背有甚麼病如何是佛麻三斤有甚麼病如何是佛乾矢橛有甚麼病你不透了才作道理要透便千里萬里沒交涉也擬心湊泊他擬心思量他向舉起處領略擊石火閃電光處會這個方始是病世醫拱手然究竟不干禪事趙州云要與空王為弟子莫教心病最難醫記得舍利弗問月上女曰汝於今者行何乘也為行聲聞乘為行辟支佛乘為行大乘月上女答曰舍利弗汝既問我行何乘者我今還問舍利弗惟願隨意答我如舍利弗所證法者為行聲聞乘為行辟支佛乘為行大乘舍利弗言非也月上女所以者何然彼法者無可分別亦無言說非別非一亦非衆多月上女曰舍利弗是故不應分別諸法一相異相無別異相於諸相中無有可住師云舍利弗恁麼問月上女恁麼答且道與秦國太夫人所證之法相去幾何還有人斷得麼試出來斷看如無且向葛藤裏薦取所以道參學者須參活句莫參死句活句下薦得永劫不忘死句下薦得自救不了你諸人每日上來下去寮舍裏喫茶喫湯莊上搬鹽搬麵僧堂裏行益長廊下擇菜後園裏擔矢磨坊下推磨當恁麼時佛眼也覷你不見且道是死句是活句是不死不活句試定當看直饒定當得出也未免在三句裏豈不見僧問南泉和尚即心是佛又不得非心非佛又不得師意如何泉云你但信即心即佛便了更說甚麼得與不得只如大德喫飯了從東廊上西廊下不可總問人得與不得也這裏若識得南泉方不被三句所使便能使得三句既使得三句始與南泉同一眼見同一耳聞同一鼻嗅同一舌嘗同一身觸同一意思更無差別只為你執藥為病舊病未除新病復作却被死句活句使得來七顛八倒將他古人徑截處一時紆曲了且那個是古人徑截處我更為你舉一兩則只如南泉道牽牛向溪東放不免食他國王水草牽牛向溪西放不免食他國王水草不如隨分納些些總不見得這個公案有多少人錯斷如何是納些些底道理便道著衣喫飯有甚麼難向驢前馬後作活計且莫謗他南泉好你既錯會這個定又錯會黃檗道汝等諸人盡是噇酒糟漢恁麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生檗云不道無禪只是無師這個話頭便是個禍胎莫道未悟者錯會直饒悟得徹頭徹尾大法不明也覷他黃檗不見只如黃檗道不道無禪只是無師你如何理會衆中商量道人人分上誰不丈夫豈假師承噇酒糟便是咬言語言語乃古人糟粕也且喜沒交涉欲得不招無間業莫謗如來正法輪豈不見溈山舉此話問仰山云黃檗意作麼生仰山云鵝王擇乳素非鴨類溈山云此實難辨只如溈山仰山恁麼問答又作麼生商量到這裏須是個人始得既不會這個定將庭前柏樹子麻三斤乾矢橛鋸解稱鎚之類盡為槽粕既錯會這個定又錯會洞山問蟾首座佛真法身猶若虗空應物現形如水中月作麼生說個應底道理蟾云如驢覷井山云道則太煞道只道得八成蟾云和尚作麼生山云如井覷驢諸方商量道如驢覷井是有迹如井覷驢是無迹又喚作亡情拂迹且喜沒交涉要且不是這個道理既錯會這個定又錯會南嶽和尚道譬牛駕車車若不行打車即是打牛即是馬祖聞舉豁然大悟而今禪和家理會道牛喻心車喻法但只明心法自明矣但只打牛車自行矣且喜沒交涉若恁麼馬祖驢年也不能得悟去這老漢始初將謂佛可以坐得成禪可以坐得悟一向坐地等南嶽和尚知其不凡故將磚去他庵前磨祖云和尚磨磚作甚麼南嶽云磨作鏡祖云磨磚豈得成鏡南嶽云磨磚既不成鏡坐禪豈得成佛馬祖被他動一動心中熱忙便問如何即是只這裏鼻孔索頭便在南嶽和尚手裏了也所以道欲識佛性義當觀時節因緣南嶽和尚知他時節已至即向他道汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理一時籍沒了他家計却更要他納物事教他無所從出始肯捨命討個死處命既捨了便解問如何用心即合無相三昧南嶽云汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見南嶽云心地法眼能見乎道無相三昧亦復然矣祖云有成壞否南嶽云若以成壞聚散而見道者非也馬祖於是泮然無疑所謂不入虎穴不得虎子悟了若不遇人十個有五雙杜撰決定為人不得諸人要識悟了遇人者麼只這馬祖便是樣子也馬祖既得法直往江西建立宗旨一日南嶽和尚曰道一在江西說法總不見持個消息來遂囑一僧曰汝去待他上堂便問作麼生看他道甚麼記取來其僧依教去見上堂便出問作麼生祖云自從胡亂後三十年不曾少鹽醬師召大衆云祖師門下穿人鼻孔底盡從這一句子來你道這一句子從甚麼處來從打牛打車處來你若會得這個便會得臺山路上婆子每有僧問臺山路向甚麼處去婆云驀直去僧才行婆云好個阿師却恁麼去趙州聞得云待我去勘過這婆子趙州去見婆子亦如是問婆子亦如是答歸來謂衆曰臺山路上婆子被老僧勘破了也諸人還會麼寰中天子敕塞下將軍令但恁麼看取山僧昔年理會不得曾請益一杜撰長老為山僧注解云這僧才問臺山路向甚麼處去便被婆子勘破了也婆云驀直去僧便行正是隨聲逐色如何不被勘破又道才開口便勘破了也今日思量直是叵耐山僧為你說破若會得趙州道臺山路上婆子被老僧勘破了也便會婆子道好個阿師却恁麼去山僧嘗頌云天下禪和說勘破爭知趙州已話墮引得兒孫不丈夫人人點過冷地臥此頌甚分明切不得錯會既錯會這個定又錯會睦州喚僧大德僧回首州云擔板漢曾有個禪頭舉這話問僧你作麼生會才見僧開口便云果然擔板且喜沒交涉雪竇拈云睦州只具一隻眼這僧喚既回頭因甚却成擔板晦堂云雪竇亦只具一隻眼這僧一喚便回為甚不成擔板這兩個老漢可與睦州把手共行若是個靈利漢才聞舉著眼似銅鈴終不向這裏打之繞既不會這個定又錯會百丈野狐話便道不落也是不昧也是只是當時答此話不合帶疑所以墮野狐謂野狐性多疑故且喜沒交涉既錯無這個定又錯會祖師云不是風動不是幡動仁者心動山僧亦曾請益一個長老意旨如何長老將衫袖搖作風動勢云是甚麼苦哉苦哉慚惶殺人鈍置殺人有者道不是風動不是幡動定是心動山僧尋常問學者不是風動不是幡動不是心動作麼生這裏豈容眨眼既錯會這個定又錯會文殊是七佛之師為甚麼出女子定不得罔明菩薩為甚麼出得女子定衆中商量道杓柄在女子手裏且喜沒交涉既錯會這個定又錯會雪峰道望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也如今諸方商量道作麼生是望州亭相見處便道南頭買賤北頭賣貴烏石嶺相見意旨如何便道石頭大底大小底小僧堂前相見又作麼生便道歸堂喫茶去且喜沒交涉自餘邪解不可勝數山僧尋常亦問學者望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也作麼生這個便是金剛圈栗棘蓬你如何吞如何透你要識能吞能透底麼豈不見保福問鵝湖僧堂前且置望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈保福便入僧堂汾陽和尚頌曰望州烏石與堂前相見相知幾萬千惟有鵝湖并保福此時相見解推遷此頌分明為你說了也既不會這個定又錯會玄沙道諸方總道接物利生或遇三種病人來合作麼生接患盲者拈槌竪拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得若接此人不得佛法無靈驗師顧視大衆云要識玄沙麼平生心膽向人傾相識還如不相識當時地藏和尚在座下便出來道某甲有口不啞有眼不盲有耳不聾和尚作麼生接師云非父不生其子玄沙呵呵大笑師云笑裏有刀山僧有時舉此話問學者有來依樣畫葫蘆也道某甲有口有耳有眼和尚作麼生接山僧向他道咬人矢橛不是好狗又却去不得既錯會這個定又錯會香嚴道如人上樹口銜樹枝手不攀枝腳不踏樹樹下有人問西來意不對則違他所問若對又喪身失命師云好與玄沙一坑埋却山僧昔年曾請益一個尊宿未審香嚴意旨如何遂以拂子柄銜在口中緊閉却眼便作銜樹枝勢搖手擺腳祇對山僧師乃彈指云如此者亦是當年馳聲走譽底尚作這般去就其餘作怪不在言也你要會麼但只作一句看我先為你說莫見道作一句看便向舉起處會舉了便會了且不是這個道理是甚麼道理如人上樹口銜樹枝手不攀枝腳不踏樹樹下有人問西來意不對則違他所問若對又喪身失命如何這裏間不容髮當時香嚴會中只有個虎頭上座領得香嚴意便出來為香嚴出氣云上樹即不問未上樹請和尚道師云雖得一場榮刖却一雙足香嚴呵呵大笑師云鐵作面皮又云回天輪轉地軸後來雪竇拈云樹上道即易樹下道即難老僧上樹也致將一問來雪竇雖為虎頭上座出氣爭奈蹉過香嚴今時有般繆漢聞雪竇恁麼道便引洞山語云但能不觸當今諱也勝前朝斷舌才謂香嚴立此問頭喻如一團火相似不可相觸雖然如此不可斷却言句有問如何是佛麻三斤如何是祖師西來意庭前柏樹子又且何妨你不妨會得好不見汾陽和尚頌曰香嚴銜樹示多人要引同袍達本真師云依實供通擬議却從言下覓喪身失命數如塵師云不是苦心人不知汾陽為你開天路雲散長空月色新師云間言語雖然如是若向這裏提得一生參學事畢既提不得定又錯會百丈問溈山五峰雲巖云併却咽喉唇吻作麼生道溈山云却請和尚道百丈云我不辭向汝道恐已後喪我兒孫五峰云和尚也須併却百丈云無人處斫額望汝雲巖云和尚有也未百丈云喪我兒孫衆中商量道百丈大似抱贓呌屈掩耳偷鈴三子恁麼祇對大家走入荒草裏且喜沒交涉向你道此事決定不在言語上既不在言語上當恁麼時合作麼生我早是與你說了也既錯會這個定又錯會德山道今夜不答話問話者三十棒時有僧出禮拜德山便打僧云某甲話也未問為甚打某甲山云你是甚處人僧云新羅人山云未踏船舷好與三十棒後來法眼云大小德山話作兩橛圓明云大小德山龍頭蛇尾雪竇拈云二老宿雖善裁長補短捨重從輕要見德山亦未可何故德山大似握閫外威權有當斷不斷不招其亂底劍要識新羅僧麼只是撞著露柱底瞎漢衆中商量道某甲話也未問便好打德山不打却又問你是甚處人這裏便是話作兩橛龍頭蛇尾處且喜沒交涉又道這僧若是作家才見他問你是甚處人便好掀倒禪牀他既不能却被德山道未踏船舷好與三十棒這裏是當斷不斷不招其亂底劍所以雪竇云要識新羅僧麼只是撞著露柱底瞎漢且喜沒交涉參禪若是恁麼地會得時更不消悟也聰明靈利底一時隨語生解解注將去便了我且問你恁麼解注得一時有下落了生死到來却如何支遣而今分明向你道這些間言長語便是出生死底徑路你莫去徑路上栽荊棘掘矢窖或若有個衲僧出來道和尚現在這裏栽荊棘掘矢窖也不是却作麼祇對山僧有個推托處且如何推托聽取一偈偈頌秦國不録喝一喝下座示衆云古人道大智無分別大用無理事如月印千江似波隨衆水且那個是無分別底大智那個是無理事底大用莫是問一答十辨瀉懸河是大智麼莫是粗言及細語皆歸第一義掀倒禪牀喝散大衆攔腮贈掌拂袖便行擬議思量劈口便𡎺之類是大智麼若作這般見解莫道我是衲僧便做他衲僧門下提破草鞋挈骨董袋底奴子也未得在善知識實證實悟而大法不明為人時未免以自證自悟處指似人瞎却人眼況無證悟學語之流瞎人眼不在言也此事大難沒量大人到這裏無插足處你小根無知魔子輩如何敢造次開大口你試靜處坐地微細揣摩你方寸裏還實到不疑之地也未若實未到我却賞你放得過把得定不受人走作這般底喚作地獄滓十方施主一粒米一莖菜將來供給你只要你道業成就同趣佛乘求異世他生福報道業不成如何消得你諸人決欲繼紹此個門風直須心境一如方有少分相應你莫見我說恁麼事便閉目藏睛作死模樣硬差排心與境一如這個儘你伎倆如何差排你要得真個心境一如麼直須啐地折嚗地斷拈却髑髏裏作妄想底將第八識斷一刀自然不著差排你不見巖頭和尚有言才有所重便成窠臼你諸人一生在叢林參尋此事無所得者不在言也其間多有頭白齒黃坐在窠臼裏一生出頭不得都不知非向古人言句上得些滋味者以奇言妙句為窠臼於經教中聲名句義上得滋味者以經教為窠臼於古人公案上得滋味者以古人問答代語別語抑揚語褒貶語為窠臼於心性上得滋味者以三界惟心萬法惟識為窠臼於寂默無言無說處得滋味者以閉目藏睛威音那畔坐在黑山下鬼窟裏不動為窠臼於日用動轉施為處得滋味者以揚眉瞬目舉覺提撕為窠臼謂法不在言語上不在情識上不在舉動施為處錯認業識為佛性於此得滋味者以擊石火閃電光為窠臼如上所說皆於得滋味處有所重若無大丈夫氣槩退步知非即以所重處便作奇特想玄妙想安隱想究竟想解脫想作如是等想者佛出世亦不奈何教中謂之癡暗惑何以故為你癡故執邪為正為你暗故墮在所重處不能動轉若於心無所起於法無所著則無所重無所重則自然赤骨力地無欲無依於法自在你即今便要恁麼相應亦不難但於心平等無所染著如何是染著作衆生想佛想世間想出世間想求出離想求佛智想皆名染著你但向欲起未起時猛著精彩一躍跳出來此心朗然獨脫才覺恁麼便轉向上面去自然頭頭上明物物上顯得到恁麼田地亦不得釆顧著若釆顧著則有所重才有所重此心即滲漏矣只名滲漏心不名平等心謂平等者善與惡等背與向等理與事等凡與聖等量與無量等體與用等這個道理惟證者方知諸人若未證直須證取證得了方得名為真出家兒若心不證向心外取證此名出家外道不堪為種草此心廣大無分劑無邊表塵沙諸佛成等正覺山河大地萬象森羅皆不出此心此心能與一切安名立字一切與伊安名立字不得故諸佛諸祖不得已隨你顛倒著個名字喚作真如佛性菩提涅槃強立種種差別異號為你衆生界中見解偏枯有種種差別故立此差別名號令汝於差別處識取此無差別底心非是此心有差別也所以僧問馬祖如何是佛祖曰即心是佛你若實證實悟有何差別你若不悟求奇特解會不實證實悟不悟此心決定是佛只此即心是佛便是差別因緣佛言欲以譬喻而顯示終無有喻能喻此說個廣大已是限量他了也況以限量心欲入此廣大境界縱然入得如持蠡酌海一蠡縱滿能得幾何然只這蠡中之水未入蠡時即是無限量底水為你境界只如此大生滿足想故此無限量境界亦隨你器量滿足非是大海水只有許多故佛有言譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿此水喻心蚊虻阿修羅喻大小差別此心體上本無若干差別汝但不起諸見識取此心種種差別亦自識得矣先聖尚不許執此心為實心外更有什麼實底物為你作障難我今拖泥帶水亦是不得已為提獎嬌兒撫憐愛子老婆心切故牽枝引蔓你莫記我說底便以為是今日恁麼說明日又却不恁麼說你才恁麼我却不恁麼你不恁麼時我却恁麼你向那頭尋我住處只我亦自不知住處他人又如何尋得這個是活底門戶死却現行方可入作而今學人將少分精進禮佛持誦戒身口意以為資糧希求證取有什麼交涉大似癡人埋頭向西走欲取東邊物轉走轉背轉急轉遲此是無為無漏無功用大法門若起纖毫取證心則背馳矣如何欲憑些小有為功行便擬希求所以古人見得太近故云我坐地看你究取又云我立地看你究取即不曾教你起模畫樣積功纍德希望成道縱你希望得成才成即壞徒自疲勞你莫見恁麼道了便撥無因果作地獄業以平常無事喚作無佛法知見饑來喫飯困來打眠以此為無修證以此為無功用且莫錯會好荷擔此事也須是個渾鋼打就生鐵鑄成底漢始得豈容你小根小器造次承當不見臨濟三度問黃檗佛法的的大意三度被打後得大愚點破忽然大悟不覺失聲云噁元來黃檗佛法無多子愚云你適來覔有過無過而今却言黃檗佛法無多子你見個什麼便恁麼道臨濟於大愚肋下𡎺兩𡎺愚遂拓開云汝師黃檗非干我事你諸人參禪還得恁麼也未雲庵和尚頌云資糧更不著些些岐路年深恐轉賒直下痛施三頓棒夜來依舊宿蘆花又頌臨濟悟旨云便言黃檗無多法大丈夫兒豈自乖脅下兩拳明有信不從黃檗付將來又端和尚頌云一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時添意氣不風流處也風流據這兩個老漢頌便可承嗣臨濟作他兒孫真不忝竊古來幸有恁麼體格如何略不著些眼腦看是個甚麼道理此事如青天白日有甚麼遮障諸方有奇特差別海蠡兒禪曲曲折折此語又是討他那語又是識破這語又是不上他鈎線不入他圈䙡這語又是偏正回互這語又是尊堂有諱不敢擡頭又有一種以楞嚴宗鏡龍濟偈語所說眼見耳聞無非是心更非別法引通玄峰頂不是人間心外無法滿目青山之類為證謂之腳跟下事謂之基趾謂之綿密地你不妨會得好若恁麼會豈不是認物為心既是你心又要認他作麼又有一種將臨濟三玄雲門三句逐句解說以傳燈廣燈祖師言句各分門類以一塵才起大地全收一毛頭師子百億毛頭師子現盡大地是個解脫門盡大地是沙門一隻眼若人識得心大地無寸土山河大地明暗色空咸是妙明真心中物之類配為體中玄函蓋乾坤句以三腳驢子弄蹄行鋸解稱錘火裏蝍蟟吞大蟲文殊起佛見法見貶向二鐵圍山東山水上行北斗裏藏身凡語言注解不得處便道蚊子上鐵牛無你下嘴處如此之類謂之句中玄截斷衆流句如踏著稱錘硬似鐵踏破草鞋赤腳走饑來喫飯困來打眠山是山水是水行但行坐但坐大盡三十日小盡二十九如此之類謂之玄中玄隨波逐浪句豈不見汾陽和尚頌云三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新此老子明明為你指出臨濟骨髓却來逐句下解注謂三玄三要事難分是總頌得意忘言道易親是體中玄一句明明該萬象是句中玄重陽九日菊花新是玄中玄此是前輩中負大名望有真實悟處而大法不明無師承杜撰如此瞎衆生眼其餘裨販之流不在言也想汾陽老人未肯點頭在分明向你道三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新恁麼道了更將鉢盂安柄莫道你負大名具大辨才有大智慧便是達磨大師出來作這般去就正好捉來活埋免致教壞人家男女一盲引衆盲問著三要却注解不得便將同德山托鉢巖頭末後句南泉斬猫兒百丈野狐歸宗斬蛇大隨燒畬趙州勘婆子勘庵主睦州擔板陳操尚書勘僧玄沙敢保老兄未徹在洞山道即太煞道只道得八成達磨隻履西歸如此之類皆謂之末後句便引洛浦云末後一句始到牢關把斷要津不通凡聖任從天下樂欣欣我獨不肯謂之我為法王於法自在任你學者逞盡神通呈盡伎倆我只一向把住不許你謂之牢關直待舉立僧住院密室口耳傳授如斯之類自毀正因返行魔說又有一種道南泉斬猫兒百丈野狐歸宗斬蛇大隨燒畬趙州勘婆子勘庵主之類謂之建立門庭本無恁麼事貴要羅籠學者又有一種以偏正回互為宗旨如洞山與雲居過水次洞山問水深多少云不濕山云粗人雲居却問水深多少云不乾謂水諱濕而當頭道濕不能回互謂之粗人雲居却云不濕是觸諱而不能回互洞山道不乾乃有語中無語何謂有語不乾是何謂無語不乾是不乾乃是濕是活語能回互不觸諱故也又以黑白圈兒作五位形相以全黑圈兒為威音那畔父母未生空劫以前混沌未分事謂之正位以二分黑一分白圈兒為正中偏却來白處說黑底又不得犯著黑字犯著黑字即觸諱矣更引洞山頌云正中偏三更初夜月明前謂能回互只言三更三更是黑初夜是黑月明前是黑不言黑而言三更初夜月明前是能回互不觸諱以兩分白一分黑圈兒為偏中正却來黑處說白底而不得犯白底消息云偏中正失曉老婆逢古鏡不言明與白而言失曉與古鏡是能回互明與白字而不觸諱蓋失曉是暗中之明古鏡亦是暗中之明老婆頭白不說白而言老婆白在其中矣能回互白字故也又說正中來頌云正中來無中有路隔塵埃或云出塵埃謂凡有言句皆無中唱出便自挾妙了也無不從正位中來或明或暗或至或到皆妙挾通宗凡一位皆具此五事如掌之五指無少無剩兼中至謂兼黑兼白兼偏兼正而至何謂至如人歸家未到而至別業乃在途為人邊事亦能回互妙在體前兼中到謂兼前四位皆妙挾而歸正位謂之折合歸來炭裏坐亦是說黑處而回互黑字不道黑而言炭或者又謂曹山有言正位者即空界也一向無物偏位者即色界也內有種種諸雜萬象兼中至者捨事入理正中來者背理就事兼帶者即冥應衆緣不隨諸有非染非淨無正無偏故云虗玄要道無著真宗從上先德推此一位最妙最玄須是審詳辨明當體又說五位皆三字成句偏正上下回互而不犯中中即正位也說理說事教有明文教外單傳直指之道果如是否若果如是討甚好曹山耶又引浮山作大陽真讚曰黑狗爛銀蹄自注云此語正位中有偏位黑狗是正位爛銀蹄是偏位白象崑崙騎自注云此語偏位中有正位於斯二無礙自注云此語不墮有無二邊所以洞山云不落有無誰敢和木馬火中嘶自注云妙挾然雖妙挾而虗玄唱道也似這般說話須教你燒頂煉臂發誓願不得妄傳然後分付亦謂之末後句師舉了遂彈指云好掩彩底禪若是皮下有點血底還肯喫這般茶飯麼我且問你臘月三十日四大相將解散平昔記持學得底還回互得麼回互時還著意也無當恁麼時心識已昏如何回互既回互不得定撞入驢胎馬腹中隨業受報當此時欲觸諱作粗人亦不可得況能敵他生死耶又有商量洞山示衆云向時作麼生奉時作麼生功時作麼生共功時作麼生功功時作麼生時有僧問如何是向山云喫飯時作麼生如何是奉云背時作麼生如何是功云放下鉏頭時作麼生如何是共功云不得色如何是功功云不共向時作麼生謂趣向此事答曰喫飯時作麼生謂此事不可喫飯時無有功勳而間斷也奉時作麼生奉乃承奉也如人奉尊長先致敬而後承奉向乃功勳之所立才向即有承奉之義答曰背時作麼生謂此事無間斷奉時既爾而背時亦然言背即奉之義蓋奉背皆功勳也功時作麼生功即用也答曰放下鉏頭時作麼生把鉏頭是用放下鉏頭是無用洞山之意謂用與無用皆功勳也亦是無間斷之義共功時作麼生謂法與境敵答曰不得色乃法與境不得成一色正用時是顯個無用底無用即用也若作一色即是十成死語洞山宗旨語忌十成故曰不得色乃活語也功功時作麼生謂法與境皆空謂之無劫用大解脫故曰不共乃無法可共不共之義全歸功勳邊如法界事事無礙是也你面前無我我面前無你所以夾山道此間無老僧目前無闍黎是也如此之說皆趣向承奉於日用四威儀內成就世出世間無不周旋謂之功勳五位你道他古人意果如是乎若只如此有甚奇特只是口傳心授底葛藤既不如是且古人意畢竟作麼生妙喜為你下個注腳也要諸方點檢不見汾陽道面目見在一任揀取故淨名云但除其病而不除法又首楞嚴云汝以緣心聽法此法亦緣古人一言半句雖是垂慈皆在未屙已前著倒如三玄三要四種料揀十智同真亦是這個道理妙喜恁麼道不是貶剝諸方且要個中人辨明緇素而已又有一種也不在言語上也不在古人公案上也不在心性上也不在玄妙上也不在有無得失邊如火相似觸著便燒非離真而立處立處即真信手拈來超今越古一句來一句去末後多一句便是得便宜似這般底只是弄個業識癡團便謂無因果無報應亦無人亦無佛飲酒食肉不礙菩提行盜行淫無妨般若如此之流正是師子身中蟲自食師子身中肉永嘉所謂豁達空撥因果莽莽蕩蕩招殃禍是也有一種商量古人公案謂之針線功夫又謂之郎君子弟禪如商量女子出定語云文殊是七佛之師為甚麼出女子定不得云文殊與女子無緣罔明是初地菩薩為甚麼出得女子定云與女子有緣下語云冤有頭債有主又商量道文殊不合有心所以出不得罔明無意所以出得下語云有心用處還成錯無意求時却宛然又有商量道文殊為甚麼出女子定不得杓柄在女子手裏罔明為甚麼出得如蟲禦木又云因風吹火又云爭奈女子何邪解甚者至於作入定勢又作出定勢推一推彈指一下哭蒼天數聲伏惟尚饗拂袖之類冷地看來慚惶殺人又芭蕉云你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子商量云你若是這般人我與你說這般話謂之與你拄杖子你不是這般人我當面換却你眼睛謂之奪却你拄杖子下語云量才補職又云看樓打樓又有商量道有無與奪是擒縱學者似恁見解如麻似粟如上所說皆口傳心授露布葛藤印板上打來模子裏脫出非惟自謗亦乃謗他古人此是諸方學得底海蠡兒禪諸上座還信得及麼不見道垂慈則有法無法不垂慈識取鈎頭意莫認定盤星我這裏是海蚌禪開口便見心肝五臟差珍異寶都在面前閉却口時何處覓伊縫罅不是強為法本如是諸上座光陰可惜各各趂色力強健猛著精神了取莫愛他奇特奇特處賺誤人雜毒在心識裏他時後日莫道得力只死時也死得不瞥脫更說甚麼敵他生死世間無明煩惱却有限量一念識破則當體寂滅惡知惡見法塵煩惱無限量能障道眼使得你心識晝夜不停謗佛法僧造地獄業雖是善因返招惡果果有智慧大丈夫漢方識得破不被他作惱不見雲門大師有言盡乾坤一時將來著你眼睫上你諸人聞恁麼道不敢望你出來性燥把老僧打一摑且緩緩子細看是有是無是個甚麼道理直饒你向這裏明得若向衲僧門下好椎腳折若是個人聞說道甚麼處有老宿出世便好驀面唾汙我耳目你若不是個手腳才聞人舉便承當得早落第二機也又不見羅山和尚有言玄門無法不立紀綱若欲討尋聲前看取諸佛子真心無定真智無邊我若縱這兩片皮從今日說到盡未來際鈎鎖連環相續不斷亦不借他人氣力此是人人分上各自具足底事添些子不得減些子不得佛祖得之喚作大解脫法門衆生失之喚作塵勞煩惱然得亦不曾得失亦不曾失得失在人不在法故祖師云至道無難惟嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得見前莫存順逆你禪和家個個念得還曾略著意理會麼祖師安個名字謂之信心銘只要諸人信此廣大寂滅妙心決定不從人得故中間有言一心不生萬法無咎無咎無法不生不心能隨境滅境逐能沉境由能境能由境能又云大道體寬無易無難又云執之失度必入邪路放之自然體無去住你但信此一心之法不可取不可捨便好向這裏放身命若放不得是你根性遲鈍臘月三十日不要錯怪老漢時熱久立喝一喝下座到雪峯普說有云如今諸方多少錯商量學家既眼不明出來伸一問禪牀上瞎漢將合頭語秖對便道扶過斷橋水伴歸明月村一句來一句去道我答得玄答得妙學者不識好惡𡎺向皮袋裏將去到處合合得著則倒來印可宗師合不著便將這般不材不淨蘊在胸襟輕薄好人作地獄業又錢計議請普說有云這些子藥頭不問雲門下臨濟下曹洞下法眼下溈仰下大法若不明各宗其宗各師其師各父其父各子其子只管理會宗旨熱大不緊老漢在衆中時嘗請益一尊宿禪門中說有語中無語無語中有語尊宿為我引證云有語中無語路逢死蛇莫打殺無底籃子盛將歸喚這個作有語中無語又喚作無語中有語如何是有語中無語路逢死蛇莫打殺如何是無語中有語無底籃子盛將歸只這一句便具此兩義路逢死蛇莫打殺是無語中有語無底籃子盛將歸乃是有語中無語謂既是死蛇更不消打殺又云如何是同中有異鷺鷀立雪非同色如何是異中有同明月蘆花不似他我如此說時你便會得了却濟得甚麼事這般底不要學大法明後舉一絲毫便一時會得又示黃伯成云古人入門便棒便喝惟恐學者承當不性燥况忉忉怛怛說事說理說玄說妙草裏耶近年以來此道衰微據高座為人師者只以古人公案成褒或貶或密室傳授為禪道者或以默然無言為威音那畔空劫已前事為禪道者或以眼見耳聞舉覺提撕為禪道者或以猖狂妄行擊石火閃電光舉了便會了一切撥無為禪道者如此等既非却那個是著實處若有著實處則與此等何異具眼者舉起便知右皆指斥邪解警語而若有著實處則與此等何異又最警䇿也無厭葛藤被機泉州教忠彌光禪師初依圜悟次謁佛心既謁師師問曰汝在佛心處所得者試舉一二看光舉佛心拈普化公案曰佛心即不然總不恁麼來時如何劈脊便打從教遍界分身師曰汝意如何光曰某不肯他後頭下個注腳師曰此正是以病為法光毅然無信可意師曰汝但揣摩看光竟以為不然經旬忽憶海印信拈曰雷聲浩大雨點全無恍然無滯趨告師師以舉道者見琅琊及玄沙未徹語詰之光對已師曰雖進得一步祇是不著所在如人斫樹根下一刀則命根斷矣汝向枝上斫其能斷命根乎今諸方浩浩談禪者見處總如此何益於事其楊岐正傳三四人而已光慍而去翌日師問汝還疑否光曰無可疑者師曰祇如古人相見未開口時已知虗實或聞其語便識淺深此理如何光悚然師令究有句無句師過雲門庵光侍行一日問曰某到這裏不能得徹病在甚處師曰汝病最僻世醫拱手何也別人死了不能活汝今活了未曾死要到大安樂田地須是死一回始得光因益疑後入室師問喫粥了也洗鉢盂了也去却藥忌道將一句來光曰裂破師振威喝曰你又說禪也光即大悟師撾鼓告衆曰龜毛拾得笑咍咍一擊萬重關鎖開慶快平生在今日孰云千里賺吾來光亦呈頌曰一拶當機怒雷吼驚起須彌藏北斗洪波浩渺浪滔天拈得鼻孔失却口福州西禪鼎需禪師幼舉進士年二十五偶讀遺教經忽曰幾為儒冠誤欲出家母以親迎在期難之需曰夭桃紅杏一時分付春風翠竹黃花此去永為道伴竟依保壽樂為比丘一錫湖湘遍參名宿結庵於羌峰絶頂不下山者三年佛心才挽出首衆於大乘嘗問學者即心即佛因緣師方庵于洋嶼光公與需友善因謂曰菴主手段與諸方別可來少款需不答光以計要之至會師方為衆入室需隨衆在列師問即心即佛話作麼生會需下語師詬曰你見解如此敢為人師耶鳴鼓普說訐其平生珍重處悉排為邪解需自惟繆戾涕淚交默計曰我之所得既非則西來不傳之旨果如何哉一日師問曰內不放出外不放入正恁麼時如何需擬開口師拈竹篦劈脊連打需於是大悟厲聲曰和尚已多了也師又打一下需禮拜師笑曰今日方知吾不汝欺也印之以偈玉泉曇懿禪師與育王遵璞禪師偕參圜悟自謂不疑懿出世莆之祥雲璞佐之法席頗盛師入閩知其所見未穩恐誤衆致書令來懿猶豫師小參痛斥其非懿乃破夏來見師鞠其所證曰汝恁麼見解敢承嗣圜悟老人耶懿歸遂退院偕璞同依師席一日師問璞三聖興化出不出為人不為人話你道這兩個老漢還有出身處也無璞於師膝上打一拳師曰你這一拳為興化出氣為三聖出氣速道速道璞擬議師劈脊與一棒且曰你第一不得忘了這一棒又一日聽別僧入室師問僧曰德山見僧入門便棒臨濟見僧入門便喝雪峰見僧入門便道是甚麼睦州見僧入門便道現成公案放汝三十棒這四個老漢還有為人處也無僧曰有師曰劄僧擬議師便喝出璞聞忽有省懿一日入室師問我要個不會禪底做國師懿曰我做得國師去也師喝出久之師語之曰香嚴悟處不在擊竹邊俱胝悟處不在指頭上懿亦有省開善道謙禪師初依圓悟既從師庵居泉南及師領徑山令謙往長沙通紫巖居士書謙自謂我參禪二十年無入頭處更作此行復廢歲月意欲無往友人宗元者叱曰不可在路便參禪不得也去吾與汝俱往謙不得已而行在路泣語元曰我參禪殊無得力處今又途中奔波如何得相應去元曰你但將諸方參得底悟得底圓悟妙喜為你說得底都不要理會途中可替底事我盡替你只有五件事替你不得你須自家支當謙曰五件何事元曰著衣喫飯屙矢放尿駝個死尸路上行謙於言下領旨及謙通書歸師於半山亭望見便曰這漢和骨頭都換了也謙聞曰老漢驗人處應不讓釋迦謙示衆有曰時光易過且緊緊做工夫別無工夫但放下便是只將心識上所有底一時放下此是真正徑截工夫若別有工夫盡是癡狂外邊走山僧尋常道行住坐臥决定不是見聞覺知决定不是思量分別决定不是語言問答决定不是試絶却此四個路頭看若不絶决定不悟此四個路頭若絶僧問趙州狗子還有佛性也無趙州云無如何是佛雲門道乾矢橛管取呵呵大笑瑩仲溫極賞此語薦福悟本禪師久依師不見印可遂欲發去師語之曰汝但專意參究如有所得不待開口我已識也既而有聞本入室故謂之曰本侍者參禪許多年逐日只道得個不會本詬之曰這小鬼你未生時我已三度霍山廟裏退牙了好教你知由茲益鋭志參狗子無佛性話一夕將三鼓倚殿柱昏寐間不覺無字出口吻間忽爾頓悟後三日師歸自郡城本趨丈室足才越閫未及吐詞師遽曰本鬍子這回方是徹頭本尋過謙公于建陽庵中謙適舉保寧頌五通仙人因緣曰無量劫來曾未悟如何不動到其中莫言佛法無多子最苦瞿曇那一通謙復曰我愛他道如何不動到其中既是不動如何到看他古人得了等閒拈出來自然㧓著人癢處本曰因甚麼却道最苦瞿曇那一通謙曰你未生時吾已三度霍山廟裏退牙了也於是相顧大笑其友朋琢磨之益蓋如印圈契約之無差至於會心囅然可使後世想望風采唐中舍文若於道自謂有所入每聞僧言師有未語已前之驗未之信師自梅還時驀于舟次見師師見便曰莫是子西之後否唐曰家大人也師曰尊翁在無盡第相從甚久不如公有個無師自得底道理但未契得徑山手裏竹篦在唐俯首感嘆炷香致敬連檣而之鄂渚勤扣請焉育王佛照德光禪師初依光化吉禪師一日入室吉問不是心不是佛不是物是甚麼光罔措遂致疑通夕不寐次日詣方丈請益昨日蒙和尚垂問既不是心又不是佛又不是物畢竟是甚麼望和尚慈悲指示吉震威喝曰這沙彌更要我與你下注腳在拈棒劈脊便打出光於是有省既謁諸名宿終不自肯適師領育王光依法席師室中問光喚作竹篦則觸不喚作竹篦則背不得下語不得無語光擬對師便棒光豁然大悟從前所得瓦解氷消雁山能仁祖元禪師初謁雪峰預佛心才皆已契機及依師於雲門庵夜坐次睹僧剔燈始徹證有偈曰剔起燈來是火歷劫無明照破歸堂撞見聖僧幾乎當面蹉過不蹉過是甚麼十五年前奇特依前祇是這個師以偈贈之曰萬仞崖頭解放身起來依舊却惺惺饑餐渴飲渾無事那論昔人非昔人蔣山善直禪師初參師于回雁峰下一日師問之曰上座甚處人直曰安州人師曰我聞你安州人會撕撲是否直便作相撲勢師曰湖南人喫魚因甚湖北人著鯁直打筋斗而出師曰誰知冷灰裏有粒豆𪹼平江資壽尼無著妙總禪師丞相蘇公頌之孫女年三十許謝世緣而遍參名宿正信已具及師住徑山總依結夏聞師升堂舉藥山參石頭馬祖語豁然頓徹師下座馮濟川隨師至方丈曰某理會得適來和尚所舉公案矣師曰居士如何川曰恁麼也不得囌嚧娑婆訶不恁麼也不得㗭哩娑婆訶恁麼不恁麼總不得囌嚧㗭哩娑婆訶師舉似總總曰曾見郭象注莊子識者謂却是莊子注郭象師見總語異因舉巖頭婆子話問之總答偈曰一葉扁舟泛渺茫呈橈舞棹別宮商雲山水月俱拋却贏得莊周蝶夢長師休去川疑總所悟未實後過無錫招至舟中問曰婆生七子六個不遇知音祇這一個也不消得便棄水中大慧老師言道人理會得如何理會總曰已上供通並是詣實川大驚一日師挂脾次總入室師問古人不出方丈為甚麼却去莊上喫油餈總曰和尚放妙總過妙總方敢通個消息師曰我放你過你試道看總曰妙總亦放和尚過師曰爭奈油餈何總喝一喝而出侍郎無垢居士張九成未第時則心慕楊文公呂微仲之學謁寶印明問入道之要明曰此事惟念念不捨久久純熟時節到來自然證入復舉柏樹子話令時時提撕公久之無省辭謁善權清公問此事人人有分個個圓成是否清曰然公曰為甚麼某無個入處清於袖中出數珠示之曰此是誰底公俯仰無對清復袖之曰是汝底則拈取去才涉思惟則不是汝底公悚然未幾留蘇氏館一夕如廁正提柏樹子話聞蛙聲釋然契入述偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭腳痛有玄沙禪林類聚云公謁胡文定公問修己治心之道胡曰公但熟讀孟子將他言仁義處類作一處看一日如廁因思惻隱之心乃仁之端忽聞蛙鳴豁然有省不覺自舉云如何是祖師西來意庭前柏樹子不覺大笑汗下被體遂述偈同上録以博異屆明謁法印一公機語頗契適私忌就明靜庵供雲水主僧惟尚才見乃展手公便喝尚批公頰公趨前尚曰張學録何得謗大般若公曰某見處祇如此和尚又作麼生尚舉馬祖升堂百丈卷席話詰之敘語未終公推倒桌子尚大呼張學録殺人公躍起問旁僧曰汝又作麼生僧罔措公毆之顧尚曰祖禰不了殃及兒孫尚大笑公呈偈曰卷席因緣也大奇諸方聞舉盡攢眉臺盤躍倒人星散直漢從來不受欺紹興癸丑魁多士復謁尚于東庵尚曰浮山圓鑑云饒你入得汾陽室始到浮山門亦未見老僧在公作麼生公叱侍僧曰何不祇對僧罔措公打僧一掌曰蝦蟇窟裏果沒蛟龍公一日訪規首座才相見規便問承聞學士因蛙鳴有個入處是否公曰那裏得這消息來規云現成公案諱作甚麼公厲聲云火發也規顧視旁僧公云燒到你腳跟也規云將謂你有長處元來只在這裏又一日同規圍爐坐次規驀拈火抄云不得喚作火抄畢竟喚作甚麼公乃掣火抄踢倒湯瓶而出師董徑山有傳師語要至公公閲而歎曰是知宗門有人恨不一見逮庚申造徑山一日與馮濟川諸君議及格物師曰公祇知有格物而不知有物格公茫然師大笑公曰師能開諭乎師曰不見小說載唐人有與安祿山謀叛者其人先為閬守有畫象在焉明皇幸蜀見之怒令侍臣以劍擊其首時閬守在陝西首忽墮地公頓領微旨題不動軒壁曰子韶格物曇晦物格欲識一貫兩個五百師肯之又一日問曰前輩既得了何故復理會臨濟四料揀則甚議論師曰公之所見祇可入佛不可入魔豈可不從料揀中去耶公遂舉克符問臨濟至人境兩俱奪不覺欣然師曰余則不然公曰師意如何師曰打破蔡州城殺却吳元源公于言下得大自在嘗曰某每聞徑山老人所舉因緣如千門萬戶不消一踏而開或與聯輿接席登高山之上或緩步徐行入深水之中非出常情之流莫知吾二人落處某了末後大事實在老人處此瓣香不敢孤負他也辛酉公丁父憂過徑山飯僧秉鈞者謂公與師議及朝政遂竄師于衡陽公服除安置南安丙子春放還道次新淦而師適至相見惟劇談宗旨未嘗一言及往事時公甥干憲侍次公令甥拜師憲曰素不拜僧公曰汝試扣之憲遂舉中庸天命之謂性率性之謂道修道之謂教以問師曰凡人既不知本命元辰下落處又要牽好人入火坑如何聖賢於打頭一著不鑿破憲曰吾師能為聖賢鑿破否師曰天命之謂性便是清淨法身率性之謂道便是圓滿報身修道之謂教便是千百億化身公顧憲曰子拜何辭公與三川道人論不愁念起惟怕覺遲公頌曰念是賊子覺是賊魁捶殺賊魁賊子何歸堂堂大路惟吾獨之越南燕北遼東隴西撒手便到何慮何疑神劒在山鍔冷光寒魈夔魍魎莫之敢干此名真覺秦時𨍏轢師賡曰說覺說念翻背作面無念無覺何處摸索起是誰起覺是誰覺豁開戶牖太虗遼廓撒手前行不顧人秦時𨍏轢何時作公後設心六度不為子孫計因取華嚴善知識日供其二回食以飯緇流又嘗供十六大天而諸位茶杯悉為乳公述偈曰稽首十方佛法僧稽首一切護法天我今供養三寶天如海一滴牛一毛有何妙術能感格試借意識為汝說我心與佛天無異一塵才起大地隔倘或塵銷覺圓淨是故佛天來降臨我欲供佛佛即現我欲供天天亦現佛子若或生狐疑試問此乳何處來狐疑即塵塵即疑終與佛天不相似我今為汝掃狐疑如湯沃雪火消氷汝今微有疑與惑子便到新羅國參政李邴居士字漢老醉心祖道有年聞師排默照為邪禪心疑且怒過師觀聽值師方示衆舉趙州柏樹子話垂語曰庭前柏樹子今日重新舉打破趙州關特地尋言語敢問大衆既是打破趙州關為甚麼特地尋言語良久曰當初祇道茆長短燒了方知地不平士忽領悟謂師曰無老師後語幾蹉過此生後有書與師咨詢録于前士病將革以偈寄教忠彌光禪師曰曩歲曾經度厄津深將法力荷雲門如今稍覺神明復擬欲酬師不報恩光公答曰胡牀穩坐已通津何處還尋不二門八苦起時全體現不知誰解報深恩土得其報閲罷而逝其處生死之大變泊然不變而言神明還復可見平昔矣履略師三十七歲而悟道庵居者十餘年及主徑山法席之盛冠於一時既以子韶興當路相左貶於衡陽者十年復移梅陽五年梅乃瘴癘之地非人所居而緇衲奔湊憧憧不絶歸領育王二年復領徑山四年退老於明月堂三年隆興元年癸未七月十二日示疾十四日有大星隕于寢室之後流光有聲八月九日訓勉四衆曰吾翌日行矣至五鼓親書遺奏及紫巖居士書侍僧了賢請偈師厲聲曰無偈便死不得也援筆曰生也恁麼死也恁麼有偈無偈是甚麼熱大擲筆而逝世壽七十有五坐五十八夏塔全身于明月堂之側語録八十卷隨大藏流行年譜作六十卷年譜所載書問法語普說之目今藏本多不具不知此三函者何人所節略續燈謂從師得法如鼎需思嶽彌光悟本守淨道謙遵璞祖元冲密等九人皆契悟廣大先師而沒語録世不覩全本弟子之超卓者又蚤世不使久開法俾法嗣廣布為人天眼甚哉末法之可悲也音釋卷三十一之三十二頰古洽切音甲面兩旁也珵直貞切音澄美玉也劊古外切音膾斷也剮同咼鮎魚占切音黏魚名駁伯各切音博馬色不純孜津私切音咨勤也矻苦骨切音窟勞極也溽而六切音肉溼熱謎彌計切音寐隱語牸疾二切音字牝牛稊杜兮切音題穢草稗薄邁切音敗草似稻都合切擔入聲皮瘦寬貌𭿇音鴟目汁凝也黠胡八切音轄也窖居效切音教地藏也蠡良以切音里蚌屬辴丑忍切瞋上聲大笑貌鍔逆各切音諤鋒稜魈先雕切音宵山魈獨足鬼也賡古衡切音耕續也憧昌中切音充意不定也又行不絶貌
