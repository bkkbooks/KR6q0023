body:
  text: 六祖下第十一世潭州石霜楚圓慈明禪師出全州清湘李氏少為書生年二十二依城南湘山隱靜寺得度其母有賢行使之遊方師連眉秀目頎然豐碩然忽繩墨所至為老宿所呵以為少叢林師崖柴而笑曰龍象蹴踏非驢所堪嘗槖骨董箱以竹杖荷之遊襄沔間與守芝谷泉俱結伴入洛中聞汾陽昭禪師道望為天下第一決志親依時朝廷方問罪河東潞澤皆屯重兵多勸其無行師不顧渡大河登太行易衣類廝養竄名火隊中露眠草宿至龍川遂造汾陽昭公壯之經二年未許入室師詣昭昭揣其志必詬罵使令者惑毀詆諸方及有所訓皆流俗鄙事一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事不明失出家之利語未卒昭公熟視罵曰是惡知識敢裨販我怒舉杖逐之師擬伸救昭公掩其口師大悟曰乃知臨濟道出常情服役七年辭去謁唐明嵩禪師嵩謂師曰楊大年內翰知見高入道穩實子不可不見師乃往見大年年問曰對面不相識千里却同風師曰近奉山門請年曰真個脫空師曰前月離唐明年曰適來悔相問師曰作家年便喝師曰恰是年復喝師以手劃一劃年吐舌曰真是龍象師曰是何言歟年喚客司點茶來元來是屋裏人師曰也不消得茶罷又問如何是上座為人一句師曰切年曰與麼則長裙新婦拖泥走師曰誰得似內翰年曰作家作家師曰放你二十棒年拊膝曰這裏是甚麼所在師拍掌曰也不得放過年大笑又問記得唐明當時悟底因緣麼師曰唐明問首山如何是佛法的的大意山曰楚王城畔汝水東流年曰祇如此語意旨如何師曰水上挂燈毬年曰與麼則孤負古人去也師曰內翰疑則別參年曰三腳蝦蟇跳上天師曰一任𨁝跳年乃大笑館於齋中日夕質疑智證因聞前言往行恨見之晚朝中見駙馬都尉李公遵勗曰近得一道人真西河師子李曰我以拘文不能就謁奈何年默然歸語師曰李公佛法中人聞道風遠至有願見之心政以法不得與侍從過從師於是黎明謁李公公閲謁使童子問曰道得即與上座相見師曰今日特來相看又令童子曰文刊白字當道種青松師曰不因今日節餘日定難逢童又出曰都尉言與麼則與上座相見去也師曰腳頭腳底公乃出坐定問曰我聞西河有金毛師子是否師曰甚麼處得這消息公便喝師曰野干鳴公又喝師曰恰是公大笑師辭公問如何是上座臨行一句師曰好將息公曰何異諸方師曰都尉又作麼生公曰放上座二十棒師曰專為流通公又喝師曰瞎公曰好去師應喏喏自是往來楊李之門以法為友久之辭還河東年曰有一語寄與唐明得麼師曰明月照見夜行人年曰却不相當師曰更深猶自可午後更愁人年曰開寶寺前金剛近日因甚麼汗出師曰知年曰上座臨行豈無為人底句師曰重疊關山路年曰與麼則隨上座去也師噓一聲年曰真師子兒大師子吼師曰放去又收來年曰適來失腳踏倒又得家童扶起師曰有甚麼了期年大笑師還唐明李公遣兩僧訊師師於書尾畫雙足寫來僧名以寄之公作偈曰黑毫千里餘金槨示雙趺人天渾莫測珍重赤鬚胡師以母老歸筠州依洞山聰禪師聰令首衆先是汾陽謂師曰我遍參雲門兒孫特以未見聰為恨故師依止三年謁神鼎諲禪師鼎首山高弟望尊一時衲子非人類精奇無諸方其門者住山三十年門弟子氣吞諸方師髮長不翦敝衣楚音通謁稱法姪一衆大笑鼎遣童子問長老誰之嗣師仰視屋曰親見汾陽來鼎杖而出顧見頎然問曰汾州有西河師子是否師指其後絶呌曰屋倒矣童子返走鼎回顧相矍鑠師地坐脫隻履而示之鼎老忘所問又失師所在師徐起整衣且行且語見面不如聞名遂去鼎遣人追之不可嘆曰汾州乃有此兒耶到大愚芝和尚處芝坐間開合子取香燒師問作麼生燒芝便放香罏中燒師指曰訝郎當漢又恁麼去也問閙中取靜時如何師曰頭枕布袋問四山火來時如何師曰物逐人興問行腳不逢人時如何師曰釣絲絞水問磨礲三尺劍去化不平人師意如何師曰好去僧曰點師曰你看僧拍手一下歸衆師曰了問有理難伸時如何師曰苦曰恁麼則舌拄上齶也師噓一聲僧曰將謂胡鬚赤師曰還曾夢見興化腳跟麼問僧近離甚處曰雲過千山碧師曰著忙作麼曰鴈過水聲凄師便喝僧亦喝師便打僧亦打師曰你看這瞎漢本分打出三門外念你是新到且坐喫茶師問顯英首座近離甚處曰金鑾曰去夏在甚處曰金鑾曰前夏在甚處曰金鑾曰先前夏在甚處曰和尚何不領話曰我也不能勘得汝教庫下供過奴子來勘且點一碗茶與汝濕口永首座與師同辭汾陽永未盡其妙從師二十年終不脫灑一夕圍罏深夜師以火筯敲炭曰永首座永首座永咄曰野狐精師乃指永曰訝郎當漢又恁麼去也永乃豁然示衆以拄杖擊禪牀一下云大衆還會麼不見道一擊忘所知更不假修治諸方達道者咸言上上機香嚴恁麼悟去分明悟得如來禪祖師禪猶未夢見在且道祖師禪有甚長處若向言中取則誤賺後人直饒棒下承當孤負先聖萬法本間惟人自閙所以山僧居福嚴只見福嚴境界晏起早眠有時雲生碧嶂有時月落寒潭音聲鳥飛鳴般若臺前娑羅花香散祝融峰畔把瘦笻坐盤陀石與五湖衲子時話玄微灰頭土面住興化只見興化家風迎來送去門連城市車馬駢填漁唱瀟湘猿啼嶽麓絲竹歌謠時時入耳復與四海高人日談禪道歲月都忘且道居深山住城郭還有優劣也無試道看良久云是處是慈氏無門無善財上堂道吾打鼓四大部洲同參拄杖橫也挑括乾坤大地鉢盂覆也蓋却恆沙世界且問諸人向甚麼處安身立命若也知得向北俱盧洲喫粥喫飯若也不知長連牀上喫粥喫飯示衆一切聖賢皆以無為法而有差別前是按山後是主山那個是無為法良久云向下文長付在來日師平生以事事無礙行心凡聖所不能測室中晏坐橫刀水盆之上旁置草鞋使來參扣者下語無有契其機者又作示徒偈曰黑黑黑道道道明明明得得得又冬日榜僧堂作此字其下注云若人識得不離四威儀中有首座者見之謂曰和尚今日放參師聞而笑之寶元戊寅李都尉遣使邀師曰海內法友惟師與楊大年耳大年棄我而先僕年來頓覺衰落忍死以一見公仍以書抵潭帥敦邀之師惻然與侍者舟而東下舟中作偈曰長江行不盡帝里到何時既得涼風便休將櫓棹施至京師與李公會月餘而李公果歿臨終畫一圓相又作偈獻師世界無依山河匪礙大海微塵須彌納芥拈起幞頭解下腰帶若覓死生問取皮袋師曰如何是本來佛性公曰今日熱如昨日隨聲便問師臨行一句作麼生師曰本來無挂礙隨處任方圓公曰晚來倦甚更不答話師曰無佛處作佛公於是泊然而逝仁宗皇帝尤留神空宗聞李公之化與師問答嘉嘆久之師哭之慟臨壙而別有旨賜官舟南歸中途謂侍者曰我忽得風痺疾視之口吻已喎斜侍者以足頓地曰當奈何平生呵佛罵祖今乃爾師曰無憂為汝正之以手整之如故曰而今而後不鈍置汝遂以明年至興化正月初五日沐浴辭衆跏趺而逝閲世五十有四坐夏三十有二李公之子銘志其行於興化而藏全身於石霜師初在汾陽時陽一日托以夢亡父母命庫堂設酒肉為祀祀畢集衆僧令食咸不聽陽因猶自飲啖衆曰酒肉僧豈堪師法盡散去惟師與大愚六七人存陽翌日上堂云許多間神野鬼祇消一盤酒肉斷送去了也法華經云此衆無枝葉惟有諸真實下座葉縣省和尚嚴冷枯淡衲子畏之浮山遠天衣懷往參之方寒雪時省呵罵驅逐至以水潑其它僧皆怒而去惟遠懷整濕衣安坐省曰你更不去我打你遠曰某二人數千里來特參和尚豈以一杓水潑便去即打殺也不去省乃令挂搭續命遠充典座衆苦枯淡遠乘省出竊取油麵為衆僧造五味粥省歸知之算所直罰遠估衣鉢還訖打趁出遠因寄居廊房省出見之復索租錢遠持鉢于市化錢還之無難色省乃曰遠真有意參禪乃呼之歸滁州琅邪山慧覺廣照禪師上堂有僧出來畫一圓相師拈拄杖僧擬議師便打曰道僧曰不道師曰為甚麼不道僧曰三世諸佛不出於此師又打尋時趁出乃曰教中道以手指比丘犯波逸提罪山僧今日入地獄如箭射上堂山僧因看華嚴金師子章第九由心迥轉善成門又釋曰如一尺之鏡納重重之影像若然者道有也得道無也得道非亦得道是亦得雖然如是更須知有拄杖頭上一竅若也不會拄杖子穿燈籠入佛殿撞著釋迦磕倒彌勒露柱拊掌呵呵大笑你且道笑個甚麼卓拄杖下座上堂汝等諸人在我這裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峰獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為五處若通方名導師汝等諸人若到諸方遇明眼作者與我通個消息貴得祖風不墜若是常徒即便寢息何故裸形國裏誇服飾想君太煞不知時瑞州大愚山守芝禪師僧問昔日靈山分半座二師相見事如何師曰記得麼僧良久師打禪牀一下曰多年忘却也乃曰且住且住若向言中取則句裏明機也似迷頭認影若也舉唱宗乘大似一場寐語雖然如是官不容針私通車馬放一線道有個葛藤處遂敲禪牀一下曰三世諸佛盡皆頭痛且道大衆還有免得底麼若一人免得無有是處若免不得海印發光師乃竪起拂子曰這個是印那個是光這個是光那個是印掣電之機徒勞佇思會麼老僧説夢且道夢見個甚麼南柯十更若不會聽取一頌北斗挂須彌杖頭挑日月林泉有商量夏末秋風切珍重示衆三世諸佛不知有狸奴白牯却知有乃拈起拂子云狸奴白牯總在這裏放光動地何為如此兩段不同妙喜曰大愚若無後語洎合被狸奴白牯換却眼睛雖然如此也未免稱錘蘸醋升座揭香合子曰明頭來明頭合暗頭來暗頭合若道得天下橫行道不得且合却有僧日誦金剛經百遍師聞之召謂曰汝日誦經究竟經義否曰未曾師曰汝但日誦一遍參究佛意若一句下悟去如飲海水一滴便知百川之味僧如教一日誦至應如是知如是見如是信解不生法相處驀然有省遂以白師師遽指牀前狗子云狗子𠰚僧無語師便打出僧寶傳云有僧講金剛經問曰如是信解不生法相如何時有狗臥繩牀前師躍之狗起去問僧解麼僧曰不解師曰若解即成法相與此所載雖有不同應是一人傳者互有詳略耳問通身是眼口在甚麼處師曰三跳曰不會師曰章底詞秋罷歌韻向春生慈明有善侍者號稱明眼聞師之風自石霜至大愚入室師躍出隻履示之善退身而立師俯取履善輒踏倒師起面壁以手點津連畫其壁三善瞪立其後師旋轉以履打至法堂善曰與麼為人瞎却一城人眼在僧寶傳芝譏呵學者寡聞得少為足曰汾陽有十智同真法門鍛佛祖鉗鎚應作椎今時禪者資質不妙莫有成器者僧問如何是十智同真芝曰先師言夫説法者舉汾陽章中十智同真語至要識是非面目現在芝曰先師曰要識是非面目現在也大省力後生晚學刺頭向言句裏貪著義味如驢舐尿處棒打不回蓋為不廣求知識遍歷門風多是得一言半句便點頭咽唾道已了辦上座大有未穩當處在先師有十五家宗風歌號曰廣智其詞曰大道不説有高低真空那肯涉離微大海吞流同增減妙峰高聳總擎持萬派千溪皆渤澥七金五嶽盡須彌玉毫金色傳燈後二三四七普聞知信衣息廣開機諸方老宿任施為識心是本從頭説迷心逐物却生疑芝曰此敘宗旨也或直指或巧施解道前綱出後機旨趣分明明似鏡盲無慧目不能窺明眼士見精微不言勝負墜愚癡物物會同流智水門風逐便示宗枝即心佛非心佛歷世明明無別物即此真心是我心我心猶是機權出芝曰此敘馬祖宗派也或五位或三路設施隨根巧回互不觸當今是本宗展手通玄無佛祖芝曰此敘洞上宗派也或君臣或父子器量方圓無彼此士庶公侯一道平愚智賢豪明漸次芝曰此敘石霜宗派也有時敲有時唱隨根問答談諦當應接何曾失禮儀淺解之流却生謗或雙明或單説只要當鋒利禪悅開權不為鬪聰明舒光只要辨賢哲有圓相有默論千里持來目視瞬萬般巧妙一圓空爍迦羅眼通的信芝曰此敘溈仰宗派也或全提或全用萬象森羅實不共青山不礙白雲飛隱隱當臺透金鳳芝曰此敘石頭藥山宗派也象骨鏡地藏月玄沙崇壽照無缺因公致問指歸源旨趣來人明皎潔芝曰此敘雪峰地藏宗派也或稱提或拈掇本色衲僧長擊發句裏明人事最精好手還同楔出楔或擡薦或垂手切要心空易開口不識先人出大悲管燭之徒照街走芝曰此敘雲門宗派也德山棒臨濟喝獨出乾坤解橫抹從頭誰管亂區分多口阿師不能説臨機縱臨機奪迅速機鋒如電掣乾坤只在掌中持竹木精靈腦劈裂或賓主或料揀大展禪宗辨正眼三玄三要用當機四句百非一齊鏟勸同袍莫強會少俊依前成窒礙不知宗脈莫顢頇永劫長沈生死海難逢難遇又難聞猛烈身心快通泰芝曰此敘德山臨濟宗派也幻寄曰大塊噫氣求怒者不可得若以激謞叱吸之出於鼻口耳枅為怒者是人不惟不識怒者亦不識鼻口耳枅矣善乎汾陽此歌云我心猶是機權出而大愚師亦云沙裏無油事可哀翠巖嚼飯喂嬰孩一朝好惡知端的始覺從前滿面灰今之人因汾陽此歌便謂宗風有十五家之異是索怒者於鼻口耳枅也可不謂大哀乎舒州法華院全舉禪師得法汾陽遍歷諸方首謁荊南福昌善禪師善問曰回互不回互師曰總不與麼曰為甚麼已喫福昌棒師曰一家有事百家忙曰脫空漫語師曰調琴澄太古琢句體全真謁公安遠禪師遠問作麼生是伽藍師曰深山藏獨虎淺草露羣蛇曰作麼生是伽藍中人師曰青松蓋不匝黃葉豈能遮曰道什麼師曰少年玩盡天邊月老倒扶桑沒日頭曰一句兩句雲開月露作麼生師曰照破祖師關謁延壽賢禪師賢問海竭人亡作麼生師曰毒蛇不咬人曰為何如此師曰風引溪雲斷泉衝石徑斜謁夾山真首座真曰還見麼師曰萬事全無曰還不見麼師曰千般皆在手師曰首座未見澄散聖時如何曰湖南江西又問見後如何曰江西湖南師曰却共首座一般耶曰打草驚蛇師曰終不揑怪到神鼎鼎問一朵峰巒上獨樹不成林作麼生師曰水分紅樹淺澗繞碧泉深鼎曰作麼生是回互之機師曰盲人却無眼謁福嚴承禪師承問作麼生是圓融之相師曰木人嶺上休相覷石女溪邊更不迷師却問如何是福嚴圓融之相曰老病尋常事龍鍾沒好時承問融即不問如何是圓師曰法界廣無邊曰不圓不融時如何師曰虗空無背面鳥道絶東西謁石霜慈明禪師慈明問作麼生是向上一竅師曰二竅俱明曰還見七十二峰麼師曰有甚麼掩處曰道什麼師曰今日觸忤和尚慈明便打師曰作什麼曰將謂是收番猛將元來是行間小卒師曰雅淡呈秋色馨香噴月華謁大愚芝禪師芝問古人見桃花意作麼生師曰曲不藏直曰那個且從遮個作麼生師曰市中拾得寶比鄰那得知曰上座還知麼師曰路逢劍客須呈劍不是詩人不獻詩曰作家詩客師曰一條紅線兩人牽曰玄沙道諦當又作麼生師曰海枯終見底人死不知心曰恰是師曰樓閣凌雲勢峰巒疊翠層謁五祖戒禪師戒問作麼生是絶羈絆底人師曰反手把籠頭曰却是作家師曰背鞭打不著曰為什麼上來下去師曰甚處見上來下去戒便打師曰一言無別路千里不逢人謁翠峰素禪師素曰風穴道嘶風木馬緣無絆背角泥牛痛下鞭如何師曰翻身師子生獰甚誰敢當頭露爪牙曰放汝一線道師曰七顛八倒曰收師曰了謁雪竇顯禪師竇問牛喫草草喫牛師曰回頭欲就尾已隔萬重關曰應知無背面要須常現前師曰驗在目前曰自領出去到琅琊覺和尚處琊問近離甚處師曰兩浙曰船來陸來師曰船來曰船在甚處師曰步下曰不涉程途一句作麼生道師以坐具摵一摵曰杜撰長老如麻似粟拂袖而出琊問侍者此是甚麼人者曰舉上座琊曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來相觸忤師便喝復問長老何時到汾陽耶曰某時到師曰我在浙江早聞你名元來見解祇如此何得名播寰宇琊遂作禮曰某甲罪過僧寶傳慈明道過琅邪覺師因語及舉公到時話且曰在汾州時尚少舉陸沉衆中不及識之明笑曰舉見處才能自了而汝墮負何以為人覺屏息汗下明為作牧童歌曰牧牛童實快活跣足披簑雙角撮橫眠牛上向天歌人問如何牛未渴回面看平田濶四方放去休攔遏八面無拘任意遊要收只在索頭撥小牛兒順摩捋角力未充難提掇且從放在小平坡慮上高峰四蹄脫日已高休喫草揑定鼻頭無少老一時牽向圈中眠和泥看伊東西倒笑呵呵好不好又將橫笛順風吹震動五湖山海島倒騎牛脫布襖知音休向途中討若問牧童何處居鞭指東西無一寶覺默得其遊戲三昧妙喜曰賓則始終賓主則始終主二大士驀劄相逢主賓互換直下發明臨濟心髓苟非徹證向上巴鼻具出常情正眼未免作得失論量或者道舉公前來一一據實祇對琅邪末後不合作佛法道理是杜撰處或者道琅琊被舉公道個杜撰心中疑惑即時倒戈卸甲遂挽留舉公咨決此事謂之坐參一犬吠虗千猱啀實蓋由主法者智眼不明濫觴宗教疑誤後人殊不知二大士激揚若日月麗天龍象蹴踏決非跛驢盲者之事井蛙醯雞又焉知宇宙之寬曠耶豫嘗室中舉此話問學者你還肯琅邪此語否曰不肯何故不肯曰不合作佛法道理豫復舉雲門問洞山近離甚處曰查渡夏在甚處曰湖南報慈幾時離彼曰八月二十五門云放你三頓棒你還肯雲門此語否曰肯肯者云何曰雲門無佛法道理豫曰師家問處一般學者答處無異你為甚肯一不肯一學者佇思豫連棒打出復召其僧且來且來其僧回首豫曰你若作棒會帶纍我也是個瞎漢其僧便禮拜曰今日方知琅邪與舉公非常情可測豫曰你看這瞎漢亂統又打喝出幻寄曰妙喜不獨為法華琅邪雪屈石霜藉此亦得吐氣不然石霜被埋沒無已時示衆釋迦不出世達磨不西來佛法遍天下談玄口不開妙喜曰作賊人心虗南嶽芭蕉菴大道谷泉禪師性耐垢汙撥置戒律眼蓋衲子所至叢林輒刪去師不以介意造汾陽謁昭禪師陽奇之密授記莂南歸放浪湘中聞慈明住道吾往省覲慈明問曰白雲橫谷口道人何處來師左右顧曰夜來何處火燒出古人墳慈明呵曰未在更道師乃作虎聲慈明以坐具摵之師接住推明置禪牀上明却作虎聲師大笑曰我見七十餘員善知識今日始遇作家山有湫毒龍所蟄墮葉觸波必雷雨連日過者不敢喘師與明暮歸時秋暑捉明衣曰可同浴明掣肘徑去於是師解衣躍入霹靂隨至腥風吹雨林木振搖明蹲草中意師死矣須臾晴霽忽引頸出波間曰㘞明嘗遣南公謁師師與語驚曰五州管內乃有此匾頭道人耶及南公住法輪師復以偈招之南公以師坦蕩忽繩墨戲酬以偈曰飲光論劫坐禪布袋經年落魄疥狗不願生天却笑雲中白鶴後住保真菴蓋衡湘最險絶處夜地坐祝融峰下有大蟒盤繞之師解衣帶縛其腰中夜不見明日杖䇿遍山尋之衣帶纏枯松上蓋松妖也倚遇上座來參問菴主在麼師曰誰曰行腳僧師曰作甚麼曰禮拜菴主師曰恰值菴主不在曰你聻師曰向道不在説甚麼你我拽棒趁出遇次日再來師又趁出遇一日又來問菴主在麼師曰誰曰行腳僧揭簾便入師攔胸扭住曰我這裏狼虎縱橫尿牀鬼子三回兩度來討甚麼曰人言菴主親見汾陽來師解衣抖擻曰你道我見汾陽有多少奇特曰如何是菴中主師曰入門須辨取曰莫祇這便是麼師曰賺却幾多人曰前言何在師曰聽事不真喚鐘作甕曰萬法泯時全體現君臣合處正中邪去也師曰驢漢不會便休亂統作麼曰未審客來將何祇待師曰雲門胡餅趙州茶曰恁麼則謝師供養去也師叱曰我這裏火種也未有早言謝供養嘗過衡山縣見屠者斫肉立其旁作可憐態指其肉又指其口屠問曰汝啞耶即肯首屠憐之割巨臠置鉢中師喜出望外發謝而去一市大笑而師自若以杖荷大酒瓢往來山中人問瓢中何物曰大道漿也自作偈曰我又誰管你天誰管你地著個破紙襖一味工打睡一任金烏東上玉兔西墜榮辱何預我興亡不相關一條拄杖一葫蘆間走南山與北山醉臥山路間大雪起作偈曰今朝甚好雪紛紛如秋月文殊不出頭普賢呈醜拙嘉祐中現子冷清妖言誅師坐清曾經由菴中決杖配彬州牢城盛暑負土經通衢弛擔説偈曰今朝六月六谷泉被氣𡎺不是上天堂便是入地獄言訖微笑泊然如蟬蛻闍維舍利不可勝數彬人塔之至今祠焉洪覺範贊曰無為子曰生者人之所貴死者人之所畏耻者人之所避而泉不貴其貴不畏其畏不避其避此其所以如是吾不知其真吾不知其偽將質之於天地方是時叢林以肅嚴相尚沙門以修潔相高一有指目重為愧耻故泉有以矯之耳其號泉大道若非苟然安吉州天聖皓泰禪師到琅琊琊問埋兵掉鬬未是作家匹馬單鎗便請相見師指琊曰將頭不猛帶纍三軍琊打師一坐具師亦打琊一坐具琊接住曰適來一坐具是山僧令行上座一坐具落在甚麼處師曰伏惟尚饗琊拓開曰五更侵早起更有夜行人師曰賊過後張弓琊曰且坐喫茶舒州浮山法遠圓鑒禪師僧問新歲已臨舊歲何往師曰目前無異怪不用貼鍾馗曰畢竟如何師曰將謂目前無僧以手畫曰爭奈這個何師便打師與王質待制論道畫一圓相問曰一不得匹馬單鎗二不得衣錦還鄉鵲不得喜鴉不得殃速道速道王罔措師曰勘破了也歐陽文忠公詣師室與客棊師坐其旁文忠遽收局請師因棊説法乃鳴鼓升座曰若論此事如兩家著棊相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底只解閉門作活不會奪角衝關硬節與虎口齊彰局破後徒勞逴斡所以道肥邊易得瘦肚難求思行則往往失粘心粗而時時頭撞休誇國手謾説神仙贏局輸籌即不問且道黑白未分時一著落在什麼處良久曰從前十九路迷悟幾多人文忠嘉歎久之既老退休於會聖巖因閲班固九流遂擬之作九帶敘佛祖教義博採先德機語參同印證其一曰佛正法眼帶其二曰佛法藏帶其三曰理貫帶其四曰事貫帶其五曰事理縱橫帶其六曰屈曲帶其七曰妙叶兼帶其八曰金針雙鎖帶其九曰平懷常實帶學者既已傳誦師曰若據圓極法門本具十數今此九帶已為諸人説了更有一帶還見得麼若也見得親切分明却請出來説看説得分明許汝通前九帶圓明道眼若見不親切説不相應惟依吾語而為己解則名謗法大衆到此如何衆無語師叱之去一佛正法眼藏帶夫真實之理證成法身照用之功作為報土諸佛之本源既爾諸祖之洪範亦然五部分宗萬派之精藍棊布一燈分焰十方之法席鱗差又華嚴經云如來不出世亦無有涅槃昔靈山會上世尊以青蓮目瞬視四衆無能領其密意惟大迦葉獨領解佛旨經云佛告大迦葉云吾有正法眼藏涅槃妙心付囑於汝汝當流布勿令斷絶又臨涅槃告阿難言十二部經汝當流通告優波離言一切戒律汝當奉持付大迦葉偈云法本法無法無法法亦法今付無法時法法何曾法於是大迦葉持佛袈裟於雞足山中入寂滅定待慈氏下生兩手分付古德著語云鳥棲無影樹花放不萌枝又四海波濤靜一輪明月天大圓智頌云佛正法眼迦葉親聞祖禰不了殃及兒孫大慧頌云迢迢空劫不能拘佛眼何曾識得渠體妙本來無位次正因那得有規模太虗寥廓塵埃淨智鑑圓明物象殊從此華山千古秀任他潘閬倒騎驢二佛法藏帶夫三乘教外諸祖別傳萬象之中迥然獨露纖塵未泯阻隔關山擬議差殊千生萬劫三賢不曉十聖那知截斷衆流如何湊泊聖人曲成萬物而不己刻雕衆形而無功而況如來藏乎所謂藏者該括三世過現未來諸佛法藏其間有大乘小乘小乘謂聲聞緣覺大乘謂菩薩於中支分為八謂三藏五乘其三藏謂經律論五乘謂聲聞緣覺菩薩而兼攝人天然則教分名數依根所立而不離一乘法華經云於一乘道分別説三又曰尚無二乘何況有三又曰惟此一事實餘二則非真此明依根立權如華嚴説如來藏以法界為體如來藏無前後際無成壞法無修證位絶對待義所以文殊偈曰一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力聖人説了義不了義並是依根安立諸佛隨宜説法意趣難解三藏五乘各有宗旨於一乘道論圓頓半滿並是權立惟華嚴一經以法界為體量佛與衆生同一體性本無修證本無得失無煩惱可斷無菩提可求人與非人性相平等古德著語云掬水月在手弄花香滿衣又古澗寒泉湧青松雪後凋大圓頌云吾佛法藏撈摝衆生百千三昧彈指圓成大慧頌云十方通攝了無遺三際全超在此時聖號凡名同一舌劣形殊相漫多岐家家門外長安路處處窟中師子兒打破鏡來無一事杜鵑啼在落花枝三理貫帶夫聲色不到語路難詮今古歷然從來無間以言顯道曲為今時竪拂揚眉周遮示誨天然上士豈受提撕中下之機鈎頭取則投機不妙過在何人更或躊躇轉加鈍置理貫帶者理即正位也其正位中自無一法空同實際其實際理地不受一塵古德著語云衆角雖多一麟足矣又動容揚古路不墮悄然機大圓頌云理貫全收萬派同流毗盧華藏物物頭頭大慧頌云真理何曾立一塵呼為正位早疏親烏雞半夜鳴何處枯木花開劫外春信手垂慈常利物擬心執著已乖真君看鶴樹泥洹日曾舉雙趺示衆人四事貫帶夫日月照臨不到天地覆載不著劫火壞時彼常安萬法泯時全體露隨緣不變處閙常寧一道圓光阿誰無分華嚴經云剎説衆生説三世國土一時説古德著語云覓火和煙得擔泉帶月歸又石長無根樹山含不動雲大圓頌云事貫有無纖塵不漏萬象森羅全機無咎大慧頌云轉處孤危萬事休隨緣得旨復何求羣生造化乘斯力一道靈光觸處周即事即真無剩法全心全佛有來由填溝塞壑無人會可笑騎牛更覓牛五理事縱橫帶夫觸目是道絶迹無私佛事門中通貫實際圓融事理運用雙行器量堪任隨機赴感門風露布各在當人建立宗乘強生枝節出門問路指東劃西歷劫頑臣二字疑誤如何扣發古德著語云針鋒頭上翻筋斗紅罏𦦨裏碧波生又猿抱子歸青嶂裏鳥銜花落碧巖前大圓頌云理事縱橫照用齊行者邊那邊日午三更大慧頌云塵塵實際本和融舉體全該理事同應物行權無定法隨緣立理絶羅籠竿頭有路通車馬棒下無生觸祖翁出沒縱橫全體用夕陽西去水流東六屈曲垂帶夫垂者聖人垂機接物也屈曲者脫珍御服著弊垢衣也同安云權挂垢衣云是佛却裝珍御復名誰珍御名不出世垢衣名出世僧問石門徹和尚雲光法師為什麼却作牛去徹云陋巷不騎金色馬回塗却著破襴衫聖人成佛後却為菩薩導利衆生是名不住無為不盡有為矣文殊師利問維摩詰云菩薩云何通達佛道維摩詰云菩薩行於非道是名通達佛道古德著語云慈雲普覆無邊際枯木無花爭奈何又宛轉是非從曲直個時消息解通風大圓頌云屈曲垂慈棒喝齊施覆藏密旨少室靈枝大慧頌云不裝珍御示初機出世權披弊垢衣細路屈盤連夜過故鄉迢幾時歸垂絲千尺鈎還曲利物多方語帶悲休戀長安風物好得便宜處落便宜七妙叶兼帶汝州風穴和尚示衆云夫參學眼目臨機直須大用現前莫自拘於小節設使言前薦得猶是滯殼迷封縱饒句下精通未免觸途狂見勸汝諸人應是從前依他作解明昧兩岐凡聖疑情一時掃却直教個個如師子兒哮吼一聲壁立萬仞誰敢正眼覷著覷著則瞎却渠眼古德著語云一句曲含千古韻萬重雲散月來初又垂絲千尺意在深潭大圓頌云妙叶真機境物如如是凡是聖無欠無餘大慧頌云擡搦由來作者知個中一字兩頭垂同生同死何時曉雙放雙收舉世疑照膽蟾光沉碧漢拍天滄海浸須彌聞韶忘味有餘樂方識詩人句外奇八金針雙鎖帶夫雞足分燈之後少林傳芳以來各闡玄風互興佛事若憑言詮為據斷滅法門更或造作修功平沉千聖頭頭顯露物物明真不用躊躇直截便道古德著語云風吹南岸柳雨打北池蓮又白鷺下田千點雪黃鸝上樹一枝花大圓頌云金針雙鎖全心印可有句無句千花萬朵大慧頌云突出全機理事玄東村王老夜燒錢等間得路明如日舉步回頭直似弦玄要並行無別語機緣才兆不堪傳從來大道無拘束信手拈來百事全九平懷常實帶洛浦和尚示衆云末後一句始到牢關把斷要津不通凡聖尋常向汝諸人道任從天下樂欣欣我獨不肯何故靈龜負圖自取喪身之兆鳳縈金網擬趨霄漢以何期直須旨外明機莫向言中取則所以道石人機似汝也解唱巴歌汝若似石人雪曲也應和僧問南泉如何是道泉云平常心是道如達平常道也見山即是山見水即是水信手拈來草無可無不可設使風來樹動浪起船高春生夏長秋收冬藏有何差異但得風調雨順國泰民安邊方寧靜君臣道合豈在麒麟出現鳳凰來儀方顯祥瑞哉但得理歸其道事乃平實無聖可求無凡可舍內外平懷泯然自盡所以諸聖語言不離世諦隨順世間會則塗中受用不會則世諦流布古德著語云常因送客處憶得別家時又秋風吹渭水落葉滿長安大圓頌云平懷常實事圓理畢露柱燈籠無得無失大慧頌云更無回互本圓成覿面無私一體平水上東山行不住火中木馬夜嘶鳴人間但見浮雲白天外常看列岫橫若謂平常心是道擬心已在鐵圍城師初謁汾陽既謁汝海皆受記莂後過大陽與明安語甚相契明安以皮履直裰示之師曰某甲已自有師當持此衣履求人付之俾續洞上宗風如何明安遂以付師且授偈曰楊廣山前草憑君待價焞異苗翻茂處深密固靈根復書其尾曰得法者潛衆十年方可闡揚師拜受辭去後得投子青乃授之俾嗣明安焉潤州金山曇頴達觀禪師首謁大陽玄禪師遂問洞山特設偏正君臣意明何事陽曰父母未生時事師曰如何體會陽曰夜半正明天曉不露師罔然遂謁谷隱舉前話隱曰大陽不道不是祇是口門窄滿口説未盡老僧即不然師問如何是父母未生時事隱曰糞𡐊子師曰如何是夜半正明天曉不露隱曰牡丹花下睡貓兒師愈疑駭一日普請隱問今日運薪耶師曰然隱曰雲門問僧人搬柴柴搬人如何會師無對隱曰此事如人學書點畫可效者工否者拙蓋未能忘法耳當筆忘手手忘心乃可也師於是默契良久曰如石頭云執事元是迷契理亦非悟隱曰汝以為藥語為病語師曰是藥語隱呵曰汝以病為藥又安可哉師曰事如函得蓋理如箭直鋒妙寧有加者而猶以為病實未喻旨隱曰妙至是亦祇名理事祖師意旨智識所不能到矧事理能盡乎故世尊云理障礙正見知事障續諸生死師恍如夢覺曰如何受用隱曰語不離窠臼安能出蓋纏師歎曰才涉唇吻便落意思盡是死門終非活路住後示衆曰才涉唇吻便落意思盡是死門俱非活路直饒透脫猶在沉淪莫教孤負平生虗度此世要得不孤負平生麼拈拄杖卓一下曰須是莫被拄杖謾始得看看拄杖子穿過你諸人髑髏𨁝跳入你鼻孔裏去也又卓一下過京師寓止駙馬都尉李端願之園李公問曰人死識歸何所師曰未知生焉知死李曰生則端願已知師曰生從何來李擬對師揕其胸曰祇在這裏思量個甚麼李曰會也只知貪程不知蹉路師托開曰百年一夢李説偈曰三十八歲懵然無知及其有知何異無知滔滔汴水隱隱隋堤師其歸矣箭浪東馳又問地獄畢竟是有是無師曰諸佛向無中説有眼見空花太尉就有裏尋無手𭢈水月堪笑眼前見牢獄不避心外見天堂欲生殊不知欣怖在心善惡成境太尉但了自心自然無惑李曰心如何了師曰善惡都莫思量李曰不思量後心歸何所師曰且請太尉歸宅會元以此則列問人死後識歸何所前此從僧寶傳傳不録李偈上堂山僧平生意好相撲祇是無人搭對今日且共首座搭對捲起袈裟下座索首座相撲座才出師曰平地上喫交便歸方丈嘉祐四年除夕遣侍者馳書別揚州刁景純學士曰明旦當行不暇相見厚自愛景純開書大驚曰當奈何復書決別而已中夜候吏報揚州持書船將及岸師欣然遣撾鼓升座敘出世本末謝裨贊叢林者勸修勿怠下座讀刁書畢大衆擁步上方丈師跏趺揮令各遠立良久乃化五年元日也唐州大乘山德遵禪師問谷隱曰古人索火意旨如何曰任他滅師曰滅後如何曰初三十一師曰恁麼則好時節也曰汝見甚麼道理師曰今日一場困隱便打師乃有頌曰索火之機實快哉藏鋒妙用少人猜要會我師親的旨紅罏火盡不添柴景清居素禪師僧問即此見聞非見聞為甚麼法身有三種病二種光師曰填凹就缺駙馬李遵勗居士謁谷隱問出家事隱以崔趙公問徑山公案答之公於言下大悟作偈曰學道須是鐵漢著手心頭便判直趨無上菩提一切是非莫管宗門武庫云李公得心要於石門聰禪師嘗作二句偈寄發運朱正辭時許式為淮南漕朱以李頌示許請賡之朱曰雨催樵子還家許云風送漁舟到岸又請浮山遠禪師和之山偈曰學道須是鐵漢著手心頭便判通身雖是眼睛也待紅罏再煅鉏麑觸樹迷封豫讓藏身吞炭鷺飛影落秋江風送蘆花兩岸諸公見大敬之李後復續末二句今所傳惟李一頌而已公一日與堅上座送別公問近離上黨得屆中都方接麈談遽回虎錫指雲屏之翠嶠訪雪嶺之清流未審此處彼處的的事作麼生座曰利劒拂開天地靜霜刀才舉斗牛寒公曰恰值今日耳聵座曰一箭落雙雕公曰上座為甚麼著草鞋睡座以衣袖一拂公低頭曰今日可謂降伏也座曰普化出僧堂臨終時膈胃躁熱有尼道堅謂曰衆生見劫盡大火所燒時都尉切宜照管主人公公曰大師與我煎一服藥來堅無語公曰這師姑藥也不會煎得公與慈明問答才罷泊然而終語具慈明章中東京華嚴道隆禪師初參石門徹語具洞山章中後嗣廣慧有乘侍者來自大陽師問在大陽得力句對曰明安嘗問曰有一人遍身紅爛臥在荊棘林中火繞周匝若親近得此人禪門大啓若親近不得佛法無靈驗時對曰六根不具七識不全者親近得此人明安曰令渠出來我要相見時又答曰適來無左右祇對和尚安曰相隨來也即禮拜退師曰若果如此冷如毛粟細如氷雪乘曰禪師親見石門如何却嗣廣慧師曰我初見廣慧渠方欲剃髮使我擎凳子來廣慧曰道者我有凳子詩聽取詩曰放下便平穩我時便肯伊後因敘陳在石門所悟公案廣慧曰石門所敘如百味珍饈只是飽人不得後來有一炷香不欲兩頭三緒為伊燒却乘曰藝不辜人僧誦璉公答上問佛偈曰有節非干竹三星偃月宮一人居日下弗與衆人同師曰諸佛説心為破心相璉作此偈虗空釘橛也乃曰虗空釘鐵橛平地起骨堆莫將間學解安著佛階梯師初至景德寺夜臥寺門下仁宗夢至寺見龍蟠於地覺令中使物色得師夜臥狀大喜因召對甚見眷遇未幾師竟薦璉公而退隱華嚴歿時年八十餘方盛暑安坐七日手足柔和如生文公楊億居士字大年幼舉神嬰及壯負才名而未知有佛一日過同僚見讀金剛經笑且罪之彼讀自若公疑之曰是豈出孔孟之右乎何甚因閲數葉懵然始少敬信後會翰林李公維勉令參問及由祕書監出守汝州首謁廣慧慧接見公便問布鼓當軒擊誰是知音者慧曰來風深辨公曰恁麼則禪客相逢祇彈指也慧曰君子可八公應喏喏慧曰草賊大敗夜語次慧曰祕監曾與甚人道話來公曰某曾問雲巖諒監寺兩個大蟲相咬時如何諒曰一合相某曰我祇管看未審恁麼道還得麼慧曰我這裏即不然公曰請和尚別一轉話慧以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裏走金毛師子變作狗擬欲將身北斗藏應須合掌南辰後公問廣慧曰承和尚有言一切罪業皆因財寶所生勸人疏於財利況南閻浮提衆生以財為命國以財聚人教中有財法二施何得勸人踈財乎慧曰幡竿尖上鐵籠頭公曰海壇馬子似驢大慧曰楚雞不是丹山鳳公曰佛滅二千歲比丘少慙愧公因微恙問環大師曰某今日忽違和大師慈悲如何醫療環曰丁香湯一碗公便作吐勢環曰恩愛成煩惱環為煎藥次公呌曰有賊環下藥於公前叉手側立公瞪目視之曰少叢林漢環拂袖而出又一日問曰某四大將欲離散大師如何相救環乃捶胸三下公曰賴遇作家環曰幾年學佛法俗氣猶未除公曰禍不單行環作噓噓聲公書偈遺李都尉曰漚生與漚滅二法本來齊欲識真歸處趙州東院西尉見遂曰泰山廟裏賣紙錢尉即至公已逝矣舒州投子義青禪師青社李氏子七齡頴異往妙相寺出家試經得度習百法論未幾歎曰三祇塗遠自困何益乃入洛聽華嚴五年反觀文字一切如肉受串處處同其義味嘗講至諸林菩薩偈曰即心自性忽猛省曰法離文字寧可講乎即棄去遊方至於浮山時圓鑑禪師居會聖巖夢得俊鷹畜之既覺而師屆旦至鑑以為吉禮延之令看外道問佛不問有言不問無言因緣經三載一日問曰汝記得話頭麼試舉看師擬對鑑掩其口師了然開悟遂禮拜鑑曰汝妙悟玄機耶師曰設有也須吐却時資侍者在旁曰青華嚴今日如病得汗師回顧曰合取狗口若更叨叨我即便嘔自此復經三年鑑時出洞下宗旨示之師悉妙契遂付以大陽衣履曰代吾續洞上宗風善自護持無留此間復令見圓通秀禪師師至彼無所參問惟嗜睡而已執事白通通即曳杖入堂見師正睡乃擊牀呵曰我這裏無間飯與上座喫了打眠師曰和尚教某何為通曰何不參禪去師曰美食不中飽人喫通曰爭奈大有人不肯上座師曰待肯堪作甚麼通曰上座曾見甚麼人來師曰浮山通曰怪得恁麼頑賴遂握手相笑歸方丈師平生不蓄長物敝衲楮衾而已初投子大同大師有記曰吾塔若紅是吾再來人偶修塔作瑪瑙色未幾而師領院事山中素無水衆苦之忽有泉出山石間甘涼清潔郡守賀公遂名之為再來泉元豐六年五月四日盥沐升堂別衆罷寫偈曰兩處住持無可助道珍重諸人不須尋討投筆而化郢州興陽清剖禪師在大陽作園頭種瓜次陽問甜瓜何時得熟師曰即今熟爛了也曰揀甜底摘來師曰與甚麼人喫曰不入園者師曰未審不入園者還喫也無曰汝還識伊麼師曰雖然不識不得不與陽笑而去僧問娑竭出海乾坤震覿面相逢事若何師曰金翅鳥王當宇宙個中誰是出頭人曰忽遇出頭時又作麼生師曰似鶻捉鳩君不信髑髏前驗始知真曰恁麼則叉手當胸退身三步也師曰須彌座下烏龜子莫待重遭點額回幻寄曰剖公著賊不知更授之太阿可悲可痛臥疾次大陽問是身如泡幻泡幻中成辦若無個泡幻大事無由辦若要大事辦識取個泡幻作麼生師曰猶是這邊事陽曰那邊事作麼生師曰匝地紅輪秀海底不栽花陽笑曰乃爾惺惺耶師喝曰將謂我忘却竟爾趨惠州羅浮山顯如禪師初到大陽陽問汝是甚處人曰益州陽曰此去幾里曰五千里陽曰你與麼來還曾踏著麼曰不曾踏著陽曰汝解騰空那曰不解騰空陽曰爭得到這裏曰步步不迷方通身無辨處陽曰汝得超方三昧耶曰聖心不可得三昧豈彰名陽曰如是如是汝應信此即本體全彰理事不二善自護持越州天衣義懷禪師世以漁為業母夢星隕於屋已而娠兒稚時坐船尾得魚輒放去父呵笞之不為介意長遊京師遂依景德寺剃染有言法華者異僧也於市井中見師忽拊師背曰雲門臨濟去師遂謁金鑾善不契復謁葉縣省又不契東遊至翠峰謁明覺覺問汝名甚麼曰義懷覺曰何不名懷義曰當時致得覺曰誰為汝立名曰受戒來十年矣覺曰汝行腳費却多少草鞋曰和尚莫謾人好覺曰我也沒量罪過汝也沒量罪過你作麼生師無語覺打曰脫空漫語漢出去入室次覺曰恁麼也不得不恁麼也不得恁麼不恁麼總不得師擬議覺又打出如是者數四尋為水頭因汲水折擔忽悟作投機偈曰一二三四五六七萬仞峰頭獨足立驪龍頷下奪明珠一言勘破維摩詰覺聞拊几稱善示衆古人云五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人翁有老宿拈云既不識他當初問甚麼人賃恁麼拈也太遠在何故須知死人路上有活人出身處活人路上死人無數那個是活人路上死人無數那個是死人路上活人出身處若檢點得分明拈却炙脂帽子脫却鶻臭布衫妙喜曰天衣古佛美則美矣善則未善具眼衲僧試甄別看舉金剛經云若見諸相非相即見如來法眼云若見諸相非相即不見如來師曰若見諸相非相眼在甚麼處此語有兩負門本覺一頌云諸相非相孰能諳見與不見要明參兩處負門如透徹此時方得見瞿曇上堂鴈過長空影沉寒水鴈無遺蹤之意水無留影之心若能如是方解向異類中行不用續鳧截鶴夷嶽盈壑放行也百醜千拙收來也欒欒拳拳用之則敢與八大龍王鬬富不用都來不直半文錢參雪竇聞僧舉此以為類己也上堂髑髏常干世界鼻孔摩觸家風芭蕉聞雷開葵花隨日轉諸仁者芭蕉聞雷開還有耳麼葵花隨日轉還有眼麼若也會得西天即是此土若也不會七九六十三收室中問僧無手人能行拳無舌人解言語忽然無手人打無舌人無舌人道個甚麼晚年以疾居池陽杉山菴門弟子智才住臨平之佛日迎歸侍奉才如蘇城未還師速其歸及踵門師告之曰時至吾行矣才曰師有何語示徒乃説偈曰紅日照扶桑寒雲封華嶽三更過鐵圍拶折驪龍角才問卵塔已成如何是畢竟事師舉拳示之遂就寢推枕而寂宗道者見雪竇後超放自如往來舒蘄間多留於投子性嗜酒無日不醉村民愛敬之每餉以醇醪一日方入浴有送榼者至乃裸而出接酒竟去人皆大笑而宗傲然不怍嘗散衣下山有逆而問者曰如何是道者家風對曰袈裟裹草鞋意旨如何曰赤腳下桐城陳退夫初赴省闈問曰瓘此行欲作狀元得否宗熟視曰無時即得退夫竟以第三名上第而時彥者作魁修撰曾會居士幼與明覺同舍及冠異途天禧間公守池州一日會於景德寺公遂以中庸大學參以楞嚴符宗門語句質明覺覺曰這個尚不與教乘合況中庸大學耶學士要徑捷理會此事乃彈指一下曰但恁麼薦取公於言下領旨南康軍雲居曉舜禪師參洞山一日如武昌行乞首謁劉居士士曰老漢有一問若相契即請開疏若不相契即請還山遂問古鏡未磨時如何師曰黑似漆磨後如何師曰照天照地士長揖曰且請上人還山師懡㦬而歸洞山問其故師述前語山曰汝問我師理前問山曰此去漢陽不遠進後語山曰黃鶴樓前鸚鵡洲師於言下大悟師嘗譏天衣説葛藤禪一日聞懷遷化於法堂上合掌云且喜葛藤樁子倒了也秀圓通時在會中作維那每見訶罵不已乃謂同列曰我須與這老漢理會一上及夜參又如前訶罵秀出衆厲聲曰豈不見圓覺經中道師遽曰久立大衆伏惟珍重便歸方丈秀曰這老漢通身是眼罵得懷和尚也翠巖真點胸常罵師説無事禪石霜永和尚令人傳語云舜在洞山悟古鏡因緣豈是説無事禪你罵他自失却一隻眼師聞之作頌曰雲居不會禪洗腳上牀眠冬瓜直儱侗瓠子曲彎彎永和尚亦作頌曰石霜不會禪洗腳上牀眠枕子撲落地打破常住磚上堂諸方有弄蛇頭撥虎尾跳大海劍刃裏藏身雲居這裏寒天熱水洗腳夜間脫襪打睡早朝旋打行纏風吹籬倒喚人夫劈篾縛起師問秀圓通曰你見懷和尚有何言句秀舉懷投機頌師曰不好別有甚言句秀曰一日有長老來參懷舉拂子云會麼云不會懷云耳朵兩片皮牙齒一具骨師歎曰真善知識幻寄曰秀鐵面看風使帆舜老夫喫毒不知杭州佛日契嵩禪師得法於洞山師夜則頂戴觀世音菩薩像而誦其號必滿十萬乃寢自是世間經書章句不學而能作原教論十萬餘言以抗宗韓排佛之説讀者畏服後居永安蘭若著禪門定祖圖傳法正宗記輔教編上進仁宗嘉賞令編次入藏賜號明教熙寧五年六月四日晨興寫偈曰後夜月初明吾今獨自行不學大梅老貪聞鼯鼠聲至中夜而化闍維不壞者五頂耳舌童真及常所持數珠頂骨出舍利紅白晶潔狀如大菽道俗合諸不壞葬於故居永安院之左師藤州鐔津李氏子奉律甚嚴苦硬清約之風足以配鍾山僧遠嘗有書與月禪師曰數年來欲製紙被一翻以禦苦寒今幸已成之想聞之大笑也東坡曰吾入吳尚及見嵩其為人常瞋蓋以瞋為佛事云太守許式得法於洞山一日與泐潭澄上藍溥坐次潭問聞郎中道夜坐連雲石春栽帶雨松當時答洞山甚麼話公曰今日放衙早潭曰聞答泗州大聖揚州出現語是否公曰別點茶來潭曰名不虗傳公曰和尚早晚回山潭曰今日被上藍破藍便喝潭曰須你始得公曰不奈船何打破戽斗公入上藍僧堂問首座年多少曰六十八公曰僧臘多少曰四十七夏公曰聖僧得幾夏曰與虗空齊受戒公拍板頭曰下官喫飯不似首座喫鹽多荊門軍玉泉承皓禪師無盡居士張公奉使京西南路就謁之問曰師得法何人師曰復州北塔廣和尚公曰與伊相契可得聞乎師曰只為伊不肯與人説破公善其言製犢鼻裩書列代祖師名字乃曰惟有文殊普賢較些子且書於帶上故叢林目為皓布裩元豐間首衆於襄陽谷隱有鄉僧亦效之師見而詬曰汝具何道理敢以為戲事耶嘔血無及耳僧尋於鹿門如所言而逝僧入室次狗子在室中師叱一聲狗子便出去師曰狗却會你却不會一日衆集師問曰作什麼曰入室師曰待我抽解來及上廁來見僧不去以拄杖趕散一日為張無盡舉傅大士頌曰空手把鉏頭步行騎水牛人從橋上過橋流水不流又舉洞山頌曰五臺山頂雲蒸飯佛殿階前狗尿天剎竿頭上煎鎚子三個猢猻夜簸錢此二頌只頌得法身邊事不頌得法身向上事張曰請和尚頌師曰昨夜雨雱烹打倒蒲萄棚知事普請行者人力拄底拄撑底撑撑撑拄拄到天明依舊可憐生示寂門人圍繞師笑曰吾年八十一老死舁尸出兒郎齊著力一年三百六十日言畢而逝明州育王山懷璉大覺禪師修撰孫覺莘老書問宗教璉答之其略曰妙道之意聖人嘗寓之於易至周衰先王之法壞禮義亡然後奇言異術間出而亂俗逮我釋迦入中土純以第一義示人而始末設為慈悲以化衆生亦所以趨時也自生民以來醇朴未散則三皇之教簡而素春也及情竇日鑿則五帝之教詳而文夏也時與世異情隨日遷故三王之教密而嚴秋也昔商周之誥誓後世學者有所難曉彼當時人民聽之而不違則俗與今何如也及其弊而為秦漢也則無所不至而天下有不忍願聞者於是我佛如來一推之以性命之理教之以慈悲之行冬也天有四時循環以生成萬物而聖人之教迭相扶持以化成天下亦猶是而已矣至其極也皆不能無弊弊迹也道則一耳要當有聖賢者世起而救之也自秦漢至今千有餘歲風俗靡靡愈薄聖人之教裂而鼎立互相詆訾不知所從大道寥寥莫知返良可歎也幻寄曰璉公如相如指璧叔孫譽秦惟取濟事非本然語師持律嚴甚仁廟嘗賜以龍腦鉢盂師對使者焚之曰吾法以壞色衣以瓦鉢食此鉢非法仁廟益嘉歎舜老夫為郡吏橫民其衣走依師師館之正寢自處偏室執弟子禮甚恭貴人過師見咸怪之師曰吾少嘗問道焉其可以像服二吾心哉仁廟知之賜舜再落髮居棲賢師自京師乞還山時英宗賜手詔有經過菴院任性住持語師藏之不以示人東坡為師撰宸奎閣記欲一見之師終不出示寂後始得之笥中示寂之時年已八十二無疾而化廬山圓通居訥禪師生而英特讀書過目成誦初以義學冠兩川耆年多下之會有禪者自南方來以祖道相策發因出蜀放浪荊楚久之無所得復西至襄州洞山留止十年讀華嚴論至曰須彌在大海中高八萬四千由旬非手足攀攬可及以明八萬四千塵勞山住煩惱大海衆生有能於一切法無思無為即煩惱自然枯竭塵勞成一切智之山煩惱成一切智之海若更起心思慮即有攀緣即塵勞愈高煩惱愈深不能以至諸佛智頂也三復之歎曰石鞏云無下手處而馬祖曰曠劫無明今日一切消滅非虗語也住圓通時仁宗聞其名詔住淨因院將親召對師稱目疾不赴舉大覺璉以自代臨衆簡嚴不妄言笑常習定初叉手自如中夜漸升至膺侍者每視以候雞鳴其精進如此熙寧四年三月十六日無疾而化潭州興化紹銑禪師當南公盛化時荊湖衲子奔趨江南恆百里無托宿且多為盜劫師半五十為館請僧主之以接納俾得宿食而去諸方高其風比化去闍維收舍利兩目睛不壞腸二亦不壞益以油火焚之如鐵帶屈折色鮮明因併塔焉洪州法昌倚遇禪師漳州林氏子謁浮山遠遠指謂人曰此後學行腳樣子也既謁衡嶽谷泉三至三逐語具谷泉章謁北禪禪問近離甚處師曰福嚴禪曰思大鼻孔長多少師曰與和尚當時見底一般禪曰汝道我見時長多少師曰和尚大似不曾到福嚴禪曰學語之流又問來時馬大師安樂否師曰安樂禪曰向汝道甚麼師曰教和尚莫亂統禪曰念汝新到不能打得你師曰某甲亦放和尚過茶罷禪問鄉里甚處師曰漳州禪曰三平在彼作甚麼師曰説禪説道禪曰年多少師曰與露柱齊年禪曰有露柱且從無露柱年多少師曰無露柱一年也不少禪曰夜半放烏雞師事北禪最久慈明過北禪師侍立禪曰汾陽師子可煞威獰明曰不道來者咬殺禪曰審如此汾陽門下道絶人荒耶明舉拂子曰這個因甚到今日禪未及對師從旁曰養子不及父家門一世衰禪呵曰汝具甚眼目乃敢爾師曰若是咬人師子終不與麼明將去至龍牙像前指問師曰誰像師曰龍牙像明曰既是龍牙像為甚在北禪師曰兩彩一賽明曰像在此龍牙在甚處師擬對明掌之曰莫道不能咬人師曰乞兒見小利明呵逐之遊廬山寓圓通時大覺璉公方赴詔辭衆曰此事分明須薦取莫教纍劫受輪回師問曰如何是此事曰薦取師曰頭上是天腳下是地薦個甚麼曰不是知音者徒勞話歲寒師曰豈無方便曰胡人飲乳反怪良醫師曰暴虎憑河徒誇好手拍一拍歸衆師在雙嶺受法昌請與英勝二首座相別曰三年聚首無事不知檢點將來不無滲漏以拄杖畫一畫曰這個即且止宗門事作麼生英曰須彌安鼻孔師曰恁麼則臨崖看滸眼特地一場愁英曰深沙努眼睛師曰爭奈聖凡無異路方便有多門英曰鐵蛇鑽不入師曰這般漢有甚共語處英曰自緣根力淺莫怨太陽春却畫一畫曰宗門事且止這個事作麼生師便掌英曰這漳州子莫無去就師曰你這般見解不打更待何時又打英曰也是老僧招得住後英勝到山相訪英曰和尚尋常愛點檢諸方今日因甚麼却來古廟裏作活計師曰打草祇要驚蛇英曰莫塗糊人好師曰你又刺頭入膠盆作甚麼英曰古人道我見兩個泥牛鬬入海所以住此山未審和尚見個甚麼師曰你他時異日有把茆蓋頭人或問你作麼生祇對英曰山頭不如嶺尾師曰你且道還當得住山事也無英曰使钁不及拖犂師曰還曾夢見古人麼英曰和尚作麼生師展兩手英曰蝦跳不出斗師曰休將三寸燭擬比太陽輝英曰爭奈公案見在師曰亂統禪和如麻似粟又問二人我欲來這裏起法堂且道作得個甚麼向當英曰賊是小人師曰邵武子動著便作屎臭英曰曾經霜雪苦師曰明珠自有千金價誰肯林間打雀兒英曰大似持鉢不得詐道不飢師却指勝曰你且道合作得個甚麼向當勝曰本來無位次不用強安排師曰你這驢漢安向甚處著勝曰一任敲磚打瓦師曰也只是個杜撰巡官英曰若是千金寶何須打雀兒師曰東家人死西家助哀英曰路見不平師因黃龍南公舉程大卿看生緣話師曰何不直下與伊剿絶却南曰也曾為蛇畫足是伊自不瞥地師曰和尚如何為他南曰咬盡生薑呷盡醋師曰流俗阿師又恁麼去南曰和尚意作麼生師拈起拂子便打南曰這老漢也是無人情師又舉在湖南時問興化知有底人向甚麼處去化曰善財拄杖子我又問不問善財拄杖子知有底人向甚麼處去化曰或則登山或則臨水我又曰和尚只要步步登高不解從空放下化曰老僧雖則年邁要且不負來機南曰和尚當時作麼生師曰我錯怪興化南曰而今知也且道從甚麼處去師曰你問阿誰南曰佯聾詐啞作甚麼師曰雖然如是要且不負來機栽松次南公至南曰小院子栽許多松作麼師曰臨濟道底曰栽得多少師曰但見猿啼鶴宿聳漢侵雲南指石曰這裏何不栽師曰功不浪施曰也知無下手處師指石上松曰從何處得來南大笑曰蒼天蒼天乃作偈曰頭戴華巾離少室手携席帽出長安鷲峰峰下重相見鼻孔原來總一般又畫此相示師師和曰葫蘆棚上挂冬瓜麥浪堆中釣得蝦誰在畫樓沽酒處相要來喫趙州茶又畫此相答之南又作偈曰鐵牛對對黃金角木馬雙雙白玉蹄為愛雪山香草細夜深乘月過前溪又畫此相示師師復和偈曰玉麟帶月離霄漢金鳳銜花下彩樓野老不嫌公子醉相將携手御街遊復畫此相答之大寧寬禪師至師畫地作此相便曳钁出翌日未升座謂寬曰昨日公案如何寬畫此相即抹撒之師曰寬禪頭名下無虗人乃升座曰忽地晴天霹靂聲禹門三級浪崢嶸幾多頭角為龍去蝦蟹依然努眼睛寶覺心禪師問曰不是風兮不是幡黑花貓子面門斑夜行人只貪明月不覺和衣渡水寒豈不是和尚偈耶師曰是覺曰也大奇師曰汝道祖師前段為人後段為人曰祖師終不妄語師曰意作麼生曰豈不見道不是風動不是幡動師曰如狐渡水有甚快活曰師意如何師以拂子搖之曰也是為蛇畫足師曰亂統作麼曰須是和尚始得法昌在分寧之北千峰萬壑古屋數間師刀耕火種殊安樂之衲子至不堪其枯淡多棄去開罏日以一力撾鼓升座曰法昌今日開罏行腳僧無一個惟有十八高人緘口圍罏打坐不是規矩嚴難免見諸人話墮直饒口似稱錘未免燈籠勘破不知道絶功勳安用修因證果喝一喝云但能一念回心即脫二乘羈鎖垂語云我要一個不會禪底作國師妙喜云且道是醍醐句毒藥句龍圖徐公禧與師為布衣交師將化前一日以偈遺之曰今年七十七出行須擇日昨夜問龜哥報道明朝吉徐覽偈悚然因要靈源叟馳往則見師方坐寢室誡衆以愛惜常住精進參求語畢舉拄杖曰且道這個分付阿誰徐與靈源皆屏息擲拄杖投牀枕臂而化南康軍雲居山了元佛印禪師幼稱神童長慕空宗遂剃染謁開先得法蘇子瞻與師善師居金山時蘇以書抵師期相過晤言且曰不必出山當如趙州上等接人師得書徑來蘇迎笑問之師答以偈曰趙州當日少謙光不出三門見趙王爭似金山無量相大千都是一繩牀蘇拊掌稱善師入室次蘇適至師曰此間無坐處蘇曰暫借佛印四大為座師曰山僧有一問學士道得即請坐道不得即輸玉帶蘇欣然請問師曰四大本空五陰非有居士向甚麼處坐蘇遂施帶師答以一衲蘇述偈曰病骨難將玉帶圍鈍根仍落箭鋒機欲教乞食歌姬院且與雲山舊衲衣西塞帥王公韶自以殺業重祈為澡雪請説法上藍師炷香曰此香為殺人不眨眼上將軍立地成佛大居士衆稱善韶亦悠然意消李公麟為師寫照師令作笑容自為贊曰李公天上石麒麟傳得雲居道者真不為拈花明大事等間開口笑何人泥牛漫向風前嗅枯木無端雪裏春對現堂堂俱不識太平時代自由身元符元年正月四日與客語有會其心軒渠一笑而化其令畫笑狀而贊之非苟然也有鄭夷甫者吳人也少年登第術者推其壽不過三十五心甚憂之既聞師於談笑間化去曰吾不得壽得如元公復何憾哉乃與禪者遊讀楞嚴經歲餘忽有所悟曰生死之理我知之矣遂釋然既而預知死日至期沐浴更衣親督人灑掃園亭又焚香擇時指畫之間屹然立化其手猶作指畫狀杭州慧日永明延壽智覺禪師餘杭王氏子兒稚知敬佛乘及冠日一食持法華經六旬而悉成誦感羣羊跪聽年二十八為華亭鎮將見漁船萬尾戢戢惻然悉易以投之江依翠巖參公學出世法吳越文穆王聞而嘉之聽師剃染持頭陀行精進無上嘗習定天台天柱峰下者九旬有鳥類斥鷃巢衣褶中暨謁韶國師受心印初住雪竇屢遷至永明衆至二千時號慈氏下生僧問如何是永明妙旨師曰更添香著曰謝師指示師曰且喜沒交涉僧禮拜師曰聽取一偈欲識永明旨門前一湖水日照光明生風來波浪起二僧來參乃問參頭曾到此間否曰曾到又問第二上座曾到否曰不曾到師曰一得一失少選侍僧問適來二僧未審那個得那個失師曰汝曾識這二僧也無曰不曾識師曰同坑無異土指法以佛祖之語為銓準曰迦葉波初聞偈曰諸法從緣生諸法從緣滅我師大沙門嘗作如是説此佛祖骨髓也龍勝曰無物從緣生無物從緣滅起惟諸緣起滅惟諸緣滅乃知色生時但是空生色滅時但是空滅譬如風性本不動以緣起故動倘風本性動則寧有靜時哉密室中若有風風何不動若無風遇緣即起非特風為然一切法皆然維摩謂文殊師利曰不來相而來不見相而見文殊乃曰如是居士若來已更不來若去已更不去所以者何來者無所從來去者無所至所可見者更不可見此緣起無生之旨也問長沙偈曰學道之人不識真只為從前認識神無始時來生死本癡人喚作本來人豈離識性別有真心耶師曰如來世尊於首楞嚴會上為阿難揀別詳矣而汝猶故不信阿難以推窮尋逐者為心遭佛呵之推窮尋逐者識也若以識法隨相行則煩惱名識不名心也意者憶也憶想前境起於妄並是妄識不干心事心非有無有無不染心非垢淨垢淨不汙乃至迷悟凡聖行住坐臥並是妄識非心也心本不生今亦不滅若知自心如此於諸佛亦然故維摩曰直心是道場無虗假故師以一代時教流傳此土不見大全而天台賢首慈恩性相三宗又互相矛盾乃為重閣館三宗知法比丘更相設難至波險處以心宗要旨折中之因集方等祕經六十部西天此土聖賢之語三百家以佐三宗之義為一百卷號宗鏡録天下學者傳誦焉僧問如和尚所論宗鏡惟立一心之旨能攝無量法門此心含一切法耶生一切法耶若生者是自生歟從他而生歟共生無因而生歟答曰此心不從不橫非他非自何以知之若言含一切法即是橫若言生一切法即是從若言自生則心豈復生心乎若言他生即不得自矧曰有他乎若言共生則自他尚無有以何為共哉若言無因而生者當思有因尚不許言生況曰無因哉僧曰審非四性所生則世尊云何説意根生意識心如世畫師無不從心造然則豈非自生乎又説心不孤起必藉緣而起有緣思生無緣思不生則豈非他生乎又説所言六觸因緣生六受得一切法然則豈非共生乎又説十二因緣非佛天人修羅作性自爾故然則豈非無因而生乎師笑曰諸佛隨緣差別俯應羣機生善破惡令入第一義諦是四種悉檀方便之語如以空拳示小兒耳豈有實法哉僧曰然則一切法是心否曰若是即成二僧曰審爾則一切不立俱非耶曰非亦成二汝豈不聞首楞嚴曰成真文殊無是文殊若有是者則二文殊然我今日非無文殊於中實無是非二相僧曰既無二相宗一可乎曰是非既乖大旨一二還背圓宗僧曰如何用心方稱此旨曰境智俱忘云何説契僧曰如是則言思道斷心智路絶矣曰此亦強言隨他意轉雖欲隱形而未忘迹僧曰如何得形迹俱忘曰本無朕迹云何説忘僧曰我知之矣要當如人飲水冷暖自知當大悟時節神而明之曰我此門中亦無迷悟明與不明之理撒手似君無一物徒勞辛苦説千般此事非上根大器莫能擔荷先德曰盡十方世界覓一人為伴無有也又曰止是一人承紹祖位終無第二人若未親到謾應作漫疲神思借曰玄之又玄妙之又妙但是方便門中旁贊助入之語於自己分上親照之時反視之皆為魔説虗妄浮心多諸巧見不能成就圓覺但以形言迹文彩生時皆是執方便門迷真實道要須如百尺竿頭放身乃可耳僧曰願乞最後一言曰化人問幻士谷響答泉聲欲達吾宗旨泥牛水上行又嘗謂門弟子曰夫佛祖正宗則真唯識才有信處皆可為人若論修證之門則諸方皆云功未齊於諸聖且教中所許初心菩薩皆可比知亦許約教而會先以聞解信入後以無思契同若入信門便登祖位且約現今世間之事衆世界中第一比知第二現知第三約教而知第一比知者且如即今有漏之身夜皆有夢夢中所見好惡境界憂喜宛然覺來牀上安眠何曾是實並是夢中意識思想所為則可比知覺時之事皆如夢中無實夫過去未來現在三世境界元是第八阿賴耶識親相分唯是本識所變若現在之境是明了意識分別若過去未來之境是獨散意識思惟夢覺之境雖殊俱不出於意識則唯心之旨比況昭然第二現知者即是對事分明不待立況且如現見青白等物時物本自虗不言我青我白皆是眼識分與同時意識計度分別為青為白以意辨為色以言説為青皆是意言自妄安置以六塵鈍故體不自立名不自呼一色既然萬法咸爾皆無自性悉是意言故曰萬法本間而人自閙是以若有心起時萬境皆有若空心起處萬境皆空則空不自空因心故空有不自有因心故有既非空非有則唯識唯心若無於心萬法安寄又如過去之境何曾是有隨念起處忽然現前若想不生境亦不現此皆是衆生日用可以現知不待功成豈假修得凡有心者並可證知故先德曰如大根人知唯識者恆觀自心意言為境此初觀時雖未成聖分知意言則是菩薩第三約教而知者大經云三界唯心萬法唯識此是所現本理能詮正宗也師乘大願力為震旦法施主居永明十五載度弟子一千五百人入天台山度戒約萬餘人常與七衆授菩薩戒夜施鬼神食朝放諸生類六時散花日夕修持百八事寒暑無替聲被異國高麗遣僧航海問道受師印記者三十六人其國王投書敘門弟子之禮開寶八年十二月示疾二十六日辰時焚香告衆跏趺而化閲世七十有二坐四十二夏塔全身於大慈山洪覺範曰豫初讀自行録録其行事日百八件計其貌狀必枯瘁尫劣及見其畫像凜然豐碩為善陰隲載師用官資放生罪當斬臨刑而樂曰吾活數萬命而死死何憾官司聞而異之乃得釋遂為僧此必為鎮將時放生事然傳與燈録皆無臨刑語未詳彼書何據也杭州五雲山華嚴院志逢禪師生惡薰血膚體香潔受具後常夢升須彌山覩三佛列坐初釋迦次彌勒皆禮其足惟不識第三尊但仰視而已釋尊謂之曰此是補彌勒處師子月佛師方作禮覺後因閲大藏經乃符所夢及得法於國師一日入普賢殿中宴坐倐有一神人跪膝於前師問汝其誰乎曰護戒神也師曰吾患有宿愆未殄汝知之乎曰師有何罪惟一小過耳師曰何也曰凡折鉢水亦施主物師每傾棄非所宜也言訖而隱師自此洗鉢水盡飲之積久因致脾疾十載方愈凡折退飲食及涕唾便利等並宜鳴指默念呪發施心而傾棄之出燈録上堂諸上座捨一知識參一知識盡道善財南遊之式樣且問上座祇如善財禮辭文殊擬登妙峰謁德雲比丘及到彼所何以德雲却於別峰相見夫教意祖意同一方便終無別理彼若明得此亦昭然諸上座即今簇著老僧是相見是不相見此處是妙峰是別峰脫或從此省去可謂不孤負老僧亦常見德雲比丘未嘗剎那相捨還信得及麼開寶四年大將凌超於五雲山創院奉師師每携大扇乞錢買肉飼虎虎每迎之載以還山雍熙二年示寂塔於本院杭州報恩永安禪師開寶七年示寂告衆言別時有僧問昔日如來正法眼迦葉親傳未審和尚玄風百年後如何體會師曰汝甚麼處見迦葉來曰恁麼則信受奉行不忘斯旨去也師曰佛法不是這個道理言訖跏趺而寂闍維舌根不壞柔軟如紅蓮華藏於普賢道場溫州瑞鹿寺上方遇安禪師師事天台閲首楞嚴經到知見立知即無明本知見無見斯即涅槃師乃破句讀曰知見立知即無明本知見無見斯即涅槃於此有省有人語師曰破句了也師曰此是我悟處畢生不易時謂之安楞嚴至道元年春將示寂法嗣蘊仁侍立師説偈示之曰不是嶺頭携得事豈從雞足付將來自古聖賢皆若此非吾今日為君裁付囑已澡身易衣安坐令舁棺至室良久自入棺經三日門人啓棺覩師右脅吉祥而臥四衆哀慟師乃再起升堂説法呵責垂誡此度更啓吾棺者非吾之子言訖復入棺長往幻寄曰安師不但讀楞嚴破句示寂也破句溫州瑞鹿寺本先禪師參天台導以風幡話得悟後住瑞鹿足不歷城邑手不度財帛不設臥具不衣繭絲卯齋終日宴坐申旦誨誘門弟子踰三十年其志彌厲謂衆曰吾初見天台言下便薦然千日之內四威儀之中似物礙膺如讐同處一日忽然猛省譬如洗面摸著鼻孔作偈三首曰非風幡動仁心動自古相傳直至今今後水雲人欲曉祖師真是好知音又曰若是見色便見心人來問著方難答若求道理説多般孤負平生三事衲又曰曠大劫來祇如是如是同天亦同地同地同天作麼形作麼形兮無不是上堂華嚴稱佛身充滿於法界是真個也無且如佛身既已充滿法界菩薩界緣覺聲聞界人天修羅界餓鬼地獄畜生界應無處蹲如是理論太煞聱訛尋常説諸法所生唯心所現且道即今五應是六字根所對六境與汝是同耶是別耶同則何不作一塊別則如何説唯是一心大須著精彩佛法不是等間上堂你諸人還見竹林蘭若山水院舍人衆麼若道見則心有外法若道不見爭奈竹林蘭若山水院舍人衆現在摐然地還會恁麼告示麼上堂天台教中説文殊觀音普賢三門文殊門者一切色觀音門者一切聲普賢門者不動步而到我道文殊門者不是一切色觀音門者不是一切聲普賢門者是個甚麼莫道別却天台教説話無事且退上堂大凡參學未必學問話是參學未必學揀話是參學未必學代語是參學未必學別語是參學未必學捻破經論中奇特言語是參學未必捻破祖師奇特言語是參學若於如是等參學任你七通八達於佛法中倘無見處喚作乾慧之徒豈不聞古德道聰明不敵生死乾慧豈免苦輪諸人若也參學應須真實參學始得行時行時參取立時立時參取坐時坐時參取眠時眠時參取語時語時參取默時默時參取一切作務時一切作務時參取既向如是等時參且道參個甚人參個甚麼語到這裏須自有個明白處始得若不如是喚作造次之流則無究了之旨上堂舉僧問長沙南泉遷化向甚麼處去沙曰東家作驢西家作馬僧曰學人不會沙曰要騎便騎要下便下師曰若是求出三界修行底人聞這個言語不妨狐疑不妨驚怛南泉遷化向甚處去東家作驢西家作馬或有會云千變萬化不出真常或有會云須會異類中行始會得這個言語或有會云東家是南泉西家是南泉或有會云東家郎君子西家郎君子或有會云東家是甚麼西家是甚麼或有會云便作驢呌又作馬嘶或有會云喚甚麼作東家驢喚甚麼作西家馬或有會云既問遷化答在問處或有會云作露柱處去也或有會云東家作驢西家作馬虧南泉甚處如是諸家會也總於佛法有安樂處南泉遷化向甚處去東家作驢西家作馬學人不會要騎便騎要下便下這個話不消得多道理而會若見法界性去也沒多事珍重上堂你等諸人夜間眠熟不知一切既不知一切且問你等那時有本來性無本來性若道那時有本來性又不知一切與死無異若道那時無本來性睡眠忽省覺知如故還會麼不知一切與死無異睡眠忽省覺知如故如是等時是個甚麼若也不會各體究取無事莫立大中祥符元年二月謂上足如晝曰可造石龕中秋望日吾將順化晝稟命即成及期遠近士庶奔趨瞻仰是日參問如常至午坐方丈手結寶印謂晝曰古人云騎虎頭打虎尾中央事作麼生晝曰也祇是如晝師曰你問我晝乃問騎虎頭打虎尾中央事和尚作麼生師曰我也弄不出言訖奄然開一目微視而逝洪覺範曰豫每怪前聖平日機辨皆不可犯至終之日皆弭光泯氣洞山曰吾間名已謝臨濟曰誰知吾正法眼藏向這瞎驢邊滅今先又曰我也弄不出嗚呼其有旨要乎溫州雁蕩願齊禪師僧問夜月舒光為甚麼碧潭無影師曰作家弄影漢其僧從東過西立師曰不惟弄影兼乃怖頭杭州興教洪壽禪師同國師普請次聞墮薪有省作偈曰撲落非他物從橫不是塵山河及大地全露法王身住後中丞王公隨一日過師師擁毳負暄自若王下拜師推蒲團席地與坐笑語終日而去門人讓師曰此一衆所仰奈何不加禮他日王復來師出前趨迎之王曰何不如前日相見師曰中丞即得奈知事嗔何王益重之洪州雲居道齊禪師遍歷禪會學心未息後於上藍院主經藏法燈一日謂師曰有人問我西來意答他曰不東不西藏主作麼生會師對曰不東不西燈曰與麼會又爭得曰道齊祇恁麼未審和尚尊意如何燈曰他家自有兒孫在師於是頓明厥旨有頌曰接物利生絶妙外生終是不肖他家自有兒孫將來用得恰好正法眼藏同此洪覺範曰余讀大愚東禪載齊悟契之緣法燈曰西來有甚意以校傳燈曰他家自有兒孫在之語誤也昔有僧問趙州如何是祖師西來意答曰庭前柏樹子又隨而誡之曰汝若肻我與麼道我則孤負汝汝若不肻我與麼道我則不孤負汝而昧者勦之使古人之意不完為害甚矣故併録之幻寄曰讀洪公此論直似學人未經哲匠罏鞴東卜西占鑽龜打瓦大梅煦來參師問汝從甚處來若從僧堂來即是謾語不從僧堂來又是自瞞汝從甚處來梅於言下頓悟謂門弟子曰達磨言此方經惟楞伽可以印心吾讀此經偈曰諸法無法體而説惟是心不見於自心而起於分別可謂大慈悲父如實極談我輩自不領受背負恩德如恆河沙或問曰然則見自心遂斷分別乎師曰非然也譬如調馬馬自見其影而不驚何以故以自知其影從自身出故吾以是知不斷分別亦捨心相也祇今目前如實而觀不見纖毫祖師曰若見現在過去未來亦應見若不見過去未來現在亦不應見此語分明人自迷昧或又問龍濟曰一切鐘鼓本無聲如何信之無聲師曰祖師曰如鼓聲無有作者無有住處畢竟空故但誑凡夫耳若鼓聲是實有鐘聲俱擊應不相參所以玄沙曰鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後若不當體寂滅如何得句句無前後耶至道三年九月示疾八日申時令擊鐘集衆笑敘出家本末揖謝輔佐叢席者且曰老僧以風火相逼特與諸人相見且向甚麼處見向四大五陰處見耶六入十二處見耶是種種處不可見則只今相問者是誰若真見得可謂後學有賴良久曰吾化後當以院事纍契瓌乃化廬山棲賢澄湜禪師僧問毗目仙人執善財手見微塵諸佛祇如未執手時見個甚麼師曰如今又見個甚麼師性高簡律身精嚴動不違法度暮年三終藏經以坐閲為未敬則立誦行披之黃龍南禪師初遊方年方少從之屢年故其平生所為多取法焉嘗曰棲賢和尚定從人天中來叢林標表也
