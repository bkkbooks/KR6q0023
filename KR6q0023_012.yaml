body:
  text: 六祖下第四世潭州溈山靈祐禪師福州長谿趙氏子年十五出家依本郡建善寺法常律師剃髮於杭州龍興寺究大小乘教二十三遊江西參百丈丈一見許之入室遂居參學之首侍立次丈問誰師曰某甲丈曰汝撥罏中有火否師撥之曰無火丈躬起深撥得少火舉以示之曰汝道無這個聻師由是發悟禮謝陳其所解丈曰此乃暫時岐路耳經云欲識佛性義當觀時節因緣時節既至如迷忽悟如忘忽憶方省己物不從外得故祖師云悟了同未悟無心亦無法祇是無虗妄凡聖等心本來心法元自備足汝今既爾善自護持次日同百丈入山作務丈曰將得火來麼師曰將得來丈曰在甚麼處師拈一枝柴吹兩吹度與百丈丈曰如蟲禦木妙喜曰百丈若無後語幾被典座熱瞞高僧傳云冠年剃髮三年具戒時有錢塘上士義賓授其律科及入天台遇寒山子於塗中謂師曰千山萬水遇潭即止獲無價寶賑賉諸子乃造國清遇拾得復申前意師遂詣泐潭謁大智頓了祖意宗門統要云師至國清受戒寒山子遂與拾得子往松門接師纔到二人從路兩邊透出作大蟲吼三聲師屹然無對寒山云自從靈山一別迄至於今還相記麼師亦無對拾得拈起拄杖云老兄喚這個作甚麼師又無對山云休休別後伊三生作國王總忘却也司馬頭陀見百丈談溈山之勝宜結集法侶為大道場丈因語眾曰若能對眾下得一語出格當與住持即指淨瓶問曰不得喚作淨瓶汝喚作甚麼時華林覺為首座師為典座林曰不可喚作木𣔻也丈乃問師師踢倒淨瓶便出去丈笑曰第一座輸却山子也師遂往焉是山峭絕敻無人烟虎狼縱橫莫敢往來師拾橡栗充食者五七年一日念道在接物利生獨居非是乃出至山口語虎狼曰我若於此山有緣汝等各自散去若其無緣我充爾腹言訖蟲虎四散師乃回庵未幾嬾安上座同數僧從百丈所來輔佐曰某與和尚作典座俟眾至五百乃解務於是人稍稍集厥後禪學輻輳風動天下稱溈仰宗焉上堂夫道人之心質直無偽無背無面無詐妄心一切時中視聽尋常更無委曲亦不閉眼塞耳但情不附物即得從上諸聖祇說濁邊過患若無如許多惡覺情見想習之事譬如秋水澄渟清淨無為澹泞無礙喚他作道人亦名無事人時有僧問頓悟之人更有修否師曰若真悟得本他自知時修與不修是兩頭語如今初心雖從緣得一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不可別有法教渠修行趣向從聞入理聞理深妙心自圓明不居惑地縱有百千妙義抑揚當時此乃得坐披衣自解作活計始得若以要言之則實際理地不受一塵萬行門中不捨一法若也單刀直入則凡聖情盡體露真常理事不二即如如佛仰山問百千萬境一時來作麼生師云青不是黃長不是短諸法各住自位非干我事仰乃作禮仰山問如何是祖師西來意師指燈籠曰大好燈籠仰曰莫祇這便是麼師曰這個是甚麼仰曰大好燈籠師曰果然不見師摘茶次謂仰山曰終日摘茶祇聞子聲不見子形仰撼茶樹師曰子祇得其用不得其體仰曰未審和尚如何師良久仰曰和尚祇得其體不得其用師曰放子三十棒仰曰和尚棒某甲喫某甲棒教誰喫師曰放子三十棒玄覺云且道過在甚麼處師問仰山生住異滅汝作麼生會仰曰一念起時不見有生住異滅師曰子何得遣法仰曰和尚適來問甚麼師曰生住異滅仰曰却喚作遣法師問仰山妙淨明心汝作麼生會仰曰山河大地日月星辰師曰汝祇得其事仰曰和尚適來問甚麼師曰妙淨明心仰曰喚作事得麼師曰如是如是上堂僧出曰請和尚為眾說法師曰我為汝得徹困也僧禮拜後人舉似雪峯峯曰古人得恁麼老婆心切玄沙云山頭和尚蹉過古人事也雪峯聞之乃問沙曰甚麼處是老僧蹉過古人事處沙曰大小溈山被那僧一問直得百雜碎峯乃駭然師坐次仰山入來師曰寂子速道莫入陰界仰曰慧寂信亦不立師曰子信了不立不信不立仰曰祇是慧寂更信阿誰師曰若恁麼即是定性聲聞仰曰慧寂佛亦不立師問仰山涅槃經四十卷多少是佛說多少是魔說仰曰總是魔說師曰已後無人奈子何仰曰慧寂即一期之事行履在甚麼處師曰祇貴子眼正不說子行履師一日喚院主主便來師曰我喚院主汝來作甚麼主無對又令侍者喚第一座座便至師曰我喚第一座汝來作甚麼座亦無對曹山代院主云也知和尚不喚某甲代第一座云若令侍者喚恐不來師問仰山何處來仰曰田中來師曰禾好刈也未仰作刈禾勢師曰汝適來作青見作黃見作不青不黃見仰曰和尚背後是甚麼師曰子還見麼仰拈禾穗曰和尚何曾問這個師曰此是鵞王擇乳師一日見劉鐵磨來師曰老牸牛汝來也磨曰來日臺山大會齋和尚還去麼師乃放身作臥勢磨便出去雪竇顯頌云曾騎鐵馬入重城勅下傳聞六國清猶握金鞭問歸客夜深誰共御街行僧問如何是道師曰無心是道曰某甲不會師曰會取不會底好曰如何是不會底師曰祇汝是不是別人復曰今時人但直下體取不會底正是汝心正是汝佛若向外得一知一解將為禪道且沒交涉名運糞入不名運糞出汙汝心田所以道不是道合醬次問仰山這個用多少鹽水仰曰某甲不會不欲祇對師云却是老僧會仰云不知用多少鹽水師云汝既不會我亦不答晚間師却問仰山今日因緣子作麼生主持仰云待問即答師云現問次仰云耳背眼昬見聞不曉師云凡有問答出子此語不得仰禮謝師云寂子今日忘前失後不是小小師方丈內坐次仰山入來師曰寂子近日宗門令嗣作麼生仰曰大有人疑著此事師曰寂子作麼生仰曰慧寂祇管困來合眼健來坐禪所以未曾說著在師曰到這田地也難得仰曰據慧寂所見祇如此一句也著不得師曰汝為一人也不得仰曰自古聖人盡皆如此師曰大有人笑汝恁麼祇對仰曰解笑者是慧寂同參師曰出頭事作麼生仰遶禪牀一帀師曰裂破古今師睡次仰山問訊師便回面向壁仰曰和尚何得如此師起曰我適來得一夢你試為我原看仰取一盆水與師洗面少頃香嚴亦來問訊師曰我適來得一夢寂子為我原了汝更與我原看嚴乃點一椀茶來師曰二子見解過於鶖子師坐次仰山從方丈前過師曰若是百丈先師見子須喫痛棒始得仰曰即今事作麼生師曰合取兩片皮仰曰此恩難報師曰非子不才乃老僧年邁仰曰今日親見百丈師翁來師曰子向甚麼處見仰曰不道見祇是無別師曰始終作家師問仰山即今事且置古來事作麼生仰叉手近前師曰猶是即今事古來事作麼生仰退後立師曰汝屈我我屈汝仰便禮拜仰山香嚴侍立次師舉手曰如今恁麼者少不恁麼者多嚴從東過西立仰從西過東立師曰這個因緣三十年後如金擲地相似仰曰亦須是和尚提唱始得嚴曰即今亦不少師曰合取口一日師翹起一足謂仰山曰我每日得他負載感伊不徹仰曰當時給孤園中與此無別師曰更須道始得仰曰寒時與他襪著也不為分外師曰不負當初子今已徹仰曰恁麼更要答話在師曰道看仰曰誠如是言師曰如是如是師謂仰山曰汝須獨自回光返照別人不知汝解處汝試將實解獻老僧看仰曰若教某甲自看到這裏無圓位亦無一物一解得獻和尚師云無圓位處原是汝作解處未離心境在仰曰既無圓位何處有法把何物作境師曰適來是汝作與麼解是否仰曰是師云若恁麼是具足心境法未脫我所心在元來有解獻我許汝信位顯人位隱在此則獨見於正法眼藏會元諸書都不載仰山和尚因僧思𨜶問禪宗頓悟畢竟入門的意如何仰曰此意極難若是祖宗門下上根上智一聞千悟得大總持其有根微智劣若不安禪靜慮到這裏總須茫然曰除此一路別更有入處否仰曰有曰如何即是仰曰汝是甚處人曰幽州人仰曰汝還思彼處否曰常思仰曰能思者是心所思者是境彼處樓臺林苑人馬駢闐汝反思底還有許多般也無正此下有僧于言下有省一句曰某甲到這裏總不見有仰曰汝解猶在心信位即得人位未在曰除却這個別更有意也無仰曰別有別無即不堪也曰到這裏作麼生即是仰曰據汝所解祇得一玄得坐披衣向後自有看此則正法眼藏五燈會元皆載師一日見香嚴仰山作餅次師曰當時百丈先師親得這個道理仰與香嚴相顧視云什麼人答得此話師云有一人答得仰云是阿誰師指水牯牛云道道仰取一束草來香嚴取一桶水來放牛前牛纔喫師云與麼與麼不與麼不與麼二人俱作禮師云或時明或時暗師與仰山行次指前頭枯樹問前頭是甚麼仰云祇是枯樹子師却問耘田翁翁亦云枯樹子師云這耘田翁向後亦有五百眾溈山喆云山僧則不然耘田公子吾不如汝且道大圓是山僧是若人辨得許汝具擇法眼若也不辨佛法熾然生滅神鼎諲云為復意在耘田處為復意在仰山分上為復總不恁麼諸上座一切諸法總然更不用生事他是父子說法同道方知師因資國來參乃指月示之國以手撥三下師云不道汝不見祇是見處太粗師一日索門人呈語乃曰聲色外與吾相見時有幽州鑒弘上座呈語云不辭出來那個人無眼師不肯仰山凡三度呈語第一云見取不見取底師云細如毫末冷似雪霜第二度云聲色外誰求相見師云祇滯聲聞方外榻第三度云如兩鏡相照於中無像師云此語正也我是你不是早立像了也仰山却問師某甲精神昬昧拙於祇對未審和尚於百丈師翁處作麼生呈語師云我於百丈先師處呈語云如百千明鏡鑒像光影相照塵塵剎剎各不相借仰山於是禮拜溈山急須買草鞋與座主執巾瓶始得仰山踏衣次提起問師曰正恁麼時和尚作麼生師曰正恁麼時我這裏無作麼生仰曰和尚有身而無用師良久却拈起問曰汝正恁麼時作麼生仰曰正恁麼時和尚還見伊否師曰汝有用而無身師後忽問仰山汝春間有話未圓今試道看仰曰正恁麼時切忌勃訴師曰停囚長智上堂仲冬嚴寒年年事運推移事若何仰山進前叉手而立師曰我情知汝答這話不得香嚴曰某甲偏答得這話師躡前問嚴亦進前叉手而立師曰賴遇寂子不會仰山香嚴侍立次師曰過去未來現在佛佛道同人人得個解脫路仰曰如何是人人解脫路師回顧香嚴曰寂子借問何不答伊嚴曰若道過去未來現在某甲却有個祇對處師曰子作麼生祇對嚴珍重便出師却問仰山曰智閑恁麼祇對還契寂子也無仰曰不契師曰子又作麼生仰亦珍重出去師呵呵大笑曰如水乳合師向仰山云有俗弟子將三束絹來與我贖鐘子欲與世人受福仰云俗弟子則有絹與和尚贖鐘子和尚將何物酬他師以拄杖敲牀三下云我將這個酬他仰云若是這個用作甚麼師又敲三下云汝嫌這個作甚麼仰云某甲不嫌這個這個只是大家底師云你既知是大家底何得更就我覓物酬他仰云只怪和尚把大家底行人事師云汝不見達磨大師從西天來此土亦將此物來人事汝諸人盡是受他信物者師問道吾甚處去來吾云看病來師云有幾人病吾云有病底有不病底師云不病底莫是智頭陀否吾云病與不病總不干他事急道急道師云道得也與他沒交涉師因僧問如何是祖師西來意師竪起拂子後僧遇王常侍侍問溈山近日有何言句僧舉前話侍云彼中兄弟如何商量僧云借色明心附物顯理侍云不是這個道理上座快回去好某甲敢寄一書到和尚僧得書遂回持上師拆開見畫一圓相內寫個日字師云誰知千里外有個知音仰山侍次乃云雖然如是也祇是個俗漢師云子又作麼生仰却畫一圓相於中書日字以脚抹師乃大笑師坐次仰山問和尚百年後有人問先師法道如何祇對師曰一粥一飯曰面前有人不肯又作麼生師曰作家師僧仰便禮拜師曰逢人不得錯舉師問仰山終日與子商量成得個甚麼邊事仰空中畫一畫師曰若不是吾終被子惑師問僧甚處來曰西京來師曰還得西京主人公書來麼曰不敢妄通消息師曰作家師僧天然猶在曰殘羹餿飯誰人喫之師曰獨有闍黎不喫僧作嘔吐勢師曰扶出這病僧著僧便出去石霜會下有二禪客到云此間無一人會禪後普請搬柴仰山見二禪客歇將一橛柴問曰還道得麼俱無對仰曰莫道無人會禪好仰歸舉似師曰今日二禪客被慧寂勘破師曰甚麼處被子勘破仰舉前話師曰寂子又被吾勘破上堂老僧百年後向山下作一頭水牯牛左脇下書五字曰溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧畢竟喚作甚麼即得仰山出禮拜而退雲居膺代云師無異號資福寶曰當時但作此相拓呈之新羅和尚作此相拓呈之又曰同道者方知芭蕉徹作此相拓呈之又曰說也說了也注也注了也悟取好乃述偈曰不是溈山不是牛一身兩號實難酬離却兩頭應須道如何道得出常流師敷揚宗教凡四十餘年達者不可勝數大中七年正月九日盥漱敷座怡然而寂壽八十三臘六十四塔於本山諡大圓禪師潭州道吾山宗智禪師豫章海昏張氏子幼依槃和尚受教登戒𥎀藥山法會密契心印一日山問子去何處來師曰遊山來山曰不離此室速道將來師曰山上烏兒頭似雪㵎底遊魚忙不徹見南泉異類中行語見南泉章中藥山上堂我有一句子未曾說向人師出曰相隨來也僧問藥山一句子如何說山曰非言說師曰早言說了也師一日提笠出雲巖指笠曰用這個作甚麼師曰有用處巖曰忽遇黑風猛雨來時如何師曰盖覆著巖曰他還受盖覆麼師曰然雖如是且無滲漏溈山問雲巖菩提以何為座巖曰以無為為座嚴却問溈山山曰以諸法空為座又問師作麼生師曰坐也聽伊坐臥也聽伊臥有一人不坐不臥速道速道山休去僧問如何是今時著力處師曰千人萬人喚不回頭方有少分相應曰忽然火起時如何師曰能燒大地師却問僧除却星與燄那個是火曰不是火別一僧却問師還見火麼師曰見曰見從何起師曰除却行住坐臥別請一問頌古云溈山一日見野火乃問師還見火麼師曰見山曰從何處起師曰除却經行坐臥請師別致一問來山休云雲巖問師弟家風近日如何師曰教師兄指點堪作甚麼巖曰無這個來多少時也師曰牙根猶帶生澀在師指佛桑花問僧曰這個何似那個曰直得寒毛卓竪師曰畢竟如何曰道吾門下底師曰十里大王僧問久嚮和尚會禪是否師曰蒼天蒼天僧近前掩却師口云低聲低聲師遂與一掌僧云蒼天蒼天師云得與麼無理僧却與師一掌拂袖便出師云早知如是悔不如是雲巖不安師乃謂曰離此殻漏子向甚麼處相見巖曰不生不滅處相見師曰何不道非不生不滅處亦不求相見雲巖臨遷化遣書辭師師覧書了謂洞山密師伯曰雲巖不知有我悔當時不向伊道雖然如是要且不違藥山之子玄覺云古人恁麼道還知有也未又云雲巖當時不會且道甚麼處是伊不會處石霜問和尚一片骨敲著似銅鳴向甚麼處去也師喚侍者者應諾師曰驢年去唐大和九年九月示疾有苦僧眾慰問體候師曰有受非償子知之乎眾皆愀然越十日將行謂眾曰吾當西邁理無東移言訖告寂闍維得靈骨數片建塔道吾後雷遷於石霜山之陽潭州雲巖曇晟禪師鍾陵建昌王氏子高僧傳生有自然胎衣右袒猶緇服少出家於石門參百丈海禪師二十年因緣不契後造藥山山問甚處來曰百丈來山曰百丈有何言句示徒師曰尋常道我有一句子百味具足山曰鹹則鹹味淡則淡味不鹹不淡是常味作麼生是百味具足底句師無對山曰爭奈目前生死何師曰目前無生死山曰在百丈多少時師曰二十年山曰二十年在百丈俗氣也不除他日侍立次山又問百丈更說甚麼法師曰有時道三句外省去六句內會取山曰三千里外且喜沒交涉山又問更說甚麼法師曰有時上堂大眾立定以拄杖一時趂散復召大眾眾回首丈曰是甚麼山曰何不早恁麼道今日因子得見海兄師於言下頓省便禮拜一日山問汝除在百丈更到甚麼處來師曰曾到廣南來曰見說廣州城東門外有一片石被州主移去是否師曰非但州主闔國人移亦不動山又問聞汝解弄師子是否師曰是曰弄得幾出師曰弄得六出曰我亦弄得師曰和尚弄得幾出曰我弄得一出師曰一即六六即一後到溈山溈問承聞長老在藥山弄師子是否師曰是曰長弄有置時師曰要弄即弄要置即置曰置時師子在甚麼處師曰置也置也師煎茶次道吾問煎與阿誰師曰有一人要曰何不教伊自煎師曰幸有某甲在師問石霜甚麼處來曰溈山來師曰在彼中得多少時曰粗經冬夏師曰若恁麼即成山長也曰雖在彼中却不知師曰他家亦非知非識石霜無對道吾聞云得恁麼無佛法身心住後僧問二十年在百丈巾瓶為甚麼心燈不續師曰頭上寶華冠曰意旨如何師曰大唐天子及冥王後僧舉問九峯䖍曰大唐天子及冥王意旨如何䖍曰却憶洞上之言上堂示眾曰有個人家兒子問著無有道不得底洞山出問曰他屋裏有多少典籍師曰一字也無曰爭得恁麼多知師曰日夜不曾眠山曰問一段事還得否師曰道得却不道問僧甚處來曰添香來師曰還見佛否曰見師曰甚麼處見曰下界見師曰古佛古佛道吾問大悲千手眼那個是正眼師曰如人夜間背手摸枕子吾曰我會也師曰作麼生會吾曰徧身是手眼師曰道也太煞道祇道得八成吾曰師兄作麼生師曰通身是手眼雪竇顯頌云徧身是通身是拈來猶較十萬里展翅鵬騰六合雲搏風鼓蕩四溟水是何埃𡏖兮忽生那個毫𨤲兮未止君不見網珠垂範影重重棒頭手眼從何起咄掃地次道吾曰太區區生師曰須知有不區區者吾曰恁麼則有第二月也師竪起掃帚曰是第幾月吾便行玄沙備云正是第二月長慶稜問玄沙云被他倒轉掃帚攔面摵又作麼生沙休去羅山閑云噫兩個漢不識好惡雲巖個漢縛手脚死來多少時也雲門云奴見婢殷勤真如云將勤補拙正法眼藏舉此則語及玄沙雲門真如三師語云此三句語一句可以定乾坤一句可以驗衲僧一句可以接初機諸人還揀辨得麼若揀辨得出許汝親見慧光若辨不出莫道慧光山勢險隔江遙望碧雲閒問僧甚處來曰石上語話來師曰石還點頭也無僧無對師自代曰未語話時却點頭師作草鞋次洞山近前曰乞師眼睛得麼師曰汝底與阿誰去也曰良价無師曰設有汝向甚麼處著山無語師曰乞眼睛底是眼否山曰非眼師便喝出僧問一念瞥起便落魔界時如何師曰汝因甚麼却從佛界來僧無對師曰會麼曰不會師曰莫道體不得設使體得也祇是左之右之院主遊石室回師問汝去入到石室裏許為祇恁麼便回主無對洞山代曰彼中已有人占了也師曰汝更去作甚麼山曰不可人情斷絕去也裴大夫問僧供養佛佛還喫否僧曰如大夫祭家神大夫舉似師師曰有幾般飯食但一時下來師却問神山一時下來後作麼生神山曰合取鉢盂師然之會昌元年辛酉十月二十六日示疾命澡身竟喚主事令備齋來日有上座發去至二十七夜歸寂茶毗得舍利一千餘粒瘞於石塔秀州華亭船子德誠禪師節操高邈度量不羣自印心於藥山與道吾雲巖為同道交洎離藥山乃謂二同志曰公等應各據一方建立藥山宗旨予率性疎野惟好山水樂情自遣無所能也他日後知我所止之處若遇靈利座主指一人來或堪雕琢將授生平所得以報先師之恩遂分携至秀州華亭泛一小舟隨緣度日以接四方往來之眾時人莫知其高蹈因號船子和尚一日泊船岸邊閑坐有官人問如何是和尚日用事師竪橈子曰會麼官人曰不會師曰棹撥清波金鱗罕遇道吾後到京口遇夾山上堂僧問如何是法身山曰法身無相曰如何是法眼山曰法眼無瑕道吾不覺失笑山便下座請問道吾某甲適來祇對這僧話必有不是致令上座失笑望上座不吝慈悲吾曰和尚一等是出世未有師在山曰某甲甚處不是望為說破吾曰某甲終不說請和尚却往華亭船子處去山曰此人如何吾曰此人上無片瓦下無卓錐和尚若去須易服而往山乃散眾束裝直造華亭船子纔見便問大德住甚麼寺山曰寺即不往住即不似師曰不似似個甚麼山曰不是目前法師曰甚處學得來山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又問垂絲千尺意在深潭離鈎三寸子何不道山擬開口被師一橈打落水中山纔上船師又曰道道山擬開口師又打山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊山遂問拋綸擲釣師意如何師曰絲懸綠水浮定有無之意山曰語帶玄而無路舌頭談而不談師曰釣盡江波金鱗始遇山乃掩耳師曰如是如是遂囑曰汝向去直須藏身處沒蹤跡沒蹤跡處莫藏身吾三十年在藥山祇明斯事汝今已得他後莫住城隍聚落但向深山裏钁頭邊覓取一個半個接續無令斷絕山乃辭行頻頻回顧師遂喚闍黎山乃回首師竪起橈子曰汝將謂別有乃覆船入水而逝芙蓉楷云法身者理妙言玄頓超終始之患諸仁者莫是幻身外別有法身麼莫是幻身便是法身麼若也恁麼會去盡是依他作解明昧兩岐法眼未得通明不見僧問夾山如何是法身山云法身無相如何是法眼山云法眼無瑕所以道吾云未有師在忽有人問老僧如何是法身羊便乾處臥如何是法眼驢便濕處尿更有人問作麼生是法身買帽相頭作麼生是法眼坑坎堆阜若點檢將來夾山祇是學處不明如流俗閨閤裏物不能捨却致使情關固閉識鎖難開老僧今日若不當陽顯示後學難以知歸勸汝諸人不用求真惟須息見諸見若息昏霧不生自然智鑑洞明更無他物諸仁者還會麼良久云珠中有火君須信休向天邊問太陽洪覺範曰嗟乎於今叢林師授弟子例皆禁絕悟解推去玄妙惟要直問直答無則始終言無有則始終言有毫釐差互謂之狂解使船子聞之豈止萬劫繫驢橛而已哉由此觀之非特不善悟要亦不善疑也善疑者必思三十三祖授法之際悟道之緣其語言具在皆可以理究可以智知獨江西石頭而下諸大宗師以機用應物觀其問答溟涬然令人坐睡其道異諸祖耶則嗣其法其不異耶則所言乃爾不同故知臨濟大師曰大凡舉論宗乘一句中具三玄一玄中具三要有玄有要者盖明此也不知者指為門庭建立權時語言可悲也頌古云山既得法于船子歸道吾復遣僧往問如何是法身山仍曰法身無相問法眼如何亦仍曰法眼無瑕僧歸舉似吾吾曰這漢此回方徹宣州樹慧省禪師道吾來相看值師臥次吾乃近前將被盖覆師問作麼吾云盖覆師曰坐是臥是吾云不在兩頭師曰爭奈盖覆何吾便喝鄂州百巖明哲禪師洞山與密師伯到參師問二上座甚處來山曰湖南師曰觀察使姓甚麼曰不得姓師曰名甚麼曰不得名師曰還治事也無曰自有郎幕在師曰還出入也無曰不出入師曰豈不出入山拂袖便出師次早入堂召二上座曰昨日老僧對闍黎一轉語不相契一夜不安今請闍黎別下一轉語若愜老僧意便開粥相伴過夏山曰請和尚問師曰豈不出入山曰太尊貴生師乃開粥同共過夏昭覺勤云當時待他道不委他名便向伊道他不委你你不委他敢問合道得甚麼語澧州高沙彌初參藥山山問甚處來師曰南嶽來山曰何處去師曰江陵受戒去山曰受戒圖甚麼師曰圖免生死山曰有一人不受戒亦無生死可免汝還知否師曰恁麼則佛戒何用山曰這沙彌猶挂唇齒在師禮拜而退道吾來侍立山曰適來有個跛脚沙彌却有些子氣息吾曰未可全信更須勘過始得至晚山上堂召曰早來沙彌在甚麼處師出眾立山問我聞長安甚閙你還知否師曰我國晏然山曰汝從看經得請益得師曰不從看經得亦不從請益得山曰大有人不看經不請益為甚麼不得師曰不道他不得祇是不肯承當山顧道吾雲巖曰不信道師一日辭藥山山問甚麼處去師曰某甲在眾有妨且往路邊卓個草菴接待往來茶湯去山曰生死事大何不受戒去師曰知是般事便休更喚甚麼作戒山曰汝既如是不得離吾左右時復要與子相見師住菴後一日歸來值雨山曰你來也師曰是山曰可煞濕師曰不打這個鼓笛雲巖曰皮也無打甚麼鼓道吾曰鼓也無打甚麼皮山曰今日大好一場曲調山齋時自打鼓師捧鉢作舞入堂山便擲下鼓槌曰是第幾和師曰是第二和山曰如何是第一和師就桶舀一杓飯便出京兆府翠微無學禪師初問丹霞如何是諸佛師霞咄曰幸自可憐生須要執巾帚作麼師退身三步霞曰錯師進前霞曰錯錯師翹一足旋身一轉而出霞曰得即得孤他諸佛師由是領旨住後投子問未審二祖初見達磨有何所得師曰汝今見吾復何所得投子頓悟玄旨一日師在法堂內行投子進前接禮問曰西來密旨和尚如何示人師駐步少時子曰乞師垂示師曰更要第二杓惡水那子便禮謝師曰莫躲根子曰時至根苗自生師因供養羅漢僧問丹霞燒木佛和尚為甚麼供養羅漢師曰燒也不燒著供養亦一任供養曰供養羅漢羅漢還來也無師曰汝每日還喫飯麼僧無語師曰少有靈利的吉州孝義寺性空禪師丁行者看師師打一棒云瞎却汝本來眼也丁云非但今日古人亦行此令師云誰向汝道古今丁拂袖便出師云青天白日有迷路人丁云莫要指示麼師便打丁云莫瞎却人眼好師云瞎却俗人眼有甚麼過仙天禪師僧參纔展坐具師曰不用通時暄還我文彩未生時道理來曰某甲有口瘂却即閑苦死覓個臘月扇子作麼師拈棒作打勢僧把住曰還我未拈棒時道理師曰隨我者隨之南北不隨我者死住東西曰隨與不隨且置請師指出東西南北師便打披雲和尚來纔入方丈師便問未見東越老人時作麼生為物雲曰祇見雲生碧嶂焉知月落寒潭師曰祇與麼也難得曰莫是未見時麼師便喝雲展兩手師曰錯怪人者有甚麼限雲掩耳而出師曰死却這漢平生也漳州三平義忠禪師初參石鞏鞏常張弓架箭接機師詣法席鞏曰看箭師乃撥開胸曰此是殺人箭活人箭又作麼生鞏彈弓弦三下師乃禮拜鞏曰三十年張弓架箭祇射得半個聖人遂拗折弓箭後參大顛舉前話顛曰既是活人箭為甚麼向弓弦上辨師無對顛曰三十年後要人舉此話也難得師問大顛不用指東劃西便請直指顛曰幽州江口石人蹲師曰猶是指東劃西顛曰若是鳳凰兒不向那邊討師作禮顛曰若不得後句前話也難圓馬頰山本空禪師上堂祇這施為動轉還合得本來祖翁麼若合得十二時中無虗棄底道理若合不得喫茶說話往往喚作茶話在僧便問如何免得不成茶話去師曰你識得口也未曰如何是口師曰兩片皮也不識曰如何是本來祖翁師曰大眾前不要牽爺恃孃曰大眾欣然去也師曰你試點大眾性看僧作禮師曰伊往往道一性一切性在僧欲進語師曰孤負平生行脚眼問去却即今言句請師直指本來性師曰你迷源來得多少時曰即今蒙和尚指示師曰若指示你我即迷源曰如何即是師示頌曰心是性體性是心用心性一如誰別誰共妄外迷源祇者難洞古今凡聖如幻如夢佛鑑云問不徒然答無虗設纔隨語轉覿面千山後偈中雖有收有放其奈錯下名言山僧重為別過乃有偈曰心本非心性本非性心性兩亡誰少誰剩老倒本空灼艾求病妄外迷源孤負凡聖本生禪師拈拄杖示眾曰我若拈起你便向未拈起時作道理我若不拈起你便向拈起時作主宰且道老僧為人在甚麼處時有僧出曰不敢妄生節目師曰也知闍黎不分外曰低低處平之有餘高高處觀之不足師曰節目上更生節目僧無語師曰掩鼻偷香空招罪犯潭州石室善道禪師作沙彌時長髭遣令受戒謂之曰汝回日須到石頭和尚處禮拜師受戒後乃參石頭一日隨頭遊山次頭曰汝與我斫却面前樹子免礙我師曰不將刀來頭乃抽刀倒與師曰何不過那頭來頭曰你用那頭作甚麼師即大悟便歸長髭髭問汝到石頭否師曰到即到祇是不通號髭曰從誰受戒師曰不依他髭曰在彼即恁麼來我這裏作麼生師曰不違背髭曰太忉忉生師曰舌頭未曾點著在髭喝曰沙彌出去師便出髭曰爭得不遇於人師尋值沙汰乃作行者居於石室每見僧便竪起杖子曰三世諸佛盡由這個對者少得冥契長沙聞乃曰我若見令放下拄杖別通個消息三聖將此語祇對被師認破是長沙語杏山聞三聖失機乃親到石室師見杏山僧眾相隨潛入碓坊碓米杏曰行者接待不易貧道難消師曰開心椀子盛將來無盖盤子合取去說甚麼難消杏便休仰山問佛之與道相去幾何師曰道如展手佛似握拳曰畢竟如何的當可信可依師以手撥空三下曰無恁麼事無恁麼事曰還假看教否師曰三乘十二分教是分外事若與他作對即是心境兩法能所雙行便有種種見解亦是狂慧未足為道若不與他作對一事也無所以祖師道本來無一物汝不見小兒出胎時可道我解看教不解看教當恁麼時亦不知有佛性義無佛性義及至長大便學種種知解出來便道我能我解不知總是客塵煩惱十六行中嬰兒行為最哆哆和和時喻學道之人離分別取捨心故讚歎嬰兒可況喻取之若謂嬰兒是道今時人錯會師一夕與仰山翫月山問這個月尖時圓相甚麼處去圓時尖相又甚麼處去師曰尖時圓相隱圓時尖相在雲巖云尖時圓相在圓時無尖相道吾云尖時亦不尖圓時亦不圓澧州龍潭崇信禪師渚宮人也其家賣餅師少而英異初悟和尚為靈鑒潛請居天皇寺人莫之測師家于寺巷常日以十餅饋之天皇受之每食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何以返貽我耶其別有旨乎遂造而問焉皇曰是汝持來復汝何咎師聞之頗曉玄旨因投出家皇曰汝昔崇福善今信吾言可名崇信由是服勤左右一日問曰某自到來不蒙指示心要皇曰自汝到來吾未甞不指汝心要師曰何處指示皇曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低頭何處不指示心要師低頭良久皇曰見則直下便見擬思即差師當下開解復問如何保任皇曰任性逍遙隨緣放曠但盡凡心別無聖解師後詣澧陽龍潭栖止僧問髻中珠誰人得師曰不賞翫者得曰安著何處師曰有處即道來有尼問如何得為僧去師曰作尼來多少時也曰還有為僧時也無師曰汝即今是甚麼曰現是尼身何得不識師曰誰識汝李翱刺史問如何是真如般若師曰我無真如般若李曰幸遇和尚師曰此猶是分外之言
