body:
  text: 六祖下第十五世吉州禾山超宗慧方禪師上堂舉拂子曰看看祗這個在臨濟則照用齊行在雲門則理事俱備在曹洞則偏正叶通在溈山則暗機圓合在法眼則何止惟心然五家宗派門庭施設則不無直饒辨得倜儻分明去猶是光影邊事若要抵敵生死則霄壞有隔且超越生死一句作麼生道良久曰洎合錯下注腳嘉興府華亭性空妙普菴主漢州人久依死心獲證結茅青龍野吹鐵笛自娛多賦詠有警衆偈曰學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈致太平又曰十二時中莫住工窮來窮去到無窮直須洞徹無窮底踏倒須彌第一峰又山居偈曰心法雙忘猶隔妄色空不二尚餘塵百鳥不來春又過不知誰是住菴人建炎初徐明叛道經烏鎮肆屠戮師為賊所得賊怒欲斬之師曰大丈夫要頭便斫取奚以怒為我死必矣能一祭我乎賊奉肉食師如常出生畢乃曰孰為文賊笑師索筆大書一文其詞旨超達遂舉箸飫餐餐罷笑曰劫數既遭離亂我是快活烈漢如今正好乘時便請一刀兩段乃大呼斬斬賊大駭羅拜衛師而出烏鎮悉免焚掠有僧見師見佛不拜歌逆問曰既見佛為甚麼不拜師掌之曰會麼云不會師又掌曰家無二主紹興庚申冬造大盆穴而塞之修書寄雪竇持禪師曰吾將水葬矣壬戌歲持至見其尚存作偈嘲之曰咄哉老性空剛要餧魚鱉去不索性去祇管向人說師閲偈笑曰待兄來證明耳令遍告四衆衆集師為說法要仍說偈曰坐脫立亡不若水葬一省柴燒二省開壙撒手便行不妨快暢誰是知音船子和尚高風難繼百千年一曲漁歌少人唱遂盤坐盆中順流而下衆皆隨至海濵望欲斷目師取塞戽水而回衆擁觀水無所入復乘流而往唱曰船子當年返故鄉沒蹤跡處妙難量真風遍寄知音者鐵笛橫吹作散場其笛聲嗚咽頃於蒼茫間見以笛擲空而沒衆號慕圖像事之後三日於沙上趺坐顏色如生道俗爭往迎歸留五日闍維舍利大如菽者莫計二鶴徘徊空中火盡始去塔于青龍空室道人智通者龍圖范珣女也幼聰慧長歸丞相蘇頌之孫悌未幾厭世相還家求祝髮父難之遂清修因看法界觀有省乃連作二偈見意一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊二曰物我元無異森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡處動靜悉圓通後父母俱亡兄涓領分寧尉通偕行聞死心名重往謁之心見知其所得便問常啼菩薩賣却心肝教誰學般若通曰你若無心我也休又問一雨所滋根苗有異無陰陽地上生個甚麼通曰一華五葉復問十二時中向甚麼處安身立命通曰和尚惜取眉毛好心打曰這婦女亂作次第通禮拜心然之政和間居金陵嘗設浴於保寧揭榜於門曰一物也無洗個甚麼纖塵若有起自何來道取一句子玄乃可大家入浴古靈祇解揩背開士何曾明心欲證離垢地時須是通身汗出盡道水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗却後為尼名惟久挂錫姑蘇之西竺示寂時書偈趺坐而化有明心録行世潭州上封佛心才禪師依海印隆禪師見老宿達道者看經至一毛頭師子百億毛頭一時現師指問曰一毛頭師子作麼生得百億毛頭一時現達曰汝乍入叢林豈可便理會許事師因疑之遂發心領淨頭職一夕汛掃次印適夜參至則遇結座擲拄杖曰了即毛端吞巨海始知大地一微塵師豁然有省及出閩造豫章黃龍山與死心機不契乃參靈源凡入室出必揮淚自訟曰此事我見得甚分明祇是臨機吐不出若為奈何靈源知師誠篤告以須是大徹方得自在也未幾因觀鄰案僧讀曹洞廣録至藥山採薪歸有僧問甚麼處來山曰討柴來僧指腰下刀曰鳴剝剝是個甚麼山拔刀作斫勢師忽欣然摑鄰案僧一掌揭簾趨出衝口說偈曰徹徹大海乾枯虗空迸裂四方八面絶遮攔萬象森羅齊漏泄上堂一法有形該動植百川湍激競朝宗昭琴不鼓雲天淡想像毗耶老病翁維摩病則上封病上封病則拄杖子病拄杖子病則森羅萬象病森羅萬象病則凡之與聖病諸人還覺病本起處麼若也覺去情與無情同一體處處皆同真法界其或未然甜瓜徹蒂甜苦瓠連根苦潭州法輪應端禪師扣靈源以妙入諸經自負源嘗痛劄之師乃援馬祖百丈機語及華嚴宗旨為表源笑曰馬祖百丈固錯矣而華嚴宗旨與個事喜沒交涉師憤然欲他往因請辭及揭簾忽大悟汗流浹背源見乃曰是子識好惡矣馬祖百丈文殊普賢幾被汝帶纍東京天寧長靈守卓禪師上堂三千劍客獨許莊周為甚麼跳不出良醫之門多病人因甚麼不消一劄已透關者更請辨看宣和五年十二月二十七日奄然示寂闍維日上遣中使賜香持金盤求設利爇香罷盤中鏗然視之五色者數顆大如豆使者持還上見大悅隆興府黃龍山堂道震禪師初謁丹霞淳禪師一日與論洞上宗旨師呈偈曰白雲深覆古寒巖異草靈花彩鳳銜夜半天明日當午騎牛背面著靴衫霞器之師自以為礙棄依草堂一見契合日取藏經讀之一夕聞晚參鼓步出經堂舉頭見月遂大悟丞趨方丈堂望見即為印可慶元府天童普交禪師因為檀越修懺摩有問曰公之所懺罪為自懺耶為他懺耶若自懺罪罪性何來若懺他罪他罪非汝烏能懺之師不能對遂改服遊方造泐潭足才踵門潭即呵之師擬問潭即曳杖逐之一日忽呼師至丈室曰我有古人公案要與你商量師擬進語潭遂喝師豁然領悟乃大笑潭下禪牀執師手曰汝會佛法耶師便喝復拓開潭大笑江州圓通道旻禪師世稱古佛興化蔡氏子母夢吞摩尼寶珠有娠生五歲足不履口不言母抱遊西明寺見佛像遽履地合爪稱南無佛人大異之既出家遍參後至泐潭一見器之師陳列參所得不蒙印可潭舉世尊拈花迦葉微笑語以問復不契後侍潭行次潭以拄杖架肩長噓曰會麼師擬對潭便打有頃復拈草示之曰是甚麼師亦擬對潭遂喝於是頓明大法作拈花勢乃曰這回瞞旻上座不得也潭挽曰更道更道師曰南山起雲北山下雨即禮拜潭首肯慶元府二靈知和菴主蘇臺玉峰張氏子兒時嘗習坐垂堂堂傾父母意其必死師瞑目自若因使出家年滿得度趨謁泐潭潭見乃問作甚麼師擬對潭便打復喝曰你喚甚麼作禪師驀領旨即曰禪無後無先波澄大海月印青天又問如何是道師曰道紅塵浩浩不用安排本無缺少潭然之幻寄曰可憐萬劫繫驢橛棲雪竇之中峰棲雲兩菴逾二十年僧至禮拜師曰近離甚處曰天童師曰太白峰高多少僧以手斫額作望勢師曰猶有這個在曰却請菴主道師却作斫額勢僧擬議師便打住二靈三十年間居無長物惟二虎侍其右一日威於人以偈遣之宣和七年四月十二日趺坐而逝正言陳公狀師行實及示疾異跡甚詳仍塑其像二虎侍之至今存焉紹興府慈氏瑞仙禪師習毗尼因覩戒性如虗空持者為迷倒師謂戒者束身之法也何自縛乎遂探台教又閲諸法不自生亦不從他生不共不無因是故說無生疑曰又不自他不共不無因生畢竟從何而生即省曰因緣所生空假三觀抑揚性海心佛衆生名異體同十境十乘轉識成智不思議境智照方明非言詮所及棄謁諸方後至投子廣鑑問鄉里甚處師曰兩浙東越鑑曰東越事作麼生師曰秦望峰高鑑湖水濶鑑曰秦望峰與你自己是同是別師曰西天梵語此土唐言鑑曰此猶是叢林祇對畢竟是同是別師便喝鑑便打師曰恩大難酬便禮拜丞相張商英居士字天覺號無盡年十九應舉入京道過向氏向先一夕夢神告云接相公公至向遂約以女女公既第遂娶向氏公一日見藏經裝潢嚴麗怫然曰人之崇事聖人書乃不及此欲著無佛論向氏曰既是無佛何論之有須著有佛論始得公疑其言遂已後訪同列見維摩經適讀至此病非地大亦不離地大歎曰胡人之言亦能爾耶乃借歸閲次向氏問讀何書公曰維摩經向氏曰可熟讀此然後著無佛論公悚然因深信佛乘元祐六年為江西漕首謁東林總總詰所見與己符合因印可且令往見其弟子玉溪慈古鏡公按部分寧諸禪迓之首致敬于慈聞龔德莊嘗言兜率悅聰明因問悅曰聞公善文章悅笑曰從悅臨濟九世孫對運使論文章政如運使對從悅論禪也公不然其語公強屈指曰是九世也問玉溪去此多少曰三十里問兜率曰五里乃過兜率先是悅夢手摶日輪覺語首座曰日輪運轉之象張運使且過此吾當深錐痛劄之首座曰士大夫惡拂己者或起別釁悅曰正使煩惱祇退得我院也公與悅語次稱賞東林悅未肯其說公乃題詩擬𪹼軒有云不向廬山尋落處象王鼻孔漫撩天意譏悅不肻東林也公與悅語至更深論及宗門事悅曰東林既印可運使運使於佛祖言教有少疑否公曰有悅曰疑何等語公曰疑香嚴獨腳頌德山托鉢話悅曰既於此有疑其餘安得無耶祇如巖頭言末後句是有耶是無耶公曰有悅大笑便歸方丈閉却門公一夜睡不穩至五更下牀觸翻溺器乃大徹猛省前話遂有頌曰鼓寂鐘沉托鉢回巖頭一拶語如雷果然祇得三年活莫是遭他授記來遂扣方丈門曰某已捉得賊了悅曰贓在甚處公無語悅曰都運且去來日相見翌日公遂舉前頌悅乃謂曰參禪祇為命根不斷依語生解如是之說公已深悟然至極微細處使人不覺不知墮在區宇乃作頌證之曰等間行處步步皆如雖居聲色寧滯有無一心靡異萬法非殊休分體用莫擇精粗臨機不礙應物無拘是非情盡凡聖皆除誰得誰失何親何疏拈頭作尾指實為虗翻身魔界轉腳邪塗了無逆順不犯工夫公邀悅至建昌途中一一伺察有十頌敘其事悅亦有十頌酬之燈録武庫皆不載其頌公嘗云先佛所說於一毛端現寶王剎坐微塵裏轉大法輪是真實義法華會上多寶如來在寶塔中分半座與釋迦文佛過去佛現在佛同坐一處實有如是事非謂表法公於宣和四年十一月黎明口占遺表命子弟書之俄取枕擲門窗上聲如雷震衆視之已薨矣西蜀鑾法師通大小乘佛照謝事居景德師問照曰禪家言多不根何也照曰汝習何經論曰諸經粗知頗通百法照曰祇如昨日雨今日晴是甚麼法中收師懵然照舉癢和子擊曰莫道禪家所言不根好師憤曰昨日雨今日晴畢竟是甚麼法中收照曰第二十四時分不相應法中收師恍悟即禮謝後歸蜀居講會以直道示徒不泥名相隆興府雲巖天游典牛禪師依湛堂於泐潭一日潭普說曰諸人苦苦就準上座覔佛法遂拊膝曰會麼雪上加霜又拊膝曰若也不會豈不見乾峰示衆曰舉一不得舉二放過一著落在第二師聞脫然頴悟嘗和忠道者牧牛頌曰兩角指天四腳踏地拽斷鼻繩牧甚屎屁張無盡見之甚擊節頴應作頓隆興府九仙法清祖鑑禪師嘗於池之天寧以伽黎覆頂而坐侍郎曾公開問曰上座仙鄉甚處曰嚴州曰與此間是同是別師拽伽黎下地揖曰官人曾到嚴州否曾罔措師曰待官人到嚴州時却向官人道眉州中巖慧目蘊能禪師遍謁諸方後到大溈溈問上座桑梓何處師曰西川曰我聞西川有普賢菩薩示現是否師曰今日得瞻慈相曰白象何在師曰爪牙已具曰還會轉身麼師提坐具繞禪牀一匝溈曰不是這個道理師趨出一日溈為衆入室問僧黃巢過後還有人收得劍麼僧竪起拳溈曰菜刀子僧曰爭奈受用不盡溈喝出次問師黃巢過後還有人收得劍麼師亦竪起拳溈曰也祇是菜刀子師曰殺得人即休遂近前攔胸築之溈曰三十年弄馬騎今日被驢子撲懷安軍雲頂寶覺宗印禪師一日普說罷召衆曰諸子未要散去更聽一頌乃曰四十九年一場熱閧八十七春老漢獨弄誰少誰多一般作夢歸去來兮梅梢雪重言訖下座倚杖而逝成都府信相宗顯正覺禪師少為進士有聲嘗晝掬溪水為戲至夜思之遂見水泠然盈室欲汲之不可而塵境自空曰吾世網裂矣往依昭覺得度具滿分戒後隨衆咨參覺一日問師高高峰頂立深深海底行汝作麼生會師於言下頓悟曰釘殺腳跟也覺拈起拂子曰這個又作麼生師一笑而出服勤七祀南遊至京師歷淮浙晚見五祖演和尚于海會出問未知關棙子難過趙州橋趙州橋即不問如何是關棙子祖曰汝且在門外立師進步一踏而退祖曰許多時茶飯元來也有人知滋味明日入室祖云你便是昨日問話底僧否我固知你見處祇是未過得白雲關在師珍重便出時圜悟為侍者師以白雲關意扣之悟曰你但直下會取師笑曰我不是不會祇是未諳待見這老漢共伊理會一上明日祖往舒城師與悟繼往適會於興化祖問師記得曾在郡裏相見來師曰全火祇候祖顧悟曰這漢饒舌自是機緣相契遊廬阜回師以高高峰頂立深深海底行所得之語告五祖祖曰吾嘗以此事詰先師先師云我曾問遠和尚遠曰猫有歃血之功虎有起尸之德非素達本源不能到也師給侍之久祖鍾愛之後辭西歸為小參復以頌送曰離鄉四十餘年一時忘却蜀語禪人回到成都切須記取魯語時覺尚無恙師再侍之名聲藹著成都府昭覺寺克勤佛果禪師彭州駱氏子世宗儒師兒時日記千言偶游妙寂寺見佛書三復悵然如獲舊物曰豫殆過去沙門也即去家依自省祝髮從文照通講說又從敏行授楞嚴俄得病瀕死歎曰諸佛涅槃正路不在文句中吾欲以聲求色見宜其無以死也遂棄去至真覺勝禪師之席勝方創臂出血指示師曰此曹溪一滴也師矍然良久曰道固如是乎即徒步出蜀首謁玉泉皓次依金鑾信大溈哲黃龍心東林度僉指為法器而晦堂稱他日臨濟一派屬子矣最後見五祖盡其機用祖皆不諾乃謂祖強移換人出不遜語忿然而去祖曰待你著一頓熱病打時方思量我在師到金山染傷寒困極以平日見處試之無得力者追繹五祖之言乃自誓曰我病稍間即歸五祖病痊尋歸祖一見而喜令即參堂便入侍者寮方半月會部使者解印還蜀詣祖問道祖曰提刑少年曾讀小艷詩否有兩句頗相近頻呼小玉元無事祇要檀郎認得聲提刑應喏喏祖曰且仔細師適歸侍立次問曰聞和尚舉小艷詩提刑會否祖曰他祇認得聲師曰祇要檀郎認得聲他既認得聲為甚麼却不是祖曰如何是祖師西來意庭前柏樹子聻師忽有省遽出見雞飛上䦨干鼓翅而鳴復自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香銷錦繡幃笙歌叢裏醉扶歸少年一段風流事祇許佳人獨自知祖曰佛祖大事非小根劣品所能造詣吾助汝喜祖遍謂山中耆舊曰我侍者參得禪也由此所至推為上首宗門武庫云圓悟和尚嘗參蘄州北烏牙方禪師佛鑒和尚嘗參東林宣祕度禪師皆得昭覺平實之旨同至五祖室中平生所得一句用不著久之無契悟下載悟緣同上圓悟和尚初在溈山一日真如和尚問曰如何悟云起滅不停如曰可知是博地凡夫老僧三十年在裏許踐履祇得個相似次見晦堂堂曰我住院十二年不會如今方會腳尖頭也踢出個佛悟後住昭覺有長老問劉鐵磨到溈山問答并雪竇御街行頌未審此意如何悟曰老僧更參四十年也不到雪竇處長老歎曰昭覺和尚猶如此說況餘人耶師語録中小參有云山僧頃日問五祖和尚二祖云覓心了不可得畢竟如何他道汝須自參始得這些好處別人為汝著力不得參來參去忽因聞舉頻呼小玉元無事祇要檀郎認得聲忽然桶底脫庭前柏樹子也透麻三斤也是玄沙蹉過也是睦州擔板也是不落因果也是不昧因果也是三乘十二分教二六時中眼裏耳裏乃至鐘鳴鼓響驢鳴犬吠無非這個消息又云五祖嘗云諸方參得底禪如琉璃瓶子相似愛護不捨第一莫教老僧見將鐵椎一擊定碎也山僧初見他如此說便盡心參他嘗問有句無句如藤倚樹作麼生會山僧便喝或下語總不契他云須是情識淨盡計較都忘處會山僧明日便於無計較處胡道亂道轉沒交涉後來徹悟實見實用如鏡當臺明珠在掌又云老僧往日為熱病所苦死却一日觀前路黑漫漫地都不知何往獲再蘇醒遂驚駭生死事便乃發心行腳尋訪有道知識體究此事初到大溈參真如和尚終日面壁默坐將古人公案翻覆看及一年許忽有個省處然只認得個昭昭靈靈驢前馬後只向四大身中作個動用若被人拶著一似無見處只為解脫坑埋却禪道滿肚於佛法上看即有於世法上看即無後到白雲先師處被他云你總無見處自此全無咬嚼分下載悟緣同此問古人道楖𣗖橫擔不顧人直入千峰萬峰去未審那裏是他住處師曰騰蛇纏足路布繞身曰朝看雲片片暮聽水潺潺師曰却須截斷始得曰此回不是夢真個到廬山師曰高著眼僧問譬如擲劒揮空有一人劒亦無虗空亦不揮時如何師曰大衆見你敗闕曰學人只管推出和尚何不放行師曰莫謗崇寧好曰為甚麼不肻承當師曰藏身露影曰今日捉敗師曰果然僧問九旬禁足三月護生只如花猫取斷南泉分身兩段斑蛇適會赤眼就地一鉏未審是持是犯師云破戒也不知進云大用不拘今古楷模師云依舊分身兩段進云若然者玉箸撐開虎眼睛金鞭擊斷那叱臂師云你向甚麼處見南泉歸宗進云只在目前師云重言不當喫僧問如何是初日分以恆河沙等身布施師曰大海若不納百川應倒流如何是中日分以恆河沙等身布施師曰現成公案如何是後日分亦以恆河沙等身布施師曰盡未來際一時收僧問東禪嶽如何是初日分以恆河沙等身布施嶽曰從苗辨地因語識人如何是中日分以恆河沙等身布施曰築著磕著如何是後日分亦以恆河沙等身布施曰向下文長付在來日僧問最初威音王末後樓至佛未審威音參見甚麼人師曰參見無面目底僧云只如無面目人復見阿誰師云狂狗趂塊僧云爭奈拄杖子在學人手裏師云你試用看僧云到這裏直得無言可說無理可伸師云只得七成僧云可謂師承不立代相傳師云一刀截斷僧云既然如是和尚何用更覔白雲師云你道威音樓至佛即今在什麼處僧云一串穿却師云頂𩕳上更添一隻眼始得祈雨上堂僧問萬里不挂片雲時如何師曰老僧也怪伊曰青天也須喫棒又作麼生師曰行遣早遲也曰過在甚麼處師曰彼此住山人更不重注破曰好雨下時却不下不天晴處却天晴師曰適來你向甚麼處去來曰乍卷乍舒去也師曰腳跟下更與一棒直得雨似盆傾曰總不與麼時如何師曰捩轉鼻孔曰忽然應時應節又作麼生師曰山前禾麥熟盡唱太平歌示衆云通身是眼見不到通身是耳聞不及通身是口說不著通身是心鑑不出通身即且置或若無眼作麼生見無耳作麼生聞無口作麼生說無心作麼生鑑若向這裏撥得一線路便與古佛同參且道參甚麼人徑山杲云惜乎徑山當時不在若在點一把火照看這老漢面皮厚多少即今莫有旁不甘底出來道和尚也是普州人又作麼生即向他道西天斬頭截臂這裏自領出去示吳教授祖佛以神道設教惟務明心達本況人人具足各各圓成但以迷妄背此本心流轉諸趣枉受輪回而其根本初無增減諸佛以為一大事因緣而出蓋為此也祖師以單傳密印而來亦以此也若是宿昔韞大根利智便能於腳跟直下承當不從他得了然自悟廓徹靈明廣大虗寂從無始來亦未曾間斷清淨無為妙圓真心不為諸塵作對不與萬法為侶常如十日並照離見超情截却生死浮幻如金剛王堅固不動乃謂之即心即佛更不外求惟了自性頓時與佛祖契合到無疑之地把得住作得主可不是徑截大解脫耶探究此事要透生死豈是小緣應當猛利誠志信重如救頭然始有少分相應多見參問之士世智聰明只圖資談柄廣聲譽以為高上趨向務以勝人但增益我見如以油救火其𦦨益熾直到臘月三十日茫然繆亂殊不得纖毫力良由最初已無正因所以末後勞而無功是故古德教人參涅槃堂裏禪誠有旨也生死之際處之良不易惟大達超證之士奮利根勇猛一徑截斷則無難然此段雖由自己根力亦假方便於常時些小境界中轉得行打得徹不存解不立見凜然全體現成踐履將去養得純熟到緣謝之時自然無怖畏只有清虗瑩徹無一法可當情如懸崖撒手棄捨得無留戀一念萬年萬年一念覓生了不可得豈有死也是故古德坐脫立亡行化倒蛻能得勇健皆是平昔汰淘得淨潔香林四十年得成一片湧泉四十年尚有走作石霜勸人休去歇去古廟香爐去永嘉云體即無生了本無速業業兢兢念茲在茲方得無礙自在既捨生之後得意生身隨自意趣後報悉以理遣不由業牽所謂透脫生死耶報緣未謝於人間世上有如許參涉交互應須處之綽綽然有餘始得人生各隨緣分不必厭喧求靜但令中虗外順雖在閙市沸湯中亦恬然安穩才有纖毫見刺則打不過也示張持滿要須根本明徹理地精至純一無雜才有是非紛然失心若踏正脉諸天捧花無路魔外潛覷不見深深海底行高高峰頂立始得不驚羣動衆謂之平常心本源天真自性也雖居千萬人中如無一人相似此豈粗浮識想利智聰慧所能測哉示諭綿密無間寂照同時歲月悠久打成一片而根本愈牢密密作用誠無出此應當當處全真則彼我遐邇觸處皆渠剎剎塵塵皆在自己大圓鏡中愈綿愈密能轉換也故雲門道直得乾坤大地無纖毫過患猶為轉句不見一色始是半提直得如此更須知有向上全提底時節始得所以德山棒臨濟喝皆徹證無生透頂透底融通自在到大用現前處方能出沒欲人全身擔荷外退守文殊普賢大人境界巖頭道他得底人只守間間地二六時中無欲無依自然超諸三昧德山亦云汝但無事於心於心無事則虗而靈寂而照若毫端許言本末者皆為自欺此既已明當須履踐但只退步愈退愈明愈不會愈有力量異念才起擬心才生即猛自割斷令不相續則智照洞然步步踏實地豈有高低憎愛違順揀擇於其間哉無明習氣旋起旋消悠久間自無力能擾人也古人以牧牛為喻誠哉所謂要久長人耳直截省要最是先亡我見使虗靜恬和任運騰騰騰騰任運於一切法皆無取捨向根根塵塵應時脫然自處孤運獨照照體獨立物我一如直下徹底無照可立如斬一綟絲一斬一切斷便自會作活計去也佛見法見尚不令起則塵勞業識自當冰消瓦解又云但逢緣遇境莫不管帶何止此生而已窮未來際證無量聖身也未是他泊頭處但一味退步莫作限量也示韓朝議曰古云說得一丈不如行得一尺蓋定慧之力回轉業緣正要惺惺地勇猛果決千百生中當受用其餘古人機緣不必盡要會但一著分明則著著如此千變萬化豈移變得渠力用哉示方清老云胸次空勞勞不留毫髮洞然虗凝言思路絶直契本源泯然無際自得本有無得妙智方號信及見徹猶有無量無邊莫測莫量大機大用在倘留些能所墮在緣塵則卒急便未相應示尼修道者直下發明從本以來元自具足妙圓真心觸境遇緣自知落著便乃守住患不能出得遂作窠臼向機境上立照立用下咄下拍努目揚眉一場特地更遇本色宗匠盡與拈却如許知解直下契證本來無為無事無心境界然後識羞慚知休歇一向冥然諸聖尚覔他起念處不得況其餘耶見與佛齊猶有佛地障在大宗師為人雖不立窠臼露布久之學徒妄認亦是窠臼蓋以無窠臼為窠臼無露布作露布應須及之令盡無令守株待兔才毫髮要無事早是事生究竟佛亦不立喚甚作衆生菩提亦不立喚甚作煩惱翛然永脫應時納祐欲得親切第一不用求求而得之已落解會休歇到一念不生處即是透脫不墮情塵不居意想迥然超絶則遍界不藏物物頭頭渾成大用一一皆從自己胸襟流出古人謂之運出自己家財一得永得受用豈有窮極似大死人已絶氣息到本分地上大休大歇口鼻眼耳初無相知手足項背各不相到然後向寒灰死火上頭頭上明枯水朽株間物物斯照示信侍者百不干懷時圓融無際脫體虗凝一切所為曾無疑間謂之現成本分事及至才起一毫頭見解欲承當作主宰便落在陰界裏被見聞覺知得失是非籠半醉半醒打疊不辦約實而論但於閙閧閧處管帶得行如無一事相似透頂透底直下圓成了無形相不廢功用不妨作為語默起倒終不是別人稍覺纖毫滯礙悉是妄想直教灑灑落落如太虗空如明鏡當臺如杲日麗天一動一靜一去一來不從外得放教自由自在不被法縛不求法脫盡始盡終打成一片何處離佛法外別有世法離世法外別有佛法是故祖師直指人心金剛般若貴人離相譬如壯士屈伸臂頃不借他力如此省要好長時自退步體究令有個落著諦實證悟之地即是念念遍參無量無邊大善知識也示良爐頭但令心念澄靜紛紛擾擾處正好作工夫當作工夫時透頂透底無絲毫遺漏全體現成更不自他處起惟此一大機阿轆轆轉更說甚世諦佛法一樣平持日久歲深自然腳跟下實確確地只是個良上座直下契證如水入水示蔣待制每接士大夫多言塵事縈絆未暇及此待稍撥剔了然後存心體究此雖誠實之言只以塵勞為務頭出頭沒爛骨董地熟了只喚作塵事更待撥却塵緣方可趣入其所謂終日行而未嘗行終日用而未嘗用豈是塵勞之外別有此段大因緣耶殊不知大寶聚上放大寶光輝天焯地不自省悟承當更去外求轉益辛勤豈為至要若具大根器不必看古人言句公案但只從朝起正却念靜却心凡所指呼作為一番作為一番更提起審詳看從何處起是個甚物作為得如許多當塵緣中一透一切諸緣靡不皆是何待撥剔即此便可超宗越格於三界火宅之中變化成清淨無為清凉大道場也法華經云佛子住此地即是佛受用經行及坐臥常在於其中此一件事直饒三世諸佛出興以無量知見方便接引亦只有限歷代祖師天下老和尚設千百問答提持亦只有限不如向自己腳跟下究取威音王已前空劫那畔自己家珍隨處受用也須是大丈夫漢意氣方有如是作略亦不依他言語指示不受他欺謾從朝至夜入息不居陰界出息不涉萬緣極是省要只為各各當人自違背此事向六根門頭認光認影不得快活却云爭奈某甲疑何且道疑從什麼處來又道某甲為甚麼道不得只你這道不得底是什麼為你不能回光直下承當祖師道自己分上有如是靈光有如是自在一切衆生流浪情塵不能解脫假使將此一大事因緣種種垂示猶是有機有境落在情塵要會麼直是一念不生方有少分相應解制小參師云收因結果慎末護初一段因緣此時周備聖賢窠窟生死根株一鎚擊碎一刀截斷若是通方作者舉著知歸後進初機如何湊泊祇如生佛未分空劫已前威音王那邊還有結制解制也無雖然到這裏直饒千聖出頭來也須目瞪口呿那邊即且致只如今燈燭交光坐立儼然高者是天厚者是地山是山水是水有是有無是無長是長短是短正當恁麼時與威音王已前空劫那畔是同是別若向個裏倜儻分明目前無法胸中無心上不見諸聖下不見凡夫外不見一切境界內不見眼耳鼻舌身意便能通同一切說甚麼結制解制一鎚擊碎聖賢窠窟一刀截斷生死根株設使臨濟德山文殊普賢乃至無量無邊具大解脫有大威神無數河沙浩浩地來不消一揑且憑個甚麼若不藍田射石虎幾乎誤殺李將軍示衆天堂地獄草芥人畜六類四生纖洪近遠無不皆真但為未徹根源底居常生心動念皆在塵勞業識中流轉未曾回光返照所以枉受輪回不得受用示衆直下如懸崖撒手放身捨命捨却見聞覺知捨却菩提涅槃真如解脫若淨若穢一時捨却令教淨裸裸赤灑灑自然一聞千悟從此直下承當却來反觀佛祖用處與自己無二無別乃至閙市之中四民浩浩經商貿易以至於風鳴鳥噪皆與自己無別然後佛與衆生為一煩惱與菩提為一心與境為一明與暗為一是與非為一乃至千差萬別悉皆為一方可攪長河為酥酪變大地作黃金都盧渾成一片而一亦不立然後行是行坐是坐著衣是著衣喫飯是喫飯如明鏡當臺胡來胡現漢來漢現初不作計較而隨處現成示許庭龜多見聰俊明敏根浮腳淺便向言語上認得轉變即以世間無可過上遂增長見刺逞能逞解逞言語快利將謂佛法只如此及至境界緣生透脫不行因成進退良可痛惜是故古人直是千魔萬難悉皆嘗遍雖七處割截亦不動念一往操心猶如鐵石以至透脫生死渾不費力豈不是大丈夫超詣示隆知藏有祖以來惟務單傳直指不喜帶水拖泥打露布列窠窟鈍置人蓋釋迦老子三百餘會對機設教立世垂範大段周遮是故最後徑截省要接最上機雖自迦葉二十八世少示機關多顯理致至於付授之際靡不覿面提持如倒剎竿碗水投針示圓光相執赤幡把明鑑說如鐵橛子傳法偈達磨破五宗與外道立義天下太平翻轉我天爾狗皆神機迅捷非擬議思惟所測又云五祖老師平生孤峻少許可人乾嚗嚗地壁立只靠此一著常自云如倚一座須彌山豈可落虗弄滑頭謾人把個沒滋味鐵酸餡劈頭拈似學者令咬嚼須待渠桶底子脫喪却如許惡知惡見胸次不挂絲毫透得淨盡始可下手鍛鍊方禁得拳踢然後示以金剛王寶劍度其果能踐履負荷淨然無一事山是山水是水更應轉向那邊千聖羅籠不肻住處便契乃祖以來傳持正法眼藏及至應用為物仍當驅耕夫牛奪饑人食證驗得十成無滲漏即是本家道流也摩竭提國親行此令少林面壁全提正宗而時流錯認遂尚泯默以為無縫罅無摸索壁立萬仞殊不知本分事但恣情識摶量便為高見此大病也從上來事本不如是嚴頭云只露目前些子個如擊石火閃電光若搆不得不用疑著此是向上人行履處除非知有莫能知之趙州喫茶去祕魔巖擎杈雪峰輥毬禾山打鼓俱胝一指歸宗拽石玄沙未徹德山棒臨濟喝並是透頂透底直截剪斷葛藤大機大用千差萬別會歸一源可以與人解粘去縛若隨語作解即須與本分草料如七斛驢乳只以一滴師子乳滴悉皆迸散要腳下傳持相繼綿遠直須不狥人情勿使容易乃端的也末後一句始到牢關誠哉是言透脫死生提持正令全是此個時節惟踏著上頭關棙子底便諳悉也示李嘉仲若能蘊宿根本從諸佛祖師直截指示處便倒底脫却炙脂衲襖赤條條淨裸裸直下承當不從外來不從內出當下廓然明證此性更說甚人佛心如紅罏上著一點雪何處更有如許多忉怛也是故此宗不立文字語句惟最許上乘根器如飄風疾雷電激星飛脫體契證截生死根破無明殼了無疑惑直下頓明二六時中轉一切事緣皆成無上妙智豈假厭喧求靜棄彼取此一真一切真一了一切了示衆欲知佛性義當觀時節因緣時節若至其理自彰苟或時節未至理地未明便乃業識茫茫無本可據敢問諸公即今是什麼時節莫是黃昏時節麼莫是小參時節麼莫是坐立儼然時節麼莫是說禪說道時節麼莫是萬象交參時節麼莫是心境一如時節麼若與麼儱侗且喜沒交涉今夜諸公在此權立片時山僧不惜眉毛確實評論這一段時節去也只如諸公在此聽山僧鼓兩片皮用作時節正墮常情須知山僧不曾說一字諸人不曾聞一言諸人與山僧各各有一段大事輝騰今古迥絶知見淨裸裸赤灑灑各不相知各不相到透聲透色超佛超祖若能退步就己脫却情塵意想記持分別露布言詮聞見覺知是非得失直下豁然瞥地便與古佛同一知見同一語言同一手作同一體相非惟與諸聖同亦乃與歷代宗師天下老和尚同下至四生六道醯雞蠛蠓無不皆同不被前塵所惑知解所撓不畏生死不愛涅槃放曠平常隨時任運動靜施為無非解脫能轉一切境界能使一切語言非惟諸人分上如此至於古人無不皆由此個時節得入豈不見趙州初參南泉悟平常心是道後來有問西來意便對道庭前柏樹子以至鎮州出大蘿蔔頭我在青州作一領布衫重七斤非惟趙州德山得此時節入門便打臨濟得此時節入門便喝睦州得此時節便道現成公案放你三十棒俱胝一指頭上用此時節鳥窠吹布毛處見此時節以要言之古來宗師無不皆用此個時節只如法眼曾舉參同契云竺土大仙心遂云無過此語也向下中間也只是應時應節說話至最後謹白參玄人光陰莫虗度乃云住住恩大難酬設使粉骨碎身亦報此恩不得豈不是知此節節方恁麼說如今若有未發明去處只虗度光陰若參得徹底分明去二六時中管取無絲毫許落虗非惟二六時中至百千億劫盡未來際悉不落虗只如山僧說恁麼時節還得諦當也未復云夢也未曾夢見在且道還有為人處也無若善參詳只這一句亦不虗設示衆世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知商那和修三昧優波毱多不知既是各各不知何故却相傳授到這裏不妨誵訛處直是誵訛綿密處直是綿密師云父母未生已前淨裸裸赤灑灑不立一絲毫及乎投胎既生之後亦淨裸裸赤灑灑不立一絲毫然生於世墮在四大五蘊中多是情生翳障以身為礙迷却自心若是明眼人明了四大空寂五蘊本虗知四大五蘊中有個輝騰今古迥絶知見底一段事若能返照無第二人腳跟下淨裸裸赤灑灑六根門頭亦淨裸裸赤灑灑乃至山河大地窮虗空界盡無邊香水海亦淨裸裸赤灑灑恁麼說話莫是撥有歸無麼且喜沒交涉若撥有歸無杳杳冥冥墮在豁達空撥無因果處則永劫出他地獄三塗因果不得若真實徹證到真淨明妙實際理地則四聖六凡三世諸佛天下祖師有情無情悉於是中流出顯現所以孚上座問鼓山晏國師道父母未生前鼻孔在什麼處山云即今生也在什麼處孚上座不肻云你問我來山如前問孚但搖扇大凡參請參須實參見須實見用須實用父母未生前鼻孔在甚麼處孚上座只搖扇莫是弄精魂麼須知有奇特事始得只如文殊初生見十吉祥異相須菩提生室現空相善財初生湧出萬寶藏皆在此一大寶光中淨裸裸赤灑灑流出若只在杳杳冥冥墮在空空寂寂處豈有如是奇特所以古人於生處見大奇特如世尊分手指於天地自云天上天下惟吾獨尊若逢雲門大師尚不以為奇特直行衲僧正令後來老宿云雲門知恩方解報恩既知了方以衲僧本分事向逆順境界中行且道還當得麼若是平展商量則有向上事若據衲僧本分事上不直半文錢何故他家自有通霄路師一日到首座寮因說密印長老四年前見他恁麼地乃至來金山升座也祇恁麼地打一個回合了又打一個回合祇管無收殺如何為得人恰如載一車寶劍相似將一柄出了又將一柄出祇要搬盡若是本分手段拈得一柄便殺人去那裏祇管將出來弄時有僧聞得謂師曰某前日因看他小參語録便知此人平日做得細膩工夫所以對衆祇管要吐盡一段了又一段不肻休師曰事不如此如龍得半盞水便能興雲起霞降注大雨那裏祇管大海裏輥謂我有許多水也又如會相殺人持一條鎗才見賊馬便知那個定是我底近前一鎗殺了賊跳上馬背便殺人去須是恁麼始得紹興五年八月己酉示微恙趺坐書偈遺衆投筆而逝茶毗舌齒不壞設利五色無數塔于昭覺寺之側舒州太平慧勤佛鑑禪師本郡汪氏子丱歲師廣教圓深試所習得度每以惟此一事實餘二則非真味之有省乃遍參名宿往來五祖之門有年恚祖不為印據與圓悟相繼而去及悟還侍五祖得徹證而師忽至意欲他邁悟勉令挂搭且曰某與兄相別始月餘比舊相見時如何師曰我所疑者此也遂參堂一日聞祖舉僧問趙州如何是和尚家風州曰老僧耳聾高聲問將來僧再問州曰你問我家風我却識你家風了也師即大豁所疑曰乞和尚指示極則祖曰森羅及萬象一法之所印師展拜祖令掌翰墨後同圓悟語話次舉東寺和尚問仰山汝是甚處人仰山曰廣南人寺曰我聞廣南有鎮海明珠曾收得否山曰收得寺曰珠作何色山曰白月即現黑月即隱寺曰何不呈似老僧山叉手近前云慧寂昨到溈山被索此珠直得無言可對無理可伸悟顧師曰既云收得逮索此珠又云無言可對無理可伸是如何師無語忽一日謂悟曰仰山見東寺因緣我有語也東寺當時只索一顆珠仰山傾出一栲栳悟深肻之乃告之曰老兄更宜親近老和尚去師一日造方丈未及語被祖詬詈懡㦬而退歸寮閉門打睡恨祖不已悟已密知即往扣門師曰誰悟曰我師即開門悟問你見老和尚何如師曰我本不去被你賺纍我遭這老漢詬罵悟呵呵大笑曰你記得前日下的語麼師曰是甚麼語悟曰你又道東寺祇索一顆仰山傾出一栲栳師當下釋然悟遂領師同上方丈祖才見遽曰勤兄且喜大事了畢政和七年九月八日上堂祖師心印狀似鐵牛之機去即印住住即印破直饒不住不破亦未是衲僧行履處且作麼生是衲僧行履處待十月前後為諸人注破至十月八日沐浴更衣端坐手寫數書別故舊停筆而化闍維收靈骨設利塔于本山舒州龍門清遠佛眼禪師讀法華至是法非思量分別之所能解質其講師師不能答遂遍參至太平見五祖旋丐於廬州偶雨仆地煩悶間聞二人交相惡罵諫者曰你猶自煩惱在師於言下有省及歸凡有所問祖即曰我不如你你自會得好或曰我不會我不如你師愈疑遂咨決於元禮首座禮乃以手引師之耳繞圍罏數匝且行且語曰你自會得好師曰有冀開發乃爾相戲耶禮曰你他後悟去方知今日曲折耳太平將遷海會師慨然曰吾持鉢方歸復參隨往一荒院安能究決己事耶遂作偈告辭之蔣山坐夏邂逅靈源禪師相與甚善話次師曰比見都下一尊宿語句似有緣源曰演公天下第一宗師何故捨而事遠遊耶所謂有緣者蓋知解之師與公初心相應耳師從所勉徑趨海會後命典謁適寒夜孤坐撥罏見火如豆許恍然自喜曰深深撥有些子平生事只如此遽起閲几上傳燈録至破竈墮因緣忽大悟作偈曰刀刀林鳥啼披衣終夜坐撥火悟平生窮神歸破墮事皎人自迷曲淡誰能和念之永不忘門開少人過圓悟因詣其寮舉青林搬柴話驗之青林師䖍禪師得法洞山凡新到令搬柴三轉然後參堂有僧不肯問曰三轉內即不問三轉外如何䖍曰鐵輪天子寰中旨僧無語䖍便打趂出且謂古今無人出得你如何會師曰也有甚難悟曰祇如他道鐵輪天子寰中旨意作麼生師曰我道帝釋宮中放赦書悟退語人曰且喜遠兄便有活人句也宗門武庫云佛眼禪師在五祖時圓悟舉臨濟三句語問眼一日忽謂悟曰我舉三句向你以手屈指曰此是第二句第三句已說了便走悟舉似祖祖曰也好𠰚眼乃辭五祖參歸宗真淨和尚去後祖謂悟曰歸宗波爛濶弄大旗手段遠到彼未必相契未數日有書抵悟曰比到歸宗偶然漏網聞雲居清首座作晦堂贊曰聞時富貴見後貧窮頗疑著他及相見果契合踰年復還祖山衆請秉拂却說心性禪祖曰遠却如此說禪莫管他師語録云山僧初參勝和尚教看如何是佛法大意楚王城畔汝水東流又令看風幡話及至下來參老和尚乃請問古人聲色純真老和尚千說萬說祇是理會不得後來又令看如何是奇特事云你道什麼遂却歡喜蓋為有個撮摸處遂常看云如何是奇特事云你道什麼獨自思量云我道什麼來我道奇特事又不見有奇特處看三年不會遂去游浙中途回來却令看殺父殺母佛前懺悔殺佛殺祖向甚麼處懺悔雲門云露這公案一似熱鐵一團在心中七年喫盡辛苦示衆以迷心故山林中來見善知識將謂別有一道可令人安樂不知返究向來迷處功夫最第一示衆千說萬說不若親面一見縱不說亦自分明王子寶刀喻衆盲摸象喻禪學中隔江招手事望州亭相見事迥絶無人處深山巖崖處事此皆親面而見之不在說也上堂大衆或有人喚上座上座便應設使不應心中也須領覽今時學人便道應底是也領覽底是也若如此會便是入地獄漢子是即且置且道面前是阿誰喚你是有人喚耶是無人喚耶還裁斷得麼若是有人喚山精鬼魅喚你時天魔外道喚你時如何辨白若道無人喚你又不聾不騃如何得無人喚者個是十二時中生死路頭事諸人明得麼有人喚生迷亂無人喚遭繫絆若能行生死斷萬兩金終不換下座示衆我且問你適來因甚麼問訊聖僧且問訊時還印證你麼還肯諾你麼若道印證你他是土聖僧豈解印證你若道肯諾你豈解肯諾你既不解印證肯諾問迅作麼莫是仁義道中麼莫是覩相生善麼若是仁義道中衲僧家豈有仁義豈有覩相生善莫是事不獲已隨衆問訊麼又成何道理到這裏須一一明始得不見長沙大師一日回頭見聖僧忽然知歸便云回頭忽見本來身本身非見亦非真若將本體同真體歷劫迢迢受苦辛諸人還會此個道理麼珍重上堂今日七月二十解夏來又是五日也你禪僧家盡道我會也且道今日是七月二十不是七月二十或若當此一問於佛法中如何祗對有底師僧道何不問本分事這個是世間日月大衆那個是世間日月又豈有不管底法又有師僧道不動世間一星子就上便明取恁麼事今日七月二十也大衆那裏是不動底一星子得安樂底人終不作這般去就山僧問你今日是七月二十不是七月二十有人明得麼古人云世間事明不得佛法太遠在這裏若分疏不下一切處礙塞殺人還知麼大火聚中難著手清凉池內易安身下座師作示道三偈一曰隨流千聖靈蹤百草頭卓然放去號隨流從教萬古無人識笑殺溈山水牯牛二曰合轍水中月是天邊月南北東西更無別新羅打鐵火星飛燒著指頭名合轍三曰雙唱坐斷千差古路頭解開空岸濟人舟明明一句該羣象善唱無聲作麼求問僧癩狗因甚無毛代云已被和尚道了也問六祖不識字為甚墜腰石上題龍朔三年老盧記代云更須子細宣和二年書雲前一日飯食訖趺坐謂其徒曰諸方老宿臨終必留偈辭世世可辭耶且將安往乃合掌怡然趨寂塔於龍門靈光臺側彭州大隨南堂元靜禪師參永安恩於臨濟三頓棒話發明次依諸名宿無有當意者聞五祖機峻欲抑之遂謁祖祖乃曰我此間不比諸方凡於室中不要汝進前退後竪指擎拳繞禪牀作女人拜提起坐具千般伎倆祇要你一言下諦當便是汝見處師茫然退參歷三載一日入室罷祖謂曰子所下語已得十分試更與我說看師即剖而陳之祖曰說亦說得十分更與我斷看師隨所問而判之祖曰好即好祇是未得老僧說話在齊後汝可來祖爺塔所與汝一一按過始得及至彼祖便以即心即佛非心非佛睦州擔板漢南泉斬猫兒趙州狗子無佛性有佛性之語編辟之其所對了無凝滯至子胡狗話祖遽轉面曰不是師曰不是却如何祖曰此不是則和前面皆不是師曰望和尚慈悲指示祖曰看他道子胡有一狗上取人頭中取人腰下取人腳入門者好看才見僧入門便道看狗向子胡道看狗處下得一轉語教子胡結舌老僧鈐口便是你了當處次日入室師密啓其說祖笑曰不道你不是千了百當底人此語祇似先師下底語師曰某何人得似端和尚祖曰不然老僧雖承嗣他謂他語拙蓋祇用遠録公手段接人故也如老僧共遠録公便與百丈黃檗南泉趙州輩把手共行才見語拙即不堪師以為不然乃拽杖渡江適大水泛漲因留四祖儕輩挽其歸又二年祖方許可嘗商略古今次執師手曰得汝說須是吾舉得汝舉須是吾說而今而後佛祖祕要諸方關鍵無逃子掌握矣師因五祖垂語云身之一字也大難說教中道地水火風四大假合據老僧所見亦未是在有人道得老僧大展坐具禮他三拜師云某甲道得請和尚禮拜祖提起坐具師便趨退祖擲下坐具師揭簾而出云賊過後張弓上堂問答已乃曰有祖已來時人錯會祇將言句以為禪道殊不知道本無體因體而立名道本無名因名而立號祇如適來上座才恁麼出來便恁麼歸衆且道具眼不具眼若道具眼才恁麼出來眼在甚麼處若道不具眼爭合便恁麼去諸仁者於此見得倜儻分明則知二祖禮拜依位而立真得其髓祇這些子是三世諸佛命根六代祖師命脉天下老和尚安身立命處雖然如是須是親到始得有一老宿垂語云十字街頭起一間茅廝祇是不許人屙僧舉以叩師師曰是你先屙了更教甚麼人屙宿聞焚香遙望大隨拜謝紹興乙卯秋七月山中大雨雪有異象師曰吾期至矣十七日別郡守以次越三日示少恙于天彭二十四夜謂侍僧曰天曉無月時如何僧無對師曰倒教我與汝下火始得翌日還堋口廨院留遺誡蛻然示寂門弟子奉全身歸烟霧四合猿鳥悲鳴茶毗異香遍野舌本如故設利五色者不可計瘞於定光塔之西師之法嗣護聖居靜禪師嘗謂衆曰參學至要不出先南堂道最初句及末後句逶得過者一生事畢倘或未然更與你分作十門各各印證自心還得穩當也未一須信有教外別傳二須知有教外別傳三須會無情說法與有情說法無二四須見性如觀掌中之物了了分明一一田地穩密五須具擇法眼六須行鳥道玄路七須文武兼濟八須摧邪顯正九須大機大用十須向異類中行凡欲紹隆佛種須盡此綱要方得坐這曲彔牀子受得天下人禮拜敢與佛祖為師若不到恁麼田地祇一向虗頭異日閻老子未放你在間有學者各門頌出呈師師以頌示曰十門綱要掌中施機會來時自有為作者不須排位次大都首末是根基人天眼目載此去先南堂三字指為南堂語而以後頌為護聖語今從燈録考定附載于此漢州無為宗泰禪師參五祖祖舉趙州洗鉢盂話俾參洎入室舉此話問師你道趙州向伊道甚麼這僧便悟去師曰洗鉢盂去聻祖曰你祇知路上事不知路上滋味師曰既知路上事路上有甚滋味祖曰你不知耶又問你曾游浙否師曰未也祖曰你未悟在師自此凡五年不能對祖一日升堂顧衆曰八十翁翁輥繡毬便下座師欣然出衆曰和尚試輥一輥看祖以手作打杖鼓勢操蜀音唱綿州巴歌曰豆子山打瓦鼓楊平山撒白雨白雨下取龍女織得絹二丈五一半屬羅江一半屬玄武師聞大悟掩祖口曰祇消唱到這裏祖大笑而歸蘄州五祖表自禪師依五祖最久未有省時圓悟為座元往請益悟曰兄有疑處試語我師遂舉德山小參不答話問話者三十棒悟曰禮拜著我作得你師舉話尚不會師作禮竟悟令再舉前話師曰德山小參不答話悟掩其口曰但恁麼看師出揚聲曰屈屈豈有公案祇教人看一句底道理有僧謂師曰兄不可如此說首座須有方便因靜坐體究及旬頓釋所疑詣悟禮謝悟曰兄始知吾不汝欺又詣方丈祖迎笑蘿湖野録載此又曰自從圓悟指示未幾有省及遷圓悟監總院務即舉自為座元圓悟私告五祖曰渠只得一橛大法未明在須更煅煉必為法器居無何五祖宣言請自立僧實欲激其遠到自聞之深有所待一日上堂以目顧自曰莫妄想便下座自氣不平趨琅琊啓公法社久之圓悟往撫存遂于言下大徹嘉州九頂清素禪師聞五祖舉首山西來意話焂然契悟述偈曰顛倒顛顛倒顛新婦騎驢阿家牽便恁麼太無端回頭不覺布衫穿祖見乃問百丈野狐話又作麼生師曰來說是非者便是是非人祖大悅太守呂公來瞻大像問曰既是大像因甚肩負兩楹師曰船上無散工至閣下覩觀音像又問彌勒化境觀音何來師曰家富小兒嬌守乃禮敬勤老宿至師問舞劒當咽時如何曰伏惟尚饗師詬曰老賊死去你問我勤理前語問之師叉手揖曰拽破紹興乙卯四月二十四日得微疾書偈遺衆曰木人備舟鐵人備馬丙丁童子穩穩登喝散白雲歸去也竟爾趨寂元禮首座初參五祖凡入室必謂曰衲僧家明取緇素好師疑之不已一日祖升堂舉首山新婦騎驢阿家牽語乃曰諸人要會麼莫問新婦阿家免煩路上波吒遇飯即飯遇茶即茶同門出入宿世冤家師於言下豁然且曰今日緇素明矣法閦上座久依五祖未有所入一日造室祖問不與萬法為侶者是甚麼人曰法閦即不然祖以手指曰住住法閦即不然作麼生師於是啓悟後至東林宣密度禪師席下武庫作宣祕度見其得平實之旨一日拈花繞度禪牀一匝背手插香罏中曰和尚且道意作麼生度屢下語皆不契踰兩月乃令師試說之師曰某祗將花插香罏中和尚自疑有甚麼事來金陵俞道婆市油餈為業常隨衆參問琅琊琊以臨濟無位真人話示之一日聞丐者唱蓮花落云不因柳毅傳書信何緣得到洞庭湖忽大悟以油餈投地夫曰你顛耶婆掌曰非汝境界往見琅琊琊望之知其造詣問那個是無位真人婆應聲曰有一無位真人六臂三頭努力瞋一擘華山分兩路萬年流水不知春圓悟蔣山開堂方至法座前婆於衆中躍出以身一拶便歸衆悟曰見怪不怪其怪自壞悟次日至其家婆不出厲聲曰這般黃口小兒也道出來開堂說法悟曰婆子少賣弄我識得你了也婆遂大笑出相見凡有僧至則曰兒兒僧擬議即掩門佛燈珣禪師往勘之婆見如前問珣曰爺在甚處婆轉身拜露柱珣即踏倒曰將謂有多少奇特便出婆蹶起曰兒兒來惜你則個珣竟不顧安首座至婆問甚處來曰德山婆曰德山泰老婆兒子安曰婆是甚人兒子婆曰被上座一問直得立地放尿頌馬祖不安因緣曰日面月面虗空閃電雖然截斷天下人舌頭分明祇道得一半東京淨因繼成禪師同圓悟法真慈受并十大法師禪講千僧赴大尉陳公良弼府齊時徽宗私幸觀之有善華嚴者賢首宗之義虎也對衆問曰吾佛設教自小乘至於圓頓掃除空有獨證真常然後萬德莊嚴方名為佛常聞禪宗一喝能轉凡成聖與諸經論似相違背今一喝若能入吾宗五教是為正說若不能入是為邪說諸禪視師師曰如法師所問不足三大禪師之酬淨因小長老可以使法師無惑也師召善善應諾師曰法師所謂愚法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空義也如我一喝非惟能入五教至於工巧伎藝諸子百家悉皆能入師震聲喝一喝問善曰聞麼曰聞師曰汝既聞此一喝是有能入小乘教須臾又問善曰聞麼曰不聞師曰汝既不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲消汝復道無道無則原初實有道有則而今實無不有不無能入終教我有一喝之時有非是有因無故有無一喝之時無非是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫遍虗空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善乃起再拜師復謂曰非唯一喝為然乃至一語一默一動一靜從古至今十方虗空萬象森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界惟心萬法惟識四時八節陰陽一致謂之法性是故華嚴經云法性遍在一切處有相無相一聲一色全在一塵中含四義事理無邊周遍無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在善又問曰如何是向上一路師曰汝且向下會取善曰如何是寶所師曰非汝境界善曰望禪師慈悲師曰任從滄海變終不為君通善膠口而出聞者靡不歎仰建寧府開善道瓊首座分座日嘗舉隻履西歸語謂衆曰坐脫立亡倒化即不無要且未有逝而復出遺履者為復後代兒孫不及祖師為復祖師剩有這一著子乃大笑曰老野狐紹興庚申冬信守以超化革律為禪迎為第一祖師語專使曰吾初無意人間欲為山子正為宗派耳然恐多不能往受請已取所藏泐潭繪像與木庵二字仍書偈囑清泉亨老寄得法弟子慧山曰口嘴不中祥老子愛向叢林鼓是非分付雪峰山首座為吾痛罵莫饒伊顧專使曰傳語侍郎行計迫甚不及修答聲絶而化杭州淨慈慧暉禪師初叩真歇微有所證後謁宏智智舉當明中有暗不以暗相遇當暗中有明不以明相覩問之語不契初夜定回往聖僧前燒香而宏智適至師見之頓明前話次日入室智舉堪嗟去日顏如玉却歎回時𩯭似霜詰之師曰其入離其出微自爾問答無滯智許為室中真子明州瑞巖法恭禪師一夕誦法華至父母所生眼悉見三千界時聞風刺棕櫚葉聲忽然有省棄依天童始明大旨舒州投子道宣禪師久侍天衣無所契衣叱之師忘寢食者月餘一夕聞巡更鈴聲忽猛省曰住住一聲直透青霄路寒潭月皎有誰知泥牛觸折珊瑚樹衣聞命職藏司住後凡有所問以拂子作搖鈴勢
