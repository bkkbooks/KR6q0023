body:
  text: 水月齋指月録原序嵆叔夜好鍛阮遙集好蠟屐當其意之所適視世之他好雜陳於前無足移也此不必明哲第無二子之僻者皆能喻鍛與屐無足尚交𠷣其失所好已而以二子之才之美方其跌宕爐韛婆娑火蠟之間雖窮極要眇以開之使勿好有嗑然而笑耳終不為之移已及其既喻則天地此爐韛也萬有此火蠟也孰足控搏孰足容與程伯子浮雲堯舜之業以玩物喪志目輯録五經語者意不若是乎人之好不齊乃或尊鍛而卑屐君屐而𨽻鍛不亦過乎豫垂髫則好讀竺墳尤好宗門家言及歲乙亥夏侍管師東溟先生於郡之竹堂寺幸以焦芽與霑甘露開蔽良多既而師則朝徹蟬蛻五宗掩耳不欲復聞豫則沈醋於是恆語同輩聖人六藝之精蘊諸所訓詁非讀竺墳不能得其真生於萬物之中而得為人人而男男而知讀書於書知竺墳於竺墳知宗門是猶𣪬乳而得雪山之牛復能得酪於乳得生酥於酪而熟酥而醍醐哉雖有他好吾不移矣此正豫跌宕爐韛婆娑火蠟時語也於是在架之書率多宗門家言每讀之如一瓶一鉢從諸耆宿於長林深壑雖人間世波濤際天埃𡏖蔽日豫席枕此如握靈犀得辟塵分流之妙彼浡潏堀堁莫能我侵矣意適處輒手録之當點筆意適雖圭組見逼必謝之兒稚牽挽必謝之寒暑之薄肌骨飢渴之迫臟腑有不暇顧肯復移意他好之雜陳耶僻而至是奚必人𠷣豫固自𠷣矣至乙未積録有三十二卷適友人陳孟起見而誤賞焉孟起遂為録二本會有黃州之役過故里嚴道徹至齋中亦誤賞焉遂以孟起本遺之道徹遽欲授梓豫笑曰此豫嵆氏之鍛阮氏之屐也凡所云意適者皆鴆毒也道之所以塞也豫既已喻其僻矣子乃欲使有目者共𠷣其僻耶堅止之逮辛丑豫自昭武乞骸歸道徹欲梓此意益堅且曰子謂此為僻子則謂然然可以已衆僻古之人不云乎惟楔出楔至為發願偈率其弟侄若子梓行之豫既不能止遂不敢藏其僻為次第緣起於其端題之曰水月齋指月録水月幻也而云指月果有如盤山所云心月孤懸光吞萬象者乎吾不可得而知也其質之爐韛火蠟萬曆壬寅夏五月戊寅那羅延窟學人瞿汝稷槃談書刻指月録發願偈有述釋典雖有宗教兩塗世尊云吾四十九年住世未曾説一字則何教之非宗乎顧宗門須憑實悟毫不容偽觀古之尊宿幾十年點胸自許直至末後為明眼人煅煉過方始開省則悟豈易言哉及其悟後奉戒愈精檢過愈密甚至向折腳鐺下入山磨煉真悟人氣象如此豈非識法者懼乎今之望見門頭戶口者便謂已證已得從而呵佛罵祖放蕩無檢聲色貨利居然常人而高談闊論明欺一世噫欺世乎自欺乎有日鬚眉墮落嘔血無及在何得歸罪於宗偈曰世皆懺罪造福我亦作福滅罪惟有流傳法寶續佛慧命為最願我生生世世不迷正路修行直取菩提上果遍度法界衆生還願衆生覺悟修行不迷正路聊憑標月指頭正見雲開月露逍遙性海之中當體與佛全同逐一銷除夙習次第到岸登峰慎勿撥無因果莽莽蕩蕩招禍殺盜淫妄不除豈得泥犂免墮還有向上一言頭上便是青天秋月梧桐滴露春風楊柳含煙萬曆辛丑歲八月初三日吳郡嚴澄和南書指月録總目卷之一七佛毗婆尸佛尸棄佛毗舍浮佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛附諸師拈頌諸經語句卷之二應化聖賢文殊菩薩天親菩薩維摩大士善財須菩提尊者無厭足王緊那羅王附舍利弗尊者鴦崛摩羅尊者賓頭盧尊者障蔽魔王那吒太子廣額屠兒文殊思業禪師附秦跋陀禪師金陵寶志禪師雙林善慧大士南嶽慧思禪師天台智者禪師泗州僧伽大聖萬回附天台豐干禪師天台寒山子天台拾得子明州布袋和尚法華志言大士扣氷澡先古佛千歲寶掌和尚懶殘法順大師清涼澄觀國師卷之三西天祖師一祖摩訶迦葉尊者二祖阿難尊者三祖商那和修尊者四祖優波毱多尊者五祖提多迦尊者六祖彌遮迦尊者七祖婆須密尊者八祖佛陀難提尊者九祖伏馱密多尊者十祖脅尊者十一祖富那夜奢尊者十二祖馬鳴尊者十三祖迦毗摩羅尊者十四祖龍樹尊者十五祖迦那提婆尊者十六祖羅睺羅多尊者十七祖僧伽難提尊者十八祖伽耶舍多尊者十九祖鳩摩羅多尊者二十祖闍夜多尊者二十一祖婆修盤頭尊者二十二祖摩拏羅尊者二十三祖鶴勒那尊者二十四祖師子尊者二十五祖婆舍斯多尊者二十六祖不如密多尊者二十七祖般若多羅尊者二十八祖菩提達磨尊者章次列于東土祖師卷之四東土祖師初祖菩提達磨大師二祖慧可大祖禪師三祖僧璨鑑智禪師四祖道信大醫禪師五祖弘忍大滿禪師六祖慧能大鑒禪師卷之五六祖下第一世南嶽懷讓禪師青原行思禪師六祖下第二世江西馬祖道一禪師南嶽讓嗣南嶽一世南嶽石頭希遷禪師青原思嗣青原一世卷之六二祖旁出法嗣僧那禪師向居士四祖旁出法嗣牛頭山法融禪師牛頭山智巖禪師融禪師嗣牛頭山智威禪師法持禪師嗣持慧方禪師嗣方巖禪師嗣安國玄挺禪師威禪師嗣天柱崇慧禪師二人徑山道欽禪師鶴林玄素嗣素牛頭威嗣天台雲居智禪師佛窟惟則嗣則牛頭慧忠嗣忠牛頭威嗣鳥窠道林禪師徑山欽嗣五祖旁出法嗣嵩嶽慧安國師壽州道樹禪師北宗秀嗣嵩嶽破竈墮和尚安國師嗣嵩嶽元圭禪師二人終南惟政禪師嵩山普寂嗣寂北宗秀嗣嵩山峻極和尚破竈墮嗣六祖旁出法嗣司空山本淨禪師南陽慧忠國師永嘉玄覺禪師西京荷澤神會禪師圭峰宗密禪師遂州道圓嗣圓荊南惟忠嗣忠磁州法如嗣如荷澤嗣卷之七未詳法嗣泗州塔頭講肇論僧道流在佛殿法師入佛殿六通院僧聖僧像死魚浮水馮延巳問聖僧年偃臺感山主僧見地藏子趂鴿問無揀廣南住菴僧圓通和尚童子上經先淨照禪