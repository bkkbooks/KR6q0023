body:
  text: 六祖下第十四世隆興府黃龍死心悟新禪師韶州黃氏子傳作王生有紫肉幕左肩右袒如僧伽黎比壯魁岸黑面如梵僧以氣節蓋衆好面折人初謁棲賢秀鐵面秀問上座甚處人師曰廣南韶州又問曾到雲門否師曰曾到又問曾到靈樹否師曰曾到秀曰如何是靈樹枝條師曰長底自長短底自短秀曰廣南蠻莫亂統師曰向北驢只恁麼拂袖而出秀器之而師無留意至黃龍謁晦堂堂竪拳問曰喚作拳頭則觸不喚作拳頭則背汝喚作甚麼師罔措經二年方領解然尚談辨無所抵牾堂患之偶與語至其鋭堂遽曰住住説食豈能飽人師窘乃曰某到此弓折箭盡望和尚慈悲指個安樂處堂曰一塵飛而翳天一芥墮而覆地安樂處政忌上座許多骨董直須死却無量劫來全傳作偷心乃可耳師趨出一日聞知事捶行者而迅雷忽震即大悟趨見晦堂忘納其屨即自譽曰天下人總是參得底禪某是悟得底堂笑曰選佛得甲科何可當也因號死心叟謁哲禪師於嶽麓哲問是凡是聖師曰非凡非聖哲曰是甚麼師曰高著眼哲曰恁麼則南山起雲北山下雨師曰且道是凡是聖哲曰爭奈頭上漫漫腳下漫漫師仰屋作噓聲哲曰氣急殺人師曰恰是拂袖便出謁法昌遇禪師遇問近離甚處師曰某甲自黃龍來遇曰還見心禪師麼師曰見遇曰甚麼處見師曰喫粥喫飯處見遇插火箸于罏中曰這個又作麼生師拽脫火箸便行師室中問僧月晦之陰以五色彩著于暝中令百人千萬人夜視其色寧有辨其青黃赤白者麼僧無語師代曰個個是盲人王正言問嘗聞三緣和合而生又聞即死即生何故有奪胎而生者師曰如正言作漕使隨所住處即居其位還疑否王曰不疑師曰復何疑也王於言下領解師住翠巖時翠巖有淫祠鄉人禱禬酒胾無虗日師誡知事令毀之知事辭以不敢掇禍師曰使能作禍吾自當之乃躬自毀拆俄有巨蠎盤臥內引首作吞噬之狀師叱之蠎遁安寢無他雪堂行和尚拾遺録載此事云是齊安王祠乃李主景遠也復云師一夜夢神人峩冠而前告曰弟子為師所斥不遑安處欲之廣南假莊夫六十人師夢中諾之未幾莊夫疫死者滿其數師後問學者曰且道果有鬼神否若道有又不打殺死心若道無莊夫為什麼却死答者皆不契適真淨會中元首座至師如前問元云甜瓜連蒂甜苦瓠連根苦師大喜之元乃辨才高弟也領雲巖建經藏太史黃庭堅為作記有以其親墓志鑱於陰者師罵曰凌侮不避禍若是語未卒電光翻屋雷擊自戶入析其陰中分之視之志已灰燼而藏記安然無損晚屬疾退居晦堂夜參竪起拂子云看看拂子病死心病拂子安死心安拂子穿却死心死心穿却拂子正當恁麼時喚作拂子又是死心喚作死心又是拂子畢竟喚作甚麼良久云莫把是非來辨我浮生穿鑿不相關有乞末後句者師示偈曰末後一句子直須心路絶六根門既空萬法無生滅於此徹其源不須求解脫平生愛罵人只為長快活政和五年十二月十三日晚小參説偈曰説時七顛八倒默時落二落三為報五湖禪客心王自在休參十五日泊然坐逝茶毗設利五色後有過其區者獲之尤甚閲世七十二坐四十五夏塔於晦堂丈室之北隆興府黃龍靈源惟清禪師生南州武寧陳氏方垂髫日誦數千言有異比丘見之引手熟視驚曰菰蒲中有此兒耶告其父母令出家年十七為大僧見延安耆宿法安安曰汝苦海法航也我尋常溝瀆耳黃龍心禪師是汝之師亟行無後師至黃龍泯泯與衆作息問答茫然不知端倪夜誓諸佛前曰儻有省發願盡形壽以法為檀世世力弘大法初閲玄沙語倦而倚壁起經行步促遺履俯取之乃大悟以所悟告寶覺覺曰從緣入者永無退失然新得法空者多喜悅或致亂令就侍者房熟寐洪覺範與師為法門昆仲嘗聞師論曰今之學者未脫生死病在什麼處在偷心未死耳然非其罪為師者之罪也如漢高帝紿韓信而殺之信雖曰死其心果死乎古之學者言下脫生死效在什麼處在偷心已死然非學者自能爾實為師者鉗鎚妙密也如梁武帝御大殿見侯景不動聲氣而景之心已枯竭無餘矣諸方所説非不美麗要之如趙昌畫花逼真非真花也政和七年九月十八日食罷掩房遣呼以栖首座至敘説決別乃起浴更衣以手指頂侍者為淨髮訖安坐而寂前十日自作無生常住真歸告銘曰賢劫第四尊釋迦文佛直下第四十八世孫惟清雖從本覺應緣而生而了緣即空初無自性氏族親里莫得而詳但以正因一念為所宗承是廁釋迦之遠孫其號靈源叟據自了因所了妙性無名字中示稱謂耳亦臨濟無位真人傅大士之心王類矣亦正法眼藏涅槃妙心惟證乃知餘莫能測者歟所以六祖問讓和尚什麼處來曰嵩山來祖曰什麼物恁麼來曰説似一物即不中祖曰還假修證否曰修證即不無汙染即不得祖曰即此不汙染是諸佛之護念汝既如是吾亦如是茲蓋獨標清淨法身以遵教外別傳之宗而揀云報化非真佛亦非説法者然非無報化大功大用謂若解通報化而不頓見法身則滯汙染緣乖護念旨理必警省耳夫少室道行光騰後裔則有雲門偃奮雄音絶唱於國中臨濟玄振大機大用於天下皆得正傳世咸宗奉惟清望臨濟九世祖也今宗教衰喪其未盡絶滅者唯二家微派斑斑有焉然名多愧實顧適當危寄而朝露身緣勢迫晞墜因力病釋俗從真敘如上事以授二三子吾委息後當用依稟觀究即不違先聖法門而自見深益慎勿隨末法所向乞空文於有位求為志銘張飾説以浼吾至囑至囑因自應作目所敘曰無生常住真歸告且繫之以銘銘曰無涯湛海瞥起一漚亘乎百年曷浮曷休廣漠清漢歘生片雲有無起滅隱顯何分了茲二者即見實相十世古今始終現量吾銘此旨昭示汝曹泥多佛大水長船高門弟子遵師遺誡藏骨石于海會示生死不與衆隔也龍興府泐潭草堂善清禪師謁黃龍龍示以風幡話久而不契一日龍問風幡話子作麼生會師曰迥無入處乞師方便龍曰子見貓兒捕鼠乎目睛不瞬四足踞地諸根順向首尾一直擬無不中子誠能如是心無異緣六根自靜默然而究萬無失一也師從是屏去間緣歲餘忽然契悟以偈告龍曰隨隨隨昔昔昔隨隨隨後無人識夜來明月上高峰元來祇是這個賊龍頷之復告之曰得道非難弘道為難弘道猶在己説法為人難既明之後在力行之大凡宗師説法一句中具三玄一玄中具三要子入處真實得坐披衣向後自看自然七通八達去師復依止七年乃辭韓子蒼問大慧曰清公如何慧曰向聞其拈龐居士問馬大師不與萬法為侶因緣云魚龍蝦蟹向甚處著若如此亦浪得其名子蒼持此語達師師曰公向他道譬如一人船行一人陸行二人俱至慧聞此語乃曰草堂得也吉州青原惟信禪師上堂老僧三十年前未參禪時見山是山見水是水及至後來親見知識有個入處見山不是山見水不是水而今得個休歇處依前見山祇是山見水祇是水大衆這三般見解是同是別有人緇素得出許汝親見老僧更參三十年迥無入處在漳州保福本權禪師黃山谷初有所入問晦堂此中誰可與語堂曰漳州權師方督役開田山谷同晦堂往致問曰直歲還知露柱生兒麼師曰是男是女黃擬議師揮之堂謂曰不得無禮師曰這木頭不打更待何時黃大笑上堂舉寒山偈曰吾心似秋月碧潭清皎潔無物堪比倫教我如何説老僧即不然吾心似燈籠點火內外紅有物堪比倫來朝日出東傳者以為笑死心和尚見之歎曰權兄提唱若此誠不負先師所付囑也太史山谷居士黃庭堅初謁秀圓通語具圓通章自是遂著發願文痛戒酒色日惟朝粥午飯鋭志參求既依晦堂乞指徑捷處堂曰祇如仲尼道二三子以我為隱乎吾無隱乎爾者太史居常如何理論公擬對堂曰不是不是公迷悶不已一日侍堂山行次時巖桂盛開堂曰聞木樨花香麼公曰聞堂曰吾無隱乎爾公釋然即拜之曰和尚得恁麼老婆心切堂笑曰祇要公到家耳久之謁死心新禪師隨衆入室心見張目問曰新長老死學士死燒作兩堆灰向甚麼處相見公無語心約出曰晦堂處參得底使未著在後左官黔南道力愈勝於無思念中頓明死心所問報以書曰往年嘗蒙苦苦提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳謫官在黔南道中晝臥覺來忽爾尋思被天下老和尚瞞了多少惟有死心道人不肯乃是第一相為也祕書吳恂居士字德夫參晦堂堂謂曰平生學解記憶多聞即不問你父母未生已前道將一句來公擬議堂以拂子擊之即領深旨連呈三偈其後曰咄這多知俗漢咬盡古今公案忽於狼藉堆頭拾得𧏙螂糞彈明明不直分文萬兩黃金不換等間拈出示人祇為走盤難看隆興府兜率從悅禪師初首衆於道吾領數衲謁雲蓋智和尚智與語未數句盡知所蘊乃笑曰觀首座氣質不凡奈何出言吐氣如醉人耶師面熱汗下曰願和尚不吝慈悲智復與語錐劄之師茫然遂求入室智曰曾見法昌遇和尚否師曰曾看他語録自了可也不願見之智曰曾見洞山文和尚否師曰關西子沒頭腦拖一條布裙作尿臭氣有甚長處智曰你但向尿臭氣處參取師依教即謁洞山深領奧旨復謁智智曰見關西子後大事如何師曰若不得和尚指示洎乎蹉過一生遂禮謝師復謁真淨後出世鹿苑有清素者久參慈明寓居一室未始與人交師因食蜜漬荔枝偶素過門師呼曰此老人鄉果也可同食之素曰自先師亡後不得此食久矣師曰先師為誰素曰慈明也某忝執事十三年耳師乃疑駭曰十三年堪忍執事之役非得其道而何遂饋以餘果稍稍親之素問師所見者何人曰洞山文素曰文見何人師曰黃龍南素曰南匾頭見先師不久法道大振如此師益疑駭遂袖香詣素作禮素起避之曰吾以福薄先師受記不許為人師益恭素乃曰憐子之誠違先師之記子平生所得試語我師具通所見素曰可以入佛而不能入魔師曰何謂也素曰豈不見古人道末後一句始到牢關如是纍日素乃印可仍戒之曰文示子者皆正知正見然子離師太早不能盡其妙吾今為子點破使子受用得大自在他日切勿嗣吾也師後嗣真淨如素所戒師室中設三語以驗學者一曰撥草瞻風祇圖見性即今上人性在甚麼處二曰識得自性方脫生死眼光落地時作麼生脫三曰脫得生死便知去處四大分離向甚麼處去張無盡以頌答三問其一曰陰森夏木杜鵑鳴日破浮雲宇宙清莫對曾參問曾晳從來孝子諱爺名其二曰人間鬼使符來取天上花冠色正萎好個轉身時節子莫教閻老等間知其三曰鼓合東村李大妻西風曠野淚沾衣碧蘆紅蓼江南岸却作張三坐釣磯元祐六年冬浴訖集衆説偈曰四十有八聖凡盡殺不是英雄龍安路滑奄然而化東京法雲佛照杲禪師謁圓通璣禪師入室次璣舉僧問投子大死底人却活時如何子曰不許夜行投明須到意作麼生師曰恩大難酬圓通大稱賞之後數日舉立僧秉拂機思遲鈍鬨堂大笑師有慚色次日特為大衆茶安茶具在案上慙無以自處偶打翻茶具瓢子落地跳數跳悟得答話機鋒迅捷無敢當者復至真淨處因看祖師偈云心同虗空界示等虗空法證得虗空時無是無非法豁然大悟後出世時上堂小參常謂人曰和尚紹聖三年十一月二十一日悟得方寸禪又言和尚熙寧三年文帳在鳳翔府供申當年陷了華山一十八州你輩茄子瓠子那裏得知或曰寶華王座上為甚麼一向世諦師曰癡人佛性豈有二種耶大慧宗門武庫云法雲佛照杲禪師嘗退居景德鐵羅漢院殿中有木羅漢數尊京師苦寒杲取而燒之擁罏達旦次日淘灰中得舍利無數諸座主輩皆目之為外道蓋佛照乃丹霞輩流非俗眼所能驗也又云佛照杲和尚初住歸宗專精行道未嘗少懈深夜修敬罷坐於僧堂地罏中忽見二僧入堂一人龐眉雪頂一人少年皆丰姿頎然杲心喜自謂曰我座中有如此僧須臾二人出堂杲襲其後見入佛殿中杲亦隨入燈影熒煌罏中尚有火杲炷香禮佛二僧復出亦襲其後至佛殿前偶失所在自念忘却香匣在殿內回身取時見殿門扃鑰遂喚直殿行者守舜開門舜取鑰匙開門見罏中香煙未散香匣在寶階上自不諭其故妙喜親見佛照説時守舜在旁猶指以為證隆興府泐潭湛堂文準禪師初謁梁山乘禪師乘曰驅烏未受戒敢學佛乘乎師捧手曰壇場是戒耶三羯磨梵行阿闍黎是戒耶乘大驚師笑曰雖然敢不受教遂受具足戒於唐安律師既謁真淨淨問近離甚處師曰大仰曰夏在甚處師曰大溈曰甚處人師曰興元府淨展手曰我手何似佛手師罔措淨曰適來祇對一一靈明一一天真及乎道個我手何似佛手便成窒礙且道病在甚處師曰某甲不會曰一切現成更教誰會師服膺就弟子之列餘十年所至必隨紹聖三年真淨移居石門衲子益盛凡入室扣問必瞑目危坐無所示見來學則往治蔬圃率以為常師謂同行恭上座曰老漢無意於法道乎一日舉杖決渠水濺衣忽大悟走敘其事淨詬曰此乃敢爾藞苴耶自此迹愈晦名愈著初雲巖虗席郡牧命死心禪師舉所知心曰準山主住得某未嘗識渠見有洗鉢頌甚好牧請舉心舉云之乎者也衲僧鼻孔大頭向下若也不會問取東村王大姐牧奇之出請主雲巖死心舉師住雲巖心謂寺丞張昌曰這個長老極有鼻孔一日會諸山于南昌師後至心指曰這川僧唱喏也破句便敢出來做長老師喝一喝曰何嘗破句來心顧昌曰向道有鼻孔昌大悅一日新到相看展坐具師曰未得人事上座近離甚處曰廬山歸宗師曰宗歸何處曰嗄師曰蝦蟇窟裏作活計曰和尚何不領話師曰是你豈不從歸宗來曰是師曰驢前馬後漢問第二上座近離甚處曰袁州師曰夏在甚處曰仰山師曰還見小釋迦麼曰見師曰鼻孔長多少僧擬議師曰話墮阿師問僧你來作甚麼曰特來問訊和尚師曰雲在嶺頭間不徹水流澗下太忙生曰和尚莫瞞人師曰馬大師為甚麼從闍黎腳跟下走過僧無語師曰却是闍黎瞞老僧一日法堂上逢首座便問向甚麼處去座曰擬與和尚商量一事師曰便請曰東家杓柄長西家杓柄短師曰為甚拈起鞏縣茶瓶却是饒州磁碗曰臨崖看滸眼特地一場愁師呌屈座吐舌而退僧問教中道若有一人發真歸源十方虗空悉皆銷隕未審此理如何師遂展掌點指曰子丑寅卯辰巳午未一羅二土三水四金五太陽六太陰七計都今日計都星入巨蟹宮寶峰不打這鼓笛便下座上堂五九四十五聖人作而萬物覩秦時𨍏轢鑽頭尖漢祖殿前樊噲恁曾聞黃鶴樓崔皓題詩在上頭晴川歷歷漢陽樹芳草萋萋鸚鵡洲可知禮也君子務本本立而道生道生一一生二二生三三生萬物驀拈拄杖起身云大衆寶峰何似孔夫子良久曰酒逢知己飲詩向會人吟卓拄杖下座上堂劄久雨不晴直得五老峰頭黑雲靉靆洞庭湖裏白浪滔天雲門大師忍俊不禁向佛殿裏燒香三門頭合掌禱祝呪願願黃梅石女生兒子母團圓少室無角鐵牛常甘水草喝一喝云有甚麼交涉復顧衆曰不因楊得意爭見馬相如師自浙回泐潭謁深禪師亦真淨嗣尋命分座聞有悟侍者見所擲㸑餘有省詣方丈通所悟深喝出因喪志自經於延壽堂廁後出沒無時衆憚之師故於半夜登溷方脫衣悟即提淨水至師曰待我脫衣脫罷悟復到未幾供籌子師滌淨已召接淨桶去悟才接師執其手問曰汝是悟侍者那悟曰諾師曰是當時在知客寮見掉火柴頭有個悟處底麼參禪學道祇要知個本命元辰下落處汝剗地作此去就汝在藏殿移首座鞋豈不是汝當時悟得底又在知客寮移枕子豈不是汝當時悟得底汝每夜在此移水度籌豈不是汝當時悟得底因甚麼不知下落却在這裏惱亂大衆師猛推之索然有聲由是絶迹師平生律身以約雖領徒弘法不異在衆時晨興後架祇取小杓湯洗面復用濯足其他受用大率類此放參罷方丈侍者人力便如路人掃地煎茶皆躬親為之政和五年夏師臥病進藥者令忌毒物師不從有問其故師曰病有自性乎曰無師曰既無自性以空納空吾未嘗顛倒首座問和尚近日尊候如何師曰跛驢上壁曰和尚也好喫一服藥師曰朽木搭橋曰也知和尚不解忌口師曰你作麼生座擬進語師曰你也好喫一服藥七月二十日更衣説偈而化闍維得設利晶圓光潔睛齒數珠不壞塔于南山之陽瑞州清涼慧洪覺範禪師郡之彭氏子少孤依三峰靘禪師為童子日記數千言十九試經得度從宣祕度講成實唯識論逾四年棄謁真淨于歸宗淨遷石門師隨至淨患其深聞之弊每舉玄沙未徹之語發其疑凡有所對淨曰你又説道理耶一日頓脫所疑述偈曰靈雲一見不再見紅白枝枝不著花叵耐釣魚船上客却來平地摝魚蝦淨見為助喜智證傳曰余昔菴於高安九峰之下有僧問豫曰臨濟會中兩僧一日相見同時下喝臨濟聞之升座曰大衆要會臨濟賓主句問取堂中二禪客僧便問那個是賓那個是主臨濟曰賓主歷然余方欲酬之頓見三玄三要之旨於是再拜曰大哉無為寂滅之幢也雖百千世有聞之者偷心死盡況余去大師餘二百年哉作偈曰一句中具三玄門一玄中具三要路細看即是陷虎機忽轟一聲塗毒鼓偷心死盡眼麻迷石女夢中毛卓竪又蘿湖野録云寂音尊者洪公初於歸宗參侍真淨和尚而至寶峰一日有客問真淨曰洪上人參禪如何真淨曰也有到處也有不到處客既退洪不自安即詣真淨求決所疑真淨舉風穴頌曰五白貓兒爪距獰養來堂上絶蟲行分明上樹安身法切忌遺言許外甥且作麼生是安身法洪便喝真淨曰這一喝也有到處也有不到處洪忽於言下有省翌日因違禪規遭刪去時年二十有九及遊東吳寓杭之淨慈以頌發明風穴意寄呈真淨曰五白貓兒無縫罅等間拋出令人怕翻身跳躑百千般冷地看他成話如今也解弄些些從渠歡喜從渠罵却笑樹頭老舅翁只能上樹不能下自後復閲汾陽語録至三玄頌洊有所證妙喜老師蓋嘗語此而叢林鮮有知者反以文華才辨而掩其道微妙喜亦何由取信於後耶又按林間録覺範自述云古之人有大機智故能遇緣即宗一章是覺範與僧談靈雲偈至玄沙未徹語僧請益覺範因示偈曰靈雲一見不再見云云至臨川與朱世英遊相好俄上藍長老者至上藍謂世英曰覺範聞工詩耳禪則其師猶錯矧弟子耶世英笑曰師能勘驗之乎上藍曰諾居一日同遊疏山飯於逆旅上藍以手畫案謂師曰經軸之上必題字是何義師即畫圓相橫一畫曰是此義也上藍愕然師為作偈曰以字不成八不是法身睡著無遮蔽衲僧對面不知名百衆人前呼不起上藍歸舉似世英世英拊手曰孰謂詩僧亦能識字義乎因同看汾陽作犢偈牛曰有頭無角實堪嗟百劫難逃這作家凡聖不能明得盡現前相貌有些些師謂世英曰此偈又豫字義之訓詁也崇寧二年會無盡居士張公于峽之善溪張嘗自謂得龍安悅禪師末後句叢林畏與語因夜話及之曰可惜雲菴不知此事師問所以張曰商英頃自金陵酒官移知豫章過歸宗見之欲為點破方敘悅末後句未卒此老大怒罵曰此吐血禿丁脫空妄語不得信既見其盛怒更不欲敘之師笑曰相公但識龍安口傳末後句而真藥現前不能辨也張大驚起執師手曰老師真有此意耶師曰疑則別參乃取家藏雲菴頂相展拜贊之書以授師其詞曰雲菴綱宗能用能照天鼓希聲不落凡調冷面嚴眸神光獨耀孰傳其真觀面為肖前悅後洪如融如肇棗柏曰華嚴第三會於須彌山頂上説十住表入理棄智非生滅心所得至故如須彌山在大海中高八萬四千由旬非手足攀攬所及明八萬四千塵勞山住煩惱大海於一切法無思無為即煩惱海枯竭塵勞山便成一切智山煩惱海便成性海若起心思慮有所攀緣則塵勞山愈高煩惱海愈深不可至其智頂師曰首楞嚴曰汝但棄其生滅守於真常常光現前根塵識心應時銷落故維摩大士現神力即時須彌燈王佛遣三萬二千師子座高廣嚴淨來入維摩詰室諸菩薩大弟子釋梵四天王等昔所未見其室廣博悉包容三萬二千師子座無所妨礙寶覺禪師曰以師子座之高廣毗耶室之狹小佇思其間即成妨礙嘗問轉運判官夏倚汝言情與無情共一體時有狗臥香桌下乃以壓尺擊香桌又擊狗曰狗有情即去香桌無情即住如何得成一體倚不能對寶覺曰才入思惟便成剩法前聖所知轉相傳授皆此旨也而學者莫能明如言彈指而五百毒龍屈伏女子之定亦出尤昭著明白者也溈山嘗語仰山曰寂子速道莫入陰界而仰山曰慧寂信位亦不立豫恨仰山極力道不盡法華經曰世尊於一切衆前現大神力出廣長舌上至梵世師曰溈山嘗曰凡聖情盡體露真常理事不二即如如佛而學者不能深味此語苟認意度而已譬如衆盲捫象隨所得之為是故象遍為尾為蹄為腰為牙而全象隱矣般若經曰無二無二分無別無斷故者真常也非凝然一物卓不變壞之常也而解法華者曰佛音深妙觸處皆聞超越凡聖則其舌廣長高出梵世此殆所謂隨語生解謬矣乎楞伽經曰不應攝受隨説計著真實者離名字故大慧如為愚夫以指指物愚夫觀指不得實義如是愚夫隨言説指攝受計著至竟不捨終不能得離言説指第一實義師曰僧問九峰禪師曰深山中還有佛法也無答曰有僧曰如何是深山中佛法答曰石頭大者大小者小今學者聞舉便欣然以為解了有詰之者則曰觸目全真頭頭顯現嗟乎此所謂觀指不得實義者也豫嘗與僧自逍遙山經亂石澗入五峰休於樹陰舉此因緣作偈曰石頭若是佛法法身應不靈聖佛法若有大小法身應分少剩枯骨頭上沒汁衲僧眼見不信八萬四千法門一句為汝説盡唐僧復禮有法辨當時流輩推尊之作真妄偈問天下學者曰真法性本淨妄念何由起從真有妄生此妄何所止無初即無末有終應有始無始而無終長懷懵茲理願為開玄妙析之出生死清涼國師答曰迷真妄念生悟真妄即止能迷非所迷安得長相似從來未曾悟故説妄無始知妄本自真方是恆妙理分別心未忘何由出生死圭峰禪師答曰本淨本不覺由斯妄念起知真妄即空知空妄即止止處名有終迷時號無始因緣如夢幻何終復何始此是衆生源窮之出生死又曰人多謂真能生妄故妄不窮盡為決此理重答前偈曰不是真生妄妄迷真而起悟妄本自真知真妄即止妄止似終末悟來似初始迷悟性皆空皆空無終始生死由此迷達此出生死師謂二老所答之辭皆未副復禮問意彼問真法本淨妄念何由而起但曰迷真不覺則孰不能答耶因為明其意作偈曰真法本無性隨緣染淨起不了號無明了之全佛智無明全妄情知覺全真理當念絶古今底處尋終始本自離言詮分別即生死徐六喻擔板宗鏡録曰雖然心即是業業即是心既從心生還從心受如何現今消其妄業報答曰但了無作自然業空所以云若了無作惡業一生成佛又曰雖有作業而無作者即是如來祕密之教又凡作業悉是自心橫計外法還自對治妄取成業若了心不取境境不自生無法牽情云何成業師為作偈釋其旨曰舉手炷香而供養佛其心自知應念獲福舉手操刃恣行殺戮其心自知死入地獄或殺或供一手之功云何業報罪福不同皆自橫計有如是事是故從來枉沉生死雷長芭蕉鐵轉磁石俱無作者而有是力心不取境境亦自寂故如來藏不許有識師曰晉鳩摩羅什兒時隨母至沙勒頂戴佛鉢私念鉢形甚大何其輕耶即重失聲下之母問其故對曰我心有分別故鉢有輕重耳豫以是知一切諸法隨念而至念未生時量同太虗然則即今現行分別者萬類紛然何故靈驗不等曰是皆亂想虗妄如因夢中事心力昧略微劣故也嗟乎人莫不有忠孝之心也而王祥臥氷則魚躍耿恭拜井則泉冽何也蓋其養之專故靈驗之應速如影響涅槃經迦葉菩薩白佛言世尊如佛所説諸佛世尊有祕密藏是義不然何以故諸佛世尊惟有密語無祕密藏譬如幻主機關木人人雖覩見屈伸俯仰莫知其內而使之然佛法不爾咸令衆生悉得知見云何當言佛世尊有祕密藏佛讚迦葉善哉善哉善男子如汝所言如來實無祕密之藏何以故如秋滿月處空顯露清淨無翳人皆觀見如來之言亦復如是開發顯露清淨無翳愚人不解謂之祕藏智者了達則不名藏又曰又無語者猶如嬰孩言語未了雖復有語實亦無語如來亦爾語未了者即祕密之言雖有所説衆生不解故名無語故石頭曰乘言須會宗勿自立規矩藥山曰更須自看不得絶却言語我今為汝説者個語顯無語底長慶曰二十八代祖師皆説傳心且不説傳語且道心作麼生傳若也無言啓蒙何名達者雲門曰此事若在言語上三乘十二分教豈是無説因甚麼道教外別傳若從學解機智得只如十地聖人説法如雲如雨猶被佛訶見性如隔羅縠以此故知一切有心天地懸殊雖然如是若是得底人道火何曾燒著口耶師每曰衲子於此徹去方知諸佛無法可説而證言説法身如何是言説法身自答曰斷頭船子下揚州大般若經曰諸天子竊作是念諸藥叉等言辭呪句雖復隱密而當可知尊者善現於此般若波羅密多雖以種種言辭顯示而我等輩竟不能解善現知彼心之所念便告之言汝等天子於我所説不能解耶諸天子言如是如是具壽善現復告言我曾於此不説一字汝亦不聞當何所解何以故甚深般若波羅密多文字言説皆遠離故由於此中説者聽者及能解者皆不可得一切如來應正等覺所證無上正等菩提其相甚深亦復如是曹溪大師將入滅方敢全提此令者知大乘種性純熟故僧問歸新州意旨乃曰葉落歸根來時無口至江西馬祖南嶽石頭則大振耀之故號石頭為真吼馬祖為全提其機鋒如大火聚擬之則死學者乃欲以意思解不亦誤哉有僧謂師曰如古人問大修行人還落因果也無答曰不落或答曰不昧問如何是大悲千手眼答曰通身是有聞之者則曰我則不然曰遍身是或有問如何是佛或答曰臭肉等來蠅有聞之者曰我則不然破驢脊上足蒼蠅或問擬借一問以為影草時如何或答曰何必有聞之者曰何不道個不必如諸老宿所示何以分其優劣得達其旨於法無礙謂一切語言無用揀擇信手拈來也耶則彼皆輕重問答錙銖而較之謂臨機直須辨別也耶則彼之理致具在若無可同異者此吾所嘗疑不能釋也師曰我不解子之疑然聞世尊在日有比丘根鈍無多聞性佛令誦苕帚二字日夕誦之言苕則已忘帚言帚則又忘苕每自剋責係念不休忽能言曰苕帚於此大悟得無礙辨才子能如誦苕帚者當見先德大慈悲故為物之心僧讋譍而去莊子言藏舟於壑藏山於澤釋者遣語如流至曰藏天下於天下未有不嗒然危坐置筆而思者晦堂老人嘗問學者此義如何對之甚衆晦堂笑曰汝善説道理師作偈記其意曰天下心知不可藏紛紛嗅迹但尋香端能百尺竿頭步始見林梢挂角羊又問列子載兩小兒論日遠近不決而質於孔子孔子不答其意何在學者皆曰聖如夫子亦莫能辨此理是無以説也晦堂亦笑之師作偈釋之曰涼溫遠近轉增疑不答當渠痛處錐尚逐小兒爭未已仲尼何獨古難知師曰靈源禪師謂豫曰道人保養如人病須服藥藥之靈驗易見要須忌口乃可不然服藥何益生死是大病佛祖言教是良藥汙染心是雜毒不能忌之生死之病無時而損也豫愛其言追念圓覺經曰末世諸衆生心不生虗妄佛説如是人現世即菩薩法句經曰若起精進心是妄非精進但能心不妄精進無有涯南嶽思大禪師悟入法華三昧即誦曰是真精進是名真法供養汾陽無業大達國師一生答學者之問但曰莫妄想是謂稱性之語見道徑門而禪者易其言反求玄妙良可笑也師之著述最佳者是臨濟宗旨一篇自首至無盡頷之皆論三玄三要録於臨濟章次述十智同真録於汾陽章次述四賓主録於臨濟章龍山論賓主語録龍山章洞山論賓主語録洞山章次與朱世英上藍論經軸首火字語録之本章論法華經世尊廣長舌語録於本章獨論華嚴經語教乘常談不録耳建炎二年五月示寂於同安南嶽石頭懷志菴主預講席十二年宿學爭下之嘗欲會通諸宗異義以正一代時教有禪者問曰杜順賢首宗祖師也而談法身則曰懷州牛喫禾益州馬腹脹此偈合歸天台何義耶師不能對即遊方至洞山謁真淨問古人一喝不作一喝用意旨如何淨叱之師趨出淨笑呼曰浙子齋後遊山好師忽領悟久之辭去淨曰子所造雖逸格惜緣不勝耳師識其意拜賜而行諸方力挽出世師不應菴居於衡嶽石頭二十年不與世接有偈曰萬機休罷付癡憨蹤迹時容野鹿參不脫麻衣拳作枕幾生夢在緑蘿菴或問住山多年有何旨趣師對曰山中住獨掩柴門無別趣三個柴頭品字煨不用援毫文彩露崇寧元年冬遍辭山中之人曳杖竟去留之不可曰龍安照禪師吾友也偶念見之耳龍安聞其肯來使人自長沙迎之居於最樂堂明年六月晦問侍者日蚤暮曰已夕矣笑曰夢境相逢我睡已覺汝但莫負叢林即是報佛恩德言訖而寂廬山羅漢院系南禪師臨示寂升座告衆曰羅漢今日倒騎鐵馬逆上須彌踏破虗空不留朕迹乃歸方丈跏趺而逝信州永豐慧日菴主自機契雲居熟遊湘漢暨歸永豐或處巖谷或居市令鄉民稱丘師伯凡有所問以莫曉答之忽語邑人曰吾明日行腳去汝等可來相送於是贐路者畢集師笑不已衆問其故即書偈曰丘師伯莫曉寂寂明皎皎日午打三更誰人打得了投筆而逝泉州尊勝有朋講師嘗疏楞嚴維摩等經學者宗之每疑祖師直指之道故多與禪衲遊一日謁開元迹未及閫心忽領悟元出遂問座主來作甚麼師曰不敢貴耳賤目元曰老老大大何必如是師曰自是者不長元曰朝看華嚴夜讀般若則不問如何是當今一句師曰日輪正當午元曰間言語更道來師曰平生仗忠信今日任風波然雖如是祇如和尚恁麼道有甚交涉須要新戒草鞋穿元曰這裏且放你過忽遇達磨問你作麼生道師便喝元曰這座主今日見老僧氣衝牛斗師曰再犯不容元拊掌大笑慶元府育王無竭淨曇禪師紹興丙寅夏辭衆檀歸付院事四衆擁視揮扇久之書偈曰這漢從來沒縫罅五十六年成話今朝死去見閻王劒樹刀山得人怕打一圓相曰嗄一任諸方鑽龜打瓦收足而化闍維設利如霰而下蘄州五祖法演禪師綿州鄧氏子年三十五始棄家祝髮受具往成都習唯識百法論因聞菩薩入見道時智與理冥境與神會不分能證所證西天外道嘗難比丘曰既不分能證所證却以何為證無能對者外道貶之令不鳴鐘鼓反披袈裟三藏奘法師至彼救此義曰如人飲水冷暖自知乃通其難師曰冷暖則可知矣如何是自知底事遂往質本講曰不知自知之理如何講莫疏其問但誘曰汝欲明此當往南方扣傳佛心宗者師即負笈出關所見尊宿無不以此咨決所疑終不破洎謁圓照本禪師古今因緣會盡惟不會僧問興化四方八面來時如何化云打中間底僧作禮化云我昨日赴個村齋中途遇一陳卒風暴雨却向古廟裏避得過請益本本云此是臨濟下因緣須是問他家兒孫始得師遂謁浮山遠禪師請益前話遠云我有個譬喻説似你你一似個三家村裏賣柴漢子把個匾擔向十字街頭立地問人中書堂今日商量甚麼事師默計云若如此大故未在遠一日語師曰吾老矣恐虗度子光陰可往依白雲此老雖後生吾未識面但見其頌臨濟三頓棒話有過人處必能了子大事師然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事一日有僧見磨轉遽指以問師曰此神通耶法爾耶師褰衣旋磨一匝僧無語未幾雲至語師曰有數禪客自廬山來皆有悟入處教伊説亦説得有來由舉因緣問伊亦明得教伊下語亦下得祇是未在師於是大疑私自計曰既悟了説亦説得明亦明得如何却未在遂參究纍日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師亦一笑而已師後曰吾因茲出一身白汗便明得下載清風雲一日示衆曰古人道如鏡鑄像像成後鏡在甚麼處衆下語不契舉以間師師近前問訊曰也不較多雲笑曰須是道者始得乃命分座開示方來雪堂和尚拾遺録云五祖在受業寺逐字禮蓮經一夕遇屎字欲唱禮遽疑乃白諸老宿曰如何屎字亦稱為法寶某禮至此疑不解老宿曰據汝所問可以南詢汝正是宗門中根器也祖遂南遊初抵興元府經時逗留隨房僧赴請稍違初志受業師聞之寄信至祖祖開緘只見兩行字云汝既出得醋甕又却淹在醬缸裏祖讀罷即日登途往浙西參圓照本次見浮山遠遠異其根器指見白雲端端示以世尊有密語迦葉不覆藏因緣久之未契一日自廊趨上法堂疑情頓息未幾令充磨頭下與燈録同豈拾遺所載禮經事是成都習唯識已前事迦葉不覆藏因緣乃白雲所示南泉摩尼珠因緣乃師所請益記者各述所聞而拾遺所載固燈録所刪棄耶拾遺録又云白雲一日室中舉雲門示衆如許大栗子喫得幾個衆下語皆不契問師師曰懸羊頭賣狗肉雲駭之師嘗曰我參二十年今方識羞後靈源聞嘆曰好識羞兩字因作正續銘遂載銘中有俗士投師出家自曰捨緣師曰何謂捨緣士曰有妻豫捨之謂之捨緣師曰我也有個老婆還信否士默然師乃頌曰我有個老婆出世無人見晝夜共一處自然有方便并録以博聞問如何是臨濟下事師曰五逆聞雷曰如何是雲門下事師曰紅旗閃爍曰如何是曹洞下事師曰馳書不到家曰如何是溈仰下事師曰斷橫古路僧禮拜師曰何不問法眼下事曰留與和尚師曰巡人犯夜問如何是佛師曰露胸跣足曰如何是法師曰大赦不放曰如何是僧師曰釣魚船上謝三郎徑山杲云此三轉語一轉具三玄三要四料揀四賓主洞山五位雲門三句百千法門無量妙義若人揀得許你具一隻眼圓悟一日請益臨濟四賓主怎生師曰也祗個祗下應有是字程限是甚麼間事又云我這裏却似馬前相撲倒便休師謂圜悟曰你也儘好只是有些病悟再三請問不知某有甚麼病師云只是禪忒多悟云本為參禪因甚麼却嫌人説禪師云只似尋常説話時多少好時有僧便問因甚嫌人説禪師云惡情悰師一日問圜悟無縫塔話悟罔然直從方丈至三門方道得師云你道得也悟云不然暫時不在便不堪也三佛一日相謂曰老和尚祇是乾𪹼𪹼地往往説心説性不得因請益佛身無為不墮諸數師曰譬如清淨摩尼寶珠映於五色五色是數摩尼是佛身圜悟謂二老曰他大段會説我輩説時費多少工夫他祇一兩句便了分明是個老大蟲師聞之乃曰若説心説性便是惡口又曰貓有歃血之功虎有起尸之德所謂驅耕夫之牛奪飢人之食若不如是盡是弄泥團漢三佛侍師於一亭上夜話及歸燈已滅師於暗中曰各人下一轉語佛鑑曰彩鳳舞丹霄佛眼曰鐵蛇橫古路佛果曰看腳下師曰滅吾宗者克勤耳開聖覺初參長蘆夫鐵腳久無所得聞師法道徑造席下一日室中問云釋迦彌勒猶是他奴且道他是阿誰覺云鬍張三黑李四師然其語時圜悟和尚為座元師舉此語似之語云好則好恐未實不可放過更於言下搜看次日入室垂問如前覺云昨日向和尚道了師云道甚麼覺云鬍張三黑李四師云不是不是覺云和尚為甚昨日道是師云昨日是今日不是覺於言下大悟覺後出世住開聖見長蘆法席大盛乃嗣夫不原所得拈香時忽覺胸前如搗遂於痛處發癰成竅以乳香作餅塞之久而不愈竟卒舉僧問洞山如何是善知識眼山曰紙撚無油洞山老漢不是無祇是大儉或有人問四面如何是善知識眼但向伊道瞎且要相稱紙撚無油也大奇不堪拈掇有誰知回身却憶來時路月下騰騰信腳歸示衆佛祖生冤家悟道染泥土無為無事人聲色如聾瞽且道如何即是恁麼也不得不恁麼也不得恁麼不恁麼總不得忽有個出來道恁麼也得不恁麼也得恁麼不恁麼總得祇向伊道我也知你向鬼窟裏作活計示衆舉德山答僧我宗無語句雪峰聞之有省後峰云我當時空手去空手歸因緣語具雪峰章師云白雲今日説向透未過者有個人從東京來問伊甚處來他却道蘇州來問伊蘇州事如何伊道一切尋常雖然如是謾白雲不過何故祇為語音各別畢竟如何蘇州菱邵伯藕小參舉陸亘大夫問南泉弟子家中有一片石也曾坐也曾臥擬鐫作佛得麼云得陸曰莫不得麼云不得大衆夫為善知識須明決擇為甚麼他人道得也道得他人道不得也道不得還知南泉落處麼白雲不惜眉毛與汝注破得又是誰道來不得又是誰道來汝若更不會老僧今夜為汝作個樣子乃舉手云將三界二十八天作個佛頭金輪水際作個佛腳四大洲作個佛身雖然作此佛兒子了汝諸人又却在那裏安身立命大衆還會也未老僧作第二個樣子去也將東弗於逮作一個佛南贍部洲作一個佛西瞿耶尼作一個佛北鬱單越作一個佛草木叢林是佛蠢動含靈是佛既恁麼又喚甚麼作衆生還會也未不如東弗於逮還他東弗於逮南贍部洲還他南贍部洲西瞿耶尼還他西瞿耶尼北鬱單越還他北鬱單越草木叢林還他草木叢林蠢動含靈還他蠢動含靈所以道是法住法位世間相常住既恁麼汝又喚甚麼作佛還會麼忽有個漢出來道白雲休寐語大衆記取這一轉示衆將四大海水為一枚硯須彌山作一管筆有人向虗空裏寫祖師西來意五字太平下座大展坐具禮拜為師若寫不得佛法無靈驗有麼有麼便下座大衆散師高聲云侍者者應諾師曰收取坐具復問侍者云收得坐具麼者提起坐具師曰我早知汝恁麼也上堂説佛説法拈槌竪拂白雲萬里德山入門便棒臨濟入門便喝白雲萬里然後恁麼也不得不恁麼也不得恁麼不恁麼總不得也則白雲萬里或有個漢出來道長老你恁麼道也則白雲萬里這個説話喚作矮子看戲隨人上下三十年後一場好笑且道笑個甚麼笑白雲萬里謝街坊上堂街坊昨日將一把沙到方丈前一見老僧劈面便撒賴遇老僧先見衫袖一遮並不妨事今朝舉似大衆不敢隱藏何故賞伊大膽下得這個手腳忽有人問白雲為什麼只恁休去不見道老不以筋力為能然雖如是賓主歷然端和尚忌辰上堂去年正當恁麼時多前年三件事今年正當恁麼時多去年七件事這十件事數不過者甚多何也去却七三存一事是去年説是今日急如箭黑似漆無言童子口吧吧無足仙人劈胸躍乃云交下座上堂汝等諸人見老和尚鼓動唇吻竪起拂子便作勝解及乎山禽聚集牛動尾巴却將作等間殊不知簷聲不斷前旬雨電影還連後夜雷謝監收上堂人之性命事第一須是欲得成此先須防於若是真人上堂山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了子細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便了問甚麼姓大衆山僧被他一問直得無言可對無理可伸還有人為山僧道得麼昨日那裏落節今日這裏拔本示衆云吾本來茲土傳法救迷情一花開五葉結果自然成達磨大師信腳來信口道後代兒孫多成計較要會開花結果處麼鄭州梨青州棗萬物無過出處好示衆云真如凡聖皆是夢言佛及衆生並為增語或有人出來道盤山老聻但向伊道不因紫陌花開早爭得黃鶯下柳條若更問五祖老聻自云諾惺惺著師云三乘人出三界獄小果必藉方便如穴地穿壁取自天窗中出惟得道菩薩從初入地獄先與獄子不相疑一切如常一日寄信去覔得酒肉與獄子喫至大醉取獄子衣服行纏結束自身却將自己破衣服與獄子著移枷在獄子項上坐在牢裏却自手捉獄子藤條公然從大門出去參禪人須是恁麼始得師曰我這裏禪似個什麼如人家會作賊有一兒子一日云我爺老後我却如何養家須學個事業始得遂白其爺爺云好得一夜引至巨室穿窬人宅開匱乃教兒子入其中取衣帛兒才入匱爺便閉却復鎖了故於廳上扣打令其家驚覺乃先尋穿窬而去其家人即時起來點火燭之知有賊但已去了其賊兒在匱中私自語曰我爺何故如此正悶悶中却得一計作鼠咬聲其家遣婢點燈開匱匱才開了賊兒聳身吹滅燈推倒婢走出其家人趕至中路賊兒忽見一井乃推巨石投井中其人却於井中覔賊兒直走歸家問爺爺云你休説你怎生得出兒具説上件意爺云你恁麼儘做得師垂語曰譬如水牯牛過窗櫺頭角四蹄都過了因甚尾巴過不得月林觀頌云牛過窗櫺錯為安名大唐國裏不見一人高峰妙頌云等間放出這牛兒頭角分明舉似誰若向尾巴尖上會新羅子過多時師一日持錫繞廊曰莫有屬牛人問命麼衆皆無語師乃曰孫臏今日開鋪更無一人垂顧可憐三尺龍鬚喚作尋常破布常展手問僧曰如何喚作手室中常問僧倩女離魂那個是真底萬菴柔頌憶昔春風上苑行爛窺紅紫厭平生如今再到曾行處寂寂無人草自生或菴體頌縱使百千劫所作業不忘因緣會遇時果報還自受普融藏主入室次師舉離魂話問之有契呈偈曰二女合為一媳婦輪機絶斷難回互從來往返絶蹤由行人莫問來時路崇寧三年六月二十五日上堂辭衆曰趙州和尚有末後句你作麼生會試出來道看若會得去不妨自在快活如或未然這好事作麼説良久曰説即説了也祇是諸人不知要會麼富嫌千口少貧恨一身多珍重時山門有土木之役躬往督之誡曰汝等好作息吾不復來矣歸方丈淨髮澡浴旦日吉祥而逝年八十餘先是五祖遺記曰吾滅後可留真身吾手啓而舉吾再出矣師住山時塑手泥淶中裂相去容七衆咸異之師嘗拜塔以手指云當時與麼全身去今日重來記得無復云以何為驗以此為驗遂作禮及將亡之夕山摧石隕四十里內巖谷震吼闍維設利如雨塔於東山之南提刑郭祥正字功甫謁白雲雲上堂曰夜來枕上作得個山頌謝功甫大儒廬山二十年之舊今日遠訪白雲之勤當須舉與大衆請已後分明舉似諸方此頌豈惟謝功甫大儒直要與天下有鼻孔衲僧脫却著肉汗衫莫言不道乃曰上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也士切疑後聞小兒誦之忽有省以書報雲雲以偈答曰藏身不用縮頭斂迹何須收腳金烏半夜撩天玉兔趕他不著蘿湖野録云郭謁端端問曰牛醇乎對曰醇矣端遽厲聲叱之郭不覺拱而立端曰醇乎醇乎於是為郭升堂而發揮之曰牛來山中水足草足牛出山去東觸西觸又不免送之以偈曰上大人丘乙己化三千可知禮當是一事所記各有所詳耳元祐中往衢之南禪謁泉萬卷請升座公趨前拈香曰海邊枯木入手成香爇向罏中橫穿香積如來鼻孔作此大事須是對衆白過始得雲居老人有個無縫布衫分付南禪禪師著得不長不短進前則諸佛讓位退步則海水澄波今日嚬呻六種震動遂召曰大衆還委悉麼有意氣時添意氣不風流處也風流泉曰相鈍置公曰因誰致得崇寧初到五祖請祖升座公趨前拈香曰此一瓣香爇向罏中供養我堂頭法兄禪師伏願於方廣座上擘開面門放出先師形相與他諸人描邈何以如此白雲巖畔舊相逢往日今朝事不同夜靜水寒魚不食一罏香散白蓮峰祖遂云曩謨薩怛哆鉢囉野恁麼恁麼幾度白雲溪上望黃梅花向雪中開不恁麼不恁麼嫩柳垂金線且要應時來不見龐居士問馬大師云不與萬法為侶者是甚麼人大師云待汝一口吸盡西江水即向汝道大衆一口吸盡西江水萬丈深潭窮到底略彴不是趙州橋明月清風安可比後又到保寧亦請升座公拈杳曰法鼓既鳴寶香初爇楊岐頂𩕳門請師重著楔保寧卓拄杖一下曰著楔已竟大衆證明又卓一下便下座到雲居請佛印升座公拈香曰覺地相逢一何早鶻臭布衫今脫了要識雲居一句玄珍重後園驢喫草召大衆曰此一瓣香薰天炙地去也印曰今日不著便被這漢當面塗糊便打乃曰謝公千里來相訪共話東山竹徑深借與一龍騎出洞若逢天旱便為霖擲拄杖下座公拜起印曰收得龍麼公曰已在這裏印曰作麼生騎公擺手作舞便行印拊掌曰祇有這漢猶較些子安吉州上方日益禪師開堂日上首白槌罷師曰白槌前觀一又不成白槌後觀二又不是到這裏任是鐵眼銅睛也須百雜碎莫有不避危亡底衲僧試出來看時有兩僧齊出師曰一箭落雙雕僧曰某甲話猶未問何得著忙師曰莫是新羅僧麼僧擬議師曰撞露柱漢便打贛州顯首座賦性高逸機辨自將保寧勇禪師以子育之因示以神劍頌提得神鋒勝太阿萬年妖孽盡消磨直饒埋向塵泥裏爭奈靈光透匣何顯曰漫效顰亦提得一個勇曰何不呈似老僧顯便舉云凜凜寒光出匣時乾坤閃爍耀潛輝當鋒截斷毗盧頂更有何妖作是非勇曰忽遇天魔外道來時如何顯以坐具便摵勇作倒勢顯拂袖便行勇曰且來顯曰且去掘窟勇笑而已尋謁端禪師於白雲端稱於衆待以猶子之禮一日端與淨居瑤公遊水磨顯偕數衲先在遂侍端右瑤曰顯兄且莫妨穩便端曰從他在此聽話顯曰不曾帶得褾手錢來便行二老相顧為之解顏洪州泐潭景祥禪師室中問僧達磨西歸手携隻履當時何不兩隻都將去曰此土也要留個消息師曰一隻腳在西天一隻腳在東土著甚來由僧無語問僧惟一堅密身一切塵中現如何是塵中現底身僧指香罏曰這個是香罏師曰帶纍三世諸佛生陷地獄僧罔措師便打師常叉手夜坐如對大賓初坐手與趺綴至五鼓必齊膺因號祥叉手焉和州光孝慧蘭禪師不知何許人也嘗以觸衣書七佛名叢林稱為蘭布裩建炎末逆虜犯淮執師見酋長長曰聞我名否師曰我所聞者唯大宋天子之名長恚令左右以鎚擊之鎚至輒斷壞長驚異延麾下敬事之經旬師索薪自焚無敢供者親拾薪成龕怡然端坐煙焰一起流光四騰虜跪伏多灼膚者火絶得五色舍利併靈骨北歸所執僧尼悉聽自便和人至今詠之真州長蘆真歇清了禪師襁褓入寺見佛喜動眉睫至沔漢扣丹霞之室霞問如何是空劫已前自己師擬對霞曰你閙在且去一日登鉢盂峰豁然契悟徑歸侍立霞掌曰將謂你知有師欣然拜之霞翌日上堂曰日照孤峰翠月臨溪水寒祖師玄妙訣莫向寸心安便下座師直前曰今日升座更瞞某不得也霞曰你試舉我今日升座看師良久霞曰將謂你瞥地師便出明州天童宏智正覺禪師隰州李氏子母夢五臺一僧解環與環其右臂乃孕遂齋戒及生右臂特起若環狀七歲日誦數千言十一得度十八遊方至香山謁成枯木甚器之一日聞僧誦蓮經至父母所生眼悉見三千界瞥然有省即詣丈室陳所悟山指臺上香合曰裏面是甚麼物師曰是甚麼心行山曰汝悟處又作麼生師以手畫一圓相呈之復拋向後山曰弄泥團漢有甚麼限師曰錯山曰別見人始得師應諾諾即造丹霞霞問如何是空劫已前自己師曰井底蝦蟇吞却月三更不借夜明簾霞曰未在更道師擬議霞打一拂子曰又道不借師言下釋然遂作禮霞曰何不道取一句師曰某甲今日失錢遭罪霞曰未暇打得你在且去紹興丁丑九月謁郡僚及檀度次謁越帥趙公令詪與之言別十月七日還山翌日辰巳間沐浴更衣端坐告衆顧侍僧索筆作書遺育王大慧禪師請主後事仍書偈曰夢幻空華六十七年白鳥煙沒秋水連天擲筆而逝龕留七日顏貌如生江州圓通德止禪師歷陽金紫徐閎中之季子雙瞳紺碧神光射人十歲未知書既我童強記過人為文多奇語弱冠夢異僧授四句偈已而有以南安巖主像遺之者即傍所載聰明偈自是持念不忘後五年隨金紫將漕西洛一夕忽大悟連作數偈一曰不因言句不因人不因物色不因聲夜半吹燈方就枕忽然這裏已天明每嘯歌自若衆莫測之乃力求出家父弗許欲以官授之師曰某方將脫世網不著三界豈復刺頭於利名中耶請移授從兄珏遂祝髮受具衡州華藥智朋禪師依寶峰有年無省因為衆持鉢峰自題其像曰雨洗淡紅桃蕚嫩風搖淺碧柳絲輕白雲影裏怪石露緑水光中古木清咦你是何人至焦山枯木成禪師見之歎曰今日方知此老親見先師來師遂請益其贊成曰豈不見法眼拈夾山境話曰我二十年祇作境會師即契悟蘿湖野録云成指偈問師曰汝會麼師曰不會成曰汝記得法燈擬寒山詩否師遂踊至誰人知此意令我憶南泉於憶字處成遽以手掩師口曰住住師豁然有省乃曰元來恁麼地成曰汝作麼生會師曰春生夏長秋收冬藏成曰直須保任師應諾吉州青原齊禪師從雲蓋智禪師出家執事首座座一日秉拂罷師問曰某聞首座所説莫曉其義伏望慈悲指示座諄諄誘之使究無著説這個法踰兩日有省以偈呈曰説法無如這個親十方剎海一微塵若能於此明真理大地何曾見一人座駭然後遍參至石門印契示寂日説偈遺衆曰昨夜三更過急灘灘頭雲霧黑漫漫一條拄杖為知己擊碎千山與萬山天台山如菴主看雲門東山水上行語發明己見歸隱故山猿鹿為伍郡守聞其風逼請住持師作偈曰三十年來住此山郡符何事到林間休將瑣瑣塵寰事換我一生間又間遂焚其廬竟不知所止平江府西竺寺尼法海禪師寶文呂嘉之姑領旨於一公諸名儒屢挽應世堅不從將示寂説偈曰霜天雲霧結山月冷涵輝夜接故鄉信曉行人不知屆明坐脫東京慧林懷深慈受禪師壽春府夏氏子生而祥光現舍文殊堅禪師遙見疑火也詰旦知師始生往訪之師見堅輒笑母許出家依淨照於嘉禾資聖照舉良遂見麻谷因緣問曰如何是良遂知處師即洞明出住資福屨滿戶外蔣山佛鑑勤禪師行化至茶退師引巡寮至千人街坊鑑問既是千人街坊為甚麼祇有一人師曰多虗不如少實鑑曰恁麼那師赧然值朝廷以資福為神霄宮因棄往蔣山留西菴陳請益鑑曰資福知是般事便休師曰某實未穩望和尚不外鑑舉倩女離魂話反覆窮之大豁疑礙呈偈曰祇是舊時行履處等間舉著便誵訛夜來一陳狂風起吹落桃花知幾多鑑拊几曰這底豈不是活祖師意平江府萬壽如璝證悟禪師凡見僧必問近日如何僧擬對即拊其背曰不可思議將示寂衆集復曰不可思議乃合掌而終越州天衣如哲禪師自退席寓平江之萬壽寺飲啖無擇人多侮之有以瑞巖喚主人公話問者師答偈曰瑞巖常喚主人公突出須彌最上峰大地掀翻無覔處笙歌一曲畫樓中一日曰吾行矣令拂拭所乘筍輿乃書偈告衆曰道在用處用在死處時人祇管貪歡樂不肯學無為敘平昔參問勉衆進修已忽竪起拳曰諸人且道這個落在甚麼處衆無對師揮案一下曰一齊分付與秋風遂入輿端坐而逝大覺法慶禪師因侍者讀洞山録作愚癡齋處者曰古人甚奇怪師謂侍者曰吾化後汝可喚之若能回來是有道力也後預知時至乃作頌曰今年五月初五四大將離本主白骨當風揚却免占檀那地土衣物盡付侍者齋僧始聞初夜鐘聲坐逝侍者記昔約遂喚師師應曰作麼者曰和尚何裸跣而去師曰來時何有者欲強穿衣師曰休留與後人者曰正恁麼時如何師曰也只恁麼復書一偈曰七十三年如掣電臨行為君通一線鐵牛𨁝跳過新羅撞破虗空七八片儼然而化臨安府廣福院惟尚禪師初參覺印問曰南泉斬貓兒意旨如何印曰須是南泉始得印以前語詰之師不能對至僧堂忽大悟曰古人道從今日去更不疑天下老和尚舌頭信有之矣述偈呈印曰須是南泉第一機不知不覺驀頭錐覿面若無青白眼還如𪂶𪂶守空池舉未絶印竪拳曰正當恁麼時作麼生師掀倒禪牀印遂喝師曰賊過後張弓便出
