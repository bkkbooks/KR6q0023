body:
  text: 未詳法嗣泗州塔頭侍者及時鎖門有人問既是三界大師為甚麼被弟子鎖侍者無對法眼代云弟子鎖大師鎖法燈代云還我鎖匙來又老宿代云吉州鎖虔州鎖或問僧承聞大德講得肇論是否曰不敢曰肇論有物不遷義是否曰是或人遂以茶盞就地撲破曰這個是遷不遷無對法眼代撫掌三下有道流在佛殿前背坐僧曰道士莫背佛道流曰大德本教中道佛身充滿於法界向甚麼處坐得僧無對法眼代云識得汝又有一行者隨法師入佛殿行者向佛而唾法師曰行者少去就何以唾佛行者曰將無佛處來與某甲唾法師無對溈山云仁者却不仁者不仁者却仁者仰山代法師云但唾行者又云行者若有語即向伊道還我無行者處來台州六通院僧欲渡船有人問既是六通為甚麼假船無對天台韶代云不欲驚衆聖僧像被屋漏滴有人問既是聖僧為甚麼有漏天台韶代云無漏不是聖僧死魚浮於水上有人問僧魚豈不是以水為命曰是曰為甚麼却向水中死無對天龍機代云是伊為甚麼不向岸上死江南相馮延巳與數僧遊鍾山至一人泉問一人𭥚許多人爭得足一僧對曰不教欠少乃別云誰人欠少法眼別云誰是不足者有施主婦人入院行衆僧隨年錢僧云聖僧前著一分婦人曰聖僧年多少無對法眼代云心期滿處即知偃臺感山主到圓通院相看第一座問曰圓通無路山主爭得到來無對歸宗柔代云不期又得相見有僧入冥見地藏菩薩地藏問是你平生修何業僧曰念法華經曰止止不須説我法妙難思為是説是不説無對歸宗柔代云此回去敢請流通子趁鴿子飛向佛殿欄干上顫有人問僧一切衆生在佛影中常安常樂鴿子見佛為甚麼却顫無對法燈代云怕佛官人問僧名甚麼曰無揀官人曰忽然將一碗沙與上座又作麼生曰謝官人供養法眼別云此猶是揀底廣南有僧住庵國主出獵人報庵主大王來請起曰非但大王佛來亦不起王問佛豈不是汝師曰是王曰見師為甚麼不起無對法眼代云未足酬恩僧問圓通和尚一塵才起大地全收還見禪牀麼圓通曰喚甚麼作塵又問法燈燈曰喚甚麼作禪牀東禪齊云此二尊宿語還明伊問處不明伊問處若明伊問處還得盡善也未試斷看忽然向伊道你指示我更要答話又作麼生會莫道又答一轉子有僧與童子上經了令持經著函內童子曰某甲念底著向那裏法燈代云汝念甚麼經先淨照禪師問楞嚴大師經中道若能轉物即同如來若被物轉即名凡夫祇如升元閣作麼生轉嚴無對汾陽代云彼此老大有僧到曹溪守衣鉢僧提起衣曰此是大庾嶺頭提不起底曰為甚麼在上座手裏無對雲門云彼此不了又云將謂是師子兒昔高麗國來錢塘刻觀音聖像及舁上船竟不能動因請入明州開元寺供養後有設問無剎不現身聖像為甚麼不去高麗國長慶稜代云現身雖普覩相生偏法眼別云識得觀音未有人問僧點甚麼燈僧曰長明燈曰甚麼時點曰去年點曰長明何在無對長慶稜代云若不如此知公不受人瞞法眼別云利動君子有官人入鎮州天王院覩神像因問院主曰此是何功德曰護國天王曰祇護此國遍護餘國曰在秦為秦在楚為楚曰臘月二十九日打破鎮州城天王向甚處去主無對老宿有偈曰五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人公有老宿云既不識他當初問甚麼人賃有僧持鉢到長者家偶為犬傷長者指袈裟曰龍披一縷金翅不吞大師全披法服為甚却被狗咬宋太宗幸相國寺問看經僧曰是甚麼經曰仁王經曰既是寡人經因甚却在卿手裏無對雪竇代云皇天無親惟德是輔幸開寶塔問僧卿是甚人曰塔主曰朕之塔因甚卿作主無對雪竇代云闔國咸知僧朝宗問甚處來曰廬山臥雲庵曰朕聞臥雲深處不朝天因甚到此無對雪竇代云難逃至化僧入對次奏曰陛下還記得麼曰甚處相見來曰靈山一別直至如今曰以何為驗無對雪竇代云貧道得得而來京寺回祿藏經僧乞宣賜召問昔日摩騰不燒如今為甚却燒無對雪竇代云陛下不忘付囑宗嘗夢神人報曰請陛下發菩提心因早朝宣問左右街菩提心作麼生發無對雪竇代云實謂古今罕聞茶陵郁山主不曾行腳因廬山有化士至論及宗門中事教看僧問法燈百尺竿頭如何進步燈曰噁凡三年一日乘驢度橋一踏橋板而墮忽然大悟遂有頌云我有神珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵因茲更不遊方師為白雲端禪師得度師唐朝因禪師微時嘗運椎擊土次見一大塊戲椎猛擊之應手而碎豁然大悟樓子和尚不知何許人亦不知其名氏一日偶經遊街市間於酒樓下整襪帶次聞樓上人唱曲云你既無心我也休忽然大悟因號樓子焉神照本如法師嘗以經王此字應訛請益四明尊者者震聲曰汝名本如師即領悟作偈曰處處逢歸路頭頭達故鄉本來成現事何必待思量臨安府上竺圓智證悟法師台州林氏子依白蓮仙法師問具變之道蓮指行燈曰如此燈者離性絶非本自空寂理則具矣六凡四聖所見不同變則在焉師不契後因掃地誦法華經至知法常無性佛種從緣起始諭旨告蓮蓮然之師領徒以來常患本宗學者膠於筆録至以天台之傳為文字之學南宗鄙之乃謁護國此庵元禪師夜語次師舉東坡宿東林偈坡偈溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人且曰也不易到此田地庵曰尚未見路徑何言到耶曰溪聲便是廣長舌山色豈非清淨身若不到此田地如何有這個消息庵曰是門外漢耳曰和尚不吝可為説破庵曰却祇從這裏猛著精彩覷捕看若覷捕得他破則亦知本命元辰落著處師通夕不寐及曉鐘鳴去其祕蓄以前偈別曰東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人這漢思量了一夜却寱語東坡門外漢這漢未及門持以告此庵庵曰向汝道是門外漢且道是賞伊罰伊莫錯好師禮謝俄有化馬祖殿瓦者求語發揚師書曰寄語江西老古錐從教日炙與風吹不是兒孫無料理要見氷消瓦解時此庵見之笑曰須是這闍黎始得公期和尚因往羅漢路逢一騎牛公子師問羅漢路向甚麼處去公拍牛曰道道師喝曰這畜生公曰羅漢路向甚麼處去師却拍牛曰道道公曰直饒恁麼猶少蹄角在師便打公拍牛便走福州山東雲頂禪師有居士問洞山道有一物上拄天下拄地未審是甚麼物師曰擔鐵枷喫鐵棒曰天地黑山河走師曰閻老殿前添一鬼北邙山下臥千年曰快活快活師曰也是野狐吞老鼠昔有一老宿一夏不為師僧説話有僧歎曰我祇恁麼空過一夏不敢望和尚説佛法得聞正因兩字也得老宿聞乃曰闍黎莫𧬊速若論正因一字也無道了扣齒云適來無端不合與麼道鄰壁有一老宿聞曰好一釜羹被一顆鼠糞污却雪竇代云誰家釜裏無一兩顆又一老宿畜一童子並不知軌則有一行腳僧到乃教童子禮儀晚間見老宿外歸遂去問訊老宿怪訝遂問童子曰阿誰教你童曰堂中某上座老宿喚其僧來問上座傍家行腳是甚麼心行這童子養來二三年了幸自可憐生誰教上座教壞伊快束裝起去黃昏雨淋淋地被趂出法眼云古人恁麼顯露些子家風甚怪且道意在於何昔有二庵主旬日不相見忽相會上庵主問下庵主多時不相見向甚麼處去下庵主曰在庵中造個無縫塔上庵主曰某甲也要造一個就兄借取塔樣子下庵主曰何不早説却被人借去了也法眼云且道是借他樣不借他樣昔有一老宿曰祖師九年面壁為訪知音若恁麼會得喫鐵棒有日在又一老宿曰祖師九年面壁何不慚惶若恁麼會得更買草鞋行腳三十年琅琊覺云既不然且道祖師面壁意作麼生良久云欲得不招無間業莫謗如來正法輪昔有一老宿因僧問師子捉兔亦全其力捉象亦全其力未審全個甚麼力老宿曰不欺之力法眼別云不會古人語昔有婆子供養一庵主經二十年常令一二八女子送飯給侍一日令女子抱定曰正恁麼時如何主曰枯木倚寒巖三冬無暖氣女子舉似婆婆曰我二十年祇供養得個俗漢遂遣出燒却庵昔有婆子臨齋入趙州法堂云這一堂師僧總是婆婆生得底唯有大底孩兒五逆不孝州才顧視婆便出去昔有跨驢人問衆僧何往僧曰道場去其人曰何處不是道場僧毆之曰這漢沒道理向道場裏跨驢不下肇法師在姚秦臨刑時説偈曰四大元無主五陰本來空將頭臨白刃猶似斬春風玄沙云大小肇法師臨死猶寱語雙溪布衲如禪師因嵩禪師戲以詩悼之曰繼祖常吾代生緣行可規終身常在道識病懶尋醫貌古筆難寫情高世莫知慈雲布何處孤月自相宜師讀罷舉筆答曰道契平生更有誰間卿於我最心知當初未欲成相別恐誤同參一首詩投筆坐亡六十年後塔戶自啓真容儼然處州法海立禪師因徽宗革本寺作神霄宮師升座謂衆曰都緣未徹所以説是説非蓋為不真便乃分彼分此我身尚且不有身外烏足道哉正眼觀來一場笑具今則聖君垂旨更僧寺作神霄佛頭添個冠兒算來有何不可山僧今日不免橫擔拄杖高挂鉢囊向無縫塔中安身立命於無根樹下嘯月吟風一任乘雲仙客來此呪水書符叩牙作法他年成道白日上升堪報不報之恩以助無為之化祇恐不是玉是玉也大奇然雖如是且道山僧轉身一句作麼生道還委悉麼擲下拂子竟爾趨寂郡守具奏詔仍改寺額曰真身又汝州天寧明禪師改德士日登座謝恩畢乃曰木簡信手拈來坐具乘時放下雲散水流去寂然天地空即斂目而逝幽棲禪師因僧為師造壽塔畢師乃領衆看塔即入塔內端坐云一客不煩兩主人便告寂衆僧競喚云和尚許多年住世不可便即恁麼去遂舁歸主事辦齋了師復上堂告衆曰不得喚作是不得喚作非汝喚作甚麼時有僧出承聞和尚有言不得喚作是不得喚作非未審喚作甚麼師便珍重告寂魏府老洞華嚴嘗示衆曰佛法在日用處行住坐臥處喫茶喫飯處語言相問處所作所為處舉心動念又却不是也又曰時當缺減人壽少有登六七十者汝輩入我法中整頓手腳未穩早是三四十年須臾衰病至衰病至則老至老至則死至前去幾何尚復恣意何不初中後夜純靜去文潞公鎮北京洞老來謁別文潞公曰法師老矣復何往對曰入滅去潞公笑謂其戲語歸與子弟言其道韻深穩談笑有味非常僧也使人候之果入滅矣歎異久之及闍維親往視火以琉璃瓶置座前祝曰佛法果靈願舍利填吾瓶言卒煙自空而降布入瓶中煙滅如所願潞公自是竭誠內典恨知之暮也太瘤蜀僧居衆嘗歎佛法混濫異見蜂起乃曰我參禪若得真正知見當不惜口業遂發願禮馬祖塔長年不輟忽一日塔放白光感而有悟後遍至叢林勘驗老宿過雪竇山前云這老漢口裏水漉漉地雪竇聞其語意似不平及太見雪竇竇云你不肯老僧那太云老漢果然口裏水漉漉地遂摵一坐具便出直歲不甘中路令人毆打損太一足太云此是雪竇老漢使之他日須折一足償我後果如其言太後至都下放意市肆中有官人請居家供養太屢告辭官人確留愈加敬禮每使侍妾饋食一日見官人至故挑其妾官人以此改禮遂得辭去不數日閙市中端坐而化歐陽文忠公昔官洛中一日遊嵩山却去僕吏放意而往至一山寺入門修竹滿軒霜清鳥啼風物鮮明文忠休於殿陛旁有老僧閲經自若與語不甚顧答文忠異之問曰道人住山久如對曰甚久也又問誦何經對曰法華經文忠曰古之高僧臨生死之際類皆談笑脫去何道致之耶對曰定慧力耳又問今乃寂寥無有何哉老僧笑曰古之人念念在定慧臨終安得亂今之人念念在散亂臨終安得定文忠大喜不自知膝之屈也謝希深有文記其事鹽官會下有一主事僧忽見一鬼使來追僧告曰某甲身為主事未暇修行乞容七日得否使曰待為白王若許即七日後來不然須臾便至言訖不見至七日後覓其僧了不可得後有人舉問一僧若被覔著時如何抵擬他洞山代云被他覓得也昔有官人作無鬼論中夜揮毫次忽見一鬼出云汝道無我聻五祖演云老僧當時若見但以手作鵓鳩嘴向伊道谷呱呱昔有古德一日不赴堂侍者請赴堂德曰我今日在莊上喫油糍飽也侍者曰和尚不曾出入德曰汝去問莊主者方出門忽見莊主來謝和尚到莊徑山杲頌云和尚不赴堂莊主謝臨屈一字入公門九牛拔不出頌古指為南泉事會元列鵝湖孚章中昔有外道問一入定僧云輪王衆生種非佛非羅漢不受後有身是甚麼義僧便入定以問彌勒却出定述彌勒語答云譬如陶師埏埴成器唐僧元曉者海東人初航海而至將訪道於名山獨行荒陂夜宿冢間渴甚引手掬於穴中得泉甘涼黎明視之髑髏也大惡之盡欲嘔去忽猛省大嘆曰心生則種種法生心滅則髑髏不二如來大師曰三界唯心豈欺我哉遂不復求師還海東疏華嚴經林間録曰玄沙備禪師薪於山中旁僧呼曰和尚看虎玄沙見虎顧僧曰是你靈潤法師山行野燒迅飛而來同遊者皆避之潤安步如常曰心外無火火實是心謂火可逃無由免火火至而滅嚴陽尊者單丁住山蛇虎就手而食歸宗常公刈草見蛇芟之傍僧曰久聞歸宗今日乃見一粗行沙門常曰你粗我粗耶吾聞親近般若有四種驗心謂就理就事入就出就事理之外宗門又有四藏鋒之用親近以自治藏鋒之用以治物唐修雅法師聽誦法華經歌山色沉沉松煙空林之下盤陀之石石上有僧結跏橫錫誦白蓮經從旦至夕左之右之虎迹狼迹十片五片異花狼籍偶然相見未深相識知是古之人今之人是曇彥是曇翼我聞此經有深旨覺帝稱之真妙義合目冥心子細聽醍醐滴入焦腸裏佛之意兮祖之髓我之心兮經之旨可憐彈指及舉手不達目前今正是大矣哉甚奇特空王要使羣生得光輝一萬八千土土土皆作黃金色四生六道一光中狂夫猶自問彌勒我亦當年學空寂一得無心便休息今日親聞誦此經始覺驢乘匪端的我亦當年不出戶不欲紅塵沾步武今日親聞誦此經始覺行行皆寶所我亦當年愛吟咏將謂冥搜亂禪定今日親聞誦此經何妨筆研資真性我亦當年狎兒戲將謂光陰半虗棄今日親聞誦此經始覺聚沙非小事我昔曾遊山與水將謂他山非故里今日親聞誦此經始覺山河無寸地我昔心猿未調伏常將金鎖虗拘束今日親聞誦此經始覺無物為拳拲師誦此經經一字字字爛嚼醍醐味醍醐之味珍且美不在唇不在齒只在勞生方寸裏師誦此經經一句句句白牛親動步白牛之步疾如風不在西不在東只在浮生日用中日用不知一何苦酒之腸飯之腑長者揚聲喚不回何異聾何異瞽世人之耳非不聰耳聰特向經中聾世人之目非不明目明特向經中盲合聰不聰合明不明轆轤上下浪死虗生世人總識師之音誰人能識師之心世人總識師之形何人能識師之名師名醫王行佛令來與衆生治心病能使迷者醒狂者定垢者淨邪者正凡者聖如是則非但人恭敬亦合龍讚詠鬼讚詠佛讚詠豈得背覺合塵之徒不稽首而歸命僧文通慧者河南開封府白雲寺僧也其師令掌盥盆偶有市鮮者濯於盆文恚擊之遽隕因潛奔華州總持寺久之為長老蓋二十年餘矣一日忽語其徒曰二十年前一段公案今日當了衆問故曰日午當自知之遂趺坐以俟時張浚統兵至關中一卒持弓矢至法堂瞪目視文將射之文笑曰老僧相待久矣卒曰素未相面今見而恚心不可遏即欲相戕何耶文語以昔故卒遽説偈曰冤冤相報何時了劫劫相纏豈偶然不若與師俱解釋如今立地往西天視之已立化矣文即索筆書偈曰三十三年飄蕩做了幾番模樣誰知今日相逢却是在前變障書畢泊然而化一統志
