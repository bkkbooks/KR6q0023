body:
  text: 六祖下第十三世隆與府泐潭洪英禪師閲華嚴十明論至為真智慧無體性不能自知無性故為無性之性不能自知無性故名曰無明華嚴第六地曰不了第一義故號曰無明將知真智慧本無性故不能自了若遇了緣而了則無明滅矣是謂成佛要門願以此法紹隆佛種然今諸方誰可語此良久喜曰有積翠老在即日造黃檗南禪師席檗與語達旦曰荷擔大法盡在爾躬厚自愛又往見翠巖真點胸方入室真問曰女子出定意旨如何師引手掐真膝而去真笑曰賣匙箸客未在真自是知其機辨脫略窠臼大稱賞之於是一時學者宗向僧禮拜起便垂下袈裟角曰脫衣卸甲時如何師曰喜得狼煙息弓弰壁上懸僧却攬上袈裟曰重整衣甲時如何師曰不到烏江畔知君未肯休僧便喝師曰驚殺我僧拍一拍師曰也是死中得活僧禮拜師曰將謂是收燕破趙之才元來是販私鹽漢上堂釋迦老子當時一手指天一手指地云天上天下惟我獨尊釋迦老子旁若無人當時若遇個明眼衲僧直教他上天無路入地無門然雖如是也須是銅沙鑼裏滿盛油始得妙喜曰可貴可賤南昌潘居士同宿雙嶺居士曰龍潭見天皇時節冥合孔子師驚問何以驗之曰孔子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也師以為何如師笑曰楚人以山雞為鳳世傳以為笑不意居士此語相類汝擎茶來我為汝接汝行碗來我為汝受汝問訊我起手若言是説説個甚麼若言不説龍潭何以便悟此所謂無法可説是名説法以世尊之辨亦不能加此兩句耳學者但求解會譬如以五色圖畫虗空鳥窠無佛法可傳授不可默坐間拈布毛吹之侍者便悟學者乃曰拈起布毛全體發露似此見解未出教乘其可稱祖師門下客哉九峰被人問深山裏有佛法也無不得已曰有及被窮詰無可有乃曰石頭大者大小者小學者卜度曰剎説衆生説三世熾然説審如是教乘自足何必更問祖師意旨耶要得脫體明去譬如眼病人求醫治之醫者但能去翳膜不曾以光明與之居士推牀驚曰吾憂積翠法道未有繼者今知盡在子躬厚自愛雙嶺順禪師問菴中老師好問學者併却咽喉唇吻道取一句首座曾道得麼師乾笑已而有偈曰阿家嘗醋三尺喙新婦洗面摸著鼻道吾答話得腰裩玄沙開書是白紙順公屈服熙寧二年六月知事紛爭止之不可初九日謂衆曰領衆不肅正坐無德吾有愧黃龍呼維那鳴鐘集衆敘行腳始末曰吾滅後火化以骨石藏普通塔明生死不離清衆也言卒而逝袁州仰山行偉禪師受賢首宗於太三藏成名見同學法亮者參南宗問曰汝今稱禪者禪宗奧義語我來亮曰待我死後為汝敷説師曰狂耶亮曰我狂已息汝今方熾即趨去師因棄講謁南禪師每造室南公必斂目良久乃語師曰和尚見行偉必合眼何耶曰麻谷見良遂來荷鉏鉏草良遂有悟處我見汝來但間閉目汝雖無悟然且有疑尚亦可在師滋不曉時泐潭月禪師與南公同坐夏積翠月以經論有聲師常侍坐聽其談論因讀小釋迦傳曰韋尚書問仰山寂公禪師尋常如何接人寂曰僧來必問來為何事曰來親近又問還見老僧否曰見又問老僧何似驢僧未有酬者韋曰若言見爭奈驢若言不見今禮覲誰以此故難答寂曰無人如尚書辨析者耳月公稱善師亦以為然南公獨曰溈仰宗枝不到今者病在此耳師日夜究思不悟其意將治行而西卜菴嵩少之下為粥飯僧夜與一僧同侍坐僧問法華經言得解一切衆生語言陀羅尼何等語是陀羅尼南公顧香罏僧即引手候火有無無火又就添以炷香仍依位而立南公笑曰此是陀羅尼師驚喜進曰如何解南公令僧且去僧揭簾趨出南公曰若不解爭能與麼師方有省師律身甚嚴燕坐忘夜旦占一室謝絶交遊有過師者虗己座以延之躬起炷香叉手而立南公聞之以為太絶物非和光同塵義面誡之師曰道業未辦歲月如流大根器如雲門趙州猶曰我惟粥飯二時是雜用心又曰我豈有工夫間處用矧行偉根器日劫相倍者寧暇囿世情事清談諛悅人增我相乎南公賢之夏夜坐深林袒以飼蚊蚋腸毒作十日不愈以刀絶之尺許血流不止門人泣曰師奈何不少忍師曰為其障我行道蒲伏牀上無所利於物得死不愈於生乎元豐三年十一月二十六日説偈而化後三日闍維得五色舍利骨石拴索勾連塔於寺之東黃龍恭首座出世住禪林訪法昌遇和尚遇問曰見説你要為黃龍燒香是否曰不敢遇曰龍生龍子須是解興雲吐霧始得師曰隨家豐儉遇曰你未拈香早鈍置黃龍了也師曰且莫多口遇曰你且道黃龍實頭處作麼生師提起坐具遇喚行者討坐具來行者提在手中遇便打云你三十年後也道見老僧來師後住衡之華光乃有坦率之風罹有司民其衣華光既遭回祿而師語録於灰燼中字畫無損餘紙悉盡信般若之明驗矣安吉州報本慧元禪師參黃龍師每坐下板輒自引手反覆視之曰寧有道理而云似佛手知吾家揭陽而乃復問生緣何處乎久而頓釋其疑一日為達上座咨問入室龍曰既是達了為甚麼更來師曰事不厭細龍曰你便打趕出去不是做得老僧侍者師曰不得一句龍遂行入方丈師曰大小黃檗龍頭蛇尾龍笑而已師脅不至席三十年平生規法南禪師作止元祐六年十一月十六日升座説偈曰五十五年夢幻身東西南北孰為親白雲散盡千山外萬里秋空片月新言訖而化景福順禪師得心印於老黃龍嘗有偈曰夏日人人把扇搖冬來以炭滿罏燒若能於此全知曉曠劫無明當下消壽八十餘坐脫於香城山顏貌如生素與潘延之善臨終使人要延之敘別延之至而師去矣黃檗積翠永菴主問僧審奇汝久不見何所為奇曰見偉藏主有個安樂處師曰舉似我奇敘所得師曰汝是偉未是奇莫測以語偉偉曰汝非永不非奇走積翠質之南公南亦大笑師聞作偈曰明暗相參殺活機大人境界普賢知同條生不同條死笑倒菴中老古錐延慶洪準禪師得法黃龍天資純至聞人之善喜見眉宇聞人之惡合掌扣空暮年不領院事寓迹于寒溪寺年已逾八十矣平生日夕無所營為眠食之餘惟吟梵音讚觀世音而已臨寂弟子皆赴供惟一僕夫在安坐讀孔雀經一周瞑目而逝三日不傾鄉人觀者如堵師忽開目而笑使坐於地弟子還師呼立其右握手如炊熟狀良久視之寂然去矣顏色如生道俗塑而龕之舒州白雲守端禪師衡陽葛氏子幻事翰墨冠依茶陵郁禪師披削往參楊岐岐一日忽問受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不寐黎明咨詢之適歲暮岐曰汝見昨日打驅儺者麼曰見岐曰汝一籌不及渠師復駭曰何謂也岐曰渠愛人笑汝怕人笑師大悟師遊廬山圓通訥以院事讓師而訥處東堂未幾訥厭間寂郡守至自陳客情太守惻然目師師笑唯唯而已明日升座曰昔法眼禪師有偈曰難難難是遣情難情盡圓明一顒寒方便遣情猶不是更除方便太無端大衆且道情作麼生遣喝一喝下座負包去一衆大驚挽之不可示衆明明知道只是這個為甚麼透不過只為見人開口時便喚作言句見人閉口時便喚作良久默然又道動展施為開言吐氣盡十方世界內無不是自己所以墮在塗中隱隱猶懷近日嫌豈不見雲門道聞聲悟道見色明心遂舉手云觀世音菩薩將錢來買胡餅放下手云元來却是饅頭又不見山僧在法華時當示衆云無業禪師道一毫頭聖凡情念未盡未免入驢胎馬腹裏去大衆直饒一毫頭聖凡情念頓盡亦未免入驢胎馬腹裏去瞎漢但恁麼看取參示衆曰此事如萬仞崖頭相似總知道放著手便撲到底只是捨命不得法華今日不動一毫頭教諸人到底去也擲拄杖下座示衆若端的得一回汗出來也向一莖草上便現瓊樓玉殿若未端的得一回汗出縱有玉殿瓊樓却被一莖草蓋却且道作麼生得汗出去良久云自有一雙窮相手不曾容易舞三臺妙喜曰一莖草上現瓊樓玉殿決定可信瓊樓玉殿被一莖草蓋却莫被他熱瞞徑山恁麼道為已得一回汗出者説若未得一回汗出者切不得疑著僧問智不到處切忌道著道著時如何師曰風吹日炙曰恁麼則無處容身去也師曰碓搗磨磨曰官不容針私通車馬師曰可貴可賤僧彈指一下師曰恰是僧吐舌師曰家貧猶自可路貧愁殺人僧呵呵大笑師曰放過一著金陵保寧仁勇禪師僧問如何是佛師曰近火先焦曰如何是道曰泥裏有刺曰如何是道中人曰切忌踏著上堂山僧入舌地獄去也以手拽舌云阿㖿阿㖿上堂古人底今人用今人底古人為古今無背面今古幾人知㖿嗚咿一九與二九相逢不出手上堂有手腳無背面明眼人看不見天左旋地右轉拍膝云西風一陳來落葉兩三片示衆云釋迦老子四十九年説法不曾道著一字優波毱多丈室盈籌不曾度得一人達磨不居少室六祖不住曹溪彼自無瘡勿傷之也拍膝顧衆云且喜得天下太平比部孫居士因楊岐來訪值視斷次士曰某為王事所牽何由免難岐指曰委悉得麼士曰望師點破岐曰此是比部弘願深廣利濟羣生士曰未審如何岐示以偈曰應現宰官身廣弘悲願深為人重指處棒下血淋淋士於此有省潭州大溈慕哲真如禪師上堂月生一大地茫茫誰受屈月生二東西南北沒把鼻月生三善財特地向南參所以道放行則怛薩舒光把住則泥沙匿曜且道放行是把住是良久云圓伊三點永萬物自尖新師室中問學者趙州洗鉢盂話上人如何會僧擬對則師以手托之曰歇去自其分座接納至終未嘗換機師律身精嚴放參罷輒自作務使令者在側如路人紹聖二年十月八日無疾説偈曰昨夜三更風雷忽作雲散長空前溪月落良久別衆趨寂闍維舍利斗許大如豆目睛齒爪不壞分塔於京潭福州聖泉紹燈禪師古田陳氏子生時異香滿室紫帽覆首幼不茹葷觀諸經論如宿習一日索浴更衣升座四方檀信湊至師説偈曰吾年五十三去住本無貪臨行事若何不用口喃喃儼然示寂兩日後聞鐘聲忽復醒自後四大輕安身頻出舍利元豐中本郡大旱太守孫公請師祈雨甘澤大沛後凡有所禱輒應不著所終又有慧力善周禪師者元祐元年十二月望日沐浴淨髮説偈曰山僧住瑞筠未嘗形言句七十三年來七十三年去言畢而逝五日後鬚髮再生亦玉泉嗣鄧州丹霞子淳禪師上堂舉德山示衆曰我宗無語句實無一法與人德山恁麼説話可謂是祇知入草求人不覺通身泥水子細觀來祇具一隻眼若是丹霞則不然我宗有語句金刀剪不開深深玄妙旨玉女夜懷胎洪州寶峰闡提惟照禪師嘗夜坐閣道時風雪震薄聞警道者傳呼過之隨有所得辭去大觀中芙蓉嬰難師自三吳欲趨沂水僕夫迷道師舉杖擊之忽大悟歎曰是地非鰲山也耶比至沂芙蓉望而喜曰紹隆吾宗必子數輩矣示聰藏主法語五則一曰曹山立四禁盡衲僧命脈透得過切忌依倚將來了事人須別有生機一路二曰衲僧向異類中行履先德道異類墮此了事人病明安道須是識主始得三曰闡提尋常向人道不得參禪不得學佛只要伊如大死人只恐聞此語作無事會作無法可當情曾正是死不得若是死得決不肻作這般見解他時為人切宜子細四曰吾家立五位為宗往往人以理事明以寂照會以能所見以體用解盡落今時何得名為教外別傳之妙生死路頭那個是得處總不恁麼時如何卜度即不中五曰有情故情滲漏有見故見滲漏有語故語滲漏設得見無情無語無拽住便問他你是何人襄州石門元易禪師上堂十方同聚會個個學無為此是選佛場心空及第歸大衆祇如聞見覺知未嘗有間作麼生説個心空底道理莫是見而不見聞而不聞謂之心空耶錯莫是忘機息慮萬法俱捐銷能所以入玄宗泯性相而歸法界謂之心空耶錯恁麼也不得不恁麼也不得恁麼不恁麼總不得未審畢竟作麼生還會麼良久曰若實無為無不為天堂地獄長相隨三尺杖子攪黃河八臂那吒冷眼窺無限魚龍盡奔走捉得循河三腳龜脫取殼鐵錐錐吉凶之兆便分輝借問東村白頭老吉凶未兆若何為休休休古往今來春復秋白日騰騰隨分過更嫌何處不風流咄東京淨因自覺禪師政和五年九月四日忽召主事令以楮囊分而為四衆僧童行常住津送各一既而復曰丹霞有個公案從來推倒扶起今朝普示諸人且道是個甚底顧視左右曰會麼曰不會師曰偉哉大丈夫不會末後句遂就寢右脅而化東京法雲善本大通禪師遊方至蘇州瑞光謁圓照坐定照特顧之師便契旨僧問寶塔原無縫如何指示人師曰煙霞生背面星月繞簷楹曰如何是塔中人師曰竟日不干清世事長年占斷白雲鄉曰向上更有事也無師曰太無厭生師所至見佛菩薩行立之像不敢坐伊蒲塞饌以魚胾名者不食其真誠應事防心離過類如此大觀三年十二月甲子屆三指謂左右曰止有三日屆期而化與圓照齊名時號大小本投子修顒禪師參慧林因喫攧有省作偈曰這一交這一交萬兩黃金也合消頭上笠腰下包清風明月杖頭挑富鄭公因趙清獻公警發不捨晝夜力進此道謁師於投子會師方為衆登座富見師左右顧視忽有省因執弟子禮趨函丈命侍者請為入室師見即曰相公已入來富弼猶在外富聞汗流浹背即大悟隨以頌寄圓照頌見圓照章中清獻公趙抃字悅道年四十餘擯去聲色繫心宗教會佛慧來居衢之南禪公日親之慧未嘗容措一詞後典青州政事之餘多宴坐忽大雷震驚即契悟作偈曰默坐公堂虗隱几心源不動湛如水一聲霹靂頂門開喚起從前自家底慧聞笑曰趙悅道撞彩耳公嘗自題偈齋中曰腰佩黃金已退藏個中消息也尋常世人欲識高齋老祇是柯村趙四郎復曰切忌錯認臨終遺書佛慧有曰非師平日警誨至此必不得力矣音釋卷二十四之二十七鑠式灼切商入聲銷金舐上紙切時上聲以舌取食物也渤澥音孛蟹海別枝弛詩止切音始釋也逴尺約切音綽行貌蹇也揕職任切斟去聲擬擊也𭢈旨而切音支鷃於諫切音晏鵪鶉也褶質涉切音摺衣褶騭職日切音質湜承職切音實榼克合切堪入聲酒器齓同齔音襯毀齒也詬古候切音垢耻也詈也暹思廉切音纖日光聲也黐抽知切音癡膠也耄莫報切音帽惛忘也譁胡瓜切音華喧譁掖夷益切挾持也闞虎瞻切音喊怒聲又聲大貌偵丑成切音稱探伺也畋音田獵也駸七林切音侵馬行疾也璠璵音煩于魯寶玉贋魚澗切音鴈偽物捃舉窘切均入聲拾取也癎何艱切音間小兒癲癎徼古弔切音教循也繞也掠也境也邊也塞也徼者敢邀遮之義夤夷真切音夤緣連也窆悲念切音貶去聲下棺也遏合切庵入聲覆蓋側加切音查齒不正也齖牛加切音牙胾資四切音恣切肉曰胾痁持廉切閃平聲瘧病䖃力瓦切泥不熟貌苴側下切音鮓查滓也劘眉波切音磨躂也達切音撻足跌也鬅鬙音朋僧髮亂貌拴且緣切音詮揀也抃皮面切音便顒魚容切音玉平聲掐苦洽切嵌入聲手刺雒音洛
