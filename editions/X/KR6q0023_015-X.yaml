body:
  text: 六祖下第五世潭州石霜山慶諸禪師廬陵新淦陳氏子初習毗尼忽棄去抵溈山為米頭一日篩米次溈曰施主米莫拋撒師曰不拋撒溈於地上拾得一粒曰汝道不拋撒這個是甚麼師無對溈又曰莫輕這一粒百千粒盡從這一粒生師曰百千粒從這一粒生未審這一粒從甚麼處生溈呵呵大笑歸方丈溈至晚上堂曰大眾米裏有蟲諸人好看後參道吾問如何是觸目菩提吾喚沙彌彌應諾吾曰添淨瓶水著良久却問師汝適來問甚麼師擬舉吾便起去師於此有省吾將順世垂語曰我心中有一物久而為患誰能為我除之師曰心物俱非除之益患吾曰賢哉賢哉師後避世混俗於長沙瀏陽陶家坊朝游夕處人莫能識後因僧自洞山來師問和尚有何言句示徒曰解夏上堂云秋初夏末兄弟或東去西去直須向萬里無寸草處去良久曰祇如萬里無寸草處作麼生去師曰有人下語否曰無師曰何不道出門便是草僧回舉似洞山山曰瀏陽乃有古佛耶妙喜曰不見道師子一滴乳迸散十斛驢乳大陽延云如今直道不出門亦是草漫漫地且道合向甚麼處行履良久云莫守寒巖異草青坐著白雲宗不妙圓通善云且道諸人即今脚跟下一句作麼生道若道萬里無寸草許你參見洞山若道出門便是草許你參見石霜若道不出門亦是草漫漫地許你參見大陽若總道不得許你參見延聖何故惟有好風來席上更無閑語落人間師在方丈內僧在窓外問咫尺之間為甚麼不覩師顏師曰徧界不曾藏僧舉問雪峰徧界不曾藏意旨如何峰曰甚麼處不是石霜師聞曰這老漢著甚死急峰聞曰老僧罪過玄沙云山頭老漢蹉過石霜洞山价云笑殺土地東禪齊云只如雪峯是會石霜意不會石霜意若會也他為什麼道死急若不會作麼生雪峯豈可不會然法且無異奈以師承不同解之差別他云徧界不曾藏也須曾學來始得會亂說即不可幻寄云齊公此言以病為藥眼目定動入地獄如箭射僧問三千里外遠聞石霜有個不顧師曰是曰祇如萬象歷然是顧不顧師曰我道不驚眾曰不驚眾是與萬象合如何是不顧師曰徧界不曾藏僧辭師問船去陸去曰遇船即船遇陸即陸師曰我道半塗稍難僧無對雲蓋問萬戶俱閉即不問萬戶俱開時如何師曰堂中事作麼生曰無人接得渠師曰道也太煞道也只道得八九成曰未審和尚作麼生道師曰無人識得渠妙喜曰一對無孔鐵椎就中一個最重傳燈錄于師後語仍作無人接得渠東禪齊云只如石霜意作麼生若道一般前來為甚麼不許伊若道別有道理又只重說一徧且道古人意作麼生問僧近離甚處曰審道師於面前畫一畫曰汝刺脚與麼來還審得這個麼曰審不得師曰汝衲衣與麼厚為甚却審這個不得曰某甲衲衣雖厚爭奈審這個不得師曰與麼則七佛出世也救你不得曰說甚七佛千佛出世也救某甲不得師曰太懵懂生曰爭奈聻師曰參堂去僧曰喏喏裴相公來師拈起裴笏問在天子手中為珪在官人手中為笏在老僧手中且道喚作甚麼裴無對師乃留下笏示眾初機未覯大事先須識取頭其尾自至疎山仁參問如何是頭師曰直須知有曰如何是尾師曰盡却今時曰有頭無尾時如何師曰吐得黃金堪作甚麼曰有尾無頭時如何師曰猶有依倚在曰直得頭尾相稱時如何師曰渠不作個解會亦未許渠在後僧問九峯如何是頭峯曰開眼不覺曉曰如何是尾峯曰不坐萬年牀曰有頭無尾時如何峯曰終是不貴曰有尾無頭時如何峯曰雖飽無力曰直得頭尾相稱時如何峯曰兒孫得力室內不知師居石霜二十年學眾多有常坐不臥屹若株杌天下謂之枯木眾唐僖宗聞師名專使賜紫師堅辭不受光啟四年戊申二月己亥安坐而化潭州漸源仲興禪師在道吾為侍者因過茶與吾吾提起盞曰是邪是正師义手近前目視吾吾曰邪則總邪正則總正師曰某甲不恁麼道吾曰汝作麼生師奪盞子提起曰是邪是正吾曰汝不虗為吾侍者師便禮拜一日侍吾往檀越家弔慰師拊棺曰生耶死耶吾曰生也不道死也不道師曰為甚麼不道吾曰不道不道歸至中路師曰和尚今日須與某甲道若不道打和尚去也吾曰打即任打道即不道師便打吾歸院曰汝宜離此去恐知事得知不便師乃禮辭隱於村院經三年後忽聞童子念觀音經至應以比丘身得度者即現比丘身忽然大省遂焚香遙禮曰信知先師遺言終不虗發自是我不會却怨先師先師既沒惟石霜是嫡嗣必為證明乃造石霜霜見便問離道吾後到甚處來師曰祇在村院寄足霜曰前來打先師因緣會也未師起身進前曰却請和尚道一轉語霜曰不見道生也不道死也不道師乃述在村院得底因緣遂禮拜石霜設齋懺悔他日持鍬復到石霜於法堂上從東過西從西過東霜曰作麼師曰覓先師靈骨霜曰洪波浩渺白浪滔天覓甚先師靈骨師曰正好著力霜曰這裏針劄不入著甚麼力源持鍬肩上便出太原孚代云先師靈骨猶在雪竇頌兔馬有角牛羊無角絕毫絕𨤲如山如嶽黃金靈骨今猶在白浪滔天何處著無處著隻履西歸曾失却圜悟勤云有者錯會道不道便是道無句是有句兔馬無角却云有角牛羊有角却云無角且得沒交涉殊不知古人千變萬化現如此神通只為打破你這精靈鬼窟若透得去不消一個了字兔馬有角牛羊無角絕毫絕釐如山如嶽這四句便似摩尼寶珠一顆相似雪竇渾崙地吐在你面前了也後來祇是據欵結案一日寶盖和尚來訪師便捲起簾子在方丈內坐盖一見乃下却簾便歸客位師令侍者傳語長老遠來不易猶隔津在盖擒住侍者與一掌者曰不用打某甲有堂頭和尚在盖曰為有堂頭老漢所以打你者回舉似師師曰猶隔津在僧密禪師與洞山行次忽見白兔走過師曰俊哉洞曰作麼生師曰大似白衣拜相洞曰老老大大作這個說話師曰你作麼生洞曰積代簪纓暫時落魄師把針次洞山問曰作甚麼師曰把針洞曰把針事作麼生師曰針針相似洞曰二十年同行作這個語話豈有與麼功夫師曰長老又作麼生洞曰如大地火發底道理師問智識所通莫不游踐徑截處乞師一言洞曰師伯意何得取功師因斯頓覺下語非常後與洞山過獨木橋洞先過了拈起木橋曰過來過來師喚价闍黎洞乃放下橋木澧州夾山善會禪師廣州廖氏子自得法船子遯世幽棲學者鱗萃咸通庚寅乃開席夾山師初在溈山作典座溈問今日喫甚菜師曰二年同一春溈曰好好修事著師曰龍宿鳳巢僧問從上立祖意教意和尚為甚麼却言無師曰三年不喫飯目前無饑人曰既是無饑人某甲為甚麼不悟師曰祇為悟迷却闍黎復示偈曰明明無悟法悟法却迷人長舒兩脚睡無偽亦無真問撥塵見佛時如何師曰直須揮劍若不揮劍漁父棲巢僧後問石霜撥塵見佛時如何霜曰渠無國土甚處逢渠僧回舉似師師上堂舉了乃曰門庭施設不如老僧入理深談猶較石霜百步問古人布髮掩泥當為何事師曰九烏射盡一翳猶存一箭墮地天下黯黑師會下有一僧到石霜入門便道不審霜曰不必闍黎僧云與麼則珍重又到巖頭亦云不審頭乃噓兩聲僧云與麼則珍重纔回步頭云雖是後生亦能管帶其僧歸舉似師師明日陞堂乃喚昨日從石霜巖頭來底阿師出來如法舉前話僧舉了師云大眾還會麼若無人道老僧不惜兩莖眉毛道去也乃云石霜雖有殺人刀且無活人劍巖頭亦有殺人刀亦有活人劍上堂我二十年住此山未曾舉著宗門中事有僧問承和尚有言二十年住此山未曾舉著宗門中事是否師曰是僧便掀倒禪牀師休去至明日普請掘一坑令侍者請昨日僧至曰老僧二十年說無義語今日請上座打殺老僧埋向坑裏便請便請若不打殺老僧上座自著打殺埋在坑中始得其僧歸堂束裝潛去蔣山懃云夾山濁時頭尾皆濁這僧清時始終俱清後人不會便云這僧怕被打殺潛去殊不知綿裏有針這僧好是好只是少一轉語待夾山云闍黎若不打殺老僧闍黎自著打殺埋向坑中只近前兩手擘開眼云猫虎頭上座參師問甚處來曰湖南來師曰曾到石霜麼曰要路經過爭得不到師曰聞石霜有毬子話是否曰和尚也須急著眼始得師曰作麼生是毬子曰跳不出師曰作麼生是毬杖曰沒手足師曰且去老僧未與闍黎相見明日升座師曰昨日新到在麼頭出應諾師曰目前無法意在目前不是目前法非耳目之所到頭曰今日雖問要且不是師曰片月雖明非關天地頭曰莫𡱰沸便作掀禪牀勢師曰且緩緩虧著上座甚麼處頭竪起拳曰目前還著得這個麼師曰作家作家頭又作掀禪牀勢師曰大眾看這一員戰將若是門庭布列山僧不如他若據入理之談也較山僧一級地師示眾云百草頭薦取老僧閙市裏識取天子雲門云蝦蟇鑽你鼻孔毒蛇穿作眼睛且向葛藤裏會取妙喜云夾山垛生招箭雲門認賊為子雖然如是知恩者少負恩者多僧問如何是夾山境師曰猿抱子歸青嶂裏鳥銜花落碧巖前後來法眼云我二十年祇作境話會浮山遠云直饒不作境話會亦未在何故犀因翫月紋生角象被雷驚花入牙上堂金烏玉兔交互爭輝坐却日頭天下黑暗上唇與下唇從來不相識明明向君道莫令眼顧著何也日月未足為明天地未足為大空中不運斤巧匠不遺蹤見性不留佛悟道不存師尋常老僧道目覩瞿曇猶如黃葉一大藏教是老僧坐具祖師玄旨是破草鞋寧可赤脚不著最好上堂不知天曉悟不由師龍門躍鱗不墮漁人之手但意不寄私緣舌不親玄旨正好知音此名俱生話若向玄旨疑去賺殺闍黎困魚止濼鈍鳥栖蘆雲水非闍黎闍黎非雲水老僧於雲水而得自在闍黎又作麼生上堂明不越戶穴不棲巢目不顧他位裏脚不踏他位裏六戶不掩四衢無蹤學不亭午意不立玄千劫眼不借舌頭底萬劫舌頭不顧眼中明峻機不假鋒鋩事到這裏有甚麼事闍黎竿頭絲線從君弄不犯清波意自殊上堂有祖以來時人錯會相承至今以佛祖言句為人師範若或如此却成狂人無智人去他祇指示汝無法本是道道無一法無佛可成無道可得無法可取無法可捨所以老僧道目前無法意在目前他不是目前法若向佛祖邊學此人未具眼在何故皆屬所依不得自在本祇為生死茫茫識性無自由分千里萬里求善知識須具正眼求脫虗謬之見定取目前生死為復實有為復實無若有人定得許汝出頭上根之人言下明道中下根器波波浪走何不向生死中定當取何處更疑佛疑祖替汝生死有智人笑汝汝若不會更聽一頌勞持生死法惟向佛邊求目前述正理撥火覓浮漚中和元年十一月七日召主事曰吾與眾僧話道累歲佛法深旨各應自知吾今幻質時盡即去汝等善保護如吾在日勿得雷同世人輒生惆悵言訖奄然而逝舒州投子山大同禪師參翠微語參翠微章他日問如何是佛理微曰佛即不理師曰莫落空否微曰真空不空微復示讖偈曰佛理何曾理真空又不空大同居寂住敷演我師宗師後住投子院名寂住一日趙州和尚至桐城縣師亦出山途中相遇乃逆而問曰莫是投子山主麼師曰茶鹽錢布施我州先歸菴中坐師後携一瓶油歸州曰久嚮投子及乎到來祇見個賣油翁師曰汝祇識賣油翁且不識投子州曰如何是投子師提起油瓶曰油油師自過胡餅與州州不管師令侍者過胡餅州禮侍者三拜州問大死底人却活時如何師曰不許夜行投明須到州曰我早侯白伊更侯黑雪竇頌云活中有眼還同死藥忌何須驗作家古佛尚言曾未到不知誰解撒泥沙徑山杲頌禾黍不陽艶競栽桃李春翻令力耕者半作賣花人雪峰到師指菴前一片石謂雪峰曰三世諸佛總在裏許峰曰須知有不在裏許者師曰不快漆桶師與雪峰遊龍眠有兩路峰問那個是龍眠路師以杖指之峰曰東去西去師曰不快漆桶問一槌便就時如何師曰不是性燥漢曰不假一槌時如何師曰不快漆桶峰問此間還有人參也無師將钁頭拋向峰面前峰曰恁麼則當處掘去也師曰不快漆桶峰辭師送出門召曰道者峰回首應諾師曰塗中善為雪竇顯於不是性燥漢處拈云我當時若作雪峰待投子道不是性燥漢處只向伊道鉗鎚在我手裏諸上座合與投子著得個甚麼語若能道得便乃性燥平生光揚宗眼若也顢頇頂上一椎莫言不道僧問趙州初生孩子還具六識也無州云急水上打毬子後僧問師急水上打毬子意旨如何師曰念念不停留雪竇顯頌云六識無功伸一問作家曾共辨來端茫茫急水打毬子落處不停誰解看師因僧問如何是十身調御師下禪牀立又問凡聖相去多少師亦下禪牀立雪竇顯云此公案諸人無不委知若與麼舉天下衲僧盡為念話社家雪竇還有長處也無試為大眾舉看凡聖相去多少投子下禪牀立如何是十身調御投子下禪牀立且道與前來舉底是同是別若道一般許上座具一隻眼若道別有奇特也許上座具一隻眼復更開一線道凡聖相去多少請上座下一轉語如何是十身調御請上座答一轉語非但參見投子亦得知雪竇長處或復總道下禪牀立惜取眉毛好問一切聲是佛聲是否師曰是曰和尚莫𡱰沸盌鳴聲師便打問粗言及細語皆歸第一義是否師曰是曰喚和尚作頭驢得麼師便打妙喜云賊賊敗也復云且道那個是正賊那個是草賊雪竇頌投子投子機輪無滯放一得二同彼同此可憐無限弄潮人畢竟還落潮中死忽然活百川倒流閙𣽅𣽅問一等是水為甚麼海鹹河淡師曰天上星地下木師在京赴一檀越齋檀越將一盤草來師拳兩手安頭上檀越便將齋來後有僧問和尚在京投齋意旨如何師曰觀世音菩薩問和尚自住此山有何境界師曰丫角女子白頭絲中和中巢宼暴起天下喪亂有狂徒持刃問師曰住此何為師乃隨宜說法渠魁聞而拜伏脫身服為施而去乾化四年四月六日示微疾大眾請醫師謂眾曰四大動作聚散常程汝等勿慮吾自保矣言訖跏趺而寂鄂州清平山安樂院令遵禪師初參翠微便問如何是西來的的意微曰待無人即向汝說師良久曰無人也請和尚說微下禪牀引師入竹園師又曰無人也請和尚說微指竹曰這竿得恁麼長那竿得恁麼短師雖領其微言猶未徹其玄旨出住大通舉初見翠微機緣謂眾曰先師入泥入水為我自是我不識好惡師自此化導僧問如何是大乘曰井索如何是小乘曰錢索如何是有漏曰笊篱如何是無漏曰木杓法雲秀云大乘小乘井索錢索有漏無漏笊篱木杓法昌遇和尚垂語云我要一個不會禪底做國師妙喜曰且道是醍醐句毒藥句鼎州德山宣鑒禪師簡州周氏子丱歲出家依年受具精究律藏於性相諸經貫通旨趣常講金剛般若時謂之周金剛常謂同學曰一毛吞海海性無虧纖芥投鋒鋒利不動學與無學惟我知焉後聞南方禪席頗盛師氣不平乃曰出家兒千劫學佛威儀萬劫學佛細行不得成佛南方魔子敢言直指人心見性成佛我當摟其窟穴滅其種類以報佛恩遂擔青龍疏鈔出蜀至澧陽路上見一婆子賣餅因息肩買餅點心婆指擔曰這個是甚麼文字師曰青龍疏鈔婆曰講何經師曰金剛經婆曰我有一問你若答得施與點心若答不得且別處去金剛經道過去心不可得現在心不可得未來心不可得未審上座點那個心師無語遂往龍潭至法堂曰久嚮龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭師無語遂棲止焉一夕侍立次潭曰更深何不下去師珍重便出却回曰外面黑潭點紙燭度與師師擬接潭復吹滅師於此大悟便禮拜潭曰子見個甚麼師曰從今向去更不疑天下老和尚舌頭也至來日龍潭陞座謂眾曰可中有個漢牙如劍樹口似血盆一棒打不回頭他時向孤峰頂上立吾道去在師將疏鈔堆法堂前舉火炬曰窮諸玄辯若一毫置於太虗竭世樞機似一滴投於巨壑遂焚之於是禮辭抵溈山挾複子上法堂從西過東從東過西曰有麼有麼山坐次殊不顧盻師曰無無雪竇著語云勘破了也便出至門首乃曰雖然如此也不得草草遂具威儀再入相見纔跨門提起坐具曰和尚山擬取拂子師便喝拂袖而出雪竇著語云勘破了也溈山至晚問首座今日新到在否座曰當時背却法堂著草鞋出去也山曰此子已後向孤峰頂上盤結草菴呵佛罵祖去在雪竇著語云雪上加霜復頌云一勘破二勘破雪上加霜曾險墮飛騎將軍入虜庭再得完全能幾個急走過不放過孤峯頂上草裏坐咄圜悟勤云雪竇道勘破且道是勘破德山為復勘破溈山妙喜曰二尊宿恁麼相見每人失却一隻眼小參示眾曰今夜不答話問話者三十棒時有僧出禮拜師便打僧曰某甲話也未問和尚因甚麼打某甲師曰汝是甚麼處人曰新羅人師曰未跨船舷好與三十棒圓明密云大小德山龍頭蛇尾法眼云大小德山話作兩橛圜悟勤云雖則直截單提各能扶竪德山要且只扶得末後句未扶得最初句在且作麼生是德山最初句大鵬欲展摩霄翅誰顧崩騰六合雲又云若作兩橛會且得沒交涉便作龍頭蛇尾會且得沒交涉既不恁麼會畢竟作麼生且道二老宿為甚麼却如此拈諸人試著眼看雪竇顯云此二老宿雖善裁長補短捨重從輕要見德山老漢亦未可在何故殊不知德山握閫外之威權有當斷不斷不招其亂底劍諸人要識新羅僧麼只是撞著露柱底瞎漢圜悟勤又云雪竇道新羅僧便是撞著露柱底瞎漢甚麼處是這僧瞎處人多情解道等他德山道你是甚麼處人當時便以坐具劈面摵癡人若如此德山便放你也且道畢竟甚麼處是這僧瞎處師便打玄覺云叢林中喚作膈下語且從祇如德山道問話者三十棒意作麼生大愚芝云時人盡道德山作家用得好若與麼會還曾夢見麼大愚道德山被這僧一推直得瓦解氷消雖然如是今日覓這一個尊宿也大難得示眾道得也三十棒道不得也三十棒臨濟聞得謂洛浦曰汝去問他道得為甚麼也三十棒待伊打汝接住棒送一送看伊作麼生浦如教而問師便打浦接住送一送師便歸方丈浦回舉似臨濟濟曰我從來疑著這漢雖然如是你還識德山麼浦擬議濟便打臨濟侍立次師曰困濟曰老漢䆿語作麼師便打濟掀倒禪牀師便休雪竇云二員作者具啐同時眼有啐同時用雪竇擬向猛虎口中奪鹿飢鷹爪下分兔敢謂臨濟德山二俱瞎漢有人辨得天下橫行妙喜曰你看他了事漢等閒驀路相逢自然各各有出身之路後來雲峯悅禪師拈云此二員作家一拶一捺略露風規大似把手上高山雖然如是未免旁觀者醜且道誰是旁觀者良久喝一喝據妙喜所見雲峯亦未免和泥合水好與這兩個老漢一狀領過一坑埋却且道過在甚麼處龍牙問學人仗鏌釾劒擬取師頭時如何師引頸近前曰㘞牙曰頭落也師呵呵大笑牙後到洞山舉前話山曰德山道甚麼牙曰德山無語洞曰莫道無語且將德山落底頭呈似老僧看牙方省便懺謝有僧舉似師師曰洞山老人不識好惡這漢死來多少時救得有甚麼用處有僧相看乃近前作相撲勢師曰與麼無禮合喫山僧手裏棒僧拂袖便行師曰饒汝如是也祇得一半僧轉身便喝師曰須是我打你始得曰諸方有明眼人在師曰天然有眼僧擘開眼曰猫便出師曰黃河三千年一度清師令侍者喚義存存上來師曰我自喚義存汝又來作甚麼存無對雪峯問從上宗乘學人還有分也無師打一棒曰道甚麼曰不會至明日請益師曰我宗無語句實無一法與人峯因此有省巖頭聞之曰德山老人一條眷梁骨硬似鐵抝不折雖然如此於唱教門中猶較些子保福問招慶祇如巖頭出世有何言教過於德山便恁麼道慶云汝不見巖頭道如人學射久久方中福云中後如何慶云展闍黎莫不識痛癢福云和尚今日非唯舉話慶云展闍黎是甚麼心行明招云大小招慶錯下名言僧參師問維那今日幾人新到曰八人師曰喚來一時生按著上堂及盡知也直得三世諸佛口挂壁上猶有一人呵呵大笑若識此人參學事畢或作德山密語投子青云德山大似藏盡楚天月猶存漢地星上堂若也於己無事則勿妄求妄求而得亦非得也汝但無事於心無心於事則虗而靈空而妙若毛端許言之本末者皆為自欺何故毫𨤲繫念三塗業因瞥爾情生萬劫羈鎖聖凡名號盡是虗聲殊相劣形皆為幻色汝欲求之得無累乎及其厭之又成大患終為無益示眾云諸子從朝至暮有甚麼事莫要逞驢唇馬觜問德山老漢麼我且不怕你未審諸子有何疑慮近來末法時代多有鬼神羣隊傍家走言我是禪師未審學得多少禪道說似老漢來你諸方老禿奴教汝修行作佛傍家走成得幾個佛也你若無可學又走作甚麼若有學者你將取學得底來呈似老漢看一句不相當須喫痛棒始得你被他諸方老禿奴魔魅著便道我是修行人打硬作模作樣恰似得道底人面孔莫取次用心萬劫千生輪迴三界皆為有心何以故心生則種種法生若能一念不生則永脫生死不被生死纏縛要行即行要坐即坐更有甚麼事仁者我見你諸人到處發心向老禿奴會下學佛法荷負不惜身命皆被釘却諸子眼睛斷諸子命根三二百個婬女相似道我主化建立法幢為後人開眼目自救得麼仁者如此說修行你豈不聞道老胡經三大阿僧祇劫修行即今何在八十年後死去與你何別諸子莫狂勸你不如休歇去無事去你瞥起一念心便是魔家眷屬破戒俗人你見德山出世十個五個總擬聚頭來難問待教結舌無言你是僂儸兒今何不出來破布袋裏盛錐子不出頭是好手我要問你實底莫錯仁者波波地傍家走道我解禪解道點胸點肋稱楊稱鄭到這裏須盡吐却始得無事你但外不著聲色內無能所知解體無凡聖更學甚麼設學得百千妙義只是個喫瘡疣鬼總是精魅我這個虗空道有且不是有道無且不是無言凡不凡言聖不聖一切處安著他不得與你萬法為師這個老漢不敢謗他所以老胡吐出許多方便涕唾教你無事去莫向外求你更不肯欲得採集殊勝言句蘊在胸襟巧說言辭以舌頭取辦高著布裙貴圖人知道我是禪師要出頭處若作如此見解打那鬼骨臀入拔舌地獄有日在到處覓人道我是祖師門下客却被他問著本分事口似木𣔻便却與他說菩提涅槃真如解脫廣引三藏言教是禪是道誑他閭閻有甚麼交涉謗我先祖德山老漢見處即不然這裏佛也無法也無達磨是老臊胡十地菩薩是擔糞漢等妙二覺是破戒凡夫菩提涅槃是繫驢橛十二分教是鬼神簿拭瘡膿紙四果三賢初心十地是守古墓鬼自救得也無佛是老胡矢橛我先祖下至此會元載之雲門偃云讚佛讚祖須是德山老人始得仁者莫錯身被瘡疣衣學甚麼事飽喫飯了說真如涅槃皮下還有血麼須是個丈夫始得汝莫愛聖聖是空名向三界十方世間若有一塵一法可得與你執取生解保任貴重者盡落天魔外道是有學得底亦是依草附木精魅野狐諸子老漢此間無一法與你諸人作解會自己亦不會禪老漢亦不是善知識百無所解只是屙矢放尿乞食乞衣更有甚麼事德山老漢勸你不如本分去早休歇去莫學顛狂每人擔個死屍浩浩地去到處向老禿奴口裏愛他涕唾喫便道我是入三界修蘊積行長養聖胎願成佛果如斯等輩德山老漢見之似毒箭入心花針亂眼辜負先祖帶累我宗圖他道我是出家兒如此消他十方施主水也消不得莫筭道敢向他國王地上行父母不供甘旨豈為無事莫錯用心閻羅王徵你草鞋錢有日在穿你鼻孔著橛上償他宿債莫言老漢不道是你諸人大似有福遇著德山出世與你解去繩索脫却籠頭卸却背䭾作個好人去三界六道收攝你不得更無別法是個烜赫虗空無礙自在不是你莊嚴得底物從佛從祖皆傳此法而得出離一大藏教只是整理你今時人諸子莫向別處求覓乃至達磨小碧眼胡僧到此來也只是教你無事去教你莫造作著衣喫飯屙矢送尿更無生死可怖亦無涅槃可得無菩提可證只是尋常一個無事人第一莫拱手作禪師覓個出頭處巧言語魔魅後生欲得人喚作長老自己分上都沒交涉徒知心識浩浩地日夜揑怪不休稱楊稱鄭我是江西馬大師宗徒德山老漢且不是你羣隊人我見石頭和尚不識好惡老漢所以罵伊諸子你但莫著聲色名言句義境致機關道理善惡凡聖取捨攀緣染淨明暗有無諸念可中與麼得方是個無事人佛亦不如你祖亦不如你仁者莫走蹋汝脚板濶去別無禪道可學若有學得者即是二頭三首外道見解亦無神通變現可得汝道神通是聖諸天龍神五通神仙外道修羅亦有神通應可是佛也孤峰獨宿一食卯齋長坐不臥六時禮念疑他生死老胡有言諸行無常是生滅法若言入定凝神靜慮得者尼乾子等諸外道師亦入得八萬劫大定莫是佛否明知邪見精魅仁者老胡不是聖佛是老胡矢橛且要仁者辨取好惡莫著人我免被諸聖橛菩提橛解脫殊勝名言妙義沒溺繫縛汝何以故一念妄心不盡即是生死相續仁者時不待人莫因循過日時光可惜老漢不圖你田舍奴荷負若肯即信取若不肯每人有個矢鉢擔取去老漢亦不求你諸方大有老禿奴取一方處所說禪說道你急去學取抄取我此間終無一法與你諸人仁者問取學取以為知解老漢不能入拔舌地獄若有一塵一法示諸人說言有佛有法有三界可出者皆是野狐精魅諸仁者欲識得麼只是個虗空尚無纖塵可得處處清淨光明洞達表裏瑩徹無事無依無棲泊處有甚麼事老漢從生至死只是個老比丘雖在三界生而無垢染欲得出離何處去設有去處亦是籠檻魔得其便仁者莫用身心無可得只要一切時中莫用他聲色應是從前行履處一時放却頓脫羈鎖永離盖纏一念不生即前後際斷無思無念無一法可當情仁者作麼生擬下口嘴你多知解還曾識渠面孔麼出家兒乃至十地滿心菩薩覓他蹤跡不著所以諸天歡喜地神捧足十方諸佛讚嘆魔王啼哭何以故緣此虗空活鱍鱍地無根株無住處若到這裏眼光定動即沒交涉仁者莫求佛佛是大殺人賊賺多少人入婬魔坑莫求文殊普賢是田舍奴可惜許堂堂一個丈夫兒喫他毒藥便了擬作禪師面孔見神見鬼向後狂亂傍家走覓師婆打瓦卜去被無知老禿奴便即與卜道教你禮祖師鬼佛鬼菩提涅槃鬼是小婬女子不會便問如何是祖師西來意這老禿奴便打禪牀作境致竪拂子云好晴好雨好燈籠巧述言詞強生節目言有玄路鳥道展手若取如是說如將寶器貯於不淨如將人糞作栴檀香仁者彼既丈夫我亦爾怯弱於誰竟日就他諸方老禿奴口嘴接他涕唾喫了無慚無愧苦哉苦哉狂却子去因果分明水牯牛牽犂拽耙眼睛突出氣力不登大棒打你脊却佛衣食道我修行了也若不明大理饒你去佛肚裏過來只是個能行底矢橛不曾遇著好人便即認得六根門頭光影向口裏說取露布是隱言妙句光彩尖新爭奈你自家無分仁者是別人涕唾更有一輩三三兩兩聚頭商量甚麼處無事好經冬過夏快說禪道有知解會義理仁者總作如此見解覓便宜豈有如此道理入地獄有日在莫道不向諸子說到處菜不擇一莖柴不搬一束一朝福盡只是喫草去虗消信施濫稱參學更作禪師模樣無益於人自己分上十二時中行履處心常附物見人只欲妖媚掉尾子指東話西眼裏口邊果然不見只欲將相似語勘當解處老漢與你諸人何別郎君子莫取一期眼下口快喫他毒藥了似貪婬女人不持齋戒瞎禿奴羣羊僧顛却他人入地獄仁者莫取次看冊子尋句義覓勝負一一口何時休歇老漢相勸不是惡事切須自帶眼目辨取清濁是佛語是魔語莫受人惑所以殊勝名言皆是老胡一期方便施施切須休歇去莫倚一物領他言語作解會揀擇親疎浮虗詐偽記他閑言長語皆是比量仁者老漢只恐諸子墮坑落塹作薄福業事褫唇嘴得少為足向靜處立不肯進前自惑諸境亂走他人由巡萬法盖為不信虗空本來無事增減他不得你諸人好似老鵶身在虗空心在糞堆上只覓死物喫諸子莫道德山老漢不曾入叢林商量高聲罵取無人情不怕業只為諸子不守分馳騁四方傍他門戶恰似女姑鬼傳言送語依事作解心跡不忘自猶不立常負死屍擔枷帶鎖五百一千里來到德山面前八字立地如欠伊禪道相似和尚須為或說指示我老漢全體作用大棒鎧遮田舍奴罵賊矢孔面不識好惡到我這裏恰似遇澧州人煑魚羹爛臛一頓且圖你放下重擔去却枷鎖作個好人去還肯麼若肯即住不肯一任脫去珍重示眾有言時騎虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂師因疾僧問還有不病者也無師曰有曰如何是不病者師曰阿㖿阿㖿師復告眾曰捫空追響勞汝心神夢覺覺非竟有何事言訖安坐而化即唐咸通六年十二月三日也
