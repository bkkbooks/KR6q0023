body:
  text: 旁出法嗣僧那禪師姓馬氏少而神雋年二十一講禮易於東海聽者如市一遇二祖遂投出家自是手不執筆盡棄世典惟一衣一鉢一坐一食奉頭陀行後謂門人慧滿曰祖師心印非專苦行但助道耳若契本心發隨意真光之用則苦行如握土成金若惟務苦行而不明本心為憎愛所縛則苦行如黑月夜履於險道汝欲明本心者當審諦推察遇色遇聲未起覺觀時心何所之是無耶是有耶既不墮有無處所則心珠獨朗常照世間而無一塵許間隔未甞有一剎那頃斷續之相滿後亦奉頭陀行惟蓄二鍼冬則乞補夏則捨之心無怖畏睡而不夢常行乞食所至伽藍則破柴製履住無再宿貞觀十六年於洛陽善會寺側宿古墓中遇大雪旦入寺見曇曠法師曠怪所從來滿曰法有來耶曠遣尋來處四邊雪積五尺許曠曰不可測也甞示人曰諸佛說心令知心相虗妄今乃重加心相深違佛意又增論議殊乖大理後於陶冶中無疾坐化向居士幽栖林野木食磵飲北齊天保初聞二祖盛化乃致書曰影由形起響逐聲來弄影勞形不識形為影本揚聲止響不知聲是響根除煩惱而趣涅槃喻去形而覓影離眾生而求佛果喻默聲而求響故知迷悟一塗愚智非別無名作名因其名則是非生矣無理作理因其理則爭論起矣幻化非真誰是誰非虗妄無實何空何有將知得無所得失無所失未及造謁聊申此意伏望答之二祖回示曰備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法即皆如愍此二見之徒輩申辭措筆作斯書觀身與佛不差別何須更覓彼無餘居士捧披祖偈乃申禮覲密承印記牛頭山法融禪師年十九學通經史尋閱大部般若曉達真空忽一日歎曰儒學世典非究竟法般若真觀出世舟航遂隱茅山投師落髮後入牛頭山幽棲寺北巖之石室有百鳥銜花之異唐貞觀中四祖遙觀氣象知彼山有異人乃躬自尋訪問寺僧此間有道人否曰出家兒那個不是道人祖曰阿那個是道人僧無對別僧曰此去山中十里許有一嬾融見人不起亦不合掌莫是道人麼祖遂入山見師端坐自若曾無所顧祖問曰在此作甚麼師曰觀心祖曰觀是何人心是何物師無對便起作禮曰大德高棲何所祖曰貧道不決所止或東或西師曰還識道信禪師否祖曰何以問他師曰嚮德滋久冀一禮謁祖曰道信禪師貧道是也師曰因何降此祖曰特來相訪莫更有宴息之處否師指後面曰別有小菴遂引祖至菴所遶菴惟見虎狼之類祖乃舉兩手作怖勢師曰猶有這個在祖曰這個是甚麼師無語少選祖却於師宴坐石上書一佛字師覩之竦然祖曰猶有這個在師未曉乃稽首請說真要祖曰夫百千法門同歸方寸河沙妙德總在心源一切戒門定門慧門神通變化悉自具足不離汝心一切煩惱業障本來空寂一切因果皆如夢幻無三界可出無菩提可求人與非人性相平等大道虗曠絕思絕慮如是之法汝今已得更無闕少與佛何殊更無別法汝但任心自在莫作觀行亦莫澄心莫起貪嗔莫懷愁慮蕩蕩無礙任意縱橫不作諸善不作諸惡行住坐臥觸目遇緣總是佛之妙用快樂無憂故名為佛師曰心既具足何者是佛何者是心祖曰非心不問佛問佛非不心師曰既不許作觀行於境起時心如何對治祖曰境緣無好醜好醜起於心心若不強名妄情從何起妄情既不起真心任徧知汝但隨心自在無復對治即名常住法身無有變異吾受璨大師頓教法門今付於汝汝今諦受吾言只住此山向後當有五人達者紹汝玄化僧問南泉牛頭未見四祖時為甚百鳥銜花供養泉云只為步步踏佛階梯僧云見後為甚麼不來泉云直饒不來猶較王老師一線道雲門舉云南泉只解步步登高不解從空放下僧問如何是步步登高門云香積世界如何是從空放下門云填溝塞壑僧問老宿牛頭未見四祖時如何曰如條貫葉云見後如何曰秋夜紛紛僧問趙州牛頭未見四祖時如何州曰飽柴飽水曰見後如何曰飽柴飽水一尊宿答前兩問皆云賊不打貧兒家住後法席之盛擬黃梅唐永徽中徒眾乏糧師往丹陽緣化去山八十里躬負米一石八斗朝往暮還供僧三百二時不闕三年邑宰蕭元善請於建初寺講大般若經聽者雲集至滅靜品地為之震動博陵王問曰境緣色發時不言緣色起云何得知緣乃欲息其起師曰境色初發時色境二性空本無知緣者心量與知同照本發非發爾時起自息抱暗生覺緣心時緣不逐至如未生前色心非養育從空本無念想受言念生起發未曾起豈用佛教令問曰閉目不見色境慮乃便多色既不關心境從何處發師曰閉目不見色內心動慮多幻識假成用起名終不過知色不關心心亦不關人隨行有相轉鳥去空中真問曰境發無處所緣覺了知生境謝覺還轉覺乃變為境若以心曳心還為覺所覺從之隨隨去不離生滅際師曰色心前後中實無緣起境一念自疑忘誰能計動靜此知自無知知知緣不會當自檢本形何須求域外前境不變謝後念不來今求月執玄影討跡逐飛禽欲知心本性還如視夢裏譬之六月水處處皆相似避空終不脫求空復不成借問鏡中像心從何處生問曰恰恰用心時若為安隱好師曰恰恰用心時恰恰無心用曲談名相勞直說無繁重無心恰恰用常用恰恰無今說無心處不與有心殊問曰智者引妙言與心相會當言與心路別合則萬倍乖師曰方便說妙言破病大乘道非關本性談還從空化造無念為真常終當絕心路離念性不動生滅無乖誤谷響既有聲鏡像能回顧問曰行者體境有因覺知境亡前覺及後覺并境有三心師曰境用非體覺覺罷不應思因覺知境亡覺時境不起前覺及後覺并境有三遲問曰住定俱不轉將為正三昧諸業不能牽不知細無明徐徐躡其後師曰復聞別有人虗執起心量三中事不成不轉還虗妄心為正受縛為之淨業障心塵萬分一不了說無明細細習因起徐徐名相生風來波浪轉欲靜水還平更欲前塗說恐畏後心驚無念大獸吼性空下霜雹星散穢草摧縱橫飛鳥落五道定紛綸四魔不前却既如猛火燎還如利劒斫問曰賴覺知萬法萬法本來然若假照用心只得照用心不應心裏事師曰賴覺知萬法萬法終無賴若假照用心應不在心外問曰隨隨無揀擇明心不現前復慮心闇昧在心用功行智障復難除師曰有此不可有尋此不可尋無揀即真擇得闇出明心慮者心冥味存心託功行何五燈作可論智障難至佛方為病問曰折中消息間實亦難安怗自非用行人此難終難見師曰折中欲消息消息非難易先觀心處心次推智中智第三照推者第四通無記第五解脫名第六等真偽第七知法本第八慈無為第九徧空陰第十雲雨被最盡彼無覺無明生本智鏡像現三業幻人化四衢不住空邊盡當照有中無不出空有內未將空有俱號之名折中折中非言說安怗無處安用行何能決問曰別有一種人善解空無相口言定亂一復道有中無同證用常寂知覺寂常用用心會真理復言用無用智慧方便多言亂與理合如如理自如不由識心會既知心會非心心復相泯如是難知法永劫不能知同此用心人法所不能化師曰別有證空者還如前偈論行空守寂滅識見暫時翻會真是心量終知未了原又說息心用多智疑相似良由性不明求空具勞已永劫住幽識抱相多不知放光便動地於彼欲何為問曰前件看心者復有羅縠難師曰看心有羅縠幻心何待看況無幻心者從容下口難問曰久有大基業心路差互間得覺微細障即達於真際自非善巧師無能決此理仰惟我大師當為開要門引導用心者不令失正道師曰法性本基業夢境成差互實相微細身色心常不悟忽逢混沌士哀怨愍羣生託疑廣設問抱理內常明生死幽徑徹毀譽心不驚野老顯分答法相媿來儀蒙發羣生藥還如色性為顯慶元年邑宰蕭元善請住建初師辭不克遂命入室上首智巖付囑法印將下山謂眾曰吾不復踐此山矣時鳥獸哀號踰月不止菴前有四大桐樹仲夏之月忽然凋落明年正月二十三日不疾而逝窆於雞籠山牛頭山智巖禪師曲阿華氏子弱冠智勇過人隋大業中為郎將常以弓挂濾水囊隨所至自汲用累立戰功年四十遂乞出家入舒州皖公山從寶月禪師一日宴坐覩異僧身長丈餘謂之曰卿八十生出家宜加精進言訖不見甞在谷中入定山水暴漲師怡然不動其水自退有獵者遇之遂改過修善復有昔同從軍者二人聞師隱遯共入山尋之既見謂曰郎將狂耶何為住此師曰我狂欲醒君狂正發夫嗜色淫聲貪榮寵流轉生死何由自出二人感歎而去師後謁融禪師發明大事甞謂師曰吾受信大師真訣所得都亡設有一法勝過涅槃吾說亦如夢幻夫一塵飛而翳天一芥墮而覆地汝今已過此見我復何云牛頭山智威禪師得法於法持禪師法持巖公法孫也師甞有偈示門人慧忠曰莫繫念念成生死河輪迴六趣海無見出長波忠答曰念想由來幻性自無終始若得此中意長波當自止師又示偈曰余本性虗無緣妄生人我如何息妄情還歸空處坐忠答曰虗無是實體人我何所存妄情不須息即汎般若船師知其了悟遂付法初忠纔見師師即曰山主來也及忠甞出參訪師院中凌霄藤盛夏盡萎左右欲伐之師曰不可忠還則復茂矣忠還果然既授法出居延祚寺奉法益嚴生平一衲不易器用惟一鐺甞有供僧穀兩廩盜者窺伺虎為守之縣令張遜至山謁忠問有阿弟子曰有三五人遜曰可得見乎忠敲禪牀三虎哮吼而出遜驚怖而退其神跡頗多不具載有安心偈曰人法雙淨善惡兩忘直心真實菩提道場大曆四年六月十五日集僧布薩訖命侍者淨髮浴身至夜有瑞雲覆其精舍天樂四聞詰旦怡然坐化風雨遽作震折林木復有白虹貫於巖壑五年春茶毗獲舍利不可勝計安國玄挺禪師初參威禪師侍立次有講華嚴僧問真性緣起其義云何威良久師遽召曰大德正興一念問時是真性中緣起其僧言下大悟妙喜云一念未興時不可無緣起也或云一念未興喚甚麼作緣起我也只要汝恁麼道天柱崇慧禪師僧問達磨未來此土時還有佛法也無師曰未來且置即今事作麼生曰某甲不會乞師指示師曰萬古長空一朝風月僧無語師復曰闍黎會麼曰不會師曰自己分上作麼生干他達磨來與未來作麼他家來大似賣卜漢見汝不會為汝錐破卦文纔生吉凶盡在汝分上一切自看僧曰如何是解卜底人師曰汝纔出門時便不中也問亡僧遷化向甚麼處去也師曰灊嶽峰高長積翠舒江明月色光輝徑山道欽禪師馬祖令人送書到書中作一圓相師發緘於圓相中著一點却封回忠國師云欽師猶被馬師惑徑山杲云馬師仲冬嚴寒欽師孟夏漸熱雖然寒熱不同彼此不失時節忠國師因甚却道欽師猶被馬師惑還委悉麼無風荷葉動決定有魚行雪竇云徑山被惑且置若將呈似國師別作個甚麼伎倆免被惑去有老宿云當時坐却便休亦有道但與劃破若與麼只是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知只這馬師當時畫出早是自惑了也師在唐代宗宮中見代宗來起立宗曰師何以起師曰檀越何得向四威儀中見貧道妙喜云不向四威儀中又如何見國一崔趙公問弟子出家得否師曰出家乃大丈夫之事非將相之所能為崔於是有省天台山雲居智禪師甞有華嚴院僧繼宗問見性成佛其義云何師曰清淨之性本來湛然無有動搖不屬有無淨穢長短取捨體自翛然如是明見乃名見性性即佛佛即性故曰見性成佛曰性既清淨不屬有無因何有見師曰見無所見曰既無所見何更有見師曰見處亦無曰如是見時是誰之見師曰無有能見者曰究竟其理如何師曰汝知否妄計為有即有能所乃得名迷隨見生解便墮生死明見之人即不然終日見未甞見求名處體相不可得能所俱絕名為見性曰此性徧一切處否師曰無處不徧曰凡夫具否師曰上言無處不徧豈凡夫而不具乎曰因何諸佛菩薩不被生死所拘而凡夫獨縈此苦何曾得徧師曰凡夫於清淨性中計有能所即墮生死諸佛大士善知清淨性中不屬有無即能所不立曰若如是說即有能了不了人師曰了尚不可得豈有能了人乎曰至理如何師曰我以要言之汝即應念清淨性中無有凡聖亦無了不了人凡之與聖二俱是名若隨名生解即墮生死若知假名不實即無有當名者又曰此是極究竟處若云我能了彼不能了即是大病見有淨穢凡聖亦是大病作無凡聖解又屬撥無因果見有清淨性可栖止亦大病作不栖止解亦大病然清淨性中雖無動搖且不壞方便應用及興慈運悲如是興運之處即全清淨之性可謂見性成佛矣繼宗踊躍禮謝而退鳥窠道林禪師見秦望山長松盤屈如盖遂栖止其上故謂之鳥窠禪師復有鵲巢於其側自然馴狎亦目為鵲巢和尚有侍者會通一日欲辭去師問曰汝今何往對曰會通為法出家和尚不垂慈誨今往諸方學佛法去師曰若是佛法吾此間亦有少許曰如何是和尚佛法師於身上拈起布毛吹之通遂領悟玄旨大溈秀云可惜這僧認他口頭聲色以當平生不知自己光明盖天盖地妙喜曰恁麼批判也未夢見鳥窠在泐潭準和尚因侍者告辭書偈授之云鳥窠吹布毛老婆為侍者今古道雖同寶峰不然也二月三月時和風滿天下在處百花開遠近山如畵岐路春禽鳴高巖春水瀉頭頭三昧門虗明周大野好個真消息書送汝歸舍衲僧末後句噓是何言歟通後居招賢寺茂齡為六宮使唐德宗甚眷遇春時見昭陽宮華卉敷榮方翫賞間忽聞空中有聲曰虗幻之相開謝不停能壞善根仁者安可嗜之通遂感動哀懇德宗求出家篤留不可遂賜歸因韜光法師而詣林公不納通乞韜光堅白曰通七歲蔬食十一受五戒今年二十有二而志不緣世法竝未甞娶今特以欲出家而休官向願甚確乞師拯度林公乃與披剃受具通居常卯齋晝夜精進誦大乘經而習安般三昧未幾得法後因武宗廢教入山深遯莫知所如俗姓吳氏名元卿杭州人初師自徑山歸至孤山永福寺有辟支佛塔時道俗共為法會師振錫而入韜光法師問曰此之法會何以作聲師曰無聲誰知是會白居易守杭時入山謁師問曰禪師住處甚危險師曰太守危險尤甚白曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作眾善奉行白曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十老人行不得白作禮而退耆域者天竺神僧也晉惠末至洛陽神通顯著有高足僧竺法行請域說法域曰眾集乃可法行乃集眾域陞座曰守口攝身意慎勿犯諸惡修行一切善如是得度世言已便默法行復請曰願上人為授所未聞如斯偈義八歲童子亦已諳誦域笑曰八歲雖誦百歲不行誦之何益人皆知敬得道者不知行之自得道悲夫吾言雖少行者益多也長慶四年二月十日告侍者曰吾今報盡言訖坐亡有云名圓修者或師諡耶嵩嶽慧安國師得法黃梅徧歷名勝至嵩少云是吾終焉之地也自爾禪者輻輳有坦然懷讓二僧來參問曰如何是祖師西來意師曰何不問自己意曰如何是自己意師曰當觀密作用曰如何是密作用師以目開合示之然於言下知歸讓乃即謁曹溪初隋煬帝甞徵師不赴及唐高宗徵師亦不赴武后時以師禮迎師至輦下后甞問師甲子多少師曰不記后曰何不記耶師曰生死之身其若循環環無起盡焉用記為況此心流注中間無間見漚起滅者乃妄想耳從初識至動相滅時亦只如此何年月可記乎后稽顙信受中宗即位益加欽禮神龍三年辭歸嵩嶽三月三日囑門人曰吾死將尸向林中待野火焚之俄爾萬回公來見師猖狂握手言論旁侍傾耳都不體會至八日閉戶偃身而寂春秋一百二十八門人遵旨舁置林中果野火自然闍維得舍利八十粒先天二年建浮圖供奉壽州道樹禪師得法於北宗秀卜壽州三峰山結茅而居常有野人服色素朴言談詭異時忽化作佛及菩薩羅漢天仙等形或放神光或呈聲響師之學徒覩之皆不能測如此涉十年後寂無形影師告眾曰野人作多色伎倆眩惑於人只消老僧不見不聞伊伎倆有窮吾不見不聞無盡嵩嶽破竈墮和尚不稱名氏言行叵測隱居嵩嶽山塢有廟甚靈殿中惟安一竈遠近祭祀不輟烹宰物命甚多師一日領侍僧入廟以杖敲竈三下曰咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須臾有一人青衣峩冠設拜師前師曰是甚麼人曰我本此廟竈神久受業報今日蒙師說無生法得脫此處生在天中特來致謝師曰是汝本有之性非吾強言神再禮而沒少選侍僧問曰某等久侍和尚不蒙示誨竈神得甚麼徑旨便得生天師曰我只向伊道是泥瓦合成別也無道理為伊侍僧無言師曰會麼僧曰不會師曰本有之性為甚麼不會侍僧等乃禮拜師曰破也破也墮也墮也後義豐禪師舉似安國師安嘆曰此子會盡物我一如可謂如朗月處空無不見者難搆伊語脉豐問曰未審甚麼人搆得他語脉安曰不知者僧問物物無形時如何師曰禮即唯汝非我不禮即唯我非汝其僧乃禮謝師曰本有之物物非物也所以道心能轉物即同如來嵩嶽元珪禪師伊闕人姓李氏得法安國師隱於嶽之龐塢一日有神人率羣從謁師師覩其貌奇偉非常乃問曰善來仁者胡為而至彼曰師寧識我耶師曰吾觀佛與眾生等吾一目之豈分別耶彼曰吾此嶽神也能生死於人師安得一目我哉師曰吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及汝吾則不生不滅也汝尚不能如是又安能生死吾耶神稽首曰我亦聰明正直於餘神詎知師有廣大之智辯乎願授以正戒令我度世師曰汝既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也我聞茫昧止求師戒我身為門弟子師即為張座秉罏正几曰付汝五戒若能奉持即應曰能不能即曰否曰謹受教師曰汝能不婬乎曰我亦娶也師曰非謂此也謂無羅欲也曰能師曰汝能不盜乎曰何乏我也焉有盜取哉師曰非謂此也謂嚮而福淫不供而禍善也曰能師曰汝能不殺乎曰實司其柄焉曰不殺師曰非謂此也謂有濫誤疑混也曰能師曰汝能不妄乎曰我正直焉有妄乎師曰非謂此也謂先後不合天心也曰能師曰汝不遭酒敗乎曰能師曰如上是為佛戒也又言以有心奉持而無心拘執以有心為物而無心想身能如是則先天地生不為精後天地死不為老終日變化而不為動畢盡寂默而不為休信此則雖娶非妻也雖嚮非取也雖柄非權也雖作非故也雖醉非惽也若能無心於萬物則羅欲不為婬福淫禍善不為盜濫誤疑混不為殺先後違天不為妄惽荒顛倒不為醉是謂無心也無心則無戒無戒則無心無佛無眾生無汝及無我孰為戒哉神曰我神通亞佛師曰汝神通十句五能五不能佛則十句七能三不能神疎然避席跪啟曰可得聞乎師曰汝能戾上帝東天行而西七曜乎曰不能師曰汝能奪地祇融五嶽而結四海乎曰不能師曰是謂五不能也佛能空一切相成萬法智而不能即滅定業佛能知羣有性窮億劫事而不能化導無緣佛能度無量有情而不能盡眾生界是為三不能也定業亦不牢久無緣亦是一期眾生界本無增減亘傳燈作且無一人能主其傳燈作有法有法無主是謂無法無法無主是謂無心如我解佛亦無神通也但能以無心通達一切法爾神曰我誠淺昧未聞空義師所授戒我當奉行今願報慈德效我所能師曰我觀身無物觀法無常塊然更有何欲耶神曰師必命我為世間事展我小神功使已發心初發心未發心不信心必信心五等人目我神踪知有佛有神有能有不能有自然有非自然者師曰無為是無為是神曰佛亦使神護法師寧隳叛佛耶願隨意垂誨師不得已而言曰東巖寺之障莽然無樹北岫有之而背非屏擁汝能移北樹於東嶺乎神曰已聞命矣然昬夜必有喧動願師無駭即作禮而去師門送而目觀之見儀衛逶迤如王者之狀其夕果有暴風吼雷棟宇搖蕩師曰神言徵矣眾可無怖詰日和霽則北巖松栝盡移東嶺森然行植師謂其徒曰毋令外知人將妖我開元四年丙辰歲囑門人曰吾始居寺東嶺吾滅汝必置吾骸於彼言訖若委蛻焉終南山惟政禪師得法於普寂結廬太乙唐文宗嗜蛤蜊海民供甚勞一日御饌中有擘不張者帝以其異即焚香禱之乃開見菩薩形儀梵相具足遂貯以金粟檀合賜興善寺令僧眾瞻禮問羣臣曰斯何祥也或奏師可備顧問乃召師問其事師曰臣聞物無虗應此乃啟陛下之信心耳故契經云應以此身得度者即現此身而為說法帝曰菩薩身已現第未聞說法師曰陛下覩此為常耶非常耶信耶非信耶帝曰希有之事朕深信焉師曰陛下已聞說法竟帝大悅詔天下寺院各立觀音像留師內道場師累乞歸乃詔住聖壽寺武宗甫即位師忽入終南隱居人問何故曰吾避仇矣後闍維収舍利四十九粒而建塔焉嵩山峻極和尚僧問如何是修善行人師曰擔枷帶鎻曰如何是作惡行人師曰修禪入定曰某甲淺機請師直指師曰汝問我惡惡不從善汝問我善善不從惡僧良久師曰會麼曰不會師曰惡人無善念善人無惡心所以道善惡如浮雲俱無起滅處僧於言下大悟後破竈墮聞舉乃曰此子會盡諸法無生妙喜曰爭奈在髑髏前作妄想何司空山本淨禪師絳州人張氏子幼歲披緇於曹溪受記住司空山後因唐玄宗中使楊光庭採常春藤至山見師議論超遠還奏闕庭詔至內道場與兩街名僧碩學共揚佛理有遠禪師者問曰禪師所見以何為道師曰無心是道遠曰道因心有何得言無心是道師曰道本無名因心名道心名若有道不虗然窮心既無道憑何立二俱虗妄總是假名遠曰禪師見有身心是道已否師曰山僧身心本來是道遠曰適言無心是道今又言身心本來是道豈不相違師曰無心是道心泯道無心道一如故言無心是道身心本來是道道亦本是身心身心本既是空道亦窮源無有遠曰觀禪師形質甚小却會此理師曰大德只見山僧相不見山僧無相見相者是大德所見經云凡所有相皆是虗妄若見諸相非相即見其道若以相為實窮劫不能見道遠曰今請禪師於相上說於無相師曰淨名經云四大無主身亦無我無我所見與道相應大德若以四大有主是我若有我見窮劫不可會道也遠聞語失色師有偈曰四大無主復如水遇曲逢直無彼此淨穢兩處不生心壅決何曾有二意觸境但似水無心在世縱橫有何事志明禪師問若言無心是道瓦礫無心亦應是道又曰身心本來是道四生十類皆有身心亦應是道師曰大德若作見聞覺知解會與道懸殊即是求見聞覺知之者非是求道之人經云無眼耳鼻舌身意六根尚無見聞覺知憑何而立窮本不有何處存心焉得不同草木瓦礫明杜口師有偈曰見聞覺知無障礙聲香味觸常三昧如鳥空中只麼飛無取無捨無憎愛若會應處本無心始得名為觀自在真禪師問道既無心佛有心否佛之與道是一是二師曰不一不二曰佛度眾生為有心故道不度人為無心故一度一不度何得無二師曰若言佛度眾生道無度者此是大德妄生二見如山僧即不然佛是虗名道亦妄立二俱不實總是假名一假之中如何分二曰佛之與道從是假名當立名時是誰為立若有立者何得言無師曰佛之與道因心而立推窮立心心亦是無心既是無即悟二俱不實知如夢幻即悟本空強立佛道二名此是二乘人見解師因說無修無作偈曰見道方修道不見復何修道性如虗空虗空何所修徧觀修道者撥火覓浮漚但看弄傀儡線斷一時休法空禪師問佛之與道俱是假名十二分教亦應不實何以從前尊宿皆言修道師曰大德錯會經意道本無修大德強修道本無作大德強作道本無事強生多事道本無知於中強知如此見解與道相違從前尊宿不應如是自是大德不會請思之師有偈曰道體本無修不修自合道若起修道心此人不會道棄却一真性却入閙浩浩忽逢修道人第一莫向道安禪師問道既假名佛云妄立十二分教亦是接物度生一切是妄以何為真師曰為有妄故將真對妄推窮妄性本空真亦何曾有故故知真妄總是假名二事對治都無實體窮其根本一切皆空曰既言一切是妄妄亦同真真妄無殊復是何物師曰若言何物何物亦妄經云無相似無比況言語道斷如鳥飛空安慙伏師有偈曰推真真無相窮妄妄無形返觀推窮心知心亦假名會道亦如此到頭亦只寧達性禪師問禪師至妙至微真空雙泯佛道兩忘修行性空名相不實世界如幻一切假名作此解時不可斷絕眾生善惡二根師曰善惡二根皆因心有窮心若有根亦非虗推心既無根因何立經云善不善法從心化生善惡業緣本無有實師有偈曰善既從心生惡豈離心有善惡是外緣於心實不有捨惡送何處取善令誰守傷嗟二見人攀緣兩頭走若悟本無心始悔從前咎又有近臣問曰此身從何而來百年之後復歸何處師曰如人夢時從何而來睡覺時從何而去曰夢時不可言無既覺不可言有雖有有無來往無所師曰貧道此身亦如其夢示偈曰視生如在夢夢裏實是閙忽覺萬事休還同睡時悟智者會悟夢迷人信夢閙會夢如兩般一悟無別悟富貴與貧賤更無分別路上元二年歸寂諡大曉禪師南陽慧忠國師諸暨冉氏子得法曹溪居南陽白崖山黨子谷四十餘年不下山道行升聞肅宗以師禮迎居千福寺西天大耳三藏到京云得他心通帝命師試驗三藏纔見師便禮拜立於右邊師問曰汝得他心通那對曰不敢師曰汝道老僧即今在甚麼處曰和尚是一國之師何得却去西川看競渡良久再問汝道老僧即今在甚麼處曰和尚是一國之師何得却在天津橋上看弄胡孫師良久復問汝道老僧只今在甚麼處藏罔測師叱曰這野狐精他心通在甚麼處藏無對後有僧問玄沙沙曰汝道前兩度還見麼僧問趙州大耳三藏第三度不見國師未審國師在甚麼處州云在三藏鼻孔上僧後問玄沙既在鼻孔上為甚麼不見沙云只為太近白雲端云國師若在三藏鼻孔上有甚難見殊不知國師在三藏眼睛上一日喚侍者者應諾如是三召三應師曰將謂吾孤負汝却是汝孤負吾妙喜云叢林中喚作國師三喚侍者話自此便有一絡索惟雪竇見透古人骨髓云國師三喚侍者點即不到喜云灼然侍者三應到即不點喜云却不恁麼將謂吾孤負汝誰知汝孤負吾謾雪竇不得喜云誰道復召大眾云好個謾雪竇不得雖然如是雪竇亦謾妙喜不得妙喜亦謾諸人不得諸人亦謾露柱不得玄沙云侍者却會雪竇云停囚長智喜云兩彩一賽雲門道作麼生是國師孤負侍者處會得也是無端雪竇云元來不會喜云雪峯道底雲門又云作麼生是侍者孤負國師處粉骨碎身未報得雪竇云無端無端喜云垛生招箭法眼云且去別時來雪竇云謾我不得喜云却是法眼會興化云一盲引眾盲雪竇云端的瞎喜云親言出親口玄覺徵問僧云甚處是侍者會處僧云若不會爭解恁麼應覺云汝少會在又云若於此見得去便識玄沙喜云慚惶殺人翠巖芝云國師侍者總欠會在喜云猶較些子投子云抑逼人作麼雪竇云躲根漢喜云理長即就復云惟有趙州多口阿師下得個注脚令人疑著僧問國師三喚侍者意旨如何州云如人暗中書字字雖不成文彩已彰雪竇便喝喜云且道這一喝在國師侍者分上在趙州分上隨後喝一喝復云若不是命根五色索子斷如何透得這裏過雪竇云若有人問雪竇雪竇便打也要諸方檢點喜云作賊人心虗雪竇復有一頌云師資會遇意非輕喜云此語有兩負門無事相將草裏行喜云普州人送賊負汝負吾人莫問喜云放待冷來看任從天下競頭爭喜云只今休去便休去若覓了時無了時復云你若求玄妙解會只管理會國師三喚侍者話那裏是國師孤負侍者處那裏是侍者孤負國師處有甚麼交涉鵞王擇乳素非鴨類遮個便是國師用劒刃上事又云國師還見侍者麼侍者還見國師麼南泉到參師問甚麼處來曰江西來師曰還將得馬師真來否曰只這是師曰背後底聻南泉便休長慶云大似不知保福云幾不到和尚此間雲居錫云此二尊宿盡扶背後只如南泉休去為當扶面前扶背後肅宗問如何是十身調御師乃起立曰會麼帝曰不會師曰與老僧過淨瓶來又曰如何是無諍三昧師曰檀越蹋毗盧頂上行帝曰此意如何師曰莫認自己清淨法身妙喜曰諸人要見忠國師麼只在你眼睛裏開眼也蹉過合眼也蹉過既在眼睛裏為甚麼却蹉過妙喜恁麼道也蹉過不少肅宗到師指石師子云陛下這石師子奇特下取一轉語帝曰朕下語不得請師下語師曰山僧罪過後躭源問皇帝還會麼師曰皇帝會且致你作麼生會玄沙備云大小國師被侍者勘破肅宗請看戲師曰檀越有甚心情看戲妙喜舉云法雲圓通禪師曰且道國師在甚處著到妙喜敢問諸人且道圓通禪師在甚處著到於斯見得三老相去不遠師因丹霞來訪值睡次乃問侍者躭源云國師在否者曰在即在祇是不見客霞云太深遠生者云莫道上座佛眼也覰不見霞云龍生龍子鳳生鳳兒師睡起侍者舉似師師打二十棒趁出丹霞聞云不謬為南陽國師天童華云侍者喫棒出院千載一時然歸宗豈免眼熱丹霞雖是好手爭奈落在國師網子裏諸人還辨得麼苟或未然猶握金鞭問歸客夜深誰共御街行徑山䇿云國師幸自高眠侍者播揚家醜不因多口丹霞爭見國師哮吼敢問大眾國師既在為甚麼不見客向這裏見得破非唯知躭源落節亦見自己有出身之路雖然如是莫將閒學解埋沒祖師心師問紫璘供奉甚處來云城南來師云城南草作何色云作黃色師乃問童子城南草作何色云作黃色師云只這童子亦可簾前賜紫對御談玄妙喜云你道國師說老婆禪拖泥帶水得麼師問紫璘供奉佛是甚麼義曰覺義師曰佛曾迷否曰不曾迷師曰用覺作麼妙喜曰若不入水爭見長人供奉註思益經師曰凡註經須會佛義始得曰若不會佛意爭解註經師令侍者盛一椀水中著七粒米椀面安一隻箸問奉是甚麼義奉無語師曰老僧意尚不會何況佛意溈山果云供奉先鋒有作殿後無功當時纔見國師問是甚麼義只對云草本不勞拈出踢倒便行直饒國師通身是口也無說處師問禪客從何方來禪客曰南方來師曰南方有何知識曰知識頗多師曰如何示人曰彼方知識直下示學人即心是佛佛是覺義汝今悉具見聞覺知之性此性善能揚眉瞬目去來運用徧於身中挃頭頭知挃脚脚知故名正徧知離此之外更無別佛此身即有生滅心性無始以來未曾生滅身生滅者如龍換骨蛇蛻皮人出故宅即身是無常其性常也南方所說大約如此師曰若然者與彼先尼外道無有差別彼云我此身中有一神性此性能知痛癢身壞之時神則出去如舍被燒舍主出去舍即無常舍主常矣審如此者邪正莫辨孰為是乎吾比遊方多見此色近尤盛矣聚却三五百眾目視雲漢云是南方宗旨把他壇經改換添糅鄙談削除聖意惑亂後徒豈成言教苦哉吾宗喪矣若以見聞覺知是佛性者淨名不應云法離見聞覺知若行見聞覺知是則見聞覺知非求法也僧又問法華了義開佛知見此復若為師曰他云開佛知見尚不言菩薩二乘豈以眾生癡倒便同佛之知見耶僧又問阿那個是佛心師曰牆壁瓦礫是僧曰與經大相違也涅槃云離墻壁無情之物故名佛性今云是佛心未審心之與性為別不別師曰迷即別悟即不別曰經云佛性是常心是無常今云不別何也師曰汝但依語而不依義譬如寒月水結為氷及至暖時氷釋為水眾生迷時結性成心眾生悟時釋心成性若執無情無佛性者經不應言三界唯心宛是汝自違經吾不違也問無情既有佛性還解說法否師曰他熾然常說無有間歇曰某甲為甚麼不聞師曰汝自不聞曰誰人得聞師曰諸聖得聞曰眾生應無分耶師曰我為眾生說不為諸聖說曰某甲聾瞽不聞無情說法師應合聞師曰我亦不聞曰師既不聞爭知無情解說法師曰賴我不聞我若得聞則齊於諸聖汝則不聞我說法曰眾生畢竟得聞否師曰眾生若聞即非眾生曰無情說法有何典據師曰不見華嚴云剎說眾生說三世一切說眾生是有情乎曰師但說無情有佛性有情復若為師曰無情尚爾況有情耶曰若然者南方知識云見聞覺知是佛性應不合判同外道師曰不道他無佛性外道豈無佛性耶但緣見錯於一法中而生二見故非也曰若俱有佛性且殺有情即結業互酬損害無情不聞有報師曰有情是正報計我我所而懷結恨即有罪報無情是其依報無結恨心是以不言有報曰教中但見有情作佛不見無情受記且賢劫千佛孰是無情佛耶師曰如皇太子未受位時唯一身耳受位之後國土盡屬於王寧有國土別受位乎今但有情受記作佛之時十方國土悉是遮那佛身那得更有無情受記耶曰一切眾生盡居佛身之上便利穢污佛身穿鑿踐蹋佛身豈無罪耶師曰眾生全體是佛欲誰為罪曰經云佛身無𦊱礙今以有為窒礙之物而作佛身豈不乖於聖旨師曰大品經云不可離有為而說無為汝信色是空否曰佛之誠言那敢不信師曰色既是空寧有罣礙曰眾生佛性既同只用一佛修行一切眾生應時解脫今既不爾同義安在師曰汝不見華嚴六相義云同中有異異中有同成壞總別類例皆然眾生佛雖同一性不妨各各自修自得未見他食我飽曰有知識示學人但自識性了無常時拋却殻漏子一邊著靈臺智性迥然而去名為解脫此復若為師曰前已說了猶是二乘外道之量二乘厭離生死欣樂涅槃外道亦云吾有大患為吾有身乃趣乎冥諦須陀洹人八萬劫餘三果人六四二萬劫辟支佛一萬劫住空定中外道八萬劫住非非想中二乘劫滿猶能回心向大外道還即輪回曰佛性一種為別師曰不得一種曰何也師曰或有全不生滅或半生半滅半不生滅曰孰為此解師曰我此間佛性全無生滅汝南方佛性半生半滅半不生滅曰如何區別師曰此則身心一如身外無餘所以全不生滅汝南方身是無常神性是常所以半生半滅半不生滅曰和尚色身豈得便同法身不生滅耶師曰汝那得入於邪道曰學人早晚入邪道師曰汝不見金剛經色見聲求皆行邪道今汝所見不其然乎雲門云身心一如身外無餘山河大地何處有耶神鼎諲云國師與麼道龍頭蛇尾東禪覲云國師與這僧離色聲相見即色聲相見若離色聲相見何異南方知識半生半滅若即色聲相見又道色見聲求是行邪道眾中莫有為國師作主者麼我且問你既是身心一如身外無餘為甚麼泡幻之身不同法體曰某甲曾讀大小乘教亦見有說不生不滅中道見性之處亦見有說此陰滅彼陰生身有代謝而神性不滅之文那得盡撥同外道斷常二見師曰汝學出世無上正真之道為學世間生死斷常二見耶汝不見肇公云譚真則逆俗順俗則違真違真故迷性而莫返逆俗故言淡而無味中流之人如存若亡下士拊掌而笑之汝今欲學下士笑於大道乎曰師亦言即心是佛南方知識亦爾那有異同師不應自是而非他師曰或名異體同或名同體異因茲濫矣只如菩提涅槃真如佛性名異體同真心妄心佛智世智名同體異緣南方錯將妄心言是真心認賊為子有取世智稱為佛智猶如魚目而亂明珠不可雷同事須甄別曰若為離得此過師曰汝但子細返觀陰入界處一一推窮有纖毫可得否曰子細觀之不見一物可得師曰汝壞身心相耶曰身心性離有何可壞師曰身心外更有物否曰身心無外寧有物耶師曰汝壞世間相耶曰世間相即無相那用更壞師曰若然者即離過矣常州僧靈覺問曰發心出家本擬求佛未審如何用心即得師曰無心可用即得成佛曰無心可用阿誰成佛師曰無心自成佛成佛亦無心曰佛有大不可思議為能度眾生若也無心阿誰度眾生師曰無心是真度生若見有生可度者即是有心宛然生滅曰今既無心能仁出世說許多教迹豈可虗言師曰佛說教亦無心曰說法無心應是無說師曰說即無無即說曰說法無心造業有心否師曰無心即無業今既有業心即生滅何得無心曰無心即成佛和尚即今成佛未師曰心尚自無誰言成佛若有佛可成還是有心有心即有漏何處得無心曰既無佛可成和尚還得佛用否師曰心尚自無用從何有曰茫然都無莫落斷見否師曰本來無見阿誰道斷曰本來無見莫落空否師曰無空可落曰有可墮否師曰空既是無墮從何立曰能所俱無忽有人持刀來取命為是有是無師曰是無曰痛否師曰痛亦無曰痛既無死後生何道師曰無死無生亦無道曰既得無物自在饑寒所逼若為用心師曰饑即喫飯寒即著衣曰知饑知寒應是有心師曰我問汝有心心作何體段曰心無體段師曰汝既知無體段即是本來無心何得言有曰山中逢見虎狼如何用心師曰見如不見來如不來彼即無心惡獸不能加害曰寂然無事獨脫無心名為何物師曰名金剛大士曰金剛大士有何體段師曰本無形段曰既無形段喚何物作金剛大士師曰喚作無形段金剛大士曰金剛大士有何功德師曰一念與金剛相應能滅殑伽沙劫生死重罪得見殑伽沙諸佛其金剛大士功德無量非口所說非意所陳假使殑伽沙劫住世說亦不可得盡曰如何是一念相應師曰憶智俱忘即是相應曰憶智俱忘誰見諸佛師曰忘即無無即佛曰無即言無何得喚作佛師曰無亦空佛亦空故曰無即佛佛即無曰既無纖毫可得名為何物師曰本無名字曰還有相似者否師曰無相似者世號無比獨尊汝努力依此修行無人能破壞者更不須問任意游行獨脫無畏常有河沙賢聖之所覆護所在之處常得河沙天龍八部之所恭敬河沙善神來護永無障礙何處不得趙遙妙喜舉至殑伽沙劫住世說亦不可得盡止復云遮僧當下大悟如睡夢覺如蓮花開似這般底便是金剛圈栗棘蓬你若吞不得透不得不見古人行履處定起謗無疑透得這裏方能作大舟航不著此岸不著彼岸不著中流善知識下得這般手脚入得這般窠窟方始為得人師家若不具許多差別眼目如心性上得個解路入處底定不愛擊石火閃電光却愛這般說話又却錯做實法會了如一機一境一棒一喝上得個入處底定不愛這般說話又是錯會了真所謂所見不同互有得失教中所謂菩薩見水如甘露天人見水如琉璃凡夫見水是水餓鬼見水如膿血是也或有個愛高禪底衲子出來道妙喜有如是等見耶即向他道逢人但恁麼舉僧問古德云青青翠竹盡是法身黃花無非般若有人不許云是邪說亦有信者云不思議不知若為師曰此盖普賢文殊境界非諸凡小而能信受皆與大乘了義經意合故華嚴經云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而常處此菩提座翠竹既不出於法界豈非法身乎又般若經云色無邊故般若亦無邊黃花既不越於色豈非般若乎深遠之言不省者難為措意於是禪客作禮而去又華嚴座主問大珠和尚曰禪師何故不許青青翠竹盡是法身黃花無非般若珠曰法身無象應翠竹以成形般若無知對黃花而顯相非彼黃花翠竹而有般若法身故經云佛真法身猶如虗空應物現形如水中月黃花若是般若般若即同無情翠竹若是法身翠竹還能應用座主會麼云不會珠云若見性人道是亦得道不是亦得隨用而說不滯是非若不見性人說翠竹著翠竹說黃花著黃花說法身滯法身說般若不識般若所以皆成諍論座主禮謝而去妙喜云國師主張青青翠竹盡是法身主張到底大珠破青青翠竹不是法身直破到底老漢將一個主張底一個破底收作一處更無拈提不敢動著他一絲毫要你學者具眼透國師底金剛圈又吞大珠底栗棘蓬具眼者辨得出不具眼者未必不笑又云眾中商量道二尊宿恁麼切磋一人得其體一人得其用得其用者事上建立得其體者理上掃除所謂實際理地不受一塵佛事門中不捨一法我為法王於法自在或抑或揚無得無失恁麼見解喚作矮子看戲妙喜見處也要諸人共知不見道破驢脊上足蒼蠅僧問若為得成佛去師曰佛與眾生一時放却當處解脫曰作麼生得相應去師曰善惡不思自見佛性曰若為得證法身師曰越毗盧之境界曰清淨法身作麼生得師曰不著佛求耳曰阿那個是佛師曰即心是佛曰心有煩惱否師曰煩惱性自離曰豈不斷耶師曰斷煩惱者即名二乘煩惱不生名大涅槃曰坐禪看靜此復若為師曰不垢不淨寧用起心而看淨相問禪師見十方虗空是法身否師曰以想心取之是顛倒見問即心是佛可更修萬行否師曰諸聖皆具二嚴豈撥無因果耶師將涅槃辭代宗代宗曰師滅度後弟子將何所記師曰告檀越造取一所無縫塔帝曰就師請取塔樣師良久曰會麼帝曰不會師曰貧道去後弟子應真却知此事乞詔問之大曆十年十二月十九日右脇而逝塔於黨子谷後詔應真問前語真良久曰聖上會麼帝曰不會真述偈曰湘之南雪竇著語云獨掌不浪鳴潭之北兩手鳴聒聒中有黃金充一國山形拄杖子無影樹下合同船海晏河清琉璃殿上無知識拈了也復頌云無縫塔見還難澄潭不許蒼龍蟠層落落影團團千古萬古與人看永嘉玄覺禪師到曹溪語具六祖章中回溫江學者輻輳號真覺大師著證道歌及禪宗悟修圓旨自淺之深慶州刺史魏靜緝敘成十篇名永嘉集並行於世西竺稱為東土大乘論證道歌曰君不見絕學無為閒道人不除妄想不求真無明實性即佛性幻化空身即法身法身覺了無一物本源自性天真佛五陰浮雲空去來三毒水泡虗出沒證實相無人法剎那滅却阿鼻業若將妄語誑眾生自招拔舌塵沙劫頓覺了如來禪六度萬行體中圓夢裏明明有六趣覺後空空無大千無罪福無損益寂滅性中莫問覓比來塵鏡未曾磨今日分明須剖析誰無念誰無生若實無生無不生喚取機關木人問求佛施功早晚成放四大莫把捉寂漠性中隨飲諸行無常一切空即是如來大圓覺決定說表真乘有人不肯任情徵直截根源佛所印摘葉尋枝我不能摩尼珠人不識如來藏裏親收得六般神用空不空一顆圓光色非色淨五眼得五力唯證乃知難可測鏡裏看形見不難水中捉月拈爭得常獨行常獨步達者同遊涅槃路調古神清風自高貌顇骨剛人不顧窮釋子口稱貧實是身貧道不貧貧則身常披縷褐道則心藏無價珍無價珍用無盡利物應機終不恡三身四智體中圓八解六通心地印上士一決一切了中下多聞多不信但自懷中解垢衣誰能向外誇精進從他謗任他非把火燒天徒自疲我聞恰似飲甘露銷融頓入不思議觀惡言是功德此則成吾善知識不因訕謗起冤親何表無生慈忍力宗亦通說亦通定慧圓明不滯空非但我今獨達了恒沙諸佛體皆同師子吼無畏說百獸聞之皆腦裂香象奔波失却威天龍寂聽生欣悅遊江海涉山川尋師訪道為參禪自從認得曹溪路了知生死不相干行亦禪坐亦禪語默動靜體安然縱遇鋒刀常坦坦假饒毒藥也閒閒我師得見然燈佛多劫曾為忍辱仙幾回生幾回死生死悠悠無定止自從頓悟了無生於諸榮辱何憂喜入深山住蘭若岑崟幽邃長松下優游靜坐野僧家閴寂安居實瀟灑覺即了不施功一切有為法不同住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地但得本莫愁末如淨琉璃含寶月既能解此如意珠自利利他終不竭江月照松風吹永夜清宵何所為佛性戒珠心地印霧露雲霞體上衣降龍鉢解虎錫兩鈷金環鳴歷歷不是標形虗事持如來寶杖親蹤跡不求真不斷妄了知二法空無相無相無空無不空即是如來真實相心鏡明鑒無礙廓然瑩徹周沙界萬象森羅影現中一顆圓明非內外豁達空撥因果莾莾蕩蕩招殃禍棄有應是空著空應是有病亦然還如避溺而投火捨妄心取真理取捨之心成巧偽學人不了用修行真成認賊將為子損法財滅功德莫不由斯心意識是以禪門了却心頓入無生知見力大丈夫秉慧劒般若鋒兮金剛𦦨非但能摧外道心早曾落却天魔膽震法雷擊法鼓布慈雲兮灑甘露龍象蹴蹋潤無邊三乘五性皆醒悟雪山肥膩更無雜純出醍醐我常納一性圓通一切性一法徧含一切法一月普現一切水一切水月一月攝諸佛法身入我性我性還共如來合一地具足一切地非色非心非行業彈指圓成八萬門剎那超却三祇劫一切數句非數句與吾靈覺何交涉不可毀不可讚體若虗空沒涯岸不離當處常湛然覓即知君不可見取不得捨不得不可得中祇麼得默時說說時默大施門開無壅塞有人問我解何宗報道摩訶般若力或是或非人不識逆行順行天莫測吾早曾經多劫修不是等閒相誑惑建法幢立宗旨明明佛敕曹溪是第一迦葉首傳燈二十八代西天記法東流入此土菩提達磨為初祖六代傳衣天下聞後人得道何窮數真不立妄本空有無俱遣不空空二十空門元不著一性如來體自同心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙亡性即真嗟末法惡時世眾生福薄難調治去聖遠兮邪教深魔強法弱多怨害聞說如來頓教門恨不滅除令瓦碎作在心殃在身不須怨訴更尤人欲得不招無間業莫謗如來正法輪栴檀林無別樹密森沉師子住境靜林閒獨自遊走獸飛禽皆遠去師子兒眾隨後三歲即能大哮吼若是野干逐法王百年妖怪虗開口圓頓教勿人情有疑不決直須爭不是山僧逞人我修行恐落斷常坑非不非是不是差之毫𨤲失千里是即龍女頓成佛非即善星生陷墜吾早年來積學問亦曾討疏尋經論分別名相不知休入海筭沙徒自困却被如來苦訶責數他珍寶有何益從來蹭蹬覺虗行多年枉作風塵客種性邪錯知解不達如來圓頓制二乘精進勿道心外道聰明無智慧亦愚癡亦小騃空拳指上生實解執指為月枉施功根境法中虗揑怪不見一法即如來方得名為觀自在了即業障本來空未了先須償宿債饑逢王膳不能餐病遇醫王爭得瘥在欲行禪知見力火中生蓮終不壞勇施犯重悟無生早時成佛於今在師子吼無畏說深嗟懞懂頑皮靼秖知犯重障菩提不見如來開秘訣有二比丘犯婬殺波離螢光增罪結維摩大士頓除疑猶如赫日銷霜雪不思議解脫力妙用河沙也無極傳燈作此即成吾善知識四事供養敢辭勞萬兩黃金亦銷得粉骨碎身未足酬一句了然超百億法中王最高勝河沙如來同共證我今解此如意珠信受之者皆相應了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂假使鐵輪頂上旋定慧圓明終不失日可冷月可熱眾魔不能壞真說象駕崢嶸謾進塗誰見螗螂能拒轍大象不遊於兔徑大悟不拘於小節莫將管見謗蒼蒼未了吾今為君決慈明和尚示眾云無明實性即佛性幻化空身即法身諸仁者若也信得去不妨省力可謂善財入彌勒樓閣無邊法門悉皆周徧得大無礙悟法無生是謂無生法忍無邊剎境自他不于隔毫端十世古今始終不離於當念且問諸人阿那個是當念只如諸人無明之性即是汝本覺妙明之性盖謂不了生死根源妄執為實隨妄所轉致墮輪迴受種種苦若能回光反照自悟本來真性不生不滅故曰無明實性即佛性幻化空身即法身只如四大五蘊不淨之身都無實義如夢如幻如影如響從無量劫來流浪生死貪愛所使無暫休息出此入彼積骨如毗富羅山飲乳如四大海水何故為無智慧不能了知五蘊本空都無所實逐妄受生貪欲所拘不得自在故所以世尊云諸苦所因貪欲為本若滅貪欲無所依止汝等若能了知幻身虗假本來空寂諸見不生無我人眾生壽者諸法皆如故曰幻化空身即法身法身覺了無一物惟聽法說法虗玄大道無著真宗故曰本源自性天真佛又曰五陰浮雲空去來三毒水泡虗出沒若如是者是為度一切苦厄乃至無量無邊煩惱知解悉皆清淨是為清淨法身若到遮個田地便能出此入彼捨身受身地獄天堂此界他方縱橫自在任意浮沉應物舒光隨機逗教喚作千百億化身與麼說話可謂無夢說夢和泥合水撒屎撒尿不識好惡乃呵呵大笑云若向衲僧門下十萬八千未夢見他汗臭氣在雖然如是事不得一向但以假名字引導於眾生喝一喝永嘉集篇目大旨慕道志儀第一夫欲修道先須立志及事師儀則彰乎軌訓故標第一明慕道儀式戒憍奢意第二初雖立志修道善識軌儀若三業憍奢妄心擾動何能得定故次第二明戒憍奢意也淨修三業第三前戒憍奢略標綱要今子細檢責令粗過不生故次第三明淨修三業戒乎身口意也奢摩他頌第四已撿責身口令粗過不生次須入門修道漸次不出定慧五種起心六種料揀故次第四明奢摩他頌也毗婆舍那頌第五非戒不禪非禪不慧上既修定定久慧明故次第五明毗婆舍那頌也優畢叉頌第六偏修於定定久則沉偏學於慧慧多心動故次第六明於優畢叉頌等於定慧令不沉動使定慧均等捨於二邊三乘漸次第七定慧既均則寂而常照三觀一心何疑不遣何照不圓自解雖明悲他未悟悟有深淺故次第七明三乘漸次也事理不二第八三乘悟理理無不窮窮理在事了事即理故次第八明事理不二即事而真用祛倒見也勸友人書第九事理既融內心自瑩復悲遠學虗擲寸陰故次第九明勸友人書也發願文第十勸友人雖是悲他專心在一情猶未普故次第十明發願文誓度一切復次觀心十門初則言其法爾次則出其觀體三則語其相應四則警其上慢五則戒其疎怠六則重出觀體七則明其是非八則簡其詮旨九則觸塗成觀十則妙契玄源第一言法爾者夫心性虗通動靜之源莫二真如絕慮緣計之念非殊惑見紛馳窮之則唯一寂靈源不狀鑒之則以千差千差不同法眼之名自立一寂非異慧眼之號斯存理量雙消佛眼之功圓著是以三諦一境法身之理常清三智一心般若之明常照智境冥合解脫之應隨機非縱非橫圓伊之道玄會故知三德妙性宛爾無乖一心深廣難思何出要而非路是以即心為道者可謂尋流而得源矣第二出其觀體者只知一念即空不空非空非不空第三語其相應者心與空相應則譏毀讚譽何憂何喜身與空相應則刀割香塗何苦何樂依報與空相應則施與劫奪何得何失心與空不空相應則愛見都忘慈悲普救身與空不空相應則內同枯木外現威儀依報與空不空相應則永終貪求貲財給濟心與空不空非空非不空相應則實相初明開佛知見身與空不空非空非不空相應則一塵入正受諸塵三昧起依報與空不空非空非不空相應則香臺寶閣嚴土化生第四警其上慢者若不爾者則未相應也第五戒其疎怠者然渡海應須上船非船何以能渡修心必須入觀非觀無以明心心尚未明相應何日思之勿自恃也第六重出觀體者只知一念即空不空非有非無不知即念即空不空非非有非非無第七明其是非者心不是有心不是無心不非有心不非無是有是無即墮是非有非無即墮非如是只是是非之非未是非是非非之是今以雙非破兩是是破非是猶是非又以雙非破兩非非破非非即是是如是只是非是非非之是未是不非不不非不是不不是是非之惑綿微難見神清慮靜細而研之第八簡其詮旨者然而至理無言假文言以明其旨旨宗非觀藉修觀以會其宗若旨之未明則言之未的若宗之未會則觀之未深深觀乃會其宗的言必明其旨旨宗既其明會言觀何得復存耶第九觸塗成觀者夫再演言詞重標觀體欲明宗旨無異言觀有逐方移方方五燈作言上方同移五燈作言則言理無差無差則觀旨不異不異之旨即理無差之理即宗宗旨一而名二言觀明其弄引耳第十妙契玄源者夫悟心之士寧執觀而迷旨達教之人豈滯言而惑理理明則言語道斷何言之能議旨會則心行處滅何觀之能思心言不能思議者可謂妙契環中矣先天二年十月十七日安坐示滅塔于西山之陽西京荷澤神會禪師見六祖語具六祖章中弟子光寶問眼耳緣聲色時為復抗行為有回互師曰抗互且寘汝指何法為聲色之體乎寶曰如師所說即無有聲色可得師曰汝若了聲色體空亦信眼耳諸根及與凡與聖平等如幻抗行回互其理昭然寶頓領悟即日發去隱於蒙山一日鄉信至報二親俱亡師入堂白槌曰父母俱喪請大眾念摩訶般若然纔集師便打槌曰勞煩大眾下座圭峰宗密禪師果州西充何氏子髫齓通明儒典弱冠將赴舉見圓和尚遽落䰂受具一日赴府吏任灌齋以次受經得圓覺讀之感悟流涕歸白圓圓曰此佛授汝耳汝當大弘圓頓之教令徧參因謁荊南忠公南印忠曰傳教人也復謁洛陽照公奉國神照照曰菩薩中人也抵襄陽得清凉國師華嚴疏於病僧處夙未經目即為眾講說聽者雲集有泰恭者不勝慶遇至斷臂酬恩師遣書先詣清凉敘師資禮講畢乃躬詣觀國師執弟子禮觀國師曰毗盧華藏能隨我遊者其汝乎師預觀之室日臻玄奧筌象都亡回住鄠縣草堂寺未幾住終南圭峰寺太和徵至都賜紫天子而下悉歸慕參扣相國裴休獨稱入室師以禪教互相非毀乃著禪源詮以通之其都序略曰禪是天竺之語具云禪那此云思惟修亦云靜慮皆定慧之通稱也源者是一切眾生本覺真性亦名佛性亦名心地悟之名慧修之名定定慧通明為禪此性是禪之本源故云禪源亦名禪那理行者此之本源是禪理忘情契之是禪行故云理行然今所述諸家述作多譚禪理少說禪行故且以禪源題之今時有人但目真性為禪者是不達理行之旨又不辨華竺之音也然非離真性別有禪體但眾生迷真合塵即名散亂背塵合真方名禪定若直論本性即非真非妄無背無合無定無亂誰言禪乎況此真性非惟是禪門之源亦是萬法之源故名法性亦是眾生迷悟之源故名如來藏藏識出楞伽經亦是諸佛萬德之源故名佛性涅槃等經亦是菩薩萬行之源故名心地梵網經云行菩薩道之根本萬行不出六波羅蜜禪者但是六中之一當其第五豈可都目真性為一禪行哉然禪定一行最為神妙能發起性上無漏智慧一切妙用萬行萬德乃至神通光明皆從定發故三乘人欲求聖道必須修禪離此無門離此無路至於念佛求生淨土亦修十六觀禪及念佛三昧般舟三昧等也又真性即不垢不淨凡聖無差禪門則有淺有深階級殊等謂帶異計欣上厭下而修者是外道禪正信因果亦以欣厭而修者是凡夫禪悟我空偏真之理而修者是小乘禪悟我法二空所顯真理而修者是大乘禪上四類皆有四色四空之異也若頓悟自心本來清淨元無煩惱無漏智性本自具足此心即佛畢竟無異依此而修者是最上乘禪亦名如來清淨禪亦名一行三昧亦名真如三昧此是一切三昧根本若能念念修習自然漸得百千三昧達磨門下展轉相傳者是此禪也達磨未到古來諸家所解皆是前四禪八定諸高僧修之皆得功用南嶽天台令依三諦之理修三止三觀教義雖最圓妙然其趣入門戶次第亦只是前之諸禪行相唯達磨所傳者頓同佛體迥異諸門故宗習者難得其旨得則成聖疾證菩提失即成邪速入塗炭先祖革昧防失故且人傳一人後代已有所憑故任千燈千照洎乎法久成弊錯謬者多故經論學人疑謗亦眾原夫佛說頓教漸教禪開頓門漸門二教二門各相符契今講者偏彰漸義禪者偏播頓宗禪講相逢胡越之隔宗密不知夙生何作熏得此心自未解脫欲解他縛為法忘於軀命愍人切於神情亦知淨名經云若自有縛能解他縛無有是處然欲罷不能驗是宿習難改故每歎人與法差法為人病時別撰經律論疏大開戒定慧門顯頓悟資於漸修證師說符於佛意意既本末而委示文乃浩博而難尋汎學雖多秉志者少況迹涉名相誰辨金鍮徒自疲勞未見機感雖佛說悲增是行而自慮愛見難防遂捨眾入山習定均慧前後息慮相繼十年微細習情起滅彰於靜慧差別法義羅列現於空心虗隙日光纖埃擾擾清潭水底影像昭昭豈比夫空守默之癡禪但尋文之狂慧者也然本因了自心而辨諸教故懇情於心宗又因辨諸教而解修心故䖍誠於教義教也者諸佛菩薩所留經論也禪也者諸善知識所述句偈也但佛經開張羅大千八部之眾禪偈撮略就此方一類之機羅眾則莽蕩難依就機則指的易用今之纂集意在斯焉蕭俛相公呈己見解請師注釋荷澤云見清淨體於諸三昧八萬四千諸波羅蜜門皆於見上一時起用名為慧眼若當真如相應之時師注善惡不思空有不念下細字皆是師注萬化寂滅萬法俱從思想緣念而生皆是虗空故云化也既一念不生則萬法不起故不待泯之自然寂滅也此時更無所見照體獨立夢智亡階三昧諸波羅蜜門亦一時空寂更無所得散亂與三昧此岸與彼岸是相待對治之說若知心無念見性無生則定亂真妄一時空寂故無所得也不審此是見上一時起用否然見性圓明理絕相累即絕相為妙用住相為執情於八萬法門一一皆爾一法有為一塵一法空為一用故云見清淨體則一時起用矣山南溫造尚書問悟理息妄之人不復結業一期壽終之後靈性何依師曰一切眾生無不具有覺性靈明空寂與佛何殊但以無始劫來未曾了悟妄執身為我相故生愛惡等情隨情造業隨業受報生老病死長劫輪迴然身中覺性未曾生死如夢被驅役而身本安閒如水作氷而濕性不易若能悟此性即是法身本自無生何有依托靈靈不昧了了常知無所從來亦無所去然多生妄執習以性成喜怒哀樂微細流注真理雖然頓達此情難以卒除須常覺察損之又損如風頓止波浪漸停豈可一主所修便同諸佛力用但可以空寂為自體勿認色身以靈知為自心勿認妄念妄念若起都不隨之即臨命終時自然業不能繫雖有中陰所向自由天上人間隨意寄托若愛惡之念已泯即不受分段之身自能易短為長易粗為妙若微細流注一切寂滅唯圓覺大智朗然獨存即隨機應現千百億化身度有緣眾生名之為佛宗密先有八句偈顯示此意曾於尚書處誦之奉命解釋今謹注釋如後偈曰作有義事是惺悟心義謂義理非謂仁義恩義意明凡所作為先詳利害須有所以當於道理然後行之方免同惛醉顛狂之人也就佛法中有三種義即可為之一益資色身之事謂衣食醫藥房舍等世間義也二資益法身謂戒定慧六波羅蜜等第一義也三弘正法利濟羣生也乃至為法諸餘緣事通世出世也作無義事是狂亂心謂凡所作為若不緣上三般事即名無義也是狂亂者且如世間狂人醉人所徃不揀處所所作不量是非今既不擇有何義利但縱情妄念要為即為故如狂也上四句述業因也下四句述受果報云狂亂隨情念臨終被業牽既隨妄念欲作即作不以悟理之智簡擇是非猶如狂人故臨終時牽於業道被業所引受當來報故涅槃經云無明郎主貪愛魔王役使身心策如僮僕惺悟不由情臨終能轉業情中欲作而察理不應即須便止情中不欲作而照理相應即須便作但由是非之理不由愛惡之情即臨命終時業不能繫隨意自在天上人間也通而言之但朝暮之間所作被情塵所牽即臨終被業所牽而受生若所作所為由于覺智不由情塵即臨終由我自在而受生不由業也當知欲驗臨終受生自在不自在但驗尋常行心於塵境自由不自由林間錄引師前偈曰閱唐史李訓之敗被緣衣詭言黜官走終南依密密欲匿之其徒不可乃奔鳳翔為盩厔吏所執訓死仇士良捕密詰之怡然曰與訓遊久吾法遇難則救初無愛憎死固吾分予謂比丘與唐士大夫交者多或見傳記多犯法辱教而圭峰獨超然如此為史者亦欣然點筆疾書盖其履踐之明也觀其偈則無不欲透脫情境譬如香象擺壞鐵鎖自在而去豈若蠅為唾所污哉智證傳引此偈曰朝奉大夫孫于之嫂年十九而寡自誓一飯終身誦法華經不復嫁于守高安嫂年已七十餘面目光澤舉止輕利政和六年夏六月忽收經帙料理服玩與侍妾于問其故笑曰我更三日死矣果如期而逝韓子蒼問予曰人之將終有前知者何術致之予曰譬如牛乳以酵發之雖緣緣之中無有作者久而成酪非自外來生乳中故非自能生以酵發之故緣緣成熟忽然成就乃有偈其略曰酪出乳中無別法死而何苦欲先知如某夫人華年休息白首見効凡五十餘年心心無間自然前知化日酪出乳中也然觀圭峰偈語恐于死時未得自在以其皆理障故如本朝太祖皇帝將問罪江南後主遣其臣徐鉉入對欲以舌辯存國既見曰江南國主如子事父以事陛下奈何欲伐之太祖曰父子異居可乎鉉愕然無以對今平生知誦圭峰之偈語至於臨終為徐鉉之愕然是也林間錄又引師答溫尚書書具載其辭復列韓侍郎與晦堂問答而覺範於後稍有所評并錄於此韓侍郎宗古以書問晦堂老師曰昔聞和尚開悟曠然無疑但無始以來煩惱習氣未能頓盡為之奈何晦堂答曰敬承中書諭及昔時開悟曠然無疑但無始以來煩惱習氣未能頓盡為之奈何然心外無剩法者不知煩惱習氣是何物而欲盡之若起此心翻成認賊為子也從上以來但有言說乃是隨病設藥縱有煩惱習氣但以如來知見治之皆是善權方便誘引之說若是定有習氣可治却是心外有法而可盡之譬如靈龜曳尾於塗拂迹迹生可謂將心用心轉見病深苟能明達心外無法法外無心心法既無更欲教誰頓盡耶伏奉來諭略敘少答以為山中之信耳二老古今之宗師也其隨宜方便自有意味初無優劣然圭峰所答之詞正韓公所問之意而語不失宗開廓正見以密較之晦堂所得多矣又林間錄曰草堂禪師牋要曰心體靈知不昧如一摩尼珠圓照空淨都無差別之相以體明故對物時能現一切色相色自差而珠無變易如珠現黑時人以珠為黑者非見珠也離黑覓珠者亦非見珠也以明黑都無為珠者亦非見珠也馬祖說法即妄明真正如以黑為珠神秀說法令妄盡方見覺性者離妄求真正如離黑覓珠牛頭說法一切如夢本來無事真妄俱無正如明黑都無為珠獨荷澤於空相處指示知見了了常知正如正見珠體不顧眾色也密以馬祖之道如珠之黑是大不然即妄明真方便語耳略知教乘者皆了之豈馬祖應聖師遠讖為震旦法主出其門下者如南泉百丈大達歸宗之徒皆博綜三藏熟爛真妄之論爭服膺師尊之而其道乃止於如珠之黑而已哉又以牛頭之道一切如夢真妄俱無者是大不然觀其作心王銘曰前際如空知處迷宗分明照境隨照冥濛縱橫無照最微最妙知法無知無知知要一一皆治知見之病而荷澤公然立知見優劣可見而謂其道如明黑都無為珠者豈不重欺吾人哉至如北秀之道頓漸之理三尺童子知之所論當論其用心秀公為黃梅上首頓宗直指縱曰機器不逮然亦飫聞飽參矣豈自甘為漸宗徒耶葢祖道於時疑信半天下不有漸何以顯頓哉至於紛爭者皆兩宗之徒非秀心也便謂其道止如是恐非通論吾聞大聖應世成就法道其權非一有冥權有顯權冥權即為異道為非道顯權則為親友為知識庸詎知秀公非冥權也哉音釋卷四之六姙如禁切音任孕也嶢餘招切音遙高貌聿以律切雲入聲循也惟也述也日也筦古緩切音管滏扶古切音輔水名侃空罕切刊上聲剛直也詆典禮切音邸訶也訐也擉測角切音娖以杈刺泥中取物也擦初戞切音察摩也獦音葛獦狚獸名獠連條切音聊與䝤同絰姓結切音耋喪服躔諸延切音蟬踐也縠胡谷切音斛羅縠䰂此宰切音采䰂髻髫田聊切音迢小兒埀髮灊慈鹽切音潛水名鄠侯切古胡上聲縣名挃職日切音質穫禾聲泐歷德切音勒逶迤音威夷行貌訕所晏切山去聲謗也蹭鐙音寸鄧失道又困頓也盩厔音周質漢縣名鈯吐納切音突鈍也徇與循同
