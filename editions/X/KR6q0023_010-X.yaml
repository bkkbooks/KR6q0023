body:
  text: 六祖下第四世洪州黃檗希運禪師閩人也幼於本州黃檗山出家額間隆起如珠音辭朗潤志意冲澹後遊天台逢一僧與之言笑如舊相識熟視之目光射人乃偕行屬㵎水暴漲捐笠植杖而止其僧率師同渡師曰兄要渡自渡彼即褰衣躡波若履平地回顧曰渡來渡來師曰咄這自了漢吾早知當斫汝脛其僧歎曰真大乘法器我所不及言訖不見至洛京行乞吟添鉢聲有一嫗出棘扉間曰太無厭生師曰汝猶未施責我無厭何耶嫗笑而掩扉師異之進而與語多所發藥師須臾辭去嫗告之曰可往南昌見馬大師至南昌馬大師已示寂遂往石門謁塔時百丈禪師廬於塔旁乃往參丈丈問巍巍堂堂從何方來師曰巍巍堂堂從嶺南來丈曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜問曰從上宗乘如何指示丈良久師曰不可教後人斷絕去也丈曰將謂汝是個人乃起入方丈師隨後入曰某甲特來丈曰若爾則他後不得孤負吾丈一日舉再參馬祖被喝話師遂領旨見百丈章丈一日問師甚麼處去來曰大雄山下采菌子來丈曰還見大蟲麼師便作虎聲丈拈斧作斫勢師即打丈一摑丈吟吟而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口碧巖集載師參丈不為別事後云丈因深器之次日辭丈丈云何處去師云禮拜馬大師去丈云大師已遷化去也圜悟云你道黃檗恁麼問是知來問是不知來問師云某甲特去禮拜福緣淺薄不及一見未審平日有何言句丈舉再參被一喝三日耳聾語師聞不覺吐舌丈曰子已後莫承嗣馬大師去否師曰不然今日因聞師舉得見馬祖大機大用且不識馬祖若嗣馬祖已後喪我兒孫丈曰見與師齊減師半德見過於師方堪傳授子甚有超師之作圜悟又云你道黃檗恁麼問是知來問是不知來問再參公案已見百丈章而此復錄以圜悟拈語也事之異同所不必論添鉢公案會元頌古統要皆作臨濟此從古尊宿語錄及林間錄入師章中丈一日因普請開田回問師曰運闍黎開田不易師曰隨眾作務丈曰有煩道用師曰爭敢辭勞丈曰開得多少田師將钁築地三下丈便喝師掩耳而去師在南泉普請擇菜次泉問甚麼處去曰擇菜去泉曰將甚麼擇師竪起刀泉曰祇解作賓不解作主師以刀點三下泉曰大家擇菜去一日捧鉢向南泉位上坐泉入堂見乃問長老甚年行道師曰威音王已前泉曰猶是王老師兒孫下去師便過第二位坐泉休去溈山云欺敵者亡仰山云不然須知黃檗有陷虎之機溈山云子見處得與麼長雪竇云可惜王老師只見錐頭利我當時若作南泉待伊道威音王已前即便於第二位坐令黃檗一生起不得雖然如此也須救取南泉妙喜曰何待問他甚年行道纔入堂見他在主位便捧鉢向第二位坐直饒黃檗有陷虎之機擬向甚處施設泉一日曰老僧有牧牛歌請長老和師曰某甲自有師在師辭南泉泉門送提起師笠曰長老身材沒量大笠子太小生師曰雖然如此大千世界總在裏許泉曰王老師聻師戴笠便行師在鹽官殿上禮佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求師曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為師便掌彌曰太粗生師曰這裏是甚麼所在說粗說細隨後又掌師曾散眾在洪州開元寺裴相國休一日入寺行次見壁畫問寺主這畫是甚麼寺主曰高僧真儀公曰真儀可觀高僧何在寺主無對公曰此間有禪人否曰近有一僧投寺執役頗似禪者公遂請相見曰休適有一問諸德吝辭今請上人代酬一語師曰請相公垂問公舉前語師朗聲曰裴休公應諾師曰在甚麼處公當下知旨如獲髻珠延入府署執弟子禮徑山杲禪師因李參政到山舉此公案拈云裴公將錯就錯脫盡根塵黃檗信口垂慈不費心力似地擎山不知山之孤峻如石含玉不知玉之無瑕雖然如是黃檗只有殺人刀且無活人劍今日大資相公或問雲門真儀可觀高僧在甚麼處雲門亦召云相公相公若應諾雲門即向道今日堂中特謝供養裴一日托一尊佛於師前跪曰請師安名師召曰裴休公應諾師曰與汝安名竟公禮拜裴一日請師至郡以所解一編示師師接置於座略不披閱良久曰會麼裴曰未測師曰若便恁麼會去猶較些子若也形於紙墨何有吾宗裴乃贈詩一章曰自從大士傳心印額有圓珠七尺身挂錫十年棲蜀水浮盃今日渡漳濵一千龍象隨高步萬里香花結勝因擬欲事師為弟子不知將法付何人師亦無喜色裴既領旨復博綜教相以弟子禮事師以昆仲友圭峯甞親書大藏經五百函所製法苑文字諸方重之師因有六人新到五人作禮中一人提起坐具作一圓相師曰我聞有一隻獵犬甚惡僧曰尋𦏰羊聲來師曰𦏰羊無聲到汝尋曰尋𦏰羊跡來師曰𦏰羊無跡到汝尋曰尋𦏰羊蹤來師曰𦏰羊無蹤到汝尋曰與麼則死𦏰羊也師便休去明日陞堂曰昨日尋𦏰羊僧出來僧便出師曰昨日公案未了老僧休去你作麼生僧無語師曰將謂是本色衲僧元來祇是義學沙門便打趁出師一日揑拳曰天下老和尚總在這裏我若放一線道從汝七縱八橫若不放過不消一揑僧問放一線道時如何師曰七縱八橫曰不放過不消一揑時如何師曰普師上堂大眾纔集師拈拄杖一時打散復召大眾眾回首師曰月似彎弓少雨多風問如何是西來意師便打一日上堂大眾雲集乃曰汝等諸人欲何所求以拄杖趁之大眾不散師却復坐曰汝等諸人盡是噇酒糟漢恁麼行脚取笑於人但見八百一千人處便去不可圖他熱閙也老漢行脚時或遇草根下有一個漢便從頂門上一錐看他若知痛癢可以布袋盛米供養他可中總似汝如此容易何處更有今日事也汝等既稱行脚亦須著些精神好還知道大唐國裏無禪師麼時有僧問諸方尊宿盡聚眾開化為甚麼却道無禪師師曰不道無禪祇是無師溈山問仰山作麼生仰云鵞王擇乳素非鴨類溈云此實難辨五祖戒出僧語云謝和尚說得道理好承天宗云五祖戒眼照四天下要見黃檗猶未可若要扶竪正法眼藏須是黃檗宗師石門聰云黃檗埀示不妨奇特纔被布衲拶著失却一隻眼徑山杲云且道是醍醐句是毒藥句又頌身上著衣方免寒口邊說食終不飽大唐國裏老婆禪今日為君註破了佛鑑懃頌黃檗山中明示眾大唐國裏暗藏身袈裟一角猶拖地誰是叢林有眼人佛慧泉頌無師充塞大唐國噇酒糟漢會不得竹寺閒過春已深落花亂點莓苔色闍黎不見馬大師下有八十四人坐道場得馬師正法眼者止兩三人廬山歸宗和尚是其一夫出家人須知有從上來事分始得且如四祖下牛頭橫說竪說猶未知向上關棙子有此眼目方辨得邪正宗黨且當人事宜不能體會得但知學言語念向皮袋裏安著到處稱我會禪還替得汝生死麼輕忽老宿入地獄五箭我纔見汝入門來便識得了也還知麼急須努力莫容易事持片衣口食空過一生明眼人笑汝久後總被俗漢筭將去在宜自看遠近是阿誰面上事若會即便會若不會即散去珍重示裴公美曰諸佛與一切眾生唯是一心更無別法此心無始已來不曾生不曾滅不青不黃無形無相不屬有無不計新舊非長非短非大非小超過一切限量名言蹤跡對待當體便是動念即乖猶如虗空無有邊際不可測度惟此一心即是佛佛與眾生更無別異但是眾生著相外求求之轉失使佛覓佛將心捉心窮劫盡形終不能得不知息念忘慮佛自現前此心即是佛佛即是眾生為眾生時此心不減為諸佛時此心不添乃至六度萬行河沙功德本自具足不假修添遇緣即施緣息即寂若不決定信此是佛而欲著相修行以求功用皆是妄想與道相乖此心即是佛更無別佛亦無別心此心明淨猶如虗空無一點相貌舉心動念即乖法體即為著相無始已來無著相佛修六度萬行欲求成佛即是次第無始已來無次第佛但悟一心更無少法可得此即真佛佛與眾生一切無異猶如虗空無雜無壞如大日輪照四天下日昇之時明徧天下虗空不曾明日沒之時暗偏天下虗空不曾暗明暗之境自相陵奪虗空之性廓然不變佛及眾生心亦如此若觀佛作清淨光明解脫之相觀眾生作垢濁暗昧生死之相作此解者歷河沙劫終不得菩提為著相故唯此一心更無微塵許法可得即心是佛如今學道人不悟此心體便於心上生心向外求佛著相修行皆是惡法非菩提道供養十方諸佛不如供養一個無心道人何故無心者無一切心也如如之體內如木石不動不搖外如虗空不塞不礙無能所無方所無相貌無得失趨者不敢入此法恐落空無棲泊處故望崖而退例皆廣求知見所以求知見者如毛悟道者如角文殊當理普賢當行理者真空無礙之理行者離相無盡之行觀音當大慈勢至當大智維摩者淨名也淨者性也名者相也性相不異故號淨名諸大菩薩所表者人皆有之不離一心悟之即是今學道人不向自心中悟乃於心外著相取境皆與道背恒河沙者佛說是沙諸佛菩薩釋梵諸天步履而過沙亦不喜牛羊蟲蟻踐踏而行沙亦不怒珍寶馨香沙亦不貪糞尿臭穢沙亦不惡此心即無心之心離一切相眾生諸佛更無差別但能無心便是究竟學道人若不直下無心累劫修行終不成道被三乘功行拘繫不得解脫然證此心有遲疾有聞法一念便得無心者有至十地乃得無心者長短得無心乃住更無可修可證實無所得真實不虗一念而得與十地而得者功用恰齊更無深淺祇是歷劫枉受辛勤耳造惡造善皆是著相著相造惡枉受輪迴著相造善枉受勞苦總不如言下便自認取本法此法即心心外無法此心即法法外無心心自無心亦無無心者將心無心心却成有默契而已絕諸思議故曰言語道斷心行處滅此心是本源清淨佛人皆有之蠢動含靈與諸佛菩薩一體不異祇為妄想分別造種種業果本佛上實無一物虗通寂靜明妙安樂而已深自悟入直下便是圓滿具足更無所欠縱使三祇精進修行歷諸地位及一念證時祇證原來自佛向上更不添得一物却觀歷劫功用總是夢中妄為故如來云我於阿耨菩提實無所得若有所得然燈佛則不與我授記問何者是佛師云汝心是佛佛即是心心佛不異所云即心即佛若離於心別更無佛云若自心是佛祖師西來如何傳授師云祖師西來惟傳心佛直指汝等心本來是佛心心不異故名為祖若直下見此意即頓超三乘一切諸位本來是佛不假修成云若如此十方諸佛出世說於何法師云十方諸佛出世祇共說一心法所以佛密付與摩訶大迦葉此一心法體盡虗空徧法界名為諸佛理論者個法豈是汝於言句上解得他亦不是於一機一境上見得他此意唯是默契得者一門名為無為法門若欲會得但知無心忽悟即悟若用心擬學取即轉遠去若無岐路心一切取捨心心如木石始有學道分云如今現有種種妄念何以言無師云妄本無體即是汝心所起汝若識心是佛心本無妄那得起心更認於妄汝若不生心動念自然無妄所以云心生則種種法生心滅則種種法滅云今正妄念起時佛在何處師云汝今覺妄起時覺正是佛可中若無妄念佛亦無何故如此為汝起心作佛見便謂有佛可成作眾生見便謂有眾生可度起心動念總是汝見處若無一切見佛有何處所如文殊纔起佛見法見便貶向二鐵圍山云今正悟時佛在何處師云問從何來覺從何起語默動靜一切聲色盡是佛事何處覓佛不可更頭上安頭嘴上加嘴但莫生異見山是山水是水僧是僧俗是俗山河大地日月星辰總不出汝心三千世界都來是汝個自己何處有許多般心外無法滿目青山虗空世界皎皎地無絲髮許與汝作見解所以一切聲色是佛之慧目法不孤起仗境方生為物之故有其多智終日說何曾說終日聞何曾聞所以釋迦四十九年說未甞說著一字云若如此何處是菩提師云菩提無是處佛亦不得菩提眾生亦不失菩提不可以身得不可以心求一切眾生即菩提相云如何發菩提心師云菩提無所得你今但發無所得心決定不得一法即菩提心菩提無住處是故無有得者故云我於然燈佛所無有少法可得佛即與我授記明知一切眾生本是菩提不應更得菩提你今聞發菩提心將謂一個心學取佛去唯擬作佛任你三祇劫修亦祇得個報化佛與你本源真性佛有何交涉故云外求有相佛與汝不相似又云是法平等無有高下是名菩提即此本源清淨心與眾生諸佛世界山河有相無相徧十方界一切平等無彼我相此本源清淨心常自圓明徧照世人不悟祇認見聞覺知為心為見聞覺知所覆所以不覩精明本體但直下無心本體自現如大日輪昇於虗空徧照十方更無障礙故學道人惟認見聞覺知施為動作空却見聞覺知即心路絕無入處但於見聞覺知處認本心然本心不屬見聞覺知亦不離見聞覺知但莫於見聞覺知上起見解亦莫於見聞覺知上動念亦莫離見聞覺知覓心亦莫捨見聞覺知取法不即不離不住不著縱橫自在無非道場若欲得知要訣但莫於心上著一物言佛真法身猶若虗空此是喻法身即虗空虗空即法身常人謂法身徧虗空處虗空中含容法身不知法身即虗空虗空即法身也若定言有虗空虗空不是法身若定言有法身法身不是虗空但莫作虗空解虗空即法身莫作法身解法身即虗空虗空與法身無異相佛與眾生無異相生死與涅槃無異相煩惱與菩提無異相離一切相即是佛凡夫取境道人取心心境雙亡乃是真法忘境猶易忘心至難人不敢忘心恐落空無撈摸處不知空本無空唯一真法界耳問如何是見性云性即是見見即是性不可以性更見性聞即是性不可以性更聞性祇你作性見能聞能見性便有一異法生他分明道所可見者不可更見你云何頭上更著頭他分明道如盤中散珠大者大圓小者小圓各各不相知各各不相礙起時不言我起滅時不言我滅所以四生六道未有不如時且眾生不見佛佛不見眾生四果不見四向四向不見四果三賢十聖不見等妙二覺等妙二覺不見三賢十聖乃至水不見火火不見水地不見風風不見地眾生不入法界佛不出法界所以法性無去來無能所見既如此因什麼道我見我聞於善知識處得契悟善知識與我說法諸佛出世與眾生說法迦旃延祇為以生滅心傳實相法被淨名訶責分明道一切法本來無縛何用解他本來不染何用淨他故云實相如是豈可說乎汝今祇成是非心染淨心學得一知一解繞天下行見人便擬定當取誰有心眼誰強誰弱若也如此天地懸殊更說什麼見性問既言性即見見即性祇如性自無障礙無劑限云何隔物即不見又於虗空中近即見遠即不見者如何師云此是你妄生異見若言隔物不見無物言見便謂性有隔礙者全無交涉性且非見非不見法亦非見非不見若見性人何處不是我之本性所以六道四生山河大地總是我之性淨明體故云見色便見心色心不異故祇為取相作見聞覺知去却前物始擬得見者即墮二乘人中依通見解也虗空中近則見遠則不見此是外道中收分明道非內亦非外非近亦非遠近而不可見者萬物之性也近尚不可見更道遠而不可見有什麼意旨問佛窮得無明否師云無明即是一切諸佛得道之處所以緣起是道場所見一塵一色便合無邊理性舉足下足不離道場道場者無所得也我向你道祇無所得名為坐道場云無明者為明為暗師云非明非暗明暗是代謝之法無明且不明亦不暗不明祇是本明不明不暗祇者一句子亂却天下人眼所以道假使滿世間皆如舍利弗盡思共度量不能測佛智其無礙惠當作慧出過虗空無你語論處釋迦量等三千大千世界忽有一菩薩出來一跨跨却三千大千世界不出普賢一毛孔你如今把什麼本領擬學他云既是學不得為什麼道歸源性無二方便有多門如之何師云歸源性無二者無明實性即諸佛性方便有多門者聲聞人見無明生見無明滅緣覺人但見無明滅不見無明生念念證寂滅諸佛見眾生終日生而無生終日滅而無滅無生無滅即大乘果所以道果滿菩提圓花開世界起舉足即佛下足即眾生諸佛兩足尊者即理足事足眾生足生死足一切等足足故不求是你今念念學佛即嫌著眾生若嫌著眾生即是謗他十方諸佛所以佛出世來執除糞器蠲除戲論之糞祇教你除却從來學心見心除得盡即不墮戲論亦云搬糞出祇教你不生心心若不生自然成大智者決定不分別佛與眾生一切盡不分別始得入我曹溪門下故自古先聖云少行我法門所以無行為我法門祇是一心門一切人到這裏盡不敢入不道全無祇是少人得得者即是佛珍重夫學道者先須併却雜學諸緣決定不求決定不著聞甚深法恰似清風屆耳瞥然而過更不追尋是為甚深入如來禪離生禪想從上祖師唯傳一心更無二佛指心是佛頓超等妙二覺之表決定不流至第二念始似入我宗門如斯之法汝取次人到者裏擬作麼生學所以道擬心時被擬心魔縛非擬心時又被非擬心魔縛應有魔字非外來出自你心唯有無神通菩薩足跡不可尋若以一切時中心有常見即是常見外道若觀一切法空作空見者即是斷見外道所以三界唯心萬法唯識此猶是對外道邪見人說若說法身以為極果此對三賢十聖人言故佛斷二愚一者微細所知愚二者極微細所知愚佛既如是更說什麼等妙二覺來所以一切人但欲向明不欲向暗但欲求悟不愛煩惱無明便道佛是覺眾生是妄若作如是見解百劫千生輪迴六道更無斷絕何以故為謗諸佛本源自性故他分明向你道佛且不明眾生不暗法無明暗故佛且不強眾生且不弱法無強弱故佛且不智眾生且不愚法無愚智故是你出頭總道解禪開著口便病發不說本祇說末不說迷祇說悟不說體祇說用總無你話論處他一切法且本不有今亦不無緣起不有緣滅不無本亦不有本非本故心亦不心心非心故相亦非相相非相故所以道無法無本心始解心心法法即非法非法即法無法無非法故是心心法忽然瞥起一念了知如幻如化即流入過去佛過去佛且不有未來佛且不無又且不喚作未來佛現在念念不住不喚作現在佛佛若起時即不擬他是覺是迷是善是惡輒不得執滯他斷絕他如一念瞥起千重關鎖鎖不得萬丈繩索索他不住既若如是爭合便擬滅他止他分明向你道爾𦦨識你作麼生擬斷他喻如陽𦦨你道近十方世界求不可得始道遠看時祇在目前你擬趁他他又轉遠去你始避他他又來逐你取又不得捨又不得既若如此故知一切法性自爾即不用愁他慮他如言前念是凡後念是聖如手翻覆一般此是三乘教之極也據我禪宗中前念且不是凡後念且不是聖前念不是佛後念不是眾生所以一切色是佛色一切聲是佛聲舉著一理一切理皆然見一事見一切事見一心見一切心見一道見一切道一切處無不是道見一塵十方世界山河大地皆然見一滴水即見十方世界一切性水又見一切法即見一切心一切法本空心即不無不無即妙有有亦不有不有即有即真空妙有既若如是十方世界不出我之一心一切微塵國土不出我之一念若然說甚麼內之與外如蜜性甜一切蜜皆然不可者個蜜甜餘底苦也何處有與麼事所以道虗空無內外法性自爾虗空無中間法性自爾故眾生即佛佛即眾生眾生與佛元同一體生死涅槃有為無為元同一體世間出世間乃至六道四生山河大地有性無性亦同一體言同者名相亦空有亦空無亦空盡恒沙世界元是一空既若如此何處有佛度眾生何處有眾生受佛度何故如此萬法之性自爾故若作自然見即落自然外道若作無我無我所見墮在三賢十聖位中你如今云何將一尺一寸便擬量度虗空他分明向汝道法法不相到法自寂故當處自住當處自真以身空故名法空以心空故名性空身心總空故名法性空乃至千途異說皆不離你之本心如今說菩提涅槃真如佛性二乘菩薩者為指葉為黃金拳掌之說若也展手之時一切大眾若天若人皆見掌中都無一物所以道本來無一物何處有塵埃本既無物三際本無所有故學道人單刀直入須見者個意始得故達磨大師從西天來至此土經多少國土祇覓得可大師一人密傳心印印你本心以心印法以法印心心既如此法亦如此同真際等法性法性空中誰是授記人誰是成佛人誰是得法人他分明向你道菩提者不可以身得身無相故不可以心得心無相故不可以性得性即便是本源自性天真佛故不可以佛更得佛不可以無相更得無相不可以空更得空不可以道更得道本無所得無得亦不可得所以道無一法可得祇教你了取本心當下了時不得了相無了無不了相亦不可得如此之法得者即得得者不自覺知不得者亦不自覺知如此之法從上已來有幾人得知所以道天下忘己者有幾人如今於一機一境一經一教一世一時一名一字六根門前領得與機關木人何別忽有一人出來不於一名一相上作解者我說此人盡十方世界覓者個人不可得以無第二人故繼於祖位亦云釋種無雜純一故言王若成佛時王子亦隨出家此意大難知祇教你莫覓覓便失却如癡人山上呌一聲響從谷出便走下山趁及乎覓不得又呌一聲山上響又應亦走上山上趁如是千生萬劫祇是尋聲逐響人虗生浪死漢汝若無聲即無響涅槃者無聞無知無聲絕跡絕蹤若得如是稍與祖師隣房也上堂云即心是佛上至諸佛下至蠢動含靈皆有佛性同一心體所以達磨從西天來惟傳一心法直指一切眾生本來是佛不假修行但如今識取自心見自本性更莫別求云何識自心即如今言語者正是汝心若不言語又不作用心體如虗空相似無有相貌亦無方所亦不一向是無有而不可見故祖師云真性心地藏無頭亦無尾應緣而化物方便呼為智若不應緣之時不可言其有無正應之時亦無蹤跡既知如此如今但向無中棲泊即是行諸佛路經云應無所住而生其心一切眾生輪迴生死者意緣走作心於六道不停致使受種種苦淨名云難化之人心如猿猴故以若干種法制禦其心然後調伏所以心生種種法生心滅種種法滅故知一切諸法皆由心造乃至人天地獄六道修羅盡由心造如今但學無心頓息諸緣莫生妄想分別無人無我無貪瞋無憎愛無勝負但除應如許多種妄想性自本來清淨即是修行菩提法佛等若不會此意縱你廣學勤苦修行木食草衣不識自心皆名邪行盡作天魔外道水陸諸神如此修行當復何益誌公云本體是自心作那得文字中求如今但識自心息却思惟妄想塵勞自然不生淨名云唯置一牀寢疾而臥心不起也如今臥疾攀緣都息妄想歇滅即是菩提如今若心裏紛紛不定任你學到三乘四果十地諸位合殺祇向凡聖中坐諸行盡歸無常勢力皆有盡期猶如箭射於空力盡還墮却歸生死輪迴如斯修行不解佛意虗受辛苦豈非大錯誌公云未逢出世明師枉服大乘法藥如今但一切時中行住坐臥但學無心亦無分別亦無依倚亦無住著終日任運騰騰如癡人相似世人盡不識你你亦不用教人識不識心如頑石頭都無縫罅一切法透汝心不入兀然無著如此始有少分相應透得三界境過名為佛出世不漏心相名為無漏智不作人天業不作地獄業不起一切心諸緣盡不生即此身心是自由人不是一向不生祇是隨意而生經云菩薩有意生身是也忽疑訛若未會無心著相而作者皆屬魔業乃至作淨土佛事並皆成業乃名佛障障汝乃故被因果管束去住無自由分所以菩提等法本不是有如來所說皆是化人猶如黃葉為金權止小兒啼故實無有法名阿耨菩提如今既會此意何用區區但隨緣消舊業更莫造新殃心裏明明所以舊時見解總須捨却淨名云除去所有法華云二十年中常令除糞只是除去胸中作見解處又云蠲除戲論之糞所以如來藏本自空寂並不停留一法故經云諸佛國土亦復皆空若言佛道是修學而得如此見解全無交涉或作一機一境揚眉動目祇對相當便道契會也得證悟禪理也忽逢一人不解便道都無所知對他若得道理心中便歡喜若被他折伏不如他便即心懷惆悵如此心意學禪有何交涉任汝會得少許道理祇得個心所法禪道總沒交涉所以達磨面壁都不令人有見處故云忘機是佛道分別是魔軍此性縱汝迷時亦不失悟時亦不得天真自性本無迷悟盡十方虗空界元來是我一心體縱汝動用造作豈離虗空虗空本來無大無小無漏無為無迷無悟了了見無一物亦無人亦無佛絕纖毫的疑訛量是無依倚無粘綴一道清流是自性無生法忍何有擬議真佛無口不解說法真聽無耳其誰聞乎珍重又云但無一切心即名無漏智汝每日行住坐臥一切言語但莫著有為法出言瞬目盡同無漏如今末法向去多是學禪道者皆著一切聲色何不與我心心同虗空去如枯木石頭去如寒灰死火去方有少分相應若不如是他日盡被閻老子拷你在你但離却有無諸法心如日輪常在虗空光明自然不照而照不是省力底事到此之時無棲泊處即是行諸佛行便是應無所住而生其心此是你清淨法身名為阿耨菩提若不會此意縱你學得多知勤苦修行草衣木食不識自心盡名邪行又云你如今一切時中但學無心久久須實得為你力量小不能頓超但得三年五年或十年須得個入頭處自然會去為有貪瞋癡即立戒定慧本無煩惱焉有菩提故祖師云佛說一切法為度一切心我無一切心何用一切法本源清淨佛上更不著一物譬如虗空雖以無量珍寶莊嚴終不能住佛性同虗空雖以無量功德智慧莊嚴終不能住但迷本性轉不見耳所謂心地法門萬法皆依此心建立遇境即有無境即無不可於淨性上轉作境解所言定慧鑑用歷歷寂寂惺惺見聞覺知皆是境上作解暫為中下根人說即得若欲親證皆不可作如此見解言化城者二乘及十地等覺妙覺皆是權立接引之教並為化城言寶所者乃真心本佛自性之寶此寶不屬情量不可建立無佛無眾生無能無所何處有城若問此既是化城何處為寶所寶所不可指指即有方所非真寶所也故云在近而已不可定量言之但當體會契之即是言闡提者信不具也一切六道眾生乃至二乘不信有佛果皆謂之斷善根闡提菩薩者深信有佛法不見有大乘小乘佛與眾生同一法性乃謂之善根闡提凡人多為境礙心事礙理常欲逃境以安心屏事以存理不知乃是心礙境理礙事但令心空境自空但令理寂事自寂勿倒用心也凡人多不肯空心恐落於空不知自心本空愚人除事不除心智者除心不除事菩薩心如虗空一切俱捨所作福德皆不貪著然捨有三等內外身心一切俱捨猶如虗空無所取著然後隨方應物能所皆忘是為大捨若一邊行道布德一邊旋捨無希望心是為中捨若廣修眾善有所希望聞法知空遂乃不著是為小捨大捨如火燭在前更無迷悟中捨如火燭在旁或明或暗小捨如火燭在後不見坑穽故菩薩心如虗空一切俱捨過去心不可得是過去捨現在心不可得是現在捨未來心不可得是未來捨所謂三世俱捨自如來付法迦葉已來以心印心心心不異印著空即印不成文印著物即印不成法故以心印心心心不異能印所印俱難契會故得者少然心即無心得即無得佛有三身法身說自性虗通法報身說一切清淨法化身說六度萬行法法身說法不可以言語音聲形相文字而求無所說無所證自性虗通而已故曰無法可說是名說法報身化身皆隨機感現所說法亦隨事應根以為攝化皆非真法故曰報化非真佛亦非說法者問本來無一物無物便是否師云無亦不是菩提無是處亦無無知解問祇如目前虗空可不是境豈無指境見心乎師云甚麼心教汝向境上見設汝見得祇是個照境底心如人以鏡照面縱然得見眉目分明元來祇是形像何關汝事云若不因照何時得見師云若也涉因常須假物有什麼了時汝不見他向汝道撒手似君無一物徒勞謾說數千般云他若識了照亦無物耶師云若是無物更何用照你莫開眼寱語去纔作佛見便被佛障作眾生見被眾生障作凡作聖作淨作穢等見盡成其障障汝心故總成輪轉猶如獼猴放一捉一無有了期十方諸佛實無少法可得名為阿耨菩提祇是一心實無異相亦無光彩亦無勝負無勝故無佛相無負故無眾生相云心既無相豈得全無三十二相八十種好化度眾生耶師云三十二相屬相凡所有相皆是虗妄八十種好屬色若以色見我是人行邪道不能見如來問無邊身菩薩為甚麼不見如來頂相師云實無可見何以故無邊身菩薩便是如來不應更見祇教你不作佛見不落佛邊不作眾生見不落眾生邊不作有見不落有邊不作無見不落無邊不作凡見不落凡邊不作聖見不落聖邊但無諸見即是無邊身若有見處即名外道外道者樂於諸見菩薩於諸見而不動如來者即諸法如義所以云彌勒亦如也眾聖賢亦如也如即無生如即無滅如即無見如即無聞如來頂即是圓見亦無圓見故不落圓邊所以佛身無為不墮諸數權以虗空為喻圓同太虗無欠無餘等閒無事莫強辨他境辨著便成識所以云圓成同識海流轉若飄蓬學道人莫疑四大為身四大無我我亦無主故知此身無我亦無主五陰為心五陰無我亦無主故知此心無我亦無主六根六塵六識和合生滅亦復如是十八界既空一切皆空唯有本心蕩然清淨學般若人不見有一法可得絕意三乘惟一真實不可證得謂我能證能得皆增上慢人法華會上拂衣而去者皆斯徒也故佛言我於菩提實無所得默契而已凡人臨欲終時但觀五蘊皆空四大無我真心無恒不去不來生時性亦不來死時性亦不去湛然圓寂心境一如但能如是直下頓了不為三世所拘繫便是出世人也切不得有分毫趣向若見善相諸佛來迎及種種現前亦無心隨去若見惡相種種現前亦無心怖畏但自忘心同於法界便得自在此即是要節也惟直下頓了自心本來是佛無一法可得無一行可修此是無上道問教中云銷我億劫顛倒想不歷僧祇獲法身者如何師云若以三無數劫修行有所證得者盡恒沙劫不得若於一剎那中獲得法身直了見性者猶是三乘教之極談也何以故以見法身可獲故皆屬不了義教中收我此禪宗從上相承已來不曾教人求知求解只云學道早是接引之辭然道亦不可學情存學解却成迷道道無方所名大乘心此心不在內外中間實無方所第一不得作知解只是說汝如今情量處情量若盡心無方所此道天真本無名字問從上來皆云即心是佛未審即那個心是佛師云你有幾個心云為復即凡心是佛即聖心是佛師云你何處有凡聖心耶云即今三乘中說有凡聖和尚何得言無師云三乘中分明向你道凡聖心是妄你今不解反執為有將空作實豈不是妄妄故迷心汝但除却凡情聖境心外更無別佛祖師西來直指一切人全體是佛汝今不識執凡執聖向外馳騁還自迷心所以向汝道即心是佛一念情生即墮異趣無始已來不異今日無有異法故名成等正覺云和尚所言即者是何道理師云覓甚麼道理纔有道理便即心異云前言無始已來不異今日此理如何師云祇為覓故汝自異他汝若不覓何處有異云既是不異何更用說即師云汝若不認凡聖阿誰向你道即即若不即心亦不心可中心即俱忘阿你更擬向何處覓去問妄能障自心未審而今以何遣妄師云起妄遣妄亦成妄妄本無根祇因分別而有你但於凡聖兩處情盡自然無妄更擬若為遣他都不得有纖毫依執名為我捨兩臂必當得佛云既無依執當何相承師云以心傳心云若心相傳云何言心亦無師云不得一法名為傳心若了此心即是無心無法云若無心無法云何名傳師云汝聞道傳心將謂有可得也所以祖師云認得心性時可說不思議了了無所得得時不說知此事若教汝會何堪也問佛度眾生否師云實無眾生如來度者我尚不可得非我何可得佛與眾生皆不可得云現有三十二相及度眾生何得言無師云凡所有相皆是虗妄若見諸相非相即見如來問和尚現今說法何得言無僧亦無法師云汝若見有法可說即是以音聲求我若見有我即是處所法亦無法法即是心所以祖師云付此心法時法法何曾法無法無本心始解心心法實無一法可得名坐道場道場者祇是不起諸見悟法本空喚作空如來藏本來無一物何處有塵埃若得此中意逍遙何所論問諸佛如何行大慈悲為眾生說法師云佛慈悲者無緣故名大慈悲慈者不見有佛可成悲者不見有眾生可度其所說法無說無示其聽法者無聞無得譬如幻士為幻人說法者個法若為道我從善知識言下領得會也悟也者個慈悲若為汝起心動念學得他見解不悟自心究竟無益問如何是出三界師云善惡都莫思量當處便出三界如來出世為破三有若無一切心三界亦非有如一微塵破為百分九十九分是無一分是有摩訶衍不能勝出百分俱無摩訶衍始能勝出祖師直指一切眾生本心本體本來是佛不假修成不屬漸次不是明暗不是明故無明不是暗故無暗所以無無明亦無無明盡入我此宗門切須在意如此見得名之為法見法故名之為佛佛法俱無名之為僧喚作無為僧亦名一體三寶夫求法者不著佛求不著法求不著眾求應無所求不著佛求故無佛不著法求故無法不著眾求故無僧問如何是道如何修行師云道是何物汝欲修行問諸方宗師相承參禪學道如何師云接引鈍根人語未可依憑云此即是接引鈍根人語未審接上根人復說何法師云若是上根人何處更就人覓他自己尚不可得何況更別有法當情不見教中云法法何狀云若如此則都不要求覓也師云若與麼則省心力云如此則渾成斷絕不可是無也師云阿誰教他無他是阿誰你擬覓他云既不許覓何故又言莫斷他師云若不覓便休即誰教你斷你見目前虗空作麼生斷他云此法可得便同虗空否師云虗空早晚向你道有同有異我暫如此說你便向這裏生解云應是不與人生解耶師云我不曾障你要且解屬於情情生則智隔云向這裏莫生情是否師云若不生情阿誰道是問六祖不會經書何得傳衣為祖秀上座是五百人首座為教授師講得三十二本經論云何不傳衣師云為他有心是有為法所修所證將為是也所以五祖付六祖六祖當時祗是默契得密授如來甚深意所以付法與他汝不見道法本法無法無法法亦法今付無法時法法何曾法若會此意方名出家兒方好修行若不信云何明上座走來大庾嶺頭尋六祖六祖便問汝來求何事為求衣為求法明上座云不為衣來但為法來六祖云汝且暫時斂念善惡都莫思量明乃稟語六祖云不思善不思惡正當與麼時還我明上座父母未生時面目來明於言下忽然默契便禮拜云如人飲水冷煖自知某甲在五祖會中枉用三十年工夫今日方省前非六祖云如是到此之時方知祖師西來直指人心見性成佛不在言說豈不見阿難問迦葉云世尊傳金襴外別傳何物迦葉召阿難阿難應諾迦葉云倒却門前剎竿著此便是祖師之標榜也甚生二字疑誤阿難三十年為侍者祇為多聞智慧被佛訶云汝千日學慧不如一日學道若不學道滴水也難消問聖人無心即是佛凡夫無心莫沉空寂否師云法無凡聖亦無沉寂法本不有莫作無見法本不無莫作有見有之與無盡是情見猶如幻翳所以云見聞如幻翳知覺乃眾生祖師門中只論息機忘見所以忘機則佛道隆分別則魔軍熾問心既本來是佛還修六度萬行否師云悟在於心非關六度萬行六度萬行盡是化門接物度生邊事設使菩提真如實際解脫法身直至十地四果聖位盡是度門非關佛心心即是佛所以一切諸度門中佛心第一但無生死煩惱等心即不用菩提等法問若無心行此道得否師云無心便是行此道更說什麼得與不得且如瞥起一念便是境若無一念便是境亡心自滅無復可追尋問如何得不落階級師云終日喫飯未曾齩著一粒米終日行未曾踏著一片地與麼時無人我等相終日不離一切事不被諸境惑方名自在人更時時念念不見一切相莫認前後三際前際無去今際無住後際無來安然端坐任運不拘方名解脫努力努力此門中千人萬人只得三個五個若不將為事受殃有日在故云著力今生須了却誰能累劫受餘殃問本既是佛那得更有四生六道種種形貌不同師云諸佛體圓更無增減流入六道處處皆圓萬類之中個個是佛譬如一團水銀分散諸處顆顆皆圓若不分時祗是一塊此一即一切一切即一種種形貌喻如屋舍捨驢屋入人屋捨人身至天身乃至聲聞緣覺菩薩佛屋皆是汝取捨處所以有別本源之性何得有別唐大中年終於本山諡斷際禪師
