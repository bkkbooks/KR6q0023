body:
  text: 六祖下第五世陳睦州尊宿諱道明江南陳氏之後也生時紅光滿室祥雲盖空旬日方散目有重瞳面列七星形相奇特秀出人表因往開元寺禮佛見僧如故知歸白父母願求出家父母聽許為僧後持戒精嚴學通三藏遊方契旨於黃檗諸方歸慕咸以尊宿稱後居開元恒織蒲鞋資以養母故復有陳蒲鞋之稱巢宼入境師標大草屨於城門巢欲棄之竭力不能舉歎曰睦州有大聖人舍城而去一日晚參謂眾曰汝等諸人還得個入頭處也未若未得個入頭處須覓個入頭處若得個入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚師曰早是孤負我了也又曰明明向你道尚自不會何況盖覆將來又曰老僧在此住持不曾見個無事人到來汝等何不近前時有一僧方近前師曰維那不在汝自領去三門外與二十棒曰某甲過在甚麼處師曰枷上更著杻師尋常見衲僧來即閉門或見講僧乃召曰座主主應諾師曰擔板漢雪竇云睦州只具一隻眼何故這僧喚既回頭因甚却成擔板師見僧乃曰見成公案放汝三十棒曰某甲如是師曰三門頭金剛為甚麼舉拳曰金剛尚乃如是師便打正法眼藏睦州見僧來云現成公案放汝三十棒雲峰悅云作賊人心虗妙喜曰又添得一個道了問冲密你道我恁麼道還有過也無密云作賊人心虗妙喜曰三個也有座主參師問莫是講唯識論否曰不敢師曰朝去西天暮歸唐土會麼曰不會師曰吽吽五戒不持問僧近離甚處曰仰山師曰五戒也不持曰某甲甚麼處是妄語師曰這裏不著沙彌紫衣大德到禮拜師拈帽子帶問曰這個喚作甚麼曰朝天帽師曰恁麼則老僧不卸也復問所習何業曰惟識師曰作麼生說曰三界惟心萬法惟識師指門扇曰這個是甚麼曰是色法師曰簾前賜紫對御談經何得不持五戒德無對問僧正云講得惟識論麼正云不敢小年曾讀文字來師拈起糖餅擘作兩片云你作麼生正無語師云喚作糖餅是不喚作糖餅是正云不可不喚作糖餅師却喚沙彌來來你喚作甚麼彌云糖餅師云你也講得惟識論徑山杲云僧正與沙彌真實講得惟識論只是不知糖餅來處睦州老人雖是一方善知識若是三界惟心萬法惟識畢竟理會不得問如何是曹溪的的意師曰老僧愛瞋不愛喜曰為甚麼如是師曰路逢劒客須呈劒不是詩人莫獻詩師問武陵長老了即毛端吞巨海始知大地一微塵長老作麼生曰問阿誰師曰問長老曰何不領話師曰汝不領話我不領話雪竇拈云墮也墮也復云這個葛藤老漢好與劃斷拈拄杖云甚麼處去也問一句道盡時如何師曰義墮也曰甚麼處是學人義墮處師曰三十棒教誰喫問某甲講兼行脚不會教意時如何師曰灼然實語當懺悔曰乞師指示師曰汝若不問老僧即緘口無言汝既問老僧不可緘口去也曰請師便道師曰心不負人面無慙色問僧甚處來僧云那邊劄師曰老僧屈僧云和尚即得師曰擔枷過狀擗脊便打雲峰院云睦州何用繁詞那邊劄擗脊便打問高揖釋迦不拜彌勒時如何師曰昨日有人問趂出了也曰和尚恐某甲不實那師曰拄杖不在苕帚柄聊與三十問如何是觸途無滯底句師曰我不恁麼道曰師作麼生道師曰箭過西天十萬里却向大唐國裏等候有僧名宗闡來參云宗闡咨和尚師云住僧便住師咄云名也不識又云有闡即判快道快道僧無對新到參方禮拜師叱曰闍黎因何偷常住果子喫曰學人纔到和尚為甚麼道偷果子師曰贓物現在問僧幾人新到云五人師云瓦解氷消僧云和尚未曾有問師云賊把贓為驗問講金剛經僧荷擔如來即不問你寺門前金剛為甚麼入你鼻孔裏僧云和尚甚麼說話師云你講得夢裏問僧何處來云靈山來師云涅槃是第幾座僧無對師又問迦葉甚麼處去僧云不知師云脫空妄語漢問僧甚麼處來云靈山來師云近日打殺一門僧是否僧無語師云這個蝦蟇問寺門前金剛拓即乾坤大地不拓即絲髮不逢時如何師曰吽吽我不曾見此師却問先跳三千倒退八百你合作麼生曰諾師曰先責一紙罪狀好便打其僧擬出師曰來我共你葛藤拓即乾坤大地你且道洞庭湖水深多少曰不曾量度師曰洞庭湖又作麼生曰祇為今時師曰祇這葛藤尚不會便打僧參師曰汝是新到否曰是師曰且放下葛藤會麼曰不會師曰擔枷陳狀自領出去僧便出師曰來來我實問你甚處來曰江西師曰泐潭和尚在汝背後怕你亂道見麼僧無對師聞一老宿難親近躬往相訪纔入方丈宿便喝師側掌曰兩重公案宿曰過在甚麼處師曰這野狐精便退問僧近離甚處僧便喝師曰老僧被你一喝僧又喝師曰三喝四喝後作麼生僧無語師便打曰這掠虗漢問教意祖意是同是別師曰青山自青山白雲自白雲曰如何是青山師曰還我一滴雨來曰道不得請師道師曰法華鋒前陣涅槃句後收後又有僧問巴陵教意祖意是同是別陵云雞寒上樹鴨寒下水雪竇拈云問既一般答亦相似其中利他自利瞞人自瞞若人點檢分明管取解空第一問如何是展演之言師曰量才補職曰如何是不展演之言師曰伏惟尚饗上堂裂開也在我揑聚也在我時有僧問如何是裂開師曰三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生曰某甲不與麼道師曰盞子撲落地碟子成七片曰如何是揑聚師乃斂手而坐雲峰悅云相罵饒汝接嘴相唾饒汝潑水問以一重去一重即不問不以一重去一重時如何師曰昨朝栽茄子今日種冬瓜僧問一氣還轉得一大藏教也無師曰有甚麼饆饠䭔子快下將來妙喜曰五更侵早起更有夜行人陞座云首座聻答云在寺主聻答云在維那聻答云在師云三段不同今當第一向下文長付在來日下座示眾大事未明如喪考妣大事既明如喪考妣僧問青峰楚大事已明為甚麼亦如喪考妣楚云不得春風花不開及至花開又吹落示眾我見百丈不識好惡大眾纔集以拄杖一時打下復召大眾眾回首乃云是甚麼有甚共語處又黃檗和尚亦然復召大眾眾回首乃云月似彎弓少雨多風猶較些子師臨終召門人曰此處緣息吾當逝矣乃跏趺而寂郡人以香薪焚之舍利如雨乃收靈骨建塔於寺壽九十八臘七十六福州烏石山靈觀禪師尋常扃戶人罕見之一日雪峰伺便扣門師開門峰驀胸搊住曰是凡是聖師唾曰這野狐精便推出閉却門峰曰也祇要識老兄雪峰至敲門師曰誰峰云鳳皇兒師云作甚麼峰云來啗老鸛師便開門扭住云道道峰擬議師便托開閉却門峰住後示眾云我當時若入得老觀門你這一隊噇酒糟漢向甚處摸索曹山行脚時問如何是毗盧師法身主師曰我若向你道即別有也曹山舉似洞山山曰好個話頭祇欠進語何不問為甚麼不道曹却來進前語師曰若言我不道即瘂却我口若言我道即謇却我舌曹山歸舉似洞山山深肯之益州大隨法真禪師妙齡夙悟徧參知識次至大溈會下數載食不至充臥不求煖清苦鍊行溈深器之一日問曰闍黎在老僧此間不曾問一轉話師曰教某甲向甚麼處下口溈曰何不道如何是佛師便作手勢掩溈口溈歎曰子真得其髓僧問路逢古佛時如何師曰你忽逢驢駝象馬喚作甚麼僧問劫火洞然大千俱壞未審這個壞不壞師曰壞曰恁麼則隨他去也師曰隨他去僧不肯後到投子舉前話子遂裝香遙禮曰西川古佛出世謂其僧曰汝速回去懺悔僧回大隨師已歿僧再至投子子亦遷化後僧問修山主劫火洞然大千俱壞未審這個壞不壞主曰不壞僧曰為甚麼不壞主曰為同大千問僧甚處去曰西山住菴去師曰我向東山頭喚汝汝便來得麼曰不然師曰汝住菴未得問僧甚處去曰峨嵋禮普賢去師舉拂子曰文殊普賢總在這裏僧作圓相拋向後乃禮拜師喚侍者取一帖茶與這僧因燒畬次見一蛇以杖挑向火中咄云這個形骸猶自不放捨你向這裏死如暗得燈時有僧問正當恁麼時還有罪也無師曰石虎呌時山谷響木人吼處鐵牛驚菴側有一龜僧問一切眾生皮裹骨這個眾生為甚骨裹皮師拈草履覆龜背上僧無語白雲端頌云分明皮上骨團團卦畫重重更可觀拈起草鞋都盖了大隨却被這僧瞞佛燈珣頌云法不孤起仗境方生烏龜不解上壁草鞋隨人脚行有僧舉覆龜話問南臺圓圓以手反覆示之僧不薦復請益寶峰文文以偈示曰少室之妙訣隨根而密付大隨曾泄機南臺亦失護翻手與覆手脫履著龜處明明言外傳信向有今古擲金鐘輥鐵鼓水東流日西去蜀主賜師紫衣師號并遣內侍朱延溥奉侍三致三却忽一日上堂眾集定乃作患風勢告眾曰還有人醫得老僧口麼眾競送藥師竝不受經七日師自摑口令正復云如許多時鼓這兩片皮至今無人醫得於是齋前陞座辭眾儼然端坐告寂福州靈雲志勤禪師本州長谿人也初在溈山因見桃花悟道有偈曰三十年來尋劒客幾回落葉又抽枝自從一見桃花後直至如今更不疑溈覧偈詰其所悟與之符契囑曰從緣悟達永無退失善自護持有僧舉似玄沙沙云諦當甚諦當敢保老兄未徹在眾疑此語沙問地藏我恁麼道汝作麼生會藏云不是桂琛即走殺天下人妙喜曰一家有事百家忙又頌玄沙語打破鬼門關日輪正當午一箭中紅心大地無寸土寂音曰古之人有大機智故能遇緣即宗隨處作主巖頭和尚曰汝但識綱宗本無實法予甞與客論靈雲桃花偈因曰溈山老子無大人相便云從緣入者永無退失獨玄沙曰諦當甚諦當敢保老兄未徹在客問予未徹之處安在哉為作偈曰靈雲一見不再見紅白枝枝不著花叵耐釣魚船上客却來平地摝魚蝦住後上堂諸仁者所有長短盡至不常且觀四時草木葉落花開何況塵劫來天人七趣地水火風成壞輪轉因果將盡三惡道苦毛髮不曾添減惟根蒂神識常存上根者遇善友伸明當處解脫便是道場中下愚癡不能覺照沉迷三界流轉生死釋尊為伊天上人間設教證明顯發智道汝等還會麼僧問如何得出離生老病死師曰青山元不動浮雲任去來長生問混沌未分時含生何來師曰如露柱懷胎曰分後如何師曰如片雲點太清曰未審太清還受點也無師不答曰恁麼則含生不來也師亦不答曰直得純清絕點時如何師曰猶是真常流注曰如何是真常流注師曰似鏡長明曰向上更有事也無師曰有曰如何是向上事師曰打破鏡來與汝相見洪州新興嚴陽尊者初參趙州問一物不將來時如何州曰放下著師曰既是一物不將來放下個甚麼州曰放不下擔取去師於言下大悟後常有一蛇一虎隨從手中與食黃龍南頌一物不將來兩肩挑不起言下忽知非心中無限喜毒惡既忘懷蛇虎為知己光陰幾百年清風猶未已僧問如何是佛師曰土塊曰如何是法師曰地動也曰如何是僧師曰喫粥喫飯問如何是新興水師曰面前江裏徑山杲曰似這般法門恰似兒戲相似入得這般法門方安樂得人如真淨和尚拈提古今不在雪竇之下而末流傳習却成惡口小家只管問古人作麼生真如又如何下語楊岐又如何下語你管得許多閒事瘥病不假驢䭾藥若是對病與藥籬根拾得一莖草便可療病說甚麼朱砂附子人參自术揚州光孝院慧覺禪師問相國宋齊丘曰還會道麼宋曰若是道也著不得師曰是有著不得是無著不得宋曰總不恁麼師曰著不得底聻宋無對婺州木陳從朗禪師因金剛倒僧問既是金剛不壞身為甚麼却倒地師敲禪牀曰行住坐臥婺州新建禪師不度小師有僧問和尚年老何不畜一童子侍奉師云有眼暗耳聾口瘂底為我討一個來杭州多福和尚僧問如何是多福一叢竹師曰一莖兩莖斜曰學人不會師曰三莖四莖曲妙喜曰饒汝一莖兩莖斜三莖四莖曲還我多福一叢竹又如何話會益州西睦和尚上堂有俗士舉手曰和尚便是一頭驢師曰老僧被汝騎士無語去後三日再來白言某甲三日前著賊師拈杖趂出明州雪竇常通禪師邢州李氏子參長沙沙問何處人師曰邢州人沙曰我道汝不從彼來師曰和尚還曾住此否沙然之乃容入室問如何是三世諸佛出身處師曰伊不肯知有汝三世僧良久師曰薦否不然者且向著佛不得處體取時中常在識盡功亡瞥然而起即是傷他而況言句乎石梯和尚因侍者請浴師曰既不洗塵亦不洗體汝作麼生者曰和尚先去某甲將皁角來師呵呵大笑一日見侍者托鉢赴堂乃喚侍者者應諾師曰甚麼處去者曰上堂齋去師曰我豈不知汝上堂齋去者曰除此外別道個甚麼師曰我祇問汝本分事者曰和尚若問本分事某甲實是上堂齋去師曰汝不繆為吾侍者紫桐和尚僧問如何是紫桐境師曰汝眼裏著得沙麼曰大好紫桐境也不識師曰老僧不諱此事其僧擬出去師下禪牀擒住曰今日好個公案老僧未得分文入手曰賴遇某甲是僧師拓開曰禍不單行日容遠和尚因奯上座參師拊掌三下曰猛虎當軒誰是敵者奯曰俊冲天阿誰捉得師曰彼此難當奯曰且休未要斷這公案師將拄杖舞歸方丈奯無語師曰死却這漢也襄州關南道吾和尚始經村墅聞巫者樂神云識神無忽然省悟後參常禪師印其所解復遊德山之門法味彌著住後凡上堂戴蓮華笠披襴執簡擊鼓吹𥴦口稱魯三郎神識神不識神神從空裏來却往空裏去便下座有時曰打動關南鼓唱起德山歌僧問如何是祖師西來意師以簡揖曰喏趙州訪師師乃著豹皮裩執吉獠棒在三門下翹一足等候纔見州便高聲唱喏而立州曰小心祇候著師又唱喏一聲而去漳州羅漢和尚初參關南問如何是大道之源南打師一拳師遂有省乃為歌曰咸通七載初參道到處逢言不識言心裏疑團若栲栳三春不樂止林泉忽遇法王氈上坐便陳疑懇向師前師從氈上那伽起袒膊當胸打一拳駭散疑團獦狚落舉頭看見日初圓從茲蹬蹬以碣碣直至如今常快活只聞肚裏飽膨脝更不東西去持鉢妙喜曰可惜這一拳分付不著人瑞州末山尼了然禪師因灌溪閑和尚到曰若相當即住不然即推倒禪牀便入堂內師遣侍者問上座遊山來為佛法來溪曰為佛法來師乃陞座溪上參師問上座今日離何處曰路口師曰何不盖却溪無對始禮拜問如何是末山師曰不露頂曰如何是末山主師曰非男女相溪乃喝曰何不變去師曰不是神不是鬼變個甚麼溪於是伏膺作園頭三年溪初參臨濟被濟驀𮌎搊住溪曰領領濟拓開曰且放汝一頓溪離臨濟乃至師所溪住後上堂曰我在臨濟處得半杓末山處得半杓共成一杓喫了直至如今飽不饑溪會下一僧去參石霜霜問甚處來曰灌溪來霜曰我南山不如他北山僧無對回舉似溪溪曰何不道灌溪修涅槃堂了也唐乾寧二年五月二十九日問侍者曰坐死者誰曰僧伽溪曰立死者誰曰僧會溪乃行七步垂手而逝溪濟下尊宿因錄見末山語檢燈錄見化跡卓絕遂并錄於此婺州金華山俱胝和尚初住菴時有尼名實際來戴笠子執錫遶師三帀曰道得即下笠子如是三問師皆無對尼便去師曰日勢稍晚何不且住尼曰道得即住師又無對尼去後師歎曰我雖處丈夫之形而無丈夫之氣不如棄菴往諸方參尋知識去其夜山神告曰不須離此將有肉身菩薩來為和尚說法也逾旬果天龍和尚到菴師乃迎禮具陳前事龍竪一指示之師當下大悟自此凡有學者參問師惟舉一指無別提唱有一供過童子每見人問事亦竪指祇對人謂師曰和尚童子亦會佛法凡有問皆如和尚竪指師一日潛袖刀子問童曰聞你會佛法是否童曰是師曰如何是佛童竪起指頭師以刀斷其指童呌喚走出師召童子童回首師曰如何是佛童舉手不見指頭豁然大悟師將順世謂眾曰吾得天龍一指頭禪一生用不盡言訖示滅玄沙云我當時若見抝折指頭玄覺云且道玄沙恁麼道意作麼生雲居錫云祇如玄沙恁麼道肯伊不肯伊若肯何言抝折指頭若不肯俱胝過在甚麼處先曹山云俱胝承當處鹵莽祇認得一機一境一等是柏手拊掌是它西園奇怪玄覺又云且道俱胝還悟也無若悟為甚麼道承當處鹵莽若不悟又道用一指頭禪不盡且道曹山意在甚麼處瑯琊覺頌俱胝一指報君知朝生子搏天飛若無舉鼎拔山力千里烏騅不易騎雪竇顯頌對揚深愛老俱胝宇宙空來更有誰曾向滄溟下浮木夜濤相共接盲龜袁州仰山慧寂通智禪師韶州懷化葉氏子年九歲於廣州和安寺投通禪師出家即不語通十四歲父母取歸欲與婚媾師不從遂斷手二指跪致父母前誓求正法以答劬勞父母乃許再詣通處而得披剃未登具即遊方初謁躭源已悟玄旨後參溈山遂升堂奧躭源謂師曰國師當時傳得六代祖師圓相共九十七個授與老僧乃曰吾滅後三十年南方有一沙彌到來大興此教次第傳授無令斷絕我今付汝汝當奉持遂將其本過與師師接得一覧便將火燒却躭源一日問前來諸相甚宜秘惜師曰當時看了便燒却也源曰吾此法門無人能會惟先師及諸祖師諸大聖人方可委悉子何得焚之師曰慧寂一覽已知其意但用得不可執本也源曰然雖如此於子即得後人信之不及師曰和尚若要重錄不難即重集一本呈上更無遺失源曰然躭源上堂師出眾作此相以手拓呈了却叉手立源以兩手相交作拳示之師進前三步作女人拜源點頭師便禮拜師浣衲次躭源曰正恁麼時作麼生師曰正恁麼時向甚麼處見後參溈山溈問汝是有主沙彌無主沙彌師曰有主曰主在甚麼處師從西過東立溈異之師問如何是真佛住處溈曰以思無思之妙反思靈𦦨之無窮思盡還源性相常住事理不二真佛如如師於言下頓悟自此執侍前後盤桓十五載宗門統要載溈山問師聞子在百丈處問一答十佛法向上一句作麼生道師擬開口溈便喝師因發心看牛於山下三年乃悟按燈錄師未甞見百丈此必以香嚴事訛承耳參巖頭頭舉起拂子師展坐具巖拈拂子置背後師將坐具搭肩上而出巖曰我不肯汝放祇肯汝收師在溈山為直歲作務歸溈問甚麼處去來師曰田中來溈曰田中多少人師插鍬叉手溈曰今日南山大有人刈茅師拔鍬便行玄沙云我若見即踏倒鍬子僧問鏡清仰山插鍬意旨如何清云狗銜赦書諸侯避道云祇如玄沙踏倒意旨如何清云不奈船何打破戽斗云南山刈茅意旨如何清云李靖三兄久經行陣雲居錫云且道鏡清下此一判著不著雪竇云諸方咸謂插鍬話奇特大似隨邪逐惡據雪竇見處仰山被溈山一問直得無繩自縛去死十分妙喜曰仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣僧問明招古人意在插鍬處叉手處招喚僧僧應諾招曰還曾夢見仰山麼評唱引長沙語汝見大唐天子還自種田割稻麼遂判仰山插鍬是奴兒婢子邊事不直以一杓糞潑仰山且令長沙亦拈餘穢諸師拈提已為畫蛇添足然世有此引盲比丘則諸師所拈猶足為啟膜金鎞師因歸溈山省覲溈問子既稱善知識爭辨得諸方來者知有不知有有師承無師承是義學是玄學子試說看師曰慧寂有驗處但見僧來便竪起拂子問伊諸方還說這個不說又曰這個且置諸方老宿意作麼生溈歎曰此是從上宗門中牙爪溈問大地眾生業識茫茫無本可據子作麼生知他有之與無師曰慧寂有驗處時有一僧從面前過師召曰闍黎僧回首師曰和尚這個便是業識茫茫無本可據溈曰此是師子一滴乳迸散六斛驢乳掃地次溈問塵非掃得空不自生如何是塵非掃得師掃地一下溈曰如何是空不自生師指自身又指溈溈曰塵非掃得空不自生離此二途又作麼生師又掃地一下又指自身并指溈溈一日指田問師這丘田那頭高這頭低師曰却是這頭高那頭低溈曰你若不信向中間立看兩頭師曰不必立中間亦莫住兩頭溈曰若如是著水看水能平物師曰水亦無定但高處高平低處低平溈便休大慧云顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉喝一喝下座溈山餧鵶生飯回頭見師曰今日為伊上堂一上師曰某甲隨例得聞溈曰聞底事作麼生師曰鵶作鵶鳴鵲作鵲噪溈曰爭奈聲色何師曰和尚適來道甚麼溈曰我祇道為伊上堂一上師曰為甚麼喚作聲色溈曰雖然如此驗過也無妨師曰大事因緣又作麼生驗溈竪起拳師曰終是指東畫西溈曰子適來問甚麼師曰問和尚大事因緣溈曰為甚麼喚作指東畫西師曰為著聲色故某甲所以問過溈曰竝未曉了此事師曰如何得曉了此事溈曰寂子聲色老僧東西師曰一月千江體不分水溈曰應須與麼始得師曰如金與金終無異色豈有異名溈曰作麼生是無異名底道理師云瓶盤釵釧券盂盆溈曰寂子說禪如師子吼驚散狐狼野干之屬溈山問師忽有人問汝汝作麼生祇對師曰東寺師叔若在某甲不致寂寞溈曰放汝一個不祇對罪師曰生之與殺祇在一言溈曰不負汝見別有人不肯師曰阿誰溈指露柱曰這個師曰道甚麼溈曰道甚麼師曰白鼠推遷銀臺不變師住東平時溈山令僧送書并鏡與師師上堂提起示眾曰且道是溈山鏡東平鏡若道是東平鏡又是溈山送來若道是溈山鏡又在東平手裏道得則留取道不得則撲破去也眾無語師撲破便下座師問雙峰師弟近日見處如何曰據某見處實無一法可當情師曰汝解猶在境曰某祇如此師兄又如何師曰汝豈不知無一法可當情者溈山聞曰寂子一句疑殺天下人師臥次僧問曰法身還解說法會元無法身法字統要頌古等皆有法字也無師曰我說不得別有一人說得曰說得底人在甚麼處師推出枕子溈山聞曰寂子用劒刃上事妙喜曰溈山真是憐兒不覺醜仰山推出枕子已是逗漏更著個名字喚作劒刃上事誤他學語之流便恁麼承虗接響流通將去妙喜雖似借水獻花要且理無曲斷即今莫有旁不肯者出來我要問你推出枕子還當得法身說法也無師在溈山前坡牧牛次見一僧上山不久便下來師乃問上座何不且留山中僧曰祇為因緣不契師曰有何因緣試舉看曰和尚問某名甚麼某答歸真和尚曰歸真何在某甲無對師曰上座却回向和尚道某甲道得也和尚問作麼生道但曰眼裏耳裏鼻裏僧回一如所教溈曰脫空漫語漢此是五百人善知識語師在溈山牧牛時踢天泰上座問曰一毛頭師子現即不問百億毛頭百億師子現又作麼生師便騎牛歸侍立溈山次舉前話方了却見泰來師曰便是這個上座溈遂問百億毛頭百億師子現豈不是上座道泰曰是師曰正當現時毛前現毛後現泰曰現時不說前後溈山大笑師曰師子腰折也便下去溈山示眾曰一切眾生皆無佛性鹽官示眾曰一切眾生皆有佛性鹽官有二僧往探問既到溈山聞舉揚莫測其涯若生輕慢因一日與師言話次乃勸曰師兄須是勤學佛法不得容易師乃作此相以手拓呈了却拋向背後遂展兩手就二僧索二僧罔措師曰吾兄直須勤學佛法不得容易便起去時二僧却回鹽官行三十里一僧忽然有省乃曰當知溈山道一切眾生皆無佛性信之不錯便回溈山一僧更前行數里因過水忽然有省自歎曰溈山道一切眾生皆無佛性灼然有他恁麼道亦回溈山久依法席師臥次夢入彌勒內院眾堂中諸位皆足惟第二位空師遂就座有一尊者白槌曰今當第二位說法師起白椎曰摩訶衍法離四句絕百非諦聽諦聽眾皆散去及覺舉似溈溈曰子已入聖位師便禮拜龐居士問久嚮仰山到來為甚麼却覆師竪起拂子士曰恰是師曰是仰是覆士乃打露柱曰雖然無人也要露柱證明師擲拂子曰若到諸方一任舉似師坐次有僧翹一足云西天二十八祖亦如是唐士六祖亦如是天下老和尚亦如是某甲亦如是師下禪牀打四藤條雪竇云藤條未到打折因甚麼只與四下須是斬釘截鐵漢始得僧後到霍山自稱集雲峰下四藤條天下大禪佛參山云打鐘著僧驟步而去雪竇云這漢雖是見機而變爭奈有頭無尾圜悟勤云當時若不見機而變何處更有大禪佛闍黎只管喚作甚麼此句當有訛缺或有人問甚處是有頭無尾處什麼是見機而變處你若手忙脚亂老僧在你脚底師問東寺曰借一路過那邊還得否寺曰大凡沙門不可祇一路也別更有麼師良久寺却問借一路過那邊得否師曰大凡沙門不可祇一路也別更有麼寺曰祇有此師曰大唐天子決定姓金一日雨下天性上座謂師曰好雨師曰好在甚麼處性無語師曰某甲却道得性曰好在甚麼處師指雨性又無語師曰何得大智而默徑山杲云一人只知看雨一人只知指雨子細點檢將來大似釘樁搖櫓育王當時待他道好在甚麼處只向他道滴穿眼睛浸爛鼻孔或有個衲僧出來道育王也是釘樁搖櫓却許他具眼赤干行者聞鐘聲乃問有耳打鐘無耳打鐘師曰汝但問莫愁我答不得干曰旱個問了也師喝曰去劉侍御問了心之旨可得聞乎師曰若要了心無心可了無了之心是名真了陸希聲相公欲謁師先作此相封呈師開封於相下面書云不思而知落第二頭思而知之作第三首遂封回公見即入山師乃門迎公纔入門便問三門俱開從何門入師曰從信門入公至法堂又問不出魔界便入佛界時如何師以拂子倒點三下公便設禮又問和尚還持戒否師曰不持戒曰還坐禪否師曰不坐禪公良久師曰會麼曰不會師曰聽老僧一頌滔滔不持戒兀兀不坐禪釅茶三兩碗意在钁頭邊師却問承聞相公看經得悟是否曰弟子因看涅槃經有云不斷煩惱而入涅槃得個安樂處師竪起拂子曰祇如這個作麼生入曰入之一字也不消得師曰入之一字不為相公公便起去徑山曇珍頌云竪起拂子希聲設禮塵剎盡交光鳥啼花落裏仰山問會麼希聲曰不會從是維摩詰到來須倒退入之一字不為相公公便起去下載清風雲藏神女館雨到楚王宮關塞極天惟鳥道江湖滿地一漁翁師謂第一座曰不思善不思惡正恁麼時作麼生座曰正恁麼時是某甲放身命處師曰何不問老僧座曰正恁麼時不見有和尚師曰扶我教不起師問僧近離甚處曰南方師攝拄杖曰彼中老宿還說這個麼曰不說師曰既不說這個還說那個否曰不說師召大德僧應諾師曰參堂去僧便出師復召曰大德僧回首師曰近前來僧近前師便打雲門云仰山若無後語爭識得人師共一僧語旁有僧曰語底是文殊默底是維摩師曰不語不默底莫是汝否僧默然師曰何不現神通曰不辭現神通祇恐和尚收作教師曰鑒汝來處未有教外底眼僧參次便問和尚還識字否師曰隨分僧以手畫此相拓呈師以衣袖拂之僧又作此相拓呈師以兩手作背拋勢僧以目視之師低頭僧遶師一帀師便打僧遂出去徑山曇珍頌云西山白虎正猖狂東海青龍不可當兩手捉來令死鬬化成一片紫金霜師坐次見一僧從外來便問訊了向東邊叉手立以目視師師乃垂下左足僧却過西邊叉手立師垂下右足僧向中間叉手立師收雙足僧禮拜師曰老僧自住此未曾打著一人拈拄杖便打僧便騰空而去佛燈觀頌個僧東西叉手說盡六代圓相致使東土釋迦不免起模作樣陽關唱罷柳青青征塵望斷空惆悵覺海湛頌子晉吹笙和鳳鳴萼華雲外舞衣輕相將奏徧方諸曲玉樹流光滿紫清師坐次有僧來作禮師不顧其僧乃問師識字否師曰隨分僧乃右旋一帀曰是甚麼字師於地上書十字酬之僧又左旋一帀曰是甚麼字師改十字作卍字僧畫此相以兩手拓如修羅掌日月勢曰是甚麼字師乃畫此相對之僧乃作婁至德勢師曰如是如是此是諸佛之所護念汝亦如是吾亦如是善自護持其僧禮謝騰空而去時有一道者見經五日後遂問師師曰汝還見否道者曰某甲見出門騰空而去師曰此是西天羅漢故來探吾道道者曰某雖覩種種三昧不辨其理師曰吾以義為汝解釋此是八種三昧是覺海變為義海體則同然此義合有因有果即時異時總別不離隱身三昧也古人圓相即拈花吹毛一揆直示全提無容擬議百千法門河沙妙用皆從此出而不與百千法門河沙妙用為侶觀小釋迦遇梵僧所示八種三昧如善慧雲興三百問普賢瓶瀉二千酬雖窮極妙辯而初未有一語後之名字羅漢妄為鉢盂安柄人天眼目載五峰良五觀悟謂圓相總有六名曰圓相曰暗機曰義海曰字海曰意語曰默論有云畫此相者乃縱意畫此相者奪意此為相肯此為許相見此為舉函索盖答者當以則函盖相稱此為抱玉求鑒答者當於其中書某字答之此為鈎入索續答者當於厶字側添亻乃問者鈎入答者索續共成寶器相此為已成寶器相答者於中書土字答之此為玄印玄旨相獨脫超前眾相不著也審如是是猶市賈私為誌驗三尺牧豎語之故即無不喻雖有聖智不問不可強解矣謂入聖位者所建法幢乃如是乎又以三種生為大圓宗旨想生相生流注生故楞伽經義大圓或偶引示人耳非大圓所立也癡人前不得說夢往往如此有梵僧從空而至師曰近離甚處曰西天師曰幾時離彼曰今早師曰何太遲生曰遊山翫水師曰神通遊戲則不無闍黎佛法須還老僧始得曰特來東土禮文殊却遇小釋迦遂出梵書貝多葉與師作禮乘空而去自此號小釋迦一日指雪師子云還有過此色者麼雲門云當時但與推倒雪竇云雲門只解推倒不能扶起圜悟勤云且道仰山意在甚麼處莫是明一色邊事麼且得沒交涉雲門應時應節云但與推倒用拈仰山意又被雪竇拈道他只解推倒不解扶起且道雪竇意在什麼處上堂汝等諸人各自回光返照莫記吾言汝無始劫來背明投暗妄想根深卒難頓拔所以假設方便奪汝粗識如將黃葉止啼有甚麼是處亦如人將百種貨物與金寶作一鋪貨賣祇擬輕重來機所以道石頭是真金鋪成這裏是雜貨鋪有人來覓鼠糞我亦拈與他來覓真金我亦拈與他時有僧問鼠糞即不要請和尚真金師曰齧鏃擬開口驢年亦不會僧無對師云索喚則有交易不索喚則無我若說禪宗身邊要一人相伴亦無豈況有五百七百眾耶我若東說西說則爭頭向前采拾如將空拳誑小兒都無實處我今分明向汝說聖邊事且莫將心湊泊但向自己性海如實而修不要三明六通何以故此是聖末邊事如今且要識心達本但得其本不愁其末他時後日自具去在若未得本縱饒將情學他亦不得汝豈不見溈山和尚云凡聖情盡體露真常事理不二即如如佛師將順寂時在東平數僧侍立師示偈曰一二二三子平目復仰視兩口一無舌此是吾宗旨至日午陞座辭眾復說偈曰年滿七十七無常在今日日輪正當午兩手攀屈膝言訖以兩手抱膝而終閱明年南塔湧禪師遷靈骨歸仰山塔於集雲峰下諡智通禪師妙光之塔鄧州香嚴智閑禪師青州人徧參諸方在百丈時性識聰敏參禪不得洎丈遷化遂參溈山山問我聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句看師被一問直得茫然歸寮將平日看過底文字從頭要尋一句酬對竟不能得乃自歎曰畫餅不可充饑屢乞溈山說破山曰我若說似汝汝已後罵我去我說底是我底終不干汝事師遂將平昔所看文字燒却曰此生不學佛法也且作個長行粥飯僧免役心神乃泣辭溈山直過南陽覩忠國師遺跡遂憩止焉一日芟除草木偶拋瓦礫擊竹作聲忽然省悟遽歸沐浴焚香遙禮溈山讚曰和尚大慈恩踰父母當時若為我說破何有今日之事乃有頌曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤跡聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰曰此是心機意識著述得成待某甲親自勘過仰後見師曰和尚讚歎師弟發明大事你試說看師舉前頌仰曰此是夙習記持而成若有正悟別更說看師又成頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無仰曰如來禪許師弟會祖師禪未夢見在師復有頌曰我有一機瞬目視伊若人不會別喚沙彌仰乃報溈山曰且喜閑師弟會祖師禪也妙喜曰溈山晚年好則劇教得一棚肉傀儡直是可愛且作麼生是可愛處面面相看手脚動爭知語話在他人師初開堂溈山令僧送書并拄杖至師接得便哭蒼天蒼天僧曰和尚為甚麼如此師曰祇為春行秋令上堂若論此事如人上樹口銜樹枝脚不蹋枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出眾云樹上即不問未上樹時請和尚道師乃呵呵大笑雪竇云樹上道即易樹下道即難老僧上樹也致將一問來圜悟勤云你若纔生樹上樹下對與不對處轉生義路墮在常情卒難透得若是頂門上具眼底終不向對與不對處作解會未舉已前先知落處若擬議之間覿面蹉過或不落二邊對也不是不對也不是作麼生却得見古人意去妙喜云吞得栗棘蓬透得金剛圈了看這般說話也是泗州人見大聖保寧勇頌曲設多方老古錐那堪枝上更生枝好如良馬窺鞭影逐塊且非師子兒師有偈曰子啐母子覺母殻子母俱亡應緣不錯同道唱和玅云獨脚杭州徑山洪諲禪師佛日長老訪師師問伏承長老獨化一方何以薦遊峰頂日曰朗月當空挂氷霜不自寒師曰莫是長老家風也無日曰峭峙萬重關於中含寶月師曰此猶是文言作麼生是長老家風日曰今日賴遇佛日却問隱密全真時人知有道不得太省無辜時人知有道得於此二途猶是時人陞降處未審和尚親道自道如何道師曰我家道處無可道日曰如來路上無私曲便請玄音和一場師曰任汝二輪更互照碧潭雲外不相關日曰為報白頭無限客此回年少莫歸鄉師曰老少同輪無向背我家玄路勿參差日曰一言定天下四句為誰宣師曰汝言有三四我道其中一也無師因有偈曰東西不相顧南北與誰留汝言有三四我道一也無光化四年九月二十八日白眾而化滁州定山神英禪師因樹省和尚行脚時參問不落數量請師道師提起數珠曰是落不落樹曰圓珠三竅時人知有請師圓前話師便打樹拂袖便出師曰三十年後搥胸大哭去在樹住後示眾曰老僧三十年前至定山被他熱瞞一上不同小小雪竇舉云定山用即用爭奈險樹知即知要且未具擇法眼試請辨看師見首座洗衣遂問作甚麼座提起衣示之師曰洗底是甚衣座曰關中使鐵錢師喚維那移下座挂搭著京兆府米和尚令僧去問仰山曰今時還假悟也無仰曰悟即不無爭奈落在第二頭師深肯之又令僧問洞山曰那個究竟作麼生洞曰却須問他始得師亦肯之投子青拈師問仰山話云然仰山與麼道即得還免得自己落麼若免得更有一人大不肯在若免不得亦落第二頭米胡雖然肯他自己還有出身之路也無諸人試點檢看若點檢得出兩人瓦解氷消若點檢不得且莫造次復頌曰碧岫峰頭借問人指山窮處未安身雖然免得重陽令爭似靈苗不犯春僧問自古上賢還達真正理也無師曰達曰祇如真正理作麼生達師曰當時霍光賣假銀城與單于契書是甚麼人做曰某甲直得杜口無言師曰平地教人作保徑山杲舉此則語至契書是甚麼人做云徑山當時若作這僧即下一轉語塞却這老漢口且道下甚麼語良久云若教容易得便作等閑看元康和尚因訪石樓樓纔見便收足坐師曰得恁麼威儀周足樓曰汝適來見個甚麼師曰無端被人領過樓曰須是與麼始為真見師曰苦哉賺殺幾人來樓便起身師曰見則見矣動則不動樓曰盡力道不出定也師拊掌三下後有僧舉似南泉泉曰天下人斷這兩個漢是非不得若斷得與他同參襄州王敬初常侍視事次米和尚至公乃舉筆示之米曰還判得虗空否公擲筆入宅更不復出米致疑明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵伺供養主纔坐問曰昨日米和尚不審有甚麼言句便不相見公曰師子齩人韓盧逐塊米聞此語即省前繆遽出朗笑曰我會也我會也公曰會即不無你試道看米曰請常侍舉公乃竪起一隻箸米曰這野狐精公曰這漢徹也大溈喆云米胡雖然如是且只得一橛常侍云這漢徹去大似看樓打樓大溈即不然常侍雖是個俗漢筆下有生殺之權米胡是一方善知識要且出他圈䙡不得當時待他擲下筆但向道我從來疑著遮漢圜悟語錄載公初見睦州一日州問曰今日何故入院遲公曰看打毬來州曰人打毬馬打毬公曰人打毬州曰人困麼曰困州曰馬困麼曰困州曰露柱困麼公惘然無對歸至私第中夜忽然有省明日見州曰某甲會得昨日事也州曰露柱困麼曰困州遂許之亦見頌古聯珠鄭十三娘保福與甘長老相看纔坐定福便問承聞十三娘參見溈山是否曰是福曰溈山遷化向甚麼處去鄭起身偏牀而立甘曰閑時說禪口似懸河何不道取鄭曰鼓這兩片皮堪作甚麼甘曰不鼓這兩片皮又堪作甚麼鄭曰合取狗口鄭十三娘年十二歲時隨師姑到大溈纔禮拜起溈便問這個師姑甚麼處住姑云南臺江邊住溈便喝出又問背後老婆甚處住十三娘放身近前叉手立溈再問娘云早個呈似和尚了也溈云去娘纔下到法堂師姑云十三娘尋常道我會禪口似利劒今日被大師問著總無語娘云苦哉苦哉作這個眼目也道我行脚脫取衲衣來與十三娘著娘後又舉似羅山祇如十三娘參見溈山恁麼祇對還得平穩也無羅云不得無過娘云過在甚麼處羅叱之娘云錦上添花音釋卷十之十三嫗依據切於去聲老婦之稱摑古伯切音國批打也揑乃結切音涅握捺也劑音櫅拷苦浩切音考打也顆苦果切科上聲扈侯古切胡上聲後從田扈㧌莫報切音㡌撼也鏃在線切音賤轉軸欏音羅槅古覈切音革大車杌也彴職略切音酌橫木渡水曰彴墼古歷切音吉未燒塼坯切筴古協切音刦筯也又筴舉也賑止忍切音軫富也又舉救也賉息入切音悉敻呼眩切音絢營求也又與迥同𣔻待骨切音突植也又傳也𨜶於㦸切音益謇與𧮈同九輦切難也口吃也止言也媾居侯切音垢和也峭七肖切音俏山峻也峙丈几切池上聲峻峙山矻立也舀音遙上聲
