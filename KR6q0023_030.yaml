body:
  text: 六祖下第十六世嘉興府報恩法常首座于首楞嚴經深入義海謁雪巢機契命掌箋翰首衆報恩室中惟有矮榻餘無長物宣和庚子九月中語寺僧曰一月後不復留此十月二十一往方丈謁飯將曉書漁父詞於室門就榻收足而逝詞曰此事楞嚴曾露布梅花雪月交光處一笑寥寥空萬古風甌語迥然銀漢橫天宇蝶夢南華方栩栩斑斑誰跨豐干虎而今忘却來時路江山暮天涯目送鴻飛去左丞范冲居士字致虗由翰苑守豫章過圓通謁旻禪師茶罷曰某行將老矣墮在金紫行中去此事稍遠通呼內翰公應諾通曰何遠之有公躍然曰乞師再垂指示通曰此去洪都有四程公佇思通曰見即便見擬思即差公豁然有省又樞密吳居厚居士擁節歸鍾陵謁圓通曰某往赴省試過此過趙州關因問前住訥老透關底事如何訥曰且去做官今不覺五十餘年通曰曾明得透關底事麼公曰八次經過常存此念然未甚脫灑在通度扇與之曰請使扇公即揮扇通曰有甚不脫灑處公忽有省曰便請末後句通乃揮扇兩下公曰親切親切通曰吉獠舌頭三千里又諫議彭汝霖居士手寫觀音經施圓通通拈起曰這個是觀音經那個是諫議經公曰此是某親寫通曰寫底是字那個是經公笑曰却了不得也通曰即現宰官身而為說法公曰人人有分通曰莫謗經好公曰如何即是通舉經示之公拊掌大笑曰嗄通曰又道了不得公禮拜又中丞盧航居士與圓通擁罏次公問諸家因緣不勞拈出直截一句請師指示通厲聲揖曰看火公急撥衣忽大悟謝曰灼然佛法無多子通喝曰放下著公應喏喏又左司都貺居士問圓通曰是法非思量分別之所能解如何湊泊通曰全身入火聚公曰畢竟如何會通曰驀直去公沉吟通曰可更喫茶麼公曰不必通曰何不恁麼會公契旨曰元來太近通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處通曰咦猶有這個在公曰乞師再垂指示通曰便恁麼去鐺是鐵鑄公頓首謝之臨安府徑山塗毒智䇿禪師初謁寂室光灑然有省次謁大圓於明之萬壽圓問曰甚處來師曰天台來曰見智者大師麼師曰即今亦不少曰因甚在汝腳跟下師曰當面蹉過圓曰上人不耘而秀不扶而直一日辭去圓送之門拊師背曰寶所在近此城非實師頷之往豫章謁典牛道由雲居風雪塞路坐閲四十二日午時版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞板聲來牛曰是甚麼師曰打破虗空全無柄靶牛曰向上事未在師曰東家暗坐西家廝罵牛曰嶄然超出佛祖他日起家一麟足矣將示寂升座別衆囑門人以文祭之師危坐傾聽至尚饗為之一笑越兩日沐浴更衣集衆說偈曰四大既分飛烟雲任意歸秋天霜夜月萬里轉光輝俄頃泊然而逝平江府虎丘紹隆禪師初謁長蘆信禪師得其大略有傳圓悟語至者師讀之歎曰想酢生液雖未澆腸沃胃要且使人慶快第恨未聆謦咳耳遂由寶峰依湛堂客黃龍扣死心禪師次謁圓悟一日入室悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見悟曰頭上安頭師聞脫然契證悟叱曰見個甚麼師曰竹密不妨流水過悟肯之尋俾掌藏教有問悟曰隆藏主柔易若此何能為哉悟曰瞌睡虎耳慶元府育王端禪師依淨慈一禪師未幾偶聞僧擊露柱曰你何不說禪忽微省去謁諸名宿皆以頴邁見推晚謁圓悟於鍾阜一日悟問誰知正法眼藏向這瞎驢邊滅却即今是滅不滅師曰請和尚合取口好悟曰此猶未出常情師擬對悟擊之師頓去所滯紹興庚午十月初示微疾至十八日首座法全請遺訓師曰盡此心意以道相資語絶而逝火後目睛舌齒不壞其地發光終夕得設利者無數踰月不絶黃冠羅肇常平日問道於師適外歸獨無所獲翹誠哀請方與客食咀嚼間若有物吐哺則設利也大如菽色若琥珀好事者持去遂再拜於闍維所聞香奩有聲亟開所獲如前而差紅潤台州護國景元禪師因僧讀死心小參語云既迷須得個悟既悟須識悟中迷迷中悟迷悟雙忘却從無迷悟處建立一切法師聞而疑即趨佛殿以手拓開門扉豁然大徹繼而報事機辨逸發圓悟目為聱頭元侍者悟自題肖像付之有曰生平只說聱頭禪撞著聱頭如鐵壁平江府南峰雲辨禪師謁穹窿圓忽有得遂通所見圓曰子雖得入未至當也切宜著鞭乃辭扣諸席後參圓悟直入室才踵門悟曰看腳下師打露柱一下悟曰何不著實道取一句師曰師若搖頭弟子擺尾悟曰你試擺尾看師翻筋斗而出悟大笑臨安府靈隱慧遠禪師依靈巖徽微有省既謁圓悟聞舉龐居士不與萬法為侶因緣師忽頓悟仆於衆衆掖之師乃曰吾夢覺矣至夜小參師出問曰淨裸裸空無一物赤骨力貧無一錢戶破家亡乞師賑濟悟曰七珍八寶一時拏師曰禍不入謹家之門悟曰機不離位墮在毒海師隨聲便喝悟以拄杖擊禪牀云喫得棒也未師又喝悟連喝兩喝師便禮拜自此機鋒峻發無所抵牾內翰曾開居士久參圓悟大慧之門紹興辛未值師領光孝開來謁問曰如何是善知識師曰燈籠露柱猫兒狗子開曰為甚麼贊即歡喜毀即煩惱師曰侍郎曾見善知識否開曰某三十年參問何言不見師曰向煩惱處見向歡喜處見開擬議師震聲便喝開擬對師曰開口底不是公開罔然師召曰侍郎向甚麼處去也開猛省點頭說偈曰咄哉瞎驢叢林妖孽震地一聲天機漏泄有人更問意如何拈起拂子劈口截師曰也祇得一橛知府葛剡志慕禪宗久無證入一日舉不是心不是佛不是物豁然有省說偈云非心非佛亦非物五鳳樓前山突兀艷陽影裏倒翻身野狐跳入金毛窟謁師求證師云居士見處祇可入佛未得入魔在葛禮拜師曰云何不道金毛跳入野狐窟葛乃頓領乙未秋示衆曰淳熙二年閏九月旦閙處莫出頭冷地著眼看明暗不相干彼此分一半一種作貴人教誰賣柴炭向你道不可毀不可讚體若虗空沒涯岸相喚相呼歸去來上元定是正月半都下喧傳而疑之明年忽示微疾果以上元揮偈安坐而化偈曰拗折稱錘掀翻露布突出機先鴉飛不度留七日顏色如生建康府華藏安民禪師初講楞嚴有聲謁圜悟聞舉國師三喚侍者因緣趙州拈云如人暗中書字字雖不成文彩已彰那裏是文彩已彰處師心疑之告香入室悟問座主講何經師曰楞嚴悟曰楞嚴經有七處徵心八還辨見畢竟心在甚麼處師多呈解悟皆不肻師復請益悟令一切處作文彩已彰會偶僧請益十玄談方舉問君心印作何顏悟厲聲曰文彩已彰師聞而有省遂求印證悟示以本色鉗鎚師則罔測一日白悟曰和尚休舉話待某說看悟諾師曰尋常拈槌竪拂豈不是經中道一切世界諸所有相皆即菩提妙明真心悟笑曰你元來在這裏作活計師又曰下喝敲牀時豈不是返聞聞自性性成無上道悟曰你豈不見經中道妙性圓明離諸名相師於言下釋然蘿湖作悚然無以酬悟出蜀居夾山師侍行夜參次悟舉僧問巖頭古帆未挂時如何頭曰後園驢喫草師未領遂求決悟曰你問我師舉前話悟曰庭前柏樹子師即洞明謂悟曰古人道如一滴投於巨壑殊不知大海投於一滴悟笑曰奈這漢何未幾令分座後謁佛鑑鑑問佛果有不曾亂為人說底句曾與你說麼師曰合取狗口鑑震聲曰不是這個道理師曰無人奪你茶鹽袋呌作甚麼鑑曰佛果若不為你說我為你說師曰和尚疑時退院別參去鑑呵呵大笑成都府昭覺道元禪師謁大別道因看廓然無聖之語忽爾失笑曰達磨元在這裏道譽之往參佛鑑佛眼皆蒙賞識次謁圓悟於金山悟不肯悟遷住雲居師從之雖有信入終以鯁膺之物未去為疑會悟問參徒生死到來時如何僧曰香臺子笑和尚次問師汝作麼生師曰草賊大敗悟曰有人問你時如何師擬答悟憑凌曰草賊大敗師即徹證悟以拳擊之師拊掌大笑悟曰汝見甚麼便如此師曰毒拳未報死劫不忘悟歸昭覺命首衆潭州大溈佛性法泰禪師圓悟住蔣山時師為座元有僧仲安者來謁悟因扣師遂領旨及師住德山遣安至蔣山通嗣書於悟時悟坐於丈室安捧書趨前悟曰千里馳達不辱宗風公案現成如何通信安曰覿面相呈更無回互悟曰此是德山底那個是專使底安曰豈有第二人悟曰背後底聻安便度書悟曰作家禪客天然猶在安曰分付與蔣山乃下通首座大衆書於僧堂前首座問曰玄沙白紙此自何來安呈起書曰見麼座遂引手接安復執却曰久默斯要不務速說今日拜呈幸希一鑒座便喝安曰作家首座座又喝安打一書座擬議安曰未明三八九不免自沉吟又以書打一下曰接悟與佛眼立於法堂盻其作略悟厲聲曰打我首座死也佛眼曰官馬廝踏有甚憑據安曰說甚官馬廝踏正是龍象蹴踏也悟曰喚來喚來安復至法堂上悟曰我五百衆中首座你為甚麼打他安曰和尚也喫一頓始得悟顧佛眼吐舌佛眼曰未在乃顧安而問曰只如空手把鉏頭步行騎水牛人從橋上過橋流水不流意作麼生安低躬曰所供竝是詣實悟笑曰元來是家裏人遂至五祖自禪師處自曰書裏說甚麼安曰文彩已彰自曰畢竟說甚麼安曰當陽揮寶劒自曰近前來這裏不識數字安曰莫詐敗自顧侍者曰這是那裏僧安曰多少人疑著侍者曰曾在和尚會下去自曰怪得恁麼滑頭安曰曾被和尚鈍置來自遂將書於爐上熏曰南無三滿多沒䭾喃安近前彈指而已安再至蔣山坐夏悟使分座接納秋辭歸悟曰子何所需安曰短歌須要十數丈長句只消三兩言悟以頌嘉賞之安後出世於鼎州靈巖源不深流不長安公得法于佛性其為專使藉甚于叢林佛性所詣可知矣嗟乎昔何林林今何寥寥也眉州象耳山袁覺禪師本名圓覺郡守填牒誤作袁以師族姓袁戲謂曰一字名可乎師曰一字已多守異之遍歷諸方後依佛性陳所見性曰汝忒煞遠在性每舉法華開示悟入四字令下語曰直待我竪點頭時方是也偶不職被斥制中無依寓俗士家一日誦法華至亦復不知何者是舍何者為火乃豁然制罷歸省性見首肯之時圓悟在雲居師往通所悟悟呵云本是淨地屙屎作麼師所疑頓釋臨安府中天竺中仁禪師諦窮經論於宗門未契圓悟居天寧凌晨謁之悟方為衆入室師見敬服奮然造前悟曰依經解義三世佛冤離經一字即同魔說速道速道師擬對悟劈口擊之因墜一齒即大悟眉州中巖華嚴祖覺禪師幼聰慧過目成誦著書排釋氏惡境忽現悔過出家依慧目能禪師未幾疽發膝上五年醫莫愈因書華嚴合論畢夜感異夢旦即捨杖步趨一日誦至現相品曰佛身無有生而能示出生法性如虗空諸佛於中住無住亦無去處處皆見佛遂悟華嚴宗旨嘗講于千部堂詞旨宏放衆皆歎服適南堂靜禪師至謂曰觀公講說獨步西南惜未離文字相耳倘能問道方外即今之周金剛也師欣然罷講南遊依圓悟于鍾阜一日入室悟舉德山道有言時踞虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂作麼生會師莫能對夙夜參究忽然有省作偈呈悟曰家住孤峰頂長年半掩門自嗟身已老活計付兒孫悟見許可次日入室悟問昨日公案作麼生師擬對悟便喝曰佛法不是這個道理師復留五年愈更迷悶後於廬山閲浮山遠禪師削執論云若道悟有疏親豈有栴檀林中却生臭草豁然契悟作偈寄悟曰出門依舊入蓬蒿天網不可逃誰信業緣無避處歸來不怕語聲高悟大喜持以示衆曰覺華嚴徹矣平江府明因曇玩禪師當詔僧為德士時入頭陀巖食松自全後依圓悟因舉桴擊鼓頓明大法後凡有所問法皆對曰莫理會故人亦稱為莫理會長老成都府昭覺道祖首座初見圓悟於即心即佛語下發明久之悟命分座一日為衆入室師忽問曰生死到來如何回避僧無對師擲下拂子奄然而逝衆皆眙愕悟聞至召曰祖首座師張目視之悟曰抖擻精神透關去師點頭竟爾趨寂樞密徐俯字師川每侍其父龍圖謁法昌及靈源語論終日公聞之藐如也及法昌歸寂在笑談間公異之始篤信及丁父憂念無以報罔極請靈源歸孝址說法源登座問答已乃曰諸仁者祇如龍圖讀萬卷書如水傳器涓滴不遺且道尋常著在甚麼處而今捨識之後這著萬卷書底又却向甚麼處著公聞灑然有得遂曰吾無憾矣源下座問曰學士適來見個甚麼便恁麼道公曰若有所見則鈍置和尚去也源曰恁麼則老僧不如公曰和尚是何心行源大笑靖康初為尚書外郎與朝士同志者挂鉢於天寧寺之擇木堂力參圜悟悟亦喜其見地超邁一日至書記寮指悟頂相曰這老漢腳跟猶未點地在悟䫌面曰甕裏何曾走却鱉公曰且喜老漢腳跟點地悟曰莫謗他好公休去郡王趙令襟參圓悟于甌阜公欣然就其爐錘悟不少假公固請悟曰此事要得相應直須是死一回始得公默契嘗自疏之其略曰家貧遭劫誰知盡底不存空室無人幾度賊來亦打悟見囑令加護紹興庚申冬謁大慧慧聞令擊鼓入室公欣然袖香趨之慧曰趙州洗鉢盂話居士作麼生會公曰討甚麼碗拂袖便出慧起搊住曰古人向這裏悟去你為甚麼不悟公擬對慧𢮁之曰討甚麼碗公曰還這老漢始得侍郎李彌遠普現居士參圜悟一日朝回至天津橋馬躍忽有省通身汗流直造天寧適悟出門遙見便喚曰居士且喜大事了畢公厲聲曰和尚眼花作麼悟便喝公亦喝於是機鋒迅捷凡與悟問答當機不讓及遷吏部方在壯歲遽乞祠祿歸閩連江築菴自娛一日示微恙索湯沐浴畢遂趺坐作偈曰漫說從來牧護今日分明呈露虗空拶倒須彌說甚向上一路擲筆而逝成都范縣君𡠉居歲久常坐而不臥聞圓悟住昭覺往禮拜請示入道因緣悟令看不是心不是佛不是物是個甚麼久無所契范泣告悟曰和尚有何方便令某易會悟曰却有個方便遂令祇看是個甚麼後有省曰元來恁麼近那宗門武庫至和尚有何方便令某易會悟曰有個方便不是心不是佛不是物范於此有省乃云元來得恁麼近常德府文殊心道禪師習惟識自以為至同舍詰之曰三界惟心萬法惟識目前萬象摐然心識安在師茫然遂遍參扣抵太平聞佛鑑夜參舉趙州柏樹子話至覺鐵觜云先師無此語莫謗先師好因大疑提撕既久一夕豁然即趨丈室擬敘所悟鑑見來便閉門師曰和尚莫瞞某甲鑑曰十方無壁落何不入門來師以拳擉破窗紙鑑即開門搊住云道道師以兩手捧鑑頭作口啐而出遂呈偈曰趙州有個柏樹話禪客相傳遍天下多是摘葉與尋枝不能直向根源會覺公說道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假鑑深然之潭州龍牙智才禪師得法佛鑑後謁黃龍死心心問曰會得最初句便會末後句會得末後句便會最初句最初末後拈放一邊百丈野狐話作麼生會師曰入戶已知來見解何勞再舉轢中泥心曰新長老死在上座手裏也師曰語言雖有異至理且無差心曰如何是無差底事師曰不扣黃龍角焉知頷下珠心便打上堂舉死心小參曰若論此事如人家有三子第一子聰明智慧孝養父母接待往來主掌家業第二子𠒋頑狡猾貪淫嗜酒倒街臥巷破壞家業第三子盲聾瘖啞菽麥不分是事不能祇會喫飯三人中黃龍要選一人用更有四旬死中有活活中有死死中常死活中常活將此四句驗天下衲僧師曰喚甚麼作四句三人姓甚名誰若也識得與黃龍把手竝行更無纖毫間隔如或未然不免借水獻花去也三人共體用非用四句同音空不空欲識三人并四句金烏初出一團紅師初住嶽麓開堂日僧問德山棒臨濟喝今日請師為拈掇師曰蘇嚕蘇嚕曰蘇嚕蘇嚕還有西來意也無師曰蘇嚕蘇嚕由是叢林呼為才蘇嚕居龍牙遷雲溪以清苦蒞衆衲子敬畏紹興戊午八月望俄集衆付寺事仍書偈曰戊午中秋之日出家住持事畢臨行自己尚無有甚虗空可覔其垂訓如常二十三日再集衆示問曰涅槃生死盡是空華佛及衆生竝為增語汝等諸人合作麼生衆皆下語不契師喝曰苦苦復曰白雲湧地明月當天言訖辴然而逝安吉州何山佛燈守珣禪師參佛鑑隨衆咨請邈無所入乃封其衾曰此生若不徹誓不展此於是書坐宵立如喪考妣逾七七日忽佛鑑上堂曰森羅及萬象一法之所印師聞頓悟往見鑑鑑曰可惜一顆明珠被這風顛漢拾得乃詰之曰靈雲道自從一見桃花後直至如今更不疑如何是他不疑處師曰莫道靈雲不疑只今覔個疑處了不可得鑑曰玄沙道諦當甚諦當敢保老兄未徹在那裏是他未徹處師曰深知和尚老婆心切鑑然之師拜起呈偈曰終日看天不舉頭桃花爛熳始擡眸饒君更有遮天網透得牢關即便休鑑囑令護持是夕厲聲謂衆曰這回珣上座穩睡去也圓悟聞得疑其未然乃曰我須勘過始得遂令人召至因與遊山偶到一水潭悟推師入水遽問曰牛頭未見四祖時如何師曰潭深魚聚悟曰見後如何師曰樹高招風悟曰見與未見時如何師曰伸腳在縮腳裏悟大稱之待制潘良貴依師久不契謂師曰某祇欲死去時如何師曰好個封皮且留著使用而今不了不當便去忽被他換却封皮卒無整理處公又以南泉斬猫兒話問曰某看此甚久終未透徹告和尚慈悲師曰你祇管理會別人家猫兒不知走却自家狗子公於言下如醉醒師復曰不易公進此一步更須知有向上事始得如今士大夫說禪說道祇依著義理便快活大率似將錢買油餈喫了便不饑其餘便道是瞞他亦可笑也公唯唯師嘗謂衆曰兄弟如有省悟處不拘時節請來露個消息雪夜有僧扣方丈門師起秉燭震威喝曰雪深夜半求決疑情因甚麼威儀不具僧顧視衣裓師逐出院師每曰先師祇年五十九吾年五十六矣來日無多紹興甲寅解制退天寧謂雙槐居士鄭績曰十月八日是佛鑑忌則吾時至矣乞還鄣南十月四日鄭公遣弟僧道如訊之師曰汝來正其時也先一日不著便後一日蹉過了吾雖與佛鑑同條生終不同條死明早可為我尋一隻小船子來如曰要長者要高者師曰高五尺許越三日雞鳴端坐如平時侍者請遺偈師曰不曾作得言訖而逝溫州龍翔士圭禪師醉心楞嚴逾五秋南遊謁諸尊宿始登龍門即以平時所得白佛眼眼曰汝解心已極但缺著力開眼耳俾職堂司一日侍立次問云絶對待時如何眼曰如汝僧堂中白椎相似師罔措眼晚至堂司師理前話眼曰間言語師遂大悟南康軍雲居善悟禪師在龍門日有僧被蛇傷足佛眼問曰既是龍門為甚却被蛇咬師即應曰果然現大人相後傳此語到昭覺圓悟云龍門有此僧耶東山法道未寂寥爾隆興府黃龍法忠禪師四明姚氏子十九試經得度習台教悟一心三觀之旨未能泯跡遍參名宿至龍門觀水磨旋轉發明心要乃述偈曰轉大法輪目前包裹更問如何水推石磨呈佛眼眼曰其中事作麼生師曰澗下水長流眼曰我有末後一句待分付汝師掩耳而出已而禮辭渡九江登廬阜露眠草宿相羊山水會意則居或數日不食或連宵不臥髮長不翦衣敝不易故禪會呼為忠道者死心禪師住黃龍學者奔湊至無所容因於季春結制限之師見心抗論不可投以偈曰莫怪狂僧罵死心死心結夏破叢林叢林明眼如相委此話須教播古今又迫暮持白木劒造死心而問曰聞老和尚不懼生死是否心擬對師即揮劒心引頸而笑師擲劒於地作舞而出馮給事濟川嘗有請師住勝業疏略曰佛眼磨頭悟法輪之常轉死心室內容慧劒以相揮時以為實録云宣和間湘潭大旱禱而不應師躍入龍淵呼曰業畜當雨一尺雨隨至居南嶽恆跨虎出遊儒釋望塵而拜普庵印肅禪師袁州宜春余氏子師將生鄰里望其室祥光燭天蓮生道周或現阡陌及生即善世言蓋政和五年乙未十一月二十七日辰時也及長一夕夢一僧點其胸曰汝他日當自省既寤白母黃氏視胸有赤點如含桃因遣師壽隆賢賢授以法華師曰諸佛玄旨貴悟於心數墨循行何益于道賢甚器之聞牧庵道風遂謁于湘之溈山問萬法歸一一歸何處牧庵竪拂示之有省歸壽隆時年二十九矣使牒請主慈化寺師利世不伐嘗言捨家出家當為何事披緇削髮本屬何因若不報國資家虗負皇恩若不導化檀那枉作釋子楮衣糲食脅不沾席者十有二年一日誦華嚴論至達本情亡知心體合豁然大悟遍體汗流曰我今親契華嚴法界矣遂示衆曰李公長者於華嚴大經之首痛下一槌擊碎三千大千世界如湯消雪不留毫髮許於後進者作得滯礙普庵老人一見不覺吞却五千四十八卷化成一氣充塞虗空方信釋迦老子出氣不得之句然後破一微塵出此華嚴經遍含法界無理不收無法不貫便見摩耶夫人是我身彌勒樓臺是我體善財童子是甚茄子文殊普賢與我同參不動道場遍周法界悲涕歡喜踴躍無量大似死中得活如夢忽醒良久云不可說不可說又不可說始信金剛經云信心清淨即生實相實相既生妄想相滅全體法身遍一切處方得大用現前即說偈曰揑不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來師一日舉似心齊圓通二子云達本情亡知心體合汝作麼生會二人相顧笑云未達明日各呈頌師因題云據宗眼看來句到意未到其體未合其情未亡乘便強占二詞調曰解佩令明眼人前覷著三十拄杖不饒為什麼如此不合雪上加霜其一云先天先地何名何樣阿曼陀無物比況觸目菩提自是人不肯承當且輪回滯名著相圓融法界無思無想廬陵米不用商量血脈才通便知道擊木無聲打虗空盡成金響其二云柏庭立雪一場敗闕了無為當下休歇百匝千圍但只這孤圓心月不揩磨鎮常皎潔無餘無缺無聽無說韶陽老祇得一橛十聖三賢聞舉著魂消膽裂惟普菴迥然寂滅俄有僧稱道存自蜀雪而來既見師曰此吾不請友也遂相徵詰棒喝交馳心心密契僧曰師再來人也大興吾道非師而誰因指雪書頌而別師自是廣津梁崇塔廟禦災捍患天動物與鬼神莫能測其變化諸異跡不可勝紀嘗自贊云蒼天蒼天悟無生法談不說禪開兩片皮括地該天如何是佛十萬八千乾道五年七月二十一日書偈于方丈之西壁云乍雨乍晴寶象明東西南北亂雲深失珠無限人遭劫幻應權機為汝清書畢跏趺而逝幻寄曰忠道者父子悟處與諸方等耳其神用乃能爾假令黃檗而在其脛懼不免黃檗十二傳而得忠十三傳而得肅養子不及父悲夫至謂天竺神通不傳真丹者又何嘗夢見忠父子矢溺氣耶肅之呪世間盛傳至被管弦而臨終一偈乃類雲門是可異矣衢州烏巨道行禪師示疾門弟子教授汪公喬年至省候師以後事委之示以偈曰識則識自本心見則見自本性識得本心本性正是宗門大病注曰爛泥中有刺莫道不疑好黎明沐浴更衣跏趺而逝南康軍雲居法如禪師遍參浙右諸宗匠晚至龍門以平日所證白佛眼眼曰此皆學解非究竟事欲了生死當求妙悟師駭然諦信一日命主香積以道業未辦固辭眼勉曰姑就職其中大有人為汝說法未幾晨興開厨門望見聖僧契所未契即白佛眼眼曰這裏還見聖僧麼師詣前問訊義手而立眼曰向汝道大有人為汝說法南康軍歸宗正賢禪師習經論過目成誦義亦頓曉大慈秀稱為經藏子出蜀扣諸尊宿後扣佛眼一日入室眼舉殷勤抱得栴檀樹語聲未絶師頓悟眼曰經藏子逗漏了也安吉州道場明辨禪師至少林聞僧舉佛眼以古詩發明罽賓王斬師子尊者話曰楊子江頭楊柳津楊花愁殺蕩舟人數聲羌笛離亭晚君向瀟湘我向秦師默有所契即趨龍門求入室佛眼問從上祖師方冊因緣許你會得忽舉拳曰這個因何喚作拳師擬對眼築其口曰不得作道理於是頓去知見室中垂問猫兒為甚麼愛捉老鼠虗堂湛頌云獨憐幽草㵎邊生上有黃鸝深樹鳴春潮帶雨晚來急野渡無人舟自橫又曰板鳴因甚麼犬吠雲峰潛頌云黃河遠上白雲間一片孤城萬仞山羌笛何須怨楊柳春風不度玉門關又曰蚯蚓為甚麼化為百合圓極岑頌云客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉葛待制勝携客造師室坐論天地一指萬物一馬滾滾不已師若不聞葛疑而問曰師謂何如師笑而不答良久厲聲喚待制葛倉皇應諾師曰天地一指萬物一馬葛欣然曰須是和尚始得臨終登座拈拄杖于左邊卓一下曰三十二相無此相於右邊卓一下曰八十種好無此好僧繇一筆畫成志公露出草藁又卓一下顧大衆曰莫懊惱直下承當休更討下座歸方丈儼然趺坐而逝蘿湖野録載師悟緣自聞僧舉至默有所契下乃云即趨龍門坐據居無何佛眼舉前話問之師擬對佛眼以手托開師趨出豁然大徹復回吐露佛眼拽杖逐之與燈録小異附志於此世奇首座瞌睡間羣蛙忽鳴誤聽為淨髮板響亟趨往有曉之者曰蛙鳴非板也師恍然詣方丈披露佛眼曰豈不見羅羅師遽止曰和尚不必舉待去自看未幾有省乃占偈曰夢中聞板響覺來蝦蟇啼蝦蟇與板響山嶽一時齊由是益加參究洞臻玄奧眼命分座師固辭曰此非細事也如金針刺眼毫髮若差睛則破矣願生生居學地而自煆煉暮年學者力請不容辭因說偈曰諸法空故我心空我心空故諸法同諸法我心無別體祇在而今一念中且道是那一念行罔措師喝一喝而終給事馮楫濟川居士自壯歲遍參後依佛眼一日同眼經行法堂偶童子趨庭吟曰萬象之中獨露身眼拊公背曰好聻公於是契入紹興丁巳除給事會大慧禪師就明慶開堂慧下座公挽之曰和尚每言於士大夫前曰此生決不作這蟲豸今日因甚却納敗闕慧曰盡大地是個杲上座你向甚處見他公擬對慧便掌公曰是我招得越月特丐祠坐夏徑山榜其室曰不動軒一日慧升座舉藥山參石頭馬祖得悟因緣慧拈罷公隨至方丈曰適來和尚所舉底因緣某理會得了慧曰你如何會公曰恁麼也不得蘇嚧娑婆訶不恁麼也不得㗭哩娑婆訶恁麼不恁麼總不得蘇嚧㗭哩娑婆訶慧印之以偈曰梵語唐言打成一塊咄哉俗人得此三昧公後知卭州所至宴晦無倦嘗自詠曰公事之餘喜坐禪少曾將脅到牀眠雖然現出宰官相長老之名四海傳至二十三年秋乞休致預報親知期以十月三十報終至日令後廳置高座見客如平時至辰巳間降階望闕肅拜請漕使攝卭事著僧衣履據高座囑諸官吏道俗各宜向道扶持教門建立法幢遂拈拄杖按膝泊然而化漕使請曰安撫去住如此自由何不留一頌以表罕聞公張目索筆書曰初三十一中九下七老人言盡龜哥眼赤竟爾長往公以建炎後名剎教藏多殘燬施印凡一百二十八藏有語録頌古行世台州釣魚臺石頭自回禪師世為石工從人口授法華能誦之投大隨供灑掃令取崖石手不釋鎚鑿誦經不輟隨見而語之曰今日硿磕明日硿磕生死到來如何折合師因設禮求究竟法隨令且罷誦經看趙州勘婆因緣師念念不去心久之因鑿石石稍堅盡力一鎚瞥見火光忽然省徹走至方丈禮拜呈頌曰用盡工夫渾無巴鼻火光迸散元在這裏隨欣然曰子徹也復獻趙州勘婆頌曰三軍不動旗閃爍老婆正是魔王腳趙州無柄鐵掃帚掃蕩烟塵空索索隨可之授以僧服俗呼為回石頭常德府梁山師遠禪師上堂舉楊岐三腳驢子話乃召大衆曰揚其湯者莫若撲其火壅其流者莫若杜其源此乃至人之明鑒佛法之正論正在斯焉這因緣如今叢林中提唱者甚多商量者不少有般底祇道宗師家無固必凡有所問隨口便答似則也似是即未是若恁麼祇作個乾無事會不見楊岐用處乃至祖師千差萬別門庭如何消遣又有般底祇向佛邊會却與自己沒交涉古人道凡有言句一一須消歸自己又作麼生又有般底一向祇作自己會棄却古人用處惟知道明自己事古人方便却如何消遣既消遣不下却似抱橋柱洗澡要且放手不得此亦是一病又有般底却去腳多少處會此病最難醫也所以他語有巧妙處學人卒難摸索才擬心則差了也前輩謂之楊岐宗旨須是他屋裏人到恁麼田地方堪傳授若不然者則守死善道之謂也這公案直須還他透頂徹底漢方能了得此非止禪和子會不得而今天下叢林中出世為人底亦少有會得者若要會去直須向威音那畔空劫已前輕輕覷著提起便行捺著便轉却向萬仞峰前進一步可以籠古今坐斷天下人舌頭如今還有恁麼者麼有則出來道看如無更聽一頌三腳驢子弄蹄行直透威音萬丈坑雲在嶺頭間不徹水流澗下太忙生湖南長老誰解會行人更在青山外莫將尚書字少虗官西蜀時謁南堂咨決心要堂使其向好處提撕適如廁聞穢氣急以手掩鼻遂有省即呈偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覔處得來元在鼻尖頭堂答曰一法才通法法周縱橫妙處更何求青蛇出匣魔軍伏碧眼胡僧笑點頭南堂大隨別號龍圖王蕭居士字觀復留昭覺日聞開靜板聲有省問南堂曰某有個見處才被人問却開口不得未審過在甚處堂曰過在有個見處堂却問朝斾幾時到任公曰去年八月四日堂曰自按察幾時離衙公曰前月二十堂曰為甚麼道開口不得公乃契悟無為軍冶父道川禪師崑山狄氏子初為縣之弓給聞東齊謙首座為道俗演法往從之習坐不倦一日因不職遭笞忽於杖下大悟遂辭役依謙謙為改名道川且曰汝舊呼狄三今名道川川即三耳汝能竪起脊梁了辦個事其道如川之增若放倒則依舊狄三也師銘於心建炎初圓頂遊方至天封蹣菴與語鋒投菴稱善歸憩東齊道俗尊事之座下學者請益金剛般若經因章為之頌盛行於世音釋卷二十八之三十屨居御切音踞革履璝同塊禳如羊切壤平聲禬古外切音膾除殃之祭珏吉嶽切音覺紿蕩海切臺上聲欺誑也又絲縈難理也噬時智切音誓齧也詪古很切根上聲難語貌靘七正切音倩青黑色也褾彼小切音表袖端又卷袠飾洊在殿切音薦水仍至也嗒託甲切音塔嗒然忘懷贛古暗切音紺水名讋質涉切詹入聲失氣而言也譍於京切音英以言對問笈音及書箱也淶郎水切音來水名師奸切音山涕流貌歃色洽切音霎盤者以血塗口曰歃血癰於容切音雍癰疸餧委切內上聲飢也汛思晉切音信酒也綟力霽切音例線也焯古灼字呿丘於切音嘔張口貌悶莫本切門上聲煩悶邂逅音械候不期而會鈐其廉切音拑鐵鈐鉏也堋蒲根切音彭喪葬下土栩虗呂切音許欣暢貌靶必駕切音霸嶄牀咸切暫平聲山尖鋭貌眙延知切音夷舉目貌視視同𢮁戈渚切音雨擊切硿磕音空搕石相築聲
