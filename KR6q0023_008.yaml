body:
  text: 六祖下第三世洪州百丈山懷海禪師福州長樂人王氏子兒時隨母入寺拜佛指佛像問母曰此為誰母曰佛也師曰形容與人無異我後亦當作佛丱歲離塵三學該練參馬大師為侍者檀越每送齋飯來師才揭開盤蓋馬大師便拈起一片胡餅示衆云是甚麼每每如此經三年一日侍馬祖行次見一羣野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚處去也師曰飛過去也祖遂把師鼻扭負痛失聲祖曰又道飛過去也師於言下有省雪竇頌野鴨子知何許馬祖見來相共語話盡雲山水月情依然不會還飛去却把住道道却歸侍者寮哀哀大哭同事問曰汝憶父母耶師曰無曰被人罵耶師曰無曰哭作甚麼師曰我鼻孔被大師扭得痛不徹同事曰有甚因緣不契師曰汝問取和尚去同事問大師曰海侍者有何因緣不契在寮中哭告和尚為某甲説大師曰是伊會也汝自問取他同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭如今為甚却笑師曰適來哭如今笑同事罔然次日馬祖升座衆才集師出卷却席祖便下座師隨至方丈祖曰我適來未曾説話汝為甚便卷却席師曰昨日被和尚扭得鼻頭痛祖曰汝昨日向甚處留心師曰鼻頭今日又不痛也祖曰汝深明昨日事師作禮而退師再參侍立次祖目視繩牀角拂子師曰即此用離此用祖曰汝向後開兩片皮將何為人師取拂子竪起祖曰即此用離此用師挂拂子於舊處祖振威一喝師直得三日耳聾未幾住大雄山以所處巖巒峻極故號百丈四方學者至一日謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之應作大用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜溈山問仰山百丈再參馬祖因緣此二尊宿意旨如何仰曰此是顯大機大用溈云馬祖出八十四人善知識幾人得大機幾人得大用仰云百丈得大機黃檗得大用餘者盡是唱導之師溈云如是如是汾州云悟去便休更説甚麼三日耳聾石門云若不三日耳聾爭得悟去汾州云我與麼道較他石門半月程東林總云當言不避截舌當罏不避火迸佛法豈可曲順人東林今日向驪龍窟內爭珠去也百丈大智不無他三日耳聾汾州石門爭免個二俱瞎漢只這三老還曾悟去也無良久云祖禰不了殃及兒孫又汾陽頌云每因無事侍師前師指繩牀角上懸舉放却歸本位立分明一喝至今傳雪竇拈云奇怪諸禪德如今列其派者甚多究其源者極少總道百丈於喝下大悟還端的也無然刀刁相似魚魯參差若是明眼漢瞞他一點不得只如馬祖道汝向後開兩片皮將何為人百丈竪起拂子為復如蟲禦木為復啐同時諸人要會三日耳聾麼大冶精金應無變色圜悟勤云雪竇道諸人要見三日耳聾麼大冶精金應無變色這語句沉却多少人了也雪竇要出氣露一機一境千古萬古撲不破諸人且莫錯會好大慧杲自泐潭準和尚處將謁圜悟勤過張無盡一日無盡謂曰余閲雪竇拈古至百丈再參馬祖因緣曰大冶精金應無變色投卷歎曰審如是豈得有臨濟今日耶遂作一頌曰馬師一喝大雄峯深入髑髏三日聾黃檗聞之驚吐舌江西從此立宗風後平禪師致書云去夏讀臨濟宗派乃知居士得大機大用且求頌本余作頌寄之曰吐舌耳聾師已曉捶胸祇得哭蒼天盤山會裏翻筋斗到此方知普化顛諸方往往以余聰明博記少知余者師自江西法席來必能辨優劣試為余言之大慧曰公見處與真淨死心合張曰何謂也大慧舉真淨頌曰客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面死心拈云雲巖要問雪竇既是大冶精金應無變色為甚麼却三日耳聾諸人要知麼從前汗馬無人識祇要重論蓋代功張拊几曰不因公語爭見真淨死心用處若非二大老難顯雪竇馬師爾住後馬師寄三甕醬至師集衆上堂開書了拈拄杖指甕曰道得即不打破道不得即打破衆無語師打破歸方丈馬祖一日問師甚麼處來師曰山後來祖曰逢著一人麼曰不逢著祖曰為甚麼不逢著曰若逢著即舉似和尚祖曰甚麼處得這消息來曰某甲罪過祖曰却是老僧罪過有僧哭入法堂來師曰作麼曰父母俱喪請師選日師曰明日來一時埋却溈山五峰雲巖侍立次師問溈山併却咽喉唇吻作麼生道山曰却請和尚道師曰不辭向汝道恐已後喪汝兒孫又問五峰峰曰和尚也須併却師曰無人處斫額望汝又問雲巖巖曰和尚有也未師曰喪我兒孫雪竇頌云却請和尚道虎頭生角出荒草十洲春盡花凋殘珊瑚樹林日杲杲和尚也併却龍蛇陳上看謀略令人長憶李將軍萬里秋空飛一鶚和尚有也未金毛師子不踞地兩兩三三舊路行大雄山下空彈指師每上堂有一老人隨衆聽法一日衆退唯老人不去師問汝是何人老人曰某非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對云不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人於言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧律送師令維那白椎告衆食後送亡僧大衆聚議大衆皆安涅槃堂又無病人何故如此食後師領衆至山後巖下以杖挑出一死野狐乃依法火葬師至晚上堂舉前因緣黃檗便問古人錯祇對一轉語墮五百生野狐身轉轉不錯合作個甚麼師曰近前來向汝道檗近前打師一掌師笑曰將謂胡鬚赤更有赤鬚胡時溈山在會下作典座司馬頭陀舉野狐話問典座作麼生座撼門扇三下司馬曰太粗生座曰佛法不是這個道理真淨頌云不落藏鋒不昧分要伊從此脫狐身人人盡道休官好林下何曾見一人真如哲頌云大冶洪罏烹佛烹祖規模鎔盡識者罔措僧問徑山杲云大修行人還落因果也無前百丈道不落因果為甚麼墮野狐身徑云逢人但恁麼舉僧曰祇如後百丈道不昧因果為甚麼脫野狐身徑云逢人但恁麼舉僧云或有人問徑山大修行底人還落因果也無未審和尚向他道甚麼徑曰向你道逢人但恁麼舉杲復有頌云不落不昧石頭土塊陌路相逢銀山粉碎拍手呵呵笑一場明州有個憨布袋雪峯道圓禪師依積翠日宴坐下板聞二僧舉野狐話一云不昧因果也未脫得野狐身一云不落因果又何曾墮野狐來師聞之聳然因詣積翠庵渡澗猛省因見南公敘其事未終涕交南公令就侍者榻熟睡睡覺忽起作偈曰不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖𣗖甚縱橫野狐跳入金毛隊南公見為之助喜問如何是奇特事師曰獨坐大雄峰僧禮拜師便打普請钁地次忽有一僧聞鼓鳴舉钁頭大笑便歸師曰俊哉此是觀音入理之門師歸院乃喚其僧問適來見甚麼道理便恁麼曰適來肚飢聞鼓聲歸喫飯師乃笑鏡清云當時溈山有此一僧鼓山云當時溈山無此一僧圜悟勤云這僧洪音大振直得一千五百人大善知識眼目定動及乎勘證將來却打個背翻筋斗若不是溈山爭見汗馬功高後來道有此一僧只得一半道無此一僧只得一半今日板聲鐘聲魚聲鼓聲齊振或有個拍手呵呵大笑直向伊道觀世音菩薩來也此章或列于溈山章故諸師皆云溈山此從傳燈録僧問西堂有問有答即且置無問無答時如何堂曰怕爛却那師聞舉乃曰從來疑這個老兄曰請和尚道師曰一合相不可得師謂衆曰有一人長不喫飯不道飢有一人終日喫飯不道飽臨濟示衆云一人在孤峯頂上無出身之路一人在十字街領亦無背面那個在前那個在後不作維摩詰不作傅大士珍重又云有一人論劫在途中不離家舍有一人離家舍不在途中阿那個合受人天供養妙喜拈臨濟語云賊身已露雲巖問每日區區為阿誰師曰有一人要巖曰因甚麼不教伊自作師曰他無家活雲巖煎茶次道吾問煎與阿誰巖曰有一人要曰何不教伊自煎巖曰幸有某甲在又藥山問雲巖作甚麼巖曰擔屎山曰那個聻巖曰在山曰汝來去為誰巖曰替他東西山曰何不教並行巖曰和尚莫謗他山曰不合恁麼道巖曰如何道山曰還曾擔麼師令僧去章敬處見伊上堂説法你便展開坐具禮拜起將一隻鞋以袖拂却上塵倒頭覆下其僧到章敬一依師旨章敬云老僧罪過黃龍新云百丈逞盡神通不如章敬道個老僧罪過僧問抱璞投師請師一鑑師曰昨夜南山虎咬大蟲曰不謬真詮為甚麼不垂方便師曰掩耳偷鈴漢曰不遇中郎鑑還同野舍薪師便打僧曰蒼天蒼天師曰得與麼多口曰罕遇知音拂袖便行師曰百丈今日輸却一半佛鑑云雖得一場榮刖却一雙足至晚侍者問和尚被這僧不肻了便休師便打者曰蒼天蒼天師曰罕遇知音者作禮師曰一狀領過趙州參師問近離甚處曰南泉師曰南泉近日有何言句曰未得之人直須悄然師曰悄然一句且置茫然一句作麼生道州進前三步師便喝州作縮身勢師曰大好悄然州便出去或作州曰未得之人直須悄然師便喝州作怕勢師曰大好悄然州作舞而出師有時説法竟大衆下堂乃召之大衆回首師曰是甚麼藥山目之為百丈下堂句上堂靈光獨耀迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛問如何是大乘頓悟法要師曰汝等先歇諸緣休息萬事善與不善世出世間一切諸法莫記憶莫緣念放捨身心令其自在心如木石無所辨別心無所行心地若空慧日自現如雲開日出相似但歇一切攀緣貪嗔愛取垢淨情盡對五欲八風不動不被見聞覺知所縛不被諸境所惑自然具足神通妙用是解脫人對一切境心無靜亂不攝不散透過一切聲色無有滯礙名為道人善惡是非俱不運用亦不愛一法亦不捨一法名為大乘人不被一切善惡空有垢淨有為無為世出世間福德智慧之所拘繫名為佛慧是非好醜是理非理諸知見情盡不能繫縛處處自在名為初發心菩薩便登佛地問對一切境如何得心如木石去師曰一切諸法本不自言空不自言色亦不言是非垢淨亦無心繫縛人但人自虗妄計著作若干種解會起若干種知見生若干種愛畏但了諸法不自生皆從自己一念妄想顛倒取相而有知心與境本不相到當處解脫一一諸法當處寂滅當處道場又本有之性不可名目本來不是凡不是聖不是垢淨亦非空有亦非善惡與諸染法相應名人天二乘界若垢淨心盡不住繫縛不住解脫無一切有為無為縛脫心量處於生死其心自在畢竟不與諸妄虗幻塵勞蘊界生死諸入和合迥然無寄一切不拘去留無礙往來生死如門開相似夫學道人若遇種種苦樂稱意不稱意事心無退屈不念名聞利養衣食不貪功德利益不為世間諸法之所滯礙無親無愛苦樂平懷粗衣遮寒糲食活命兀兀如愚如聾稍有相應分若於心中廣學知解求福求智皆是生死於理無益却被知解境風之所漂溺還歸生死海裏佛是無求人求之即乖理是無求理求之即失若著無求復同於有求若著無為復同於有為故經云不取於法不取非法不取非非法又云如來所得法此法無實無虗若能一生心如木石相似不被陰界五欲八風之所漂溺即生死因斷去住自由不為一切有為因果所縛不被有漏所拘他時還以無因縛為因同事利益以無著心應一切物以無礙慧解一切縛亦云應病與藥問如今受戒身口清淨已具諸善得解脫否師曰少分解脫未得心解脫亦未得一切處解脫曰如何是心解脫及一切處解脫師曰不求佛法僧乃至不求福智知解垢淨情盡亦不守此無求為是亦不住盡處亦不欣天堂畏地獄縛脫無礙即身心及一切處皆名解脫汝莫言少分戒身口意淨便以為了不知河沙戒定慧門無漏解脫都未涉一毫在努力向前須猛究取莫待耳聾眼暗面皺髮白老苦及身悲愛纏綿眼中流淚心裏慞惶一無所據不知去處到恁麼時節整理手腳不得也縱有福智名聞利養都不相救為心眼未開唯念諸境不知返照復不見佛道一生所有善惡業緣悉現於前或欣或怖六道五蘊俱時現前盡敷嚴好舍宅舟船車輿光明顯赫皆從自心貪愛所現一切惡境皆變成殊勝之境但隨貪愛重處業識所引隨著受生都無自由分龍畜良賤亦總未定問如何得自由分師曰如今得即得或對五欲八風情無取捨慳嫉貪愛我所情盡垢淨俱亡如日月在空不緣而照心心如木石念念如救頭然亦如香象渡河截流而過更無疑滯此人天堂地獄所不能攝也夫讀經看教語言皆須宛轉歸就自己但是一切言教祇明如今鑒覺自性但不被一切有無諸境轉是汝導師能照破一切有無諸境是金剛慧即有自由獨立分若不能恁麼會得縱然誦得十二韋陀典祇成增上慢却是謗佛不是修行但離一切聲色亦不住於離亦不住於知解是修行讀經看教若準世間是好事若向明理人邊數此是壅塞人十地之人脫不去流入生死河但是三乘教皆治貪嗔等病祇如今念念若有貪瞋等病先須治之不用求覔義句知解知解屬貪貪變成病祇如今但離一切有無諸法亦離於離透過三句外自然與佛無差既自是佛何慮佛不解語祇恐不是佛被有無諸法縛不得自由以理未立先有福智被福智載去如賤使貴不如先立理後有福智若要福智臨時作得撮土成金撮金為土變海水為酥酪破須彌為微塵攝四大海水入一毛孔於一義作無量義於無量義作一義伏惟珍重夫語須辨緇素須識總別語須識了義不了義教語了義教辨清不了義教辨濁説穢法邊垢揀凡説淨法邊垢揀聖從九部教説向前衆生無眼須假人雕琢若於聾俗人前説直須教渠出家持戒修禪學慧若是過量俗人亦不得向伊與麼説如維摩詰傅大士等類若於沙門前説他沙門已受白四羯磨訖具足全是戒定慧力更向他與麼説名非時語説不應時亦名綺語若是沙門須説淨法邊垢須説離有無等法離一切修證亦離於離若於沙門中剝除習染沙門除貪瞋病不去亦名聾俗亦須教渠修禪學慧若是二乘僧他歇得貪瞋病去盡依住無貪將為是是無色界是障佛光明是出佛身血亦須教渠修禪學慧須辨清濁語濁法者貪瞋愛取等多名也清法者菩提涅槃解脫等多名也只如今鑑覺但於清濁兩流凡聖等法色聲香味觸法世間出世間法都不得有纖毫愛取既不愛取依住不愛取將為是是初善是住調伏心是聲聞人是戀筏不捨人是二乘道是禪那果既不愛取亦不依住不愛取是中善是半字教猶是無色界免墮二乘道免墮魔民道猶是禪那病是菩薩縛既不依住不愛取亦不作不依住知解是後善是滿字教免墮無色界免墮禪那病免墮菩薩乘免墮魔王位為智障地障行障故見自己佛性如夜見色如云佛地斷二愚一微細所知愚二極微細所知愚故云有大智人破塵出經卷若透得三句過不被三段管教家舉喻如鹿三跳出網喚作外佛無物拘繫得渠是屬然燈後佛是最上乘是上上智是佛道上立此人是佛有佛性是導師是使得無所礙風是無礙慧於後能使得因果福智自由是作車運載因果處於生不被生之所留處於死不被死之所礙處於五陰如門開不被五陰礙去住自由出入無難若能與麼不論階梯勝劣乃至蟻子之身但能與麼盡是淨妙國土不可思議此猶是解縛語彼自無瘡勿傷之也佛瘡菩薩等瘡但説有無等法盡是傷也有無管一切法十地是濁流河衆作清流説竪清相説濁過患向前十大弟子舍利弗富樓那正信阿難邪信善星等個個有榜樣個個有則候一一被導師説破不是四禪八定阿羅漢等住定八萬劫他是依執所行被淨法酒醉故聲聞人聞佛法不能發無上道心所以斷善根人無佛性教云喚作解脫深坑可畏之處一念心退墮地獄猶如箭射亦不得一向説退亦不得一向説不退祇如文殊觀音勢至等却來須陀洹地同類誘引不得言他退當與麼時祇喚作須陀洹人祇如今鑑覺但不被一切有無諸法管透三句及一切逆順境得過聞百千萬億佛出世間如不聞相似亦不依住不聞亦不作不依住知解説他這個人退不得量數管他不著是佛常住世間而不染世法説佛轉法輪退亦是謗佛法僧説佛不轉法輪不退亦是謗佛法僧肇公云菩提之道不可圖度高而無上廣不可極淵而無下深不可測語也垛生招箭言鑑覺猶不是從濁辨清許説如今鑑覺是除鑑覺外別有盡是魔説若守住如今鑑覺亦同魔説亦名自然外道説如今鑑覺是自己佛是尺寸語是圖度語似野干鳴猶屬黐膠門本來不認自知自覺是自己佛向外馳求覔佛假善知識説出自知自覺作藥治個向外馳求病既不向外馳求病瘥須除藥若執住自知自覺是禪那病是徹底聲聞如水成氷全氷是水救渴難望亦云必死之病世醫拱手無始不是佛莫作佛解佛是衆生邊藥無病不要喫藥藥病俱消喻如清水佛是甘草和水亦如蜜和水極是甘美若同清水邊數則不著不是無是本有亦云此理是諸人本有諸佛菩薩喚作示珠人從來不是個物不用知渠解渠不用是渠非渠但割斷兩頭句割斷有句不有句割斷無句不無句兩頭迹不現兩頭捉汝不著量數管汝不得不是欠少不是具足非凡非聖非明非暗不是有知不是無知不是繫縛不是解脫不是一切名目何以不是實語若為雕琢虗空作得佛相貌若為説道虗空是青黃赤白作得如云法無有比無可喻故法身無為不墮諸數故云聖體無名不可説如實理空門難湊喻如大末蟲處處能泊惟不能泊於火𦦨之上衆生心亦爾處處能緣惟不能緣於般若之上參善知識求覔一知一解是善知識魔生語見故若發四弘誓願願度一切衆生盡然後我始成佛是菩薩發智魔誓願不相捨故若持齋戒修禪學慧是有漏善根縱然坐道場示現成等正覺度恆沙數人盡證辟支佛果是善根魔起貪著故若於諸法都無貪染神理獨存住甚深禪定更不升進是三昧魔久耽玩故至上涅槃離欲寂靜是魔業若智慧脫若干魔網不去縱解百本韋陀經盡是地獄滓若覔如佛相似無有是處如今聞説不著一切善惡有無等法即為墮空不知棄本逐末却是墮空也求佛求菩提及一切有無等法是棄本逐末祇如今粗食助命補破遮寒渴則掬水喫餘外但是一切有無等法都無纖毫繫念此人漸有輕明分善知識不執有不執無脫得十句魔語師語録中又云秖如今但無十句濁心貪心愛心染心瞋心執心住心依心著心取心戀心但是一句各有三句外個個透過三句外但是一切照用任聽縱橫但是一切舉動施為語默啼笑盡是佛慧未審十句濁心即十句魔語否要當不外此意出語不繫縛人所有言説不自稱師説如谷響言滿天下無口過堪依止若道我能説能解説我是和尚汝是弟子者個同於魔説無端説道目擊道存是佛不是佛是菩提涅槃解脫等無端説一知一解見舉一手竪一指云是禪是道者個語繫縛人未有住時祇是重增比丘繩索縱然不説亦有口過寧作心師不師於心不了義教有人天師有導師了義教中不為人天師不師於法未能依得玄鑑且依得了義教猶有相親分若是不了義教祇合聾俗人前説祇如今但不依住一切有無諸法亦不住無依住亦不作不依住知解是名大善知識亦云惟佛一人是大善知識為無兩人餘者盡名外道亦名魔説如今祇是説破兩頭句一切有無境法但莫貪染及解縛之事無別語句教人若道別有語句教人別有法與人者此名外道亦名魔説須識了義教不了義教語須識遮語不遮語須識生死語須識藥病語須識逆順喻語須識總別語説道修行得佛有修有證是心是佛即心即佛是佛説是不了義教語是不遮語是總語是升合擔語是揀穢法邊語是順喻語是死語是凡夫前語不許修行得佛無修無證非心非佛亦是佛説是了義教語是遮語是別語是百石擔語是三乘教外語是逆喻語是揀淨法邊語是生語是地位人前語從須陀洹向上直至十地但有語句盡屬法塵垢但有語句盡屬煩惱邊收但有語句盡屬不了義教了義教是持不了義教是犯佛地無持犯了義不了義教盡不許也從苗辨地從濁辨清祇如今鑑覺若從清邊數鑑覺亦不是清不鑑覺亦不是此處有脫誤清亦不是不清亦不是聖亦不是不聖亦不是見水濁説水濁過患水若清都無可説説却濁他水若有無問之問亦有無説之説佛不為佛説法平等真如法界無佛不度衆生佛不住佛名真福田須辨主客語貪染一切有無境法被一切有無境惑亂自心是魔王照用屬魔民祇如今鑑覺但不依住一切有無諸法世間出世間法亦不作不住知解亦不依住無知解自心是佛照用屬菩薩心心應衍是主宰照用屬客塵如波説水照萬象以無功若能寂照不自玄旨自然貫串於古今如云神無照功至功常存能一切處為導師衆生性識他為未曾踏佛階梯是黐膠性多時黏著有無諸法乍喫玄旨藥不得乍聞格外語他信不及所以菩提樹下四十九日默然思惟智慧冥難説無可比喻説衆生有佛性亦謗佛法僧説衆生無佛性亦謗佛法僧若言有佛性名執著謗若言無佛性名虗妄謗如云説佛性有則增益謗説佛性無則損減謗説佛性亦有亦無則相違謗説佛性非有非無則戲論謗始欲不説衆生無解脫之期始欲説之衆生又隨語生解益少損多故云我寧不説法疾入於涅槃向後返尋過去諸佛皆説三乘法向後假偈説假立名字本不是佛向渠説是佛本不是菩提向渠説是菩提涅槃解脫等知渠擔百石擔不起且與渠一升一合擔知渠難信了義教且與渠説不了義教且得善法流行亦勝於惡法善果限滿惡果便到得佛則有衆生到得涅槃則有生死到得明則有暗到但是有漏因果翻覆無有不相酬獻者若欲免見翻覆之事但割斷兩頭句量數管不著不佛不衆生不親不疏不高不下不平不等不去不來但不著文字隔渠兩頭捉汝不得免苦樂相形免明暗相酬實理真實亦不真實虗妄亦不虗妄不是量數物喻如虗空不可修治若心有少許作解即被量數管著亦如卦兆被金木水火土管亦如黐膠五處俱黏魔王捉得自在還家夫教語皆三句相連初中後善初直須教渠發善心中破善心後始名好善菩薩即非菩薩是名菩薩法非法非非法總與麼也若祇説一句令衆生入地獄若三句一時説渠自入地獄不干教主事説到如今鑑覺是自己佛是初善不守住如今鑑覺是中善亦不作不守住知解是後善如前屬然燈後佛祇是不凡亦不聖莫錯説佛非凡非聖此土初祖云無能無聖為佛聖若言佛聖者亦非九品精靈龍畜等類及釋梵已來皆能通變上品精靈亦知古今百劫時事豈得是佛如阿修羅王身極長大敵兩倍須彌山與帝釋戰時知力不如領百萬兵衆入藕絲孔裏藏通變辨才不少他且不是佛教語節級奢緩升降不同未悟未解喚作貪瞋悟了喚作佛慧故云不異舊時人祇異舊時行履處問斬草伐木掘地墾土為有罪報相否師云不得定言有罪亦不得定言無罪有罪無罪事在當人若貪染一切有無等法有取捨心在透三句不過此人定言有罪若透三句外心如虗空亦莫作虗空想此人定言無罪又云罪若作了道不見有罪無有是處若不作罪道有罪亦無有是處如律中本迷煞人及轉相煞尚不得煞罪何況禪宗下相承心如虗空不停留一物亦無虗空相將罪何處安著古若有今今亦有古古若有佛今亦有佛如今若得直至未來際得祇如今一念一念不被一切有無等法管自古自今佛祇是人人祇是佛亦是三昧定不用將定入定不用將禪想禪不用將佛覔佛如云法不求法法不得法法不行法法不見法自然得法不以得更得所以菩薩應如是正念於法罄然獨存亦無知獨存之法智性自如如非因所置亦名體結亦名體集不是智知不是識識絶思量處凝寂體盡忖度永亡如海大流盡波浪不復生亦云如大海水無風匝匝之波忽知匝匝之波此是細中之粗亡知於知還如細中之細是佛境界從此初知名三昧之頂亦名三昧王亦名爾焰智出生一切諸三昧灌一切諸法王子頂於一切色聲香味觸法剎土成等正覺內外通達悉無有閡一色一塵一佛一色一切佛一切色一切塵一切佛一切色聲香味觸法亦復如是一一遍滿一切剎土此是細中之粗是善境界是一切上流知覺聞見亦是一切上流出生入死度一切有無等是上流所説亦是上流涅槃是無上道是無等等呪是第一之説於諸説中最為極深無人能到諸佛護念猶如清波能説一切水清濁深流廣大之用諸佛護念行住坐臥若能如是我時為現清淨光明身又云如汝自等語等我亦如然一佛剎聲一佛剎香一佛剎味一佛剎觸一佛剎事悉皆如是從此上至蓮花藏世界縱廣總皆如是若守初知為解名頂結亦名墮頂結是一切塵勞之根本自生知見無繩自縛所知故繫世有二十五又散一切諸煩惱門縛著於他此初知二乘見之名為爾𦦨識亦名微細煩惱即便斷除既得除已名為回神住空窟亦名三昧酒所醉亦名解脫魔所縛世界成壞定力所持漏向別國土都不覺知亦名解脫深坑可畏之處菩薩悉皆遠離為求無上菩提涅槃猶是邪願於自己五陰被人割截都無煩惱亦無一念生彼我心若依住無一念將為是此名法塵垢十地之人脫不去流入生死河而彼心持我慢識逐利名者云我得一切無礙祇是自誑此土初祖云心有所是必有所非若貴一物則被一物惑信被信惑不信又成謗莫貴莫不貴莫信莫不信問如何是有情無佛性無情有佛性師云從人至佛是聖情執從人至地獄是凡情執祇如今但於凡聖二境有染愛心是名有情無佛性祇如今但於凡聖二境及一切有無諸法都無取捨心亦無無取捨知解是名無情有佛性祇是無其情繫故名無情不同木石太虗黃花翠竹之無情將為有佛性若言有者何故經中不見受記而得成佛者祇如今鑑覺但不被有情改變喻如翠竹無不應機無不知時喻如黃花又云若踏佛階梯無情有佛性未踏佛階梯有情無佛性大小百丈作小乘見解莫是未曾見南陽未悟未解時名母悟了名子亦無無悟解知解是名母子俱喪一切言教祇是治病為病不同藥亦不同所以有時説有佛有時説無佛實語治病病若得瘥個個是實語治病若不瘥個個是虗妄語實語是虗妄語生見故虗妄是實語斷衆生顛倒故為病是虗妄祇有虗妄藥相治聖地習凡因佛入衆生中同類誘引化導同渠餓鬼肢節火然與渠説般若波羅蜜令渠發心若一向在聖地憑何得至彼共渠語佛入諸類與衆生作船筏同渠受苦無限勞極佛入苦處亦同衆生受苦佛祇是去住自由不同衆生佛不是虗空受苦何得不苦若説不苦此語違負等間莫説錯説佛神通自在不自在且慙愧人不敢説佛是有為是無為不敢説佛自由不自由除讚藥方外不欲得露現兩頭醜陋教云若人安佛菩提置有所是邊其人得大罪亦云如不識佛人前向渠與麼説無過如無漏牛乳能治有漏病其牛者不在高原不居下隰此牛乳堪作藥高原喻於佛下隰喻於衆生如云如來實智法身又無比應作此病辨才無礙升騰自在不生不滅是名應作明生老病死疼痛㿇㿇是暗喫菌羹患痢疾而終是暗為藏明頭迹明暗都遣莫取無取亦無無取他不明不暗王宮生納耶輸陀羅八相成道聲聞外道妄想所計如云非雜食身純陀云我知如來決定不受不食第一須具兩隻眼照破兩頭事莫祇帶一隻眼向一邊行即有那一邊到功德天黑暗女相隨有智主人二俱不受祇如今心如虗空相似學始有所成西國高祖云雪山喻大涅槃此土初祖云心心如木石三祖云兀爾忘緣曹溪云善惡都莫思量先師云如迷人不辨方所肇公云閉智塞聰獨覺冥冥者矣文殊云心同虗空故敬禮無所觀甚深修多羅不聞不受持祇如今但是一切有無諸法都不見不聞六根杜塞若能與麼學與麼持經始有修行分者個語逆耳苦口可中與麼作得至第二第三生能向無佛處坐大道場示現成等正覺變惡為善變善為惡使惡法教化十地菩薩使善法教地獄餓鬼能向明處解明縛能向暗處解暗縛又云從色界向上布施是病慳貪是藥從色界向下慳貪是病布施是藥又云從人至佛是得從人至地獄是失是非亦然三祖云得失是非一時放却撮金成土撮土成金百般作得變弄自由於恆沙世界外有求救者婆伽婆即披三十二相現其人前同渠語音與渠説法隨機感化應物殊形變現諸趣離我我所猶屬彼邊事猶是小用亦是佛事門中收大用者大身隱於無形大音匿於希聲如木中之火如鐘鼓之聲因緣未具時不可言其有無傍報生天棄之如涕唾菩薩六度萬行如乘死尸過岸如在牢獄廁孔得出佛披三十二相喚作垢膩之衣無善纏無惡纏無佛纏無衆生纏量數亦然乃至都無一切量數纏故云佛是出纏過量人貪愛知解義句如母愛子惟多與兒酥喫消與不消都總不知此語喻十地受人天尊貴煩惱生色界無色界禪定福樂煩惱不得自在神通飛騰隱顯遍至十方諸佛淨土聽法之煩惱學慈悲喜捨因緣煩惱學空平等中道煩惱學三明六通四無閡煩惱學大乘心發四弘誓願煩惱初地二地三地四地明解煩惱五地六地七地諸知見煩惱八地九地十地菩薩雙照二諦煩惱乃至學佛果百萬阿僧祇諸行煩惱惟貪義句知解不知却是繫縛煩惱故云見河能漂香象若執本清淨本解脫自是佛自是禪道解者即屬自然外道若執因緣修成證得者即屬因緣外道執有即屬常見外道執無即屬斷見外道執亦有亦無即屬邊見外道執非有非無即屬空見外道亦云愚癡外道祇如今但莫作佛見涅槃等見都無一切有無等見亦無無見名正見無一切聞亦無無聞名正聞文殊是七佛祖師亦云是娑婆世界第一主首菩薩無端作見佛想聞法想被佛威神力故左降二鐵圍山不是不解特與諸學人作標則令諸後學人莫作與麼見聞但無一切有無等法有無等見一一個個透過三句外是名如意寶是名寶華承足若作佛見法見但是一切有無等見名眼翳見所見故亦名見纏亦名見蓋亦名見孽祇如今念念及一切見聞覺知及一切塵垢祛得盡但是一塵一色總是一佛但起一念總是一佛三世五陰念念誰知其數是名佛𨵩塞虗空是名分身佛師嘗云但有舉心動念盡名破戒此念云何名分身佛天魔波旬覔菩薩一念起處便擬撲倒此起念處可覔否若不可覔見佛聞法底文殊云何降二鐵圍山信著一切法名信不具亦名信不圓亦名偏信不具故名一闡提如今欲得驀直悟解但人法俱泯人法俱絶人法俱空透三句外是名不墮諸數人是信法者佛是纏外人無纖毫愛取亦無無愛取知解是名具足六度萬行若要莊嚴具種種皆有如不要則亦不失他使得因果福智自由問從上祖宗皆有密語相傳授如何師曰無有密語如來無有祕密藏祇如今鑑覺語言分明覔形相了不可得是密語從須陀洹向上直至十地但有語句盡屬法之塵垢但有語句盡屬煩惱邊收但有語句盡屬不了義教但有語句盡不許也了義教俱非也更討甚麼密語供養者淨三業前際無煩惱可斷中際無自性可守後際無佛可成是三際斷是三業清淨是三輪空是三檀空云何比丘給侍於佛所謂不漏六根者亦名莊嚴空無諸漏林樹莊嚴空無諸染花果莊嚴空無佛眼問語也垛生招箭言既垛生不得無患患纍既同緇素奚別師云但却發箭塗中相拄如其相差必有所傷谷中尋響纍劫無形響在口邊得失在於來問却問所歸還被於箭問大通智勝佛十劫坐道場佛法不現前不得成佛道如何師云劫者滯也亦云住也住一善滯於十善西國云佛此土云覺自己鑑覺滯著於善善根人無佛性故云佛法不現前不得成佛道觸惡住惡名衆生覺觸善住善名聲聞覺不住善惡二邊不依住將為是者名二乘覺亦名辟支佛覺既不依住善惡二邊亦不作不依住知解名菩薩覺既不依住亦不作無依住知解始得名為佛覺如云佛不住佛名真福田若於千萬人中忽有一人得者名無價寶能於一切處為導師無佛處云是佛無法處云是法無僧處云是僧名轉大法輪僧問臨濟大通智勝佛十劫坐道場佛法不現前不得成佛道未審此意如何乞師指示濟云大通者是自己於處處達其萬法無性無相名為大通智勝者於一切處不疑不得一法名為智勝佛者心清淨光明透徹法界得名為佛十劫坐道場者十波羅蜜是佛法不現前者佛本不生法本不滅云何更有現前不得成佛道者佛不應更作佛古人云佛常在世間而不染世間法道流你欲得作佛莫隨萬物心生種種法生心滅種種法滅一心不生萬法無咎世與出世無佛無法亦不現前亦不曾失設有者皆是名言章句接引小兒施設藥病表顯名句且名句不自名句還是你目前昭昭靈靈鑒覺聞知照燭底安一切名句洪覺範智證傳曰經蓋嘗言若人散亂心入於塔廟中一稱南無佛皆已成佛道豈一部之經首尾自相違戾曰豫論此經蓋皆象也聖人非不欲正言以有不可勝言者惟象為能盡其意佛意以智身不可以三昧處求故也以智體無所住無所依故若生想念願樂見之即如所應現無有處所依止故猶如空谷響但有應物之音若呼之即應無有處所可得故華嚴經曰有欲見普賢身及座者但生想念是也夫於散亂心時一念佛號便得覺道但生想念即見普賢而十劫在定謂佛法不現遍會推求謂普賢不見非鈍根所知之境也幻寄曰三師談法華如韓嬰説詩斷章取義好處不無欲見大通智勝只得一邊常嗟今日所依之命飢不得食則死寒不得衣則死被四大把定不如先達者入火不燒入水不溺要燒便燒要溺便溺去住自由十地菩薩亦水不能溺火不能燒倘要燒且不可得燒他被量數管定佛則不與麼使得四大風水自由琅琊云藥王十地何以燒得幻寄云琅琊未識藥王智濁照清慧清識濁在佛名照慧在菩薩名智在二乘及衆生邊名識亦名煩惱在佛名果中説因在衆生名因中説果在佛名轉法輪在菩薩名法輪轉在菩薩名瓔珞莊嚴具在衆生名五陰叢林在佛名本地無明是無明明故云無明為道體不同衆生暗蔽無明彼是所此是能彼是所聞此是能聞不一不異不斷不常不來不去是生語句是出轍語句不明不暗不佛不衆生總與麼也師凡作務執勞必先於衆主者不忍密收作具而請息之師曰吾無德爭合勞於人既遍求作具不獲則亦不食故有一日不作一日不食之語流播諸方唐元和九年正月十七日歸寂諡大智禪師池州南泉普願禪師鄭州新鄭人姓王依大隗山大慧禪師受業嵩嶽受具初習相部及毗尼既遊講肆歷聽楞伽華嚴入中百門觀精練玄義後扣大寂之室頓然忘筌得遊戲三昧一日為衆僧行粥次馬祖問桶裏是甚麼師曰這老漢合取口作恁麼語祖便休自是同參無敢詰問貞元十一年憩錫池陽不下南泉三十餘載諸方目為郢匠南泉山下有一菴主人謂曰近日南泉和尚出世何不去禮見主曰非但南泉出世直饒千佛出興我亦不去師聞乃令趙州去勘州去便設拜主不顧州從東過西又從西過東主亦不顧州曰草賊大敗遂拽下簾子便歸舉似師師曰我從來疑著這漢次日師與沙彌携茶一瓶盞三隻到菴擲向地上乃曰昨日底昨日底主曰昨日底是甚麼師於沙彌背上拍一下曰賺我來賺我來拂袖便回雪竇顯云大小南泉趙州被這擔板漢勘破趙州問道非物外物外非道如何是物外道師便打州捉住棒云已後莫錯打人師曰龍蛇易辨衲子難瞞雪竇顯云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趁出玩月次僧問幾時得似這個去師曰王老師二十年前亦恁麼來曰即今作麼生師便歸方丈師一日問黃檗黃金為世界白銀為壁落此是甚麼人居處檗曰是聖人居處師曰更有一人居何國土檗乃叉手立師曰道不得何不問王老師檗却問更有一人居何國土師曰可惜許師問黃檗定慧等學明見佛性此理如何檗曰十二時中不依倚一物師曰莫是長老見處麼檗曰不敢師曰漿水錢且置草鞋錢教阿誰還妙喜曰不見道路逢劍客須呈劍不是詩人莫獻詩師參百丈涅槃和尚丈問從上諸聖還有不為人説底法麼師曰有丈曰作麼生是不為人説底法師曰不是心不是佛不是物丈曰説了也師曰某甲只恁麼和尚作麼生丈曰我又不是大善知識爭知有説不説師曰某甲不會丈曰我忒煞為你説了也雪竇顯頌云佛祖從來不為人衲僧今古競頭走明鏡當臺列象殊一一面南看北斗斗柄垂無處討拈得鼻孔失却口師與魯祖歸宗杉山四人離馬祖處各謀住菴於中路相別次師插下拄杖云道得也被這個礙道不得也被這個礙宗拽拄杖打師一下云也只是這個王老師説甚麼礙不礙魯云只此一句語大播天下宗曰還有不播者麼魯曰有宗曰作麼生是不播者魯作掌勢師同魯祖杉山歸宗喫茶次魯祖提起茶盞云世界未成時便有這個師云今人祇識這個未識世界宗云是師云師兄莫同此見麼宗却拈起盞云向世界未成時道得麼師作掌勢宗以面作承掌勢麻谷持錫到章敬繞禪牀三匝振錫一下卓然而立敬云是是雪竇云錯谷又到師處亦繞禪牀三匝振錫一下卓然而立師云不是不是雪竇云錯谷云章敬道是和尚為甚麼道不是師云章敬即是是汝不是此是風力所轉終成敗壞雪竇頌云此錯彼錯切忌拈却四海浪平百川潮落古䇿風高十二門門門有路空蕭索非蕭索作者好求無病藥圜悟勤云須是明取兩錯始得雪竇要提活潑潑處所以如此若是皮下有血底漢自然不向言句中作解會有者道雪竇代麻谷下這兩錯有甚麼交涉殊不知古人著語鎖斷要關這邊也是那邊也是畢竟不在這兩頭慶藏主道持錫繞禪牀如是不是俱錯其實亦不在此溈山哲云章敬道是也落在麻谷彀中南泉道不是也落在麻谷彀中大溈即不然忽有人持錫繞禪牀三匝卓然而立但向伊道未到這裏好與三十棒鹽官謂衆曰虗空為鼓須彌為椎甚麼人打得衆無對有僧舉似師師云王老師不打這破鼓笛法眼別云王老師不打黃龍心云南泉法眼只知瞻前不知顧後且如鹽官道虗空為鼓須彌為椎什麼處是破處還檢點得出麼直饒檢點得破處分明我更問你覔鼓在師與歸宗麻谷同去參禮南陽國師師於路上畫一圓相曰道得即去宗便於圓相中坐谷便作女人拜師曰恁麼則不去也宗曰是什麼心行師乃相喚便回更不去禮國師雪竇頌云由基箭射猿繞樹何太直千個與萬個是誰曾中的相呼相喚歸去來曹溪路上休登陟復云曹溪路坦平為甚麼休登陟有一座主辭師師問甚麼處去對曰山下去師曰第一不得謗王老師對曰爭敢謗和尚師乃噴嚏曰多少主便出去雲居膺云非師本意先曹山云賴也石霜云不為人斟酌長慶云請領話雲居錫云座主當時出去是會不會師一日掩方丈門將灰圍却門外曰若有人道得即開或有祇對多未愜師意趙州曰蒼天師便開門陸大夫與師見人雙陸指骰子曰恁麼不恁麼正恁麼信彩去時如何師拈起骰子曰臭骨頭十八陸大夫向師道肇法師也甚奇怪解道天地與我同根萬物與我一體師指庭前牡丹花曰大夫時人見此一株花如夢相似陸罔測雪竇頌云聞見覺知非一一山河不在鏡中觀霜天月落夜將半誰共澄潭照影寒圜悟勤云南泉小睡語雪竇大睡語雖然作夢却作得個好夢前頭説一體這裏説不同聞見覺知非一一山河不在鏡中觀若道在鏡中觀然後方曉了則不離鏡處山河大地草木叢林莫將鏡鑑若將鏡鑑便為兩段但只可山是山水是水是法住法位世間相常住山河不礙眼光且道向甚麼處觀還會麼到這裏向霜天月落夜將半這邊與你打併了也那邊你自相度還知雪竇以本分事為人麼誰共澄潭照影寒為復自照為復共人照須是絶機絶解方到這境界即今也不要澄潭也不待霜天月落即今作麼生徑山杲云若向理上看非但南泉謾他陸亘大夫一點不得亦未摸著他腳跟下一莖毛在若向事上看非但陸亘大夫謾他南泉一點不得亦未夢見他汗臭氣在或有出來道大小徑山説事説理只向他道但向理事上會取復有頌云天地同根伸一問未曾擡步已亡家無陰陽地花重發玉本無瑕却有瑕法昌遇一日與訥首座修花壇次乃問南泉道時人見此一株花如夢相似且道你見似個甚麼訥云只是一株花遇云與麼則你也在南泉窠窟裏訥云古人意作麼生遇云拈磚來訥過磚了又問遇云古佛過去久矣師入宣州陸亘大夫出迎指城門曰人人盡喚作雍門未審和尚喚作甚麼師曰老僧若道恐辱大夫風化曰忽然賊來作麼生師曰老僧罪過陸又問弟子家中有一片石或時坐或時臥如今擬鐫作佛得否師曰得陸曰莫不得否師曰不得雲巖云坐即佛不坐即非佛洞山云不坐即佛坐即非佛天童覺云轉功就位轉位就功還他洞上父子且道南泉意作麼生直是針錐不入問父母未生時鼻孔在甚麼處師曰父母已生了鼻孔在甚麼處師問神山何處來神山云打羅來師曰手打腳打山無語師曰你問我我與你道山如問師曰分明記取已後遇明眼人舉似他師問座主講甚麼經座主云彌勒下生經師云彌勒幾時下生主云現在天宮未來師云天上無彌勒地下無彌勒洞山價舉問雲居膺居云天上無彌勒地下無彌勒未審誰與安名洞山被問直得禪牀振動乃云吾在雲巖曾問老人直得火罏振動今日被子問直得通身汗流大陽玄云如今老僧舉起也有解問者致將一問來乃云地動也徑山杲云禪牀動火罏動地動即不無三個老漢要見南泉直待彌勒下生始得忽有個漢出來道天上無彌勒地下無彌勒却教甚麼人下生又向他作麼生祇對但向他道老僧罪過師住菴時有一僧到菴師向伊道我上山去作務待齋時作飯自喫了送一分上來少時其僧作飯自喫了却一時打破家事就牀臥師待不見來便歸菴見僧臥師亦就伊邊臥僧便起去師住後曰我往前住菴時有個靈利道者直至如今不見翠巖芝云兩個漢前不至村後不至店問十二時中以何為境師曰何不問王老師曰問了也師曰還曾與汝為境麼僧問師歸丈室將何指南師曰昨夜三更失却牛天明起來失却火師因東西兩堂爭貓兒師遇之白衆曰道得即救取貓兒道不得即斬却也衆無對師便斬之趙州自外歸師舉前語示之州脫履安頭上而出師曰子若在即救得貓兒也又歸宗禪師剗草次有講僧來參忽有一蛇過師以鉏斷之僧曰久嚮歸宗原來是個粗行沙門師曰你粗我粗曰如何是粗師竪起鉏頭曰如何是細師作斬蛇勢曰與麼則依而行之師曰依而行之且置你甚處見我斬蛇僧無對雪峯問德山南泉斬貓意如何德山以拄杖便打趁出復召云會麼峯云不會山云我與麼老婆心猶自不會鹽官尚禪師問覺印南泉斬貓意旨如何印曰須是南泉始得印即以前語詰之尚不能對至僧堂忽大悟云古人道從今日去更不疑天下老和尚舌頭信有之矣述偈呈印曰須是南泉第一機不知不覺驀頭錐覿面若無青白眼還如𪂶𪂶守空池舉未絶印竪拳云正當恁麼時作麼生尚掀倒禪牀印遂喝尚云賊過後張弓圜悟勤云這斬貓話天下叢林商量浩浩地有者道提起處便是有底道在斬處且得都沒交涉他若不提起時亦匝匝地作盡道理殊不知古人他有定乾坤底眼有定乾坤底劍你且道畢竟是誰斬貓兒只如南泉提起云道得即不斬當時忽有人道得且道南泉斬不斬所以道正令當行十方坐斷出頭天外看誰是個中人其實當時元不斬此話亦不在斬與不斬處此事知如此分明不在情塵意見上討若向情塵意見上討則孤負南泉去但向當鋒劍刃上看是有也得無也得不有不無也得所以古人道窮則變變則通而今人不解變通只管語句上走南泉恁麼提起不可教人合下得甚語只要教人自薦各各自用自知若不恁麼會卒摸索不著又云南泉云子若在救得貓兒真個恁麼不恁麼南泉云道得即不斬如擊石火似閃電光趙州頭戴草鞋出他參活句不參死句日日新時時新千聖移易一絲毫不得須是運出自己家珍方見古人全機大用真淨云大衆只如赤眼斬蛇向其僧道我粗你粗且道古人見處作麼生遂舉拂子云今日歸宗舉拂子與當時歸宗斬蛇是同是別良久云人人有個天真佛妙用縱橫總不知今日分明齊指出斬蛇舉拂更由誰又云南泉斬貓兒歸宗斬蛇叢林中商量還有優劣也無優劣且止只如趙州戴靸鞋出去又作麼生若也於此明得德山訶佛罵祖有甚麼過於此不明丹霞燒木佛院主眉鬚落所以禍福無門惟人自召喝一喝下座妙喜云歸宗斬蛇南泉斬貓兒學語之流多謂之當機妙用亦謂之大用現前不存軌則殊不知總不是這般道理具超方眼舉起便知落處若大法不明打瓦鑽龜何時是了雪竇顯南泉斬貓頌兩堂都是杜禪和撥動煙塵不奈何賴得南泉行正令一刀兩段任偏頗趙州戴鞋頌公案圓來問趙州長安城裏任間遊草鞋頭戴無人會歸到家山即便休師示衆云喚作如如早是變了也如今師僧須向異類中行歸宗云雖行畜生行不得畜生報師云孟八郎漢又與麼去也德山密云南泉中毒也保寧勇頌云張公移住在深村被賊潛身入後門鍋子一時偷去了更來敲瓦玩兒孫道吾宗智禪師離藥山見師師問闍黎名甚麼吾曰宗智師曰智不到處作麼生宗吾曰切忌道著師曰灼然道著即頭角生三日後吾與雲巖在後架把針師見乃問智頭陀前日道智不到處切忌道著道著即頭角生合作麼生行履吾便抽身入僧堂師便歸方丈吾又來把針雲巖曰師弟為何不祇對和尚吾曰你不妨靈利巖不薦却問師智頭陀為甚不祇對和尚師曰他却向異類中行巖曰如何是異類中行師曰不見道智不到處切忌道著道著即頭角生直須向異類中行巖亦不會吾乃與巖歸藥山巖舉前話問山山曰子作麼生會巖無對山乃大笑巖復問如何是異類中行山曰吾今日困倦且待別時來巖曰某甲特為此事歸來山曰且去巖便出吾在方丈聞巖不薦不覺咬得指頭血出却下來問巖師兄去問和尚那因緣作麼生巖曰和尚不與某甲説吾便低頭趙州問異即不問如何是類師以兩手拓地州近前一踏踏倒却向涅槃堂裏呌悔悔師令侍者問曰悔個甚麼州曰悔不更與兩踏師云文殊普賢昨夜三更相打每人與二十棒趁出院了也趙州云和尚棒教誰喫師曰王老師過在甚麼處州乃作禮石菴玿頌是賊識賊精識精南泉無過強惺惺趙州禮拜歸堂去前箭猶輕後箭深徑山杲頌南泉無過口能招禍趙州禮拜草賊大敗徑山不管結案據欵文殊普賢且過一邊師曰我十八上便解作活計趙州云我十八上便解破家散宅師示衆云江西馬祖説即心即佛王老師不恁麼道不是心不是佛不是物恁麼道有過麼趙州禮拜而出時有一僧隨問趙州曰上座禮拜便出意作麼生州曰汝却問取和尚僧乃問適來諗上座意作麼生師曰他却領得老僧意旨黃龍心云古人恁麼道譬若管中窺豹但見一斑設使入林不動草入水不動波猶是騎馬向氷淩上行若是射雕手何不向蛇頭揩癢良久云鴛鴦繡出自金針徑山杲云兩個老漢雖善靴裏動指頭殊不知旁觀者醜師問僧云夜來好風僧云夜來好風師云吹折門前一株松僧云吹折門前一株松次問一僧云夜來好風僧云是甚麼風師云吹折門前一株松僧云是甚麼松師云一得一失趙州到一菴主處問有麼有麼主竪起拳頭州曰水淺不是泊船處便行又到一菴主處問有麼有麼主亦竪起拳頭州曰能縱能奪能殺能活便作禮趙州聞沙彌喝向侍者曰教伊去者乃教去沙彌便珍重州曰沙彌得入門侍者在門外法眼因僧來參次眼以手指簾尋有二僧齊去捲簾眼云一得一失上堂王老師自小養一頭水牯牛擬向溪東牧不免犯他國王水草擬向溪西牧不免犯他國王水草不如隨分納些些總不見得雲門云且道牛內納牛外納直饒你説得納處分明我更問你覔牛在雲峯悅云説甚納些子盡乾坤大地色空明暗情與無情總在翠巖這裏放行則隨緣有地把住則逃竄無門且道放行好把住好幻寄云隨邪逐惡漢上堂王老師賣身去也還有人買麼一僧出曰某甲買師曰不作貴不作賤汝作麼生買僧無對臥龍代云屬某甲去也禾山代云是何道理趙州代云明年與和尚縫一領布衫雪竇顯云雖然作家競買要且不善輪機且道南泉還肯麼雪竇也擬酬個價直令南泉進且無門退亦無地不作貴不作賤作麼生買別處容和尚不得師云三世諸佛不知有狸奴白牯却知有大溈智云三世諸佛既不知有狸奴白牯又何曾夢見灼然須知向上有知有底人始得且作麼生是知有底人喫官酒臥官街當處死當處埋沙場無限英雄漢堆山積嶽露尸骸徑山杲頌三世諸佛不知有老老大大外邊走眼皮蓋盡五須彌大洋海裏翻筋斗狸奴白牯却知有瀑布不溜青山走却笑無端王老師錯認簸箕作尉斗師巡堂次牽一頭牛入堂首座以手拊牛背一下師便休去趙州以草二束放在首座前師至莊所莊主預備迎奉師曰老僧居常出入不與人知何得排辦如此莊主曰昨夜土地報道和尚今日來師曰王老師修行無力被鬼神見侍者便問和尚既是善知識為甚麼被鬼神見師曰土地前更下一分飯玄覺云甚麼處是土地前更下一分飯雲居錫云是賞伊罰伊只如土地前見是南泉不是南泉天童覺云老僧當時若見莊主與麼道便與捉住云放汝不得何故不見道來説是非者便是是非人因聖頴云南泉被這僧一問不免向鬼窟裏作活計師問維那今日普請作甚麼對曰拽磨師曰磨從你拽不得動著磨中心樹子那無語保福代云比來拽磨如今却不成法眼代云恁麼即不拽也上堂然燈佛道了也若心諸所思出生諸法虗假不實何以故心尚無有云何出生諸法猶如形影分別虗空如人取聲安置篋中亦如吹網欲令氣滿故老宿云不是心不是佛不是物且教你兄弟行履據説十地菩薩住首楞嚴三昧得諸佛祕密法藏自然得一切禪定解脫神通妙用至一切世界普現色身或示現成等正覺轉大法輪入涅槃使無量入毛孔演一句經無量劫其義不盡教化無量億千衆生得無生法忍尚喚作所知愚極微細所知愚與道全乖大難大難珍重上堂諸子老僧十八上解作活計有解作活計者出來共你商量是住山人始得良久顧視大衆合掌曰珍重無事各自修行大衆不去師曰如聖果大可畏勿量大人尚不奈何我且不是渠渠且不是我渠爭奈我何他經論家説法身為極則喚作理盡三昧義盡三昧似老僧向前被人教返本還源去幾恁麼會禍事兄弟近日禪師太多覓個癡鈍人不可得不道全無於中還少若有出來共你商量如空劫時有修行人否有無作麼不道阿你尋常巧唇薄舌及乎問著總皆不道何不出來莫論佛出世時事兄弟今時人擔佛著肩上行聞老僧言心不是佛智不是道便聚頭擬推老僧無你推處你若束得虗空作棒打得老僧著一任推時有僧問從上祖師至江西大師皆云即心是佛平常心是道今和尚云心不是佛智不是道學人悉生疑惑請和尚慈悲指示師乃抗聲答曰你若是佛休更涉疑却問老僧何處有恁麼傍家疑佛來老僧且不是佛亦不曾見祖師你恁麼道自覓祖師去曰和尚恁麼道教學人如何扶持得師曰你急手托虗空著曰虗空無動相云何托師曰你言無動相早是動也虗空何解道我無動相此皆是你情見曰虗空無動相尚是情見前遣某甲托何物師曰你既知不應言托擬何處扶持他曰即心是佛既不得是心作佛否師曰是心是佛是心作佛情計所有斯皆想成佛是智人心是采集主皆對物時他便妙用大德莫認心認佛設認得是境被他喚作所知愚故江西大師云不是心不是佛不是物且教你後人恁麼行履今時學人披個衣服傍家疑恁麼間事還得否曰既不是心不是佛不是物和尚今却云心不是佛智不是道未審若何師曰你不認心是佛智不此字應衍是道老僧勿得心來復何處著曰總既不得何異或作與非太虗師曰既不是物比什麼太虗又教誰異不異曰不可無他不是心不是佛不是物師曰你若認這個還成心佛去也曰請和尚説師曰老僧自不知曰何故不知師曰教我作麼生説曰可不許學人會道師曰會甚麼道又作麼生會曰某甲不知師曰不知却好若取老僧語喚作依通人設見彌勒出世還被他撏却頭毛曰使後人如何師曰你且自看莫憂他後人曰前不許某甲會道今復今某甲自看未審如何師曰冥會妙會許你作麼生會曰如何是妙會師曰還欲學老僧語縱説是老僧説大德如何曰某甲若自會即不煩和尚乞慈悲指示師曰不可指東指西賺人你當哆哆和和時怎麼不來問老僧今時巧黠始道我不會圖甚麼你若此生出頭來道我出家作禪師如未出家時曾作甚麼來且説看共你商量曰恁麼時某甲不知師曰既不知即今認得可可是邪曰認得既不是不認是否師曰認不認是什麼語話曰到這裏某甲轉不會也師曰你若不會我更不會曰某甲是學人即不會和尚是善知識合會師曰這漢向你道不會誰論善知識莫巧黠看他江西老宿在日有一學士問如水無筋骨能勝萬斛舟此理如何老宿云這裏無水亦無舟論什麼筋骨兄弟他學士便休去可不省力所以數數向道佛不會道我自修行用知作麼曰如何修行師曰不可思量得向人道恁麼修恁麼行大難曰還許學人修行否師曰老僧不可障得你曰某甲如何修行師曰要行即行不可專尋他輩曰若不因善知識指示無以得會如和尚每言修行須解始得若不解即落他因果無自由分未審如何修行即免落他因果師曰更不要商量若論修行何處不去得曰如何去得師曰你不可逐背應是輩字尋得曰和尚未説教某甲作麼生尋師曰縱説何處覓去且如你從旦至夜忽東行西行你尚不商量道去得不得別人不可知得你曰當東行西行總不思量是否師曰恁麼時誰道是不是曰和尚每言我於一切處而無所行他拘我不得喚作遍行三昧普現色身莫是此理否師曰若論修行何處不去不説拘與不拘亦不説三昧曰何異有法得菩提道師曰不論異不異曰和尚所説修行迢然與大乘別未審如何師曰不管他別不別兼不曾學來若論看教自有經論座主他教家實大可畏你且不如聽去好曰究竟令學人作麼生會師曰如汝所問元只在因緣邊看你且不奈何緣是認得六門頭事你但會佛那邊却來我與你商量兄弟莫恁麼尋逐不住恁麼不取古人語行菩薩行唯一人行天魔波旬領諸眷屬常隨菩薩後覓心行起處便擬撲倒如是經無量劫覓一念異處不可得方與眷屬禮辭讚歎供養猶是進修位中下之人便不奈何況絶功用處如文殊普賢更不話他兄弟作麼生道行是無覓一日行底人不可得今時傍家從年至歲只是覓究竟作麼生空弄唇舌生解曰當恁麼時無佛名無衆生名使某甲作麼圖度師曰你言無佛名無衆生名早是圖度了也亦是記他言語曰若如是悉屬佛出世時事了不可不言師曰你作麼生言曰設使言言亦不及師曰若道言不及是及語你虗恁麼尋逐誰與你為境曰既無為境者誰是那邊人師曰你若不引教來即何處論佛既不論佛老僧與誰論這邊那邊曰果雖不住道而道能為因如何師曰是他古人如今不可不奉戒我不是渠渠不是我作得伊如狸奴白牯行履却快活你若一念異即難為修行曰云何一念異難為修行師曰才一念異便有勝劣二根不是情見隨他因果更有什麼自由分曰每聞和尚説報化非真佛亦非説法者未審如何師曰緣生故非曰報化既非真佛法身是真佛否師曰早是應身也曰若恁麼即法身亦非真佛師曰法身是真非真老僧無舌不解道你教我道即得曰離三身外何法是真佛師曰這漢共八九十老人相罵向你道了也更問甚麼離不離擬把楔釘他虗空曰伏承華嚴經是法身佛説如何師曰你適來道什麼語其僧重道或作問師顧視歎曰若是法身説你向甚麼處聽曰某甲不會師曰大難大難傳燈至此云好去珍重遂止而師語録復有下文汝看亮座主是蜀中人解講三十二本經論於江西講次來見開元寺老宿宿問見説座主解講經是否主云不敢宿云將什麼講主云將心講宿云心如工伎兒意如和伎者爭解講得主云莫是虗空講得宿云却是虗空講得主拂袖便行宿召座主主回首宿云是什麼主便開悟兄弟看他快利麼僧云據和尚説即法身説法師云若如是會早是應身了也僧云既是應身豈無説法者師云我不知云某不會師云不會却好免與他分疏問教中道法身大士會處即見法身佛地位菩薩即見報身佛二乘唯見化身佛莫是此理否師曰我眼不曾看教兼無耳孔不曾聽你自看取若如是憶持即已後始不奈何如似弄珠説珠光遍有金盤在即得忽被拈却金盤去何處弄珠向什麼處尋他光遍與不遍學人禮拜和尚笑云大難大難古人罵你喚作田獵漁捕喚作搬糞人好去珍重示衆真理一如潛行密用無人覺知呼為應有無字滲智亦云無滲不可思議等空不動性非生死流道是大道無礙涅槃妙用自足始與一切行處而得自在故云於諸行處無所而行亦云遍行三昧普現色身只為無人知他用處無蹤迹不屬見聞覺知真理自通妙用自足大道無形真理無對所以不屬見聞覺知無粗細想如云不聞聞是大涅槃道這個物不是聞不聞僧問大道不屬見聞覺知未審如何契會師云須會冥契自通亦云了因非從見聞覺知有見知屬緣對物始有者個靈妙不可思議不是有對故云妙用自通不依傍物所以道通不是依通事須假物方始得見所以道非明暗法離有離無潛理幽通無人覺知亦云冥會真理非見聞覺知故云息心達本源故號如如佛畢竟無依自在人亦云本果不從生因之所生文殊云惟從了因之所了不從生因之所生從上已來只教人會道更不別求若思量作得道理盡屬句義三乘五性義理無不喚作行履處處受用具足即得若論道即不是一向耽著被他識拘亦云世間智教云一向耽著三藏學者為田獵漁捕為利養故煞害大乘亦云貪欲成性所以云佛不會道我自修行我自有妙用亦云正因了六波羅蜜空即物拘我不得所以祖師西來恐你諸人迷著因果地位故來傳法救迷情頓悟花情已性是花種性亦云菩提花故江西老宿云不是心不是佛不是物先祖雖説即心即佛是一時間語空拳黃葉止啼之説如今多有人喚心作佛喚智為道見聞覺知皆是道若如是會者何如應作殊演若達多迷頭認影設使認得亦不是汝本來頭故大士訶迦旃延以生滅心説實相法皆是情見若言即心即佛者如兔馬有角非心非佛牛羊無角汝心若是佛亦何用非他有無形相以何是道所以教中不許寧作心師不師於心心如工伎兒意如和伎者故云佛有道心此處有脫誤原録如是姑因之不離見聞覺知皆屬因緣而有皆是照物而有不可常照所以心智俱不是道且大道非明暗法雖應作離有無數數不能及如空劫時無佛名無衆生名與麼時正是道只是無人覺知見他數不及他喚作無名大道早屬名句了也所以真理一如更無思想才有思想即被陰拘便有衆生名有佛名佛出世來喚作三界智人只如未出世時喚作什麼如云不得而得有無而興大慈佛出世只令人會道體非凡聖喚作還源歸本體解大道今日既如是會道即無量劫來六道四生皆有去來是暫時行履處先聖本行集云我無所不行一切衆生雖在如是行處為無了因故生貪欲名為在纏不得自在暫時岐路雲駛月運舟行岸移衆生妄想物無不住豈況理能遷變今既如是會却向裏許行履不同前時為了因會本果故了陰界空六波羅蜜空所以得其自在若不向裏許行履如何摧銼得五種貪二種欲不守住聲聞隨於劫數所以諸佛菩薩具福智二嚴為了因了六波羅蜜空體者個受用所以不存知見始得自在若有知見即屬地位便有分劑心量被因果隔喚作酬因答果佛不得自在所以大聖訶他為內見外見情量不盡二障二愚所以見河能漂香象真理無形如何知見大道無形理絶思量今日行六波羅蜜先用了因會本果故了此物是方便受用始得自由去住自在無障礙亦云方便勤莊嚴亦云微妙淨法身具相三十二只是不許分劑心量若無如是心一切行處乃至彈指合掌皆是正因萬善皆同無終此字應是作字始得自在所以天魔外道求我不得喚作無住心亦云無滲智不思議妙用自在菩提涅槃皆是修行人境界皆屬明句若會本來非凡物即水不能洗水何以故本來無物故經云我王庫中實無如是刀又云功德天黑暗女有智主人二俱不受所以道非明暗故云性海不是覺海覺海涉緣即須對物他便妙用無人覺知喚作極微細透金色水塵菩薩所因喚作受用具若水不洗水即體不是明暗亦云無滲智又云無礙智若如是即一切處拘我不得如今更別求建立義句覓勝負知解語言言衆生劣有佛聖救衆生求佛菩提皆屬貪欲亦云破戒比丘與道懸隔大道無明未曾有暗非三界攝非去來今如來藏實不覆藏師子何曾在窟五陰本空何曾有處所且法身無為不墮諸數法無動搖不依六塵故經云佛性是常心是無常所以智不是道心不是佛如今且莫喚心作佛莫作見聞覺知會者個物且本來無許多名字妙用自通數量管他不得是大解脫所以道人心無住處蹤迹不可尋故云無滲智不思議智看他池州崔使君問五祖大師云徒衆五百何以能大師獨受衣傳信餘人為甚麼不得五祖云四百九十九人盡會佛法惟有能大師是過量人是過量人或作不會佛法所以傳衣信崔云故知道非愚智便告大衆總須記取師云記得屬第六識不堪無事珍重又云暫時披垢膩之衣來為人説破不是凡聖物他家早晚與人為因亦不曾與人為果若與人為因即不自在被因果所拘不得自由佛未出世時無人會得若出世邊論還許少分會但以冥理自通無師自爾本自無物由是見聞覺知即是報化所以三十二相異體故若離彼即同如來報化佛總打却何處存立不是不許只如彌勒又作凡夫他熾然行六波羅蜜他家觸處去得因什麼便不許他他不曾滯著凡聖所以那邊會了却來這邊行履始得自由分今時學人多分出家不肯入家好處即認惡處即不認爭得所以菩薩行於非道是為通達佛道他家去住得自由且如何若知即被知處所拘若不恁麼爭得不許他他者個定不曾變異若不定即屬造化也他那個早晚曾變動所以十二分教決定不是我我即向十二分教中行履得若十二分教是我即受變也又云大道一如無師自爾若能如如不變故不曾迷報化非真佛莫認法身凡聖果報皆是影若認著即屬無常生滅也粗細而論纖毫不立窮理盡性一切全無如世界未成時洞然空廓無佛名無衆生名始有少分相應直向那邊會了却來這裏行履不證凡聖果位據本而論實無少法可得豈況三乘五性差別名數但是有因有果盡屬無常生滅也又云心如枯木始有少許相應又云但會取無量劫來性不變異即是修行妙用而不住便是菩薩行達諸法空妙用自在色身三昧熾然行六波羅蜜空處處無礙遊於地獄猶如變觀準法華變當作園不可道伊不得作用衆生無量劫來迷於本性不自了體雲塵暫翳著諸惡欲雲駛月運舟行岸移暫時岐路不得自在種種受苦不自覺知乃至今日會取從來性與今日不別師將順世第一座問和尚百年後向甚麼處去師曰山下作一頭水牯牛去座曰某甲隨和尚去還得也無師曰汝若隨我即須銜取一莖草來師乃示疾大和八年甲寅十二月二十五日凌晨告門人曰星翳燈幻亦久矣勿謂吾有去來也言訖而逝世壽八十七臘五十八
