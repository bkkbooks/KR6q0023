body:
  text: 六祖下第七世撫州金峰從志禪師拈起枕子示僧曰一切人喚作枕子金峰道不是僧曰未審和尚喚作甚麼師拈起枕子僧曰恁麼則依而行之師曰你喚作甚麼曰枕子師曰落在金峰窩裏問是身無知如土木瓦石此意如何師下禪牀扭僧耳朵僧負痛作聲師曰今日始捉著個無知漢僧作禮出去師召闍黎僧回首師曰若到堂中不可舉著曰何故師曰大有人笑金峰老婆心上堂事存函蓋合理應箭鋒拄還有人道得麼如有人道得金峰分半院與他住時有僧出作禮師曰相見易得好共住難為人便下座僧侍次師曰舉一則因緣汝第一不得亂會曰請和尚舉師竪拂子僧良久師曰知道闍黎亂會僧以目視東西師曰雪上更加霜師一日見僧來便起身僧便出去師曰恰共昨日那師僧見解不別僧遂回曰昨日僧道甚麼師曰恰與麼問曰知道金峰有眼師曰金峰且置你今日何處喫飯曰道著即不中師曰與麼則無來處也曰老婆心堪作甚麼師曰金峰問僧不曾弱他就中闍黎無話處曰豈是分別師曰小慈訪大慈師問僧發足甚處曰趙州師曰趙州法嗣何人曰南泉師曰你何曾離趙州曰未審和尚尊意何如師曰趙州實嗣南泉僧至晚請益曰今日蒙和尚慈悲某甲未會請和尚指示師曰若到別處莫道後語是金峰底曰為甚如此曰恐辱他趙州師一日上堂喫胡餅次乃拈一個從上座板頭轉一匝大衆見一一合掌師曰假饒十分擡起手也只得一半至晚間有僧請益曰今日和尚行胡餅見衆僧合掌曰假饒十分擡起手也只得一半請和尚全道師以手作拈餅勢曰會麼曰不會師曰金峰也始道得一半處州廣利容禪師因僧到師乃竪拂子云貞溪老漢還具眼麼僧云某甲不敢見人過師云老僧死在闍黎手裏僧以手指胸便出去師云闍黎參見先師來至晚請喫茶了僧拈起盞子云這個是諸佛出世邊事作麼生是未出世邊事師以手撥却盞云到闍黎死在老僧手裏僧云五里牌在郭門外師云無故惑亂師僧僧遂起謝茶師曰特謝闍黎相訪洪州鳳棲山同安丕禪師問如何是和尚家風師曰金雞抱子歸霄漢玉兔懷胎入紫微曰忽遇客來將何祇待師曰金果朝來猿摘去玉花晚後鳳銜歸新到參師問甚處來曰湖南師曰還知同安這裏風雲體道花檻璇璣麼曰知師曰非公境界僧便喝師曰短販樵人徒誇書劍僧擬進語師曰劍甲未施賊身已露杭州佛日本空禪師初遊天台山嘗曰如有人奪得我機者即吾師矣尋謁雲居作禮問曰二龍爭珠誰是得者居曰卸却業身來與子相見師曰業身已卸居曰珠在甚麼處師無對遂投誠入室時年始十三後四年參夾山才入門見維那那曰此間不著後生師曰某甲不求挂搭暫來禮謁和尚維那白夾山山許相見師未升階山便問甚處來師曰雲居來曰即今在甚麼處師曰在夾山頂𩕳上山曰老僧行年在坎五鬼臨身師擬上階山曰三道寶階從何而上師曰三道寶階曲為今時向上一路請師直指山便揖師乃上階禮拜山問闍黎與甚麼人同行師曰木上座山曰何不相看老僧師曰和尚看他有分山曰在甚麼處師曰在堂中山便同師下到堂中師遂取拄杖擲在山面前山曰莫從天台得否師曰非五嶽之所生山曰莫從須彌得否師曰月宮亦不逢山曰恁麼則從人得也師曰自己尚是冤家從人得堪作甚麼山曰冷灰裏有一粒豆𪹼乃喚維那明下安排著師曰未審明還解語也無山曰待明解語即向汝道夾山來日上堂問昨日新到在甚麼處師出應諾山曰子未到雲居已前在甚麼處師曰天台國清山曰吾聞天台有潺潺之瀑淥淥之波謝子遠來此意如何師曰久居巖谷不挂松蘿山曰此猶是春意秋意作麼生師良久山曰看君祇是撐船漢終歸不是弄潮人來日普請維那令師送茶師曰某甲為佛法來不為送茶來那曰奉和尚處分師曰和尚尊命即得乃將茶去作務處搖茶甌作聲山回顧師曰釅茶三五碗意在钁頭邊山曰瓶有傾茶勢籃中幾個甌師曰瓶有傾茶勢籃中無一甌便行茶時衆皆舉目師曰大衆鶴望請師一言山曰路逢死蛇莫打殺無底籃子盛將歸師曰手執夜明符幾個知天曉山曰大衆有人也歸去來歸去來遂住普請歸院衆皆仰嘆池州稽山章禪師在投子作柴頭投子同喫茶次謂師曰森羅萬象總在裏許師潑却茶曰森羅萬象在甚麼處子曰可惜一碗茶師後謁雪峰峰問莫是章柴頭麼師乃作輪推勢峰肯之朱溪謙禪師韶國師到參次聞犬咬靈鼠聲韶問是甚麼聲曰犬咬靈鼠聲韶曰既是靈鼠為何却被犬咬曰咬殺也韶曰好個犬師便打韶曰莫打某甲話在師休去南康軍雲居道簡禪師初造雲居謁膺公膺公與語連三日大奇之而誡令刻苦事衆於是師躬操井臼司樵㸑遍掌寺務不妨商略古今衆莫有知者以臘高為堂中第一座先是高安洞山有神靈甚膺公住三峰時受服役既來雲居神亦隨至舍於枯樹之下而樹茂號安樂樹神屬膺公將順寂主事請問誰堪繼嗣膺公曰堂中簡主事雖承言而意不在師謂當簡擇堪說法者僉屬意第二座而姑請師意師必辭也師既夙受記莂無所辭遜即攝衆演法主事大沮師察知之一夕遁去其夕安樂樹神號泣詰旦衆追至麥莊悔過迎歸聞空中連聲唱曰和尚來也問路逢猛虎時如何師曰千人萬人不逢為甚麼闍黎偏逢問孤峰獨宿時如何師曰閒却七間僧堂不宿阿誰教汝孤峰獨宿問古人云若欲保任此事直須向高高山頂立深深海裏行意旨如何曰高峰深海迥絶孤危似汝閨閣中軟暖麼洪覺範曰大陽明安嘗疏藥山之語曰高高山上標不出深深海底藏不沒其兒孫遵承之以為妙得其旨及聞雲居之言則如真虎踞地而吼百獸震恐乃悟明安所示蓋裴旻之虎也豫為作偈曰高高山頂立深深海裏行道人行立處塵世有誰爭無間功不立渠儂尊貴生酬君顛倒欲枯木一枝榮問如何是朱頂王菩薩師曰問這赤頭漢作麼高庵悟云這個便是超宗越格底事直是無你會處須是悟了更能履踐始得諸人還明得麼乃頌曰朱頂王菩薩元是赤頭漢驚怪李三黑一生只賣炭壽八十餘無疾而化護國守澄禪師在湖南報慈一日慈升堂有演化禪人出問云如何是真如佛性慈云誰無參退首座問云汝適來問和尚話還會麼化云不會座云和尚恁麼慈悲汝為甚麼不會真如佛性誰無乃至六道四生悉皆具足化云感首座為某說破師不覺咬齒云這漢自家無眼更瞎他人却召化問首座適來說個什麼化云某甲當初不會得他指示具如前說師云佛法不是這個道理汝不信問取堂頭和尚化遂去堂上具說前解以求印證慈亦云佛法不是這個道理化云適來問淨果大師他亦不肯教來問和尚望慈悲決破慈云你却去問取他化乃過師處作禮云和尚令某甲來請益師云汝但問來化乃問如何是真如佛性師云誰有化遂契悟乃云師向後或在衆或住持某甲願終身佐助後相繼住持護國黃檗山慧禪師初業經論因增受菩薩戒歎曰大土攝律儀與吾本受聲聞戒俱止持作犯也然於篇聚增減支本通別制意且殊既微細難防復於攝善中未嘗行於少分況饒益有情乎且世間泡幻身命何可留戀哉由是置講課欲捐身水中以飼鱗甲之類事已將行值禪者策發乃造疏山時仁和尚坐法堂受參師先顧視大衆然後致問曰剎那便去時如何山曰畐塞虗空汝作麼生去師曰畐塞虗空不如不去山便休師下堂參第一座座曰適來祇對甚奇特師曰此乃率爾敢望慈悲開示愚昧座曰一剎那間還有擬議否師於言下頓省禮謝師示滅塔於本山肉身至今如生伏龍山奉璘禪師問和尚還愛財色也無師曰愛曰既是善知識為甚麼却愛財色師曰知恩者少襄州石門獻蘊禪師問青林如何用心得齊於諸聖林仰面良久曰會麼師曰不會林曰去無子用心處師禮拜乃契悟更不他遊遂作園頭一日歸侍立次林曰子今日作甚麼來師曰種菜來林曰遍界是佛身子向甚處種師曰金鉏不動土靈苗在處生林欣然來日入園喚蘊闍黎師應諾林曰剩栽無影樹留與後人看師曰若是無影樹豈受栽耶林曰不受栽且止你曾見他枝葉麼師曰不曾見林曰既不曾見爭知不受栽師曰止為不曾見所以不受栽林曰如是如是林將順寂召師師應諾林曰日轉西山後不須取次安師曰雪滿金檀樹靈枝萬古春林曰或有人問你金針線囊事子道甚麼師曰若是羽毛相似者某甲終不敢造次問不落機關請師便道師曰湛月迅機無可比君今曾問幾人來曰即今問和尚師曰好大哥雲綻不須藏九尾恕君殘壽速歸丘問月生雲際時如何師曰三個孩兒抱華鼓好大哥莫來攔我毬門路般若寺被焚有人問曰既是般若為甚麼被火燒師曰萬里一條鐵師應機多云好大哥時稱大哥和尚京兆府重雲智暉禪師得法白水事之十年而還洛京愛中灘佳山水創屋以居號溫室院日以施水給藥為事人莫能淺深之有病比丘為衆惡棄之比丘哀曰我以夙業白癩師能為我洗摩師為之無難色俄有神光異香方訝之忽失所在旋視瘡痂亦皆異香也梁開平五年忽欲至圭峰山行翛然深往坐巖石間如嘗寢處顧見磨衲數珠銅瓶棕笠藏石壁間觸之即壞斂目良久曰此吾前身道具也因就其處建寺以酬夙心方剃草有祥雲出衆峰間遂名曰重雲虎豹隱去有龍湫威靈不可犯師督役夷塞之以為路龍亦移他處但見雲雷隨之後唐明宗聞而佳之賜額曰長興住持餘四十年節度使王彥超微時嘗從師遊欲為沙門師熟視曰汝世緣深當為我家垣墻彥超後果鎮永興申弟子之禮周顯德三年夏詣永興與彥超別囑以護法彥超泣曰公遂忍棄弟子乎師笑曰借千年亦一別耳七月二十四日書偈一首曰我有一間舍父母為修蓋往來八十年近來覺損壞早擬移別處事涉有憎愛待他摧毀時彼此無妨礙乃跏趺而化杭州瑞龍院幼璋禪師唐相國夏侯孜之姪七歲遊慧照寺忽求出家孜不許師即絶飲食不可奪遂許之後印心白水至江陵騰騰和尚語之曰汝往天台尋靜而棲遇安而止又值憨憨和尚語之曰汝却後四十年有巾子山下菩薩王於江南當此時吾道昌矣師入台則居靜安鄉之福唐院天祐三年錢尚父禮延師至府大尊隆白法騰騰憨憨之記悉符云上堂老僧頃年遊歷江外嶺南荊湖但有知識叢林無不參問來蓋為今日與諸人聚會各要知個去處然諸方終無異說祇教當人歇却狂心休從他覓但隨方任真亦無真可任隨時受用亦無時可用設垂慈苦口且不可呼晝作夜更饒善巧終不能指東為西脫或能爾自是神通作怪非干我事若是學語之流不自省己知非直欲向空裏採花波中取月還著得心力麼汝今各自退思忽然肯去始知瑞龍老漢事不獲已迂回太甚還肯麼天成二年丁亥四月師入府辭尚父囑以護法刻期順寂報慈藏嶼禪師僧問情生智隔想變體殊祇如情未生時如何師曰隔曰情未生時隔個甚麼師曰這個梢郎子未遇人在韶州雲門山光奉院文偃禪師嘉興人也姓張氏幼依空王寺志澄律師出家敏質生知慧辨天縱及長落髮稟具於毗陵壇侍澄數年探窮律部以己事未明往參睦州州才見來便閉却門師乃扣門州曰誰師曰某甲州曰作甚麼師曰己事未明乞師指示州開門一見便閉却師如是連三日扣門至第三日州開門師乃拶入州便擒住曰道道師擬議州便推出曰秦時𨍏轢鑽遂掩門損師一足師從此悟入州指見雪峰師到雪峰莊見一僧乃問上座今日上山去那僧曰是師曰寄一則因緣問堂頭和尚祇是不得道是別人語僧曰得師曰上座到山中見和尚上堂衆才集便出握腕立地曰這老漢項上鐵枷何不脫却其僧一依師教雪峰見這僧與麼道便下座攔胸把住曰速道速道僧無對峰拓開曰不是汝語僧曰是某甲語峰曰侍者將繩棒來僧曰不是某語是莊上一浙中上座教某甲來道峰曰大衆去莊上迎取五百人善知識來師次日上雪峰峰才見便曰因甚麼得到與麼地師乃低頭從茲契合溫研積稔密以宗印授焉圜悟碧巖集云師承睦州旨往見雪峰一到便出衆問曰如何是佛峰云莫寐語師便禮拜一住三年雪峰一日問子見處如何師云某甲見處與從上諸聖不移易一絲毫僧寶傳謁雪峰峰方堆桅坐為衆說法師犯衆出熟視曰項上三百斤鐵枷何不脫却峰曰因甚到與麼師以手自拭其目趨去峰心異之明日升座曰南山有鱉鼻蛇諸人出入好看師以拄杖攛出又自驚栗自是輩流改觀三録載師見雪峰事其不同若此因并録以備考師在雪峰僧問峰如何是觸目不會道運足焉知路峰云蒼天蒼天僧不會遂問師蒼天意旨如何師云三斤麻一匹布僧云不會師云更奉三尺竹峰聞喜云我常疑個布衲師出嶺遍謁諸方師行腳時見一座主舉在天台國清寺齊時雪峰拈鉢盂問某道得即與你鉢盂某云此是化佛邊事峰云你作座主奴也未得某云不會峰云你問我與你道某始禮拜峰便踏倒某得七年方見師云是你得七年方見曰是師曰更與七年始得師在浙中蘊和尚會裏一日因喫茶次舉蘊和尚垂語云見聞覺知是法法離見聞覺知作麼生有旁僧云見定如今目前一切見聞覺知是法法亦不可得師拍手一下蘊乃舉頭師云猶缺一著在蘊云我到這裏却不會師到洞巖巖問作甚麼來師曰親近來巖曰亂走作麼師曰暫時不在巖曰知過即得師曰亂走作麼到疏山仁仁問得力處道將一句來師曰請高聲問山即高聲問師笑曰今日喫粥麼山曰喫粥師曰亂呌喚作麼到臥龍問明己底人還見有己麼龍曰不見有己始明得己又問長連牀上學得底是第幾機龍曰是第二機曰如何是第一機龍曰緊峭草鞋妙喜曰騎賊馬趕賊隊借婆帔子拜婆年到歸宗僧問大衆雲集合談何事宗云兩兩三三僧云不會宗云三三兩兩師却問僧歸宗意旨如何僧云全體與麼來師云上座曾到潭州龍牙麼云曾到師云打野榸漢到天童童曰你還定當得麼師曰和尚道甚麼童曰不會則目前包裹師曰會則目前包裹到鵝湖聞上堂曰莫道未了底人長時浮逼逼地設使了得底明明得知有去處尚乃浮逼逼地師下問首座適來和尚意作麼生曰浮逼逼地師曰首座久在此住頭白齒黃作這個語話曰上座又作麼生師曰要道即得見即便見若不見莫亂道曰祇如道浮逼逼地又作麼生師曰頭上著枷腳下著杻曰與麼則無佛法也師曰此是文殊普賢大人境界到江州有陳尚書者請齊才見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行腳事師曰曾問幾人來書曰即今問上座師曰即今且置作麼生是教意書曰黃卷赤軸師曰這個是文字語言作麼生是教意書曰口欲談而辭喪心欲緣而慮忘師曰口欲談而辭喪為對有言心欲緣而慮忘為對妄想作麼生是教意書無語師曰見說尚書看法華經是否書曰是師曰經中道一切治生産業皆與實相不相違背且道非非想天有幾人退位書無語師曰尚書且莫草草三經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會書禮拜曰某甲罪過後抵靈樹冥符知聖接首座之記初知聖在靈樹二十年不請首座常云我首座生也我首座牧牛也我首座行腳悟道也一日令衆擊鐘三門外接首座衆出迓而師至樹曰奉遲久矣即延師為首座俄廣主劉欲舉兵躬入院請樹決臧否樹已先知怡然坐化主問知事曰和尚何時得疾對曰不曾有疾適封一函子令呈大王主開函得一帖子云人天眼目堂中上座主悟樹旨遂寢兵請師繼樹開法未幾遷雲門光泰寺僧問生法師曰敲空作響擊木無聲如何師以拄杖空中敲云阿㖿阿㖿又敲板頭云作聲麼僧云作聲師云這俗漢又敲板頭云喚甚麼作聲師以足跛常把拄杖行見衆方普請舉拄杖曰看看北鬱單越人見汝搬柴不易在中庭裏相撲供養汝更為汝念般若經曰一切智智清淨無二無二分無別無斷故衆環擁之久不散乃曰汝諸人無端走來這裏覓什麼老僧只管喫飯屙矢別解作什麼汝諸方行腳參禪問道我且問汝諸方參得底事作麼生試舉看於是不得已自誦三平偈曰即此見聞非見聞回視僧曰喚什麼作見聞又曰無餘聲色可呈君謂僧曰有甚麼口頭聲色又曰個中若了全無事謂僧曰有甚麼事又曰體用何妨分不分乃曰語是體體是語舉拄杖曰拄杖是體燈籠是用是分不分不見道一切智智清淨聞擊齊鼓曰鼓聲咬破我七條乃指僧曰抱取猫兒來良久曰且道鼓因甚置得衆無對者乃曰因皮置得我尋常道一切聲是佛聲一切色是佛色盡大地是個法身枉作個佛法知見如今拄杖但喚作拄杖見屋但喚作屋傳燈作師上堂聞鐘聲乃曰世界與麼廣闊為甚麼鐘聲披七條徑山杲頌鐘聲披起鬱多羅碧眼胡兒沒奈何一箭雙鵰隨手落拈來元是樹中鵝至僧堂中僧爭起迎師立而語曰石頭道回互不回互僧便問作麼生是不回互師以手指曰這個是板頭又問作麼生是回互曰汝喚什麼作板頭問新到你諸方行腳道我知有與我拈三千大千世界來眼睫上著僧云喏師云錢塘為甚麼去國三千里僧云豈干他事師云者掠虗漢問首座乾坤大地與你自己是同是別曰同師曰一切物命蛾蛘蟻子是同是別曰同師曰你為什麼干戈相待問古人道知有極則事如何是極則事師云爭奈在老僧手裏何進云某甲問極則事師便棒云吽吽正當撥破便道請益這般底到處但知亂統近前來我問你尋常在長連牀上商量向上向下超佛越祖你道水牯牛還有超佛越祖底道理麼僧云適來已有人問了也師云這個是長連牀上學得底不要有便言有無便言無僧云若有更披毛帶角作麼師云將知你祇是學語之流又云來來我更問你諸人橫擔拄杖道我參禪學道便覓個超佛越祖底道理我且問你十二時中行住坐臥屙矢送尿至於茆坑裏蟲子市肆買賣羊肉案頭還有超佛越祖道理麼道得底出來若無莫妨我東行西行便下座問如何是法身向上事師曰向上與汝道即不難作麼生會法身曰請和尚鑒師曰鑒即且置作麼生會法身曰與麼與麼師曰這個是長連牀上學得底我且問你法身還解喫飯麼僧無對師又云法身喫飯幻化空身即法身乾坤大地何處有也物物不可得以空噇空若約檢點來將謂合有與麼說話妙喜曰龍頭蛇尾得入憎法身喫飯以空噇空喚作無得麼我恁麼道且作死馬醫示衆云燈籠是你自己把鉢盂噇飯飯不是你自己有僧便問飯是自己時如何師云這野狐精三家村裏漢復云來來不是你道飯是自己云是師云驢年夢見三家村裏漢妙喜云用盡自己心笑破他人口舉座主就華嚴講請翠巖齊巖云山僧有個問座主若道得即齊巖便拈起胡餅云還具法身麼主云具法身巖云與麼則喫法身也主無語本講座主代云有什麼過巖不肯東使云喏喏師代云特謝和尚降重空筵師云光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有個物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細點檢將來有甚麼氣息亦是病妙喜曰不用作禪會不用作道會不用作向上商量此是雲門老漢據實而論我恁麼道有沒量罪過汝若點檢得出許你具擇法眼若黠檢不出且向雲門葛藤裏參妙喜又曰而令學實法者以透過法身為極致而雲門反以為病不知透過法身了合作麼生到這裏如人飲水冷暖自知不著問別人問別人則禍事也垂語云人人盡有光明在看時不見暗昏昏作麼生是諸人光明自代云厨庫三門又云好事不如無圜悟勤云如今人才聞舉著光明便去瞪眼云那裏是厨庫那裏是三門且得沒交涉所以道識取鈎頭意莫認定盤星此事不在眼上亦不在境上須是絶知見忘得失淨裸裸赤灑灑各各當人分上究取始得雲門云日裏來往日裏辨人忽然半夜無日月燈光曾到處則固是未曾到處取一件物還取得麼參同契云當明中有暗勿以暗相覩當暗中有明勿以明相遇若坐斷明暗且道是個甚麼所以道心華發明照十方剎盤山云光非照境境亦非存光境俱亡復是何物又云即此見聞非見聞無餘聲色可呈君個中若了全無事體用何妨分不分但會取末後一句了却去前頭游戲畢竟不在裏頭作活計古人道以無住本立一切法不得去這裏弄光影弄精魂又不得作無事會古人道寧可起有見如須彌山不可起無見如芥子許二乘人多偏墜此見雪竇頌自照列孤明為君通一線花謝樹無影看時誰不見見不見倒騎牛兮入佛殿拈拄杖曰凡夫實謂之有二乘析謂之無圓覺謂之幻有菩薩當體即空衲僧家見拄杖便喚作拄杖行但行坐但坐不得動著問樹凋葉落時如何師云體露金風圜悟云且道雲門為是答他話為是與他酬唱若道答他話錯認定盤星若道與他唱和且得沒交涉既不恁麼畢竟作麼生你若見得透衲僧鼻孔不消一揑其或未然依舊打入鬼窟裏去又云你若去他三句中求則腦後拔箭他一句中須具三句有講僧參經時乃曰未到雲門時恰似初生月及乎到後曲彎彎地師得知乃問是你道否曰是師曰甚好吾問汝作麼生是初生月僧乃斫額作望月勢師曰你如此已後失却目在僧經旬日復來師又問你還會也未曰未會師曰你問我僧便問如何是初生月師曰曲彎彎地僧罔措後果然失目白雲端云這僧失却目雲門和鼻孔不見雖然如是家住州西黃龍新云語驚時聽得無動機若謂這僧失雙目入地獄如箭射東禪觀云這僧雖失雙目光射九天雲門兩眼雖存前明後暗問一生積惡不知善一生積善不知惡此意如何師曰燭僧問靈樹如何是祖師西來意樹默然遷化後門人立行狀欲入此語問師曰先師默然處如何上師對曰師問殺父殺母向佛前懺悔殺佛殺祖向甚麼處懺悔師曰露問承古有言了即業障本來空未了應須償宿債未審二祖是了不了師曰確問新到甚處人曰新羅師曰將甚麼過海曰草賊大敗師引手曰為甚麼在我這裏曰恰是師曰一任𨁝跳僧無對問十二時中如何得不空過師曰向甚麼處著此一問曰學人不會請師舉師曰將筆硯來僧乃取筆硯來師作一頌曰舉不顧即差互擬思量何劫悟問一口吞盡時如何曰我在你肚裏曰和尚為甚麼在學人肚裏師曰還我話頭來師問嶺中順維那古人竪起拂子放下拂子意旨如何順曰拂前見拂後見師曰如是如是師後舉問僧你道當初諾伊不諾伊僧無對師曰可知禮也問直歲甚處去來曰刈茆來師曰刈得幾個祖師曰三百個師曰朝打三千暮打八百東家杓柄長西家杓柄短又作麼生歲無語師便打問僧甚處來曰西禪師曰西禪有何言句僧展兩手師與一掌曰某甲話在師却展兩手僧無語師又打問僧甚麼處來曰禮塔來師曰謔我曰某甲實禮塔來師曰五戒也不持問僧看什麼經僧云瑜伽論師云義墮也僧云甚麼處義墮師云自領出去問僧看甚麼經其僧却指旁僧云和尚問何不祇對師云露柱為甚麼倒退三千里僧云豈干他事師曰學語之流代云洎合不識勢問佛法如水中月是否師曰清波無透路曰和尚從何得師曰再問復何來曰正與麼時如何師曰重疊關山路問上無攀仰下絶己躬時如何師曰藏身一句作麼生道僧便禮拜師曰放過一著置將一問來僧無語師云這死蝦蟇師問明教今日喫得幾個胡餅曰五個師曰露柱喫得幾個曰請和尚茶堂裏喫茶師齊次拈起匙筯云我不供養南僧祇供養北僧時有僧問為甚麼不供養南僧師云我要鈍置伊云為甚麼祇供養北僧師云一箭兩垛有僧問祇如前意如何師云好即同榮師見新到云雪峰和尚道開却路達磨來也我問你作麼生僧云築著和尚鼻孔師云地神惡發把須彌山一摑𨁝跳上梵天拶破帝釋鼻孔你為甚麼向鼻孔裏藏身僧云和尚莫瞞人好師云築著老僧鼻孔又作麼生僧無對師云將知你祇是學語之流代云邏邏哩妙喜曰擔一擔懵懂換得一擔骨董無星稱子稱來付與無知漆桶且道無知漆桶將作何用你若道得活脫句許你親見雲門師見飯頭云汝是飯頭麼云是師云顆裏有幾米米裏有幾顆頭無對代云某甲瞻星望月問聖僧為甚麼被大蟲咬師云與天下人作榜樣王太傅問北院古人道普現色身遍行三昧佛法為甚麼不到北俱盧洲院云祇為遍行所以不到師云如法置一問來韋監軍見帳子畫牛抵樹問僧牛抵樹樹抵牛僧無對師代云歸依佛法僧師坐次有僧非時上來師云作甚麼僧云請益師云你有什麼疑僧云某甲曾問和尚一宿覺搬柴柴搬一宿覺師乃敲椅子三下云你作麼生會僧云一切臨時師乃揎拳云我與你相撲一交得麼僧無對次日僧再上值師潄盥次師乃將水碗過與僧云送去厨下著其僧送去了却來師見來乃從後門出去其僧云比來請益祇得一口碗問僧甚處來曰搬柴來師曰搬得多少轉一宿覺曰二十轉師曰你為甚麼打落當門齒僧無對師便打曰學語之流自代曰也知和尚佛法身心又代前語曰搬柴早是辛苦因供養羅漢問僧今夜供養羅漢你道羅漢還來也無僧無對師曰你問我僧便問師曰換水添香僧曰與麼即來也師云有什麼饅頭䭔子速下來問僧甚處來云涅槃堂師云亡僧還喫飯麼僧云不喫師云活人還喫飯麼無對師入京朝覲歸至大橋山門煎茶迎師師喫茶果次僧侍立師語二參隨僧云是你京中無可喫乃拈一楪果子與一僧其僧接得便去又語一僧云我不與你僧無對師云那裏也有也其僧又無對別有僧出云某甲今日也隨和尚來請一分得麼師云嗄僧云某甲罪過觸忤和尚師云我也不能唾得你僧無對師代前語云也知果子少兩人共一楪代後語云某甲更是一日行次一僧隨後行師竪起拳云如許大栗子喫得幾個僧云和尚莫錯師云是你錯僧云莫壓良為賤師云靜處薩婆訶問如何是清淨法身師曰花藥欄曰便恁麼去時如何師曰金毛師子雪竇頌云花藥欄莫顢頇星在稱兮不在盤善恁麼太無端金毛師子大家看問如何是一代時教師曰對一說雪竇頌云對一說太孤絶無孔鐵椎重下楔閻浮樹下笑呵呵昨夜驪龍拗角折別別韶陽老人得一橛問不是目前機亦非目前事時如何師曰倒一說雪竇頌云倒一說分一節同死同生為君決八萬四千非鳳毛三十三人入虎穴別別擾擾匆匆水裏月問如何是塵塵三昧師曰鉢裏飯桶裏水雪竇頌云鉢裏飯桶裏水多口阿師難下嘴北斗南星位不殊白浪滔天平地起擬不擬止不止個個無裩長者子問如何是雲門一句師曰臘月二十五問如何是法身師曰六不收圜悟別云一不立雪竇頌一二三四五六碧眼胡僧數不足少林漫說付神光卷衣又說歸西竺西竺茫茫無處尋夜來却對乳峰宿問如何是超佛越祖之談師曰胡餅問如何是佛師曰乾矢橛問如何是諸佛出身處師曰東山水上行問不起一念還有過也無師曰須彌山問如何是透法身句師曰北斗裏藏身白雲端頌五陵公子遊花慣未第貧儒自古多令地看他人富貴等間不奈幞頭何廬山玉澗林禪師頌北斗藏身為舉揚法身從此露堂堂雲門賺殺他家子直至如今漫度量後五祖戒見林問作偈之意林舉目視之戒曰若果如此雲門不值一錢公亦當無兩目遂去林竟如所言而戒暮年亦失一目洪覺範曰今妄意測度先德之旨疑誤後生者亦可少戒中峰廣拈玉澗因緣云北斗藏身話豈但玉澗頌不出便是五祖戒也只得向背後叉手暮年各損一目也是好采覺範謂誣謗先宗感果如是休將間學解埋沒祖師心幻寄曰一盞長明燈中峰吹殺了上堂拈起拂子云這裏得個入處去捏怪也日本國裏說禪三十三天有個人出家喚云吽吽特舍兒擔枷過狀妙喜曰這老漢克由叵耐姓佃官田更不納苗稅師云十五日已前不問汝十五日已後道將一句來自代云日日是好日雪竇頌去却一拈得七上下四維無等匹徐行踏斷流水聲縱觀寫出飛禽跡草茸茸烟空生巖畔花狼藉彈指堪悲舜若多莫動著動著三十棒師云古佛與露柱相交是第幾機僧問意旨如何師云一條縧三十文買復代前語云南山起雲北山下雨僧又問一條縧三十文買如何師云打與雪竇頌南山雲北山雨四七二三面相覩新羅國裏曾上堂大唐國裏未打鼓苦中樂樂中苦誰道黃金如糞土師以乾祐元年七月十五赴廣主召至府留止供養九月甲子乃還山謂衆曰我離山得六十七日且問汝六十七日事作麼生衆莫能對師曰何不道和尚京中喫麵多僧來參師乃拈起袈裟曰汝若道得落我袈裟圈䙡裏汝若道不得又在鬼窟裏坐作麼生自代曰某甲無氣力妙喜曰西天斬頭截臂我這裏自領出去示衆古德道藥病相治盡大地是藥那個是你自己乃曰遇賤即貴僧曰乞師指示師拍手一下拈拄杖曰接取拄杖僧接得拗作兩橛師曰直饒恁麼也好與三十棒雪竇頌盡大地是藥那個是你自己云盡大地是藥古今何太錯閉門不造車通塗自寥廓錯錯鼻孔撩天亦穿却上堂衆集師以拄杖指面前曰乾坤大地微塵諸佛總在裏許爭佛法覓勝負還有人諫得麼若無人諫得待老漢與你諫看僧曰請和尚諫師曰這野狐精上堂眼睫橫亘十方眉毛上透乾坤下透黃泉須彌塞却汝咽㗋還有人會得麼若有人會得拽取占波共新羅鬬額妙喜曰是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗妄諸人要識雲門麼不見道三臺須是大家催上堂乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代云逐物意移又曰雲起雷興雪竇頌云看看古岸何人把釣竿雲冉冉水漫漫明月蘆花君自看上堂聞聲悟道見色明心遂舉手曰觀世音菩薩將錢買胡餅放下手曰元來祇是饅頭上堂函蓋乾坤目機銖兩不涉世緣作麼生承當衆無對自代云一鏃破三關智證傳雲門宗有三句謂天中函蓋目機銖兩不涉世緣又云以此三句為示者解釋秦時𨍏轢鑽之詞也法華經曰得一切語言三昧而大智論曰善入音聲陀羅尼以此也幻寄曰癡兒面前不得說夢上堂諸和尚子莫妄想天是天地是地山是山水是水僧是僧俗是俗良久曰與我拈案山來僧便問學人見山是山水是水時如何師曰三門為甚麼騎佛殿從這裏過曰恁麼則不妄想去也師曰還我話頭來上堂平地上死人無數過得荊棘林者是好手時有僧出曰與麼則堂中第一座有長處也師曰蘇嚕蘇嚕上堂直得乾坤大地無纖毫過患猶是轉句不見一色始是半提直得如此更須知有全提時節示衆日裏來往日裏辨人忽然中夜教取個物來未曾到處作麼生取代云瞞却多少人示衆迷己底人觸途俱滯悟本底人為甚麼有四大見代云益州附子建州薑示衆從上祖師三世諸佛說法山河大地草木為甚麼不省去代云新到行人事示衆既知來處且道甚麼劫中無祖師代云某甲今日不著便徑山杲云雲門也是作賊人心虗徑山即不然既知來處且道甚麼劫中無祖師不圖打草且要驚蛇示衆布漫天網打龍布絲網撈蝦摝蜆你道螺蚌落在甚麼處代云具眼示衆折半裂三針筒鼻孔在甚麼處為我一一拈出來看代云上中下妙喜云倚門傍戶弄精魂示衆拄杖子化為龍吞却乾坤了也山河大地甚處得來示衆十方國土中惟有一乘法且道自己在一乘法裏一乘法外代云入妙喜曰特地一場愁示衆要識祖師麼以拄杖指曰祖師在你頭上𨁝跳要識祖師眼睛麼在你腳下又曰這個是祭鬼神茶飯然雖如此鬼神也無厭足妙喜曰不見道留惑潤生時有僧在旁咳嗽一聲妙喜曰老漢恁麼道有甚麼過僧擬議便打僧舉灌溪上堂十方無壁落四面亦無門淨裸裸赤灑灑沒可把師曰舉即易出也大難曰上座不肯和尚與麼道那師曰你適來與麼舉那曰是師曰你驢年夢見灌溪曰某甲話在師曰我問你十方無壁落四面亦無門你道大梵天王與帝釋天商量甚麼事曰豈干他事師喝曰逐隊喫飯漢師云古來老宿皆為慈悲之故有落草之談隨語識人若是出草之談即無與麼若與麼便有重話會語不見仰山和尚問僧近離甚處僧云廬山仰山云曾遊五老峰麼曰不曾仰云闍黎不曾遊山此即為慈悲之故有落草之談溈山秀云今人盡道慈悲之故有落草之談只知捉月不覺水深忽若雲門當時謹慎唇吻未審後人若為話會然水母無目求食須假於蝦雪竇頌出草入草誰解尋討白雲重重紅日杲杲左顧無瑕右盻已老君不見寒山子行太早十年歸不得忘却來時道師云不敢望你有逆水之波且有順水之意也難得乃舉良遂初參麻谷谷見來便去鉏草良遂到鉏草處谷都不顧便歸方丈閉却門良遂連三日去敲門至第三日才敲門谷問阿誰遂云和尚莫瞞良遂若不來禮拜和尚洎被經論賺過一生師云便有逆水之波如今得入是順水之意亦喚作雙放時節示衆莫道今日謾諸人好抑不得已向諸人前作一場狼藉忽被明眼人見成一場笑具如今避不得也且問你諸人從上來有甚事缺少甚麼向你道無事已是相埋沒也雖然如是也須到這田地始得亦莫趁口快亂問自己心裏黑漫漫地明朝後日大有事在你若根思遲回且向古人建化門庭東西看是個甚麼道理你欲得會麼都緣是你自己無量劫來妄想濃厚一期聞人說著便生疑心問佛問法問向上向下求覓解會轉沒交涉擬心即差況復有言有句莫是不擬心是麼莫錯會好更有甚麼事珍重又曰江西即說君臣父子湖南即說他不與麼我此間即不如此良久曰汝還見壁麼又曰從上來且是個甚麼事如今抑不得已且向諸人道盡大地有什麼物與汝為緣為對若有針鋒許與汝為隔為礙與我拈將來喚什麼作佛喚什麼作祖喚什麼作山河大地日月星辰將什麼為四大五蘊我與麼道喚作三家村裏老婆說話忽然遇著本色行腳漢聞與麼道把腳拽向階下有甚麼罪過雖然如是據個什麼道理便與麼莫趂口快向這裏亂道須是個漢始得忽然被老漢腳跟下尋著沒去處打腳折有什麼罪過即與麼如今還有問宗乘中話者麼待老漢答一轉了東行西行又曰盡乾坤一時將來著汝眼睫上汝諸人聞恁麼道不敢望汝出來性燥把老僧打一摑且緩緩子細看是有是無是個甚處道理直饒汝向這裏明得若遇衲僧門下奸槌腳折又曰三乘十二分教橫說竪說天下老和尚縱橫十字說與我拈針鋒許說底道理來看與麼道早是作死馬醫雖然如此且有幾個到此境界不敢望汝言中有響句裏藏鋒瞬目千差風恬浪靜又曰我事不獲已向你諸人道直下無事早是相埋沒了也更欲踏步向前尋言逐句求覓解會千差萬別廣設問難贏得一場口滑去道轉遠有什麼休歇時此事若在言語上三乘十二分教豈是無言語因甚麼更道教外別傳若從學解機智得祇如十地聖人說法如雲如雨猶被訶責見性如隔羅縠以此故知一切有心天地懸殊雖然如此若是得底人道火何曾燒口終日說事未嘗挂著唇齒未嘗道著一字終日著衣喫飯未嘗觸著一粒米挂一縷絲雖然如此猶是門庭之說也須是實得恁麼始得若約衲僧門下句裏呈機徒勞佇思直饒一句下承當得猶是瞌睡漢時有僧問如何是一句師曰舉妙喜曰瞌睡漢又曰諸法不異者不可續鳧截鶴夷嶽盈壑然後為無異者哉但長者長法身短者短法身是法住法位世間相常住舉拄杖曰拄杖子不是常住忽起立以拄杖擊繩牀曰適來許多葛藤貶向什麼處去也靈利底見不靈利底著我熱瞞又曰不可說時即有不說時便無也不可商量時便有不商量時便無也又云且道不商量時是個甚麼又云更是甚麼師作綱宗偈曰康氏圓形滯不明魔深虗喪擊寒氷鳳羽展時超碧漢晉鋒八博擬何憑其一是機是對對機迷闢機塵遠遠塵棲夕日日中誰有挂因底底事隔塵迷其二喪時光藤林荒徒人意滯肌尫其三咄咄咄力囗希禪子訝中眉垂其四上不見天下不見地塞却咽喉何處出氣笑我者多哂我者少其五師每顧見僧即曰鑒僧欲酬之則曰咦率以為常故門弟子録曰顧鑒咦德山密禪師刪去顧字但以鑒咦二字為頌謂之抽顧頌洪覺範曰今其兒孫失其旨接人以怒目直視名為提撕名為不認聲色名為舉處便薦相傳以為道眼北塔祚禪師獨笑之作偈曰雲門抽顧笑嬉嬉擬議遭他顧鑒咦任是張良多智巧到頭於此亦難施人天眼目載密師頌云相見不揚眉君東我亦西紅霞穿碧落白日繞須彌乾和七年四月十日端坐示寂逮乾德元年雄武軍節度推官阮紹莊夢師以拂子招曰寄語秀華宮使特進李托我在塔久可開塔乎托時奉使韶州監修營諸寺院因得紹莊之語奏聞詔迎師肉身內宮供養啓塔顏貌如昔鬚髮猶生自南漢乾和七年至宋乾德元年蓋十七年矣留京師月餘仍送還山佛印元曰雲門說法如雲雨絶不喜人記録其語見必罵逐曰汝口不用反記吾語異時裨販我去今室中對機録皆香林明教以紙為衣隨即書之後世學者漁獵文字語言正如吹網欲滿非愚即狂耳音釋卷第十八之二十謐覓筆切音密靜語也安也丱古患切音慣束髮如兩角貌𭺗蒲巴切把搔也淦古暗切音紺䠄跣上音腆下先去聲徒足履地也媼烏老切音襖女老之稱躍他歷切音剔跳貌澀色入切森入聲不滑也錮亡慕切音故鑄銅鐵以塞隙也又禁錮重繫也鏴音路他刀切音滔嗢烏骨切音屋咽也噦一决切淵入聲逆氣嘔也謴吾困切音近混順言謔弄曰謴帔兵臂切音轡裙屬尫烏光切音汪曲頸也又瘠病之人桅吾為切音危榸卓皆切音齊枯木根揎息全切音宣捋也引也
